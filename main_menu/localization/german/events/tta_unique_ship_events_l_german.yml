l_german:
  tta_unique_ships_royal_sovereign.1.title: "HMS Royal Sovereign"
  tta_unique_ships_royal_sovereign.1.desc: "Die Royal Sovereign ist kein gewöhnliches Kriegsschiff, sondern ein schwimmender Ausdruck königlicher Macht. Ihre prunkvolle Gestalt entstammt noch der Welt der großen Kriegsgaleonen, doch ihre Feuerkraft weist bereits in das Zeitalter der Schlachtlinie. Wer sie in See schickt, setzt nicht nur Holz, Tauwerk und Kanonen ein, sondern den sichtbaren Anspruch Englands auf Herrschaft zur See.\n\nHistorische Fakten:\n• Ursprünglich als Sovereign of the Seas gebaut.\n• Stapellauf: 13. Oktober 1637.\n• Bauort: Woolwich Dockyard, England.\n• Bewaffnung: ursprünglich 90 Kanonen bestellt, beim Stapellauf mit 102 Bronze-Kanonen ausgerüstet.\n• 1660 in Royal Sovereign umbenannt.\n• Kämpfte u. a. in den Englisch-Niederländischen Kriegen, bei Beachy Head und La Hogue.\n• 1696/1697 in Chatham durch ein Feuer zerstört."
  tta_unique_ships_royal_sovereign.1.a: "Die Royal Sovereign wird uns den Sieg bringen!"
  tta_unique_ships_royal_sovereign.1.b: "Ein weiteres Schiff? Wir haben doch schon so viele..."
  tta_unique_ships_victory.1.title: "HMS Victory"
  tta_unique_ships_victory.1.desc: "Die HMS Victory ist vom Stapel gelaufen. Sie ist mehr als ein Linienschiff ersten Ranges: Sie ist ein Versprechen, dass die Royal Navy auf jedem Meer bestehen kann. Ihre Stärke liegt nicht allein in der Breitseite, sondern in Widerstandsfähigkeit, Führung und dem Vertrauen, das ein solches Schiff einer ganzen Flotte gibt. Ihr Verlust würde nicht nur eine Schlacht, sondern das Selbstbild einer Seemacht erschüttern.\n\nHistorische Fakten:\n• Stapellauf: 7. Mai 1765.\n• Bauort: Chatham Dockyard, England.\n• Typ: 104-Kanonen-Linienschiff ersten Ranges.\n• Später Flaggschiff Admiral Horatio Nelsons.\n• Berühmt durch die Schlacht von Trafalgar 1805.\n• Nelson starb an Bord der Victory während der Schlacht.\n• Nicht gesunken; als Museumsschiff in Portsmouth erhalten.\n• Gilt als eines der berühmtesten Kriegsschiffe der Welt."
  tta_unique_ships_victory.1.a: "Dieses Schiff wird der Stolz unserer Flotte sein."
  tta_unique_ships_victory.1.b: "Ein weiteres Schiff? Wir haben doch schon so viele..."
  tta_unique_ships_de_zeven_provincien.1.title: "De Zeven Provinciën"
  tta_unique_ships_de_zeven_provincien.1.desc: "Die De Zeven Provinciën ist der Stolz der niederländischen Republik. Ihre Stärke liegt nicht allein in der Zahl ihrer Kanonen, sondern in Disziplin, Seemannschaft und der Kunst, mit kluger Führung stärkere Gegner herauszufordern. Unter Michiel de Ruyter wurde sie zu einem Symbol niederländischer Seeherrschaft — ein Schiff, dessen Verlust mehr wäre als nur ein Eintrag in der Flottenliste.\n\nHistorische Fakten:\n• Stapellauf: 1665.\n• Bauort: Admiralitätswerft am Haringvliet, Rotterdam.\n• Bewaffnung: 80 Kanonen.\n• Flaggschiff von Michiel de Ruyter.\n• Kämpfte im Zweiten und Dritten Englisch-Niederländischen Krieg.\n• Nahm u. a. an der Viertageschlacht 1666 und der Schlacht von Texel 1673 teil.\n• Wurde während der Viertageschlacht beschädigt, blieb aber im Einsatz.\n• Bis 1694 in Dienst."
  tta_unique_ships_de_zeven_provincien.1.a: "Sie wird ein Symbol unserer Macht sein!"
  tta_unique_ships_de_zeven_provincien.1.b: "Die Marine?! Wer braucht die schon. Wir haben doch Landstreitkräfte..."
