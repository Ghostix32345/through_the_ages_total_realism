l_german:
 ger_formable.101.title: "Die Macht des Heiligen Römischen Reiches bröckelt"
 ger_formable.101.desc: "Seit Jahrhunderten hat das Heilige Römische Reich als lose Klammer über die Fürstentümer und Königreiche Deutschlands gewacht. Doch mit der Gründung eines neuen Bundes – vereint in Zielsetzung, Verteidigung und wirtschaftlicher Stärke – beginnt das alte Gefüge zu erzittern.\n\nDie Fürsten beobachten misstrauisch, wie sich eine neue Macht formt, die den Anspruch erhebt, Ordnung und Führung zu übernehmen, wo das Reich nur noch Schatten seiner selbst bietet. Der Kaiser sieht seine Autorität schwinden, und die Reichsinstitutionen stehen vor der größten Herausforderung seit Generationen.\n\nDie Frage, die nun im ganzen Reich gestellt wird, lautet: Ist dies der Anfang vom Ende der alten Ordnung – oder der Beginn einer neuen deutschen Zukunft?"
 ger_formable.101.a: "Das Reich verliert seinen Griff über die deutschen Lande."
 ger_formable.101.a.tt: "Die Autorität des Kaisers nimmt ab.\nDie Reichsstände beginnen, ihre Loyalität neu zu bewerten."
 ger_formable.102.title: "Das Heilige Römische Reich ist gefallen!"
 ger_formable.102.desc: "Seit Jahrhunderten thronte das Heilige Römische Reich über Mitteleuropa – einem gewaltigen Bund aus Fürsten, Kronen und Städten.\n\nDoch nun, mit der Ausrufung des Deutschen Kaiserreiches, bricht die letzte Säule dieser uralten Ordnung. Die alten Insignien verlieren ihren Glanz, die Reichsidee selbst zerfällt zu Staub.\n\nDie Welt hält den Atem an, als die Herrscher deutscher Lande ihre Treue nicht länger dem längst verblassten Reich, sondern dem Deutschen Kaiser schwören.\n\nEin Zeitalter endet.\nEin neues beginnt."
 ger_formable.102.a: "Möge das neue Reich stark sein.!"
 ger_formable.102.a.tt: "Das Heilige Römische Reich ist endgültig Geschichte.\nEin geeintes deutsches Kaiserreich erhebt sich aus seinen Trümmern."


