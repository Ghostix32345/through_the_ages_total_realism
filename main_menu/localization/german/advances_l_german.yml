 #Novgorod
 northern_center_of_arts: "Kunstzentrum des Nordens"
 northern_center_of_arts_desc: "Die Stadt Nowgorod ist ein wichtiges kulturelles Zentrum Europas. Die Lobeshymnen, die man allerorts auf unser hohes Bildungsniveau, die Schönheit der Ikonen und unsere grandiose Architektur singt, steigern das Ansehen unserer aufblühenden Stadt und der ganzen Nation."
 city_of_churches: "Kirchenstadt"
 city_of_churches_desc: "Die über 80 orthodoxen Kirchen in Nowgorod, besonders die Sophienkathedrale, zählen zu den größten Landbesitzern im Fürstentum. Durch ihren Reichtum und ihr religiöses Prestige üben sie einen immensen Einfluss auf die Bevölkerung aus und fördern die Frömmigkeit."
 novgorodian_fur_trade: "Nowgorodischer Pelzhandel"
 novgorodian_fur_trade_desc: "$fur$, das seidig weiche Gold $RUS$s! Wo andere Staaten ihren Reichtum auf $goods_gold$ und seltenen Metallen gründen, ist hochwertiger $fur$ aus unserem Mutterland eine unserer Einkommensquellen."
 grand_dukes_army: "Armee des Großfürsten"
 grand_dukes_army_desc: "Das Führen der Truppen ist eine der wichtigsten Aufgaben, die einem Großfürsten von den Herrschern der Wetsche-Republik verliehen werden. Unter seiner starken und erfahrenen Führung werden unsere Armeen auf dem Schlachtfeld noch effizienter agieren können."
 ushkuiniks: "Die Uschkuiniki"
 ushkuiniks_desc: "Die wikingerartigen Uschkuiniki-Piraten haben sich als äußerst wirksames Mittel erwiesen, wenn es darum ging, unsere Wettbewerber auszustechen. Bedauerlicherweise wurden von anderen Ländern, besonders von Moskau, Maßnahmen gegen sie ergriffen. Wir sollten Gelder bereitstellen und dafür sorgen, dass sie wieder auf den Meeren aktiv werden, damit niemand vergisst, wer die wahren Herren des Nordens sind …"
 baltic_shipyard: "Baltische Schiffswerft"
 baltic_shipyard_desc: "Wir müssen eine gewaltige Schiffswerft an der Ostküste der Ostsee bauen und zur dominierenden Kraft im Überseehandel werden!"
 veche_advance: "Wetsche"
 veche_advance_desc: "Das $veche_advance$ ist eine Volksversammlung, die ihren Ursprung in den Stammesversammlungen hat, die lange Zeit vor der Rus existierten. Sie ist das höchste rechtsprechende und gesetzgebende Organ des Staates."
 birch_bark_manuscript: "Birkenrindentexte"
 birch_bark_manuscript_desc: "Das Schreiben und Lesen ist ein fundamentaler Bestandteil unserer Gesellschaft. Religiöse Texte und andere geschichtsträchtige Ereignisse müssen niedergeschrieben werden, damit künftige Generationen von unseren kulturellen Errungenschaften lernen können."
 novgorod_first_chronicle: "Erste Nowgoroder Chronik"
 novgorod_first_chronicle_desc: "Die #italic Erste Nowgoroder Chronik#! beschreibt die Geschichte unseres Landes von den legendären Anfängen des warägischen Fürsten Rurik bis zum heutigen Tag. Sie ist ein kulturelles Erbstück, das stolz von einer Generation zur nächsten weitergegeben wird."
 defenses_of_novgorod: "Nowgorods Verteidigungen"
 defenses_of_novgorod_desc: "Die Republik $NOV$ steht im Mittelpunkt vieler äußerer Bedrohungen. Doch seien es die ketzerischen Skandinavier im Westen, die Deutschen im Südwesten oder andere russische Mächte im Süden – sie alle werden sich den unzerstörbaren Festungen unseres großen Staates unterwerfen müssen."
 reforms_of_the_posadnichestvo: "Reformierung der Possadnitschestwo"
 reforms_of_the_posadnichestvo_desc: "Der Possadnik ist das höchste Verwaltungsorgan unserer Städte, er hat aber eine weitaus bedeutendere Stellung als nur die eines Bürgermeisters. Mit dem Wachstum der Stadt wachsen auch die Aufgaben, der Einfluss und die Anzahl an Posadniken."
 cork_stoppers: "Flaschenkorken"
 cork_stoppers_desc: "Die jüngsten Fortschritte in der Flaschenproduktion haben es Weinproduzenten erlaubt, Flaschen in standardisierten Größen herzustellen. Dies hat auch dazu geführt, dass die Idee des Korkens als Flaschenverschluss wieder aufgenommen werden konnte. Korken verschließen Wein viel effizienter als Stoffstopfen und ermöglichen damit den Transport von Wein über viel größere Entfernungen, als man es früher für möglich hielt. Vielleicht ist dies die Geburt des weltweiten Weinhandels?"
 colonial_policy_advance: "Kolonialpolitik"
 colonial_policy_advance_desc: "Das neue Land und die Grenzterritorien, die unser Volk kolonisiert, erfordern eine neue Form der Verwaltung und Organisation."
 native_policy_advance: "Ureinwohnerpolitik"
 native_policy_advance_desc: "Die neuen Länder, die unsere wagemutigen Entdecker entdeckt haben, werden in der Regel von seltsamen und ungebildeten Menschen bewohnt. Es ist an der Zeit, dass wir ein einheitliches Gesetz erlassen, dass die Begegnung zwischen unseren Truppen und diesen Ureinwohnern regelt."
 slave_raid_advance: "Küstenüberfälle"
 slave_raid_advance_desc: "Unser Land hat eine lange Tradition, die Küsten unserer Feinde zu plündern, um das zu bekommen, was es braucht: Sklaven, Geld und all die anderen guten Dinge des Lebens."
 crown_power_advance_discovery: "Staatskunst"
 crown_power_advance_discovery_desc: "Da unsere Herrscher zum alleinigen Herrscher ihres Reichs aufgestiegen sind, wird die Notwendigkeit einer staatlichen Struktur immer deutlicher, die unsere Verwaltung regelt."
 crown_power_advance_reformation: "Cuius regio, eius religio"
 crown_power_advance_reformation_desc: "Unsere Herrscher haben zwar die Kontrolle über alle weltlichen Angelegenheiten, doch es hat sich auch die Notwendigkeit ergeben, die göttlichen Angelegenheiten des Reiches zu kontrollieren. Kirche und Staat müssen eins werden."
 crown_power_advance_absolutism: "Absolutismus"
 crown_power_advance_absolutism_desc: "Sowohl das Weltliche als auch das Göttliche stehen unter der Kontrolle des Herrschers, der damit die absolute Macht innehält."
 crown_power_advance_revolutions: "Nation"
 crown_power_advance_revolutions_desc: "Infolge der Vereinigung aller Mächte unter der eisernen Faust unseres Monarchen sind sich all unsere Untertanen ihrer Zugehörigkeit zum Land bewusst geworden. Welche Gebiete unsere Monarchen auch immer regieren, sie sind Teil der Nation und ihr Volk ebenso."
 sergeants_at_arms_advance: "Sergeanten"
 sergeants_at_arms_advance_desc: "Sergeanten sind treue Gefolgsleute, die den Monarchen schützen und ihm dienen. Sie sind im Rang knapp unterhalb eines Ritters. Sie dienen dem Monarchen nicht nur als Leibwächter, sondern treiben auch Anleihen ein, arbeiten als Polizeitrupp oder berufen Männer und Schiffe in den Militärdienst ein."
 government_size_renaissance: "Dauerhaftes Kabinett"
 government_size_renaissance_desc: "Herrscher hatten traditionell Berater um sich, die sie bei Kriegs- und Friedensentscheidungen berieten. Heute ist die Regierung unseres Landes jedoch so komplex geworden, dass wir eine dauerhaftere Position benötigen, die uns bei der Bewältigung des Tagesgeschäfts hilft."
 renaissance_court: "Renaissancehof"
 renaissance_court_desc: "Die Renaissance hat sich überall verbreitet und unser Hof beherbergt die talentiertesten Künstler und Gelehrten, die die erhabensten Werke erschaffen, die die Welt je gesehen hat."
 rgo_size_advance_renaissance: "Mühlen"
 rgo_size_advance_renaissance_desc: "Mühlen werden bereits seit ihrer Entdeckung in der Antike genutzt. Wir sind heute jedoch in der Lage, weitaus fortschrittlichere Wind- und Wassermühlen zu errichten."
 food_advance_renaissance: "Intensive Landwirtschaft"
 food_advance_renaissance_desc: "Die Landwirtschaft ist das Fundament, auf dem die meisten Gesellschaften aufgebaut sind. In jüngster Zeit wurden eine Reihe von Methoden entwickelt, um die Produktivität zu steigern und größere Nahrungsmittelüberschüsse zu erzielen."
 crown_power_advance_renaissance: "Souveränität"
 crown_power_advance_renaissance_desc: "Traditionell beruhte die Regierungsführung auf der Fähigkeit eines Herrschers, mit den verschiedenen Ständen des Landes umzugehen. Moderne Regierungstheorien haben jedoch festgelegt, dass Herrscher Souveräne in ihrem eigenen Land sind und dass wir uns keiner anderen weltlichen Macht beugen werden."
 global_supply_limit_modifier_advance_2: "Nachschublinien"
 global_supply_limit_modifier_advance_2_desc: "Die Landkriegsführung und unsere immer größeren Armeen sind heute mehr denn je auf eine gute Versorgung angewiesen. Eine bessere Organisation unserer Nachschubkarren bedeutet deshalb auch, dass wir mehr Kapazitäten zur Verfügung haben."
 naval_morale_advance_1: "Mittelalterliche Segelei"
 naval_morale_advance_1_desc: "Die Fortschritte, die in den letzten Jahrzehnten im Bereich des Segelns gemacht wurden, haben die Fähigkeiten und das Selbstvertrauen unserer Seeleute gestärkt und es ihnen erlaubt, das Küstenmeer zu beherrschen."
 slave_trade_act_advance: "Gesetz zum Sklavenhandel"
 slave_trade_act_advance_desc: "Der ständige Strom an Arbeitern in und aus unseren Kolonien ist eine lukrative, aber auch sensible Angelegenheit. Wir müssen Gesetze erlassen, um die Bedingungen zu verbessern."
 order_headquarters_advance: "$order_headquarters$"
 order_headquarters_advance_desc: "Die Gründung eines frommen heiligen Ordens wird nicht nur unsere Verteidigungsfähigkeiten erhöhen, sondern auch die Rekrutierung von fähigen Männern erleichtern."
 LIV_crusader_forts: "Baltische Kreuzritterfestungen"
 LIV_crusader_forts_desc: "Die vielen Befestigungsanlagen in unserem Land wurden von den vielen Kreuzritterbanden errichtet und finanziert, die in unserem Land leben. Die robusten Mauern dieser Befestigungen werden unser Volk schützen!"
 scholasticism: "Klassische Scholastik"
 scholasticism_desc: "Die Scholastik, die sich auf die aristotelische Logik und die Schriften früher christlicher Vorväter stützt, hat das Ziel, Wissen zu verbreiten, indem sie die religiöse Überzeugung und Tradition betont."
 organized_religion: "Verbesserte Religionsorganisation"
 organized_religion_desc: "Die Religion spielt in jeder Gesellschaft eine wichtige Rolle, doch nicht jeder Glaube hat die gleiche Struktur. Eine organisierte Religion hat Rituale und systematische Glaubenssysteme, die einer definierten Lehre folgen."
 guilds: "Zünfte"
 guilds_desc: "Eine Zunft ist ein Zusammenschluss von Händlern oder Handwerkern. Ihr Ziel sind gegenseitiger Schutz und Unterstützung vor dem Hintergrund gleicher Interessen. Zünfte monopolisieren ihre Waren und ihren Handel und legen Normen für die Qualität und den Preis fest."
 colonial_tradition: "Koloniale Traditionen"
 colonial_tradition_desc: "Unser Staat wurde von den großen Ambitionen unserer Gründerväter, den ersten Kolonisten, die aus dem Mutterland hierherkamen, geformt. Viele ihrer Bräuche und Traditionen sind Teil unserer eigenen Gesellschaft in dieser neuen und sonderbaren Welt."
 colonial_heritage: "Koloniales Erbe"
 colonial_heritage_desc: "Als Kolonie unseres Mutterlands tragen wir das Erbe ihrer kaiserlichen Ambitionen."
 colonial_ambition: "Koloniale Ambition"
 colonial_ambition_desc: "Viele sind auf der Suche nach einem neuen Leben in die Neue Welt gekommen. Sie wollten die Wunder ergründen, die jenseits der weiten Meere verborgen lagen, und den ungezähmten Kontinent zu ihrer Heimat machen. Ihre Ambitionen leben in uns weiter, während wir immer weiter ins Unbekannte vordringen."
 power_projection_advance_1: "Kaiserliche Ambitionen"
 power_projection_advance_1_desc: "Mit dem Wachstum und den Zusammenschlüssen der Länder im Hochmittelalter sind auch ihre Ambitionen gewachsen; viele von ihnen streben danach, ein Großreich in ihrer Region zu werden."
 trade_advance_age_of_trad: "Handelsmessen"
 trade_advance_age_of_trad_desc: "Während des Mittelalters wurden die Handelsrouten immer weiter ausgeweitet, was zum Entstehen neuer Praktiken geführt hat. Handelsmessen waren große Veranstaltungen, die jährlich in bestimmten Städten stattfanden und auf denen sich Händler von allerorts treffen konnten, um Geschäfte abzuschließen."
 colonial_assembly: "Kolonialversammlung"
 colonial_assembly_desc: "Ein großer Teil der legislativen Macht, über Steuern und den Staatshaushalt bestimmten zu können, wurde in die Kolonien verlagert."
 founding_fathers: "Gründerväter"
 founding_fathers_desc: "All jene Politiker, Soldaten und Diplomaten, die eine wichtige Rolle bei der Gründung ihrer Nation gespielt haben, die für die Unabhängigkeit ihres Landes gekämpft und ein neues Regierungssystem eingeführt haben."
 colonial_militia: "Kolonialmilizen"
 colonial_militia_desc: "Da es keine regulären Garnisonen gab, wurden Kolonialmilizen bei lokalen Konflikten und Grenzüberfällen gegen die nahe der Kolonien lebenden Ureinwohner eingesetzt. Die Miliz bestand aus männlichen Kolonisten, die oft selbst für Waffen und Ausrüstung sorgen mussten."
 new_frontiers: "Neue Grenzen"
 new_frontiers_desc: "Die Kolonialgrenzen der Neuen Welt werden durch den Bau kleinerer Handelsposten bis hin zu vollständigen Siedlungen mit riesigen Anbauflächen immer weiter ins Landesinnere verlagert."
 continental_trade: "Kontinentalhandel"
 continental_trade_desc: "Die Kolonien der Neuen Welt mussten zwar viele Fertigprodukte einführen, doch sie entwickelten sich auch zu einem großen Rohstofflieferanten für die europäischen Märkte."
 manufacturing_center: "Manufakturzentrum des Reichs"
 manufacturing_center_desc: "Unsere Bürger sind die Machtbasis des Handelsimperiums unseres Suzeräns. Waren aus fremden Ländern werden an uns geliefert, um von uns zu fertigen Produkten geformt zu werden."
 free_thinkers: "Freidenker"
 free_thinkers_desc: "Die Ansicht, dass jeder Mensch das Recht auf Gedanken- und Meinungsfreiheit hat, war in den Kolonien besonders stark ausgeprägt. Ohne diese Rechte, so hieß es, sei keine Grundfreiheit möglich."
 liberty_heroes: "Helden der Freiheit"
 liberty_heroes_desc: "Viele Anführer der Unabhängigkeitskriege in der Neuen Welt besaßen nicht nur die notwendigen militärischen Fähigkeiten, sondern auch die erforderliche Ausstrahlung, die für die Moral und den Zusammenhalt von Truppen sowie Zivilbevölkerung unerlässlich war."
 beat_to_windward_advance: "Gegen den Wind segeln"
 beat_to_windward_advance_desc: "Karavellen mit Lateinersegeln sind sehr wendig und können leicht gegen den Wind segeln. Das erlaubt ein zügigeres Durchqueren von ungünstigem Wetter und feindlichen Meeren."
 route_to_the_indies_advance: "Seeweg nach Indien"
 route_to_the_indies_advance_desc: "Der Handel mit dem Fernen Osten ist für die Aufrechterhaltung unseres Lebensstils unerlässlich. Der Landweg ist jedoch langsam und kostspielig. Wenn wir eine Route über das Meer finden könnten, würde dies den Händlern unseres Landes viele Geschäftsmöglichkeiten eröffnen."
 educated_bureaucrats: "Gebildete Bürokraten"
 educated_bureaucrats_desc: "Die Beamten, die für die Verwaltung unseres Landes zuständig sind, sind keine ungebildeten, faulen Erben ihrer Eltern, sondern gebildete und begabte Personen, die sich ihre Position durch ihren Einsatz und ihre Verdienste erarbeitet haben. Eine solche Verwaltung kann reibungsloser und effizienter arbeiten als jede andere."
 efficient_bureaucracy: "Effiziente Bürokratie"
 efficient_bureaucracy_desc: "Die Bürokratie ist das Öl, das die Zahnräder unserer Verwaltung schmiert und dafür sorgt, dass in selbiger alles ordnungsgemäß abläuft. Durch die Ernennung effizienter Bürokraten, die sowohl über das nötige Talent verfügen als auch den Willen haben, die ihnen zugetragenen Aufgaben zu erfüllen, stellen wir sicher, dass unsere Regierungsstrukturen reibungslos arbeiten."
 appointed_chain_of_command: "Einführung einer Befehlskette"
 appointed_chain_of_command_desc: "Indem wir jenen mit dem größten Talent erlauben, unsere Mannen in die Schlacht zu führen, anstatt diese Aufgabe den unfähigen Söhnen von Adligen zu überlassen, die diese Position nur aufgrund ihrer Blutlinie innehaben, stellen wir sicher, dass unsere Armeen effizienter werden und wir leichter größere Armeen befehligen."
 abacus_advance: "Abakus"
 abacus_advance_desc: "Abakusse werden bereits seit Jahrhunderten auf der ganzen Welt genutzt, doch es ist genau diesen Rechenhilfsmitteln zu verdanken, dass wir genauestens Buch über den Stand unserer Münzen führen können. Ohne sie und die talentierten Menschen, die sie zu nutzen wissen, wären wir blind, was den tatsächlichen Reichtum unseres Landes angeht."
 temporary_appointments: "Befristete Ämter"
 temporary_appointments_desc: "Hofämter auf Lebenszeit zu besetzen, birgt das Risiko, dass die betreffenden Personen immer mehr Macht und Einfluss anhäufen, je länger sie dieses Amt bekleiden, und dass sie sich aufgrund von Routine weniger um ihre Aufgaben kümmern. Wir müssen das System reformieren und befristete Ämter vergeben, damit nur die Qualifiziertesten diese Ämter bekleiden und das Amt wechselt, sobald sie anfangen, ihre Aufgaben zu selbstgefällig wahrzunehmen."
 non_inheritable_offices: "Nicht-vererbbare Ämter"
 non_inheritable_offices_desc: "Das Hofämter vom Vater auf den Sohn übergehen, ist eine Plage für unser Verwaltungssystem und führt dazu, dass sich Apathie und Fäulnis in allen Bereichen ausbreiten. Wir müssen sicherstellen, dass die Ämter stattdessen jenen zugewiesen werden, die in der Lage sind, die Aufgaben, die mit dem jeweiligen Posten einhergehen, zu erfüllen, unabhängig von ihrer Abstammung."
 government_sanctioned_celebrations: "Von der Regierung organisierte Feste"
 government_sanctioned_celebrations_desc: "Unser Volk ist stets erpicht, jede noch so kleine gute Nachricht oder wichtiges Ereignis in unserem Kalender zu feiern. Anstatt jeden für sich feiern zu lassen, werden wir jedoch unsere Verwaltung anweisen, diese Feste auszurichten. Dies wird nicht nur unserer Bevölkerung zeigen, dass wir uns um ihr Wohlergehen sorgen, sondern auch ein Gefühl des Zusammenhalts schaffen."
 efficient_logistics: "Effiziente Logistik"
 efficient_logistics_desc: "Die Logistik und die Kommunikation sind jene beiden Pfeiler, die es uns erlauben, all unsere Territorien ordnungsgemäß zu verwalten. Um sicherzustellen, dass Nachrichten zwischen unseren Provinzen und ernannten Statthaltern ausgetauscht werden, brauchen wir jedoch ein gut ausgebautes Straßennetz, auf dem unsere Boten reisen können."
 ledgers_double_checking: "Doppelte Buchführung"
 ledgers_double_checking_desc: "Es ist die fehlende Strenge in der Buchführung, die es der Korruption ermöglicht, zu gedeihen und Länder von innen heraus verfaulen zu lassen. Damit dies nicht auch in unserer Verwaltung geschieht, müssen wir sicherstellen, dass jede Veränderung in unserer Staatskasse ordnungsgemäß verbucht wird."
 province_governors: "Provinzstatthalter"
 province_governors_desc: "Unsere Provinzen werden nicht autonom oder vom örtlichen Adel regiert, den es nach Macht dürstet. Stattdessen sind es die Statthalter, die von der Zentralverwaltung ernannt wurden, welche unsere Autorität in allen Ecken unseres Landes aufrechterhalten."
 right_to_rule: "Herrschaftsrecht"
 right_to_rule_desc: "Unsere Verwaltung wurde nach dem Prinzip aufgebaut, dass talentierte Menschen jene Positionen besetzen, die am besten ihren Fähigkeiten entsprechen. Dies ist auch der Grund, warum der Herrscher derjenige sein sollte, der am meisten Talent hat – wie es sich für jemanden gehört, der für das ganze Land verantwortlich ist. Im unglücklichen Fall, dass es keinen geeigneten Herrscher gibt, brauchen wir stattdessen Leute, die die Wirklichkeit „verschönern“ können, sei es durch imposante Statuen, erstaunliche Gemälde oder erhabene Verse."
 talented_traders: "Talentierte Händler"
 talented_traders_desc: "Wir müssen nicht nur dafür sorgen, dass sich unsere Verwaltung aus begabten Personen zusammensetzt, sondern dass dies auch auf jene Menschen zutrifft, die Waren und Münzen in unserem Land befördern. Sicherzustellen, dass die klügsten Köpfe für Handelsmissionen zuständig sind, gewährleistet, dass sowohl die Erzeugnisse als auch die aus dem Handel erzielten Vorteile ununterbrochen fließen."
 smooth_administration: "Reibungslose Verwaltung"
 smooth_administration_desc: "Eine Verwaltung zu haben, die aus den talentiertesten und für die Aufgabe am besten geeigneten Individuen besteht, sorgt für reibungslose Abläufe in unserem Land und stellt sicher, dass unsere Autorität keine Unterbrechungen erleidet, ungeachtet aller äußeren Umstände."
 ara_a_maritime_realm: "Maritimes Reich"
 ara_a_maritime_realm_desc: "Unser Reich ist auf die unermesslichen Weiten des Meeres fixiert und hat sich voll und ganz der Marine verschrieben. Es nutzt die Seemacht und den Seehandel, um seine Position zu stärken und seinen Einfluss auszuweiten. Die maritime Sichtweise prägt die Politik und fördert eine maritime Kultur, die den Wohlstand der Nation vorantreibt."
 ara_desperta_ferro: "Desperta Ferro!"
 ara_desperta_ferro_desc: "#italic Desperta Ferro!#! (Eisen erwache!) ist der furchteinflößende Schlachtruf der $a_almogavars$. Dazu werden Lanzen und Pfeilspitzen gegen Feuersteine geschlagen, um Funken zu erzeugen. Neben anderen Schlachtrufen wie #italic Aragó!#! und #italic Sant Jordi!#! ist #italic Desperta Ferro!#! der bekannteste."
 ara_a_mediterranean_trade_power: "Handelsmacht des Mittelmeers"
 ara_a_mediterranean_trade_power_desc: "Die sanfte Umarmung des Mittelmeers umgarnt unsere Ufer und lädt unser Volk dazu ein, Handel auf ihm zu treiben. Unsere pulsierenden Handelsstädte und die strategischen Handelsposten, die über das gesamte Mittelmeer verstreut liegen, werden eine entscheidende Rolle bei der Verwirklichung unseres Ziels spielen: Zur dominierenden Macht im Mittelmeerhandel zu werden!"
 ara_fleet_ordinances: "Flottenverordnungen"
 ara_fleet_ordinances_desc: "Die im geschäftigen Mittelmeer aufgestellten Flotten benötigen ein Rechtssystem, um gegen Verbrechen in den überfüllten Land- und Seegebieten vorzugehen. Die „#italic Ordinacions sobre lo fet de la mar#!“, die „#italic Verordnung über das, was im Meer geschieht#!“, gilt als eine der frühesten militärischen Rechtsprechungen zur Regelung von Flotten. Diese einzigartige Antwort auf die Zeit nach dem Schwarzen Tod rekrutiert Besatzungen von außerhalb der Krone von Aragón, darunter auch Kriminelle. Dies schaffte einen harmonischen Kodex, der sich aus verschiedenen Traditionen zusammensetzt und nicht nur eine bloße Kodifizierung bestehender Seefahrtsbräuche darstellt."
 ara_valencian_golden_age: "Valencianisches Goldenes Zeitalter"
 ara_valencian_golden_age_desc: "Das von uns bewohnte Reich hat dank des Beitrags angesehener Autoren wie Joanot Martorell, Ausiàs March und Isabel de Villena eine literarische Höhe erklommen, von der unsere Nachbarländer noch weit entfernt sind. Ihre tiefgründigen literarischen Werke haben unsere Kultur gestärkt und unserem Volk ein Gefühl des Stolzes vermittelt. Unser Land ist ein kultureller Leuchtturm, der hell erstrahlt."
 ara_remenca: "Remença"
 ara_remenca_desc: "Das besonders in Katalonien genutzte Remença-System hat enge Verwandte in den anderen Territorien der Krone. Es fördert das kollektive Streben nach einer höheren Rohstoffproduktion. Es schafft einen Rahmen, durch den unser Land Reichtum anhäufen kann, der wiederum den Fortschritt ankurbelt und zur Erfüllung unserer Ziele beiträgt. Durch die harmonische Nutzung dieser Systeme kultivieren wir ein Umfeld, in dem unsere Bemühungen durch den Überfluss an Ressourcen gestärkt werden und unser Reich Wachstum und Wohlstand erfahren kann."
 ara_chartered_merchant_companies: "Verbriefte Handelskompanien"
 ara_chartered_merchant_companies_desc: "Unsere Händler vergeuden wertvolle Ressourcen, weil sie eher miteinander konkurrieren, anstatt gemeinsam gegen andere Händler vorzugehen. Diese Verschwendung muss aufhören! Wir sollten alle Anstrengungen darauf konzentrieren, anderen den Handel wegzunehmen. Wir müssen Gesellschaften gründen, die zeitlich befristete Monopole für den Handel mit bestimmten Regionen erhalten und deren Erneuerung davon abhängt, ob die Krone den ihr zustehenden Anteil erhält."
 ara_stronger_united: "Stärke durch Einigkeit"
 ara_stronger_united_desc: "Seit dem Zusammenschluss des Königreichs Aragon und der Grafschaft Barcelona im Jahr 1164 agierte die Krone Aragon als Konföderation, die verschiedene Reiche unter einem zentralen Herrscher zusammenfasst. Die Unterschiede haben den Wohlstand gefördert und die Individualität bewahrt, aber auch die Illusion von Uneinigkeit entstehen lassen. Um diese Illusion zu bekämpfen, wurden Verwaltungsreformen eingeführt, die den Zusammenschluss stärken und gleichzeitig die einzigartigen Merkmale der einzelnen Herrschaftsgebiete bewahren."
 ara_constellation_cities: "Städtebund"
 ara_constellation_cities_desc: "Seit der Gründung besteht unsere Nation aus verschiedenen Reichen, die unter einem einzigen Herrscher vereint wurden. Jedes Reich hat dabei seine eigenen Traditionen und Gesetze behalten, wodurch sich zahlreiche Großstädte zu einer regionalen Metropole entwickelt haben, die ihre jeweiligen Regionen repräsentieren und regieren."
 ara_protection_of_the_little_folk: "Schutz des kleinen Volkes"
 ara_protection_of_the_little_folk_desc: "Unsere Soldaten müssen in der Gewissheit kämpfen können, dass wir uns um ihre Familien kümmern, sollten sie in der Schlacht fallen. Aragon wird seiner Pflicht nachkommen. Dazu werden wir ein System von Arbeitshäusern errichten, in dem die Waisen der Gefallenen untergebracht werden können."
 ara_gunpowder_souls: "Schießpulverseele"
 ara_gunpowder_souls_desc: "Das #italic Fallas#!-Fest und die praktische Erfahrung, wie man Schießpulver für Feuerwerkskörper nutzt, war für die Krone von Aragón ein wichtiger Katalysator, um die Artillerie weiterzuentwickeln. Die festliche Tradition hat den Innovationsgeist beflügelt, das Wissen rund um die Artillerie vertieft und zur Entwicklung neuer Strategien beigetragen."
 ara_mossos_esquadra: "Mossos d’Esquadra"
 ara_mossos_esquadra_desc: "Die #italic Escuadras de Paisanos#!, die auch als #italic Esquadres de Catalunya#! oder #italic Mossos d’Esquadra#! (#italic Geschwaderjungs#!) bekannt waren, sind eine lokale Miliztruppe, die sich der Sicherung von Handelswegen und Handelsmessen gewidmet hat. Wir sollten ihren Erfolg als Inspiration nutzen und auch in anderen Territorien ähnliche Milizen aus der heimischen Bevölkerung aufbauen. Dies wird ein harmonisches Zusammenleben fördern und den Frieden in diesen Regionen sichern."
 cas_repoblaciones: "Repoblaciones"
 cas_repoblaciones_desc: "Die Eroberungen unserer Vorfahren haben dazu geführt, dass wir über ein Land herrschen, in dem es mehr Land als Menschen gibt, die es bewohnen und bearbeiten können. Dies führte zur Notwendigkeit, Einwanderer aus anderen Regionen anzulocken und sie insbesondere im südlichen Andalusien anzusiedeln, einer Region, die seit der Vertreibung der muslimischen Einwohner im Jahr 1267 stark unterbevölkert ist."
 cas_the_reconquista: "Reconquista"
 cas_the_reconquista_desc: "Seit dem Untergang des Westgotenreichs vor vielen Jahren durch Eindringlinge führten wir unzählige Kriege gegen die Mauren. Dies hat unsere Disziplin so weit gestärkt, dass es wenig andere Länder gibt, die ebenso stolz sein könnten. Steht auf, Mannen Kastiliens, und zeigt der Welt eure Entschlossenheit!"
 cas_castilian_navy: "Kastilische Marine"
 cas_castilian_navy_desc: "Mit unserer Position auf einer Halbinsel gelegen, die an drei von vier Ecken von Meer umgeben ist, und mit der Straße von Gibraltar, die von verschiedenen Mächten umkämpft wird, wird die Beherrschung der Meere für uns zu einer Frage von Leben und Tod. Die Hunderte von Kilometern an Küste brachten unsere Vorfahren dazu, die Wellen zu bändigen, und machten unsere Nation zu einer furchtlosen Seemacht."
 cas_cronicas_reales: "Crónicas Reales"
 cas_cronicas_reales_desc: "Die Chroniken früherer Könige zu sammeln, erlaubt uns, ein Kompendium zu erstellen, dass vergangene Ereignisse und den Ursprung unserer Herrschaft bewahrt. Dieses Wissen wird nicht nur unsere Kultur bewahren, sondern auch den derzeitigen und den künftigen Herrschern dabei helfen, Ereignisse in Hinblick auf die Vergangenheit besser bewerten zu können."
 cas_masters_of_the_orders: "Ordensmeister"
 cas_masters_of_the_orders_desc: "Da die Reconquista nicht mehr unser Hauptanliegen ist, ist auch die Unabhängigkeit der Heiligen Orden nicht länger gerechtfertigt. Indem unsere Herrscher die Position des Ordensmeisters einnehmen, können wir ihnen nicht nur größere Macht gewähren, sondern auch die militärischen Kenntnisse dieser Kreuzritter selbst nutzen."
 cas_new_world: "Neue Welt"
 cas_new_world_desc: "Dank der neuen Entdeckungen können neue Länder von tapferen Kolonisten beansprucht werden und wertvollen Handel zurück ins Mutterland leiten. Wir werden treue Kolonisten entsenden, die das Rückgrat unserer Kolonien bilden werden."
 cas_reform_of_millones: "Millones-Reform"
 cas_reform_of_millones_desc: "Durch die Billigung der Reform der #italic Millones#! durch die Cortes (Abgeordnetenkammer) können wir unsere Bevölkerung nun viel effizienter besteuern. Es handelt sich dabei um eine indirekte Steuer, die auf Lebensmittel erhoben wird."
 cas_marine_infantry: "Kastilische Marineinfanterie"
 cas_marine_infantry_desc: "Mit einer starken Marine geht auch die Notwendigkeit einher, dass die Besatzungen dieser Schiffe in der Lage sind, in jeder Lage zu kämpfen, auch wenn dies bedeutet, dass sie außerhalb der Schiffe kämpfen. Aus diesem Grund muss unsere Marineinfanterie zu einem mächtigen Werkzeug geformt werden."
 cas_pasos: "Kastilische Pasos"
 cas_pasos_desc: "Auch wenn die während der Karwoche in Kastilien getragenen #italic Pasos#! nichts Neues sind, erreichte die auf ihnen dargestellte Bildhauerkunst gerade in den letzten Jahren einen neuen Höhepunkt. Künstler wie Juan de Juni oder Gregorio Fernández machten die kastilischen #italic Pasos#! zu den eindrucksvollsten auf der gesamten Halbinsel."
 cas_real_academia_espanola: "Real Academia Española"
 cas_real_academia_espanola_desc: "Wie es bereits in anderen Teilen der Welt geschehen ist, haben auch wir die Notwendigkeit erkannt, den sprachlichen Aspekt unserer Kultur zu regeln, wenn sich unsere Sprache weiterentwickeln und in der ganzen Welt verbreiten soll. Um sicherzustellen, dass unsere Sprache ihre Alleinstellungsmerkmale beibehält, wurde vorgeschlagen, die #italic Real Academia Española#! zu gründen, die fortan die Regeln für die korrekte Verwendung unserer Sprache festlegen wird."
 cas_canal_de_castilla: "Canal de Castilla"
 cas_canal_de_castilla_desc: "Nach dem Vorbild anderer Wasserleitsysteme in ganz Europa, die sowohl für Handels- als auch Bewässerungszwecke genutzt werden, wird der #italic Canal de Castilla#! Wasser aus den Bergen im Norden der #italic Meseta#! ins alte Kastilien bringen und die dortigen Felder bewässern. Diese technische Meisterleistung wird die Ernten steigern, einen Überschuss erzeugen, den wir auf den Märkten anbieten können, und uns dabei helfen, diesen zu den Häfen zu transportieren."
 cas_royal_factories: "Königliche Fabriken"
 cas_royal_factories_desc: "Um die Ausfuhr von Rohstoffen anstelle von teureren Fertigwaren zu verhindern, wurde ein System von staatlich unterstützten Fabriken vorgeschlagen, die unsere Nation letztendlich industrialisieren werden. Diese neuen Fertigwaren werden die Wirtschaft unseres Landes stärken."
 gra_banu_nasr: "Banū Naṣr"
 gra_banu_nasr_desc: "Wir stammen vom Stamm der Banu Hasradsch und sind Nachkommen von Sa’d ibn ’Ubāda, einem Gefährten des Propheten Mohammed. Der Gründer unserer Dynastie Mohammed I. kontrollierte einst ein Gebiet, das Granada, Jaén, Almería und Málaga umfasste, auch wenn einige dieser Gebiete an die Christen fielen. Wir haben uns ihrem Vormarsch hartnäckig widersetzt und werden dies dank der Kraft unserer Vorfahren auch weiterhin tun."
 gra_nasrid_art: "Nasridenkunst"
 gra_nasrid_art_desc: "Die Kunsthandwerker und Architekten von Granada sind die besten der Welt. Sie wissen nicht nur Nützliches zu erschaffen, sondern kreieren darüber hinaus etwas Schönes für das Auge und wissen, wie sie beide Aspekte auf hervorragende Weise miteinander verbinden können."
 gra_skillful_envoys: "Fähige Gesandte"
 gra_skillful_envoys_desc: "Die effiziente Nutzung der Diplomatie war in der Vergangenheit oft eine Frage von Leben und Tod. Wir dürfen auch in Zukunft nicht untätig bleiben und müssen unsere Gesandten weiter schulen, um unser Überleben zu sichern."
 gra_razzias: "Nasridenüberfälle"
 gra_razzias_desc: "Die Grenzen unserer Feinde bieten uns einzigartige Gelegenheiten. Wenn wir schnell zuschlagen, könnten wir sie überrumpeln und ihnen starken Schaden zufügen."
 gra_muttavia_armies: "Muttavia-Armeen"
 gra_muttavia_armies_desc: "Granada verfügt nur über eine begrenzte Anzahl von Einwohnern und es gibt einfach nicht genug Männer, um unsere Nation effizient verteidigen zu können. Doch wo es uns an Soldaten mangelt, haben wir reichlich Geld, mit dem wir Söldner dazu bringen können, unter unserem Banner zu kämpfen."
 gra_expand_qanahs: "Ausweitung der Qanate"
 gra_expand_qanahs_desc: "Granada besitzt viel fruchtbares Land, aber nur wenig Süßwasser. Indem wir die Bewässerungskanäle erweitern, können wir das vorhandene Wasser besser nutzen, um unsere Ernteerträge zu erhöhen."
 gra_adaptative_trade: "Anpassungsfähiger Markt"
 gra_adaptative_trade_desc: "Unsere privilegierte Position als Mittelsmann zwischen christlichen und muslimischen Nationen birgt viele Herausforderungen. Wir müssen unsere Methoden modernisieren und unsere Position als Brücke zwischen weit entfernten Märkten und Europa festigen."
 gra_expand_the_frontier: "Ausweitung der Grenze"
 gra_expand_the_frontier_desc: "Seit der Gründung unserer Dynastie hat die Größe unseres Landes immer weiter abgenommen. Wir befinden uns nun jedoch in einer starken Position und können nicht mehr nur davon träumen, unser verlorenes Territorium zurückzuerobern, sondern auch davon, unsere Grenze weiter als je zuvor voranzutreiben."
 gra_a_strong_rule: "Starke Herrschaft"
 gra_a_strong_rule_desc: "Für Jahrzehnte haben sich die verschiedenen Generationen unserer Herrscherfamilie gegenseitig bekämpft und unsere Nation destabilisiert. Es ist an der Zeit, dass wir die gesamte Macht unter einem starken Herrscher, der unserem Volk Frieden und Wohlstand bringen kann, vereinen."
 gra_modernized_economy: "Modernisierte Wirtschaft"
 gra_modernized_economy_desc: "Moderne Zeiten erfordern eine moderne Wirtschaft, die in dieser wettbewerbsorientierten Welt gedeihen kann. Indem wir unsere Infrastruktur ausbauen und effizientere Methoden und Prozesse nutzen, können wir mit der gleichen Menge Rohstoff viel mehr produzieren."
 gra_ghazawat: "Nasridischer Ghazawat"
 gra_ghazawat_desc: "Wie die ersten Krieger, die unter dem Propheten Mohammed kämpften, müssen auch unsere Soldaten mutig, ja geradezu fanatisch für die Verteidigung unseres Reiches und unseres Volkes einstehen."
 gra_a_new_golden_era: "Ein neues Goldenes Zeitalter"
 gra_a_new_golden_era_desc: "Al-Andalus war einst ein Zentrum der Bildung, das außergewöhnliche Gelehrte wie Ahmad Ibn Ruschd, ’Abū al-Qāsim und Muḥammad ibn Tufail hervorbrachte. Wir müssen den Geist unserer Vorväter bewahren."
 nav_transatlantic_whaling: "Transatlantischer Walfang"
 nav_transatlantic_whaling_desc: "Der baskische Walfang ist eine jahrhundertealte Tradition; unsere besten Walfänger werden oft von anderen Ländern herangezogen, die ihre Fischerei ausbauen und verbessern wollen. Wir sollten uns ihr Wissen zunutze machen und unsere Walfänger mit Außenposten rund um den Atlantik vermarkten."
 nav_shipbuiling_experts: "Meisterhafte Schiffbauer"
 nav_shipbuiling_experts_desc: "Das Meer, das unsere Küsten säumt, hält eine Fülle von Ressourcen für jene bereit, die mutig genug sind, sie zu ergreifen. Seit Jahrhunderten gibt es entlang unserer Küste zahlreiche Häfen und Werften, die unermüdlich Schiffe bauen, um unseren Durst nach Abenteuern und Unternehmungen zu stillen."
 nav_memories_reconquista: "Erinnerungen an die Reconquista"
 nav_memories_reconquista_desc: "Unser Volk nahm tatkräftig an der Reconquista teil und unterstützte die christlichen Bemühungen, die Iberische Halbinsel von der muslimischen Herrschaft zu befreien. Obwohl letztlich ein Stadium erreicht wurde, in dem eine weitere territoriale Ausdehnung nicht mehr möglich war, spielte $NAV$ dennoch eine wichtige Rolle in diesem Kreuzzug, und zwar durch militärische Feldzüge und Bündnisse mit benachbarten christlichen Königreichen."
 nav_a_renaissance_realm: "Reich der Renaissance"
 nav_a_renaissance_realm_desc: "Obwohl unser Reich seinen Ursprung in den Tälern der bergigen Pyrenäen hatte, hat unser Volk die humanistischen Einflüsse aus dem Süden und Norden aufgenommen. Die Navarresen haben dieses Bewusstsein aufgenommen, doch sie vergessen ihre alten Traditionen nicht, sondern verschmelzen sie mit ihrer neuen, eigenen Identität."
 nav_fearless_seamen: "Furchtlose Seemänner"
 nav_fearless_seamen_desc: "Unser Volk hat schon immer mit Ehrfurcht auf das Meer und den Reichtum, das es ihnen bringen kann, geblickt. Unsere tapferen Vorfahren gründeten Gemeinschaften, die nicht nur auf dem Meer, sondern auch von ihm lebten und beeindruckende Fähigkeiten auf dem Wasser entwickelten. Unsere Seeleute sind an der gesamten Atlantikküste bekannt."
 nav_always_ready: "Allzeit bereit"
 nav_always_ready_desc: "Unser kleines Reich wurde inmitten von gewaltigen Gegnern geboren, die uns aus allen Richtungen umzingeln. Dies hat den Charakters unserer Nation und unseren Ansatz, mit der Welt in Kontakt zu treten, tiefgreifend beeinflusst. Wir bleiben stets wachsam und sind allzeit bereit, auf auch nur das geringste Anzeichen einer Bedrohung zu reagieren."
 nav_chartered_councils: "Fueros"
 nav_chartered_councils_desc: "Jedes historische Territorium wird einen von der heimischen Bevölkerung gewählten Rat bilden, der unter der Kontrolle des Herrschers steht und der die Einhaltung ihrer traditionellen Gesetze garantiert, den #italic Fueros#!. Diese untergeordnete Verwaltung wird es uns erlauben, unsere Ländereien effizienter zu verwalten, ohne uns zu sehr in die Interessen der einheimischen Bevölkerung einzumischen."
 nav_people_of_the_sea: "Seevolk"
 nav_people_of_the_sea_desc: "Unser Volk beherrscht das Meer und die ganze Welt weiß es. Unser Wissen ist ein offensichtlicher Vorteil für die vor uns liegenden Seeschlachten."
 nav_basque_ferocity: "$basque$e Wildheit"
 nav_basque_ferocity_desc: "Schon vor der Schlacht von Roncesvalles, um die die Franzosen noch immer weinen, oder den Feldzügen der Navarresischen Kompanie waren unsere Krieger für ihre Wildheit bekannt. Wir werden dies unsere Feinde nie vergessen lassen."
 nav_an_industrious_folk: "Fleißiges Volk"
 nav_an_industrious_folk_desc: "Das Land, in dem wir leben, mag nicht das reichste sein, aber das baskische Volk ist fleißig und arbeitet hart, um das zu erreichen, was es will. Sei es das Schmelzen von Eisen in unseren Eisenwerken, das Umwandeln von Holz zu Holzkohle oder der Bau der besten Schiffe der Welt, unser Reichtum basiert auf den Bemühungen unserer Gemeinschaft."
 nav_mercantile_expansion: "Merkantile Expansion"
 nav_mercantile_expansion_desc: "Seit Jahrhunderten treibt unsere Gesellschaft nicht nur mit unseren Nachbarn, sondern auch mit fernen Ländern Handel. Wir verkaufen ihnen unsere Waren und erhalten im Gegenzug ihre Waren. Unsere Händler konnten dadurch nicht nur ihre Fähigkeiten verfeinern, sondern haben auch Innovationen anderer Nationen in unser Land gebracht."
 nav_navarrese_defense_force: "Navarresischer Verteidigungstrupp"
 nav_navarrese_defense_force_desc: "Unsere Nachbarstaaten sind im Laufe der Zeit immer stärker geworden und stellen zunehmend eine Bedrohung für unser Überleben als Nation dar. Um dem entgegenzuwirken, muss ein Militärzweig gegründet werden, der unsere Truppen mit mehr Soldaten verstärken kann, ohne dass die Qualität der neuen Rekruten darunter leidet."
 nav_shipyards_ironworks: "Werften und Eisenwerke"
 nav_shipyards_ironworks_desc: "Die Tradition des Schiffbaus und der Stahlerzeugung existiert in unserem Land bereits seit Jahrhunderten. In der heutigen Zeit werden jedoch ständig neue Techniken und Methoden entwickelt, wodurch die Notwendigkeit, unsere Verfahren anzupassen, immer offensichtlicher wird. Unsere altertümlichen Praktiken müssen das Moderne nutzen, um wettbewerbsfähig bleiben zu können."
 nav_adept_traders: "Anpassungsfähige Händler"
 nav_adept_traders_desc: "Die Qualität unserer Schiffe, die Fähigkeiten unserer Händler und die Effektivität unserer Prozesse haben unseren Handel extrem lukrativ gemacht. Dies bringt unserer Nation eine Menge Reichtum ein und macht sie stärker."
 nav_the_national_military_academy: "Nationale Militärakademie"
 nav_the_national_military_academy_desc: "Mit der Professionalisierung unserer Armee wird auch die Notwendigkeit eines Ausbildungszentrums für unsere Rekruten immer offensichtlicher. Wir müssen die besten Soldaten in die Geheimnisse der Kriegsführung einweihen und sie an die Spitze unserer Armee stellen."
 nav_royal_basque_society: "Königliche Baskengesellschaft"
 nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, die Königliche Baskengesellschaft der Freunde des Landes, wurde gegründet, um die baskische Wirtschaft, Kultur und Wissenschaft zu fördern. Unser Land wird in den kommenden Jahren stark von ihr profitieren."
 nav_efficient_bureaucracy: "Effiziente Bürokratie"
 nav_efficient_bureaucracy_desc: "Unser Land hat seit seinen Anfängen eine Tradition der Bürokratie aufrechterhalten. Da sich die Zeiten jedoch geändert haben, sind neue Ansätze für die Erledigung alltäglicher Belange erforderlich. Navarra wird für seine innovativen Ideen in diesem Bereich bewundert."
 nav_riflemen_march: "Gewehrschützenmarsch"
 nav_riflemen_march_desc: "Mit der Einführung des Gewehrs in der Armee musste auch die Art und Weise angepasst werden, wie Soldaten im Umgang damit diszipliniert werden konnten. Unsere Befehlshaber haben dafür einen Marsch entwickelt, der die Kompetenz und die Konzentration unserer Soldaten unter Beweis stellt."
 por_battle_ourique: "Schlacht von Ourique"
 por_battle_ourique_desc: "Im Jahr 1139 besiegten unsere zahlenmäßig unterlegenen tapferen Truppen im Alleingang fünf Maurenkönige. Diese Leistung lebt auf ewig in unseren Soldaten weiter und inspiriert sie dazu, sich jedem noch so mächtigen oder bewaffneten Feind zu stellen."
 por_establishment_portuguese_navy: "Gründung der portugiesischen Marine"
 por_establishment_portuguese_navy_desc: "König Dinis legte den Grundstein für die portugiesische Marine, als er den genuesischen Kaufmann Manuel Pessanha (ursprünglich Pessagno) zum Admiral der Flotte ernannte und ihn damit beauftragte, die portugiesischen Küsten vor den muslimischen Piratenüberfällen zu schützen und eine schlagkräftige Handelsflotte aufzubauen."
 por_estimulate_rural_areas: "Förderung ländlicher Gebiete"
 por_estimulate_rural_areas_desc: "Viele Orte in unserem Land, vor allem die ländlichen und abgelegeneren Gebiete, sind entvölkert, was dazu geführt hat, dass Felder brachliegen und Wälder und Bergwerke ungenutzt bleiben. Durch die Reformierung unserer Rechtssysteme werden wir die Menschen dazu ermutigen, den ländlichen Raum zu nutzen und dort zu leben."
 por_pursuing_waves: "Wellenjäger"
 por_pursuing_waves_desc: "Es scheint, dass unser Land einem Großteil unserer Bevölkerung nicht ausreicht. Dieser Teil blickt voller #italic Saudade#!, voller Sehnsucht aufs Meer. An den Häfen und Docks herrscht geschäftiges Treiben und Männer verpflichten sich für den Dienst auf Schiffen, um die Welt zu entdecken."
 por_bombardeiros: "Bombardeiros"
 por_bombardeiros_desc: "Es wurden neue Technologien entwickelt, um Kanonen noch viel stärker zu machen, doch die Schiffsdecks können diese nicht tragen. Durch die Verstärkung dieser Decks wird unsere Marine wegen ihrer Feuerkraft an allen Küsten gefürchtet sein."
 por_feitorias: "Feitorias"
 por_feitorias_desc: "Wir müssen in allen Ecken des östlichen Kontinents #italic Faktoreien#! errichten und dafür sorgen, dass unser Land die vorherrschende Handelsmacht im Indischen Ozean ist. Indem wir ein Netzwerk aus stark befestigten Handelsposten entlang der Küsten Afrikas und Indiens errichten, können wir den lokalen Handel kontrollieren, ohne allzu viele Mittel bereitstellen zu müssen."
 por_ordenancas: "Ordenanças"
 por_ordenancas_desc: "Unsere Armee benötigt eine professionelle Armee, die die heiligen Grenzen unserer glorreichen Nation beschützen kann. Zu diesem Zweck müssen wir unser Einberufungssystem reformieren und bereits den Jüngsten ein Gefühl von Ehre vermitteln."
 por_the_bandeirantes: "Bandeirantes"
 por_the_bandeirantes_desc: "Einige Mitglieder von Expeditionen, die im Landesinneren auf Sklavenraubzüge gingen, stießen Gerüchten zufolge auf Gold, Edelmetalle und Diamanten. Diese Gerüchte haben hartgesottene Seelen dazu ermutigt, in die Kolonien zu ziehen."
 por_colonial_governors: "Kolonialstatthalter"
 por_colonial_governors_desc: "Indem wir die fähigsten Statthalter in die Kolonien entsenden, um in unserem Namen Außenposten zu errichten und das Land zu regieren, werden wir sicherstellen können, dass sie uns treu ergeben sind, während wir die Gewinne einfahren."
 por_royal_absolutism: "Königlicher Absolutismus"
 por_royal_absolutism_desc: "Wir haben schon viel zu lange zugelassen, dass die Macht des Königs durch die törichte Einmischung des Adels, dessen engstirnige lokale Interessen das größere Wohl des Reiches bedrohen, eingeschränkt wurde. Wir werden die Cortes (Abgeordnetenkammer) ignorieren und ohne ihre Einmischung regieren."
 por_royal_military_academy: "Königliche Akademie für Befestigung, Artillerie und Planung"
 por_royal_military_academy_desc: "Unsere Artillerie und unsere Befestigungen waren für die Verteidigung unseres Landes schon immer entscheidend und haben unser kleines Land für feindliche Armeen zu einer harten Nuss gemacht, die es erst zu knacken galt. Indem wir eine Militärakademie — die #italic Academia Real de Fortificação, Artilharia e Desenho#! — gründen, um Offiziere in diesen Bereichen auszubilden, können wir unsere Festungen und unsere Artillerie zur besten der Welt machen."
 por_vinho_porto: "Vinho do Porto"
 por_vinho_porto_desc: "An den Ufern des Flusses Douro im Norden des Landes werden Trauben angebaut, die einen Wein hervorbringen, der später mit Spirituosen angereichert wird, um das zu schaffen, was als #italic Portwein#! bekannt geworden ist. Wir dürfen uns die Gelegenheit nicht entgehen lassen, großen Profit mit der Ausfuhr unseres Weins zu erzielen."
 spa_school_salamanca: "Schule von Salamanca"
 spa_school_salamanca_desc: "Die an der Universität Salamanca angesiedelte Schule befasst sich mit Themengebieten wie Theologie, Wirtschaft und Staatsphilosophie. Als eine der führenden Schulen in der katholischen Welt sorgt sie mit ihrem Sitz in Spanien dafür, dass unser Land auf intellektueller Ebene immer einen Schritt voraus ist."
 spa_viceroyalties: "Spanische Vizekönigreiche"
 spa_viceroyalties_desc: "Jenseits der Ozeane gibt es Land, das nur darauf wartet, von uns beansprucht zu werden. Wir werden dieses Land in Vizekönigreiche aufteilen, die von Vertretern unseres Herrschers regiert werden, um die Ordnung aufrechtzuerhalten und für Stabilität zu sorgen. Alles, damit es zu einem attraktiven Ziel für unser Volk werden kann, um uns eine Präsenz in dem Gebiet zu sichern."
 spa_siglo_de_oro: "Siglo de Oro"
 spa_siglo_de_oro_desc: "Die Kultur unseres Landes ist so lebendig wie noch nie. Indem wir diese Kreativität an den richtigen Stellen kanalisieren und bei Bedarf durch Wohltäter verstärken, werden wir ein Goldenes Jahrhundert der spanischen Kunst einleiten können."
 spa_revival_of_ecclesiastical_discipline: "Wiederherstellung der kirchlichen Ordnung"
 spa_revival_of_ecclesiastical_discipline_desc: "Die Laizität hat sich in unserem Volk ausgebreitet und uns von Gott distanziert. Wir müssen mit den Glaubensoberhäuptern in Kontakt treten und Verträge unterzeichnen, um eine stärkere Bindung zwischen unserer Regierung und der Religion zu fördern, mit dem Ziel, wieder zu einer frommen Nation zu werden."
 spa_naval_reforms: "Spanische Marinereformen"
 spa_naval_reforms_desc: "Unsere Marine wurde viel zu lange vernachlässigt und liegt in Sachen Qualität weit abgeschlagen hinter der unserer Feinde zurück. Nur eine Reform wird uns wieder zu jener Vormachtstellung verhelfen können, die wir verdienen."
 spa_spanish_enlightenment: "Spanische Aufklärung"
 spa_spanish_enlightenment_desc: "Die neuen Ideen unserer modernen Zeit haben auch die klügsten Köpfe Spaniens eingenommen, die ihrerseits Pläne entwickeln, um unsere Nation in der Welt herausstechen zu lassen."
 #Iberian Shared Land
 tercio: "Tercio"
 tercio_desc: "Die Tercio-Infanterie wurde vor allem während der Italienkriege von dem brillanten General Gonzalo Fernández de Córdoba (#italic El Gran Capitán#!) genutzt. Es handelt sich dabei um eine gemischte Infanterieformation aus Pikenieren und Musketieren, die gleichzeitig von der Robustheit der schweren Infanterie und der weitreichenden Feuerkraft der Musketiere profitiert, was sie zu einer idealen Verteidigungs- und Angriffsformation macht."
 #Iberian Shared Naval
 catalan_galley: "Katalanische Galeere"
 catalan_galley_desc: "Die $n_catalan_galley$ ist die natürliche Weiterentwicklung der antiken griechischen Galeeren. Sie ist weitaus größer als alle zuvor im Mittelmeer dokumentierten Schiffe ähnlicher Bauweise."
 early_iberian_caravel: "Frühe iberische Karavellen"
 early_iberian_caravel_desc: "Die ersten Karavellen stammten ursprünglich von der Iberischen Halbinsel und waren kleine, aber sehr schnelle Schiffe, die für die Hochseefischerei und den Küstenhandel eingesetzt wurden. Ihre Verwendung auf der Iberischen Halbinsel ist so weit verbreitet, dass dort auch die fortschrittlichsten Karavellen dieser Zeit gefunden werden konnten."
 iberian_caravel: "Iberische Karavelle"
 iberian_caravel_desc: "Da der Bedarf an schnelleren und zuverlässigeren Karavellen immer größer wurde, haben iberische Häfen damit begonnen, größere Karavellen zu entwerfen. Die Karavelle wird zwar in ganz Europa eingesetzt, doch die iberischen Karavellen stachen in Bezug auf Innovation und Schnelligkeit heraus."
 early_iberian_galleon: "Frühe iberische Galeone"
 early_iberian_galleon_desc: "Die $n_early_iberian_galleon$ war eines der ersten Hochseeschiffe, das auf der Halbinsel gebaut wurde. Sie hat ein niedriges Vordeck und einen langen Rumpf, was sie besonders stabil und widerstandsfähig für Gegenwind macht."
 square_rigged_caravel: "Quersegelkaravelle"
 square_rigged_caravel_desc: "Durch die Kombination der iberischen Karavelle mit der $n_carrack$ wurde ein Schiff erschaffen: schnell, stark und genau das, was wir brauchen, um das Meer zu beherrschen."
 iberian_galleon: "Iberische Galeone"
 iberian_galleon_desc: "Die iberische Galeone ist die natürliche Weiterentwicklung der frühen iberischen Galeone. Sie ist stark stilisiert und ein ungeheuer mächtiges Schiff, das all seine Feinde auf dem Meer besiegen kann."
 #Iberian Unique
 ara_almogavars: "$a_almogavars$"
 ara_almogavars_desc: "$a_almogavars_desc$"
 ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"
 ara_late_almogavars: "$a_late_almogavars$"
 ara_late_almogavars_desc: "$a_late_almogavars_desc$"
 cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"
 por_cacadores: "Caçadores"
 por_cacadores_desc: "Die Caçadores, die den Spitznamen „#italic Kampfhühner#!“ tragen, sind eine Infanterieeinheit der portugiesischen Armee. Sie tragen braune Uniformen, um leichter von den regulären Soldaten unterschieden werden zu können."
 #Denmark
 dan_levy_recruitment: "Verlass auf Aufgebote"
 dan_levy_recruitment_desc: "Da unser unmittelbarer Herrschaftsbereich auf der Halbinsel Jütland und den umgebenden Inseln liegt, müssen wir uns darauf verlassen können, dass wir unsere Aufgebote schnell ausheben können, um unser Land gegen ausländische Angriffe zu verteidigen."
 dan_old_naval_traditions: "Dänisches Seenetzwerk"
 dan_old_naval_traditions_desc: "Unser ganzes Land ist entweder von der Ost- oder der Nordsee umgeben. Dies verschafft uns den einzigartigen Vorteil, dass wir die Wasserstraßen als Transport- und Kommunikationswege nutzen können, was die Entfernungen zwischen den Regionen unseres Landes erheblich verkürzt."
 dan_rulers_of_the_north: "Wahre Herrscher des Nordens"
 dan_rulers_of_the_north_desc: "Die dänischen Herrscher beanspruchen seit Jahrhunderten die Vorherrschaft über die nordischen Regionen. Indem wir das Erbe von Königen wie Knut „dem Großen“ annehmen und verfeinern, erhalten wir Legitimität nach innen wie außen."
 dan_reliance_mercenaries: "Verlass auf Söldner"
 dan_reliance_mercenaries_desc: "Dänemark kann sich nicht auf seine große Bevölkerung verlassen, um die Reihen der Armeen zu füllen, die unser Land auf der Weltbühne benötigt. Wir müssen auch dafür sorgen, dass Söldnerkompanien bereit sind, unserem Staat zu dienen, und ihre Treue durch feste Verträge sicherstellen."
 dan_rentekammer_advance: "Rentekammeret"
 dan_rentekammer_advance_desc: "Indem wir eine gesonderte Institution, die #italic Rentekammeret#! schaffen, die sich um alle finanziellen Belange kümmert, haben wir nicht nur größere Kontrolle über unsere finanziellen Mittel, wir ermöglichen damit auch unserer Regierung, sich um wichtigere Dinge kümmern. Durch die ordnungsgemäße Dokumentierung all unserer Finanzen werden wir in der Lage sein, künftigen Ausgaben besser abschätzen zu können, was die Währung stabilisiert."
 dan_royal_danish_navy: "Dänische Staatsmarine"
 dan_royal_danish_navy_desc: "Unser Land ist von Wasser umgeben und kann von einem Land mit einer stärkeren Flotte daher leicht kontrolliert werden. Um dies zu verhindern, sollten wir in die Marine investieren und eine Flotte aufbauen, die in der Lage ist, unsere Küste zu schützen und unsere Macht über Nordeuropa zu projizieren."
 dan_danish_orthodoxy: "Religiöse Heterogenität"
 dan_danish_orthodoxy_desc: "Die religiöse Landschaft Europas befindet sich im Chaos. Wir müssen den richtigen Weg für Dänemark einschlagen und der Kirche treu bleiben."
 dan_expanded_dockyards: "Orlogsværftet"
 dan_expanded_dockyards_desc: "Der Schiffbau hat eine lange Tradition in unserem Land, doch unsere erfahrenen Schiffbauer brauchen einen geeigneten Ort, um jene Schiffe zu bauen, die es verdienen, Dänemark zu repräsentieren. Die Gewässer um Kopenhagen sind bestens dazu geeignet, eine solche Werft zu bauen."
 dan_danish_legislation: "Dänische Gesetzgebung"
 dan_danish_legislation_desc: "Die regionalen Gesetze von Jütland, Seeland und Schonen haben unserem Land viele Jahrhunderte als Basis für die Landesgesetze gedient. Wir sollten diese Gesetze kodifizieren und sie im dänischen Recht, dem #italic Danske Lov#!, zum Nutzen aller festhalten."
 dan_danish_agriculture: "Schwerpunkt Landwirtschaft"
 dan_danish_agriculture_desc: "Dänemark besitzt zwar kaum Rohstoffe, aber dafür umso mehr Ackerland. Wir sollten dieses Land bewirtschaften, um selbst bei Hungersnöten immer ausreichend Nahrung zu haben."
 dan_royal_life_guards: "Königliche Leibgarde"
 dan_royal_life_guards_desc: "Die Königliche Leibgarde ist die Eliteeinheit der dänischen Armee. Sie dient zugleich als persönliche Leibgarde des Königs wie auch als zeremonielle Truppe bei Regierungsveranstaltungen."
 dan_scanian_regiment: "Schonenregiment"
 dan_scanian_regiment_desc: "Das Schonenregiment ist eine Militäreinheit, die aus Bauern besteht, um die Abhängigkeit von Söldnerheeren zu verringern und ein stehendes Heer unter der Autorität des Königs aufzubauen."
 dan_admiralty_college: "Admiralitätskolleg"
 dan_admiralty_college_desc: "Durch die Schaffung einer zentralen Institution, die sich um alle Ausbildungsbelange unserer Marine kümmert, werden wir in der Lage sein, fähige Admiräle hervorzubringen, die mit den Gewässern rund um unsere Küste vertraut sind. Sie werden unsere Gewässer schützen und die Souveränität Dänemarks gewährleisten."
 dan_trading_economy: "Maritimes Land"
 dan_trading_economy_desc: "Unsere Wirtschaft wird nicht alles selbst produzieren können, was wir benötigen. Wir müssen uns auf unser stabiles Handelsnetz verlassen können, um unsere eigenen Waren auszuführen und alles, was wir nicht selbst produzieren können, einzuführen."
 #Balkans Advances
 #Albanian Shared
 albanian_the_kanun: "Kanun"
 albanian_the_kanun_desc: "Mangels einer zentralen Krone wird unsere Gesellschaftsordnung durch den #italic Kanun#!, ein ausgefeiltes Gewohnheitsrecht, aufrechterhalten. Dieses Rechtssystem regelt alles von Eigentumsrechten bis hin zur heiligen Pflicht des #italic Besa#! (dem Eidschwur). Der #italic Kanun#! bildet ein Fundament der Stabilität und der Ehre, das fremde Machthaber niemals ganz zerstören können."
 albanian_prokletije: "Bjeshkët e Namuna"
 albanian_prokletije_desc: "Die Verwunschenen Berge, die sich im Herzen unseres Landes erheben, sind ebenso sehr Teil unseres Volkes wie der #italic Kanun#!. Selbst der ärmste Dorfbewohner weiß, welche Pässe im Winter passierbar sind, welche Bergrücken Schutz vor Hinterhalten bieten und welche Täler ins Nichts führen. Eindringlinge, die in diese Berge marschieren, verlaufen sich in diesem Labyrinth, lange bevor sie auf unsere Krieger treffen."
 albanian_the_stradioti_tradition: "Stradioten-Tradition"
 albanian_the_stradioti_tradition_desc: "Die Kargheit unserer Berge formte unsere Männer zur besten leichten Kavallerie der Christenheit. Diese Stradioten sind bei allen Großmächten von Venedig bis Frankreich wegen ihrer unvergleichlichen Fähigkeiten im Scharmützel und in der Aufklärung begehrt. Indem wir unsere Kampfkraft exportieren, bringen wir Reichtum zurück in unsere Berge und stellen sicher, dass unsere Soldaten die erfahrensten in Europa sind."
 albanian_the_sacred_oath: "Heiliger Eid"
 albanian_the_sacred_oath_desc: "Das Konzept der #italic Besa#! entwickelte sich zu einer nationalen Institution des Vertrauens und der Gastfreundschaft. Das Wort eines Albaners gilt, und dieser Ruf unerschütterlicher Treue macht uns zu den vertrauenswürdigsten Wachen und Söldnern im Mittelmeerraum. In einer Welt wechselnder Bündnisse ist unser Wort unser kostbarstes Gut."
 albanian_the_transhumance_networks: "Wanderweidennetzwerk"
 albanian_the_transhumance_networks_desc: "Wanderweidewirtschaft erlaubt es unserem Volk, sowohl die Hochsommerweiden als auch die warmen Winterebenen der Küste zu nutzen. Diese bewegliche Lebensart macht es schwierig, unsere Bevölkerung festzunageln, und bietet eine robuste Nahrungsversorgung, die sich nicht so leicht durch Taktiken der verbrannten Erde gefährden lässt. Unser Reichtum hat vier Beine und kann immer auf sicheren Grund verlegt werden."
 albanian_the_fortified_kulla_houses: "Befestigte Kulla-Häuser"
 albanian_the_fortified_kulla_houses_desc: "Überall auf dem Land errichten Adelige und wohlhabende Bauern #italic Kulla#!: befestigte Steinturmhäuser. Diese Bauwerke dienen als Miniaturzitadellen und schützen Familien vor Blutfehden und feindlichen Überfällen. Sie sind das Symbol einer Gesellschaft, die dauerhaft zur Verteidigung mobilisiert ist."
 albanian_the_albanian_alphabet_commission: "Kommission zum albanischen Alphabet"
 albanian_the_albanian_alphabet_commission_desc: "Gelehrte und Patrioten arbeiten unermüdlich an der Standardisierung der albanischen Sprache mithilfe eines einheitlichen lateinischen Alphabets. Durch die Einrichtung nationaler Schulen und die Herausgabe von Zeitungen in der Landessprache brechen wir die kulturelle Hegemonie fremder Sprachen. Die Alphabetisierung in Albanisch ist der erste Schritt zu wahrer Unabhängigkeit."
 #Albanian Unique
 alb_the_arberian_principality: "Fürstentum von Arbër"
 alb_the_arberian_principality_desc: "Mit dem Schwinden der Macht unserer Feinde vereinten sich unsere großen Häuser, um das Überleben unserer Nation zu sichern. Indem wir unsere Lage zwischen dem katholischen Westen und dem orthodoxen Osten nutzten, wurden wir zu Meistern der Diplomatie zur See und des Küstenhandels. Diese strategische Autonomie ermöglicht es uns, uns die Rivalitäten unserer Nachbarn zum Vorteil gereichen zu lassen."
 alb_angevin_legitimacy: "Angevinische Legitimität"
 alb_angevin_legitimacy_desc: "Unsere jüngsten gekrönten Häupter lassen sich direkt auf das Haus der Kapetinger von Anjou zurückführen, das von Karl I. von Neapel eigens als Tor zum byzantinischen Kernland gegründet worden war. Diese Bande verleihen uns unter den zersplitterten Balkanfürsten ein einzigartiges westliches Prestige und ermöglichen es uns, einen Platz am Tisch der großen katholischen Monarchen Europas zu beanspruchen. Wenn wir die Ehre und die Heraldik der Lilie hochhalten, heben wir unsere eigene Souveränität von der bloßer Stammesführer ab."
 ant_born_in_the_highlands: "Geboren in den Hochebenen"
 ant_born_in_the_highlands_desc: "Unsere angestammte Heimat im Hochland unserer Nation ist eine natürliche Festung aus schroffen Gipfeln und engen Schluchten, die für eine herkömmliche Armee kaum zu überwinden ist. Wir haben jeden strategischen Pass und jeden Berggipfel zusätzlich befestigt, um sicherzustellen, dass eindringende Feinde für jeden Zentimeter unseres Territoriums einen hohen Blutzoll entrichten müssen."
 mtr_the_masters_of_the_karavasta: "Herren der Karavasta"
 mtr_the_masters_of_the_karavasta_desc: "Unser Gebiet wird von der labyrinthartigen Lagune von Karavasta geschützt, durch deren Wattflächen und verborgenen Kanäle unser Volk sich meisterlich bewegt. Diese Wasserlandschaft dient als natürliche Festung, die für schwere fremde Armeen nahezu unmöglich zu kartieren oder zu erobern ist und eine Zuflucht bietet, die sich für angreifende Kavallerie als vollkommen unzugänglich darstellt."
 mzk_the_agricultural_wealth_of_the_devoll: "Landwirtschaftlicher Reichtum des Devoll"
 mzk_the_agricultural_wealth_of_the_devoll_desc: "Das fruchtbare Tal unseres Kernlandes ermöglicht es uns, durch fortschrittliche Bewässerung einen prunkvollen Hofstaat und eine hochqualifizierte Kavallerie zu finanzieren. Dieser landwirtschaftliche Überschuss bildet das wirtschaftliche Fundament unseres politischen Strebens und erlaubt es uns, ein größeres Gefolge an Fachleuten zu unterhalten als unsere Rivalen."
 thp_french_blood_claims: "Ansprüche auf französisches Blut"
 thp_french_blood_claims_desc: "Wir berufen uns auf eine angesehene, wenn auch umstrittene Abstammung vom französischen Königshaus, die unseren Diplomaten eine besondere Stellung an den europäischen Höfen verleiht. Diese vermeintlich edle Herkunft ermöglicht es uns, auf Augenhöhe mit den italienischen Stadtstaaten und dem Papsttum zu verhandeln und Bündnisse zu sichern, die gewöhnlichen Balkan-Kriegsherren verwehrt blieben."
 alb_eastern_and_western_heritage: "Östliches und westliches Erbe"
 alb_eastern_and_western_heritage_desc: "Unsere städtischen Zentren arbeiten zugleich nach den ausgefeilten Prinzipien des byzantinischen Rechts sowie den modernen bürokratischen Strukturen des Westens. Diese Rechtskontinuität schafft einen stabilen Rahmen für Verträge, Eigentumsrechte und Erbschaftsfragen und zieht fremdländische Händler und Gelehrte an unsere Höfe. Ein verlässliches Rechtssystem ist die Grundlage unserer wachsenden Verwaltungsstärke."
 alb_the_national_arsenal: "Nationalarsenal"
 alb_the_national_arsenal_desc: "Als wichtigster Hafen für westliche Interventionen modernisierten wir die Werften von Durrës, um eine ständige Flotte von Galeeren zu unterhalten. Diese Infrastruktur ermöglicht es uns, Macht auf die Adria zu projizieren und sicherzustellen, dass die Seewege zwischen Neapel und Albanien für Verstärkungen und Handel offen bleiben. Unsere Kontrolle über den Hafen macht uns zu den unbestrittenen Herren der westlichen Balkanküste."
 ant_the_iron_mines_of_the_interior: "Eisenminen im Inland"
 ant_the_iron_mines_of_the_interior_desc: "Die von uns kontrollierten zerklüfteten Berge Zentralalbaniens sind reich an hochwertigem Eisenerz, das für die Herstellung von Kriegswerkzeug unerlässlich ist. Wir errichteten staatlich geförderte Schmelzhütten, um unsere Clans stetig mit überlegenen Stahlklingen und Plattenrüstungen zu versorgen. So stellen wir sicher, dass wir bei der Ausrüstung unserer wachsenden Armeen niemals auf Einfuhren angewiesen sind."
 mtr_lagoon_fisheries: "Lagunenfischerei"
 mtr_lagoon_fisheries_desc: "Der Reichtum an Tieren in unseren Küstengewässern sichert eine stabile Nahrungsmittelversorgung, die uns auch in Zeiten regionaler Hungersnöte eine größere stehende Miliz ermöglicht. Wenn wir das Monopol für die Nutzung der Lagunen bewahren, halten wir unserer Bevölkerung gesund, füllen die Nahrungsspeicher und sichern so das Überleben unseres Staates."
 mzk_the_despots_of_berat: "Despoten von Berat"
 mzk_the_despots_of_berat_desc: "Die Burg von Berat, der „Stadt der tausend Fenster“, verkörpert den Höhepunkt albanischer Stadtarchitektur und byzantinischer Verwaltungskunst – und von dort aus herrschen wir. Unser Hof zieht Gelehrte und Handwerker an und macht unsere Hauptstadt zu einem kulturellen Zentrum, das den großen Städten des Ostens in nichts nachsteht."
 thp_the_lion_of_thopia: "Löwe der Thopia"
 thp_the_lion_of_thopia_desc: "Unser Haus erlangte seine Vormachtstellung durch ein geschicktes Ausnutzen von Clansstreitigkeiten, was die Familie Thopia zur Hüterin der albanischen Souveränität machte. Durch ein komplexes Netz von Bündnissen sichern wir uns das erste wahre #italic Princeps Albaniae#!, das von Ost und West gleichermaßen anerkannt wird. Unter dem Löwen unseres Wappens, das über den Mauern unserer Küsten weht, bauten wir eine professionalisierte Verwaltung auf, die den primitiven Feudalismus unserer Rivalen übertrifft und sicherstellt, dass unser Haus die Vorherrschaft an der Adriaküste behält."
 alb_the_champion_of_christ: "Vorkämpfer Christi"
 alb_the_champion_of_christ_desc: "Obwohl unsere Gemeinden in Glaubensfragen gespalten sind, ist unsere Nation dennoch Christus ergeben, was uns den Beinamen #italic Athleta Christi#! einbrachte. Unser unerschütterlicher Glaube weckte die Aufmerksamkeit des Papsttums und der Patriarchen und sicherte uns finanzielle Unterstützung und Freiwillige fürs Militär. Wir kämpfen nicht nur für unser Land, sondern für das Überleben des Wortes Christi."
 alb_the_catholic_bulwark: "Bollwerk des Katholizismus"
 alb_the_catholic_bulwark_desc: "Als östlichster Außenposten der römisch-katholischen Kirche sind wir zum wichtigsten Schutzwall gegen orthodoxe Schismatiker und türkische Heiden geworden. Diese heilige Pflicht schenkt uns einen inneren Frieden, der das gesamte Reich durchdringt und unser Ringen in einen Kreuzzug für unsere Seele verwandelt."
 ant_arianitis_defiance: "Arianitis Trotz"
 ant_arianitis_defiance_desc: "Dem heldenhaften Beispiel unserer Anführer folgend ist unser Haus dafür bekannt, sich als erstes zu erheben und angesichts des Feindes als letztes zu kapitulieren. Dieses Vermächtnis eines unnachgiebigen Widerstands machte unser Volk zu einer Nation von Kriegern, die den Kampf als heilige Pflicht und nicht als Bürde begreifen."
 mtr_marshland_guerillas: "Sumpfland-Partisanen"
 mtr_marshland_guerillas_desc: "Unsere Truppen werden gezielt dafür ausgebildet, feindliche Einheiten tief in die Sümpfe zu locken, wo ihnen ihre Rüstung zum Nachteil gereicht. In diesem Gelände ist unsere leichte Infanterie ohne Rüstungen dank ihrer Hinterhaltstaktiken übermächtig und macht das Land selbst zur Waffe. Unsere Fähigkeit, uns an jedes Gelände anzupassen und selbst unter widrigsten Bedingungen rasch voranzukommen, macht uns zu einem gefährlichen Gegner."
 mzk_the_muzaka_chronicle: "Muzaka-Chronik"
 mzk_the_muzaka_chronicle_desc: "Unsere Familie macht akribisch und umfassend Aufzeichnungen unserer Geschichte und unserer Gebietsansprüche, um sicherzustellen, dass unsere alten Ansprüche niemals in Vergessenheit geraten. Diese literarische Tradition bewahrt unsere hohen byzantinischen Titel und beeindruckt örtliche Rivalen mit unserer kaiserlichen Würde und historischen Tiefe."
 thp_a_centralized_levy_system: "Zentralisiertes Lehnssystem"
 thp_a_centralized_levy_system_desc: "Wir entwickelten lose Clansverbünde zu einer halbberuflichen Infanterie weiter, die auf unserer zentralen Stadtachse stationiert ist. Diese Modernisierung ermöglicht es uns, auf Bedrohungen mit einer Geschwindigkeit und Disziplin zu antworten, die traditionelle Stammesaufgebote nicht erreichen können."
 alb_the_arbereshe_diaspora: "Die Arbëreshë-Diaspora"
 alb_the_arbereshe_diaspora_desc: "Im Lauf der Zeit wanderte ein Großteil unseres Volkes ins Ausland aus und gründete dort #italic Arbëreshë#!-Gemeinschaften. Diese „Albaner jenseits des Meeres“ bewahren unsere Sprache und Traditionen und gewinnen gleichzeitig an Einfluss in ihrer neuen Heimat. Sie dienen dort als ständige diplomatische Vertreter und setzen sich unermüdlich für die Unterstützung des Heimatlandes ein."
 alb_diplomacy_of_the_two_shores: "Diplomatie der zwei Ufer"
 alb_diplomacy_of_the_two_shores_desc: "Unsere Lage ermöglicht es uns, als unverzichtbare Brücke zwischen den italienischen Stadtstaaten und dem rauen Inland des Balkans zu dienen. Unsere Diplomaten sind darin geschult, sich sowohl im venezianischen Senat als auch in den Stammesräten zurechtzufinden, was unsere Vermittlung in Handels- und Kriegsangelegenheiten unerlässlich macht."
 ant_patronage_of_the_faith: "Gönnerschaft des Glaubens"
 ant_patronage_of_the_faith_desc: "Durch die großzügige Vergabe von Land und finanziellen Mitteln an unsere Klöster sichern wir die spirituelle Treue des Adels und der Bauernschaft. Diese heiligen Stätten bilden das kulturelle Herzstück unseres Fürstentums, wo man unsere Siege feiert."
 mtr_the_trade_monopolies: "Handelsmonopole"
 mtr_the_trade_monopolies_desc: "Durch die Kontrolle der Flussmündungen und Küsten lenken wir erfolgreich den Strom von Bauholz und Korn aus dem Inland zu den venezianischen Galeere. So errangen wir eine Stellung als unersetzliche Mittelsmänner des Adriahandels und sorgen dafür, dass kein Händler unseren Zöllen entgeht."
 mzk_silk_road_waystations: "Seidenstraßenwegstationen"
 mzk_silk_road_waystations_desc: "Unser Land liegt an den wichtigsten Handelsrouten aus dem Landesinneren: Durch die Besteuerung der Seidenkarawanen verfügen wir über eine gut gefüllte und reiche Staatskasse. Diese Einnahmen ermöglichen es uns, die besten Kalligrafen und Ikonenmaler zu fördern und unser Gebiet zur kulturellen Hauptstadt Südalbaniens zu machen."
 thp_mecenas_of_the_arts: "Mäzen der Künste"
 thp_mecenas_of_the_arts_desc: "Wir finanzierten den Bau prächtiger Kathedralen und Festungsanlagen, die gotische und byzantinische Stilelemente miteinander verbinden und unseren Reichtum und unsere Frömmigkeit zur Schau zu stellen. Diese architektonische Pracht dient dazu, unsere Herrschaft in den Augen der Kirche und unserer Untertanen zu legitimieren und unsere Städte zu Symbolen der Beständigkeit zu machen."
 alb_the_albanian_merchant_class: "Albanische Händlerschicht"
 alb_the_albanian_merchant_class_desc: "Die Kaufleute unserer Küste sind zu den wichtigsten Handelsträgern zwischen dem Balkan und dem Westen geworden. Indem sie Griechisch für den Handel und Albanisch für die Treue nutzen, beherrschen sie die Märkte von Venedig bis Konstantinopel. Ihre Handelsschiffe sind das Lebenselixier unserer sich modernisierenden Wirtschaft."
 alb_the_expansion_of_the_regnum: "Ausweitung des Regnums"
 alb_the_expansion_of_the_regnum_desc: "Wir werden nicht ruhen, bis die Grenzen des alten Königreichs in ihrer vollen Ausdehnung wiederhergestellt sind und wir unseren Platz als Herren des Balkans zurückerobert haben. Dieses Streben nach Zentralisierung ermöglicht es uns, neu eroberte Gebiete mit minimalen Reibungsverlusten einzugliedern und so die rechtmäßige Herrschaft wiederherzustellen."
 ant_the_eternal_resistance: "Ewiger Widerstand"
 ant_the_eternal_resistance_desc: "Wir leisteten einen ewigen Eid: Solange wir atmen, schlägt das Herz des Widerstands weiter. Unsere Truppen wurden zu fanatischer Treue gegenüber dem Herrscherhaus ausgebildet, sodass sie selbst angesichts der erdrückenden Übermacht des Kaiserrichs diszipliniert bleiben."
 mtr_reclamation_engineering: "Urbarmachungsbau"
 mtr_reclamation_engineering_desc: "Wir haben damit begonnen, Teile der Myzeqe-Sümpfe trockenzulegen, um fruchtbareres Ackerland zu erschließen. Diese Meisterleistung der Baukunst erweitert nicht nur unsere Steuergrundlage, sondern ermöglicht uns auch den Bau fester Straßen durch das ehemals unpassierbare Moor."
 mzk_literary_patronage: "Literarisches Gönnertum"
 mzk_literary_patronage_desc: "Wir bauten unsere Hauptstadt zu einem Kulturzentrum aus und bewahren so die Weisheit des Ostens und des Westens für künftige Generationen. Dieses intellektuelle Ansehen macht unseren Hof zum Anziehungspunkt für die klügsten Köpfe der orthodoxen und lateinischen Welt gleichermaßen."
 thp_princeps_albaniae: "Princeps Albaniae"
 thp_princeps_albaniae_desc: "Unser Name wurde zum Synonym für den Staat selbst und ermöglicht es uns, verschiedene ethnische Gruppen unter einem gemeinsamen Dach zu vereinen. Indem wir die talentiertesten Menschen unabhängig von ihrer Herkunft fördern, schufen wir eine meritokratische Bürokratie, die unsere feudal geprägten Rivalen in den Schatten stellt."
 alb_the_spirit_of_the_rilindja: "Geist der Rilindja"
 alb_the_spirit_of_the_rilindja_desc: "Unsere „Nationale Wiedergeburt“ oder #italic Rilindja#! entfachte in den Herzen der Albaner allerorten ein Feuer: von den Bergen im Norden bis zur Diaspora in Italien und Ägypten. Diese kulturelle und politische Bewegung vereint alle Albaner unter dem gemeinsamen Banner des „Albanertums“. Wir sind eine wiedergeborene Nation und bereit, unseren Platz unter den unabhängigen Staaten Europas einzunehmen."
 alb_enlightened_albanian_absolutism: "Aufgeklärter albanischer Absolutismus"
 alb_enlightened_albanian_absolutism_desc: "Dem Vorbild der laufenden Entwicklung in Europa folgend zentralisierten unsere Monarchen die Macht und beraubten die alten Clans ihrer feudalen Privilegien, um einen modernen Staat zu schaffen. Dieser Schritt ermöglichte uns die Einführung einer allgemeinen Besteuerung und eines nationalen Justizsystems, was das Königreich in eine gut geölte Kriegsmaschinerie verwandelt."
 ant_the_professional_highland_grenadiers: "Stehende Hochlandgrenadiere"
 ant_the_professional_highland_grenadiers_desc: "Aus unseren traditionellen Plänklern machten wir Eliteeinheiten von Gebirgsgrenadieren, die auf schwere Anstürme und Belagerungskriegsführung spezialisiert sind. Diese Truppen vereinen ihre ureigene Beweglichkeit im Gebirge mit der verheerenden Feuerkraft moderner Sprengstoffe und sind somit der Schrecken jeder Festungsgarnison."
 mtr_the_mataranga_port_authority: "Hafenverwaltung von Mataranga"
 mtr_the_mataranga_port_authority_desc: "Wir führten alle Küstenhäfen unter einer einzigen Verwaltungsbehörde zusammen und vereinfachten so die Erhebung von Gebühren und Zöllen. Diese Zentralisierung macht uns zu den effizientesten Handelsverwaltern an der Adria und zieht fremdländische Investitionen an."
 mzk_the_muzakan_industrialization: "Muzaka-Industrialisierung"
 mzk_the_muzakan_industrialization_desc: "Wir führten in unseren fruchtbarsten Tälern den großflächigen Anbau von Marktfrüchten ein und begründeten damit eine neue heimische Industrie. Durch die Verarbeitung unserer eigenen Rohstoffe zu hochwertigen Erzeugnissen schufen wir eine industrielle Grundlage, die eine wohlhabende und treue städtische Bevölkerung ernährt."
 thp_the_thopia_merchant_marine: "Thopia-Handelsmarine"
 thp_the_thopia_merchant_marine_desc: "Indem wir allen Handelsschiffen unter der Flagge der Thopia staatlichen Schutz gewähren, bauten wir unseren wirtschaftlichen Einfluss stark aus. Diese Sicherheit auf See machte unsere Häfen zu den bevorzugten Umschlagplätzen des Levantehandels und entzieht unseren Rivalen, deren Häfen verfallen, wertvolle Ressourcen."
 #Bosnian Shared
 bos_cultural_customs: "Bosnische Bräuche"
 bos_cultural_customs_desc: "Unser Volk pflegt viele einzigartige Bräuche, die nicht auf unterschiedliche Glaubensrichtungen zurückzuführen sind. Die Errichtung von #italic Stećci#!, kunstvoll verzierten Grabsteinen, zeichnet unser Gebiet als einzigartig bosnisch aus."
 bos_katun_communities: "Walachen-Katune"
 bos_katun_communities_desc: "Teile unserer Bevölkerung sind in selbstverwalteten Hirtengemeinschaften organisiert. Anstatt sie dem Willen einer Zentralregierung zu unterwerfen, sollten wir mit ihnen zusammenarbeiten und versuchen, mehr Ressourcen in unseren abgelegenen Gebieten zu gewinnen."
 bos_defiant_terrain: "Widerspenstiges Gelände"
 bos_defiant_terrain_desc: "Das bosnische Land besteht aus bewaldeten Hügeln und Bergen, die von Flusstälern durchzogen sind. Dieses Gelände eignet sich von Natur aus dazu, eine einfallende Armee aufzuhalten und zu ermüden, und wir sollten dies zu unserem Vorteil nutzen. Indem wir unseren Feind nur dann angreifen, wenn es uns nützt, und das ungastliche Gelände selbst sowohl seine Vorräte als auch seine Truppen vernichten lassen, bewahren wir unsere Stärke."
 bosnian_bosancica: "Bosančica"
 bosnian_bosancica_desc: "Das bosnische Volk einte sich um die #italic Bosančica#!: eine einzigartige kyrillische Schreibschrift, die man für alles von diplomatischen Verträgen bis hin zu privaten Geschäftsbüchern nutzt. Diese Nationalschrift dient als mächtige kulturelle Torhüterin: Sie ist für Fremde schwer zu lesen, doch unter den gebildeten Bosniern unabhängig von ihrer Konfession allgemein verbreitet. Durch die Bewahrung dieser unverwechselbaren Schrift stellt das Volk sicher, dass seine Rechts- und Geschichtsaufzeichnungen für die kaiserlichen Verwalter ein Buch mit sieben Siegeln bleiben und die geheimen Feinheiten des bosnischen Eigentumsrechts und der Abstammungslehre in einer Form bewahrt werden, die ihr einzigartiges slawisches Erbe stärkt."
 bosnian_people_from_the_hills: "Hügelbewohner"
 bosnian_people_from_the_hills_desc: "Das bosnische Kernland gleicht einem Labyrinth aus Kalksteinrücken und -tälern, das sich herkömmlichen Kartierungsmethoden entzieht. Unser Volk passte sich an dieses Denken an und meisterte die Geheimnisse der unterirdischen Höhlensysteme ebenso wie die Logistik von Maultierkarawanen."
 bosnian_susjedsvto_of_bosnia: "Susjedstvo von Bosnien"
 bosnian_susjedsvto_of_bosnia_desc: "Die uralte kulturelle Vorstellung der #italic Susjedstvo#! – der heiligen gesellschaftlichen Verpflichtung, den Nachbarn zu schützen und zu ehren – entwickelte sich zu einer ausgefeilten staatsbürgerlichen Philosophie, die religiöse Grenzen überwindet. Angesichts äußeren Drucks gebietet dieser ungeschriebene Kodex, dass die Sicherheit und das Eigentum des Nachbarn ebenso heilig sind wie die eigene Sicherheit und das eigene Eigentum. Diese Praktik unterbindet jene Taktiken nach dem Prinzip „Teile und-herrsche!“, die fremde Mächte oft anwenden, um innere Zwiste zu schüren. Wenn wir der Solidarität vor Ort und dem „Gesetz der Nachbarschaft“ oberste Priorität einräumen, bewahren wir ein Maß an gesellschaftlicher Harmonie und innerer Stabilität, durch das die Nation eine geschlossene und unzerstörbare Front gegen alle Versuche bildet, unser gemeinsames Vaterland zu vernichten."
 #Bosnian Unique
 bos_land_of_many_churches: "Vielzahl bosnischer Kirchen"
 bos_land_of_many_churches_desc: "In Bosnien gibt es mehrere Kirchen. Unser Land wird nicht nur von der orthodoxen und der katholischen Kirche geteilt, sondern ist auch die Heimat des Krstjani: des bosnischen Christentums. Da wir von einer zentralen Aufsicht abgeschnitten sind, müssen wir ein Verständnis vor Ort sowie Eintracht zwischen den verschiedenen Gruppen fördern, um unsere Stabilität zu gewährleisten."
 bos_influence_of_the_stanak: "Stanak-Versammlungen"
 bos_influence_of_the_stanak_desc: "Unser Adel kommt regelmäßig zusammen, um die drängendsten Fragen unseres Landes zu erörtern. Diese Treffen stellen sicher, dass unsere hohen Herren in ihrer Politik mit einer Stimme sprechen und in unseren Parlamentssitzungen Einigkeit zeigen."
 bos_kingly_ambitions: "Königliches Streben"
 bos_kingly_ambitions_desc: "Die Errungenschaften und die Arbeit unseres Volkes verdienen Anerkennung und Schutz. Daher müssen wir enge Beziehungen zu anderen umliegenden Herrschern pflegen und uns ihre Anerkennung sichern, um so selbst einen prestigeträchtigen Titel zu erringen."
 bos_the_srebrenica_mint_office: "Srebrenica-Münzprägeanstalt"
 bos_the_srebrenica_mint_office_desc: "Da die Minen von $srebrenica$ zur wichtigsten Edelmetallquelle auf dem Balkan geworden sind, ließ das Reich die bloße Ausfuhr von Roherz hinter sich. Wir richteten eine königliche Münzprägeanstalt und ein Prüfamt ein, um die Reinheit des bosnischen Silbers zu regeln und Münzen zu prägen, die in ihrer Verlässlichkeit mit denen Venedigs mithalten können. Wir sichern uns einen erheblichen Anteil der Wertschöpfung durch die Vorschrift, das alles von den Bergleuten aus Ragusa und Sachsen geförderte Silber in staatlich kontrollierten Raffinerien verarbeitet werden muss.Durch diesen verfügbaren Wohlstand machen wir Bosnien zur finanzstärksten Macht im Dinarischen Gebirge."
 bos_bosnian_ljekaruse: "Bosnische Ljekaruše"
 bos_bosnian_ljekaruse_desc: "In den abgeschiedenen Tälern unseres Landes trugen die Mönche unserer Klöster die #italic Ljekaruše#! zusammen: umfangreiche medizinische Kodizes in der einheimischen #italic Bosančica#!-Schrift. Durch die Verbindung antiker griechisch-byzantinischer Theorie mit der Kräuterkunde des Dinarischen Gebirges bieten diese Handbücher ein ausgeklügeltes System gemeinschaftlicher Gesundheitsversorgung in einer Zeit, in der hauptberufliche Ärzte eine Seltenheit sind. Diese Beherrschung der Volksmedizin und der Chirurgie sichert unserer Bevölkerung eine Widerstandsfähigkeit gegenüber jenen Seuchen, die das Tiefland heimsuchen, und fördert eine kulturelle Identität, die von intellektueller Selbstständigkeit und der Bewahrung slawischen Wissens geprägt ist."
 bos_the_filigree_guilds: "Filigranschmiedezunft"
 bos_the_filigree_guilds_desc: "Aus den unerschöpflichen Silberadern des Zentralgebirges vervollkommneten unsere städtischen Handwerker die Kunst des Filigrans: kunstvolle Silberdrahtarbeiten, die zum Markenzeichen des bosnischen Luxus geworden sind. Diese Zünfte agieren als mächtiger Wirtschaftsstand und führen Zeremoniendolche und edlen Schmuck nach Venedig und Wien aus. Indem wir unseren Rohstoffreichtum in hochwertige Kunsterzeugnisse verwandelten, schufen wir eine wohlhabende städtische Mittelschicht, die der Krone treu ergeben ist. Diese Herstellungsraffinesse steigert das Ansehen unserer Nation an jedem fremdländischen Hof und beweist, dass das „Eiserne Herz“ des Balkans über eine anspruchsvolle Kultur verfügt, die mit den großen Hauptstädten des Westens mithalten kann."
 #Bulgarian Shared
 bulgarian_orthodox_patriarchate: "Orthodoxes Patriarchat von Bulgarien"
 bulgarian_orthodox_patriarchate_desc: "Die Erhebung der bulgarischen Kirche zum Patriarchat macht Tarnowo zum spirituellen Rivalen von Konstantinopel und stärkt unsere nationale Einigkeit durch den Glauben."
 reformation_of_the_bulgarian_patriarchate: "Reformation des Patriarchats"
 reformation_of_the_bulgarian_patriarchate_desc: "Die Wiederbelebung der Unabhängigkeit des bulgarischen Patriarchats stärkte sowohl religiöse Einflüsse als auch die moralische Autorität des Staats."
 bulgarian_the_danubian_river_merchants: "Flusshändler der Donau"
 bulgarian_the_danubian_river_merchants_desc: "Bulgarische Kaufmannsfamilien nutzen ihre Stellung als Torwächter der unteren Donau, um ein ausgeklügeltes Handelsnetz zu spinnen, das das Schwarze Meer mit Mitteleuropa verbindet. Durch den Einsatz von Flachwasserschiffen und befestigten Flusshäfen umgehen sie die teuren und gefährlichen Landwege und kontrollieren so den Strom von Salz, Getreide und Holz über den Balkan. Dieses Fachwissen im Flusswesen machte die Donau zu einer bulgarischen Lebensader des Reichtums und finanzierte den Aufstieg einer neuen städtischen Elite, die gern Steuern zahlt, um ihre Privilegien zu wahren."
 fortress_of_the_balkans: "Festung des Balkans"
 fortress_of_the_balkans_desc: "Angesichts der ständigen Bedrohungen durch Kreuzritter, Byzantiner und Mongolen entwickelte Bulgarien eine ausgedehntes Netzwerk an Stadt- und Bergbefestigungen."
 bulgarian_the_bulgarian_cloth_industry: "Bulgarische Tuchindustrie"
 bulgarian_the_bulgarian_cloth_industry_desc: "Die bulgarischen Städte werden durch die spezialisierte Herstellung von #italic Aba#! (einem strapazierfähigen, dicken Wollstoff) und #italic Gaitan#! (einer dekorativen Bordüre) zum industriellen Mittelpunkt der Halbinsel. Indem sie die örtlichen Weber und Hirten in mächtigen, selbstverwalteten Zünften organisieren, sichern sich die bulgarischen Kaufleute umfangreiche Staatsaufträge zur Ausrüstung der regionalen Armeen und der wachsenden städtischen Mittelschicht des Mittelmeerraums. Dieser wirtschaftliche Aufschwung schafft einen Händleradel, der den Übergang des bulgarischen Volkes von einer bäuerlichen Bevölkerung zu einer hoch entwickelten, protoindustriellen Gesellschaft einläutet. Dank ihrer finanziellen Stärke können sie ihren Nachbarn Bedingungen diktieren."
 bulgarian_the_bulgarian_national_awakening: "Bulgarische Nationalbewegung"
 bulgarian_the_bulgarian_national_awakening_desc: "Angeregt durch die Schriften von Mönchen wie Païssi von Hilandar entdeckte das bulgarische Volk seine kaiserliche Geschichte und seinen sprachlichen Stolz wieder und stieß damit eine umfassende Erneuerung in Bildung und Politik an. Diese Bewegung überwand örtlichen Unbill, um einen zentralisierten, modernen Staat zu fordern, der einen Platz unter den europäischen Großmächten einnehmen kann. So entsteht eine hochmotivierte und gebildete Bevölkerung, die bereit ist, in einer modernen Bürokratie oder einer nationalen Armee zu dienen, angetrieben von der Überzeugung, dass der Ruhm der Zaren nicht in der Vergangenheit, sondern in der Zukunft liegt."
 #Bulgarian Unique
 legacy_of_ivan_asen_ii: "Vermächtnis von Iwan Assen II."
 legacy_of_ivan_asen_ii_desc: "Die Herrschaft von Iwan Assen II. stellte einen neuen Höhepunkt der bulgarischen Macht, Diplomatie und wirtschaftlichen Ausdehnung dar. Sein Vermächtnis bleibt ein andauerndes Fundament für einen starken und zentralisierten Staat."
 bul_the_bastion_of_tseverets: "Bastion von Zarewez"
 bul_the_bastion_of_tseverets_desc: "Der Hauptsitz Tarnowo liegt hoch droben auf den Klippen von Zarewez und Trapesiza und ist wohl die imposanteste Festung des Balkans und Machtsymbol der Asen-Dynastie. Durch den ständigen Ausbau der Anlage aus Palästen, Patriarchenkathedralen und dreifach gemauerten Wällen entstand ein Verwaltungszentrum, das vor plötzlichen Staatsstreichen und Belagerungen geschützt ist. Diese architektonische Vorherrschaft vermittelt ein Bild kaiserlicher Stabilität, das die örtlichen Bojaren einschüchtert und die Bevölkerung davon überzeugt, dass das „Dritte Rom“ tatsächlich an die Ufer der Jantra verlegt wurde."
 kvn_karvunan_maritime_heritage: "Karwunisches Seefahrervermächtnis"
 kvn_karvunan_maritime_heritage_desc: "Karwuna gründet seine Macht auf dem Meer und nicht auf den fruchtbaren Ebenen, wobei man auf bulgarische, griechische und italienische Seeleute zurückgreift. Durch die Befestigung der Kalksteinklippen an der Küste schaffen wir eine Reihe von Marinestützpunkten, die es uns ermöglichen, die Handelsrouten im Schwarzen Meer zwischen dem Donaudelta und Konstantinopel zu beherrschen. Diese maritime Ausrichtung verleiht uns eine einzigartige Identität innerhalb der bulgarischen Welt, in der Seeherrschaft und Handel mehr wiegen als die traditionellen feudalen Belange des Landesinneren."
 vid_the_stronghold_of_baba_vida: "Festung von Baba Wida"
 vid_the_stronghold_of_baba_vida_desc: "Die Festung von Widin, strategisch günstig an einer Donauschleife gelegen, bildet das wichtigste Tor zwischen Bulgarien, der ungarischen Tiefebene und den serbischen Bergen. Unter der Dynastie der Schischmanen wurde die Burg Baba Wida zu einer ausgeklügelten Flussfestung ausgebaut, die langen Belagerungen standzuhalten vermag und eine ständige Garnison von Elitetruppen beherbergt. Dieser Schwerpunkt auf einer Verteidigungsarchitektur sorgte dafür, dass Widin eine unabhängige Bastion bleibt, selbst wenn das übrige bulgarische Kernland bedroht wird. So kann es der „Westliche Schild“ der Nation sein."
 revival_of_the_literary_schools: "Kunstschulen von Tarnowo"
 revival_of_the_literary_schools_desc: "Beflügelt von der kulturellen Renaissance unter Iwan Alexander wurden bulgarische Skriptorien und Schulen zu den Hütern der slawischen orthodoxen Identität."
 bul_the_chancery_of_the_asens: "Kanzlei der Asen"
 bul_the_chancery_of_the_asens_desc: "Auf ihrem Höhepunkt war die Kanzlei in Tarnowo der fortschrittlichste diplomatische Knotenpunkt der orthodoxen Welt und verfasste komplexe slawische Urkunden, die die Höfe Serbiens und Russlands beeinflussten. Durch die Professionalisierung der #italic Logotheten#! und Schreiber stellten die Zaren sicher, dass jede Landschenkung und jeder internationale Vertrag sorgfältig dokumentiert und rechtsverbindlich war. Diese strenge Verwaltung ermöglichte es dem Staat, Steuern effizienter einzutreiben und ein vielschichtiges Vasallennetzwerk mit einer für das Spätmittelalter ungewöhnlichen zentralen Kontrolle zu verwalten."
 kvn_looking_for_friends: "Suche nach Freunden"
 kvn_looking_for_friends_desc: "Angesichts unserer geringen Landfläche wissen unsere Herrscher um die Notwendigkeit mächtiger Freunde und Handelspartner. Indem wir diesen Verbündeten exklusive Handelsrechte in Häfen wie Warna gewähren, erhält das Despotat Zugang zu moderner westlicher Marinetechnologie und Darlehen sowie einen starken Schutz zur See vor unseren Feinden. Dieses Bündnis verwandelt Dobrudscha in ein kosmopolitisches Handelszentrum, in dem der Reichtum der Seidenstraße gegen Getreide und Pelze aus dem Norden getauscht wird."
 vid_the_western_connection: "Westliche Bande"
 vid_the_western_connection_desc: "Am Schnittpunkt der Kulturen gelegen pflegten die Zaren von Widin engere Beziehungen zum katholischen Westen als alle anderen bulgarischen Herrscher und heirateten häufig in den ungarischen und walachischen Adel ein. Diese diplomatische Flexibilität ermöglichte es Widin, als unabhängiger Staat zu bestehen und sich mithilfe westlicher Militärtechnologie und höfischer Traditionen vom Rest Bulgariens abzugrenzen. Als Brücke zwischen der orthodoxen und der katholischen Welt entwickelte sich Widin zu einem Zentrum des Handels und des intellektuellen Austauschs, was die Staatskasse und das Heer bereicherte."
 bul_the_boyar_council: "Bojarenrat"
 bul_the_boyar_council_desc: "Um jene inneren Spannungen zu verhindern, die das 14. Jahrhundert plagten, entwickeln wir uns zu einer „konsultativen Autokratie“, die die mächtigsten Bojaren in einen ständigen Staatsrat einbindet. Dieses Gremium dient als oberstes Gericht und militärische Planungsinstanz und stellt sicher, dass die Interessen des Landadels mit denen der Krone im Einklang sind. Diese politische Stabilität ermöglicht es uns, ein großes stehendes Heer zu unterhalten und jene verheerenden Bürgerkriege zu vermeiden, die das Reich früher immer wieder seinen Nachbarn auslieferten."
 bul_the_hesychast_state_philosophy: "Hesychastische Staatsphilosophie"
 bul_the_hesychast_state_philosophy_desc: "Die spirituellen Lehren von Gregor vom Sinai (oder auf Bulgarisch: Grēgórios Sinaítēs) fanden ihren Weg von einer Einsiedlerzelle in die Zentren der Macht. Wenn wir den Hesychasmus – eine Philosophie der inneren Stille und des göttlichen Lichts – als inoffizielle Staatsideologie annehmen, fördern wir eine zutiefst fromme und widerstandsfähige Bevölkerung. Diese gemeinsame spirituelle Identität wirkt als starkes Abwehrmittel gegen die Einflüsse unserer Feinde und schützt die bulgarischen Untertanen vor fremdländischer Bekehrung oder Unterwanderung."
 kvn_the_condotta_of_varna: "Condotta von Warna"
 kvn_the_condotta_of_varna_desc: "Als Seefahrerstaat mit einer vergleichsweise kleinen Landbevölkerung vervollkommnete Karwuna die Kunst der „Vertragskriegsführung“, indem man eine dauerhafte Condotta mit den italienischen Seemächten schloss. Im Rahmen dieser Vereinbarung stellt Karwuna befestigte Lager und Marinestützpunkte im Schwarzen Meer zur Verfügung. Im Gegenzug versorgen die Italiener Karwuna mit einem Korps aus schweren Armbrustschützen und erfahrenen Belagerungspionieren zur Verteidigung des Despotats. Diese symbiotische Beziehung ermöglicht es Karwuna, in Landschlachten weit über seine Verhältnisse zu leben. Mithilfe westlicher taktischer Innovationen und professioneller Disziplin verteidigt Karwuna seinen Küstenstreifen, während die einheimischen bulgarischen Seeleute die Meere beherrschen und die Landverteidigung somit den fähigsten Söldnern des Mittelmeers überlassen."
 vid_the_order_of_the_danubian_dragon: "Danubischer Drachenorden"
 vid_the_order_of_the_danubian_dragon_desc: "Um die Treue des Grenzlandadels zu sichern und ein professionelles Offizierskorps aufzubauen, gründen die Zaren von Widin einen örtlichen Ritterorden nach dem Vorbild der westeuropäischen #italic Societas Draconistrarum#!. Die Mitglieder dieses Ordens erhalten Ländereien entlang des Timok und der Donau im Austausch für eine ständige Bereitschaft sowie die Bereitstellung einer schweren Kavallerieeinheit zur Verteidigung des Zarenreichs. Diese Institution soll die Kluft zwischen den alten bulgarischen Bojarentraditionen und den ritterlichen Ansprüchen des Westens überbrücken, ein hohes Maß an militärischer Disziplin und persönlicher Treue gegenüber der Krone fördern und eine Zersplitterung im Inneren verhindern."
 bul_the_silk_and_rose_guilds: "Seiden- und Rosenzünfte"
 bul_the_silk_and_rose_guilds_desc: "Wir nutzten die fruchtbaren thrakischen Ebenen und das einzigartige Klima des Rosentals, um staatlich geschützte Zünfte für die Herstellung von luxuriösen Ölen und Seide zu gründen. Diese hochwertigen, leichten Güter eignen sich hervorragend für die Ausfuhr über Land an die Höfe Europas und Asiens. Der durch diese Zünfte erwirtschaftete Reichtum ermöglicht es dem Staat, eine gewaltige Goldreserve anzulegen und unsere Wirtschaft zu einer der stabilsten und kreditwürdigsten im gesamten Mittelmeerbecken zu machen."
 bul_the_bulgarian_gunpowder_foundries: "Bulgarische Schusswaffengießereien"
 bul_the_bulgarian_gunpowder_foundries_desc: "Mithilfe der Eisenerzminen in den Bergen des Balkans und dem Fachwissen sächsischer Bergleute schaffen wir die erste bedeutende einheimische Kanonenherstellung der Region. Diese Gießereien stellen schwere Belagerungskanonen und frühe Handfeuerwaffen her und ermöglichen es der bulgarischen Armee, sich von einer rein feudal geprägten Kavallerie zu einer moderneren, infanterielastigen Streitmacht zu entwickeln. Durch die Kontrolle der Salpeter- und Eisenproduktion gewährleisten wir, dass unsere Mauern das gefährlichste Hindernis für jeden angehenden Eroberer des Balkans bleiben."
 kvn_the_cosmopolitan_code_of_karvuna: "Kosmopolitischer Kodex von Karwuna"
 kvn_the_cosmopolitan_code_of_karvuna_desc: "Damit Karwuna das führende Handelszentrum am Schwarzen Meer bleibt, führen wir ein revolutionäres Rechtssystem ein: den sogenannten „Kodex von Karwuna“. Dieser gewährt anerkannten Handelsnationen extraterritoriale Rechte und Religionsfreiheit. Ungeachtet seiner Religion oder Herkunft hat jeder in unseren Häfen tätige Kaufmann das Recht, nur vor ein Gericht gestellt zu werden, das mit anderen Händler besetzt ist. So entgeht man der vermeintlichen Willkür örtlicher Feudalherren. Dieses Klima der Rechtssicherheit und der Toleranz wird einen massiven Zustrom von Kapital und Expertise anziehen und Karwuna zu einem bedeutenden Handelszentrum machen, in dem der Reichtum der Seiden- und Gewürzstraßen in die staatliche Infrastruktur und die wachsende Verquickung von Industrie und Militär reinvestiert wird."
 vid_the_mining_grants: "Bergbaulizenzen"
 vid_the_mining_grants_desc: "Widin muss seinen Einfluss auf das mineralienreiche Timok-Tal ausdehnen und sächsischen wie ragusischen Bergleuten Lizenzen zum Abbau von Silber, Blei und Kupfer erteilen. Diese industrielle Grundlage liefert dem Zarenreich die benötigten Metalle, die man für moderne Währungen und die Herstellung hochwertiger Feuerwaffen braucht. Widin wird so nicht nur zu einer militärisch autarken Macht, sondern der Reichtum aus diesen Minen ermöglicht es den Zaren zudem, eine Berufsarmee zu unterhalten."
 bul_the_grand_academy_of_the_yantra: "Große Akademie der Jantra"
 bul_the_grand_academy_of_the_yantra_desc: "Dem intellektuellen Vermächtnis der Tarnowoer Literaturschule des 14. Jahrhunderts wird im 17. Jahrhundert durch die Gründung einer modernen staatlichen Universität neues Leben eingehaucht. Diese Institution konzentriert sich auf Zivilrecht, Ingenieurwesen und die Übersetzung westlicher wissenschaftlicher Texte ins Bulgarische und bildet so eine Beamtenschicht aus, die der in Paris oder Wien in nichts nachsteht. Diese Modernisierung der Elite soll sicherstellen, dass wir ein komplexes, multiethnisches Reich verwalten können, ohne die kulturelle Reinheit seines bulgarischen Kerns zu beeinträchtigen."
 bul_the_standing_drilled_infantry: "Gedrillte Berufsinfanterie"
 bul_the_standing_drilled_infantry_desc: "Mit der Abkehr von zeitweisen Truppenaufgeboten hoben wir die ersten ständigen „Regimenter des Löwen“ aus. Diese Infanteristen werden ganzjährig im Umgang mit Feuerwaffen ausgebildet. Ihr Drill orientiert sich an den Erfolgen benachbarter Armeen, wurde allerdings an das Gelände des Balkans angepasst. Mit diesem Kern einer stehenden Infanterie besitzen wir ein verlässliches Werkzeug für Angriffskriege, das die traditionellen Armeen unserer Nachbarn sowohl auf dem Marsch als auch in Feuergefechten aussticht."
 kvn_the_black_sea_admiralty: "Schwarzmeer-Admiralität"
 kvn_the_black_sea_admiralty_desc: "Karwuna richtet eine ständige, staatliche Admiralität ein, die den Bau moderner Hochseekriegsschiffe und die Ausbildung eines professionellen Offizierskorps überwachen soll. Anstelle kleiner Galeeren bauen wir Fregatten und kleinere Linienschiffe, die in der Lage sind, ihre Macht bis in die Ägäis und das Asowsche Meer zu projizieren. Diese Modernisierung der Marine stellt sicher, dass wir eine bedeutende Seemacht bleiben und unsere Handelsinteressen gegen unsere Feinde verteidigen können."
 vid_vidins_custom_houses: "Zollhaus von Widin"
 vid_vidins_custom_houses_desc: "Mit dem wachsenden Handel zwischen dem Oberlauf der Donau und dem Schwarzem Meer entwickelte sich Widin zu einem der wichtigsten Zollämter am Unterlauf der Donau und regelt den Warenfluss europäischer Luxusgüter auf den Balkan. Durch die Einführung eines ausgeklügelten Systems von Zöllen und Lagergesetzen füllt der Staat seine Kasse, ohne die eigene Landwirtschaft übermäßig zu belasten. Diese handelsorientierte Wirtschaft ermöglicht es Widin, seine Infrastruktur zu modernisieren und befestigte Straßen sowie Steinbrücken zu bauen, die die Donau mit dem Inland der Balkanhalbinsel verbinden."
 bul_the_imperial_restoration_doctrine: "Zarenwiederherstellungsdoktrin"
 bul_the_imperial_restoration_doctrine_desc: "Wir nahmen unsere Rolle als natürliche Führungsmacht der Balkanvölker voll und ganz an und schrieben eine formelle Doktrin für die Wiedervereinigung aller ehemaligen bulgarischen Gebiete fest. Dieses Ziel wird von einer modernen, professionalisierten Armee und einem versierten Korps von Diplomaten gestützt, die die Großmächte gegeneinander ausspielen wollen. Der Glaube an ein „Großbulgarien“ bildet die zentrale Säule des Staates und treibt eine Politik der aggressiven Expansion und kulturellen Assimilation voran, die das Reich Simeons des Großen wiederherstellen soll."
 bul_the_bulgarian_census_bureau: "Bulgarisches Volkszählungsamt"
 bul_the_bulgarian_census_bureau_desc: "Wissen ist Macht. Wir führen eine alle zehn Jahre stattfindende Volkszählung ein, die jede Person, sämntliches Vieh und jeden Haushalt im Reich erfasst. Diese genauen Daten ermöglichen das effizienteste Steuer- und Wehrpflichtsystem auf dem Balkan. Da wir genau wissen, was die Bevölkerung leisten kann, planen wir langfristige Feldzüge mit einer logistischen Sicherheit, durch die unsere Armeen stets gut versorgt und unsere Kassen nie leer sind."
 kvn_the_free_port_of_varna: "Freihafen von Warna"
 kvn_the_free_port_of_varna_desc: "Um unsere Stellung als führendes Handelszentrum des Balkans zu festigen, erklären wir Warna zum Freihafen und befreien Außenhändler von den meisten althergebrachten Zöllen – im Gegenzug für eine pauschale Durchgangsgebühr. Diese Maßnahme zieht eine große Zuwanderung von Händlern, Bankiers und Versicherern an und macht Warna sowohl zum „Venedig des Schwarzen Meeres“ als auch zur Finanzhauptstadt der bulgarischen Welt. Der sich daraus ergebende Reichtum ermöglicht es uns, eine Berufsarmee und eine Marine von Weltklasse zu unterhalten und so sicherzustellen, dass unser Küstenstaat in einer Zeit der Großmächte eine wohlhabende und unabhängige Nation bleibt."
 vid_the_codex_shishman: "Kodex Schischman"
 vid_the_codex_shishman_desc: "Um den Übergang vom mittelalterlichen Feudalstaat zur modernen, zentralisierten Monarchie abzuschließen, verkündet das Zarentum die #italic Societas Codex Schischman#!: eine umfassende Rechtsreform, die die unterschiedlichen örtlichen Bräuche des Westbalkans vereinheitlicht. Dieser Kodex begründet eine von den örtlichen Grundbesitzern unabhängige Berufsjustiz und standardisiert die im gesamten Handelsnetz Widins verwendeten Gewichte, Maße und Währungen. Durch die Schaffung eines berechenbaren und gerechten Rechtsumfelds gewährleisten wir das Wachstum einer treuen städtischen Mittelschicht und die Stabilität der staatlichen Steuereinnahmen. Diese Modernisierung der Verwaltung macht Widin zu einem Leuchtfeuer des „aufgeklärten Despotismus“ im Osten, wo die Rechtsstaatlichkeit so unerschütterlich ist wie die Mauern von Baba Wida selbst."
 #Croatian Shared
 croatian_the_glagolitic_lithurgy: "Glagolitische Liturgie"
 croatian_the_glagolitic_lithurgy_desc: "Unsere Kultur ist geprägt vom einzigartigen Privileg der glagolitischen Liturgie: Wir sind der einzige Ort in der katholischen Welt, an dem man die Messe in der einheimischen slawischen Sprache abhält. Diese Tradition überbrückt die Kluft zwischen den lateinischen Städten und dem slawischen Kernland und schafft so eine einheitliche kulturelle Identität. Durch die Bewahrung dieser alten Schrift behält unser Volk eine Art geheimer Kultursprache, die seine Eigenständigkeit stärkt und ein Nationalgefühl vermittelt, das sich der Angleichung an die italienische und deutsche Kultur entzieht."
 cro_influx_of_foreign_knowledge: "Zustrom fremdländischen Wissens"
 cro_influx_of_foreign_knowledge_desc: "Viele fremdländische Künstler und Gelehrte durchqueren unsere Lande. Wir sollten ihnen einen Anreiz geben, bei uns zu bleiben und unsere Kultur zu neuen Leistungen anzuspornen."
 cro_trade_posts: "Kroatische Handelsposten"
 cro_trade_posts_desc: "Unsere Lande liegen zwischen vielen verlockenden Zielen für Händler. Anstatt sie vorbeiziehen zu lassen und nur als Zwischenhalt zu dienen, sollten wir den Handel selbst fördern und unseren gerechten Anteil am Mittelmeerhandel abkassieren."
 croatian_the_peasants_revolts: "Bauernaufstände"
 croatian_the_peasants_revolts_desc: "Die erdrückende Last feudaler Verpflichtungen angesichts ständiger Kriege führte in der Vergangenheit zu Bauernaufständen. Die Bauern erhoben sich nicht gegen uns, sondern gegen den „ungerechten“ Adel, der sie nicht schützte und gleichzeitig überhöhte Abgaben forderte. Obwohl man diese Aufstände meist brutal niederschlug, hinterließen sie ein bleibendes Erbe eines gesellschaftlichen Bewusstseins und veränderten das Verhältnis zwischen den Klassen. Der Staat war schließlich gezwungen, seine Steuerforderungen zu mäßigen, um die innere Stabilität zu wahren."
 croatian_the_cravats: "Krawatten"
 croatian_the_cravats_desc: "In diesen erschütternden Jahren bemerkte die Welt die besonderen Eliteregimenter leichter Kavallerie des kroatischen Militärs. Neben ihrer legendären Beweglichkeit und Kampfkraft führten diese Reiter eine einzigartige Neuerung in ihrer Kleidung ein: ein praktisches geknotetes Tuch, das man um den Hals trägt, um den Hemdkragen zu fixieren und vor dem Scheuern der Brustpanzer zu schützen. Diese #italic Krawatte#! – ein Name, der sich wohl von der französischen Falschaussprache von #italic Kroate#! ableitet – ließ das Schlachtfeld schnell hinter sich und ist zum Inbegriff modischer Eleganz in Paris und ganz Europa geworden. Da sie eine robuste militärische Notwendigkeit in ein Markenzeichen modischer Kleidung verwandelte, errang unsere Kultur einen unscheinbaren, aber dauerhaften Sieg. Diese modische Vormachtstellung sorgt dafür, dass das Bild des kroatischen Offiziers sowohl taktische Treffsicherheit als auch unvergleichliche Eleganz verkörpert."
 croatian_the_illyrian_movement: "Illyrische Bewegung"
 croatian_the_illyrian_movement_desc: "In den letzten Jahren erlebte unser Land den Aufstieg der #italic Illyrischen Bewegung#!, einer kulturellen und politischen Revolution, die alle Kroaten unter einem gemeinsamen Banner vereinen will. Sie zielt darauf ab, die verschiedenen Regionen unseres Landes zu einer einheitlichen sowie politisch und kulturell starken Nation zusammenzuführen. Durch die Standardisierung von Grammatik und Rechtschreibung verwandeln wir unsere mittelalterliche Nation in eine moderne und stellen sicher, dass der kroatische Name, die Sprache und die Staatlichkeit nie wieder in Vergessenheit geraten oder unterdrückt werden."
 #Croatian Unique
 cro_maritime_connections: "Fernverkehr über See"
 cro_maritime_connections_desc: "Unsere zerklüftete Küsten eignen sich nicht wirklich für einfache Straßenverbindungen zwischen den Siedlungen. Daher sollten wir dauerhafte Verbindungen über Boote einrichten, sodass Waren und Menschen keine beschwerlichen Reisen über das Küstenland antreten müssen."
 cro_the_bashka_tablet: "Tafel von Baška"
 cro_the_bashka_tablet_desc: "Die kulturelle Seele Kroatiens wurzelt in der #italic Zvonimir#!-Tradition, bei der unsere Geschichte in Stein gemeißelt wird. Wir bewahren das Andenken an unsere unabhängigen Könige durch Epen und historische Chroniken und pflanzen so jedem Bauern und Adligen einen Sinn für das Königliche ein. Dieser historische Stolz sorgt dafür, dass sich die Kroaten selbst unter fremder Herrschaft als Teil einer alten und unabhängigen Nation verstehen und eine Widerstandsfähigkeit fördern, die unsere Kultur lebendig und resistent gegen einen kulturellen Verfall von außen hält."
 svn_the_marturina_tax_system: "Marturina-Steuersystem"
 svn_the_marturina_tax_system_desc: "Wir formalisierten die #italic Marturina#! (die Marderfellsteuer oder auch #italic Kunovina#! genannt): ein einzigartiges und uraltes slawonisches Tributsystem, das dem Banat einen wertvollen, leicht verfügbaren Vermögenswert sichert. Durch die Standardisierung des Wertes dieser Felle gegenüber der Königlichen Mark schufen wir eine stabile und äußerst inflationsresistente Währung für die Region. Diese fiskalische Stabilität ermöglicht es dem Banat, eine professionelle Nationalgarde zu unterhalten und entlang der gefährdeten Drau-Querungen umfangreiche Holz- und Steinbefestigungen zu errichten, ohne die Bauernschaft mit übermäßigen Getreidesteuern zu belasten."
 cro_legacy_of_the_trpimirovic: "Vermächtnis der Trpimirović"
 cro_legacy_of_the_trpimirovic_desc: "Wir blicken zurück auf das ruhmreiche Zeitalter einheimischer Könige wie Tomislav und Zvonimir, um ein Gefühl von Unabhängigkeit und Nationalstolz zu wecken. Indem wir unsere Abstammung und Institutionen auf diese Herrscher zurückführen, stärken wir unser diplomatisches Ansehen an den europäischen Höfen und bekräftigen unser Anrecht auf eine Krone, die älter ist als die vieler unserer Nachbarn. Dieses historische Ansehen flößt dem Heiligen Stuhl Respekt ein und dient als mächtigender, einigender Mythos, der die verschiedenen Regionen des Königreichs unter dem Banner des ruhmreichen romanisch-slawischen Königshauses zusammenführt."
 cro_the_banovac_silver_denar: "Banovac-Silbermünze"
 cro_the_banovac_silver_denar_desc: "Wir machten unser Recht in Sachen #italic Monetaria#! geltend und gründeten eine eigene Münzprägeanstalt zur Herstellung der Banovac-Silbermünze. Durch den höheren Silbergehalt im Vergleich zu benachbarten Währungen entwickelte sich unsere Münze zum wichtigsten Zahlungsmittel in der nördlichen Adria und im Drau-Becken. Diese finanzielle Unabhängigkeit ermöglicht es uns, die Verwaltung ohne äußere Subventionen zu finanzieren und unseren Hof zu einem regionalen Finanzzentrum zu machen, das Kapital aus Ragusa und Venedig anzieht."
 svn_the_slavonian_sabor: "Slawonischer Sabor"
 svn_the_slavonian_sabor_desc: "Unser Volk untersteht der Aufsicht des slawonischen #italic Sabor#!. Diese legislative Unabhängigkeit ermöglicht es dem slawonischen Adel, auf die besonderen Bedürfnisse der Flussebenen einzugehen (wie etwa auf Entwässerungsvorhaben und die Regulierung der Getreidemärkte). Dank einer eigenen Versammlung kann das Banat rasch auf regionale Krisen antworten und direkt über Steuerbefreiungen verhandeln. So wird sichergestellt, dass der landwirtschaftliche Reichtum Slawoniens vorrangig der eigenen Verteidigung und Weiterentwicklung dient."
 cro_antemurale_christianitatis: "Antemurale Christianitatis"
 cro_antemurale_christianitatis_desc: "Wir müssen uns selbst als Verteidiger der Christenheit und des einen wahren Glaubens und als Bollwerk gegen Ketzer wie Heiden verstehen."
 cro_the_croatian_press: "Kroatische Presse"
 cro_the_croatian_press_desc: "Wir gründeten eine der frühesten und gewagtesten Druckereien der slawischen Welt. Indem wir unser technologisches Zentrum in das unwegsame Tal von Kosinj verlegten, stellten wir sicher, dass die Herstellung unserer heiligen glagolitischen Schriften vor den Seeüberfällen und Grenzscharmützeln geschützt bleibt, die die Küste heimsuchen. Diese Druckerei ist nicht nur ein Werkzeug der Alphabetisierung: Sie ist ein Laboratorium des kulturellen Überlebens, in dem wir die ersten gedruckten Messbücher in unserer Muttersprache herstellen. Durch die Standardisierung unserer alten Schrift mithilfe der modernen Druckerei stellen wir jeder Pfarrei im Königreich eine einheitliche, unverfälschte Quelle unserer Gesetze und unserer Liturgie zur Verfügung. Dies gewährleistet, dass die kroatische Identität intellektuell gestärkt und spirituell unabhängig bleibt, denn jeder Hirte und jeder Adlige kann sie in Händen halten. So wird die Seele der Nation in einer unerschütterlichen, einheimischen Tradition verankert."
 svn_the_alluvial_grant_lands: "Schwemmlandschenkungen"
 svn_the_alluvial_grant_lands_desc: "Der fruchtbare Schlamm zwischen Save und Drau ist unser größter Reichtum. Indem wir steuerfreie Parzellen im Austausch für die Rodung des dichten Ufergestrüpps vergeben, verwandeln wir die überschwemmten Ebenen in das wichtigste Getreidebecken des Nordens. Diese Intensivierung der Landwirtschaft sichert die notwendige Versorgung eines massiven stehenden Heers und gewährleistet so, dass das Königreich seine Verteidiger selbst während der härtesten Winterblockaden versorgen kann."
 cro_reliance_on_adriatic: "Fülle der Adria"
 cro_reliance_on_adriatic_desc: "Das Meer vor unseren Küsten versorgt uns mit reichlich Fisch und Salz, was die örtliche Wirtschaft stärkt und uns mehr als genug Güter für die Ausfuhr liefert."
 cro_the_jesuit_academy: "Jesuitenakademie"
 cro_the_jesuit_academy_desc: "Die von den Jesuiten gegründete Akademie entwickelte sich von einem örtlichen Gymnasium zum intellektuellen Zentrum unserer Nation. Durch die Einführung eines anspruchsvollen Lehrplans in aristotelischer Philosophie, Mathematik und Rhetorik brachte die Akademie eine einheimische Elite „aufgeklärter Kroaten“ hervor, die sich in den Salons Wiens ebenso wohlfühlt wie im Sabor. Diese institutionelle Modernisierung gewährleistet, dass unsere Bürokratie von einer technokratischen Schicht geführt wird, die in der Lage ist, die komplexen rechtlichen und wissenschaftlichen Umbrüche unseres Jahrhunderts zu bewältigen."
 svn_the_oak_staple_rights: "Stapelrecht auf Eichenholz"
 svn_the_oak_staple_rights_desc: "Slawonische Eiche ist aufgrund ihrer eisenartigen Resistenz gegen Fäulnis heute das begehrteste Holz im Mittelmeerraum. Durch die Einführung eines königlichen Monopols auf die Ausfuhr von ausgewachsener Eiche an die venezianischen Werften sicherten wir uns ein strategisches wirtschaftliches Druckmittel gegenüber den Küstenrepubliken. Dieser Handel füllt nicht nur unsere Kassen. Er gewährleistet, dass die Fundamente der venezianischen Paläste und die Rümpfe ihrer Galeeren aus kroatischem Boden bestehen, was uns einen einzigartigen diplomatischen Einfluss auf die „Königin der Adria“ verleiht."
 cro_baroque_pietas: "Barocke Pietàs"
 cro_baroque_pietas_desc: "Unsere Kultur nahm einen dramatischen und heftigen Barock-Katholizismus an, der sich durch gewaltige religiöse Prozessionen und den Bau prachtvoller, reich verzierter Kirchen auszeichnet. Diese „visuelle Frömmigkeit“ wirkt als starke einigende Kraft und überbrückt die Kluft zwischen städtischem Adel und ländlicher Bauernschaft durch gemeinsame Rituale und Spektakel. Diese ausgeprägte religiöse Identität dient als kultureller Schutzschild gegen protestantische und östliche Einflüsse und gewährleistet, dass die kroatische Seele fest in der katholisch-mediterranen Welt verankert bleibt, selbst während sie die mitteleuropäischen Ebenen verteidigt."
 cro_the_national_garrison_system: "Nationales Garnisonssystem"
 cro_the_national_garrison_system_desc: "Um plötzliche Überfälle und Landungen feindlicher Flotten oder Grenzverletzungen abzuwehren, errichten wir in den Klüften des Velebit ein ausgeklügeltes System mit Rauch- und Feuersignalen. Diese „Bergwache“ ermöglicht es unseren Festungen, sich innerhalb von Minuten über das zerklüftete Gelände hinweg zu verständigen und so die beschwerlichen Bergpfade zu vermeiden. Durch die Koordination dieser Signale mit den Garnisonen im Landesinneren mobilisieren wir unsere Nation und verstärken unsere Verteidigungsanlagen, bevor es zu einem Kampf kommt. Diese Überwachung aus großer Höhe verwandelt die unpassierbaren Gipfel in einen zentralen Kommandoturm und stellt sicher, dass sich kein Feind unbemerkt nähern kann."
 svn_swamp_drainage_projects: "Sumpfentwässerungsvorhaben"
 svn_swamp_drainage_projects_desc: "Durch Investitionen in groß angelegte Wasserbauvorhaben zur Trockenlegung der ausgedehnten Sumpfgebiete entlang der Flüsse erschließen wir Tausende Hektar neues, fruchtbares Ackerland. Diese trockengelegten Flächen werden bald besiedelt, was die Bevölkerungsdichte und die Steuergrundlage der Provinz erhöht und gleichzeitig Überträgern von Krankheiten die Lebensgrundlage raubt. Diese Umgestaltung des Geländes stärkt nicht nur unsere Wirtschaft, sondern schafft auch ein besser befahrbares und verteidigungsfähiges Gelände und beseitigt jene natürlichen Barrieren, die einst unsere innere Verständigung behinderten."
 cro_the_royal_council_of_croatia: "Kroatischer königlicher Rat"
 cro_the_royal_council_of_croatia_desc: "Wir gründeten in unserer Hauptstadt das #italic Consilium Regium#! und damit eine eigene Exekutive für die kroatische Nation. Dieses Gremium dient als Vorläufer eines Ministeriums und ist für Wirtschaft, Bildung und innere Sicherheit des #italic Dreieinigen Königreichs#! zuständig. Diese Ära der „Regierung durch den Rat“ bringt eine professionelle Klasse kroatischer Beamter hervor, die den Staat als rationales, modernes System und nicht als Ansammlung feudaler Privilegien begreifen. Die in diesen Machtzentren gesammelten Erfahrungen vermitteln dem kroatischen Volk die notwendige administrative Expertise, um den Übergang von einem mittelalterlichen Königreich zu einem modernen europäischen Nationalstaat zu meistern."
 cro_uniting_the_coast_and_the_inner_lands: "Einung von Küsten und Inland"
 cro_uniting_the_coast_and_the_inner_lands_desc: "Um die Abschottung unserer Küste zu durchbrechen, geben wir den Bau zahlreicher Straßen in Auftrag, die das Landesinnere mit unseren Häfen verbinden. Diese Schnellstraßen vom Reißbrett schlängeln sich durch das Kalksteinherz des Velebit-Gebirges und verfügen über moderne Steinbrücken und Serpentinenkurven, auf denen auch schwere Wagen Platz haben. Die Straßen verwandeln unsere Küste von einer öden Grenzregion in eine wichtige Wirtschaftsader, sodass Holz und Getreide aus dem Inland auf die internationalen Märkte kommen können. Indem wir das Berghinterland direkt mit der Adria verbinden, vollenden wir die territoriale Zusammenfügung der Nation und läuten ein neues Zeitalter des Handels ein, der über das Velebit-Gebirge hinausreicht."
 svn_the_slavonian_grenadier_regiments: "Slawonische Grenadierregimenter"
 svn_the_slavonian_grenadier_regiments_desc: "Unsere Infanterieeinheiten wurden zu Elite-Grenadierregimentern umstrukturiert, die auf dem gesamten Kontinent für ihre Statur, ihre rigorose Disziplin sowie ihre unerschütterliche Tapferkeit im Gefecht bekannt sind. Diese spezialisierten Stoßtruppen wurden dafür ausgebildet, unter heftigstem Feindfeuer anzugreifen und mit Granaten und Bajonetten die Linien selbst der stärksten Gegner zu durchbrechen. Allein die Anwesenheit dieser „slawonischen Riesen“ auf dem Schlachtfeld dient als mächtige psychologische Waffe, die die Moral der eigenen Truppen stärkt und gleichzeitig bei den Gegnern Angst und Schrecken verbreitet."
 #Dalmatian Shared
 dalmatian_the_maritime_commune_spirit: "Geist maritimer Gemeinden"
 dalmatian_the_maritime_commune_spirit_desc: "Unsere Kultur ist von der Gemeinde geprägt, in der die Ehre jedes Bürgers eng mit dem Ansehen seiner Stadt verbunden ist. Dieser Geist des städtischen Wettbewerbs treibt unsere Bevölkerung an, prächtigere Kathedralen und schnellere Schiffe als ihre Nachbarn zu bauen und so eine Kultur eines tief verwurzelten Lokalpatriotismus und einer hohen Innovationskraft zu schaffen. Diese „Stadtstaat“-Mentalität sorgt dafür, dass sich unsere Bürger stark für ihre örtliche Verwaltung und Verteidigung einsetzen. So entsteht eine außergewöhnlich widerstandsfähige und selbstständige Bevölkerung, die ihre Angelegenheiten selbst regelt, selbst wenn die Zentralregierung fern oder schwach ist."
 dalmatian_the_cult_of_the_local_patron_saint: "Kult der örtlichen Schutzheiligen"
 dalmatian_the_cult_of_the_local_patron_saint_desc: "Jede dalmatinische Stadt ist geprägt von der tiefen Verehrung ihres eigenen Schutzheiliegn: des Heiligen Chrysogonus in Zadar, des Heiligen Domnius in Split, des Heiligen Tryphon in Kotor. Diese Heiligen sind nicht nur religiöse Figuren, sondern die „Gründungsherren“ der jeweiligen Stadt. Ihre Festtage sind die wichtigsten gesellschaftlichen und politischen Ereignisse des Jahres und vereinen alle Bevölkerungsschichten in gemeinsamen Ritualen, die die eigenständige Identität der Stadt stärken. Dieser ausgeprägte Lokalpatriotismus sorgt dafür, dass die dalmatinische Kultur ein Mosaik aus sehr unabhängigen städtischen Identitäten darstellt und es keiner fremden Macht möglich ist, die gesamte Küste kulturell zu dominieren."
 dalmatian_the_guild_of_the_stone_master: "Zunft der Meistersteinmetze"
 dalmatian_the_guild_of_the_stone_master_desc: "Der reichlich vorhandene, knochenweiße Kalkstein der Küste brachte eine Kultur meisterhafter Steinmetze hervor, die den Karst als ihre Leinwand betrachten. Unsere Handwerker entwickelten einen Stil der gotischen Renaissance, der für seine baulichen Innovationen und filigranen Gravuren weltweit bekannt ist. Dies ist nicht bloß Kunst: Es ist ein sichtbares Zeugnis unserer Beständigkeit. Indem unsere Bevölkerung jede Kirche, jeden Palast und jede Stadtmauer aus örtlichem Gestein errichtet, schafft sie eine Landschaft, die sowohl schön als auch unvergänglich ist. Sie nährt zudem einen Nationalstolz, der die dalmatinische Stadt als heiliges, ewiges Denkmal unserer Kunstfertigkeit sieht, das kein Seereich jemals auszulöschen vermag."
 dalmatian_the_high_chancery_style: "Hochkanzlei-Stil"
 dalmatian_the_high_chancery_style_desc: "Das dalmatinische Patriziat folgt dem Beispiel seiner Gegenstücke auf der Italienischen Halbinsel und verwendet „Hochdalmatinisch“ für private Korrespondenz und diplomatische Register. Diese kulturelle Abkehr vom mittelalterlichen Latein hin zur verfeinerten Volkssprache verbindet die Küstenstädte mit dem Herzen der italienischen Renaissance. Diese gemeinsame sprachliche Ästhetik schafft eine nahtlose intellektuelle Brücke zum venezianischen #italic Studio#! und ermöglicht es dalmatinischen Dichtern und Juristen, an den exklusivsten humanistischen Kreisen Italiens teilzunehmen. Diese „sprachliche Verfeinerung“ gewährleistet, dass unsere Diplomaten an jedem westlichen Hof als kulturell ebenbürtig gelten und einen diplomatischen Schutzschild bilden, der auf einer gemeinsamen Kultur und nicht auf roher militärischer Stärke beruht."
 dalmatian_the_accademia_degli_oziosi: "Accademia degli Oziosi"
 dalmatian_the_accademia_degli_oziosi_desc: "Nach dem Vorbild italienischer Literaturakademien gründeten die Intellektuellen unserer Städte Gesellschaften wie die #italic Accademia degli Oziosi#!, um Physik, Astronomie und klassische Dichtung zu diskutieren. Diese vermeintlich „müßigen“ Gelehrten sind alles andere als das: Sie dienen den Marineadmirälen als wissenschaftliche Berater und wenden den neuen barocken Rationalismus auf Kartografie und Ballistik an. Diese kulturelle Institutionalisierung der Neugierde sorgt dafür, dass die dalmatinischen Städte die „wissenschaftlichen Wachtürme“ der Adria bleiben und die Küste als Zentrum der europäischen Aufklärung bewahren, während das Inland des Balkans in traditionalistischen Kreisläufen verharrt."
 dalmatian_mediterranean_cosmopolitanism: "Mediterranes Weltbürgertum"
 dalmatian_mediterranean_cosmopolitanism_desc: "Jahrhunderte des Seehandels und der Zweisprachigkeit brachten eine kosmopolitische Kultur hervor, in der sich unsere Bevölkerung in jedem Hafen von Venedig bis zur Levante zu Hause fühlt. Diese kulturelle Offenheit ermöglicht es uns, die besten Ideen aus aller Welt aufzunehmen und anzupassen und so eine einzigartig flexible und widerstandsfähige Gesellschaft zu schaffen. Unsere Bevölkerung sind „Bürger des Meeres“ mit einer Weltsicht, die weit über die des Binnenlandes hinausgeht. Dieser weltoffene Geist sorgt dafür, dass die dalmatinische Kultur lebendig und wirtschaftlich erfolgreich bleibt und als „Tor zur Welt“ für die gesamte Balkanhalbinsel dient."
 #Dalmatian Unique
 dal_comune_privileges: "Comunes-Privilegien"
 dal_comune_privileges_desc: "Um die Treue der Küstenstädte gegenüber venezianischen Übergriffen zu sichern, gewähren wir Privilegien, die die innere Autonomie und die Anwendung lateinischer Gesetze auf diese #italic Comunes#! (einer Verwaltungseinheit) garantieren. Indem wir es diesen Städten erlauben, ihre eigenen Vorsteher zu wählen und ihre örtlichen Steuern selbst zu verwalten, schaffen wir eine treue städtische Klasse, die uns als Beschützer und nicht als Unterdrücker betrachtet. Diese dezentrale städtische Verteidigung gewährleistet, dass die Küste einen Flickenteppich treuer, befestigter Gemeinden bildet, die Seeangriffen standhalten können und so Küste und Hinterland miteinander verbinden."
 rag_the_statute_of_1272: "Statuten von 1272"
 rag_the_statute_of_1272_desc: "Um ein stabiles Umfeld für Investitionen aus dem Ausland zu gewährleisten, kodifizierte Ragusa seine Gesetze in einem umfassenden Rechtsrahmen, der Eigentumsrechte und Seerecht definiert. Durch die Beschneidung der Macht einzelner Adliger und die Einrichtung des #italic Consilium Rogatorum#! schaffen wir ein berechenbares Handelsumfeld, das die wohlhabendsten Händler des Mittelmeers anzieht. Diese Rechtssicherheit ermöglicht es einem kleinen Stadtstaat, weit über seine Verhältnisse hinaus Einfluss zu nehmen und einen felsigen Ort in ein Refugium der #italic Libertas#! zu verwandeln, das kein Feudalherr leicht untergraben oder missachten kann."
 dal_the_union_of_the_two_souls: "Einheit zweier Seelen"
 dal_the_union_of_the_two_souls_desc: "Die dalmatinische Kultur entwickelte sich zu einer wahrhaft zweisprachigen Gesellschaft, in der Latein die Sprache des Rechts und Slawisch die Sprache der Gefühle ist. Diese sprachliche Geschmeidigkeit ermöglicht es unserem Volk, sich mühelos in den komplexen gesellschaftlichen Schichten der Renaissance-Adria zu bewegen. Durch die Beherrschung beider Sprachen werden unsere Händler und Seeleute zu unverzichtbaren Vermittlern für den gesamten Handel zwischen den italienischen Stadtstaaten und dem slawischen Hinterland. Diese Zweisprachigkeit schafft eine Kultur einer „dalmatinischen Brücke“, die auf einzigartige Weise an den länderübergreifenden Handel und die Diplomatie angepasst ist und sicherstellt, dass unser Volk stets im Zentrum des Mittelmeerhandels steht."
 rag_the_lazzaretto_system: "Lazzaretto-System"
 rag_the_lazzaretto_system_desc: "Angesichts wiederkehrender Verheerungen durch den Schwarzen Tod führte Ragusa auf den Inseln Mrkan und Bobara das weltweit erste obligatorische Quarantänesystem für Seeschiffe ein. Durch die „Quaranta“, eine vierzigtägige Isolation ankommender Besatzungen und Güter, schützen wir unsere Stadtbevölkerung und erhalten gleichzeitig die Funktionsfähigkeit unseres Hafens aufrecht, während andere Mittelmeerhäfen von der Seuche lahmgelegt werden. Dieser wissenschaftliche Ansatz im Bereich der öffentlichen Gesundheit gewährleistet, dass die Republik ein zuverlässiger und sauberer Anlaufhafen bleibt und unsere Arbeitskräfte und Handelsnetze selbst in den blutigsten Zeiten der europäischen Geschichte geschützt sind."
 dal_the_soldato_dalmantine: "Dalmatinische Soldati"
 dal_the_soldato_dalmantine_desc: "Während wir unsere Herrschaft festigen, machten wir unsere Bevölkerung zum „Schwert der Nation“. Unsere Männer werden in Elite-Regimentern der #italic Schiavoni#! (Slawen) rekrutiert und dienen als schwere Infanterie an vorderster Front in unseren Kriegen. Dieser Militärdienst bietet unserem Volk eine professionelle Ausbildung und einen Einblick in die neuesten europäischen Kriegstechniken, was eine Kultur von Berufssoldaten entstehen lässt. Auch wenn unsere Städte an wirtschaftlicher Bedeutung verlieren mögen, werden unsere Männer zu den angesehensten Kriegern im Mittelmeerraum und gewährleisten so, dass unsere militärische Tradition auch unter fremder Herrschaft ungebrochen bleibt."
 rag_the_arsenal_expansion: "Arsenal-Erweiterung"
 rag_the_arsenal_expansion_desc: "Unsere Werften sind berühmt für den Bau der #italic Argosy#!, gewaltiger Karacken, die den Atlantik und den Indischen Ozean bezwingen können. Durch die Standardisierung unserer Schiffbautechniken und die Verwendung hochwertigen Eichenholzes aus den bosnischen Wäldern stellen wir sicher, dass die Handelsmarine von Ragusa technologisch führend an der Adria ist. Diese Schiffe sind auf maximale Ladekapazität und Verteidigungskraft ausgelegt und ermöglichen es unseren Händlern, die Gewürz- und Seidenstraßen zu beherrschen und in jedem wichtigen Hafen von London bis Goa die Flagge des Heiligen Blasius zu hissen."
 dal_adriatic_oak_galleys: "Adriatische Eichengaleeren"
 dal_adriatic_oak_galleys_desc: "In Anbetracht der zunehmenden Gefahren im Mittelmeer gaben wir eine neue Klasse schwerer, mit Eichenholz verstärkter Ruderschiffe in Auftrag, die in unseren besten Werften gebaut werden. Durch die Verwendung des eisenharten Holzes der Küstengebirge halten diese Schiffe auch schwereren Breitseiten stand und sind auf Fahrten in den flachen, felsigen Karstbuchten ausgelegt, in denen große venezianische Galeeren scheitern. Diese Überlegenheit ermöglicht es uns, unsere eigenen Gewässer zu sichern und unsere Küsten gegen jeden Feind zu verteidigen."
 rag_the_collegium_ragusinum: "Collegium Ragusinum"
 rag_the_collegium_ragusinum_desc: "Um unseren Status als Zentrum der Bildung zu bewahren, gründeten wir das #italic Collegium Ragusinum#!, eine von Jesuiten geleitete Hochschule, die adelige Söhne aus dem Balkan und Italien anzieht. Indem wir hochgebildete Diplomaten, Wissenschaftler und Dichter ausbilden, stellen wir sicher, dass Ragusa an den Höfen Europas stets eine führende Rolle einnimmt. Diese intellektuelle Investition verwandelt unsere kleine Stadt in ein Zentrum der Kultur, in dem die Verschmelzung lateinischer Logik und slawischer Lebensart jene Gelehrten hervorbringt, die die kulturelle Erneuerung der gesamten Adriaküste prägen werden."
 dal_morlach_frontier_levies: "Morlaken-Grenzaufgebote"
 dal_morlach_frontier_levies_desc: "Wir gliederten die Morlaken, kampferprobte walachische und slawische Hirten des Hinterlandes, in eine ständige Militärreserve ein. Diesen irregulären Soldaten werden im Gegenzug für ihre ständige Einsatzbereitschaft Landrechte gewährt, damit sie als Augen und Ohren der Nation dienen. Ihre umfassenden Kenntnisse der Karstlandschaft ermöglichen es uns, Hinterhalte und nächtliche Angriffe durchzuführen, die die Logistik des Feindes lahmlegen. So entsteht im dalmatinischen Hinterland eine Kultur der „Nation unter Waffen“, in der die Grenze zwischen Zivilisten und Soldaten im Namen unserer Verteidigung vollständig verschwimmt."
 rag_the_ragusan_porto_franco: "Ragusischer Porto Franco"
 rag_the_ragusan_porto_franco_desc: "Angesichts der eskalierenden Kriege zwischen unseren Nachbarn erklärten wir unsere Stadt zum strikt neutralen #italic Porto Franco#! (Freihafen). Indem wir fremden Kriegsschiffen die Aufnahme verweigern und gleichzeitig allen Handelsschiffen hochwertige Reparaturen und Lagerplätze anbieten, stellen wir sicher, dass der Streit lediglich unseren Gewinn steigert. Diese „wirtschaftliche Blockfreiheit“ macht Ragusa zum einzigen sicheren Hafen in einem Flammenmeer. So übernehmen wir jene Handelsrouten, die unsere Rivalen in ihrem Streben nach militärischem Ruhm aufgaben."
 dal_dalmatian_olive_pacts: "Dalmatinischer Olivenpakt"
 dal_dalmatian_olive_pacts_desc: "Wir stellten unsere Wirtschaft auf eine intensive Landwirtschaft um und nutzen dabei das Klima der dalmatinischen Küste. Durch staatlich überwachte „Agrarpakte“ machten wir die Küstenhügel für den großflächigen Anbau urbar und verwandelten unser raues Land in einen grünen Ausfuhrgarten. Diese wirtschaftliche Diversifizierung verringert unsere Abhängigkeit vom Seehandel und erschließt dem Küstenadel eine neue Einnahmequelle, die den Bau prächtiger Sommervillen und Stadttheater finanziert, welche denen des italienischen Festlandes in nichts nachstehen."
 rag_the_ragusan_maritime_insurance_code: "Ragusischer Seeversicherungskodex"
 rag_the_ragusan_maritime_insurance_code_desc: "Wir stiegen von der reinen Schifffahrt in die Welt der Hochfinanz auf, indem wir eines der ersten ausgefeilten Systeme der Seeversicherung formalisierten. Durch die Bündelung der Risiken unserer Kaufmannsfamilien im Rahmen des #italic Monte di Pietà#! ermöglichen wir es unseren Kapitänen, mit minimalem persönlichen Risiko kühne neue Reisen nach Amerika und Fernost zu unternehmen. Diese Finanzinnovation stellt sicher, dass das Kapital von Ragusa stets in Bewegung bleibt und einen sich selbst erhaltenden Wohlstandskreislauf schafft, der unsere Stadt auch dann wohlhabend und relevant hält, wenn die traditionellen Mittelmeerhandelsrouten an Bedeutung verlieren."
 #Frankokratia Shared
 frankokratia_frankokratia_advance: "Frankokratie"
 frankokratia_frankokratia_advance_desc: "Die ursprüngliche Teilung des Byzantinischen Reiches im Jahr 1204 bildet weiterhin unsere rechtliche Grundlage und verleiht uns dauerhafte, göttlich legitimierte Ansprüche auf die Überreste der griechischen Welt. Wir betrachten uns nicht als Eroberer, sondern als die rechtmäßigen Erben jener Lehen, die unseren Vorfahren vom lateinischen Kaiser und dem venezianischen Dogen zugeteilt wurden. Diese Rechtssicherheit erlaubt es uns, eine unerbittliche Politik der Expansion und der Rückeroberung gegen alle örtlichen Fürsten zu verfolgen, die unsere feudale Oberherrschaft nicht anerkennen."
 frankokratia_synthesized_levies_advance: "Hybridaufgebote"
 frankokratia_synthesized_levies_advance_desc: "Um trotz erdrückender Übermacht die Herrschaft zu behalten, verbanden wir das örtliche #italic Prónoia#!-System (die Vergabe von Land im Austausch für einen Militärdienst) mit der westlichen Tradition des Rittertums. So entstand die hybride Kriegerklasse der #italic Latinikon#!, deren Mitglieder der lateinischen Krone treu ergeben, aber zugleich mit dem rauen griechischen Gelände und den östlichen Taktiken bestens vertraut sind. Diese Soldaten vereinen die Wucht des fränkischen Angriffs mit jener Ausdauer und jenen Fähigkeiten im Scharmützelkampf, die zur Verteidigung der Balkangrenzen erforderlich sind."
 frankokratia_union_of_the_soul_advance: "Einigkeit der Seele"
 frankokratia_union_of_the_soul_advance_desc: "Durch die Einsetzung eines lateinischen Patriarchen, der die altgriechische Liturgie und den julianischen Kalender respektiert und gleichzeitig den päpstlichen Suprematismus anerkennt, überbrücken wir das Große Schisma innerhalb unserer Grenzen. Dieser #italic unierte#! Kompromiss stabilisiert das Reich, indem er es der griechischen Bauernschaft ermöglicht, ihre angestammten Riten zu bewahren, während die städtische Elite an Rom gebunden bleibt. Er neutralisiert wirksam die Gefahr religiöser Aufstände und liefert eine theologische Rechtfertigung für unsere fortgesetzte Herrschaft über die orthodoxen Kerngebiete."
 frankokratia_levantine_trades_advance: "Levante-Handel"
 frankokratia_levantine_trades_advance_desc: "Jahrhundertelanges Leben an der Schnittstelle von Ost und West lehrte unsere Händlerschicht, sich auch in den kompliziertesten Handelsnetzen zurechtzufinden: von der Seidenstraße bis zu den Gewürzmärkten der Levante. Wir dienen als unverzichtbare Vermittler zwischen dem rohstoffreichen Schwarzen Meer und den Produktionszentren Westeuropas – und wir profitieren von jedem Austausch, der über unsere Häfen abgewickelt wird. Unsere Kaufleute verhandeln ebenso gern mit Ägyptern wie mit flämischen Webern und sorgen so dafür, dass unsere Häfen stets gut besucht sind."
 frankokratia_the_frankish_greek_symbiosis_advance: "Fränkisch-griechische Symbiose"
 frankokratia_the_frankish_greek_symbiosis_advance_desc: "Mit der Endentwicklung unserer Staaten entsteht eine herrschende Schicht, die kulturell #italic lateinisch#! geprägt ist (in ihrer Ritterlichkeit und ihrem Glauben), aber sprachlich und gesellschaftlich in die griechische Bevölkerung eingeliedert wurde. Indem wir Mischehen und die Übernahme örtlicher Bräuche durch den niederen Adel förderten, beendeten wir die Ära der Fremdherrschaft und schufen eine einheitliche nationale Identität. Diese #italic griechisch-lateinische#! Kultur ist ihrer Heimat zutiefst verbunden und vereint das Beste des westlichen Feudalismus mit der Widerstandsfähigkeit des griechischen Geistes."
 frankokratia_the_latin_enlightenment_advance: "Lateinische Aufklärung"
 frankokratia_the_latin_enlightenment_advance_desc: "Das jahrhundertelange Ringen gipfelte in einer einzigartigen osteuropäischen Aufklärung, in der der Kreuzfahrergeist einem rationalistischen, kaiserlichen Streben nach Ordnung wich. Die Staaten Frankokratiens sind keine „Kreuzfahrer-Außenposten“ mehr, sondern ein hoch entwickelter, geeinter Machtblock, der westliche Technologie mit östlicher strategischer Tiefe vereint. Wir sind zur entscheidenden Brücke zwischen den Zivilisationen geworden, zu einem „Dritten Weg“, der weder rein westlich noch rein byzantinisch ist, sondern etwas völlig Neues."
 #Frankokratia Unique
 ach_assizes_of_romania_advance: "Assisen von Romanien"
 ach_assizes_of_romania_advance_desc: "Die Feudalgesetze des fränkischen Ostens zählen zu den ausgefeiltesten der katholischen Welt. Sie wurden kodifiziert, um ein komplexes Geflecht griechischer Leibeigener und französischer Lehnsherren zu regeln. Diese #italic Assisen#! bilden einen klaren Rechtsrahmen für Landstreitigkeiten, Erbschaften und militärische Verpflichtungen. So gewährleisten sie, dass die gesellschaftliche Ordnung selbst in Kriegszeiten ungebrochen bleibt. Die strikte Einhaltung dieser Gesetze verhindert jene inneren Spaltungen, die die ersten Kreuzfahrerstaaten vernichteten, und schaffen ein festes Fundament für die Herrschaft."
 arg_the_peloponnesian_diplomatic_hub_advance: "Diplomatischer Knotenpunkt des Peloponnes"
 arg_the_peloponnesian_diplomatic_hub_advance_desc: "Da Argos der neutralste und sicherste Hafen des Peloponnes ist, entwickelte er sich zum bevorzugten Treffpunkt der Botschafter der lateinischen Staaten. Wir richteten ein dauerhaftes „Diplomatenviertel“ ein, in dem Verträge ausgehandelt und Bündnisse zwischen den fränkischen Fürsten und den Großmächten geschmiedet werden. Diese Rolle als regionaler Vermittler verleiht uns landesübergreifenden Einfluss und schützt uns vor einer Annektierung durch unsere größeren Nachbarn."
 ath_the_catalan_company_advance: "Katalanische Kompanie"
 ath_the_catalan_company_advance_desc: "Nachdem sie vom byzantinischen Kaiser angeheuert und anschließend verraten wurde, wandte sich die wilde Katalanische Großkompanie gegen ihre ehemaligen Auftraggeber und vernichtete 1311 den fränkischen Herzog Walter V. von Brienne in der Schlacht am Kephissos. Sie rissen die Kontrolle über das Herzogtum Athen an sich und begründeten eine Phase katalanischer Herrschaft. Diese kampferprobten Almogàver brachten eine rücksichtslosere Söldnermentalität in die griechischen Angelegenheiten ein, befestigten wichtige Festungen weiter, forderten Tribut in der Umgebung ein und sicherten ihre Macht durch ein Zusammenspiel aus Schrecken und disziplinierten Infanterietaktiken. Innerer Aufruhr und das Eingreifen Aragons verschoben allerdings die Macht schließlich wieder hin zu einem gewöhnlicheren Feudalsystem."
 bod_guardians_of_thermopylae_advance: "Wächter der Thermopylen"
 bod_guardians_of_thermopylae_advance_desc: "Unser Lehen liegt auf dem berühmtesten Pass der Geschichte, und wir haben die Lehren des Leonidas beherzigt, indem wir die Bergpfade mit fränkischem Stein befestigten. Jeder schmale Pfad ist eine Todesfalle für Angreifer, und jede Felswand bietet unseren Bogenschützen und Kundschaftern einen Aussichtspunkt. Durch Bodonitas zu reisen, bedeutet, einen Spießrutenlauf aus Stahl zu überstehen. So bleibt das Herz Griechenlands vor Bedrohungen aus dem Norden geschützt."
 cep_cephalonian_raids_advance: "Kefalonische Überfälle"
 cep_cephalonian_raids_advance_desc: "Die Herrscher von Kefalonien und Zante haben eine lange Tradition der Überfälle auf alle feindlichen Schiffe entwickelt, die töricht genug sind, sich ohne Schutz ionischen Gewässern zu nähern. Diese Überfälle von Inseln aus sorgten durch Plünderungen und Lösegelder für beträchtlichen Reichtum, während sie zugleich die Marinelogistik unserer Feinde in der westlichen Ägäis schwächten. So erlangte die winzige Gemeinde eine Schlagkraft, die ihr eigentliches Gewicht bei Weitem übersteigt, und bewahrte sich ihre Unabhängigkeit."
 crt_the_trapete_of_messara_advance: "Trapeten von Messara"
 crt_the_trapete_of_messara_advance_desc: "Wir bauten den Anbau von Zuckerrohr auf der fruchtbaren Messara-Ebene weiter aus und errichteten fortschrittliche wasserbetriebene Mühlen (Trapeten) zur Veredlung. Kretischer Zucker ist ein Luxusgut, das an den Höfen Europas sehr beliebt ist und direkt mit den Erzeugnissen der Levante konkurriert. Dieser Ackerbau im industriellen Maßstab bietet der Krone Gold, das sie zur Finanzierung ihrer Vorherrschaft auf See braucht."
 lat_emperor_latins_advance: "Kaiser der Lateiner"
 lat_emperor_latins_advance_desc: "Mit der Vereinigung der #italic Frankokratie#! unter unserer Herrschaft vermischt unser Hof nun sorgsam die strengen, kriegerischen Feudalhierarchien der französischen und okzitanischen Tradition mit dem alten, kunstvollen Zeremoniell der Griechen. Durch die Annahme der purpurnen Gewänder und der Würde des Ostens sichern wir uns den spirituellen Respekt unserer griechischen Untertanen und bewahren gleichzeitig die ritterliche Treue unserer westlichen Ritter. Diese Synthese verwandelt den Kaiser von einem bloßen fremden Eroberer in einen legitimen Nachfolger Konstantins, vom Papst anerkannt und von unseren Feinden gefürchtet."
 nax_sanudos_isles_advance: "Sanudos Inseln"
 nax_sanudos_isles_advance_desc: "Marco I. Sanudo, ein venezianischer Adliger, der am Vierten Kreuzzug teilnahm, eroberte 1207 die Kykladen und gründete das Herzogtum Naxos. Er schuf einen maritimen Feudalstaat, dessen Lehnsherren von befestigten Inselzitadellen aus regierten und sich ihre Einkünfte durch Handel, Piraterieverfolgung und die fruchtbaren Täler von Naxos, Paros und Santorin sicherten. Dank der Verbindung des venezianischen Geschäftssinns mit einer fränkischen Feudalstruktur konnte die Sanudo-Dynastie ein halbautonomes Herzogtum bewahren, das als wichtiges Bindeglied im lateinischen Handelsnetz diente. Es schützte Schifffahrtswege, erhob Zölle und bot den Schiffen der Kreuzfahrer, Genuesen und Venezianer gleichermaßen sichere Häfen."
 neg_negropontine_navarchy_advance: "Negropontinische Navarchie"
 neg_negropontine_navarchy_advance_desc: "Die Triarchen von Negroponte teilten die Herrschaft über die lang gestreckte Insel unter drei Familien auf, konnten aber dennoch eine einheitliche Marinepolitik aufrechterhalten. So beherrschten sie die schmale Meerenge von Euripos und konnten von jedem Schiff, das zwischen der Ägäis und den nördlichen Häfen verkehrte, Zölle erheben. Ihre Galeeren, bemannt mit einer Mischung aus fränkischen Rittern, griechischen Seeleuten und italienischen Söldnern, patrouillierten mit rücksichtsloser Effizienz und machten Negroponte zu einem der reichsten und strategisch wichtigsten Außenposten des Frankenreichs."
 neo_neopatras_fortresses_advance: "Neopatras-Festungen"
 neo_neopatras_fortresses_advance_desc: "Im gebirgigen Grenzgebiet Südthessaliens errichteten und verstärkten die Herren von Neopatras – zunächst Brienner, später Aragonesen – eine der gewaltigsten Burganlagen im fränkischen Griechenland und machten die antike Stadt zu einer nahezu uneinnehmbaren Festung, die wiederholten Belagerungen ihrer Feinde standhielt. Diese hoch aufragenden Mauern, tiefen Gräben und geschickt angelegten Außenwerke wurden zum Symbol lateinischer Beharrlichkeit und ermöglichten es einer kleinen, aber entschlossenen Garnison, ihren Einfluss tief nach Mittelgriechenland auszudehnen und den Vormarsch feindlicher Mächte nach Norden über Generationen hinweg aufzuhalten."
 pat_the_church_state_of_saint_andrew_advance: "Kirchenstaat Sankt Andreas"
 pat_the_church_state_of_saint_andrew_advance_desc: "Als spirituelles Zentrum der Frankokratie entwickelte sich Patras zu einem unabhängigen Kirchenstaat, vergleichbar den Fürstbistümern des Heiligen Römischen Reiches. Der Erzbischof führt sowohl Hirtenstab als auch Schwert und regiert seine Ländereien durch eine #italic Verteidigungssynode#!, die religiöses Recht mit feudaler Militärpflicht verbindet. Dieser einzigartige Status erlaubt es uns, die Bauernschaft durch religiösen Eifer zu mobilisieren und jedes Grenzgefecht als örtlichen Religionskrieg zu betrachten."
 sao_salonas_stance_advance: "Salonas Haltung"
 sao_salonas_stance_advance_desc: "Die Bergfürsten von Salona, die rund um die antike Stätte von Delphi thronen und die strategischen Pässe nach Mittelgriechenland kontrollieren, bewahren sich ihre wilde Unabhängigkeit durch ein Zusammenspiel aus rauem Gelände, robusten Befestigungsanlagen und einer kriegerischen Tradition, die Kämpfer aus ganz Frankokratien anzieht. Während größere Staaten in sich zusammenbrechen, trotzen die Herren von Salona immer wieder ihren Feinden und machen ihr Hochlandlehen zu einem sicheren Zufluchtsort des lateinischen Rittertums in Griechenland und zu einem ständigen Ärgernis für jede Macht, die die Region zwischen dem Golf von Korinth und dem Spercheios-Tal beherrschen will."
 the_the_thessalonican_crown_advance: "Krone von Thessaloniki"
 the_the_thessalonican_crown_advance_desc: "Bonifatius von Montferrat wurde 1204 zum König von Thessaloniki gekrönt und gründete ein nördliches lateinisches Königreich, das die strategisch wichtige Via Egnatia und weite Teile Makedoniens kontrollierte. So entstand ein wohlhabendes und bedeutendes Reich, dessen Hauptstadt zu einem glanzvollen Zentrum des fränkischen Hoflebens, des italienischen Handels und des friedlichen Zusammenlebens von orthodoxen und katholischen Christen unter lateinischer Herrschaft wurde. Obwohl das Königreich wiederholt von Feinden bedroht wurde, bewahrten die Barone eine stolze militärische Tradition und eine blühende Wirtschaft, die auf Getreide-, Wein- und Fernverkehr beruhte. So blieb Thessaloniki eines der strahlendsten Juwele der Frankokratie."
 ach_morean_silk_advance: "Moreische Seide"
 ach_morean_silk_advance_desc: "Der Peloponnes ist nach wie vor das Herzstück der europäischen Seidenherstellung und ein Erbe der byzantinischen Ära, das die fränkischen Fürsten durch staatlich geförderte Maulbeerplantagen massiv ausbauten. Durch die Kontrolle strategischer Häfen können wir die hohen Preise persischer und chinesischer Importe unterbieten und Achaia zum Hauptlieferanten für die Schneider von Florenz und Lyon machen. Dieses Monopol sichert uns einen stetigen Strom an #italic weichem Gold#!, mit dem wir unsere Söldner und die Befestigung unserer Gebirgspässe finanzieren."
 arg_the_heraldry_of_the_brienne_advance: "Wappenkunde der Brienne"
 arg_the_heraldry_of_the_brienne_advance_desc: "Da das Haus Brienne Anspruch auf Jerusalem und Zypern erhebt, entwickelte sich Argos zu einem Zentrum ‚ritterlicher Ahnenforschung‘. Ritter aus dem ganzen Westen kommen hierher, um ihre Abstammung zu beweisen oder Titel im Umfeld der Kreuzfahrer zu erlangen. Dieser ständige Zustrom hochwohlgeborener Abenteurer sorgt für einen stetigen Vorrat an begabten Offizieren für unsere örtlichen Truppen."
 ath_thebes_textiles_advance: "Tuche aus Theben"
 ath_thebes_textiles_advance_desc: "Die Werkstätten von Theben waren schon in byzantinischer Zeit für ihre Seidenwebereien berühmt, doch unter fränkischer Herrschaft erlebten sie eine neue Blütezeit: Die Herzöge von Athen ermutigten italienische Kaufleute in Webstühle, Färbereien und Ausfuhrunternehmungen zu investieren. So kamen thebanischer Samt und Seide auf Märkte von Brügge bis Alexandria. Dieses Aufleben der Herstellung von Luxusstoffen verbunden mit den fruchtbaren Ebenen Böotiens, die Rohstoffe lieferten, sorgten für einen beträchtlichen Reichtum, der den Bau von Burgen, ritterliche Gefolgschaften und den verschwenderischen Lebensstil des athenischen Hofes finanziert. Das Herzogtum blieb so eines der reichsten und wirtschaftlich fortschrittlichsten Gebiete der gesamten Frankokratie."
 bod_the_curia_of_the_three_keys_advance: "Kurie der drei Schlüssel"
 bod_the_curia_of_the_three_keys_advance_desc: "Um den durch die Wiederbelebung der nördlichen Handelsrouten errungenen Reichtum zu verwalten, richtete die Markgrafschaft die #italic Kurie der drei Schlüssel#! ein. Die Staatskasse und das Rechtsarchiv befinden sich in der Zitadelle von Bodoniza und sind nur mit drei separaten Schlüsseln zugänglich: dem des Markgrafen, dem des lateinischen Bischofs und dem eines Vertreters der örtlichen griechischen Bürger. Dieses einfache, aber effektive System der Gewaltenteilung verhindert die Veruntreuung, die kleine Feudalstaaten oft heimsucht, und stellt sicher, dass die hohen Zölle an den Thermopylen tatsächlich für den Ausbau der Festungsmauern verwendet werden."
 cep_ionian_sea_wall_advance: "Ionischer Seewall"
 cep_ionian_sea_wall_advance_desc: "Als Herren von Kefalonien, Zakynthos und Ithaka sitzen wir am Schnittpunkt von Adria und Mittelmeer und bilden die erste Verteidigungslinie Italiens. Unsere Marinestrategie konzentriert sich darauf, Feinden den Zugang zu verwehren: Mit schweren Befestigungen und schnellen Aufklärungsschiffen verhindern wir, dass der Feind überhaupt an den Ionischen Inseln anlegen kann. Wir sind die Wächter des Westens, und keine Flotte dringt ohne unsere stillschweigende Zustimmung in die Adria ein."
 crt_the_galley_assembly_line_of_suda_advance: "Galeerenreihenfertigung von Suda"
 crt_the_galley_assembly_line_of_suda_advance_desc: "Durch die Standardisierung der Bauteile für die Fertigung leichter Galeeren in der Suda-Bucht entwickelten wir eine frühe Form des modularen Schiffbaus. Dies ermöglicht es uns, verlorene Schiffe in einem Bruchteil der Zeit und zu einem Bruchteil der Kosten anderer Mittelmeermächte zu ersetzen. In Candia gebaute Schiffe sind bekannt für ihre Geschwindigkeit und ihre Fähigkeit, die tückischen Strömungen des Kretischen Meeres zu bewältigen."
 lat_hegemony_over_the_bosphorus_advance: "Hegemonie über den Bosporus"
 lat_hegemony_over_the_bosphorus_advance_desc: "Die Beherrschung der engen Pforten des Schwarzen Meeres ermöglicht es uns, den italienischen Handelsrepubliken, die einst durch Schulden und Seeblockaden unser Schicksal bestimmten, hohe Zölle aufzuerlegen. Der Reichtum des pontischen Getreidehandels und des nördlichen Endpunkts der Seidenstraße fließt nun geradwegs in die Reichskasse statt nach Venedig oder Genua und finanziert unseren Wiederaufbau. Das Goldene Horn wurde von einem Umschlagplatz für fremdländische Händler zum pulsierenden Herzen einer zentralisierten, unabhängigen Wirtschaftsmacht."
 nax_archipelagic_vigil_advance: "Archipelwacht"
 nax_archipelagic_vigil_advance_desc: "Die verstreuten Inseln der Ägäis erfordern die ständige Wachsamkeit ihrer lateinischen Herrscher: Flotten leichter Galeeren müssen Piraten, Plünderer und rivalisierende italienische Seemächte abwehren. Die Herzöge von Naxos und deren Vasallen haben ein ausgeklügeltes System aus Inselgarnisonen, Signalfeuern und schnellen Kurierschiffen entwickelt, das es ihnen erlaubt, rasch auf Bedrohungen im gesamten Archipel zu antworten. Der durch Handelsschutz und Hafengebühren erwirtschaftete Reichtum ermöglicht den Bau robuster Küstenfestungen, die die Kykladen zu einem maritimen Bollwerk und einer der sichersten Regionen Frankokratiens machen."
 neg_the_three_fold_defense_advance: "Dreifaltige Verteidigung"
 neg_the_three_fold_defense_advance_desc: "Die Insel Euböa ist unter drei #italic Terzieri#! oder Triarchen aufgeteilt, wodurch eine geeinte und doch mit sich selbst im Wettbewerb stehende Verteidigungsstruktur entsteht. Sie verhindert, dass ein einzelner Fürst zu schwach wird. Das dreigliedrige System gewährleistet zudem, dass bei der Erstürmung einer Festung die beiden anderen sofort mobilisiert werden und eine redundante und somit widerstandsfähige Militärverwaltung entsteht. Durch ihre innere Rivalität bewahren sich unsere Garnisonen ihre höchste Einsatzbereitschaft, denn kein Triarch möchte von seinen Nebenbuhlern übertrumpft werden."
 neo_the_consulate_of_the_sea_advance: "Konsulat der Meere"
 neo_the_consulate_of_the_sea_advance_desc: "Durch unsere Verbindungen zur Krone von Aragón und den Kaufleuten Barcelonas entwickelte sich Neopatras zum wichtigsten Umschlagplatz für iberische Waren in der Levante. Wir betreiben ein #italic Konsulat der Meere#!, das Rechtsschutz und standardisierte Gewichte für alle katalanischen und spanischen Händler gewährleistet. Diese besondere Beziehung macht Neopatras zum wohlhabendsten Außenposten des westlichen Mittelmeers im Herzen Griechenlands."
 pat_the_pilgrimage_tolls_advance: "Pilgerzölle"
 pat_the_pilgrimage_tolls_advance_desc: "Die vermeintlichen Reliquien des Heiligen Andreas ziehen Tausende katholischer Pilger an, die im Osten Zuflucht suchen. Um sie zu schützen, errichteten wir ein Netzwerk befestigter Hospize. Durch die Erhebung einer geringen Schutzgebühr für Durchreise und Unterkunft kann das Erzbistum den Unterhalt einer ständigen Schar von Kreuzrittermönchen gewährleisten. Diese Gelder verwendet man auch zur Verschönerung der Stadt, wodurch Patras zum „Rom des Ostens“ und zu einem Leuchtfeuer lateinischer Architektur wird."
 sao_the_parnassus_mines_advance: "Minen des Parnassus"
 sao_the_parnassus_mines_advance_desc: "Tief in den schroffen Bergen unseres Fürstentums liegen Metalladern, die seit den Tagen des Orakels von Delphi in Vergessenheit gerieten. Durch die Anwerbung sächsischer Bergbaufachleute und die Nutzung westlicher Schmelztechnologie machten wir den #italic Berg der Musen#! zu einem Zentrum der Schwerindustrie. Der Reichtum aus diesen Minen ermöglicht es den Herren von Salona, einen Hof zu unterhalten, der an Eleganz und Macht mit den Herzögen von Athen wetteifert."
 the_the_fair_of_saint_demetrios: "Messe des Heiligen Demetrios"
 the_the_fair_of_saint_demetrios_desc: "Wir bauten den alten religiösen Jahrmarkt zu einer riesigen landesübergreifenden Handelsmesse aus, die das Balkan-Hinterland mit den Seewegen des Mittelmeers verbindet. Durch die Gewährung sicheren Geleits für Händler entwickelte sich Thessaloniki zum wichtigsten Handelsplatz für Pelz, Getreide und westliche Tuche. Diese wirtschaftliche Dynamik ermöglicht es dem König, den örtlichen Adel zu umgehen, indem er seine Verwaltung durch Verkaufssteuern und Zölle finanziert."
 ach_knights_of_the_peloponnese_advance: "Ritter des Peloponnes"
 ach_knights_of_the_peloponnese_advance_desc: "Unser Adel führt seit Jahrhunderten ständige Grenzscharmützel gegen unsere Feinde, wodurch eine einzigartige Tradition hochbeweglicher Kavallerie entstand. Diese Ritter ließen die schwerfällige Rüstung ihrer französischen Vorfahren hinter sich und tragen nun leichtere Rüstungen und setzen Taktiken ein, die an die steilen, tückischen Berge Griechenlands angepasst sind. So können unsere Truppen die traditionelle schwere Kavallerie ausmanövrieren und die Flanken des Feindes mit verheerender Geschwindigkeit und Genauigkeit angreifen."
 arg_the_gibraltar_of_the_levant_advance: "Gibraltar der Levante"
 arg_the_gibraltar_of_the_levant_advance_desc: "Die hoch über dem Golf von Argos thronende Festung Palamidi wurde zu einem komplexen System aus sieben miteinander verbundenen Festungen ausgebaut, die die gesamte Argolis beherrschen. Durch die Kontrolle dieses „Gibraltars“ bestimmen wir die Bewegungen jeder Flotte, die versucht, ein Heer in der Morea zu versorgen, und machen das Gebiet somit praktisch unbesiegbar zu Land und zu Wasser. Diese strategische Vorherrschaft ermöglicht es uns, unter unseren Nachbarn die Rolle des Königsmachers zu spielen."
 ath_the_parthenon_dukes_advance: "Parthenon-Herzöge"
 ath_the_parthenon_dukes_advance_desc: "Otto de la Roche, der erste Herzog von Athen, errichtete seinen Hof inmitten der Ruinen der Akropolis und verwandelte den antiken Parthenon in eine katholische Kathedrale zu Ehren der Jungfrau Maria. Sein Herzogtum erstreckte sich von Attika bis Böotien. Unter seinen Nachfolgern entwickelte sich das Reich zu einem überraschenden Zentrum des kulturellen Austauschs: Fränkische Ritter förderten griechische Schreiber, italienische Kaufleute trieben Handel in Piräus, und Gelehrte debattierten vor dem Hintergrund prächtiger Marmortempel über Philosophie. So entstand eine unverwechselbare aristokratische Gesellschaft, die sowohl auf ritterliche Tugenden als auch auf die hellenische Vergangenheit Wert legte, welche von westlichen Eroberern so lange missachtet worden war. Wir müssen diesem Hof seinen früheren Glanz zurückgeben."
 bod_the_alpine_skirmishers_advance: "Hochgebirge-Scharmützler"
 bod_the_alpine_skirmishers_advance_desc: "Unser Volk, das in den Felsen des Kallidromos-Gebirges lebt, entwickelte eine Form des leichten Infanteriekampfes, die auf senkrechte Beweglichkeit und den Einsatz der Armbrust setzt. Diese „Bergsteiger des Passes“ können nach einer Salve zwischen den Felsen verschwinden und sind somit nicht mit traditioneller schwerer Infanterie zu bekämpfen. Sie dienen den südlichen Staaten als Augen und Ohren und warnen frühzeitig vor jeglichen Bewegungen aus dem Norden."
 cep_the_currant_trade_advance: "Korinthenhandel"
 cep_the_currant_trade_advance_desc: "Das einzigartige Klima der Ionischen Inseln ermöglicht den großflächigen Anbau der #italic Zakynthos-Korinthe#!, einer luxuriösen Trockenfrucht, die zu einem festen Bestandteil der europäischen Ernährung geworden ist. Durch die Vormachtstellung in Anbau und Ausfuhr dieser Nischenfrucht schufen wir einen spezialisierten Wirtschaftsmotor, der auf recht kleinem Raum gewaltigen Reichtum erzeugt. Die „Korinthenfürsten“ von Kefalonia zählen zu den reichsten Adligen des lateinischen Ostens."
 crt_the_malvasia_wine_export_advance: "Malwasier-Weinexport"
 crt_the_malvasia_wine_export_advance_desc: "Auf den sonnenverwöhnten Hängen des Ida-Gebirges gedeihen die berühmten Malwasier-Trauben, aus denen der begehrtesten Dessertwein der Königshöfe Nordeuropas gewonnen wird. Durch die strenge Regulierung der Güte und die Kennzeichnung jedes ausgeführten Fasses mit dem #italic Siegel des Heiligen Markus#! schufen wir ein lukratives Handelsmonopol, das unsere Seeverteidigung finanziert. Dieses flüssige Gold sichert Candia, selbst als Kolonie, den gewinnträchtigsten Platz im venezianischen Seeimperium."
 lat_the_new_praetorian_guard_advance: "Neue Pätorianergarde"
 lat_the_new_praetorian_guard_advance_desc: "Unsere moderne Garde ging aus der alten Waräger-Tradition hevor, besteht allerdings aus katholischen Berufssöldnern aus ganz Europa, vorwiegend französischen Veteranen und Schweizer Pikenieren. Diese Männer sind dem Kaiser nicht durch Land oder Titel, sondern durch Gold und eine gemeinsame Kreuzfahreridentität verbunden und dienen als eiserne Faust gegen untreue Feudalbarone. Dieses stehende Heer gewährleistet die absolute Durchsetzung des kaiserlichen Willens und bildet ein festes Fundament für die Armee, das nicht den Launen des Hochadels unterworfen ist."
 nax_the_marble_trade_of_paros_advance: "Marmorhandel von Paros"
 nax_the_marble_trade_of_paros_advance_desc: "Mit der steigenden Nachfrage nach bildender Kunst ist auch die Nachfrage nach hochwertigem Marmor aus Paros wieder auf ein Niveau gestiegen, das seit den Zeiten des Augustus nicht mehr verzeichnet wurde. Durch die Wiedereröffnung der antiken Steinbrüche und den Einsatz moderner Ingenieurtechniken verwandelten wir diese geologische Besonderheit in eine wahre Goldgrube, die unsere Vormachtstellung in der Ägäis sichert. Die Paläste in Rom und Paris werden zunehmend mit Steinen von unseren souveränen Inseln erbaut."
 neg_bridgehead_of_the_euripus_advance: "Brückenkopf des Euripus"
 neg_bridgehead_of_the_euripus_advance_desc: "Der schmale Kanal, der unsere Insel vom Festland trennt, ist der strategisch wichtigste Engpass in Mittelgriechenland und wird von unserer massiven Drehbrücke und unseren Wehrtürmen kontrolliert. Durch die Besteuerung des Warenverkehrs zwischen Böotien und der Ägäis verwandelten wir eine geografische Besonderheit in eine stetige Einnahmequelle. Wir kontrollieren alle Truppenbewegungen auf dem Balkan und verlangen dafür einen hohen Preis."
 neo_the_great_companys_code_advance: "Kodex der Großen Kompanie"
 neo_the_great_companys_code_advance_desc: "Die Nation wird weiterhin von den demokratisch-militärischen Traditionen der Katalanischen Kompanie regiert, in der Offiziere gewählt und die Kriegsbeute geteilt wird. Diese egalitäre Struktur schafft eine Armee mit außerordentlich hoher Moral, da jeder Soldat ein persönliches Interesse am Überleben des Staates besitzt. Während der Rest Europas dem Absolutismus entgegenstrebt, bleibt unsere „Soldatenrepublik“ eine unerschütterlich treue und geschlossene Kampftruppe."
 pat_uniate_liturgical_printing_advance: "Unierter Liturgiedruck"
 pat_uniate_liturgical_printing_advance_desc: "Um dem Einfluss der orthodoxen Welt entgegenzuwirken, gründete der Erzbischof die erste griechischsprachige katholische Druckerei auf dem Peloponnes. Wir stellen Bibeln und liturgische Texte in griechischer Sprache her, die aber dem lateinischen Dogma entsprechen. So gewinnen wir nach und nach den „Krieg des Wortes“ unter den gebildeten griechischen Bevölkerungsschichten. Diese kulturelle Offensive verringert das Risiko von Aufständen und gliedert die griechische Bevölkerung in die lateinische Gesellschaftshierarchie ein, ohne sie ihrer sprachlichen Identität zu berauben."
 sao_the_asceticism_of_the_crissaean_crags_advance: "Askese der krisäischen Kluften"
 sao_the_asceticism_of_the_crissaean_crags_advance_desc: "Der Boden Salonas ist karg und bietet den Bewohnern im Schatten der Gipfel abgesehen von Bergkräutern kaum Nahrung. Das Leben in dieser zerklüfteten Landschaft brachte eine Bauernschaft und einen Ritterstand hervor, die gleichermaßen für ihre Unempfindlichkeit gegenüber Hunger und Entbehrungen bekannt sind. Unsere Soldaten brauchen nur die Hälfte der Rationen eines fränkischen Waffenknechts und sind schlank und ausdauernd wie Wölfe. So können sie jeden Gegner im Marsch und Aufstieg überflügeln. Auf den hohen Pässen von Phokis ist der Magen leicht, doch der Wille so unnachgiebig wie der Berg selbst."
 the_the_lombard_guard_advance: "Lombardische Garde"
 the_the_lombard_guard_advance_desc: "Als Bollwerk in Mazedonien belebte das Königreich sein Erbe wieder, indem es lombardische und norditalienische Pioniere mit der Modernisierung seiner Verteidigungsanlagen beauftragte. Diese lombardischen Gardisten bilden den Kern der Berufsarmee und verteidigen das Vardar-Tal mit fortschrittlichen Pikenier- und Schützenformationen gegen vorrückende feindliche Armeen. Ihre Anwesenheit sorgt dafür, dass unsere Nation im Herzen des Balkans eine Bastion westlicher Militärtheorie bleibt."
 ach_a_system_of_forts_advance: "Festungssystem"
 ach_a_system_of_forts_advance_desc: "Unsere Küstenverteidigung ist unübertroffen und nutzt den italienischen #italic Trace Italienne#!-Aufbau für Bastionsfestungen, um feindliche Seeangriffe und Einfälle in unser Hoheitsgebiet abzuwehren. Wir wandelten die alten Kreuzfahrerburgen in moderne Artilleriefestungen um, die monatelangen Belagerungen standhalten und gleichzeitig Macht über das Ionische und Ägäische Meer projizieren. Kein Angreifer wird die Morea auf dem Seeweg erobern, solange unsere steinernen Wächter über die felsigen Kaps und fruchtbaren Täler wachen."
 arg_the_artillery_school_of_argos_advance: "Artillerieschule von Argos"
 arg_the_artillery_school_of_argos_advance_desc: "Wir gelangten zu der Erkenntnis, dass die Zukunft der Kriegsführung von der Kanone bestimmt wird. Deshalb verwandelten wir unsere hochgelegenen Festungen in Labore für Ballistik und Artillerie: Unsere Offiziere sind darin geschult, Feuerwinkel aus extremen Höhen zu berechnen, wodurch unsere Batterien feindliche Schiffe mit höchster Präzision treffen können. Die #italic Artillerieschule von Argos#! genießt in ganz Europa hohes Ansehen für ihre mathematische Genauigkeit und taktische Innovation."
 ath_the_piraeus_arsenal_advance: "Piräus-Arsenal"
 ath_the_piraeus_arsenal_advance_desc: "Nach dem Vorbild des venezianischen Arsenals, aber unter Einsatz moderner Reihenfertigung können unsere neuen Werften in Piräus innerhalb weniger Wochen eine voll ausgerüstete Kriegsgaleere bauen. Diese Industrialisierung der Seekriegsführung ermöglicht es einem kleinen Herzogtum, sehr viel mehr Kraft zu entfalten, als man vermuten würde, und eine professionelle Marine zu unterhalten, die den Saronischen Golf dominiert. Piräus ist keine Ruine mehr, sondern der modernste Marinestützpunkt im östlichen Mittelmeer."
 bod_the_maritime_consulates_advance: "Maritime Konsulate"
 bod_the_maritime_consulates_advance_desc: "In Anlehnung an unser venezianisches Erbe richteten wir in den wichtigsten Häfen Euböas und Attikas Konsulate ein, um die Interessen der Kaufleute aus Boudonitza zu vertreten. Diese Stuben dienen als Nachrichtenzentralen und leiten Informationen über Marinebewegungen unmittelbar an den Markgrafen weiter. Wir mögen zwar ein Gebirgsstaat sein, doch unser Blick ist stets auf den Horizont des Meeres gerichtet."
 cep_the_chancery_of_the_three_tongues_advance: "Kanzlei der drei Zungen"
 cep_the_chancery_of_the_three_tongues_advance_desc: "Unsere Verwaltung entwickelte sich dergestalt, dass sämtliche Dekrete in Latein, Griechisch und Italienisch verfasst werden, um die Vielfalt der Kaufmanns- und Adelsschichten der Ionischen Inseln widerzuspiegeln. Diese sprachliche Offenheit zieht hochqualifizierte Zuwanderer vom Festland und der Italienischen Halbinsel an, die ein stabiles, multikulturelles Rechtsumfeld suchen. Auch Reibungsverluste in der Regierungsführung angesichts der unterschiedlichen Identitäten werden so verringert."
 crt_the_cretan_labyrinth_of_fortifications_advance: "Kretisches Befestigungslabyrinth"
 crt_the_cretan_labyrinth_of_fortifications_advance_desc: "Angesichts wachsender Bedrohungen verwandelten die Pioniere der Nation die gesamte Insel in eine Seefestung im Stil des #italic Trace Italienne#!. Durch die Verstärkung der Mauern von Candia, Rethymno und Chania mit Erdwällen, die schwerem Kanonenfeuer standhalten können, wird jede Belagerung für den Angreifer zu einer jahrzehntelangen Tortur. Diese Infrastruktur ermöglicht es einer kleinen Garnison, einem zahlenmäßig überlegenen Feind auf unbestimmte Zeit zu trotzen, sodass Verstärkung auf dem Seeweg eintreffen kann."
 lat_the_golden_gate_customs_house_advance: "Zollhaus der Goldenen Pforte"
 lat_the_golden_gate_customs_house_advance_desc: "Die lateinischen Kaiser ließen die feudalen Abgaben hinter sich und stützen sich nun auf ein ausgeklügeltes System aus See- und Durchfuhrzöllen. Jedes Schiff, das die Dardanellen oder den Bosporus passiert, muss beim kaiserlichen Zollhaus anlegen, wo man den „Zehnten des Kaisers“ in barer Münze erhebt. Diese gewaltige Einnahmequelle ermöglicht es dem Reich, ein professionelles stehendes Heer zu unterhalten, das nicht von den Launen des Adels abhängig ist."
 nax_naxian_sea_knights_advance: "Seeritter von Naxos"
 nax_naxian_sea_knights_advance_desc: "Unser Adel ist in der westlichen Welt einzigartig: Es handelt sich bei ihm um Ritter, die das Pferd gegen die Galeere und die Lanze gegen den Enterhaken getauscht haben. Diese „Seeritter“ durchstreifen das östliche Mittelmeer unter dem herzoglichen Banner und erzwingen einen „lateinischen Frieden“. Diese angriffslustige Haltung hält unsere Seeleute auf Trab und den Handel unserer Rivalen in ständiger Gefahr."
 neg_the_eubean_tidal_mills_advance: "Euboiische Gezeitenmühlen"
 neg_the_eubean_tidal_mills_advance_desc: "Die einzigartigen, unregelmäßigen Gezeiten des Euriposkanals werden von unseren Ingenieuren genutzt, um eine Reihe riesiger Gezeitenmühlen anzutreiben. Diese Maschinen liefern unabhängig vom Wind beständig Energie zum Mahlen von Getreide, zum Sägen von Schiffsholz und zum Betrieb von Blasebälgen in den Schmieden. Dieser technologische Vorsprung macht Euböa zur industriell fortschrittlichsten Insel im Mittelmeer, die ihre maritimen Konkurrenten in Sachen Herstellung aussticht."
 neo_the_neopatras_horse_breeding_program_advance: "Pferdezucht von Neopatras"
 neo_the_neopatras_horse_breeding_program_advance_desc: "Im fruchtbaren Sperchios-Tal errichteten die Herzöge herrschaftliche Ställe, um eine neue Schlachtrossrasse zu züchten, indem sie katalanische Hengste mit einheimischen Stuten vom Balkan kreuzten. Der daraus entstandene „Neopatras-Schlachtross“ ist berühmt für seine Ausdauer im Gebirge und seine Durchschlagskraft im Angriff. Dieser Kavallerievorteil ermöglicht es uns, die offenen Ebenen Thessaliens zu dominieren und Furcht in die Herzen unserer Rivalen zu tragen."
 pat_the_patrine_mint_advance: "Münzprägung von Patras"
 pat_the_patrine_mint_advance_desc: "Patras sicherte sich das Recht, eigene Münzen zu prägen: den „Patrinischen Soldo“, den man seines stabilen Wertes wegen in der gesamten Ägäis schätzt. In seiner Rolle als eine Art Zentralbank der fränkischen Morea übt der Erzbischof einen starken wirtschaftlichen Einfluss auf die weltlichen Herren aus. Wir bestimmen den Puls des Handels durch die Reinheit unseres Silbers."
 sao_the_phocian_mule_chancery_advance: "Phokische Maultierkanzlei"
 sao_the_phocian_mule_chancery_advance_desc: "Die Beförderung von Waren mit Wagen oder Karren ist in weiten Teilen unseres Herrschaftsgebiets nahezu unmöglich. Daher richteten wir eine staatliche Kanzlei ein, um die Logistik der Berge zu verstaatlichen. Dies ermöglicht es uns, Versorgungstransporte per Maultier in einem Tempo durchzuführen, das die herkömmlichen kaiserlichen Armeen in den Klüften verhungern lässt."
 the_the_via_egnatia_restoration_advance: "Instandsetzung der Via Egnatia"
 the_the_via_egnatia_restoration_advance_desc: "Der König gab die vollständige Sanierung und Befestigung der uralten Via Egnatia in Auftrag, die wichtigste Verkehrsader zwischen der Adria und dem Bosporus. Durch die Einrichtung ständiger Garnisonen entlang dieser Straße dämmten wir das Bandenwesen ein und verkürzten die Reisezeit für Händler und Armeen erheblich. Dieses logistische Meisterwerk festigt Thessalonikis Stellung als unverzichtbares Bindeglied zwischen dem Lateinischen Kaiserreich und den westeuropäischen Mächten."
 ach_achaean_enlightenment_advance: "Achaiische Aufklärung"
 ach_achaean_enlightenment_advance_desc: "Auf der Flucht aus den zerfallenden Randgebieten des Ostens finden viele Gelehrte Zuflucht an unseren Höfen, was zu einer einzigartigen Synthese lateinischer Philosophie und griechischer Klassik führt. Unter der weitsichtigen Schirmherrschaft der Fürsten gründeten wir Akademien, in denen man die Werke der großen Weisen des Ostens und des Westens Seite an Seite studiert und so eine kulturelle Wiedergeburt einleitet. Diese intellektuelle Blüte zieht die klügsten Köpfe Europas an und sichert unserem Staat eine führende Rolle im administrativen und wissenschaftlichen Fortschritt."
 arg_argive_maritime_insurance_advance: "Argivische Seeversicherung"
 arg_argive_maritime_insurance_advance_desc: "Die Handelshäuser von Nauplia nutzten unsere Lag als sicherer Hafen, um ein ausgeklügeltes System der Seeversicherung und Risikoteilung für den Handel in der Ägäis zu entwickeln. Indem wir die Sicherheit lateinischer Ladungen vor Piraterie und Stürmen gewährleisten, machten wir unseren Hafen zum Zufluchtsort in Sachen Finanzen für den gesamten Peloponnes. Diese frühe Form des Finanzkapitalismus zieht Kapital von den größeren italienischen Republiken ab und konzentriert es in unseren eigenen Banken vor Ort."
 ath_the_athenian_bureaucracy_advance: "Athenische Bürokratie"
 ath_the_athenian_bureaucracy_advance_desc: "Als unsere Herrscher zu einem absoluten Regime übergingen, ersetzten sie die zerstrittenen Feudalherren durch einen meritokratischen Staatsdienst, der sich aus dem städtischen Bürgertum rekrutierte. Diese zentralisierte Verwaltung gewährleistet eine effiziente Steuererhebung sowie eine einheitliche Durchsetzung des herrschenden Rechts von Marathon bis Megara. Dank der Entmachtung der alten Adelsfamilien entwickelte sich unsere Nation zu einem effizienten und modernen Staat, der zu einer raschen Mobilisierung fähig ist."
 bod_the_spercheios_civil_chancellery_advance: "Sperchios-Zivilkanzlei"
 bod_the_spercheios_civil_chancellery_advance_desc: "Die Markgrafschaft Boudonitza hatte sich von einem bloßen Grenzposten zum administrativen Knotenpunkt Mittelgriechenlands entwickelt, was einen Übergang von feudaler Willkür zu einem professionalisierten Staatsdienst erforderlich machte. Die Errichtung der Großen Kanzlei über dem Spercheios-Tal markiert den Schritt hin zu einem zentralisierten, modernen Staat, der die alten fränkischen Baronieprivilegien durch eine Gruppe juristisch ausgebildeter „Zivilritter“ ersetzt, welche die komplexen Zölle und Grundbücher des phokischen Kernlandes verwalten."
 cep_the_arsenal_of_argostoli_advance: "Argostoli-Arsenal"
 cep_the_arsenal_of_argostoli_advance_desc: "Wir verwandelten die natürliche Tiefwasserbucht von Argostoli in eine erstklassige Marinewerft. Anders als die riesigen Arsenale Venedigs ist unseres auf die rasche Reparatur kleiner Schiffe wie Brigantinen und Galioten ausgelegt, wie man sie für Kaperfahrten in der Ägäis einsetzt. Diese spezialisierte Infrastruktur ermöglicht es unserer Flotte, länger auf See zu bleiben als unsere Rivalen, und sichert so die örtliche Seeüberlegenheit."
 crt_the_council_of_the_two_peoples_advance: "Rat der zwei Völker"
 crt_the_council_of_the_two_peoples_advance_desc: "Die ständige Bedrohung durch äußere Invasionen und innere Aufstände veranlasste die lateinischen Könige von Candia, die strikte Trennung der Bevölkerungsgruppen aus der Zeit der frühen Eroberung aufzugeben. Wir richteten einen „Großen Rat“ ein, in dem der Adel venezianischer Abstammung Seite an Seite mit den Archonten – der griechisch-orthodoxen Elite aus Landbesitzern – tagt. Diese gemeinsame Regierungsführung ermöglicht eine einheitliche Verwaltung, in der die militärischen Traditionen des Westens durch die tiefen Wurzeln der örtlichen griechischen Bürokratie finanziert werden. So bleibt die Insel eine stabile und uneinnehmbare Bastion für jeden Möchtegern-Eroberer."
 lat_codex_latinus_advance: "Codex Latinus"
 lat_codex_latinus_advance_desc: "Der Kaiser ordnete eine vollständige Reform des Rechtssystems an, die den Codex Justinianus mit den fränkischen Assisen von Romanien zu einem einheitlichen Rechtsorgan verschmolzen. Dieser Codex Latinus beseitigt die rechtlichen Unterschiede zwischen fränkischen und griechischen Untertanen und schafft eine einzige Klasse von Reichsbürgern unter kaiserlichem Recht. Diese rechtliche Vereinheitlichung besiegelt das Ende der alten Feudalordnung und ebnet den Weg für eine echte zentralisierte absolute Monarchie."
 nax_aegean_waystation_networks_advance: "Ägäisches Wegstationennetz"
 nax_aegean_waystation_networks_advance_desc: "In einem Zeitalter des weltweiten Handels sind unsere Inseln zu unverzichtbaren Wegstationen im Mittelmeer geworden und versorgen Langstreckenschiffe mit Frischwasser, Schiffsholz und Pökelfleisch. Über die Standardisierung der Hafenanlagen auf unseren rund zwanzig Inseln stellen wir sicher, dass jedes Handelsschiff für das Privileg unserer Gastfreundschaft bezahlen muss. Dieses Logistiknetzwerk macht uns zu den unbestrittenen Herren der Binnenwirtschaft der Ägäis."
 neg_the_triarchic_naval_academy_advance: "Triarchische Marineakademie"
 neg_the_triarchic_naval_academy_advance_desc: "Um die Qualität unserer Flotte zu gründeten, gründeten die drei Fürsten der Insel gemeinsam eine Akademie zur Ausbildung von Marineoffizieren und Navigatoren. Die Studenten werden in modernster astronomischer Navigation und Seerecht geschult, sodass jeder Kapitän Euböas ein Fachmann von höchster Güte ist. Dieser Schwerpunkt auf die Marineausbildung hält unsere Flotte an der absoluten Spitze der Kriegsführung und Erkundung zur See."
 neo_the_ordinance_of_the_viles_noves_advance: "Ordonnanz der Viles Noves"
 neo_the_ordinance_of_the_viles_noves_advance_desc: "Das Reich zentralisierte seine verstreute Bergbevölkerung in #italic Viles Noves#! (Katalanisch für „Neue Städte“), die den geplanten befestigten Dörfern Kataloniens nachempfunden sind. Die Verwaltung dieser Städte obliegt einem „Konsul des Herdes“, einem Beamten, der für die gemeinschaftliche Lagerung von Brennholz und Getreide für die rauen Winter zuständig ist. Indem wir die Wärme und das Brot des Hochlands kontrollieren, beendet unsere Herrschaft im Grunde das Zeitalter unabhängiger Bergfürsten. Ersetzt werden sie durch eine schlanke, urbanisierte Bürokratie."
 pat_the_seminary_of_diplomats_advance: "Diplomatenseminar"
 pat_the_seminary_of_diplomats_advance_desc: "Der Erzbischof gründete eine Schule, um Geistliche in landesübergreifender Verhandlungskunst und geheimer Korrespondenz auszubilden. Unsere „schwarzberobten Diplomaten“ dienen an den Höfen Europas als Augen und Ohren des lateinischen Ostens. Dieses Netz geistlicher Informanten verleiht Patras einen geopolitischen Einfluss, um den rivalisierende Königreiche es beneiden."
 sao_the_parnassian_wolf_pacts_advance: "Wolfspakte des Parnassus"
 sao_the_parnassian_wolf_pacts_advance_desc: "Angesichts der sich verändernden Machtverhältnisse ließ Salona die simplen feudalen Eide hinter sich und entwickelte eine räuberische Rechtsdoktrin: die sogenannten „Wolfspakte“. Indem wir unsere Nachbarn rechtlich als „Beutekundschaft“ definieren, die Salonas „Alpha“-Schutz zum Überleben braucht, schaffen wir eine dauerhafte diplomatische Rechtfertigung für Interventionen und Annexionen. Diese Raubtierdiplomatie erlaubt es uns, kleinere Fürstentümer und Grenzlehen unter dem Deckmantel einer „defensiven Konsolidierung“ zu annektieren. So stellen wir sicher, dass die lateinische Präsenz auf dem Balkan unter der Führung einer einzigen, schlagkräftigen Macht und nicht unter der eines verstreuten, verwundbaren Rudels steht."
 the_the_macedonian_fur_trade_advance: "Mazedonischer Pelzhandel"
 the_the_macedonian_fur_trade_advance_desc: "Unsere Jäger erschlossen die weite Wildnis der nördlichen Berge und bauten einen gewinnträchtigen Handel mit hochwertigen Plezen für die Luxusmärkte Italiens und Frankreichs auf. Durch die Regulierung der Jagdsaison und den Schutz der Handelswege zur Donau sicherten wir uns eine stetige Quelle des „Pelzgoldes“ für die Schatzkammer. Diese Industrie finanziert die Modernisierung unserer nördlichen Befestigungsanlagen gegen die wachsende Macht der nördlichen Fürstentümer."
 ach_villehardouins_valor_advance: "Villehardouins Heldenmut"
 ach_villehardouins_valor_advance_desc: "Gottfried von Villehardouin, Marschall der Champagne und Chronist des Vierten Kreuzzugs, verfasste eine der frühesten volkssprachlichen Geschichtsdarstellungen in Altfranzösisch. Er verewigte darin die Taten seiner Gefährten sowie die erstaunliche Eroberung Konstantinopels in einer lebendigen, heroischen Prosa, die unter dem Adel Westeuropas weite Verbreitung fand. Seine Chronik diente nicht nur als Bericht, sondern auch als Propaganda und Inspiration. Sie mobilisierte neue Ritter und Pilger, um die bedrängten lateinischen Staaten zu verstärken. Gleichzeitig förderte sie das ritterliche Zusammengehörigkeitsgefühl unter den verstreuten fränkischen Fürsten. Diese sahen sich auch lange nach der Zerstreuung des ursprünglichen Heeres noch immer als Kreuzfahrer, die Gottes Grenze gegen Schismatiker und Ungläubige verteidigten. Es ist an der Zeit, diesen Geist für die Herausforderungen unserer Armee wiederzubeleben."
 arg_the_curia_of_the_two_benches_advance: "Kurie der zwei Bänke"
 arg_the_curia_of_the_two_benches_advance_desc: "In einem mutigen Schritt hin zu gesellschaftlicher Stabilität wandelte die Obrigkeit das oberste Gericht von Nauplia in die Kurie der Zwei Bänke um. Für dieses Gremium ist erforderlich, dass jeder Zivilprozess, der Land oder Erbschaft betrifft, von einem Rat aus einem fränkischen Richter und einem griechischen Demogeron (Ältesten) verhandelt wird. Durch die Institutionalisierung dieser „gemeinsamen Justiz“ setzen wir den jahrhundertealten Rechtsstreitigkeiten zwischen der lateinischen und der orthodoxen Bevölkerung ein Ende. Dieses Regierungsmodell schuf eine einzigartige „argivische Identität“, die der Obrigkeit treu ergeben ist und den Staat vor jenen revolutionären Bestrebungen schützt, die das übrige Europa erfassen."
 ath_the_attican_gunpowder_mills_advance: "Athenische Schießpulvermühlen"
 ath_the_attican_gunpowder_mills_advance_desc: "Unsere Artillerie ist nun die beste der Welt und profitiert von den metallurgischen Geheimnissen berühmter Meisterschmiede und den chemischen Innovationen unserer einheimischen Alchemisten. Der „Donner von Athen“ hallt über den gesamten Balkan, denn unsere Kanonen werden für ihre Reichweite und Zuverlässigkeit sehr geschätzt."
 bod_the_oeta_riflemen_advance: "Oeta-Gewehrschützen"
 bod_the_oeta_riflemen_advance_desc: "Im Zeitalter des Schießpulvers wurden die rauen Waldkämpfer des Oeta-Gebirges in besonderen leichten Infanteriekorps zusammengelegt. Diese Schützen zeichnen sich durch ihre Blitzangriffe aus und nutzen das steile Gelände, um angreifende Kolonnen mit tödlicher Präzision zu zermürben. Sie sind der Albtraum jedes Generals, der versucht, die nördlichen Pässe Griechenlands zu erobern."
 cep_the_ionian_merchant_experts_advance: "Ionische Handelsexperten"
 cep_the_ionian_merchant_experts_advance_desc: "Wir gewährten unseren örtlichen Kaufleuten umfassende Privilegien und gestatteten es ihnen, selbstverwaltete Handelsgesellschaften zu gründen, die die lukrativsten Exporte und Importe abwickeln. Diese kaufmännische Autonomie brachte eine wohlhabende Schicht von Städtern hervor, die die modernen Verwaltungsreformen der Gemeinde finanziert."
 crt_academy_of_the_stratioti_advance: "Stratioten-Akademie"
 crt_academy_of_the_stratioti_advance_desc: "Die wilden kretischen Bergbewohner wurden in ein professionelles leichtes Kavalleriekorps eingegliedert, das westliche Disziplin mit den Guerillataktiken der Balkangrenze verbindet. Wir richteten dauerhafte Übungsplätze ein, auf denen die Söhne des örtlichen Adels und die lateinischen Siedler den Umgang mit Säbel und Karabiner erlernen, um das Inselinnere zu schützen. Diese Einheiten werden nun als Elitesöldner an viele Staaten ausgeliehen und sichern so einen stetigen Strom von militärischem Prestige und hohen Einnahmen."
 lat_the_order_of_the_star_of_the_east_advance: "Orden des Sterns des Ostens"
 lat_the_order_of_the_star_of_the_east_advance_desc: "Der Kaiser führte einen hochrangigen Verdienstorden ein, der erbliche Titel durch einen auf Verdiensten beruhenden Adel ersetzt. So wird sichergestellt, dass die führenden Persönlichkeiten des Reiches aufgrund ihrer Fähigkeiten ausgewählt werden. Die Mitgliedschaft im Orden ist die höchste Auszeichnung des Landes und wird Generälen, Diplomaten und Gelehrten verliehen, die den Ruhm des Lateinischen Throns mehrten. Dieses System schafft eine treue Elite, die vollständig von der Gunst des Kaisers abhängig ist und die Herrschaft des Monarchen über den Staat festigt."
 nax_the_aegean_hydrographic_bureau_advance: "Ägäisches Amt für Hydrografie"
 nax_the_aegean_hydrographic_bureau_advance_desc: "In einem Zeitalter weltweiter Erkundung und wachsender Präzision schufen die Herzöge von Naxos das führende Zentrum für mediterrane Kartografie und Seefahrtswissenschaft. Durch den Einsatz der besten Astronomen und Uhrmacher, die jedes Riff, jede Strömung und jedes Windmuster der Kykladen kartierten, wurden unsere Navigationskarten zu den begehrtesten maritimen Hilfsmitteln der Welt. Dieser wissenschaftliche Sachverstand gewährleistet, dass naxische Kapitäne die tückische Ägäis bei Nacht oder Sturm sicher befahren können, und er verschafft unseren Handels- und Kriegsflotten einen entscheidenden Vorteil in Sachen Geschwindigkeit und Sicherheit gegenüber jedem fremdländischen Eindringling."
 neg_the_glassworks_of_chalkis_advance: "Glashütten von Chalkis"
 neg_the_glassworks_of_chalkis_advance_desc: "Mit dem hochwertigen Quarzsand unserer Strände und der Soda-Asche aus unseren Küstenpflanzen bauten wir eine Glasindustrie auf, die mit der von Murano wetteifert. Unsere Spiegel und Buntglasarbeiten werden in die prunkvollen Paläste des Lateinischen Kaiserreichs und des Westens ausgeführt und bringen der Insel gewaltigen Reichtum. Diese Luxusindustrie sichert die Steuereinnahmen, die wir brauchen, um unsere massiven Küstenmauern im Zeitalter des Schießpulvers zu erhalten."
 neo_the_academy_of_administration_advance: "Verwaltungsakademie"
 neo_the_academy_of_administration_advance_desc: "Neopatras muss seine erblichen „Kapitän-Gouverneure“ durch Absolventen eines eigens dafür geschaffenen Lyzeums für Verwaltung ersetzen. Die Kandidaten werden auf ihre Kenntnisse des griechischen Zivilrechts und der neuesten Methoden geprüft, um sicherzustellen, dass die Beamten des Landes mit der Feder ebenso vertraut sind wie mit dem Schwert. Dieser Wandel von „Geburtsrecht zu Verdienst“ macht Neopatras zum effizientesten Verwaltungsgebiet Mittelgriechenlands, das genaue Volkszählungen durchführen und Steuern rasch einziehen kann."
 pat_the_port_of_sanctuary_advance: "Zufluchtshafen"
 pat_the_port_of_sanctuary_advance_desc: "Unsere Häfen wurden zu „neutralen heiligen Häfen“ erklärt, in denen Kaufleute aller Nationen – katholisch, orthodox oder anderer Konfession – sicher Handel treiben können. Dieser Schutzstatus machte unsere Häfen zu den wichtigsten neutralen Handelsplätzen im Mittelmeerraum. Selbst in Zeiten eines totalen Krieges fließt der Handel in Patras ungehindert weiter, geschützt durch den Bann des Erzbischofs."
 sao_the_legacy_of_the_alpha_protector_advance: "Vermächtnis des Alpha-Beschützers"
 sao_the_legacy_of_the_alpha_protector_advance_desc: "Die „Wolfspakte“ sind an ihrem logischen Schluss angelangt: Die Hegemonie ist der anerkannte „Alpha“ des östlichen Mittelmeers. Wir rechtfertigen keine Aggression mehr. Wir üben lediglich unser natürliches Mandat aus, die Levante zu „überwachen“. Diese Machtprojektion sichert den Kaufleuten von Salona den Zugang zu den griechischen Meeren."
 the_the_university_of_thessalonica_advance: "Universität Thessaloniki"
 the_the_university_of_thessalonica_advance_desc: "Thessaloniki gründete eine königliche Universität, die sich der Erforschung vielfältiger Felder widmet und italienische Theorie mit örtlichen Erfahrungswerten vom Balkan verbindet. Diese Institution bringt die besten Studenten der Frankokratie hervor, die zu außergewöhnlichen Leistungen fähig sind. Unsere Absolventen sind in der gesamten lateinischen Welt sehr gefragt, was das Königreich zum intellektuellen Zentrum für Innovationen macht."
 #Greek Shared
 greek_group_the_spirit_of_resistance_advance: "Widerstandsgeist"
 greek_group_the_spirit_of_resistance_advance_desc: "Der Fall Konstantinopels durch die Kreuzfahrer bedeutete nicht das Ende der römischen Seele, sondern ist vielmehr ihr Phönixfeuer. Aus den fragmentierten Themen formt sich ein wildes #italic Ethnos#!, geprägt von der Weigerung, sich der lateinischen #italic Frankokratie#! zu unterwerfen. Dieser Widerstand manifestiert sich in einer spirituellen und physischen Mobilisierung, im Zuge derer jedes Dorf zu einer Widerstandszelle gegen die Kreuzfahrerfürsten wird. Indem wir an unseren Riten und an unserer Sprache festhalten, verwandeln wir örtliche Scharmützel in einen heiligen Krieg zur Wiederherstellung unseres rechtmäßigen Erbes."
 greek_group_hesychast_traditions_advance: "Hesychastentraditionen"
 greek_group_hesychast_traditions_advance_desc: "In einer Ära des politischen Verfalls spendet die von Grēgórios Palamâs begründete spirituelle Bewegung des Hesychasmus tiefe innere Stärke. Durch die Hinwendung zum „ungeschaffenen Licht“ im stillen Gebet findet unser Volk eine Einheit, die über versagende Grenzen und kaiserliche Intrigen hinausreicht. Die Klöster des Athos werden zu den spirituellen Nervenzentren der griechischen Welt und gewährleisten, dass weder die Gesandten des Papstes noch die Janitscharen des Sultans den religiösen Zusammenhalt unserer Bevölkerung zerstören können."
 greek_group_stratioti_levies_advance: "Stratioten-Aufgebote"
 greek_group_stratioti_levies_advance_desc: "Die raue Landschaft des Balkans brachte eine einzigartige Kriegerklasse hervor: die Stratioten. Diese leichten Reiter, oft in einer Mischung aus byzantinischer Rüstung und örtlicher Tracht gekleidet, beherrschen jene überfallartigen Taktiken, die unerlässlich sind, um größere und langsamere westliche oder osmanische Armeen zu zermürben. Ihr Ruf für Wildheit und exzellente Aufklärung macht die Stratioten unentbehrlich und wendet oft das Blatt in Gebirgsschlachten, in denen schwere Ritter scheitern. Sie stehen an der Speerspitze einer neuen Blütezeit des griechischen Militärs."
 greek_group_the_phanariote_network_advance: "Netz aus Phanarioten"
 greek_group_the_phanariote_network_advance_desc: "Aus den engen Gassen des Phanar-Viertels schwang sich eine neue Klasse griechischer Kaufmannsdiplomaten zu Einfluss und Ansehen auf. Dank ihrer Lese- und Sprachkenntnisse machten sich diese Familien für die Verwaltungsapparate der Mittelmeermächte unentbehrlich. Sie dienen als Dragomane, Gouverneure und Finanziers und schufen ein Schattenreich des Einflusses, das sich von der Donau bis zum Nil erstreckt. Ihr geheimer Schriftverkehr liefert unserem Staat unübertroffenes Wissen und beispiellose diplomatische Druckmittel."
 greek_group_aegean_coastal_defence_advance: "Ägäische Küstenverteidigung"
 greek_group_aegean_coastal_defence_advance_desc: "Die zerklüfteten Küsten und Tausenden von Inseln der Ägäis sind unsere natürlichen Befestigungen. Wir wandelten unsere maritime Kultur in eine Verteidigungsdoktrin um, der zufolge jedes Handelsschiff bewaffnet und jeder Fischer ein möglicher Marinesoldat sein muss. Durch Patrouillen in den schmalen Meerengen und den versteckten Buchten stellen wir sicher, dass jede feindliche Flotte, die unsere Gewässer duchfahren will, ständigen Angriffen ausgesetzt ist. Diese dezentralisierte Seemacht macht es nahezu unmöglich, unser maritimes Kernland zu besetzen."
 greek_group_the_modern_greek_enlightenment_advance: "Moderne griechische Aufklärung"
 greek_group_the_modern_greek_enlightenment_advance_desc: "Der #italic Diafotismós#! bringt die Flamme westlicher Wissenschaft zurück in die Wiege der Philosophie. Griechische Intellektuelle verschiffen Tausende von Büchern in ihre Heimat und lösen damit eine umfassende Bildungsreform aus. Diese Bewegung ersetzt alte Vorstellungen durch die Ideale von Freiheit, Gleichheit und einer erneuerten hellenischen Identität. Das daraus erwachsende nationale Erwachen formt die Bevölkerung zu Bürgern, die bereit sind, für einen modernen, aufgeklärten Staat zu kämpfen."
 #Greek Unique
 epi_the_eagle_of_the_pindus_advance: "Adler des Pindos"
 epi_the_eagle_of_the_pindus_advance_desc: "In den schroffen, regenumtosten Gipfeln des Pindosgebirges schufen die Despoten von Epirus eine Zuflucht, in die kein lateinisches Heer vorzudringen vermag. Wir beherrschen die Kunst, Hinterhalte am Berg zu legen, und nutzen die senkrechte Topografie unseres Reichs, um weit größere Streitkräfte in engen Schluchten einzukesseln und zu vernichten. Diese Meisterschaft über unsere Umgebung macht unser ganzes Land zu einer Todesfalle für Eindringlinge. So mögen die Ebenen fallen, doch die Berge werden auf ewig griechisch bleiben."
 feo_gothic_hellenic_synthesis_advance: "Gotisch-hellenische Synthese"
 feo_gothic_hellenic_synthesis_advance_desc: "In der Abgeschiedenheit des Krimgebirges verschmolzen die Überreste der Krimgoten und die einheimische griechische Bevölkerung zu einer einzigen, widerstandsfähigen Identität. Diese Kultur vereint das stoische, kriegerische Erbe des Nordens mit der administrativen und maritimen Brillanz des Südens. Dieser „Geist des Theoderichs“ ist unser größter Schutz und schafft ein Volk, das sich als letzter wahrer Hüter der römischen Grenze versteht und bereit ist, bis zum letzten Mann für seine einzigartige Lebensweise zu kämpfen."
 gre_restoration_of_power_advance: "Wiederherstellung der Macht"
 gre_restoration_of_power_advance_desc: "Um das Chaos des Vierten Kreuzzugs zu überleben, müssen die verstreuten Griechen zum Prinzip eines einzigen, absoluten Basileus zurückkehren. Wir haben die örtlichen Rivalitäten der Archonten aus dem Weg geschafft, die es den Lateinern ermöglichten, uns einen nach dem anderen zu erobern. Stattdessen stellten wir wieder einen zentralen Hof her, der absolute Treue genießt. Diese Zentralisierung der Macht gewährleistet, dass der Staat mit einer Stimme spricht und mit einem Schwert handelt. Dies unterdrückt das innere Gezanke, das das Reich einst ausblutete."
 moe_the_court_of_mystras_advance: "Hof von Mystras"
 moe_the_court_of_mystras_advance_desc: "Wie Konstantinopel steigt die Hügelstadt Mystras zum bedeutendsten Zentrum der hellenischen Kultur auf und lockt die größten Gelehrten, Künstler und Theologen des Reiches an ihre sonnenverwöhnten Hänge. Die Despoten der Häuser Kantakouzenos und Palaiologos fördern eine lebendige intellektuelle Atmosphäre, in der sich das Studium der klassischen griechischen Philosophie mit orthodoxer Mystik verbindet. Diese „Renaissance von Mystras“ sorgt dafür, dass das Despotat nicht länger ein bloßer Provinzaußenposten ist, sondern ein angesehener Hauptsitz mit einer hohen Anziehungskraft auf Diplomaten und Denker aus dem gesamten Mittelmeerraum."
 ths_the_wallachian_scutari_advance: "Walachische Scutari"
 ths_the_wallachian_scutari_advance_desc: "Im Chaos nach dem Vierten Kreuzzug wandten sich die Herrscher Thessaliens an die halbnomadischen Bewohner der Großen Walachei, um ihre dezimierten Reihen aufzufüllen. Indem es diesen kampferprobten Hirten Autonomie und Weiderechte im Austausch für einen Militärdienst gewährten, sicherte sich das Despotat eine treue Kaste leichter Infanterie und Plänkler, die im zerklüfteten Pindosgebirge gedieh. Diese Soldaten, die für ihre Beweglichkeit und ihre verheerenden Stoßtaktiken sind, wurden zur wichtigsten Abschreckung gegen lateinische Ritter und epirotische Rivalen gleichermaßen: Sie verwandeln die Gebirgspässe in tödliche Flaschenhälse für jede Invasionsmacht."
 epi_balkan_marriages_advance: "Balkanehen"
 epi_balkan_marriages_advance_desc: "Epirus liegt am Schnittpunkt der griechischen, slawischen und lateinischen Welt, und wir machten unsere königlichen Töchter zu unseren fähigsten Diplomatinnen. Durch ein vielschichtiges Netz strategischer Ehen mit serbischen Königen, albanischen Stammesführern und sogar italienischen Grafen erhoben wir das Haus Dukas-Komnenos zum unverzichtbaren Schiedsrichter der Politik auf dem Balkan. Diese Blutsbande gewährleisten, dass wir im Krieg stets auf mächtige Verbündete zählen können, die bereit sind, unsere Feinde von der Flanke her anzugreifen."
 feo_the_bastion_of_mangup_advance: "Bastion von Mangup"
 feo_the_bastion_of_mangup_advance_desc: "Unsere Hauptstadt Mangup-Kale ist eine buchstäblich in den Berg gehauene Festung, umgeben von steilen Klippen, die jeder Belagerung trotzen. Wir erweiterten diese natürlichen Verteidigungsanlagen um ein System ausgeklügelter Tunnel, Zisternen und versteckter Ausfalltore, sodass die Stadt einer Belagerung notfalls jahrelang standhalten kann. Dieser uneinnehmbare Sitz gewährleistet vor allem eines: Selbst wenn unsere Ländereien von der Goldenen Horde verwüstet würden, bliebe das Herz unseres Fürstentums sicher und diente auch weiterhin allen Christen im Norden als Leuchtfeuer der Hoffnung."
 gre_rebuilding_the_theme_system_advance: "Wiederaufbau des Themensystems"
 gre_rebuilding_the_theme_system_advance_desc: "Um unsere Krise in Sachen Mannstärke zu lösen, orientierten wir uns an der Blütezeit des mittelbyzantinischen Reiches: Indem wir den Akritai oder Grenzsoldaten im Austausch für einen lebenslangen Militärdienst erbliche Landparzellen gewähren, schaffen wir eine autarke Verteidigungstruppe, die tief in dem von ihr geschützten Land verwurzelt ist. Dieses System verringert unsere Abhängigkeit von teuren Söldnern und stellt sicher, dass jede Provinz über eine eigene Miliz verfügt, die in der Lage ist, die Stellung zu halten, bis die kaiserliche Hauptarmee eintrifft."
 moe_reclaiming_the_peloponnese_advance: "Rückeroberung des Peloponnes"
 moe_reclaiming_the_peloponnese_advance_desc: "Nach der byzantinischen Rückeroberung der Festungen Monemvasia, Maina und Mystras widmet sich das Despotat der Morea einer langen „Reconquista“ der Halbinsel von den fränkischen Fürstentümern. Dieser Feldzug beschränkt sich nicht auf die Belagerungskunst, sondern schließt auch eine kulturelle Unterwanderung ein: Die griechische Verwaltung stachelt die einheimische Bevölkerung zum Aufstand gegen ihre lateinischen Herren zugunsten des „rechtmäßigen Herrschers“ an. Durch strategische Ehen, anhaltende Scharmützel und die schrittweise Eingliederung feudaler Lehen fasst die Morea das zersplitterte Land allmählich zu einer geschlossenen Provinz zusammen."
 ths_meteora_sanctuaries_advance: "Meteora-Sanktuarien"
 ths_meteora_sanctuaries_advance_desc: "Angesichts der wachsenden Instabilität auf dem Balkan fördern die Despoten von Thessalien den Bau von Klosteranlagen auf den unzugänglichen Sandsteinsäulen von Meteora. Diese „Klöster im Himmel“ erfüllen einen doppelten Zweck: Sie dienen als spirituelle Leuchtfeuer des orthodoxen Glaubens sowie als hochgelegene Schatzkammern, in denen man das Vermögen des Staates und heilige Reliquien vor plündernden Söldnern schützen kann. Indem das Despotat die spirituelle Autorität der Region an solch verteidigungsfähigen Orten bündelt, stellt es sicher, dass die örtliche Identität auch in Zeiten der Krise fest in der Orthodoxie verankert bleibt."
 epi_arvanite_communities_advance: "Arvanitische Gemeinden"
 epi_arvanite_communities_advance_desc: "Um unsere schwindenden Reihen zu verstärken, luden wir die kriegerischen Arvanitenstämme ein, sich in den fruchtbaren Tälern von Epirus und Akarnanien anzusiedeln. Im Tausch gegen Land und Autonomie stellen uns diese Krieger eine unermüdliche leichte Infanterie zur Verfügung, die sich im brutalen Nahkampf an der Grenze zum Balkan auszeichnet. Ihre einzigartige Kampfkultur verschmolzen mit unserer römischen Militärtradition schafft eine hybride Streitmacht, die sowohl außergewöhnlich treu als auch im Getümmel des Gefechts furchterregend angriffslusig ist."
 feo_black_sea_fur_trade_advance: "Schwarzmeer-Pelzhandel"
 feo_black_sea_fur_trade_advance_desc: "Trotz unserer geringen Größe kontrollieren wir jene lebenswichtigen Häfen, die die riesigen Pelzgebiete Russlands mit den Märkten des Mittelmeers verbinden. Wir handelten mit den örtlichen Tatarenkhanen Exklusivrechte aus, diese Pelze über das Schwarze Meer zu verschiffen. Dieses gewinnträchtige Monopol sichert uns den Reichtum, den wir brauchen, um genuesische Ingenieure und byzantinische Gelehrte zu bezahlen und unser kleines Fürstentum inmitten der Steppe zu einem Zentrum des Wohlstands und der Zivilisation zu machen."
 gre_greek_viticulture_advance: "Griechische Weinkultur"
 gre_greek_viticulture_advance_desc: "Wir revolutionierten die griechische Landwirtschaft und entwickelten uns weg von der Subsistenzwirtschaft und hin zu hochwertigen Ausfuhrerzeugnissen, insbesondere des berühmten Malvasia-Weins und sonnengetrockneten Johannisbeeren. Durch Investitionen in moderne Bewässerungs- und Verarbeitungstechniken machten wir unsere landwirtschaftlichen Erzeugnisse zu einem festen Bestandteil des europäischen Luxusmarktes. Der daraus entstehende wirtschaftliche Aufschwung finanziert ein professionelles stehendes Heer und ermöglicht es uns, einen höfischen Prunk zu pflegen, der dem der großen Könige des Westens in nichts nachsteht."
 moe_plethons_vision_advance: "Plethons Vision"
 moe_plethons_vision_advance_desc: "Die Ankunft des Philosophen Georgios Gemistos Plethon am Hof von Mystras markiert einen radikalen Wandel in der Identität der Morea: Er schlägt eine Rückkehr zu den Gesetzen und Gesellschaftsstrukturen des antiken Sparta vor. Plethon spricht sich für ein nationales Heer aus einheimischen Griechen anstelle unzuverlässiger Söldner sowie für eine Gesellschaftsordnung aus, die auf einem hellenischen Erbe und nicht allein auf einem christlichen Bekenntnis fußt. Dieses proto-nationalistische Erwachen gibt dem Despotat eine mächtige ideologische Waffe in die Hand und verwandelt die Verteidigung der Morea in einen Kreuzzug für das Überleben der griechischen Nation selbst. Dies wird das Ansehen unseres Herrscherhauses stärken, selbst wenn wir am Christentum festhalten."
 ths_thessalian_horse_breeding_advance: "Thessalische Pferdezucht"
 ths_thessalian_horse_breeding_advance_desc: "Die weiten, fruchtbaren Ebenen um Larisa und Trikala herum bieten in einer von Bergen geprägten Region einen einzigartigen geografischen Vorteil: die Möglichkeit zur großflächigen Pferdezucht. In Anlehnung an das uralte Vermächtnis der thessalischen Kavallerie errichteten die Despoten staatliche Gestüte, um robuste und schnelle Pferde zu züchten, die gepanzerte Reiter durch unterschiedliches Gelände tragen können. Diese Investition verändert das Militär des Despotats grundlegend und erlaubt es ihm, ein professionelles Kavalleriekorps aufzustellen, das es mit feindlichen Rittern aufnehmen kann und dem Staat somit ein entscheidendes Offensivinstrument im offenen Feld bietet."
 epi_adriatic_gatekeepers_advance: "Adriatische Torwächter"
 epi_adriatic_gatekeepers_advance_desc: "Durch die Sicherung der Häfen von Valona und Butrint thront Epirus nun als Wächter über die Adria. Diese Stellen nutzten wir, um vorteilhafte Handelsabkommen mit Venedig und den italienischen Stadtstaaten zu schließen, die auf ihrem Weg in die Levante unsere Einflusssphäre durchqueren müssen. Durch die Erhebung präziser Zölle und den Schutz vor Korsaren verwandelten wir unser einst so abgeschiedenes Despotat in ein wohlhabendes Handelszentrum, das die Kluft zwischen Ost und West überbrückt."
 feo_the_northern_star_of_greece_advance: "Griechischer Nordstern"
 feo_the_northern_star_of_greece_advance_desc: "Als wichtigster griechischsprachiger Staat im Norden wurde Theodoro zu einem Symbol des religiösen Widerstands und des Überlebens einer ganzen Kultur. Wir ernannten unseren Fürsten zum „Beschützer der pontischen Griechen“, was Einwanderer und Gelehrte aus fernen Ländern anzieht. Dieses religiöse Prestige verleiht uns eine moralische Autorität, die über unsere Grenzen hinausreicht: Sie macht uns als „Nordstern“ des griechisch-orthodoxen Glaubens zu einem Schlüsselakteur in den großen religiösen Auseinandersetzungen."
 gre_the_new_stratikon_advance: "Das neue Stratikon"
 gre_the_new_stratikon_advance_desc: "Während das Schießpulver die Schlachtfelder Europas verändert, vereinten wir westliche Musketenübungen mit unseren traditionellen Taktikhandbüchern. Unsere Infanterie, das „Neue Stratikon“, ist dafür ausgebildet, unter Beschuss eiserne Disziplin zu bewahren und die legendäre Widerstandsfähigkeit einer antiken Phalanx nachzuahmen, jedoch mit modernen Arkebusen und Piken bewaffnet. Diese Professionalisierung der einfachen Soldaten stellt sicher, dass wir kein Relikt des Mittelalters mehr sind, sondern eine moderne Militärmacht, die es mit jedem Großreich aufnehmen kann."
 moe_the_hexamilion_modernization_advance: "Hexamilion-Modernisierung"
 moe_the_hexamilion_modernization_advance_desc: "Da der Isthmus von Korinth das Tor zur Halbinsel darstellt, investiert der Morea-Staat massiv in den Wiederaufbau und die Modernisierung der Hexamilion-Mauer. Unter Nutzung neuester Entwicklungen im Bereich der Befestigung gegen Schießpulverwaffen wird die uralte Barriere in eine ausgeklügelte Linie aus Bastionen, Redouten und Artilleriebatterien umgewandelt. So soll sie einer modernen Belagerung durch ein Großreich standhalten können und anschließend im ganzen Land nachgebaut werden. Diese „Griechische Mauer“ dient als Eckpfeiler einer Verteidigungsstrategie, die es dem Despotat ermöglicht, seine Macht aus der sicheren Deckung einer undurchdringlichen Front heraus zu projizieren und jeden Angreifer zu einer langen und kostspieligen Seeblockade zu zwingen."
 ths_raiders_of_the_pindus_advance: "Räuber des Pindos"
 ths_raiders_of_the_pindus_advance_desc: "Das Überleben in Nordgriechenland erforderte ein Abkehr von traditionellen byzantinischen Feldtaktiken und eine Hinwendung zu einem ausgeklügelten System der Partisanenkriegsführung. Die thessalische Militärdoktrin entwickelt sich weiter und widmet sich vorranrig klephtischen Taktiken: Man nutzt die tiefen Schluchten und dichten Wälder des Pindosgebirges, um die feindlichen Nachschublinien durch ständige Angriffe zu unterbrechen. Dieser kulturelle Wandel hin zum Guerillakrieg bedeutet, dass jede Besatzungsmacht auf ein Terrain trifft, in dem jeder Hirte ein Kundschafter und jeder Bergpfad ein möglicher Hinterhalt ist. Dies macht die Eroberung Thessaliens zu einem logistischen Albtraum für fremde Großreiche."
 epi_fortresses_of_ioannina_advance: "Festungen von Ioannina"
 epi_fortresses_of_ioannina_advance_desc: "Die Stadt Ioannina wurde in eine wahre Bastion verwandelt. Mithilfe modernster italienischer Militärtechnik umgaben wir unseren Hauptsitz und seinen See mit einem Netz aus ineinandergreifenden Schanzen und Wasserfestungen, die monatelangem Dauerbeschuss standhalten können. Dieses Verteidigungsnetz bildet den Anker unserer gesamten nationalen Strategie: Es ermöglicht uns den Rückzug in ein uneinnehmbares Kerngebiet, sobald sich das Kriegsglück auf dem offenen Feld gegen uns wendet."
 feo_the_gothic_red_guard_advance: "Gotische Rote Garde"
 feo_the_gothic_red_guard_advance_desc: "In Anlehnung an die uralten, düsteren Traditionen unserer gotischen Vorfahren und die strengen Militärhandbücher der Römer stellten wir die Rote Garde auf: Diese Elitetruppen rekrutieren sich ausschließlich aus den höchstgelegenen Bergdörfern der Krim und sind für den Kampf in den stockfinsteren Tunneln unserer Festungen und den engen Schluchten der Küste ausgebildet. Bewaffnet mit schweren Stangenwaffen und modernsten Steinschlosspistolen sind sie Meister jäher und verheerenden Angriffe. Ihr Ruf, niemals Gefangene zu machen und niemals zurückzuweichen, macht sie zur gefürchtetsten Infanterie am Schwarzen Meer: Sie bricht die Moral selbst der abgehärtetsten Regimenter."
 gre_the_hellenic_admiralty_advance: "Hellenische Admiralität"
 gre_the_hellenic_admiralty_advance_desc: "Ein geeintes Griechenland muss die Herrschaft über das „Binnenmeer“ erlangen, um zwischen den Riesen in Ost und West zu bestehen. Wir richteten in Piräus eine zentrale Admiralität ein, standardisierten den Schiffbau und bildeten ein professionelles Offizierskorps in den neuesten Navigationswissenschaften aus. Indem wir die Schnelligkeit der Galeere mit der Feuerkraft der Galeone vereinen, schaffen wir eine Flotte, die in den Winden der Ägäis wendig und im offenen Mittelmeer furchterregend ist."
 moe_the_silk_road_of_morea_advance: "Seidenstraße der Morea"
 moe_the_silk_road_of_morea_advance_desc: "Die peloponnesische Seidenindustrie, lange ein Eckpfeiler der örtliche Wirtschaft, erfuhr im 17. Jahrhundert eine massive, staatlich gelenkte Expansion, um die wachsenden militärischen Ambitionen des Despotats zu finanzieren. Indem die Despoten venezianische Meisterweber und genuesische Färber einluden, sich in der Hauptstadt Mystras anzusiedeln, brachen sie das fremdländische Monopol auf die Verarbeitung luxuriöser Stoffe. Zugleich stellten sie sicher, dass die gesamte Wertschöpfungskette – vom Maulbeerbaumanbau bis zum fertigen Brokat – innerhalb der griechischen Grenzen verbleibt. Dieser Wirtschaftsprotektionismus macht die Morea zu einem wichtigen Zentrum der Seidenherstellung, das die Nachfrage in Sachen Luxus der europäischen Aufklärung mit den Rohstoffen des Ostens zusammenbringt. Der sich daraus ergebende Anstieg der Zölle und Handelsabgaben versorgt die Staatskasse mit den nötigen Einnahmen, um eine moderne Bürokratie und ein stehendes Heer zu unterhalten, ohne die Bauernschaft übermäßig zu belasten."
 ths_armatole_administration_advance: "Armatolen-Verwaltung"
 ths_armatole_administration_advance_desc: "Um die Gesetzlosigkeit in den Grenzgebieten und das Aufkommen des Bandenwesens zu bekämpfen, institutionalisierte der thessalische Staat die #italic Armatoloi#!: ein System, in dem örtliche Anführer die offizielle militärische Zuständigkeit über bestimmte Bezirke erhielten. Diese Verwaltungsebene überbrückt die Kluft zwischen dem zentralen Despoten und der ländlichen Bauernschaft und schafft eine disziplinierte paramilitärische Klasse, die für die Steuereintreibung und die Aufrechterhaltung der inneren Sicherheit verantwortlich ist. Indem er ehemalige Gesetzlose zu staatlich sanktionierten Friedenswächtern macht, erreicht der Despot ein Maß an innerer Stabilität, das ein erneutes Wirtschaftswachstum sowie eine zentralisiertere Regierungsform ermöglicht."
 epi_the_sublime_diplomacy_advance: "Hehre Diplomatie"
 epi_the_sublime_diplomacy_advance_desc: "Jahrhunderte des Überlebenskampfes zwischen mächtigen Feinden machten unser diplomatisches Korps zum gediegensten der Welt. Wir entwickelten eine Doktrin der „Neutralität der Stärke“, die die Großmächte derart geschickt gegeneinander ausspielt, dass sie um unsere Gunst wetteifern, anstatt uns zu erobern. Unsere Botschafter sind berühmt für ihr Geschick, Friedensverträge auszuhandeln, die Epirus stets mit mehr Territorium und Einfluss zurücklassen als zu Beginn des Streits."
 feo_the_iron_harvest_advance: "Eiserne Ernte"
 feo_the_iron_harvest_advance_desc: "Die gotisch-griechische Mischkultur Theodoros legte ihre defensive Hülle vollständig ab und verwandelte sich in eine Kriegsmaschinerie. Nicht länger zufrieden mit dem bloßen Überleben an den Klippen nutzen wir unsere Bergfestungen für unsere Industrie und bauten sie zu riesigen Gießereien und Kasernen aus. So schufen wir ein professionelles Offizierskorps sowie eine Wehrpflichtigenarmee, die beide in der brutalen Schule der Steppenkriegsführung ausgebildet wurden. Jeder Bürger des Fürstentums ist nun in erster Linie Soldat und betrachtet die umliegenden Ebenen nicht als Bedrohung, sondern als fruchtbaren Boden für gotischen Ruhm und eine Rückeroberung durch Rom. Diese Strategie des totalen Krieges erlaubt es uns, mit einer Heftigkeit zuzuschlagen, die unsere größeren Nachbarn in Angst und Schrecken versetzt: Wir verfügen über eine Militärmaschinerie, die im Verhältnis zu unserer geringen territorialen Größe unverhältnismäßig mächtig ist."
 gre_megali_idea_realized_advance: "Umgesetzte Megali Idea"
 gre_megali_idea_realized_advance_desc: "Der Traum einer wiederhergestellten hellenischen Welt, die sich von der ionischen bis zur anatolischen Küste erstreckt, wurde zum Leitstern unserer nationalen Politik. Wir schufen einen rechtlichen und historischen Rahmen, der unsere Ausbreitung in alle einst von unseren Vorfahren bewohnten Gebiete rechtfertigt und unsere Eroberungen als „Befreiungen“ darstellt. Dieser ideologische Eifer treibt unsere Regierung an, neue Gebiete in beispielloser Geschwindigkeit einzugliedern, während die Bevölkerung ihre Rückkehr in den griechischen Schoß begrüßt."
 moe_the_constitution_of_morea_advance: "Morea-Verfassung"
 moe_the_constitution_of_morea_advance_desc: "Während die Welle der Aufklärung durch den Mittelmeerraum schwappt, unternehmen die Despoten der Morea den radikalen Schritt, das Verhältnis zwischen Thron und Volk durch eine schriftliche Charta zu formalisieren. Dieses stark von den Gesellschaftstheorien der Akademie von Mystras beeinflusste Dokument beseitigt die letzten Überreste byzantinischer höfischer Günstlingswirtschaft zugunsten eines meritokratischen Staatsdienstes. Es schützt zudem die Eigentumsrechte der aufstrebenden Kaufmannschaft. Indem das Despotat den Bürgern ein Mitspracherecht in der Staatsführung einräumt, fördert es eine starke nationale Treue, die die Bevölkerung deutlich widerstandsfähiger gegen eine fremdländische Unterwanderung macht. Diese politische Modernisierung verwandelt die Morea von einer traditionellen Autokratie in eine hoch entwickelte „Nationalmonarchie“, die in der Lage ist, die gesamten psychologischen und finanziellen Ressourcen ihres Volkes zum Wohl des Staates zu mobilisieren."
 ths_thessalian_grain_exchange_advance: "Thessalische Getreidebörse"
 ths_thessalian_grain_exchange_advance_desc: "Die Verwandlung der thessalischen Tiefebene in eine modernisierte Kornkammer ist durch die Gründung der thessalischen Getreidebörse vollendet. Abseits der mittelalterlichen Pachtwirtschaft fördert der Staat den Einsatz modernster Anbaumethoden, während die Börse Preise und Qualität für den landesübergreifenden Markt standardisiert. Diese wirtschaftliche Zentralisierung ermöglicht es Thessalien, seinen Nahrungsmittelüberschuss als diplomatisches Werkzeug einzusetzen und die hungernden Armeen Europas während Konflikten zu versorgen – im Austausch gegen politische Zugeständnisse und moderne Technologie. Die durch diese Ausfuhren erzeugten Einnahmen finanzieren jene Infrastruktur, die die Bergminen unmittelbar mit den Küstenhäfen verbindet und so eine wahrhaft integrierte Volkswirtschaft schafft."
 #Serbian Shared
 serbian_zaduzbina: "Zadužbina"
 serbian_zaduzbina_desc: "Die serbische Elite und das einfache Volk sind durch die Tradition der #italic Zadužbina#!, der „Seelengabe“, verbunden. Dieser kulturelle Drang, Steinkirchen und Klöster zu errichten, prägt die serbische Präsenz auf dem gesamten Balkan nachhaltig. Diese Gebäude sind mehr als nur religiöse Zentren: Sie sind Bewahrer von Geschichte, Kunst und Kultur und definieren den serbischen Lebensraum. Diese architektonische Leidenschaft verankert die serbische Kultur fest im Land und vermittelt ein Gefühl der Beständigkeit und der historischen Kontinuität, das die Menschen dazu inspiriert, ihren „heiligen Boden“ um jeden Preis zu verteidigen."
 home_of_hussars: "Heimat der Husaren"
 home_of_hussars_desc: "Obwohl die Aufstellung leichter Kavallerie-Einheiten ein Konzept der alten Römer war, erschienen die ersten Balkanhusaren bzw. Gusaren (Korsaren oder Piraten) erst im 10. und 11. Jahrhundert als Hilfstruppen des Byzantinischen Reichs auf dem Schlachtfeld. Rekrutiert wurden diese Truppen hauptsächlich im byzantinischen Serbien. Selbst als die byzantinische Macht nachließ, hielt man an dieser Tradition fest und verfeinerte sie im Verlauf der darauffolgenden Jahrhunderte."
 serbian_serbian_epic_poetry: "Serbische Epen"
 serbian_serbian_epic_poetry_desc: "Das serbische Volk entwickelte durch die epische Dichtung eine „lebendige Geschichte“. Der #italic Guslar#!, ein wandernder Barde, ist der wichtigste Hüter der nationalen Seele. Er trägt Tausende von Versen vor, begleitet von der #italic Gusle#!. Diese Gesänge bewahren Genealogien, Rechtsgrundsätze und moralische Gebote. Die serbische Kultur sorgt dafür, dass selbst der ungebildetste Hirte ein Verständnis für die Rechte seiner Vorfahren und eine mit dem Rest seines Volkes geteilte Identität besitzt. Jedes Dorftreffen wird so zu einer Geschichtsstunde."
 serbian_the_icon_of_saint_sava: "Ikone des Heiligen Sava"
 serbian_the_icon_of_saint_sava_desc: "Das kulturelle Fundament des serbischen Volkes ist durch den Heiligen Sava geprägt. Indem er byzantinische Spiritualität mit örtlichen slawischen Bräuchen und einem tiefen Bekenntnis zur serbischen Sprache in der Liturgie verband, schuf Sava eine Nationalkirche, die untrennbar mit der Identität des Volkes verbunden ist. Dieser kulturelle Anker lebt im Volk fort und gewährleistet, dass sich alle Serben, ob Adelige oder Bauern, als Teil einer eigenständigen, heiligen Gemeinschaft verstehen. Auch bei sich verschiebenden oder auflösenden politischen Grenzen bleibt sie geeint und schafft so eine innere Stabilität, die der kulturellen Angleichung von außen widersteht."
 serbian_seobe: "Seobe"
 serbian_seobe_desc: "Das serbische Volk hat die Kunst der „mobilen Identität“ vervollkommnet: Diese zeichnet sich durch die Fähigkeit aus, ganze Gemeinschaften in neue Gebiete zu verlegen, ohne dass man dabei an kulturellem Zusammenhalt verliert. Sie gewährleistet, dass die „serbische Heimat“ kein fester geografischer Ort ist, sondern ein beweglicher und unauflösbarer Gesellschaftsvertrag. Wo immer die serbische Gemeinschaft ihre Heimat findet, stellt man die alten Gesetze und Traditionen der #italic Slava#! umgehend wieder her. Diese Widerstandsfähigkeit macht die serbische Kultur im Grunde unzerstörbar, denn die Nation kann verbrannte Täler verlassen, nur um als voll entwickelte, wehrhafte Gesellschaft an einer neuen Grenze wieder aufzutauchen. Dort kann man auf den richtigen Augenblick warten, um ins Herz der eigenen Stammlande zurückzukehren."
 serbian_enlightenment: "Serbische Aufklärung"
 serbian_enlightenment_desc: "Die Aufklärung anderer Nationen hat Nationalhelden wie Dositej Obradović dazu inspiriert, unsere Volkssprache und Literatur zu fördern. Aufgrund eines Mangels an weltlichen serbischen Werken, die dem einfachen Volk zugänglich sind, hat Dositej Obradović es sich zur Aufgabe gemacht, die Kluft zwischen dem geschriebenen und dem gesprochenen Serbisch zu überbrücken. Durch die sorgfältige Ausarbeitung der Grammatik, das Erstellen von Wörterbüchern, das Verfassen von Bänden und die Übersetzung fremdsprachiger Werke durch diese Visionäre wird das literarische Erbe unseres Landes wiederbelebt."
 #Serbian Unique
 hum_a_sheep_surrounded_by_wolves: "Schaf inmitten von Wölfen"
 hum_a_sheep_surrounded_by_wolves_desc: "Wir leben geografisch eingeklemmt zwischen den hochfliegenden Ambitionen mächtigerer Feinde. Um nicht von diesen Raubtieren umzingelt zu werden, vervollkommneten unsere Fürsten die Kunst, unsere Nachbarn gegeneinander auszuspielen. Wir bieten dem fernen Wolf ständig Vasallenschaft an, um den vor unserer Haustür in Schach zu halten. Indem wir den katholischen Westen gegen den orthodoxen Osten sowie die bosnischen Krstjani gegen beide ausspielen, stellen wir sicher, dass keine Hegemonialmacht unsere Gebiete vollständig annektieren kann, ohne ein heftiges Eingreifen ihrer Rivalen auszulösen. Diese Kultur raffinierter politischer Doppelzüngigkeit wandelt unsere vermeintliche Schwäche in einen Überlebensmechanismus um. Wir gewähren Handelszugeständnisse und militärischen Zugang derjenigen Macht, die gerade unsere innere Autonomie garantiert. So gehen die größeren Wölfe einander an die Kehle, während wir die ungestörten Herren der Neretva bleiben."
 serbian_mining: "Serbischer Bergbau"
 serbian_mining_desc: "Das Balkangebirge ist reich an Erzen, die von geschickten Bergleuten abgebaut werden können. Ähnlich wie andere osteuropäische Regionen nahm auch Serbien sächsische Bergleute auf, um die Bergbauindustrie weiterzuentwickeln. Städte wie Novo Brdo entwickelten sich durch den Reichtum der Berge zu riesigen Metropolen."
 mimic_the_phoenix: "Den Phoenix nachahmen"
 mimic_the_phoenix_desc: "Wir setzen alles daran, das Byzantinische Reich nachzuahmen und ihre Gesetze und ihren allgemeinen Stil zu übernehmen. Wir nutzen römische Einflüsse und streben danach, unser Regierungs- und Rechtssystem nach ihrem Vorbild aufzubauen. Alles, um die gleiche Anmut und Kultiviertheit in unserem Reich zu erlangen."
 tro_zupa_administrative_reform: "Župa-Verwaltungsreform"
 tro_zupa_administrative_reform_desc: "Unter früheren Herrschern wurde die traditionelle slawische #italic Župa#! (Bezirk) von Travunien umstrukturiert, um den #italic Soj#! (Landsteuer) besser eintreiben zu können. Der Herrscher ernannte #italic Kephale#! (Häupter), um das Trebišnjica-Tal zu beaufsichtigen und sicherzustellen, dass der Reichtum der fruchtbaren Ebenen auch die zentrale Schatzkammer erreicht. Diese Urform der Bürokratie erlaubte unseren einstigen Herrschern, ihre Kriege zu finanzieren, indem sie den Reichtum aus der landwirtschaftlichen Produktion des Hinterlands abschöpften. Wir werden diese Tradition fortsetzen."
 zta_maritime_fiefdoms_of_the_adriatic: "Maritime Lehen der Adria"
 zta_maritime_fiefdoms_of_the_adriatic_desc: "Unsere Identität wurzelt im harten Aufeinanderprallen des hohen Kalksteinbergs auf das Salz des Meeres. Durch die klare Kontrolle über die strategisch wichtigen Küstenstädte dienen die Fürsten von Zeta als unverzichtbares Seetor für das gesamte serbische Hinterland und kontrollieren den Handel mit Salz, Seide und Silber. Wir nutzen den beträchtlichen Reichtum aus dem Mittelmeerhandel und den Zöllen, um unsere eigenwilligen Bergclans zu finanzieren und massive Steinbefestigungen zu errichten, die die Küste schützen. So bleibt Zeta eine eigenständige Seemacht, deren Einfluss weit über die schroffen Klippen des Hinterlandes hinausreicht."
 hum_the_kosaca_iron_fist: "Eiserne Faust der Kosača"
 hum_the_kosaca_iron_fist_desc: "Inspiriert von der Kosača-Dynastie begann das Fürstentum, das Militär unter einem einzigen dynastischen Banner zu zentralisieren. Anstelle von zersplitterten feudalen Heeren setzt der Staat auf ein Kern-Berufsheer aus schwerer Infanterie und Armbrustschützensöldnern. Diese militärische Konsolidierung ermöglicht es uns, unseren Feinden zu trotzen und die raue Landschaft unserer Lande zu einem Machtzentrum im Dinarischen Gebirge zu machen."
 ser_vitestvo: "Viteštvo"
 ser_vitestvo_desc: "Wir fördern das #italic Viteštvo#!, einen einzigartigen serbischen Ritterkodex, der die Traditionen der schwer gerüsteten Traditionen des Westens mit dem stoischen Kriegerethos des Ostens verbindet. Diese Ritterkultur bleibt nicht auf den Hochadel beschränkt, sondern dringt auch zur unteren Schichten der freien Soldaten durch. Sie betont persönliche Tapferkeit, Treue zum wahren Glauben sowie die meisterhafte Beherrschung von Lanze und Säbel. Diese Militärkultur bringt eine Bevölkerung hervor, die von Natur aus zum Krieg geneigt ist und den Militärdienst als höchste Form gesellschaftlicher und spiritueller Leistung betrachtet."
 rallying_the_troops: "Versammeln der Truppen"
 rallying_the_troops_desc: "Unser Reich hat die Art und Weise perfektioniert, schnell Truppen dort zu versammelen, wo uns der Feind angreifen könnte. Dieser Vorsprung hat uns erlaubt, allen Widrigkeiten zu trotzen. Vereint marschieren wir vorwärts, fest entschlossen, unsere Ehre und unsere Heimat zu verteidigen."
 tro_the_defensive_network_of_klobuk: "Das Verteidigungsnetzwerk von Klobuk"
 tro_the_defensive_network_of_klobuk_desc: "Um zu verhindern, dass unsere Feinde ungehindert expandieren, wird der Staat die Festung Klobuk zu einer modernen Zitadelle ausbauen. Wir werden ein System von „Signalfeuern“ in ganz #italic Popovo Polje#! aufbauen, mit dem unsere Garnison in Trebinje innerhalb weniger Stunden das gesamte Hinterland vor einer Invasion warnen kann. Dies wird einen Kontrollbereich schaffen, der es dem Feind unmöglich macht, die Region zu umgehen."
 zta_the_italian_condottieri: "Italienische Condottieri"
 zta_the_italian_condottieri_desc: "Wir beherrschen die lohnende und gefährliche Kunst grenzübergreifender Söldnerverträge. Indem wir den Italienern für ihre Kriege in Übersee Elitetruppen der Zetaner Gebirgsjäger und erfahrene Seeleute zur Verfügung stellen, sichern wir uns den Zugang zu modernen westlichen Waffen, Schießpulver und einem mächtigen Verbündeten auf den Wassern der Adria. Diese Verbindung gewährleistet, dass die Unabhängigkeit unseres Reiches von mächtigen Freunden geschützt wird, während wir gleichzeitig unsere alten Kriegertraditionen im Inland bewahren und weiterentwickeln. Sie verschafft uns einen militärischen Vorsprung, den nur wenige andere Balkanstaaten je erreichen."
 hum_the_viticulture_of_the_sunny_scree: "Weinbau im sonnigen Geröllfeld"
 hum_the_viticulture_of_the_sunny_scree_desc: "Die kalkreichen, sonnenverwöhnten Hänge der herzegowinischen Täler bringen eine unverwechselbare, zuckerreiche Rebsorte hervor, die an der Adria hoch im Kurs steht. Durch die Einrichtung eines königlichen Monopols auf die Ausfuhr von Žilavka- und Blatina-Weinen schaffen wir einen Luxushandel, der nicht den Schwankungen der Getreidemärkte ausgeliefert ist. Diese „flüssige Diplomatie“ ermöglicht es unserem Hof, einen Lebensstil zu pflegen, der mit dem der italienischen Stadtstaaten wetteifert. Die Ausfuhr hochwertiger Weine dient dabei als diplomatisches Schmiermittel, um vorteilhafte Verträge mit der Republik Venedig und dem Königreich Neapel zu sichern."
 ser_the_transcribers_of_resava: "Resava-Transkribiererschule"
 ser_the_transcribers_of_resava_desc: "In Zeiten der Spannungen greift das serbische Volk zur Feder, um das zu bewahren, was das Schwert nicht zu bewahren vermag. Die #italic Resava-Schule#! der Orthografie standardisiert die serbisch-slawische Sprache und schafft eine kulturelle „Republik der Gelehrten“. Diese Leidenschaft für sprachliche Reinheit und die Bewahrung der Chroniken stellt sicher, dass die serbische Geschichte niemals im Nebel des Krieges verloren geht. So entsteht eine hochgebildete Elite, die als Gedächtnis der Nation dient und die Aufzeichnungen unserer Dynastien in jedem Klosterskriptorium zwischen Donau und Adria lebendig hält."
 keepers_of_the_gate: "Wächter des Tores"
 keepers_of_the_gate_desc: "Serbiens zerklüftetes Terrain hat ein beeindruckendes Verteidigungsnetz hervorgebracht, das in der imposanten Festung Smederevo seinen Höhepunkt gefunden hat. Diese beständigen Befestigungen schützen unser Land und machen eine Invasion zu einem entmutigenden Unterfangen für unsere Feinde. Das von den weitläufigen Gebirgszügen bis zu den strategischen Flusstälern verlaufende Verteidigungssystem ist ein Zeugnis für die Widerstandsfähigkeit von Serbien und unseren unbeugsamen Geist."
 tro_the_trebisnjica_bridges: "Trebišnjica-Brücken"
 tro_the_trebisnjica_bridges_desc: "Nach dem Vorbild der römischen Ingenieurskunst werden die örtlichen Fürsten in massive Steinbrücken investieren, damit die „Silberstraße“ im Landesinneren auch bei winterlichem Hochwasser stets befahrbar bleibt. Diese Infrastrukturinvestition wird schwerer Handelskarawanen erlauben, sich ganzjährig zwischen den Bergen und den Küstenstädten bewegen zu können."
 zta_the_retreat_to_the_karst: "Rückzug in den Karst"
 zta_the_retreat_to_the_karst_desc: "Die Küste mag den wechselnden Machtverhältnissen im kaiserlichen Gefüge vorübergehend zum Opfer fallen, doch die Karstberge bleiben unsere immerwährende und uneinnehmbare Festung. Unsere Klosterfestung Cetinje, hoch oben im Lovćen-Gebirge gelegen, wo die Luft dünn und die Hänge steil sind, bildet das Herzstück unserer Nation. Diese Stadt verkörpert eine langfristige nationale Strategie der „Bergabschottung“, bei der wir bewusst den Reichtum und die Verwundbarkeit der Häfen gegen die absolute Sicherheit der Gipfel eintauschen. Indem wir uns im Fels verankern, machen wir es jeder Großmacht faktisch unmöglich, den Staat Zeta vollständig zu annektieren oder zu beherrschen."
 hum_the_humite_chancery_records: "Humitisches Kanzleiregister"
 hum_the_humite_chancery_records_desc: "Zur Führung unseres Staates zentralisierten wir unsere Verwaltung in einer mobilen, aber hochorganisierten Kanzlei. Durch die präzise Erfassung von Landbesitz, Clanlinien und Steuerpflichten – selbst in Kriegszeiten – verhindern wir jenen gesellschaftlichen Zerfall, der oft auf eine Fremdherrschaft folgt. Diese bürokratische Widerstandsfähigkeit gewährleistet, dass der Staat nach der Abwehr eines Angreifers sofort wieder voll funktionsfähig ist und eine klare und ununterbrochene Befehlskette aufrechterhält, die sich vom Palast des Herrschers bis zum kleinsten Bergdorf in den Karstgebieten erstreckt."
 the_rebirth_of_the_patriarchate: "Wiedergeburt des Patriarchats"
 the_rebirth_of_the_patriarchate_desc: "Im vierzehnten Jahrhundert hatte es sich Stefan Dušan zum Ziel gesetzt, das Erzbistum Serbien zum Patriarchat zu erheben. Seitdem hat unser Klerus versucht, von Konstantinopel unabhängig zu werden und die Verbindung zwischen dem physischen Reich, unserer Nation, und dem geistlichen Reich zu festigen."
 reform_the_ecclesiastical_authorities: "Reformierung der Kircheninstitution"
 reform_the_ecclesiastical_authorities_desc: "Serbien steht im Mittelpunkt östlicher und westlicher Einflüsse, einschließlich Einflüsse des orthodoxen-christlichen Glaubens und der katholischen Kirche. Wir müssen eine Glaubensreform durchführen, um unsere religiösen Institutionen zu stärken und das geistige Wohlergehen unseres Landes zu sichern."
 tro_the_aqueducts_of_popovo_polje: "Aquädukte von Popovo Polje"
 tro_the_aqueducts_of_popovo_polje_desc: "Die einzigartigen karsthydrologischen Eigenschaften des Flusses Trebišnjica (des längsten versinkenden Flusses der Welt) erlauben dem Staat, eine Reihe von Steinaquädukten und Mühlen zu errichten. Diese werden selbst in den trockenen Sommermonaten eine intensive Landwirtschaft ermöglichen, wodurch der Staat bezüglich Getreide autark bleiben und langen Seeblockaden standhalten kann."
 zta_the_vladika_sovereignty: "Vladika-Souveränität"
 zta_the_vladika_sovereignty_desc: "Da die weltlichen Adelsdynastien unter dem Druck fortwährender Kriege schwinden, übernahmen die #italic Vladikas#! (Fürstbischöfe) von Cetinje die schwere Bürde der nationalen Führung. Diese einzigartige #italic theokratische Monarchie#! vereint geistliche Autorität und weltliche Macht in einem einzigen zölibatären Amt und verhindert so wirksam die gefährliche Zersplitterung unseres Landes unter rivalisierenden Feudalherren. Sie macht den Kampf um die Unabhängigkeit des Gebirges zu einem dauerhaften heiligen Krieg, zu dem jedes Clanmitglied religiös verpflichtet ist. Der #italic Vladika#! ist nicht nur ein Herrscher: Er ist das lebende Symbol unseres Widerstands und sorgt dafür, dass Kreuz und Schwert in der Verteidigung des #italic Schwarzen Berges#! untrennbar miteinander verbunden sind."
 hum_the_ponor_storage_system: "Ponoren-Lagersystem"
 hum_the_ponor_storage_system_desc: "Wir entschlüsselten die klimatischen Geheimnisse des Trebišnjica-Flusssystems, des längsten Flusses der Welt mit verschwindendem Lauf. Indem wir die stabilen Temperaturen und die trockenen oberen Gänge der #italic Ponoren#! (Schlucklöcher) im Sommer nutzen, errichteten wir ein landesweites Netz unterirdischer Getreidespeicher. Diese „Verborgene Reserve“ gewährleistet, dass unsere Getreidevorräte der sengenden Hitze der Herzegowina trotzen und – was noch wichtiger ist – den Plünderern einfallender Armeen verborgen bleiben. Während unsere Feinde in einem niedergebrannten Tal hungern, bleiben unsere Truppen durch die Nutzung der kühlen Tiefen der Erde gut versorgt, sodass wir selbst während mehrjähriger Blockaden die hohe Moral unserer Armee aufrechterhalten können."
 ser_serbian_national_militia: "Serbische Nationalmilizen"
 ser_serbian_national_militia_desc: "Aufbauend auf der jahrzehntelangen Erfahrung unserer Einheiten von Veteranen schufen wir eine ständige, professionelle Nationalmiliz. Diese Truppe markiert einen entscheidenden Schritt weg von der unorganisierten Bauernmiliz und setzt auf strengen westlichen Drill, eine einheitliche Ausrüstung sowie eine modernisierte Befehlskette, während sie gleichzeitig den unerschrockenen, moralisch hochmotivierten Kampfstil unserer Balkan-Vorläufer beibehält. So stellen wir sicher, dass unsere Unabhängigkeit kein fragiles diplomatisches Geschenk ist, sondern auf einer glaubwürdigen, modernen Militärmaschinerie beruht, die unsere Grenzen gegen jede eindringende Großmacht verteidigen kann."
 foreign_relations_bureau: "Auswärtiges Amt"
 foreign_relations_bureau_desc: "Unser Reich hat erkannt, wie wichtig es ist, freundschaftliche Beziehungen und Bündnisse zu Nachbarländern zu pflegen. Zu diesem Zweck wurde ein Sonderamt gegründet, das sich mit der Außenpolitik befasst. Dieses Amt wird uns erlauben, das komplexe Geflecht länderübergreifender Beziehungen zu durchschauen und den Wohlstand unseres Landes zu sichern."
 tro_the_zudiosca_network: "Zudiosca-Netzwerk"
 tro_the_zudiosca_network_desc: "Da immer mehr große Kriege im Mittelmeerraum ausbrechen, muss der travunische Staat seine einzigartigen Beziehungen zu den jüdischen und ragusischen Kaufmannsfamilien (den #italic Zudiosca#!) nutzen, um ein ausgeklügeltes Spionagenetzwerk aufzubauen. Da sich diese Händler frei zwischen dem Berginneren und den adriatischen Häfen bewegen können, sind sie in der Lage, die travunische Befehlshaber mit Echtzeitinformationen über die Truppenbewegungen fremder Armeen zu informieren. Diese „Unsichtbare Garde“ erlaubt der lokalen Armee, den Feind stets an seinem schwächsten Punkt anzugreifen und so die zahlenmäßige Überlegenheit jeder angreifenden Macht zunichte zu machen."
 zta_guerillas_of_the_scrub: "Karst-Partisanen"
 zta_guerillas_of_the_scrub_desc: "Die #italic Gola Brda#! oder Nackten Hügel des Karstgebirges bieten keinerlei Deckung für eine traditionelle Invasionsarmee, doch unseren wendigen Kriegern unzählige Verstecke und Möglichkeiten für Hinterhalte. Wir entwickelten eine ausgeklügelte Taktik der „Nachtüberfälle“, bei der unsere Clanmitglieder lautlos und im Schutz der Dunkelheit von den Gipfeln herabsteigen, um feindliche Lager zu plündern oder Kanonen unschädlich zu machen und vor Tagesanbruch wieder im Nebel zu verschwinden. Diese psychologische Kriegsführung treibt jede Besatzungsmacht im Tiefland durch ständige Angst und körperliche Erschöpfung an den Rand des Wahnsinns. So wird unser Territorium zu einem albtraumhaften Gelände, das man schließlich aufgibt, während sich unsere Armeen an jedes feindliche Gebiet anpassen können."
 hum_modernized_national_redoubt: "Modernisierte Nationalzufluchten"
 hum_modernized_national_redoubt_desc: "Aufbauend auf Jahrhunderten der Gebirgskriegsführung führten wir die Doktrin der „Nationalzufluchten“ ein, in der jede größere Stadt und jeder Pass in einen einheitlichen Verteidigungsplan eingebunden ist. Mithilfe moderner westlicher Ballistik und Kartografie stationierten wir Batterien und Nachschub in verborgenen Bergdepots. Diese Doktrin gewährleistet, dass der Staat selbst bei Verlust der Täler weiterhin als souveräne Militäreinheit von den Gipfeln aus handeln kann und jeden Besatzer mit einem permanenten, aktiven Widerstand verhöhnt. So werden die Kosten für die Verteidigung von Hum für jedes Großreich unerschwinglich hoch."
 military_modernization: "Modernisierung des Militärs"
 military_modernization_desc: "Unser Volk erinnert sich mit Stolz an die Geburt unserer Nation, inmitten mächtiger Nachbarn, die eine ständige Bedrohung für unser Überleben darstellten. Diese ständige Wachsamkeit hat eine Kultur der dauerhaften Bereitschaft geschaffen und erlaubt unseren Truppen, wie ein Schutzschild gegen alle Widrigkeiten wirken. Unsere furchtlosen Soldaten haben uns von einer potenziellen Beute zu einem mächtigen Gegner gemacht und schrecken all jene ab, die unsere Souveränität bedrohen."
 ser_the_sumadija_agrarian_revolution: "Landwirtschaftliche Revolution von Šumadija"
 ser_the_sumadija_agrarian_revolution_desc: "Die serbische Bauernschaft leitete durch die Übernahme westlicher Anbaumethoden eine eigene kulturell-ökonomische Revolution ein. So wurde aus den dichten Wäldern der Provinz Sumadija ein hochproduktives Agrargebiet. Dieser Nahrungsmittelüberschuss ernährt nicht nur die Bevölkerung, sondern treibt auch ein starkes Bevölkerungswachstum an. Eine gut genährte serbische Bevölkerung ist eine wachsende und ehrgeizige Bevölkerung, die einen großen Vorrat junger, gesunder Rekruten für die Armee und einen robusten Binnenmarkt bereitstellt. So wird Serbien zur dominierenden Wirtschaftskraft des zentralen Balkans."
 tro_the_constitution_of_trebinje: "Die Verfassung von Trebinje"
 tro_the_constitution_of_trebinje_desc: "Der Staat wird eine schriftlich festgehaltene Verfassung einführen, die die Macht des Herrschers einschränkt und die „Versammlung der Fürsten und Bürger“ ermächtigt. Diese Verfassung wird eine der ersten liberalen Dokumente auf dem Balkan sein. Sie wird eine innere Revolution verhindern und Travunien in den Augen der Großmächte Europas als „zivilisierten Staat“ dastehen lassen, was unsere fortdauernde Souveränität sichern wird."
 zta_the_code_of_the_black_mountain: "Kodex des Schwarzen Bergs"
 zta_the_code_of_the_black_mountain_desc: "Um den Übergang von einem losen Stammesverband zu einem modernen, zentralisierten Staat endgültig zu vollziehen, führten wir ein strenges und kompromissloses neues Rechtssystem ein, das die zerstörerische Tradition der Blutrache strikt unterdrückt und die Macht der #italic Vladika#! zentralisiert. Indem wir das alte Stammesrecht durch ein einheitliches System der staatlichen Justiz und der Besteuerung ersetzen, vereinen wir die rivalisierenden Clans zu einem einzigen, geschlossenen Nationalstaat. Diese Reform wandelt die uneinheitliche und oft chaotische Energie der Berge in eine gebündelte und disziplinierte nationale Kraft um. Mit ihr können wir unsere angestammten Küstenlinien zurückerobern und unsere Grenzen mit der Effizienz einer modernen europäischen Macht erweitern."
 #Slovene Shared
 slovene_the_freising_fragments: "Freisinger Denkmäler"
 slovene_the_freising_fragments_desc: "Gestützt auf die alten Traditionen der Freisinger Denkmäler bewahrten die slowenischen Bauern und der örtliche Klerus eine ausgeprägte sprachliche Identität, die innerhalb der kirchlichen Strukturen des Heiligen Römischen Reiches fortbestand. Diese frühe volkssprachliche Tradition dient als stiller, aber beständiger kultureller Anker, der die Sprecher des #italic Windisch#! von ihren deutschen und italienischen Nachbarn unterscheidet."
 slovene_the_dukes_chair_tradition: "Tradition des Herzogstuhls"
 slovene_the_dukes_chair_tradition_desc: "Das altehrwürdige Ritual der Einsetzung der Kärntner Herzöge in slowenischer Sprache symbolisiert ein einzigartiges Vertragsverhältnis zwischen Herrscher und Beherrschten. Dieser Brauch stärkt die Vorstellung einer freien Bauernschaft mit spezifischen Rechten und verhindert die vollständige Entrechtung der ländlichen Bevölkerung. Dieser Gesellschaftsvertrag fördert eine stabile und produktive landwirtschaftliche Grundlage in unseren Herrschaftsgebieten."
 slovene_the_tabor_defense_system: "Tabor-Verteidigung"
 slovene_the_tabor_defense_system_desc: "Als Grenzland befanden wir uns stets in einer gefährlichen Lage gegenüber unseren Feinden. Daher entwickelte unser Volk die #italic Tabor#!: befestigte Kirchenanlagen, in die sich Dorfbewohner mit ihrem Vieh und ihren Wertgegenständen zurückziehen können. Diese dezentrale Verteidigung verwandelt jedes Dorf in eine kleine Festung und zwingt jeden Angreifer in einen hässlichen Zermürbungskrieg, den er nicht gewinnen kann."
 slovene_the_catechismus_and_abecedarium: "Katechismus und Abecedarium"
 slovene_the_catechismus_and_abecedarium_desc: "Die Seele unseres Volkes fand durch die Druckerpressen ihre Stimme: Primož Trubar veröffentlichte #italic den Katechismus und das Abecedarium#!, die ersten jemals in slowenischer Sprache gedruckten Bücher. Dies ist weit mehr als ein religiöser Akt: Es ist ein politisches Erdbeben, das unsere verschiedenen Dialekte zu einer einzigen Schriftsprache vereinheitlicht. Indem wir dem einfachen Volk die Mittel zum Lesen und Schreiben in seiner eigenen Sprache gaben, schufen wir ein einheitliches Nationalbewusstsein, das über die Grenzen alter feudaler Herzogtümer hinausgeht. Dieses intellektuelle Erwachen beschleunigt die Einführung moderner Verwaltungsinstitutionen und lässt das Licht neuer Ideen rasch von der Kanzel zum Pflug gelangen."
 slovene_the_glory_of_carniola: "Ruhm von Krain"
 slovene_the_glory_of_carniola_desc: "In Anlehnung an Janez Vajkard Valvasor nahmen wir ein gewaltiges Vorhaben zur Kartierung der Geografie, der Geschichte und der Bräuche unseres Landes in Angriff. Diese wissenschaftliche Untersuchung ermöglicht dem Staat ein beispielloses Verständnis seiner Ressourcen und seiner Bevölkerung und trägt so zu einer effizienteren Besteuerung und der raschen Anwendung technologischer Innovationen bei."
 slovene_the_zois_circle: "Zois’ Tischrunden"
 slovene_the_zois_circle_desc: "Baron Sigmund Zois, ein wohlhabender Mineraloge und Kunstmäzen, gründete eine Intellektuellenrunde, die das #italic Preporod#!, das nationale Erwachsen Sloweniens, anführte. Diese Gruppe fördert den Gebrauch des Slowenischen in Hochkultur, Wissenschaft und Politik und macht so aus einer „Bauernsprache“ die Sprache des modernen Staates."
 #Slovene Unique
 cli_the_counts_ambition: "Des Grafen Ehrgeiz"
 cli_the_counts_ambition_desc: "Durch meisterhafte Heiratsdiplomatie und eine unerschütterliche Treue zu den Kaisern des Heiligen Römischen Reiches stiegen wir von örtlichem Adel zu Fürsten des Heiligen Römischen Reiches auf. Indem wir uns Ehen mit den Thronen unserer Nachbarn sicherten, etablierten wir uns als unverzichtbarer „Schild des Südens“. Dieser kometenhafte Aufstieg erlaubt es uns, selbst von den mächtigsten Häusern Europas Respekt einzufordern."
 cli_the_sanneck_condottieri: "Sannecker Condottieri"
 cli_the_sanneck_condottieri_desc: "Ehe wir Fürsten des Reiches wurden, wurde das Haus Cilli durch die scharfen Klingen der Sannecker Ritter geprägt. Indem wir Elitesöldnerkompanien für die ungarische und die kaiserliche Krone in den Schlachten Dalmatiens und Italiens anführten, machten wir den „Kriegsvertrag“ zu einem Instrument des dynastischen Aufstiegs. Diese Tradition des professionellen Militärdienstes ermöglicht es uns, überlegene Söldner zu einem Bruchteil der üblichen Kosten ins Feld zu führen."
 cli_the_last_counts_legacy: "Vermächtnis des letzten Grafen"
 cli_the_last_counts_legacy_desc: "Im Anschluss an unsere tiefe Verstrickung in die Thronfolgen unserer Nachbarn formalisieren wir unsere Rechtsansprüche auf die Überwachung der südlichen Grenze des Reiches als deren Hauptbeschützer. Obwohl unsere Rivalen weiter versuchen, unsere Gebiete zu annektieren, gewährleisten die von uns gesicherten Verwaltungsstrukturen und der Status der „Reichsunmittelbarkeit“, dass unser Territorium ein privilegiertes Zentrum regionaler Verwaltung bleibt."
 cli_the_windic_march_arsenal: "Arsenal der windischen Mark"
 cli_the_windic_march_arsenal_desc: "Als die Hauptfürsten der Südgrenze verwandelten wir unsere Ländereien in eine dauerhafte militärische Nachschublinie. Durch die Förderung der Eisenwerke im Savinja-Tal stellen wir sicher, dass unsere schwere Kavallerie und unsere Grenztruppen mit den besten in Innerösterreich geschmiedeten Platten und Feuerwaffen ausgerüstet sind. Diese örtliche Rüstungsindustrie verringert unsere Abhängigkeit von fremden Waffen und hält unsere Regimenter jederzeit kampfbereit."
 cli_the_marble_palaces_of_celje: "Marmorpaläste von Celje"
 cli_the_marble_palaces_of_celje_desc: "Um unserem Status als Reichsfürsten Ausdruck zu verleihen, luden wir italienische Architekten ein, unsere Stadtzentren im prachtvollen Barockstil neu zu gestalten. Diese weitläufigen Paläste und öffentlichen Plätze dienen nicht bloß der Repräsentation: Sie fungieren als Verwaltungszentren, in denen die Staatsbürokratie professionalisiert wird. Die schiere Pracht unserer Hauptstadt beeindruckt fremdländische Diplomaten wie inländische Rivalen gleichermaßen und untermauert unser legitimes Herrschaftsrecht."
 cli_the_modernization_of_a_nation: "Modernisierung der Nation"
 cli_the_modernization_of_a_nation_desc: "Unsere angestammten Täler wandelten sich von feudal geprägtem Weideland zum industriellen Zentrum unseres Reiches. Wir nutzten diese Dynamik, um eine gewaltige Industrie aufzubauen, bei der dampfbetriebene Sägewerke das Rohholz und Eisen der umliegenden Berge weiterverarbeiten. Diese rasante Modernisierung brachte eine neue Schicht von Fachkräften und Ingenieuren hervor, sodass unsere Hauptstadt zu einem Zentrum der technologischen Innovation wurde, das den gesamten Staat ins Industriezeitalter führt."
 #Balkan Shared
 expansionist_ambitions: "Expansionistisches Streben"
 expansionist_ambitions_desc: "Als der Balkan zerbrach, schauten viele aufstrebende Mächte der Region nach außen. Ehrgeizige Herrscher wollzen die byzantinische Schwäche ausnutzen, um die unterschiedlichen Lande unter einer einzelnen, starken Krone zu einen."
 poklisars: "Poklisaren"
 poklisars_desc: "Seit der Gründung unserer Nation blicken wir auf Orte jenseits unserer Grenzen, sei es, um gewinnbringende Handelsrouten aufzubauen, starke Nachbarn zu besänftigen oder Bündnisse gegen gemeinsame Feinde zu schmieden. Wir haben unseren Gesandten, die in unserem Namen handeln sollen, den Namen „Poklisar“ gegeben."
 balkan_hajduks: "Heiducken"
 balkan_hajduks_desc: "Im Gegensatz zu den Heiducken im Norden, vor allem in Ungarn, genossen die Heiducken in Serbien und in den angrenzenden Balkanländern einen schändlicheren Ruf. Diese Männer lebten das harte Leben von Briganten, trotzten stets der Gefahr und waren immer unterwegs. In Kriegszeiten füllten diese erfahrenen, zähen Männer jedoch oft die Ränge serbischer Armeen auf und erwiesen sich als hervorragende und kampferprobte Infanteristen, wenngleich man bei der Disziplin Abstriche machen musste."
 cro_pandurs_recruitment: "Pandur"
 cro_pandurs_recruitment_desc: "Wir werden Regimenter leichter Infanterie ausheben, die in Friedenszeiten als Ordnungskräfte und zum Schutz vor Räubern dienen. Diese Mannen lassen sich auch leicht in unsere Armee eingliedern und können so unsere Streitkräfte in schwierigen Zeiten verstärken."
 seljuk_heritage: "Seldschuken-Erbe"
 seljuk_heritage_desc: "Für unsere Zukunft sollten wir uns darauf besinnen, was wir von den Persern und Seldschuken lernten. Wir müssen einen Staat aufbauen, der in der Lage ist, unterschiedliche Völker und Glaubensrichtungen zu einem größeren Ganzen zusammenzuführen."
 turkic_traditions: "Türkische Traditionen"
 turkic_traditions_desc: "Wir entstammen der Steppe und tragen den Wind, die Entbehrungen und den Nervenkitzel der Schlacht in unserem Blut. Wir dürfen dies nie vergessen."
 millets: "Kanunname"
 millets_desc: "Indem wir in allen Provinzen unseres Reiches einheitliche Gesetze festlegen, können wir sicherstellen, dass unsere Herrschaft als fair und gerecht angesehen wird. Diese Gesetzbücher, bekannt als Kanunname, berücksichtigen die örtlichen Gegebenheiten und Traditionen jeder unserer Provinzen."
 ghazi: "Ghazi"
 ghazi_desc: "Gemäß den Gesetzen der Steppe sind unsere Adligen Krieger der Grenze; wir werden furchtlos für die Ausbreitung des Islam kämpfen."
 azeb_irregulars: "Irreguläre Azeb"
 azeb_irregulars_desc: "Die Azeb, unverheiratete junge Männer, die aus den ärmsten Schichten der Gesellschaft stammen, werden nicht nur als Soldaten und Seeleute, sondern auch als Baumeister, Pioniere und Waffenschmiede tätig sein. Durch unsere Festungsgarnisonen werden wir sicherstellen können, dass sie immer bezahlt werden."
 bashi_bazouks: "Irreguläre Başı Bozuk"
 bashi_bazouks_desc: "Die Başı Bozuk, die aus den entmächtigten Teilen der Bevölkerung rekrutiert werden und manchmal auch als Vagabunden unterwegs sind, stellen eine kostengünstige Möglichkeit dar, Festungen und Außenposten zu bemannen. Aufgrund ihrer Neigung zur Räuberei und zum mutwilligen Töten kann man sich stets darauf verlassen, dass sie in den Grenzgebieten unserer Feinde für Unruhe sorgen."
 ottoman_bureaucracy: "Birûn"
 ottoman_bureaucracy_desc: "Der Birûn, unser Außendienst, umfasst die Gruppe von Verwaltungsbeamten, Militäroffizieren und Religionsgelehrten, die nicht zum persönlichen inneren Kreis des Herrschers gehören. Sie bilden zusammen einen effizienten Verwaltungsapparat, der vom Iran und den Seldschuken inspiriert wurde und durch Elemente der byzantinischen Verwaltung weiter verfeinert wurde, was sie in der Tat einzigartig osmanisch macht."
 ahdnames: "Ahidnâme"
 ahdnames_desc: "Die $ahdnames$ sind vertragliche Vereinbarungen mit anderen Nationen, die sich sowohl auf das muslimische als auch auf das weltliche Recht stützen. $ahdnames$ werden meist dazu verwendet, um Händlern oder Geistlichen anderer Nationen gewisse Rechte und Schutz zu garantieren, damit zum Beispiel ein möglicher Handel ungehindert durchgeführt werden kann."
 dragomans: "Dragomanen"
 dragomans_desc: "Die Dragomanen sind Dolmetscher, Übersetzer und Führer in einem. Sie sind aber auch erfahrene Beamte, die an der Förderung unserer diplomatischen und wirtschaftlichen Bemühungen in unterschiedlichen Gemeinden und Ländern arbeiten. Die meisten Dragomanen stammen von Griechen ab; manche haben aber auch einen jüdischen, armenischen oder mehrsprachlichen Hintergrund."
 kafes: "Kafes"
 kafes_desc: "Indem wir jene Prinzen, die mit unserer Herrschaft unzufrieden sind, auf einen bestimmten Teil des Harems, den $kafes$, beschränken, können wir jene potenziellen Rebellionen und Rivalitäten zwischen Brüdern verhindern, die unser Land einst plagten."
 timariots: "Timarioten"
 timariots_desc: "Indem wir im Rahmen des Timar der Sipâhi-Kavallerie Land gewähren, können diese Leute diesen staatlich gestützten Wohlstand dann nutzen, um sich selbst und ihr Gefolge zu versorgen. Dies erlaubt es uns, eine beachtlichere Kavallerie ins Feld zu führen."
 autonomous_pashas: "Autonome Paschas"
 autonomous_pashas_desc: "Ein Gleichgewicht zwischen den Bedürfnissen der Bevölkerung vor Ort und den Anforderungen des Staates zu finden, ist eine schwierige Aufgabe. Besonders die Langsamkeit der Nachrichtenübermittlung kann dazu führen, dass selbst die einfachsten Anweisungen nur mit großer Verzögerung am Zielort eintreffen. Wir müssen die Autonomie der Statthalter stärken, um den Interessen der Bevölkerung schneller entsprechen zu können."
 lawcode_of_suleiman: "Süleyman-Gesetze"
 lawcode_of_suleiman_desc: "Süleyman – ein Soldat, Gesetzgeber und Reformator – ging als einer der großen Herrscher in die Geschichte ein. Während er im Westen als Süleyman „der Prächtige“ bekannt ist, trug er in seiner Heimat den Beinamen „der Gesetzgeber“. Kern seiner Reformen war eine Überarbeitung des osmanischen Dynastierechts namens „Kanun“, um es in Einklang mit der islamischen $sharia$ zu bringen."
 ottoman_tax_farming: "Mukataa"
 ottoman_tax_farming_desc: "Bei dieser Steuerwirtschaft kauft der Adel das Recht, von einem bestimmten Land der Krone Steuern eintreiben zu dürfen. Das $ottoman_tax_farming$-System sorgt für eine gleichmäßigere Verteilung des Wohlstands im Reich und verhindert, dass der Adel der Korruption verfällt. Stattdessen zeigt er so ein berechtigtes Interesse am Wohlergehen des Staates."
 ottoman_waystations: "Menzil"
 ottoman_waystations_desc: "Die Menzil-Raststationen sind ein komplexes System von Vorratslagern und Unterbringungen für Soldaten und Beamte, das es unseren Armeen erlaubt, weniger zu plündern und trotzdem an jeder Front gut versorgt zu sein."
 late_ottoman_bureaucracy: "Mālīye"
 late_ottoman_bureaucracy_desc: "Die $late_ottoman_bureaucracy$ ist eine ausgedehnte, vielfältige und äußerst strukturierte Bürokratie, in der die besten Schreiber arbeiten. So entsteht eine fundamentale und unbestechliche Institution des Staats."
 tulip_period: "Tulpenzeit"
 tulip_period_desc: "Wir werden unsere alten und abgestandenen Traditionen reformieren. Tulpen sollen in unseren Gärten erblühen und ein neues goldenes Zeitalter des Handels und der Verknüpfungen einläuten."
 imperial_school_of_naval_engineering: "Kaiserliche Schiffbauerschule"
 imperial_school_of_naval_engineering_desc: "Diese neue Schule, die #italic Mühendishane-i Bahr-i Hümâyûn#!, wird dazu beitragen, Schiffbauer, Marineoffiziere und Seeleute für unsere Kriegs- und Handelsflotten auszubilden."
 ayans: "Ayane"
 ayans_desc: "$ayans$ sind Provinzmagnaten unterschiedlichster Hintergründe, die über eine beträchtliche örtliche Autonomie verfügen, aber dennoch eine bereitwillige Einkommensquelle des Staats in Sachen Steuerwirtschaft und Streitkräfte darstellen."
 french_language_in_all_courts: "Französisch als Hofsprache Europas"
 french_language_in_all_courts_desc: "Lange Zeit war Latein die lingua franca Europas, aber wenn wir ehrlich sind, handelt es sich um eine tote Sprache. Wir brauchen eine neue lingua franca, und welche wäre besser geeignet als Französisch?"
 elan: "Élan!"
 elan_desc: "Die Doktrin des Angriffs und ihre Kultivierung bilden das Fundament unserer Armee. Unsere Soldaten müssen derart viel Elan zeigen, dass wir auf dem Schlachtfeld klar überlegen sind."
 estates_general: "Generalstände"
 estates_general_desc: "Die Generalstände existieren seit dem Jahr 1303, auch wenn sie heute nicht mehr, wie früher üblich, als Rat vom König einberufen, sondern gewählt werden. Dies hat den Generalständen, und auch den von ihnen erhobenen Steuern, größere Legitimität gegeben."
 fra_gendarmes: "Gendarmenkompanien"
 fra_gendarmes_desc: "Dass sich unsere Regierung auf Aufgebote verlässt, hat uns großen Risiken ausgesetzt und sich als sehr einschränkend erwiesen. Wir sollten Gruppen schwer bewaffneter Kavalleristen mit einem festen Gehalt aufstellen, die unserem Herrscher als stehende Armee dienen."
 fra_integration_of_new_territories: "Konsolidierung des Landes"
 fra_integration_of_new_territories_desc: "Unser Einfluss auf andere Länder ist unbestreitbar. Warum nutzen wir diesen Einfluss nicht, um sie direkt in unser Land einzugliedern?"
 fra_reliance_on_privateers: "Freibeuterabhängigkeit"
 fra_reliance_on_privateers_desc: "Ein direkter Wettbewerb mit anderen Seemächten könnte kostspielig sein und unsere Finanzen in eine Schieflage bringen. Stattdessen sollten wir unsere Handelsflotte mit den Mitteln ausstatten, um die Handelsschiffe unserer Feinde zu plündern und zu kapern. Dies würde nicht nur ein gesundes Einkommen für unseren Staat sichern, sondern auch den Seehandel unserer Rivalen stören."
 fra_reformation_of_taxation: "Einrichtung der Recettes Générales"
 fra_reformation_of_taxation_desc: "Die für die Erhebung der Steuern des Volkes zuständigen Intendanten sollen nicht von den Ständen, sondern direkt von unserem Herrscher ernannt werden. Auf diese Weise stellen wir sicher, dass die Beamten allein dem Herrscher gegenüber treu sind und die rechtmäßig geschuldeten Abgaben auch weiterleiten."
 fra_school_of_fontainebleau: "Nördlicher Manierismus"
 fra_school_of_fontainebleau_desc: "Als stolzer Vertreter der Renaissance sollten wir in die Schaffung eines einzigartigen französischen Stils investieren. Wenn wir fremdländische Künstler einladen und eine Schule direkt fördern, können wir deren künstlerische Werke als französische Eigenart herausstellen."
 vauban_fortifications: "Innovative Befestigungen"
 vauban_fortifications_desc: "Die Raffinesse dieser Festungen liegt weniger in ihrer Bauweise als in ihrer Positionierung. Indem die Eigenheiten des Terrains berücksichtigt werden, kann eine Festung wesentlich schwerer einzunehmen sein."
 the_philosophes: "Philosophen"
 the_philosophes_desc: "Wir können auf die größten Philosophen dieses erleuchteten Zeitalters stolz sein. Diese Denker sorgen für einen stetigen Strom neuer Ideen und Gedanken, die den Fortschritt auf allen Gebieten des Seins anregen – von den alltäglichsten bis hin zu den wichtigsten Fragen unserer Zeit."
 fra_expansion_of_france: "Althergebachte Ansprüche"
 fra_expansion_of_france_desc: "Wir führen unseren Staat auf das Reich Karls des Großen zurück und können daher all dessen Lande als rechtmäßige Territorien beanspruchen. Durch eigene Gerichte, die die Geschichte all dieser Gebiete bis zu unserer Krone zurückverfolgen, erheben wir erneut Anspruch auf diese verlorenen Lande."
 liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
 liberty_egalite_fraternity_desc: "Da nun jedermann vor dem Gesetz unseres neuen Staates gleich ist, können auch andersgläubige Untertanen voll in der Staatsmaschinerie mitarbeiten und zum Fortschritt der Nation beitragen."
 fra_code_civil: "Code Civil"
 fra_code_civil_desc: "Wir müssen das chaotische Flickwerk von Gesetzen, die unseren Staat regeln, auflösen und ein einheitliches, zugängliches Gesetzbuch für unsere gesamte Bevölkerung schaffen. Dieser #italic Code Civil#! wird als Grundlage unserer Regierung dienen und ein gerechtes System für alle darstellen."
 magna_carta_advance: "$magna_carta_reform$"
 magna_carta_advance_desc: "$magna_carta_reform_desc$"
 royal_navy: "Königliche Marine"
 royal_navy_desc: "Ab etwa 1495 investierte die Tudor-Monarchie nicht nur massiv in den Schiffbau, sondern auch in die dafür nötige Infrastruktur. Für viele stellt dies den Beginn der „Royal Navy“, der Königlichen Marine, dar."
 eltham_ordinance: "Eltham-Verordnung"
 eltham_ordinance_desc: "Auch wenn sie im Jahr 1526 nicht erlassen wurde, stellte diese Verordnung den ersten Versuch dar, die königliche Verwaltung von England zu optimieren. Ziel war es, die Kosten zu senken und die Prozesse zu beschleunigen."
 secretaries_of_state: "Kabinettsminister"
 secretaries_of_state_desc: "Der König hatte schon immer einen Bediensteten, der für die Korrespondenz verantwortlich war. Mitte des 17. Jahrhunderts wurde die Anzahl an solchen Personen immer weiter erhöht und sie wurden zu einem wichtigen Teil der Regierungsmaschine. Sie haben nicht nur königliche Dekrete weitergeleitet, sondern auch ein gewisses Maß an Eigenverantwortung gehabt."
 navigation_acts: "Navigationsgesetze"
 navigation_acts_desc: "Diese Gesetze stellten den Höhepunkt des Merkantilismus dar. Unser Handel wird von unseren Schiffen transportiert und erreicht zuerst unsere eigenen Häfen, in denen er besteuert wird."
 eng_red_coats: "Rotröcke"
 eng_red_coats_desc: "Das Leben in der englischen Armee ist zermürbend und streng reglementiert, doch es verleiht einem Mann auch einen gewissen Charakter. Die steife Oberlippe und die Erfahrung mit der Schusswaffe versetzten ihre Feinde in Angst und Schrecken."
 eng_experimental_riflemen: "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"
 sick_and_hurt_board: "Komitee für Kranke und Verletzte"
 sick_and_hurt_board_desc: "Das im Jahre 1707 gegründete Komitee hatte die Aufgabe, sich um das Wohlergehen der einfachen Seeleute zu kümmern, die in der Marine dienten. Es hat außerdem eine Reihe von Reformen durchgesetzt, die die Gesundheit der Seeleute verbesserten."
 british_bill_of_rights: "Englische Bill of Rights"
 british_bill_of_rights_desc: "Die „Bill of Rights“, eine Reihe umfassender Reformen, konzentrieren sich auf die Limitierung der königlichen Macht, besonders im Bereich der Justiz. Der Monarch darf nicht eigenmächtig Armeen ausheben, grausame oder ungewöhnliche Bestrafungen erlassen oder sich in die freie Wahl der Parlamentsmitglieder einmischen."
 defense_of_the_faith: "Verteidigung des Glaubens"
 defense_of_the_faith_desc: "Zwar hat man uns aus Akkon und Zypern vertrieben, aber weiter wird sich der Souveräne Ritter- und Hospitalorden vom Heiligen Johannes nicht zurückziehen. Zur Zeit der Heiden wachte ein Koloss über den Hafen von Rhodos, nun aber hat die größte Festungsanlage, die die Welt jemals gesehen hat, diese Rolle übernommen."
 assistance_to_the_suffering: "Unterstützung der Leidenden"
 assistance_to_the_suffering_desc: "Der Orden nennt sich nicht ohne Grund Ritter- und Hospitalorden, denn ursprünglich waren wir die Schutztruppe eines Pilgerhospitals in Jerusalem. Auch wenn Jerusalem an die Sarazenen verloren ging, bieten wir Bedürftigen weiterhin medizinische Hilfe. Dazu gehören auch unsere tapferen Ritter, die nach einer Verwundung viel schneller als die Soldaten der meisten Armeen wieder voller Eifer ins Gefecht ziehen können."
 reconquista_of_the_sea: "Reconquista der See"
 reconquista_of_the_sea_desc: "Aufgrund unserer häufigen Zusammenstöße mit den gefürchteten türkischen und nordafrikanischen Korsaren kam uns der Gedanke, dass die Korsaren mit ihren Plünderungen und Küstenüberfällen im Grunde den richtigen Ansatz verfolgen, sich dafür aber die falschen Ziele aussuchen. In Friedenszeiten mag Piraterie eine böse Sünde sein, im Krieg jedoch nennt man sie „Freibeuterei“, und das ändert die Sachlage doch entscheidend, oder?"
 friends_in_need: "Freunde in Not"
 friends_in_need_desc: "Unser Orden wurde von gläubigen Christen aus allen Teilen der Welt gegründet. Diese Tatsache und der ständige Bedarf an externer Unterstützung zur Erfüllung unserer Mission haben uns sehr geschickt darin gemacht, helfende Hände für unsere Sache zu finden. Wir werden unsere Präsenz an den Höfen Europas nutzen, um mächtige katholische Herrscher auf unsere Seite zu ziehen."
 scourge_of_the_corsairs: "Korsarengeißel"
 scourge_of_the_corsairs_desc: "Der berühmte türkische Freibeuter Barbarossa schlug viele legendäre Schlachten gegen die Ritter, aber er war keinesfalls der einzige Korsar, mit dem wir es zu tun bekamen. Die von den Berberstaaten tolerierten und von den Türken finanzierten Überfälle und Plünderungen in ganz Südeuropa müssen aufhören! Die Ritter werden ihre Pflicht erfüllen und die unschuldigen Seeleute um jeden Preis verteidigen."
 crusader_tradition: "Kreuzrittertradition"
 crusader_tradition_desc: "Ritter unseres Ordens nahmen an den Kriegen gegen Saladin teil und kämpften auch bei der Verteidigung Akkons, dem letzten Outremer-Kreuzritteraußenposten. Sollte ein Ordensritter jemals Heldentaten vollbringen wollen, so muss er sich nur die vergangenen Taten der Ordensritter vom Ritter- und Hospitalorden vom Heiligen Johannes vor Augen führen. Der Name „Malteserritter“ steht für die Ewigkeit und unsere berühmte Tapferkeit in der Schlacht."
 ecumenical_defenders_of_christendom: "Ökumenische Verteidiger der Christenheit"
 ecumenical_defenders_of_christendom_desc: "Die Reformation hat unserer Sache geschadet, da nun deutsche und skandinavische Ritter Fragen über die Hostie stellen. Die allgegenwärtige Bedrohung durch die Türken aber lässt solche Zwistigkeiten unwichtig erscheinen. Vielleicht sollten wir uns auf die Reichsverteidigung konzentrieren und erst dann theologische Debatten führen, wenn die sarazenische Bedrohung unter Kontrolle gebracht wurde?"
 a_neverending_crusade: "Niemals endender Kreuzzug"
 a_neverending_crusade_desc: "Unsere Mission wird erst erfüllt sein, wenn auch der letzte Katholik seine Religion ohne Gefahr ausleben kann. Sei es, um zu Grab unseres Herrn und Erlösers zu pilgern oder einfach nur die Meere zu überqueren, ohne Angst vor Korsaren haben zu müssen. Wir werden niemals damit aufhören, uns auf den nächsten Kampf vorzubereiten."
 inspired_builders: "Inspirierende Baumeister"
 inspired_builders_desc: "Die Hauptaufgabe unseres Ordens liegt im Kämpfen, doch dank des Herrn sind unsere Kämpfe nicht nur kriegerischer Natur. Unser Volk braucht Annehmlichkeiten und Schutz vor möglichen Angriffen. Dafür haben wir über Jahrhunderte hinweg die Fähigkeit entwickelt, in kürzester Zeit Gebäude und Festungen zu errichten. Wir werden diese Fähigkeit nutzen, um unseren Hauptsitz nicht nur zu einer uneinnehmbaren Festung, sondern auch zu einem Zentrum der Kultur zu machen."
 the_right_hand_pope: "Rechte Hand des Papstes"
 the_right_hand_pope_desc: "Mit der Entdeckung neuer Innovationen gerät das Zeitalter der Kreuzritter bei den einfachen Leuten immer mehr in Vergessenheit. Aus diesem Grund wird die Notwendigkeit, den Heiligen Vater zu beeinflussen, um die Zukunft unseres Volkes zu sichern, für unsere Großmeister immer offensichtlicher. Wir werden die besten Berater und Freunde des Papstes sein. Natürlich werden in unserem Bestreben, ihm zu dienen, auch einige Vorteile für uns herausspringen, nicht wahr?"
 a_brand_new_world: "Brandneue Welt"
 a_brand_new_world_desc: "Die Welt entwickelt sich ständig weiter und damit auch die Wege, die es zu beschreiten gilt. Wer fortbestehen will, muss sich anpassen. Unser Orden existiert seit mehr als einem halben Jahrtausend und wir sind noch nicht bereit, einfach zu verschwinden. Unsere sterblichen Körper werden sich zwar eines Tages dem Schöpfer anschließen, aber unser Orden selbst wird es nicht. Unser Orden ist unsterblich! Wir müssen dafür sorgen, dass wir die fortschrittlichste Nation aller fortschrittlichen Nationen sind und aus dem Kern heraus Stärke gewinnen."
 an_order_with_state: "Orden mit einem Staat"
 an_order_with_state_desc: "Manche Nationen werden oft als #italic Armee mit einem Staat#! bezeichnet, doch wir waren schon seit der Übernahme von Rhodos durch die Griechen mehr ein „Orden mit einem Staat“. Und dennoch kommen wir nicht umhin, die Effizienz zu bewundern, mit der sie ihre Ressourcen nutzten, um zu solch einer beeindruckenden Nation zu werden. Wir müssen uns von ihren Leistungen inspirieren lassen und Reformen durchführen, die sicherstellen, dass unser Militär jedem Feind gewachsen ist."
 local_merchant_preference: "Begünstigung lokaler Händler"
 local_merchant_preference_desc: "Theoretisch ist ein Händler ein Weltbürger, der von Hafen zu Hafen fährt, ganz wie es ihm beliebt. Wir müssen unseren Händlern in unserer Heimat gewisse Vorteile bieten, beispielsweise Vorzüge bei der Ladung und Entladung ihrer Schiffe. Nur so werden wir sicherstellen können, dass unsere Händler Anlass haben, ihre Waren zu uns in die Heimat zu bringen."
 association_with_unbelievers: "Zusammenarbeit mit Ungläubigen"
 association_with_unbelievers_desc: "Manche sagen, dass wir uns überhaupt nicht auf Ungläubige einlassen sollten. Wir haben viel getan, um diese Meinung abzutun, da wir nur mit Ungläubigen Handel treiben können, wenn wir mit diesen in Kontakt treten."
 port_security_improvement: "Verbesserte Hafensicherheit"
 port_security_improvement_desc: "Wir können nur dann Gewinne aus dem Handel erzielen, wenn die Handelsschiffe in unseren Häfen sicher vor Anker gehen können. Wir müssen sicherstellen, dass jene Viertel, die von Händlern frequentiert werden, frei von Verbrechen sind."
 end_of_shipbuilding_guilds: "Verbot der Schiffbauerzünfte"
 end_of_shipbuilding_guilds_desc: "Seit auf der Arabischen Halbinsel Schiffe gebaut werden, gibt es Zünfte, die den Markt kontrollieren. Auch wenn sie uns einen wertvollen Dienst erwiesen haben, indem sie die Schiffbautraditionen am Leben erhalten haben, sind sie dem Fortschritt mittlerweile hinderlich geworden. Wir müssen all jenen erlauben, Schiffe zu bauen, die über das nötige Talent verfügen."
 skilled_captains: "Fähige Kapitäne"
 skilled_captains_desc: "Wir müssen sicherstellen, dass unsere Kapitäne nach den höchsten Standards ausgewählt werden und über das nötige Wissen verfügen, um die Meere zu befahren. Wir müssen sicherstellen, dass sie die Manövrierfähigkeit unserer Schiffe zu ihrem Vorteil nutzen können, ganz gleich, in welcher Lage sie sich auch befinden mögen."
 expansion_of_trade_contacts: "Erweiterung der Handelskontakte"
 expansion_of_trade_contacts_desc: "Wir müssen sicherstellen, dass unsere Händler, wohin sie auch reisen mögen, immer willkommen sind. Um dies zu erreichen, müssen wir dafür sorgen, dass alle Herrscher, von denen wir je gehört haben, unseren Händlern gegenüber wohlwollend gestimmt sind."
 #Scottish Advances
 unlock_gallowglass_advance: "$a_gallowglass$"
 unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"
 unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
 unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"
 unlock_late_gallowglass_advance: "$a_late_gallowglass$"
 unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"
 scottish_salmon: "Erhaltung des schottischen Lachses"
 scottish_salmon_desc: "Unsere Flüsse und Küsten sind reich an Lachs. Um der Überfischung entgegenzuwirken, ist jedoch eine strenge Gesetzgebung vonnöten. Nur dann werden wir in der Lage sein, diese Ressource zu nutzen und unsere lokale Wirtschaft auf die Ausfuhr dieses sehr begehrten Fisches ausrichten zu können."
 scottish_morale: "Schottischer Mut"
 scottish_morale_desc: "Seit unseren Kriegen gegen die englische Tyrannei haben wir unsere Unabhängigkeit nur dank dem Mut unseres Volkes bewahrt. Sich auf das Erbe von Männern wie William Wallace zu besinnen, wird unsere Soldaten dazu inspirieren, die schottische Unabhängigkeit zu verteidigen und zu schützen."
 scottish_highland_tradition: "Highland-Tradition"
 scottish_highland_tradition_desc: "Die Clans der Highlands unterscheiden sich seit jeher in ihrem Vorgehen von den Armeen der Tiefebenen. Aufgewachsen in und an den Tälern, Lochs und steilen Hängen des Nordens fühlen sich unsere Clanmitglieder in unwegsamem Gelände von Natur aus wohl, während es Fremde erschöpft und ihnen die Orientierung raubt. Diese profunde Kenntnis der örtlichen Landschaft wird vom Vater an den Sohn weitergegeben, und kein fremder Eroberer hat sie je vollständig gemeistert."
 scottish_longbowmen: "Englisch-schottische Langbogenschützen"
 scottish_longbowmen_desc: "Dank unserer guten Beziehungen zu England sind wir in der Lage, einen Teil ihrer Militärtaktiken für unsere Armee zu übernehmen und sie zu einer Furcht einflößenden Macht auszubauen."
 peel_towers_advance: "Peel-Turm"
 peel_towers_advance_desc: "Die Peel-Türme wurden als Antwort auf das raue Leben in den Grenzgebieten unseres Landes errichtet. Sie dienen der Bevölkerung und dem Vieh als Schutz vor feindlichen Überfällen und ihre Signalfeuer können genutzt werden, um Nachbarstädte vor herannahenden feindlichen Armeen zu warnen."
 scottish_tenacity: "Zähes Land"
 scottish_tenacity_desc: "Kriege sind oft lang und ermüdend. Wenn wir unsere Unabhängigkeit beibehalten wollen, müssen wir darauf vorbereitet sein, solch harte Zeiten zu überstehen. Glücklicherweise ist unser Volk so zäh wie das Land, das sie ihre Heimat nennen, und werden bei einer Invasion bis zum letzten Mann kämpfen."
 influx_of_english_nobles: "Englische Verwalter"
 influx_of_english_nobles_desc: "Wir haben mit unserem südlichen Nachbarn Frieden geschlossen. Durch den Zustrom an englischen Edelleuten in unsere Verwaltung über wir viel effektiver die Kontrolle über unser Land aus."
 scottish_trade_connections: "Handelsverbindung zur $north_sea_area$"
 scottish_trade_connections_desc: "Unser Land liegt am äußersten Rand von Westeuropa und hat kaum Ressourcen. Wenn unsere Wirtschaft florieren soll, müssen wir in sie investieren und unsere Handelsverbindungen auf andere Regionen ausweiten. Die Nordsee enthält zahlreiche Märkte und Geschäftsmöglichkeiten, wenn wir sie zu nutzen wagen."
 comets: "Kometen?"
 comets_desc: "Vor Kurzem wurde uns ein hochinteressantes Werk in die Hände gespielt. Dieses trug den Titel #italic „Über die wahre Bedeutung von Kometen, ungeachtet der Eitelkeit der Sterndeuter“#!. Wir haben verfügt, dass das ganze Reich vom Inhalt des Buches in Kenntnis gesetzt werden soll."
 modernized_royal_scots_navy: "Königliche schottische Marine"
 modernized_royal_scots_navy_desc: "Seit den Unabhängigkeitskriegen haben wir uns darum bemüht, eine eigene Flotte aufzubauen. Bisher waren wir dazu auf unsere Feudalaufgebote angewiesen. Wir müssen eine moderne Flotte aufbauen, die dem König gehört und in unserem neuen Hafen Newhaven stationiert ist."
 royal_revenue: "Königliche Einkünfte"
 royal_revenue_desc: "Wenn wir das Land der Schotten dauerhaft vor der Knechtschaft bewahren möchten, brauchen wir ein stabiles Einkommen. Indem wir unsere Kontrolle über die königlichen Ländereien und Lehnsrechte verstärken, können wir unsere rechtmäßigen Steuereinnahmen erhöhen. Auf diese Weise können wir sicherstellen, dass die Krone über ausreichende Mittel verfügt, um nach eigenem Gutdünken handeln zu können, ohne auf andere Geldquellen angewiesen zu sein."
 scottish_education: "Schottische Universitäten"
 scottish_education_desc: "Dank unserer Erfahrungen mit anderen europäischen Universitäten und Bildungseinrichtungen wissen wir jetzt, wie wir das Bildungssystem in unserem eigenen Land verbessern können. Unser Volk muss in der Lage sein, sich auch in ihrem Heimatland Wissen und besondere Fähigkeiten anzueignen, ohne teure Reisen unternehmen zu müssen und auf fremdländische Einrichtungen angewiesen zu sein."
 act_of_revocation: "Gesetz der Rückforderung"
 act_of_revocation_desc: "Lange Zeit war es üblich, dem Adel für seine Dienste Teile der königlichen Domäne zu schenken. Wenn wir die Kontrolle über unser Land behalten wollen, kann dieses System nicht länger beibehalten werden. Wir sollten das Land verpachten, anstatt es zu verschenken."
 scottish_diplomacy: "Verlass auf Bündnisse"
 scottish_diplomacy_desc: "Wir haben uns die letzten Jahrhunderte auf die Diplomatie und unsere Kontakte zu anderen Ländern auf dem Kontinent verlassen, um unsere Unabhängigkeit zu sichern. Es ist an der Zeit, diese Praxis zu formalisieren und dafür zu sorgen, dass unsere Beziehungen zu anderen Ländern noch viele weitere Jahrhunderte andauern werden."
 scottish_highlander_advance: "Highlander-Regimenter"
 scottish_highlander_advance_desc: "Regimenter aus der Bevölkerung der schottischen Highlands zu rekrutieren, könnte bei unseren militärischem Bemühungen eine entscheidende Rolle spielen."
 scottish_whisky: "Schottischer Whiskey"
 scottish_whisky_desc: "Brennereien existieren in Schottland bereits seit Ewigkeiten, doch wir sollten auch sicherstellen, dass der Staat ausreichend Kontrolle über sie ausüben kann. Mit einer staatlichen Whiskey-Industrie können wir uns an vorderster Front in der Spirituosenproduktion aufstellen und mehr davon ausführen."
 scottish_enlightenment: "Schottische Aufklärung"
 scottish_enlightenment_desc: "Die Fortschritte in der Philosophie, der politischen Ökonomie und der Medizin haben unseren Landsleuten, die Schottland an die Spitze der weltweiten Innovation katapultieren werden, eine Reihe von Errungenschaften eingebracht. Wir leben in einer Zeit der schottischen Aufklärung und sollten dies als Werkzeug auf der Weltbühne nutzen."
 #Semi generic Advances for german countries
 swabian_league_of_cities: "Städtebund"
 swabian_league_of_cities_desc: "Schwaben beherbergt viele wohlhabende Städte, die für Begehrlichkeiten und Eroberungsstreben bei fremdländischen Herrschern sorgen. Um unser Land besser zu schützen, sollten wir uns in Kriegszeiten zusammenschließen und gegen fremdländische Eingriffe in unser Land kämpfen."
 swabian_frugal_people: "Sparsame Finanzen"
 swabian_frugal_people_desc: "Viele werfen unserem Volk Geiz vor und man lacht über unseren gesunden Sinn für wirtschaftliche Vorsicht. Glücklicherweise perlt dieser Spott einfach ab, denn wir verfügen über eine robuste Staatskasse und reichlich Dukaten, die wird in unser eigenes Streben investieren können."
 franconian_proud_knights: "Reichsritter"
 franconian_proud_knights_desc: "Unser Volk brachte eine lange Reihe stolzer Ritter für den kaiserlichen Dienst hervor. Sie verkörpern viele ritterliche Ideale, die seitdem an Bedeutung verloren haben, aber dennoch ein wesentlicher Bestandteil dessen sind, was wir zu sein versuchen. So können wir auf eine lange Geschichte zurückblicken, die uns viele Lektionen lehrte, sowohl was ritterliches Verhalten als auch die eher militärischen Aspekte dieses Lebens betrifft. Dies wirkt sich natürlich auch auf die Bereitschaft unserer Adligen aus, Abgaben zu leisten: Schließlich hoffen sie, in ehrenhaften Kämpfen Ruhm zu erlangen."
 franconian_wine_bottles: "Silvaner und Bocksbeutel"
 franconian_wine_bottles_desc: "Der Bocksbeutel ist ein wichtiger Teil unserer großen und stolzen Weintradition. Diese Flaschenform ist äußerst praktisch und leicht zu erkennen, sodass sie als eine Aushängeschild für jene schönen Weine dient, die man in unserer Region keltert. Mit derart berühmten Weinen wie dem Silvaner oder dem Riesling werden sowohl unsere Glasmacher als auch unsere Winzer sicherlich wirtschaftlich erfolgreich sein."
 westphalian_monastic_traditions: "Land der Klöster"
 westphalian_monastic_traditions_desc: "Im Norden Deutschlands gibt es viele katholische Hochburgen wie die Bistümer Münster und Paderborn. Das Klosterleben und die damit verbundenen religiösen Traditionen in der Region wirken sich im Allgemeinen zuträglich auf die Bildung und die Erziehung unserer Geistlichen aus: Sie haben zahlreiche Orte und Möglichkeiten, um sich weiterzubilden und zu lernen. Geistliche, die der Heiligen Mutter Kirche beitreten möchten, verfügen so über vielfältige Gelegenheiten."
 north_german_hanseatic_traditions: "Hanseatische Händler"
 north_german_hanseatic_traditions_desc: "Die Menschen in unseren Regionen im Norden Deutschlands profitieren seit Langem vom Zugang zur Ostsee. Während viele unserer südlicheren Nachbarn für die Beförderung von Gütern auf Flüsse angewiesen sind, haben wir eine lange Tradition von Händlern, die auf der Ostsee ihr Geld verdienen und so Wohlstand und Reichtum an unsere Küsten bringen."
 german_baltic_sailors: "Baltische Seeleute"
 german_baltic_sailors_desc: "Ein raues Klima sorgt für raue Menschen. Die Nähe zur kalten Ostsee hat unsere Seeleute zweifellos geprägt und sie sehr fähig in ihrem Fach und zu geistig äußerst belastbaren und widerstandsfähigen Menschen gemacht, denn die See kann eine sehr strenge Herrin sein."
 german_populating_the_countryside: "Die richtigen Leute anziehen"
 german_populating_the_countryside_desc: "Die Wiederbevölkerung ländlicher Gebiete und die Bereitstellung von Ackerland für die Menschen bilden eine hervorragende Grundlage, um langsam, aber sicher den Wohlstand und das Gedeihen unserer derzeit nur dünn besiedelten Gebiete zu mehren."
 german_fair_towns: "Reichsmessestädte"
 german_fair_towns_desc: "Reichsmessen sind ein seltenes Privileg, das nur einigen wenigen Städten gewehrt wird: Durch sie entstehen die größten Märkte $europe$s, und diese Städte werden zum wirtschaflichen Herzen des Heiligen Römischen Reichs. Durch das zentralisierte Wesen dieser Märkte können Händler besser planen und effektiver verhandeln, während sie zugleich frei auf unterschiedlichste Warenarten zugreifen können."
 german_imperial_roads: "Kaiserliches Straßennetz"
 german_imperial_roads_desc: "Seit Jahrhunderten werden im Herzen Europas Straßen gebaut, erweitert und verbessert. Von den Römern bis heute erleichtern die zahlreichen kaiserlichen Straßen, die Orte innerhalb Deutschlands miteinander verbinden, den Handel und das Reisen für alle. Zugleich bieten sie auch große Vorteile für alle logistischen Anforderungen, insbesondere wenn es um die Verlegung von Armeen geht."
 landsknechte: "Landsknechte"
 landsknechte_desc: "Aus den immer wieder aufflammenden Kriegen innerhalb Deutschlands und an seinen Grenzen entwickelte sich eine neue Art der Einheitenorganisation. Die $landsknechte$ sind gemischte Truppen, die aus innovativen Pikenier-Gevierten bestehen, welche an den Flanken von Arkebusenschützen unterstützt werden. An der Frontlinie hingegen stehen berüchtigte #italic Doppelsöldner#!, die Zweihandschwerter führen und die doppelte Bezahlung erhalten. Dies ermöglicht Taktiken, die Nah- und Mittelstreckenkampf miteinander verknüpfen."
 german_biedermeier: "Biedermeier"
 german_biedermeier_desc: "Die Biedermeierzeit ist geprägt von einer konservativen Haltung in unserer Gesellschaft, die ihren Ursprung in den oberen Schichten und deren Sehnsucht nach vergangenen Zeiten hat. Dies führt dazu, dass man viele der freieren Denkweisen und kreativen Bestrebungen im Privaten, abgeschirmt von der Öffentlichkeit, auslebt. Dies mag unbeabsichtigt die Entwicklung einer kulturellen Identität innerhalb der bürgerlichen Schicht stärken, ist aber auch der Grund dafür, dass viele Freidenker auswandern und ihre Bestrebungen im Ausland fortsetzen."
 custom_union_of_the_rhine: "Rheinischer Münzverein"
 custom_union_of_the_rhine_desc: "Um im Flickenteppich des Kaiserreichs zu gedeihen, muss man bei wirtschaftlichen Angelegenheiten mit den eigenen Nachbarn zusammenarbeiten. Wir werden uns dem Zollverein des Rheins anschließen und dessen #italic Gulden#! übernehmen, um unseren Händlern das Geschäft zu erleichtern und die Diplomatie mit anderen Ländern zu vereinfachen."
 lub_hanseatic_coins: "Wendischer Münzverein"
 lub_hanseatic_coins_desc: "Der neu gegründete Wendische Münzvertrag ist ein Zusammenschluss von Städten mit starker hanseatischer Präsenz, der uns ein solides Fundament bietet, um Handel und Gewerbe in unseren Landen zu fördern."
 hamburg_port_cities: "Hafennetzwerke"
 hamburg_port_cities_desc: "Unser Land überlebt nur dank des Seehandels und des ständigen Austauschs von Waren. Damit der Hafenbetrieb auch weiter ordnungsgemäß aufrechterhalten werden kann und neue Händler und ihre Schiffe unsere Häfen besuchen, müssen wir neue Wasserstraßen ausbaggern und weitere Docks und Lagerhäuser bauen."
 saiger_process: "Seigerhüttenvorgang"
 saiger_process_desc: "Bei dieser neuen und revolutionären Form der Verhüttung wird Kupfer, das Silber enthält, mit Blei angereichert, was die Produktivität unseres Bergbaus steigert."
 german_river_toll_castle_advance: "$german_river_toll_castle$"
 german_river_toll_castle_advance_desc: "$german_river_toll_castle_desc$"
 german_mountain_toll_castle_advance: "$german_mountain_toll_castle$"
 german_mountain_toll_castle_advance_desc: "$german_mountain_toll_castle_desc$"
 #Austria
 austrian_tradition: "Glorreiches Haus"
 austrian_tradition_desc: "Unser Aufstieg zur Macht rief bei vielen Neid her, und die rivalisierenden Häuser des Reichs wetteifern um unsere Stellung als Beschützer der südöstlichen Grenze. Trotz dieser Umstände sind wir stolz auf das, was wir mit unserer Diplomatie erreicht haben und alle anderen übertrifft."
 austrian_heritage: "Vermächtnis von Rudolf I."
 austrian_heritage_desc: "Der Sieg von Rudolf I. über seine Rivalen hat uns einen Platz unter den großen Häusern des Reichs gesichert und ist Gegenstand vieler Geschichten und Lieder geworden. Der Eifer, den er und seine Ritter bei der Schlacht auf dem Marchfeld an den Tag gelegt haben, wird unseren Truppen in den nächsten Jahrhunderten als Inspiration dienen."
 hab_expert_mountaineers: "Land der Berge und Flüsse"
 hab_expert_mountaineers_desc: "Unser Volk hat gelernt, die hohen Gipfel und Pässe unserer Berge sowie die breiten Flüsse unserer Täler zu überwinden, die für andere oft ein Hindernis darstellen."
 austrian_marriage_policy: "Tu felix Austria nube"
 austrian_marriage_policy_desc: "Lass andere Kriege führen und heirate, du glückliches Österreich! Denn was der Mars anderen gibt, gibt dir die Göttin Venus."
 habsburg_dominance: "Österreichische Diplomatie"
 habsburg_dominance_desc: "Unsere Lage in der Mitte Europas macht es oft nötig, dass wir uns bezüglich unserer Außenpolitik flexibel zeigen. Bündnisse und Rivalitäten können ebenso rasch enden, wie man sie eingeht, und unsere Diplomaten sind geschult, jede denkbare Haltung einnehmen zu können."
 austrian_military_flexibility: "Landsknecht-Taktik"
 austrian_military_flexibility_desc: "Nur eine abgerundete Taktik aus Artillerie, Kavallerie und unnachgiebiger, aus Landsknechten rekrutierter Infanterie kann uns zum Sieg führen."
 edict_of_restitution: "Restitutionsedikt"
 edict_of_restitution_desc: "Ein kleines Stück Papier wird uns dabei helfen, den religiösen Streit, der unser Reich heimsucht, zu überstehen. Diese harmlose Verordnung löst mit Sicherheit keine weiteren Spannungen aus."
 austrian_court: "Österreichischer Hof"
 austrian_court_desc: "Das Unterhalten diplomatischer Beziehungen kostet viel Zeit und Mühe, und zu viele daran zu beteiligen, könnte sich abträglich auf unsere Effizienz und unseren Ruf auswirken. Indem wir unsere Hofabläufe bestmöglich gestalten, sammeln wir mehr Wissen und glätten aufkommende Wogen bereits im Vorfeld."
 geheimrat: "Geheimer Rat"
 geheimrat_desc: "Der geheime Rat ist ein elitäres Beratungsgremium, das aus hochrangigen Adligen und Beamten besteht und als zentrale Institution zur Lenkung der österreichischen Entscheidungen in Sachen Politik, Militär und Verwaltung dient."
 hofkriegsrat: "Hofkriegsrat"
 hofkriegsrat_desc: "Unser Kriegsrat kann nur funktionieren, wenn er durch eine ordnungsgemäße bürokratische Struktur gestützt wird. Nur wenn wir jedes Detail über unsere Truppen und unsere Logistik kennen, können wir unser Reich vor Eindringlingen schützen."
 military_border: "Militärgrenze"
 military_border_desc: "Die Verteidigung unserer Grenzen ist eine ernstzunehmende Angelegenheit, insbesondere im Hinblick auf die Finanzierung, die aus der Staatskasse stammt. Eine Lösung wäre die großzügige Vergabe von Ländereien im Grenzgebiet. Dies würde es uns erlauben, eine Klasse von Berufssoldaten aufzubauen, die eine höhere Disziplin aufweisen, und es würde die Migration in unterbevölkerten Regionen in unserem Land erleichtern."
 austrian_ambition: "Aufklärung durch Bildung"
 austrian_ambition_desc: "Unsere Herrscher müssen die bestmögliche Bildung erhalten, um dem Ideal eines aufgeklärten Monarchen gerecht zu werden."
 austrian_state_industrialization: "Staatliche Industrialisierung"
 austrian_state_industrialization_desc: "Die Modernisierung unserer Industrie muss stets Vorrang vor allem anderen haben. Nur mit modernen Manufakturen halten wir mit unseren Konkurrenten auf der Weltbühne Schritt."
 wiener_klassik: "Wiener Klassik"
 wiener_klassik_desc: "Die Wiener Klassik ist ein Wendepunkt in der Musikgeschichte. Die Werke unserer besten Komponisten revolutionieren die westliche Musik durch ihre Innovationen bei Symphonien und Opern sowie in der Kammermusik."
 multicultural_empire: "Multikulturelles Großreich"
 multicultural_empire_desc: "Österreich ist ein vielgestaltiges und multikulturelles Reich, das zahlreiche ethnische Minderheiten für sich annehmen und respektieren muss, um Einigkeit und Stabilität angesichts wachsender nationalistischer Spannungen zu wahren."
 imperial_artillery: "Kaiserliche Artillerie"
 imperial_artillery_desc: "Die rasend schnellen Veränderungen in der Kriegsführung nötigen uns, unsere Truppen und Taktiken zu modernisieren. Um einen Vorsprung vor unseren Feinden zu wahren, machen wir unsere Artillerie zum Stolz der kaiserlichen Armee."
 alchemy_advance: "Alchemie"
 alchemy_advance_desc: "Die Kunst der Alchemie umfasst die Herstellung von Tränken und Elixieren durch die Kombination von Kräutern, Mineralien und anderen natürlichen Zutaten. Obwohl sie nicht immer zuverlässig ist, kann die Alchemie manchmal bemerkenswerte Ergebnisse bei der Behandlung verschiedener Krankheiten erzielen."
 anatomy_advance: "Anatomie"
 anatomy_advance_desc: "Unsere Ärzte entwickeln ein immer besseres Verständnis für den menschlichen Körper, was ihnen erlaubt, effizientere Behandlungsmethoden für Verletzungen und Krankheiten zu entwickeln. Dieses Wissen, das größtenteils aus der Sezierung menschlicher Leichen gewonnen wird, hat auch die chirurgischen Methoden verbessert und dazu beigetragen, dass medizinische Eingriffe weniger riskant sind."
 surgery_advance: "Operation"
 surgery_advance_desc: "Die Bader entwickeln immer ausgeklügeltere Techniken zur Behandlung von Verletzungen und Krankheiten und die Entwicklung neuer chirurgischer Instrumente hat medizinische Eingriffe sichererer und effektiver gemacht. Dies hat dazu geführt, dass Patienten Verletzungen und Krankheiten, die noch vor wenigen Jahren tödlich gewesen wären, überleben können."
 pharmacology_advance: "Pharmakologie"
 pharmacology_advance_desc: "Alchemisten und Ärzte erforschen immer neue Mixturen, um Heilmittel zu finden; einige von ihnen haben Behandlungen für häufige Krankheiten wie Fieber, Erkältungen und Verdauungsprobleme entwickelt. Es gibt jedoch noch viel zu lernen und viele dieser neuen Heilmittel können falsch zubereitet äußerst gefährlich sein."
 sanitation_advance: "Hygiene"
 sanitation_advance_desc: "Siedlungen investieren in Hygienemaßnahmen wie Abfallentsorgung und saubere Wassersysteme. Dies hat die Ausbreitung von Krankheiten eingedämmt und die allgemeine Gesundheit der Bevölkerung verbessert. Die Entwicklung moderner Sanitäranlagen wird unserer Bevölkerung erlauben, auf engstem Raum zu leben, ohne eine erhöhte Gefahr von Krankheiten hinnehmen zu müssen."
 vaccination_advance: "Impfung"
 vaccination_advance_desc: "Dank der Entwicklung von Impfstoffen sind Ärzte heute in der Lage, die Bevölkerung gegen tödliche Krankheiten zu immunisieren. Diese Impfstoffe tragen auch dazu bei, die Ausbreitung von Krankheiten einzudämmen, und verhindern Epidemien. Indem eine kleine Menge geschwächter oder abgetöteter Bakterien oder Viren in den menschlichen Körper injiziert wird, kann das Immunsystem die Krankheit erkennen und abwehren, wenn der Körper erneut von diesen befallen wird."
 vibrant_court_advance: "Geschäftiger Hof"
 vibrant_court_advance_desc: "Gelehrte und Kunsthandwerker aus der ganzen bekannten Welt kommen an unseren Hof und bringen die unterschiedlichsten Moden und Sprachen mit. Dies hat dazu geführt, dass wir immer mehr über ihre fremden „Manieren“ lernen."
 patio_process_advance: "Patio-Verfahren"
 patio_process_advance_desc: "Das $patio_process_advance$ ist eine Methode zur Raffination von minderwertigen Silber- und Golderzen. Es basiert auf einer chemischen Quecksilberlösung, die als Katalysator für die Amalgamreaktion genutzt wird."
 pan_amalgamation_advance: "Pan-Amalgam-Verfahren"
 pan_amalgamation_advance_desc: "Das $pan_amalgamation_advance$ ist die Weiterentwicklung des Patio-Verfahrens und erlaubt eine noch schnellere Silber- und Goldveredelung."
 #Teutonic Order
 teu_crusader_discipline: "Kreuzritterdisziplin"
 teu_crusader_discipline_desc: "Unser großer Orden wurde in den Flammen und im Blut des Dritten Kreuzzuges während der Belagerung von $acre$ im Jahr 1191 geschmiedet. Ursprünglich haben wir die Kranken und Schwachen gepflegt, doch mit der Zeit hat sich der Orden in eine Armee von Rittern mit unerschütterlicher Hingabe und Disziplin verwandelt."
 teu_teutonic_heavy_cavalry: "Schwere Ordenskavallerie"
 teu_teutonic_heavy_cavalry_desc: "Es gibt kein besseres Symbol für Macht als die Stärke der Schweren Kavallerie. Während die Kavallerie vieler anderer Staaten aus Adligen besteht, ist jeder Ordensritter ein Mitglied unserer Schweren Kavallerie und muss die strenge Ausbildung eines Kreuzritters absolvieren."
 teu_reformed_order_army: "Reformierte Ordensarmee"
 teu_reformed_order_army_desc: "Die Ritter des Deutschen Ordens haben an vielen Kreuzzügen und endlosen europäischen Kriegen teilgenommen und sind zahlenmäßig einfach zu schwach, um das Fundament unserer Armee zu bilden. Wir müssen die Armee neu organisieren und sie mit Aufgeboten ergänzen."
 teu_peasants_recruitment: "Bauernrekrutierung"
 teu_peasants_recruitment_desc: "Es wird immer offensichtlicher, dass wir uns nicht länger auf Freiwillige aus fremden Ländern verlassen können, um die Reihen unserer Armee zu füllen, ganz gleich, wie erfahren und wertvoll sie auch sein mögen. Wir müssen stattdessen ein System einführen, das es uns erlaubt, unsere Untertanen, Deutsche und Nichtdeutsche, in den Militärdienst zu stellen."
 teu_infantry_tactics: "Infanterietaktiken"
 teu_infantry_tactics_desc: "Die gegenwärtigen Schlachtfelder Europas haben bewiesen, dass das Zeitalter der Infanterie angebrochen ist. Wir müssen neue Taktiken entwickeln, die Pike übernehmen und unser mittelalterliches Konzept der Hilfsinfanterie in die Hauptkampftruppe unserer zukünftigen Armeen umwandeln."
 teu_teutonic_religious_authority: "Religiöse Autorität des Ordens"
 teu_teutonic_religious_authority_desc: "Wir müssen der losen religiösen Autonomie der Ortsbischöfe in unserem Reich ein Ende setzen. Alle religiösen Angelegenheiten, von der Besteuerung bis zur Bekehrung der Einheimischen, werden von nun an Staatsangelegenheit sein."
 teu_expanded_marches: "Erweiterte Marken"
 teu_expanded_marches_desc: "Wir müssen den Statthaltern unserer Grenzregionen mehr Autonomie gewähren und ihr Land in eine Mark umwandeln. Diese Gebiete mit Sonderrechten zahlen weniger Steuern an den Staat, sind im Gegenzug aber verpflichtet, sowohl in Kriegs- als auch in Friedenszeiten ihre Kampfbereitschaft aufrechtzuerhalten. Dies sollte uns eine erhebliche militärische Flexibilität zu geringen Kosten verschaffen."
 teu_prussian_bishops: "Preußische Bischöfe"
 teu_prussian_bishops_desc: "Um die fortwährende Loyalität der preußischen Bischöfe zu gewährleisten, sollten wir ihnen weitere Rechte und Privilegien einräumen."
 teu_one_state_one_religion: "Ein Staat, eine Religion"
 teu_one_state_one_religion_desc: "Staatsämter dürfen nur von jenen besetzt werden, die der Staatsreligion folgen. Ketzer und Heiden sind in unserem Reich nicht länger willkommen."
 teu_absolute_order: "Absoluter Orden"
 teu_absolute_order_desc: "Unser Orden hat die vollen Befugnisse des Staatsapparats. Jede Entscheidung durchläuft zuerst die Hierarchie des Deutschen Ordens, bevor sie ausgeführt wird. Natürlich ist diese Bürokratie nicht zu jedermanns Vorteil, aber sie sichert dem Hochmeister die absolute Macht."
 legacy_of_breton_independence: "Vermächtnis der bretonischen Unabhängigkeit"
 legacy_of_breton_independence_desc: "Die Bretagne war noch nie ein Teil Frankreichs. Obwohl unser Land in der Vergangenheit von Franken, Wikingern und den Engländern verwüstet wurde, haben wir unsere Identität als eigenständiges Volk bewahrt. Lasst all unsere Nachbarn wissen, dass die Bretagne, der letzte Zufluchtsort wahrer gallischer Traditionen, für immer frei sein wird!"
 estates_of_brittany: "Stände der Bretagne"
 estates_of_brittany_desc: "Die erstmals im 14. Jahrhundert einberufenen Stände der Bretagne ermöglichten freien Männern aller Gesellschaftsschichten, selbst des dritten Standes, ihre Beschwerden vorzutragen und den Herzog um Entschädigung zu ersuchen. Durch die Einberufung der Stände können wir einen Teil der Spannungen in unserem Land abbauen."
 dutch_education: "Niederländische Bildung"
 dutch_education_desc: "Unser Land hatte über alle Bevölkerungsschichten hinweg zwar schon immer eine überdurchschnittlich hohe Alphabetisierungsrate, aber dieser Vorteil kommt erst in der heutigen Zeit wirklich zur Geltung. Nur diejenigen, die über ein begrenztes Verständnis verfügen, würden diesen Vorteil nicht nutzen und ihn ausbauen wollen."
 dutch_golden_age_art: "Niederländische Kunst"
 dutch_golden_age_art_desc: "Die Niederlande haben sich historisch gesehen schon immer an vorderster Front von technologischen und kulturellen Errungenschaften positioniert. Wir müssen auch weiterhin Erfinder und Schriftsteller fördern, damit wir unseren Vorsprung beibehalten können."
 a_trading_hub: "Handelsknoten"
 a_trading_hub_desc: "Unser Land hat viele gut vernetze Städte, die sich auf den Handel konzentrieren, und unser Volk besteht aus abenteuerlustigen Seeleuten, die bereit sind, Reichtümer aus der ganzen Welt nach Hause zu bringen. Diese Männer werden in unserem Namen mit anderen Nationen Handel treiben und uns beachtliche Gewinne einbringen."
 platoon_fire: "Pelotonfeuer"
 platoon_fire_desc: "Bei einem normalen Salvenfeuer feuerte jede Gefechtslinie ihre Salve auf einmal ab. Das Ziel dabei lag in der Maximierung der Feuerkraft. Die Niederländer entwickelten ein anderes System, bei dem die einzelnen Züge nacheinander feuerten. Auf diese Weise wurden Feuerpausen vermieden, sodass der Feind keine Gelegenheit zur Erholung erhielt."
 concentration_power: "Machtbündelung"
 concentration_power_desc: "Unsere Nation wurde viel zu lange von einer Vielzahl #italic Statthaltern#! aus verschiedenen Provinzen regiert, von denen die mächtigsten als #italic Primus inter Pares#! unter ihresgleichen angesehen wurden. Es ist an der Zeit, dieses Amt erblich zu machen und die Autorität in einem einzigen Herrscher zu bündeln."
 a_fortified_border: "Eine befestigte Grenze"
 a_fortified_border_desc: "Da unser Land keinerlei natürliche Grenzen besitzt, sind diese nicht so klar definiert wie die Grenzen anderer Nationen. Wir wissen jedoch, wie man mächtige Verteidigungsanlagen errichtet. Sie schrecken Feinde ab und schützen unsere Familien."
 #Netherlandish Shared
 netherlandish_protoindustry: "Niederländisches Verlagssystem"
 netherlandish_protoindustry_desc: "In unserem Land gibt es zahlreiche geschäftiger Städte, die sich in höherem Maße als unsere Nachbarn dem Handwerk gewidmet haben. Diese Ausrichtung hat uns zu einem sehr produktiven Land gemacht."
 a_dynamic_society: "Dynamische Gesellschaft"
 a_dynamic_society_desc: "Unser Land ist die Heimat der Mutigen. Wer danach strebt, sein Leben zu verbessern, findet in unserem Land einen Platz. Wir werden den Ehrgeiz dieser Menschen nutzen, um unsere Nation zu stärken."
 an_early_urbanization: "Frühe Verstädterung"
 an_early_urbanization_desc: "Die Niederlande hatte traditionell schon immer eine hohe Verstädterungsrate, was uns erlaubt hat, höhere Ziele als erwartet zu erreichen. Wir sollten diese Entwicklung weiter fördern und ein starkes Netzwerk an Siedlungen errichten, die uns eine wohlhabendere Zukunft sichern."
 polders_advance: "Polder"
 polders_advance_desc: "Die Niederlande sind sehr anfällig für Hochwasser; während des 11. bis 14. Jahrhunderts kam es zu zahlreichen Überschwemmungen, die unter anderem auch zur Entstehung der Zuiderzee geführt und den Boden in den Küstengebieten versalzen haben. Heute verfügen wir über die Technologie zur Landgewinnung, was unsere Landwirtschaft produktiver gemacht hat."
 netherlandish_ship_building: "Niederländischer Schiffbau"
 netherlandish_ship_building_desc: "Da in den Niederlanden einige der größten Hafenstädte Europas liegen, ist es nur angemessen, dass sich dort auch einige der größten Werften Europas befinden. Sie versetzen unsere Schiffbauer in die Lage, zu geringeren Kosten neue Handelsflotten zu bauen."
 #Netherlandish Unique
 brb_the_four_quartiers: "Vier Grafschaften"
 brb_the_four_quartiers_desc: "Die vier Grafschaften beschreiben die vier Provinzen, die den Kern von $BRB$ ausmachen. Jede Grafschaft besteht aus einer Reihe größerer und kleinerer Städte, die teils ummauert sind. Sie arbeiten in perfekter Synergie und füllen unsere Taschen mit Gold."
 fla_cloth: "Flämischer Stoff"
 fla_cloth_desc: "Die flämische Stoffindustrie ist der Neid der Welt. Händler kommen von weit her, um ihre Wolle in Flandern zu verkaufen, wo sie anschließend zu Stoffen der höchsten Qualität verarbeitet wird."
 frisian_trading_traditions: "Handelstraditionen"
 frisian_trading_traditions_desc: "Vor der Gründung all der anderen Länder in unserem Süden, die langsam damit beginnen, mit anderen Nationen Handel zu treiben, besaßen unsere Vorfahren bereits zahlreiche Handelsrouten entlang der Küste Europas, von der Ostsee bis zum Golf von Biskaya. Heute müssen wir mehr denn je auf dieses Wissen zurückgreifen."
 gel_warring_spirit: "Kriegergeist"
 gel_warring_spirit_desc: "Einige mögen sagen, dass unser Volk zu kriegerisch ist, doch sie fürchten nur unsere Macht. Eine gut ausgebildete Armee ist nun mal der erste Schritt zum Erfolg in dieser chaotischen Welt. Diejenigen, die sich uns entgegenstellen, werden unsere Härte zu spüren bekommen."
 hai_expert_embassadors: "Meisterhafte Diplomaten"
 hai_expert_embassadors_desc: "Unsere Herrscher waren schon immer geübt in der Redekunst; das hat uns geholfen, den Einfluss unserer Nation über unsere Grenzen hinaus auszudehnen. Im Laufe der Zeit wurde auch die Notwendigkeit, Freundschaften zu schließen, um uns vor unseren Feinden zu schützen oder zu expandieren, immer offensichtlicher."
 hol_sailors: "Holländische Seeleute"
 hol_sailors_desc: "Das Volk Hollands, ein Land des Sandes und der Überschwemmungen, hat das Meer schon immer als eine natürliche zweite Heimat betrachtet; es verspricht all jenen Fisch und Ruhm, die mutig genug sind, ihnen nachzujagen."
 lie_athens_north: "Athen des Nordens"
 lie_athens_north_desc: "Das Kulturzentrum Lüttich hat einige der klügsten Gelehrten in unserer Region hervorgebracht und ist der Neid unserer Rivalen. Unsere Institutionen dürfen niemals aufhören, sich selbst zu verbessern."
 lux_destined_rule: "Zum Herrschen bestimmt"
 lux_destined_rule_desc: "Die Luxemburger Dynastie verdankt ihren Namen unserer großen Nation und ist heute eine der wichtigsten Familien in ganz Europa. Wir werden dieses göttliche Geschenk nutzen, um unseren Einfluss weiter auszubauen."
 utr_city_churches: "Stadt der Kirchen"
 utr_city_churches_desc: "Utrecht ist für die vielen Kirchtürme berühmt, besonders für seinen Domturm, und wird deshalb auch #italic Stadt der Kirchen#! genannt. Als spirituelles Zentrum der Niederlande und Sitz des Bistums Utrecht ist es bereits seit der Antike ein einflussreicher Ort."
 brb_brabantine_rights: "$BRB_ADJ$es Recht"
 brb_brabantine_rights_desc: "Nach dem Vorbild anderer Nationen sollten auch wir die Freiheitsrechte unserer Untertanen kodifizieren, damit sie im Dienste unserer großen Nation ein wohlhabenderes Leben führen können."
 fla_flemish_renaissance: "Flämische Renaissance"
 fla_flemish_renaissance_desc: "Als eines der am weitesten entwickelten Länder des Kontinents ist es nur natürlich, dass der mit Schweiß geschaffene Reichtum auch in die Schaffung weniger praktischer Dinge wie der Kunst fließt. Diese Kunst ist es jedoch, die unsere trübe Heimat zum Leuchten bringen wird. Dank der unzähligen flämischen Kaufleute, die sich als Kunstmäzenen auszeichnen, wird das Angebot an Künstlern niemals enden."
 frisian_resisting_invader: "Widerstand gegen Invasoren"
 frisian_resisting_invader_desc: "Unser Volk ist von Feinden umgeben und daran gewöhnt, sein Land vor Aggressoren zu verteidigen, Eindringlinge zum Rückzug zu zwingen und sie dazu zu bringen, nie wiederzukommen. Mit dem Blut unserer Feinde nähren wir unseren Boden!"
 gel_healthy_economy: "Gesunde Wirtschaft"
 gel_healthy_economy_desc: "Unser Reich wurde nicht nur durch das Schwert erweitert, sondern auch durch den sorgfältigen Umgang mit Gold. Dieses hat uns zu Einfluss verholfen und sogar erlaubt, Territorien direkt zu kaufen. Wir sollten diese Entwicklung beibehalten und unseren Etat klug verwalten."
 hai_frontier_march: "Grenzmark"
 hai_frontier_march_desc: "Als Grenzgebiet des Reichs hat Hennegau viel Erfahrung in der Verteidigung erlangt. Diese Erfahrung wissen wir gegen jene anzuwenden, die es wagen, uns anzugreifen."
 hol_maritime_warfare: "Maritime Kriegsführung"
 hol_maritime_warfare_desc: "Als maritime Nation sind unsere Seeleute an den Kampf gewöhnt, sei es gegen unsere Rivalen oder gegen Piraten, die unseren Reichtum zu stehlen versuchen. Unsere Marine ist bereit, sich gegen jeden Feind zu behaupten."
 lie_devoted_land: "Frommes Land"
 lie_devoted_land_desc: "Als Teil eines der größten Bistümer in der Region steht die Frömmigkeit unseres Volkes außer Frage. Wir werden der Welt zeigen, dass unser Glaube an Gott genauso stark ist wie unser Glaube an unser Land."
 lux_fortress_europe: "Festung Europas"
 lux_fortress_europe_desc: "Die uneinnehmbare Lage der Stadt Luxemburg und der Bockfelsen als natürliche Befestigung bieten uns den perfekten Schutz. Wir werden von der Natur lernen und all unsere Festungen in Hinblick auf natürliche Formationen errichten."
 utr_blessed_land: "Gesegnetes Land"
 utr_blessed_land_desc: "Der Papst beeinflusst die Wahl unseres Fürstbischofs und stellt damit die traditionelle Wahl durch die fünf Kapitel infrage, die wir zuvor hatten. Ein klarer Beweis dafür, dass unser Land gesegnet ist."
 brb_land_culture: "Kulturreiches Land"
 brb_land_culture_desc: "Mit der Gründung der Universität positioniert sich Brabant im kulturellen Zentrum der Niederlande. Studenten aus ganz Europa kommen in unser Land, um etwas zu lernen und ihr Wissen zu teilen."
 fla_prospering_agriculture: "Blühende Landwirtschaft"
 fla_prospering_agriculture_desc: "Da unsere Konkurrenten immer mehr beginnen, unsere Stoff-, Luxus- und Finanzindustrien herauszufordern, wird die Notwendigkeit immer offensichtlicher, unsere Landesressourcen effizient zu nutzen. Mit der richtigen Planung kann unser Land zu einer regionalen Kornkammer werden, die unsere Wirtschaft noch weiter diversifiziert."
 frisian_legend_grutte_pier: "Die Legende von Grutte Pier"
 frisian_legend_grutte_pier_desc: "Es gibt Legenden über einen Piraten in unserem Land, der über zwei Meter groß und stark wie ein Ochse sein soll. Diese Legenden inspirieren unser Volk dazu, zur See zu fahren und das zu tun, was unsere Vorfahren am besten konnten: ungeschützte Küsten plündern."
 gel_expand_kwarteers: "Erweiterung der Kwarteers"
 gel_expand_kwarteers_desc: "So wie Brabant war auch $GEL$ traditionell in vier Grafschaften unterteilt. Dieses System von Provinzen, die um eine starke Stadt herum angesiedelt sind, hat sich als äußerst effektiv erwiesen. Wir sollten es auf andere Orte ausweiten, die sich unserem Reich anschließen."
 hai_bustling_towns: "Geschäftige Städte"
 hai_bustling_towns_desc: "Unsere Städte sind voller Leben und bieten großes Potenzial. Wir müssen ihnen nur einen kleinen Schubs geben, um sie und das umliegende Land unfassbar reich zu machen und sie anschließend zu besteuern."
 hol_trading_spirit: "Händlergeist"
 hol_trading_spirit_desc: "Unser Land ist vom Meer umgeben und daher ist es auch nur natürlich, dass wir uns den Wellen stellen und nach Häfen suchen, mit denen wir Handel treiben können, um uns zu bereichern."
 lie_inspiring_mecenas: "Inspirierende Mäzene"
 lie_inspiring_mecenas_desc: "Unser Land ist für viele Künstler eine Inspiration und viele von ihnen reisen in unser Land, um an ihren Werken zu arbeiten. Wir reinvestieren das aus dieser Kunst erwirtschaftete Geld, um unsere Künstler zu ernähren und neue Künstler anzuziehen."
 lux_heirs_john_blind: "Erben von Johann dem Blinden"
 lux_heirs_john_blind_desc: "Johann der Blinde, König von Böhmen und Graf von Luxemburg, wurde in unserem bescheidenen Reich geboren. Er starb während der Schlacht bei Crécy im Alter von 50 Jahren, als er völlig erblindet in die Schlacht ritt; ein ehrenvoller und tapferer Tod, der unsere Soldaten noch für die kommenden Jahrhunderte inspirieren wird. Er war ein wahrer Held unseres Volkes."
 utr_skilled_diplomats: "Geschickte Diplomaten"
 utr_skilled_diplomats_desc: "Angesichts des wachsenden Einflusses unserer Nachbarn hängt das Überleben unserer Nation von unserer Fähigkeit ab, mächtige und treue Verbündete zu finden, die uns in Zeiten der Not zur Seite stehen."
 golden_fleece: "Orden vom Goldenen Vlies"
 golden_fleece_desc: "Der Orden wuchs im Laufe seines Bestehens zu einem der einflussreichsten Ritterorden in ganz Europa heran. Dem Ritterorden vom Goldenen Vlies anzugehören, ist ein Zeichen erlesenen Ranges und wirft ein gutes Licht auf uns."
 #######################################
 #   Scandinavian Advances    ##########
 #######################################
 scandinavian_fishing_privileges_advance: "$scandinavian_fishing_privileges$"
 scandinavian_fishing_privileges_advance_desc: "$scandinavian_fishing_privileges_desc$"
 scandinavian_bergslag_privileges_advance: "$scandinavian_bergslag_privileges$"
 scandinavian_bergslag_privileges_advance_desc: "$scandinavian_bergslag_privileges_desc$"
 scandinavian_thing_rights_advance: "$scandinavian_thing_rights$"
 scandinavian_thing_rights_advance_desc: "$scandinavian_thing_rights_desc$"
 scandinavian_tar_privileges_advance: "$scandinavian_tar_privileges$"
 scandinavian_tar_privileges_advance_desc: "$scandinavian_tar_privileges_desc$"
 wagenburg: "Wagenburg"
 wagenburg_desc: "Während der Hussitenkriege verließen sich unsere Truppen auf Wagenburgen und konnten so in Schlachten siegreich sein, die eigentlich schon als verloren galten. Obwohl wir dazu nicht zwingend Wagen verwenden müssen, werden Infanterieschützen, die aus einer Verschanzung heraus schießen, immer eine gute Taktik für unsere unbesiegbare tschechische Armee sein."
 hussite_traditions: "$hussite_ADJ$e Traditionen"
 hussite_traditions_desc: "Durch reines Ringen und brüderliche Verbundenheit widersteht unser Glauben dem äußeren Druck einer Bekehrung. Unsere unerschütterlichen Wurzeln, die alten religiösen Lehren entspringen, hallen wahrhaftig in den Herzen all jener wider, die ihren Glauben schützen und in Frieden mit anderen Christen zusammenleben wollen."
 kutnohorian_deal: "Kuttenberger Dekret"
 kutnohorian_deal_desc: "Der Adel wird immer sein Vorrecht einfordern wollen, weshalb wir dafür sorgen müssen, dass die Privilegien des Adels für jetzt und für alle Zeiten garantiert werden."
 bohemian_thaler: "Böhmischer Taler"
 bohemian_thaler_desc: "Die Standardwährung in unserem Land war lange Zeit der Groschen, eine Münze aus Silber, die im gesamten Heiligen Römischen Reich verwendet wurde. Die Entdeckung neuer Silbervorkommen erlaubt uns jedoch, eine größere Münze zu prägen, den Taler. Dieser soll so stark und einflussreich werden, dass er den gesamten Handel beherrscht und zum neuen Standard wird."
 fortified_towns: "Befestigte Dörfer"
 fortified_towns_desc: "Nach der Verwüstung durch die Hussitenkriege und um unseren Glauben wie unser Volk zu schützen, finanzierten wir viele befestigte Dörfer. So konnten wir große Expertise im Errichten von Befestigungen und beim Bau undurchdringlicher Verteidigungen erlangen."
 maori_ta_moko_advance: "Tā Moko"
 maori_ta_moko_advance_desc: "In den verworrenen Kurven und Spiralen des #italic Tā Moko#! kratzen und schaben wir Pigmente in unsere Haut und verwandeln unsere Körper in lebende Kunstwerke unserer Geschichte."
 maori_ceremonial_haka_advance: "Zeremonieller Haka"
 maori_ceremonial_haka_advance_desc: "Der Boden bebt, wenn unsere Krieger den #italic Haka#! aufführen und ihre wilden Schlachtrufe und synchronen Bewegungen über das Schlachtfeld hallen. Dieser Furcht einflößende zeremonielle Kriegstanz erfüllt die Herzen unserer Krieger mit Mut und verleiht unseren Truppen einen bedeutenden Moralschub."
 maori_whakapapa_advance: "Whakapapa"
 maori_whakapapa_advance_desc: "Wir ziehen unsere Stärke und Einigkeit aus dem #italic Whakapapa#!, der Verbundenheit zu unseren Vorfahren, die unseren #italic Iwi#! zusammenhält. Dieses tiefe Verständnis der kollektiven Abstammung fördert unsere Einigkeit und lässt uns zusammen gegen alle Widrigkeiten stehen."
 maori_te_reo_advance: "Te Reo"
 maori_te_reo_advance_desc: "Wir wissen, dass wir durch die Bewahrung unserer heiligen Sprache, #italic Te Reo#!, eine Verbindung zu unserer Kultur und unseren Traditionen aufrechterhalten."
 maori_rua_kumara_advance: "Rua Kūmara"
 maori_rua_kumara_advance_desc: "Indem wir die Kultivierung der #italic kūmara#! (Süßkartoffel) perfektionieren und sie in speziellen #italic rua#! (Lagergruben) lagern, können wir sicherstellen, dass unsere Bäuche selbst in den bittersten Wintern stets gefüllt sind."
 maori_he_whakaputanga_advance: "He Whakaputanga"
 maori_he_whakaputanga_advance_desc: "Die sogenannte „Unabhängigkeitserklärung Neuseelands“ ist ein Dokument, dass den Vereinten Stämmen der Māori die Unabhängigkeit garantierte. Sie wurde in einem Wortlaut verfasst, der von allen Seiten verstanden werden konnte und unsere Häuptlinge endlich von fremdem Einfluss befreite."
 #Ethiopia
 the_ark_of_the_covenant: "Bundeslade"
 the_ark_of_the_covenant_desc: "Wir sind das einzige Land, das im Besitz der heiligen Bundeslade ist, die vor Tausenden von Jahren heimlich von Menelik I. mit göttlicher Unterstützung geborgen wurde. Das Relikt wurde vor den Augen der Öffentlichkeit verborgen, da es zweifellos viele gibt, die unseren Schatz zu stehlen versuchen würden. Repliken der Bundeslade befinden sich in all unseren Kirchen, um daran zu erinnern, dass unsere Herrschaft von Gott gesegnet wurde."
 roof_of_africa: "Dach Afrikas"
 roof_of_africa_desc: "Unser Volk lebt seit vielen Generationen im Hochland und hat gelernt, dessen extreme Bedingungen zu ertragen, was uns widerstandsfähig und stark gemacht hat. Es verschafft uns auch einen erheblichen Vorteil gegenüber unseren Feinden, wenn wir in einen Konflikt geraten."
 solomonid_claim: "Salomons Anspruch"
 solomonid_claim_desc: "Die Ahnen unseres Herrschers entstammen der Linie der Monarchen von Axum, der Blutlinie des Königs Salomo und der Königin von Saba. Wir haben die Monarchen der Zagwe-Dynastie gestürzt, um unsere Herrschaft zu legitimieren, und werden als seine Erben das Königreich in den alten Grenzen wiederherstellen."
 nagusa_negast: "Nəgusä Nägäst"
 nagusa_negast_desc: "Unser Herrscher ist der König der Könige, der Erbe der Könige von Aksum und des ersten Herrschers, Menelik I., der seinerseits ein Sohn von König Salomon und Königin Saba war. All unsere Könige stammen aus der Dynastie Salomons und die Nachfolge muss nicht notwendigerweise vom Vater auf den Sohn übergehen."
 a_permanent_capital: "Dauerhafter Hauptsitz"
 a_permanent_capital_desc: "Jahrhundertelang hatte unsere Nation keinen festen Hauptsitz. Stattdessen ist der Hof dem Herrscher dorthin gefolgt, wo er es wollte. Dieser Ansatz hat zwar gewisse Vorteile, aber um unser riesiges Land wirksam regieren zu können, brauchen wir einen dauerhaften Ort, an dem wir unsere Macht bündeln können."
 external_friends: "Freunde im Ausland"
 external_friends_desc: "Unsere Gesandten, die in $rome$ und $iberia_region$ nach militärischer Unterstützung gesucht haben, waren äußerst erfolgreich und haben unserem Land zu Bekanntheit verholfen. Wir dürfen niemals damit aufhören, unser Ansehen zu erhöhen."
 eternal_crusade: "Ewiger Kreuzzug"
 eternal_crusade_desc: "Wir sind eine christliche Nation, die von muslimischen Widersachern umzingelt ist, die jede Gelegenheit nutzen, um uns anzugreifen. Wenn wir überleben wollen, müssen wir uns unverzüglich darauf vorbereiten, zurückzuschlagen."
 prester_john: "Priesterkönig Johannes"
 prester_john_desc: "Die Europäer suchen bereits seit Jahrhunderten nach dem Priesterkönig Johannes und sind überzeugt, dass er unser Herrscher gewesen sein muss, da wir ebenfalls Christen sind. Es gibt keinen Grund, sie darauf hinzuweisen, dass sie sich irren, denn so teilen sie bereitwillig ihre Ideen mit uns."
 an_iron_fist: "Eisenfaust"
 an_iron_fist_desc: "In unserer Region gibt es viele verschiedene Kulturen und Religionen, doch sie werden nicht durch Mitgefühl zusammengehalten, sondern von einem mächtigen Herrscher, der jeden Versuch einer Revolte mit aller Härte niederschlägt."
 a_true_ethiopian_church: "Wahre äthiopische Kirche"
 a_true_ethiopian_church_desc: "Äußere Einflüsse mögen in mancher Hinsicht zwar gut sein, können aber auch die Art und Weise verändern, wie wir unseren Glauben ausüben. Wir müssen sicherstellen, dass die Tewahedo-Kirche auch weiterhin existiert, wenn wir unsere Identität bewahren wollen."
 origin_of_coffee: "Ursprung des Kaffees"
 origin_of_coffee_desc: "In unserem Land herrschen die optimalen Bedingungen für den Anbau von Kaffee. Er kann zwar auch an anderen Orten angebaut werden, aber unserer wird besonders wegen seiner Qualität verehrt und tonnenweise ausgeführt. Wir müssen den Kaffeehandel nutzen, um Reichtum in unsere Taschen zu lenken."
 a_modern_nation: "Moderne Nation"
 a_modern_nation_desc: "Trotz unserer Abschottung sind wir uns der Innovationen in der Welt sehr wohl bewusst und verschwenden keine Zeit dabei, neue Taktiken zu übernehmen, um unseren Feinden Angst und Schrecken einzujagen."
 cawa_advance: "Chewa-Regimenter"
 cawa_advance_desc: "Chewa beschreibt den Feudaladel Äthiopiens, der für den Dienst in der Armee des Kaisers rekrutiert und ernannt wird. Es ist eine Klasse von Berufssoldaten, die für ihre Grausamkeit bekannt ist."
 a_renaissance_cawa_advance: "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"
 a_discovery_cawa_advance: "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"
 a_reformation_cawa_advance: "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"
 a_absolutism_cawa_advance: "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"
 a_revolutions_cawa_advance: "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"
 #Mali
 epic_of_sundiata: "Epos von Sundiata"
 epic_of_sundiata_desc: "Das $epic_of_sundiata$ erzählt die Geschichte des legendären Feldzugs von Sundiata Keita, dem Gründer des Malireichs und Helden unseres Volkes. Seine Geschichte wird von Generation zu Generation weitergegeben und ist eine große Quelle der Inspiration."
 kouroukan_fouga_advance: "Kurukun Fuga"
 kouroukan_fouga_advance_desc: "Die $kouroukan_fouga_advance$ ist die grundlegende Verfassung von Mali. Sie deckt jeden Aspekt des Lebens ab, darunter das familiäre Leben in den Dörfern bis hin zur Souveränität des Mansa."
 gold_of_bure: "Gold aus Bure"
 gold_of_bure_desc: "Die beiden Goldfelder von Bambuk und Bure sind die größten bekannten Goldvorkommen – und sie gehören uns! Die Goldminen von Bure fördern solch immense Reichtümer, dass sie während eines Besuchs des Mansa Mūsā die gesamte Wirtschaft Ägyptens durch Inflation destabilisierten. Unsere Wirtschaft ist jedoch an einen steten Zustrom an Gold gewöhnt und daher weniger inflationsanfällig."
 accounts_of_the_atlantic_voyage: "Aufzeichnungen der Atlantikreise"
 accounts_of_the_atlantic_voyage_desc: "Dem legendären Mansa Mūsā zufolge unternahm sein Vorfahr eine Reise über den Atlantik, um den äußersten Rand des Ozeans zu finden. Während manche aus der Herrscherschicht dieses Unterfangen als beschämende Pflichtverletzung erachten, gibt es auch jene, die darin eine Inspiration sehen, das Unbekannte zu ergründen und dorthin zu segeln, wo noch kein Mensch zuvor war."
 reclamation_of_land: "Landrückgewinnung"
 reclamation_of_land_desc: "Die Sahara ist immer in Bewegung … Abhängig von den Regenfällen dehnt sie sich aus und zieht sich wieder zurück. Der bewohnbare Sahel, in dem wir leben, kann dementsprechend ebenfalls wachsen und schrumpfen. Eine große Dürre könnte einen Großteil unseres Königreichs in nutzloses Wüstenland verwandeln, ein Anhängsel der Sahara, in dem niemand regiert außer dem Tod. In guten Jahren indes können wir der Sahara einige Grenzgebiete abringen und sie kultivieren."
 mandinka_warrior_spirit: "Kriegergeist der Mandinka"
 mandinka_warrior_spirit_desc: "Ganz gleich ob heidnisch oder muslimisch: Die Mandinka sind die besten Kämpfer der Sahara. Die Tapferkeit dieser Truppen ist genauso bewundernswert wie ihr Stolz. Wenn der Mansa eine Armee aushebt, ist sie nicht nur die größte des Sahel, sondern auch die beste."
 markets_for_salt: "Salzmärkte"
 markets_for_salt_desc: "In unserem Königreich ist Salz sein Gewicht in Gold wert. Südlich von uns, in den Wäldern der Aschanti und Yoruba, ist Salz aber beträchtlich mehr wert als Gold. Glücklicherweise haben wir unsere eigenen Salzquellen und genügend Gold, um endlos Nachschub zu kaufen. Vielleicht gibt es noch weitere Märkte bei Völkern, für die Salz wertvoller als Gold ist?"
 west_african_slave_trade: "Westafrikanischer Sklavenhandel"
 west_african_slave_trade_desc: "Schon vor der Gründung unseres Reichs verkaufte Wagadu, das große Reich von Ghana, über die Wüste Sklaven an die Araber. All diese Jahre sind wir ihrem Beispiel gefolgt und haben die arabische Welt mit einer riesigen Anzahl Sklaven versorgt. Jetzt zetern die Europäer nach einer noch größeren Sklavenmenge für ihre Besitztümer in der sogenannten „Neuen Welt“. Zwar liegen uns kaum Berichte vor, aber die geforderte Stückzahl ist wahrlich atemberaubend und sie wollen immer mehr. Manchmal überfallen sie sogar unsere Küste und entführen unsere Untertanen! Wir müssen den Sklavenhandel unter unsere Kontrolle bringen und die Europäer auf ausgewählte Handelshäfen begrenzen, wo sie Sklaven kaufen können und diese nicht länger stehlen müssen."
 kele_koun_advance: "Kèlè-Koun"
 kele_koun_advance_desc: "Die Kèlè-Koun, auch „Kriegsköpfe“, sind die Befehlshaber der Kèlè-Bolo, den „Kriegsarmen“, einer Infanterie, die für das Reich kämpft. Anders als die Ton-Tigi, die Feudalherren Malis, gehören die Kèlè-Koun nicht zwingend zum $nobles_estate$. Die Kèlè-Koun besitzen Jonow, „Sklaven“, die ihre Waffen und Ausrüstung tragen, bis sie in die Sofa-Bataillone aufgenommen werden."
 sofa_levies_advance: "Sofa-Aufgebote"
 sofa_levies_advance_desc: "Ursprünglich waren alle Soldaten der Kèlè-Bolo-Aufgebote Horon, „Freie Männer“, doch die jüngsten Entwicklungen im Malireich haben uns gezwungen, auch die Jonow, „Sklaven“, die als Waffenträger fungierten, in die Armee aufzunehmen. Diese Sklavenkrieger wurden „Sofa“ genannt und hauptsächlich als Garnison zum Schutz der malischen Befestigungsanlagen eingesetzt."
 mandekalu_levies: "Mandekalu-Aufgebote"
 mandekalu_levies_desc: "Die $mandekalu_levies$ bilden das Rückgrat des malischen Militärs. Die freien Männer des Reichs werden in Kriegszeiten zu den Waffen gerufen und es ist eine große Ehre für sie, mit ihren eigenen Waffen an diesen Schlachten teilzunehmen."
 farari_corps_advance: "Farari-Truppen"
 farari_corps_advance_desc: "Die $farari_corps_advance$ bilden die Elitetruppen des malischen Militärs. Diese Männer agieren wie Kommandanten und werden für ihre Erfahrung und Tapferkeit hoch geschätzt."
 sudano_sahelian_architecture_advance: "Sudanisch-sahelische Architektur"
 sudano_sahelian_architecture_advance_desc: "Das Grasland, die Savannen und die Wüste Westafrikas haben kaum geeignete Ressourcen für Bauprojekte. Die Verwendung von Lehmziegeln und Lehmverputz senkt die Kosten von Gebäuden erheblich und verleiht ihnen gleichzeitig ein unverwechselbares Aussehen."
 #Songhai
 stories_of_the_gao_empire: "Geschichten über das Gaoreich"
 stories_of_the_gao_empire_desc: "Bevor das Malireich über Westafrika herrschte, war die Stadt Gao der Hauptsitz eines eigenen Reichs. Obwohl es kaum schriftliche Aufzeichnungen über das Gaoreich gibt, lebt ihr Vermächtnis in unseren mündlichen Überlieferungen weiter und inspiriert uns dazu, eines Tages Großartiges zu vollbringen."
 malian_military_tactics: "Malische Militärtaktiken"
 malian_military_tactics_desc: "Während unserer Zeit als Untertanen des Malireichs lernte unser Volk ihre Kampfmethoden auf dem Schlachtfeld zu nutzen. Dieses Wissen wird unserer eigenen Infanterie in den kommenden Schlachten helfen."
 gold_to_salt_trade: "$goods_gold$-$salt$-Handel"
 gold_to_salt_trade_desc: "Manche sagen, $salt$ sei sein Gewicht in Gold wert … Vielleicht ist es aber zutreffender zu sagen, dass $goods_gold$ sein Gewicht in $salt$ wert ist. Auf jeden Fall haben wir durch den Austausch dieser beiden Güter ein florierendes Handelsnetz aufgebaut."
 independence_from_mali: "Unabhängigkeit von Mali"
 independence_from_mali_desc: "Viele Jahre lang sind wir dem Sultanat Mali Untertan gewesen. Da die Macht Malis nachgelassen hat und unsere gewachsen ist, können wir nun behaupten, vollständig unabhängig von der malischen Lehnsherrschaft zu sein. Lasst uns die notwendigen Schritte unternehmen, damit wir es auch bleiben."
 jihad_against_the_pagans: "$jihad$ gegen die Heiden"
 jihad_against_the_pagans_desc: "Trotz all der Anstrengungen sunnitischer Sultanate über Jahrhunderte hinweg wird Westafrika immer noch von der Bedrohung durch animistische Heiden geplagt. Unter dem Banner des Dschihads können wir unser Land von diesen Ungläubigen reinigen und gleichzeitig unsere Grenzen erweitern."
 sankore_madrassah: "Sankoré-Madrasa"
 sankore_madrassah_desc: "Wir haben in Erfahrung gebracht, dass die Schule der Sankore-Moschee das beste Lernzentrum in ganz Afrika ist. Wer könnte schon an der Wahrheit dieser Behauptung zweifeln, sieht man doch hier weise Männer aus dem fernen Arabien und dem Maghreb über philosophische und religiöse Feinheiten diskutieren!"
 the_hajj: "Die Hadsch"
 the_hajj_desc: "Wie es einst Mansa Mūsā aus Mali tat, so können auch unsere Herrscher als Symbol unseres Reichtums und unserer Macht mit Gold nach Mekka reisen und die fünfte Säule des Islam erfüllen. Die Welt soll wie auch beim alten Mali über den Reichtum und die Erhabenheit Songhais staunen."
 sharia: "Scharia"
 sharia_desc: "Die Heiligen Gesetze, die der Prophet bei der Herrschaft über Medina verwendete, müssen zur unanfechtbaren Basis der Rechtsprechung werden und der Gesellschaft Führung bieten. Wenn wir unser Strafrecht so reformieren, dass es den Lehren des Propheten entspricht, kann unsere Gesellschaft in Harmonie und Gerechtigkeit leben."
 trans_sahara_trade: "Transsaharahandel"
 trans_sahara_trade_desc: "Unsere Händler bringen häufig faszinierende Dinge von den nordafrikanischen Höfen mit zurück. Vielleicht wäre es möglich, dass sie noch faszinierendere Schmuckstücke mitbringen?"
 modernization_of_the_military: "Modernisierung des Militärs"
 modernization_of_the_military_desc: "Unser Staat steht und fällt mit den Fähigkeiten unserer Armee. Es war das Militär, das nicht nur unser Überleben, sondern auch unseren Aufstieg gesichert hat. Wir dürfen nicht zulassen, dass wir bei militärischen Fortschritten ins Hintertreffen geraten."
 #Italy Advances
 #Corsican Shared
 corsican_the_machja: "Machja"
 corsican_the_machja_desc: "Das korsische Hinterland ist von einer dichten, wohlriechenden immergrünen Buschvegetation geprägt, die als #italic Machja#! (#italic Macchia#! in Standarditalienisch für „Buschland“) bekannt ist und zur tragenden Säule der Überlebensstrategie der Bevölkerung geworden ist. Anstatt an den verwundbaren Küsten gegen eine überlegene Seemacht zu kämpfen, hat die Bevölkerung eine Kultur des „strategischen Rückzugs“ in die undurchdringlichen Granitberge entwickelt. Dies hat eine Gesellschaft von Hochlandbewohnern geschaffen, die Meister der Tarnung und schnellen Fortbewegung in vertikalem Gelände sind. Unsere kulturelle Anpassung hat die Geografie der Insel in eine lebendige Festung verwandelt, in der die Menschen ihre Gesetze und Bräuche auf unbestimmte Zeit bewahren können, sicher vor der maritimen Reichweite jeglicher Angreifer."
 corsican_the_vindetta: "Vendetta"
 corsican_the_vindetta_desc: "Auf den Versuch früherer Besatzer hin, ihr starres Rechtssystem durchzusetzen, reagierte das korsische Volk mit der Stärkung des traditionellen Rechtssystems, das auf der Vendetta (Blutrache) basiert. Das, was für Außenstehenden als Gesetzlosigkeit angesehen wird, ist ein ausgeklügelter sozialer Mechanismus der Ehre und Selbstregulierung, das eine Kultur hervorgebracht hat, in der der Einzelne für seinen eigenen Schutz und den seiner Angehörigen verantwortlich ist, wodurch die Bevölkerung flächendeckend bewaffnet und taktisch versiert ist. Diese „Kultur des langen Gedächtnisses“ bedeutet, dass jede Beleidigung mit einer generationenübergreifenden Blutfehde beantwortet wird. Im nationalen Kontext bedeutet dies, dass die Kosten einer Besetzung durch fremdländische Truppen sowohl in Geld als auch in Menschenleben unerschwinglich hoch werden."
 corsican_the_castagniccia: "Castagniccia"
 corsican_the_castagniccia_desc: "Die frühere genuesische Besatzung förderte den Anbau von Kastanienbäumen stark, insbesondere im zentralen Hochland und schuf eine einzigartige Kultur rund um die Kastanie, die der Bevölkerung eine verlässliche, arbeitsarme Nahrungsquelle bietet, die sie vor den Schwankungen der Getreidepreise auf dem Mittelmeermarkt bewahrte. Den Korsen gab dies eine unglaubliche strategische Autonomie, da sie sich in die Berge zurückziehen und sich auf unbestimmte Zeit von Kastanienmehl ernähren können, wodurch Seeblockaden und „Hungerbelagerungstaktiken“ keine Rolle mehr spielten, die in der Vergangenheit von den genuesischen Kriegsflotten oft angewandt wurden."
 corsican_the_corsican_baroque: "Korsischer Barock"
 corsican_the_corsican_baroque_desc: "Eine Reihe barocker Kirchenbauten hat die Insel eingenommen, finanziert durch den Reichtum heimkehrender Söldner und Kaufleute. Diese Kirchen zeichnen sich besonders durch ihre „schlichte Erhabenheit“ aus, was den rauen, aber stark frommen Charakter der Bevölkerung widerspiegelt. Kulturell gesehen sind sie ein Zeichen des zivilisatorischen Trotzes, eine Botschaft an unsere Nachbarn, dass Korsika eine wohlhabende, kultivierte Gesellschaft ist, die großartige Monumente hervorbringen kann. Die Gemeinschaft versammelt sich in diesen Kirchen, um den sozialen Zusammenhalt und ihre einzigartige Identität durch mehrstimmigen Chorgesang und theatralische religiöse Rituale zu stärken."
 corsican_lamentu_and_voceru: "Lamentu und Voceru"
 corsican_lamentu_and_voceru_desc: "Die korsische Tradition der mündlich überlieferten Dichtung, insbesondere des #italic Lamentu#! (#italic Lamento#! in Standarditalienisch für Trauergesänge) und #italic Voceru#! (#italic Vocero#! in Standarditalienisch für Vergeltungsgesänge), ist zum wichtigsten Mittel für die Bewahrung des nationalen Gedächtnisses geworden. Diese Gesänge fungieren als lebendiges Archiv, um die Leiden des Volkes und die Namen seiner Märtyrer zu bewahren. Kulturell gesehen sorgt dies dafür, dass jedem Kind von Geburt an der Geist des Widerstands eingeprägt wird, was es einem Besatzer unmöglich macht, die Bevölkerung „umzuerziehen“ oder anzugleichen. Die mündliche Überlieferung ist auch eine mächtige psychologische Waffe und bewahrt selbst in den dunkelsten Zeiten einer fremden Militärherrschaft die Moral und den kulturellen Trotz aufrecht."
 corsican_chjame_rispondi: "Chjam'è Rispondi"
 corsican_chjame_rispondi_desc: "Die langen Jahre militärischen Drucks von Außen führten dazu, dass sich die korsische mündliche Tradition des #italic Chjam'è Rispondi#!“ (Ruf und Antwort) zu einem Instrument des sozialen Zusammenhalts entwickelte. Der improvisierte poetische Wettstreit erlaubt den Menschen, auf den Marktplätzen über Politik zu debattieren, ihre gefallenen Helden zu ehren und ihre Besatzer durch verschlüsselte Metaphern zu verspotten, was die Prinzipien der Aufklärung und die Erinnerungen an die Revolution auch für den ungebildeten Teil der Gesellschaft zugänglich macht. Indem wir diese Tradition fördern, schaffen wir ein einheitliches kulturelles Narrativ, dass nicht zensiert werden kann, und sorgen gleichzeitig dafür, dass die Flamme der korsischen Identität, ungeachtet der Lage in der wir uns befinden, stets hell weiterbrennt."
 #Corsican Unique
 cor_the_pievi: "Pievi"
 cor_the_pievi_desc: "Das Königreich ist in #italic Pievi#! (Pfarrein) unterteilt, traditionelle Bezirke, die sich um eine Mutterkirche gruppierten. Diese haben nicht nur einen religiösen Nutzen, sondern dienen der Zivilverwaltung auch als wichtige Knotenpunkte. Der Staat setzte die #italic Pievani#! (Pfarrer) als königliche Standesbeamte und Richter ein und schuf so ein stark lokalisiertes und effizientes Netz zur Steuererhebung, was dem Königreich erlaubte, selbst aus den entlegensten Bergdörfern Ressourcen zu mobilisieren."
 cor_the_milizia_di_u_riamu: "Milizia di u Riamu"
 cor_the_milizia_di_u_riamu_desc: "Unter unserer Führung und aufgrund des Drucks von Außen haben die korsischen Clans ihre traditionellen Aufgebote zu einer strukturierten „Miliz des Königreichs“ gebündelt. Dies fördert den kulturellen Wandel weg von Scharmützeln zwischen Clans und hin zu einer nationalen Wehrpflicht. Jede Gemeinde ist verpflichtet, eine standardisierte Waffenkammer zu unterhalten und regelmäßige Übungen abzuhalten. Diese „Verstaatlichung des Schwerts“ stellt sicher, dass die Insel über ein stehendes Heer verfügt, das sich persönlich für die Verteidigung der Heimat einsetzt. Dies wird auch die uralte Kluft zwischen Nord und Süd überbrücken und eine einheitliche militärische Identität schaffen, die die Anfänge eines modernen Nationalstaats darstellen."
 cor_capituli_di_corsica: "Capituli de Corsica"
 cor_capituli_di_corsica_desc: "Wir müssen die #italic Capituli#! (schriftliche Vereinbarungen zwischen der Krone und den Berggemeinden im Landesinneren) formalisieren, die die Hochlandbewohner von bestimmten Steuern ausnehmen und sie zur lokalen Selbstverwaltung im Austausch für den Militärdienst und ihre Treue berechtigen. Es ist ein Geniestreich der inneren Diplomatie, der königliche Autorität gegen absolute Loyalität eintauscht und sicherstellt, dass das schwierigste Gelände der Insel von einer motivierten Bürgerschaft gehalten wird, die dem Staat gegenüber treu ergeben ist, und nicht von rebellischen Feudalherren."
 cor_guardia_corsa: "Guardia Corsa"
 cor_guardia_corsa_desc: "Die Korsen agieren bereits seit Jahrzehnten als Elitetruppen im Dienste des Papsttums und der Könige von Frankreich und haben sich einen Ruf für ihre unerschütterliche Loyalität und ihren Kampfgeist aufgebaut. Indem wir diesen Veteranen gewisse Anreize bieten, können wir sie dazu bewegen, zurückzukehren, um die lokalen Milizen auszubilden. Diese Kultur der „professionellen Rückkehr“ wird dafür sorgen, dass die Verteidigung der Nation in den Händen von Männern liegt, die in den neuesten europäischen Taktiken bewandt sind, was letztendlich dazu führen wird, dass unsere derzeit irregulären Gebirgsschützen zu einer disziplinierten, modernen Infanterietruppe umstrukturiert werden."
 cor_u_ginnasiu_corsu: "U Ginnasiu Corsu"
 cor_u_ginnasiu_corsu_desc: "Um uns weniger abhängig von im Ausland ausgebildeten Beamten zu machen, wird das Königreich seine ersten weltlichen Gymnasien und Hochschulen errichten. Diese haben das Ziel, eigene Staatsjuristen hervorzubringen, die sich in den geografischen Gegebenheiten und dem Gewohnheitsrecht unseres Landes bestens auskennen. Der intellektuelle Aufschwung wird die Wiege der korsischen Aufklärung bilden und eine Generation von Verwaltungsbeamten hervorbringen, die rationale Regierungsführung und die „Rechte des Volkes“ über alte Clantraditionen stellen und den Staat auf den modernen Konstitutionalismus vorbereiten."
 cor_the_corsican_constitution: "Korsische Verfassung"
 cor_the_corsican_constitution_desc: "Unter unserer Herrschaft wird Korsika die weltweit erste moderne schriftliche Verfassung verabschieden, die allen Grundbesitzern das allgemeine Wahlrecht gewährt. Dies fördert die von uns angestrebte Kultur der „aufgeklärten Bürgerschaft“, in der sich das korsische Volk als Vorreiter der europäischen Freiheit versteht und wird dem Staat erlauben, starke nationale Institutionen zu etablieren. Die korsische Verfassung wird zu einem „Leuchtfeuer der Freiheit“ werden, künftige Revolutionen beeinflussen und dem Volk ein Gefühl von unermesslichem Stolz und historischer Bestimmung vermitteln."
 #Emilian Shared
 emilian_al_po_doma: "Al Pô Domâ"
 emilian_al_po_doma_desc: "Das emilianische Volk lebte schon immer in einer vom Hochwasser bedrohten Ebene und hat die Kunst der Flusskanalisierung perfektioniert, die nicht nur für die Entwässerung genutzt werden kann, sondern auch als erneuerbare Energiequelle für Seidenwebereien und Getreidemühlen dient. Dies erlaubt Binnenstädten wie Modena und Bologna nicht nur als Industriezentren zu fungieren und Waren über künstliche Wasserstraßen zum Po und zur Adria zu transportieren, sondern hat uns auch erlaubt, den Po und seine zerstörerischen Überschwemmungen zu bändigen."
 emilian_the_via_emilia: "Via Emilia"
 emilian_the_via_emilia_desc: "Die emilianischen Städte können ihre Lage an der Via Emilia (der antiken Römerstraße) nutzen, um landesübergreifende Handelsmessen zu veranstalten. Wir müssen dafür sorgen, dass sich diese in völliger Sicherheit entfalten können, und wir werden Maße und Gewichte vereinheitlichen, um das Vertrauen der Händler aus den Alpen und dem Mittelmeerraum zu gewinnen und sie zu uns zu locken. Dank dieser handelsorientierten Ausrichtung werden die emilianischen Staaten als unverzichtbare Zwischenhändler im Handel mit luxuriöser Seide und Gewürzen florieren."
 emilian_dispenza_emigliana: "Dispenza Emigliàna"
 emilian_dispenza_emigliana_desc: "An den emilianischen Höfen hat sich eine Kultur herausgebildet, in der jeder Koch gleichzeitig auch als Botschafter der Region auftritt. All die einzigartigen Produkte unserer Region wie Balsamico-Essig, Rohschinken und gereifter Käse, bringen uns die Gunst fremder Monarchen ein. Diese Strategie der Eroberung über den Gaumen sorgt dafür, dass wir an den Höfen Europas Einfluss genießen und uns durch die schiere Exklusivität und Qualität unserer Spitzenprodukte Bündnisse sichern können."
 emilian_the_tera_cruda: "Tèra Crûda"
 emilian_the_tera_cruda_desc: "Im Angesicht moderner Kanonen stellt man schnell fest, dass Ziegelsteine einfach zu spröde sind und keinerlei Verteidigung bieten. Aufgrund unseres Mangels an Naturstein müssen unsere Pioniere den Bau von Befestigungen aus Stampflehm und Ziegelverkleidung vorantreiben. Diese Bauweise, die als #italic Trace Italienne#! bekannt werden wird, macht unsere Ingenieure weltweit gefragt und wird unsere aus „Schlamm und Ziegeln“ hergestellten Verteidigungen auch im Rest der Welt einführen."
 emilian_la_mzura_dal_sol: "La Mzûra dal Sōl"
 emilian_la_mzura_dal_sol_desc: "Um die Effizienz der Poebene zu maximieren, wird der Staat aller Entwässerungsgräben und Felder kartieren. Diese Vermessung wird die Landschaft in eine riesige Tabelle verwandeln und die präziseste Steuererhebung in ganz Europa ermöglichen. Es wird auch sicherstellen, dass jeder Hektar des fruchtbaren Schwemmbodens seinen gerechten Anteil an unseren Staatshaushalt abführt, um die Modernisierung des Landes voranzutreiben."
 emilian_al_melodram: "Al Melodràm"
 emilian_al_melodram_desc: "Der Bau imposanter öffentlicher Opernhäuser muss zu einer Priorität des Staates werden. Diese Theater werden als eine Art „Parlament für das Volk“ fungieren, einen Ort, am dem sich die aufstrebende Bourgeoisie versammelt, um durch Musik gemeinsame Landesmythen zu teilen. Sie werden auch dafür sorgen, dass die emilianische Bevölkerung zur politisch am stärksten mobilisierten Bevölkerung Italiens wird und jeder Herausforderung gewappnet ist."
 #Emilian Unique
 blg_la_dota: "Dòta"
 blg_la_dota_desc: "Mit der Erweiterung der ältesten Universität der Welt wurde Bologna zum intellektuellen Zentrum Europas und erhielt den Beinamen #italic La Dòta#! (#italic La Dotta#! in Standarditalienisch für „der Gelehrte“). Kulturell führte dies dazu, dass sich die Gesellschaft von feudalen Gottesurteilen hin zu einer zivilen Rechtsprechung entwickelte, die auf dem Römischen Recht aufbaute. Dies brachte eine Klasse professioneller Laiennotare und Richter hervor, die komplexe Stadtverwaltungen führen konnten und Bologna eine beispiellose bürokratische Effizienz verliehen."
 fer_the_curtesia: "Curtesia"
 fer_the_curtesia_desc: "Als sich die freien Kommunen zu Signorien (Herrschaften) entwickelten, wurden die ferrarischen Höfe zu Zentren der neuen Ritterlichkeit, einer kulturellen Synthese aus französischen Artus-Legenden und italienischem humanistischem Scharfsinn. Die darauf entstandene höfische Etikette wurde zum Maßstab für den europäischen Adel und erhob unseren Hof zu einem Zentrum der Diplomatie, an dem die „Kunst des Möglichen“ durch kultivierte Konversation und künstlerische Förderung gelebt wird."
 man_casa_gonzaga: "Haus Gonzaga"
 man_casa_gonzaga_desc: "Seit weit über einem Jahrhundert regiert das Haus #italic Casa Gonzaga#! Mantua nicht als Eroberer, sondern als Fürsten, deren Anspruch auf einem für beide Seiten vorteilhaften Bündnis mit ihren Untertanen beruht. Dies verleiht ihnen eine Legitimität, die sich keine Militärmacht erkaufen kann und die wir bewahrt haben, indem wir die Stadt niemals als Ressource betrachtet haben, die es auszubeuten gilt. Wir sichern diese Stellung durch drei miteinander verflochtene Kanäle: das kirchliche Patronat, das unsere Untertanen durch ihre gemeinsame Frömmigkeit verbindet, die formellen dynastischen Titel, die unserer Herrschaft eine rechtliche Grundlage verleihen, die Rivalen nicht anzweifeln können, und unseren bewussten Respekt vor den kommunalen Traditionen, die die Bürger von Mantua nach wie vor als ihr erbliches Recht anerkennen. Dieses dreifache Fundament aus Glauben, Dynastie und bürgerliches Band, das nicht alleinig auf Gewalt aufgebaut ist, verleiht unserem Staat Legitimität und unserer Herrschaft Stabilität."
 mod_the_ancient_commune: "Alte Gemeinden"
 mod_the_ancient_commune_desc: "Vor der Zeit der großen Dynastien wurden die Städte der Poebene durch gewählte Konsule und vereidigte Bürgervereinigungen verwaltet und schufen so die erste Form der bürgerlicher Organisation, die kein Herrscher jemals vollständig verdrängen konnte. Wir berufen uns auf dieses Erbe, um ein Gleichgewicht zwischen der Krone und den Stadtgemeinschaften zu wahren und bieten anerkannte Rechte im Austausch für Steuern und Soldaten, die den Staat erhalten. Dieses Band zwischen Krone und Stadt verleiht uns Autorität und macht unsere Untertanen zu Partnern in der Regierung statt bloßen Untertanen."
 par_commune_of_parma: "Die Gemeinde Parma"
 par_commune_of_parma_desc: "Die Tradition der Selbstverwaltung reicht n Parma weit zurück und hat ihren Ursprung in der Zeit der italienischen Gemeinden, als die Stadt gemeinsam mit ihren Nachbarn für die Verteidigung ihrer Freiheiten gegen kaiserliche Machtansprüche kämpfen musste. Wir berufen uns auf dieses Erbe, um die Beziehung zwischen der Krone und den Stadtgemeinschaften zu wahren und bieten Schutz und anerkannte Rechte im Austausch für Steuern und Soldaten, die den Staat erhalten. Dieses Band begründet unsere Autorität und macht unsere Regierung zu einem stabileren und kooperativeren Partner für alle, die unter ihr leben."
 pcz_commune_of_piacenza: "Die Gemeinde Piacenza"
 pcz_commune_of_piacenza_desc: "Piacenza verwaltete sich schon lange bevor ein Herrscher kam, um Anspruch darauf zu erheben, selbst, und die Institutionen dieser Selbstverwaltung — die gewählten Konsule, die städtischen Höfe, die Tradition schriftlicher, von den Bürgern durchsetzbarer Statuten — überstanden jeden Regimewechsel, indem sie sich anpassten, anstatt Widerstand zu leisten. Wir berufen uns auf diese tief verwurzelte bürgerliche Tradition, um die Verwaltung unserer Stadt zu optimieren, die Reibung zu verringern, die ungeschriebene Bräuche verursachen, und der Stadtbevölkerung eine Regierungsstruktur zu bieten, die sie als ihre eigene und legitime anerkennt. Diese Wiedergeburt der #italic Gemeinschaftsorgane#! sorgt für Stabilität und sorgt dafür, dass unsere Untertanen eher bereit sind, ihren Verpflichtungen nachzukommen, ohne dass wir sie dazu zwingen müssen."
 blg_la_grasa: "La Grâsa"
 blg_la_grasa_desc: "Dank der fruchtbaren Erträge der Poebene und der Handwerkskunst der bolognesischen Zünfte erhielt unsere Hauptstadt für ihren unvergleichlichen Reichtum einen zweiten Spitznamen: #italic La Grâsa#! (#italic La Grassa#! in Standarditalienisch für „die Fette“). Indem wir in die Märkte des Quadrilatero und die Herstellung von feinen Wurstwaren und Pasta investieren, sorgen wir dafür, dass jeder Reisende mit vollem Magen und einem leichteren Geldbeutel abreist."
 fer_studio_di_ferrara: "Lo Studio di Ferrara"
 fer_studio_di_ferrara_desc: "Die von Haus Este gegründete Universität von Ferrara zählt zu den ersten ihrer Art und hat Humanisten und Juristen aus ganz Italien an unseren Hof gelockt. Unter der Leitung bedeutender Gelehrter sind unsere Hörsäle zu Werkstätten der neuen Gelehrsamkeit geworden und bilden jene Verwalter und Diplomaten aus, die unser wachsender Staat benötigt. Diese Einrichtung sorgt auch dafür, dass sich Wissen und neue Institutionen in unserem Land schneller verbreitet als in Reichen, die sich auf ihre Kriege verlassen."
 man_gonzaga_patronage: "Durch Gonzaga geförderte Kunst"
 man_gonzaga_patronage_desc: "Unser Hof zieht Maler, Bildhauer und Architekten der gesamten Halbinsel an. Diese kommen in dem Wissen, dass ihr Talent in Mantua gefördert wird und ihre Werke Fürsten erreichen, deren Gesandte unseren Hof besuchen. Wir haben dieses Mäzenatentum zu einer bewussten Politik gemacht, indem wir Stipendien und Werkstätten unterhalten, die mehreren Künstlern zugleich Aufenthalt wie Arbeit bieten und sicherstellen, dass ihre Werke die Bedeutung erhalten, die wir nach Außen verkörpern wollen. Diese Kultur des #italic Mecenatismo#! verringert die Kosten für Künstler und lockt die qualifiziertesten von ihnen in unser Land, um sich dort niederzulassen, statt nur hindurchzureisen und womöglich ein einziges Werk zu schaffen."
 mod_este_textiles: "Tuchhandwerk des Hauses Este"
 mod_este_textiles_desc: "Die Werkstätten von Modena stellen bereits seit langer Zeit Seiden- und Wollstoffe her, deren Qualität auf den großen Messen im Norden hohe Preise erzielt. Unter unserer Schirmherrschaft vertiefen wir diese Tradition. Wir bewahren Zunftpraktiken, die das Webhandwerk innerhalb unserer Stadtmauern bündeln und sorgen dafür, dass die erfahrensten Handwerker Nachfolger ausbilden. Diese Investitionen machen unsere Händler zu vertrauenswürdigen Lieferanten der europäischen Höfe und bringen unserer Stadtkasse stetige Einnahmen, die nicht von den Launen eines Krieges abhängen."
 par_the_bishop_of_parma: "Der Bischof von Parma"
 par_the_bishop_of_parma_desc: "Der #italic Bischof von Parma#! übt seit langem eine Autorität aus, die der weltlichen Macht in dieser Stadt in nichts nachsteht. Zudem prägt er das geistliche Leben der Stadt durch einige der bemerkenswertesten Sakralbauten Norditaliens. Wir haben uns dafür entschieden, diese Institution zu fördern, anstatt ihr Widerstand zu leisten, und ihren Einfluss zum Wohle der Stabilität und Frömmigkeit unseres Volkes zu nutzen. Diese Partnerschaft zwischen Krone und Kirche stärkt den Glauben unserer Untertanen und verleiht unserer Regierung die nötige moralischer Autorität, die kein Militärt ohne Weiteres ersetzen kann."
 pcz_collegium_placentinum: "Collegium Placentinum"
 pcz_collegium_placentinum_desc: "Das Studium der Rechtslehre reicht in Piacenza weiter zurück als die großen Universitäten der Region. Von unserer Stadt aus bereisen Glossatoren und Rechtsgelehrte die gesamte Halbinsel, um mit ihrem tiefgreifendes Wissen über das römische Recht die intellektuelle Grundlage der italienischen Staatsführung zu bildeten. Durch die Gründung eines offizielles Kollegium für Rechtswissenschaften und Stadtverwaltung lassen wir diese jahrhundertealte Tradition wiederaufleben und bringen ausgebildete Verwalter hervor, die in der Lage sind, den Rechts- und Finanzapparat eines modernen Staates zu leiten. Dieses sogenannte #italic Collegium Placentinum#! verbessert die Alphabetisierung und verleiht unserer Gesetzgebung eine Klarheit und Kohärenz, die andere Institutionen nicht erreichen können."
 blg_la_rassa: "La Råssa"
 blg_la_rassa_desc: "#italic La Råssa#! (#italic La Rossa#! in Standarditalienisch für „die Rote“), wie Bologna auch genannt wird, zelebriert die purpurrote Seele unserer Architektur. Insbesondere das alte Terrakottamauerwerk und das schützende Meer aus roten Dächern, das man vom Asinelli-Turm aus bewundern kann, flößen sowohl unseren Untertanen als auch Feinden Ehrfurcht ein. Die Farbe Rot ist in unserer Stadt so stark verankert, dass wir Gesetze erlassen müssen, die sicherzustellen, dass alles, was derzeit nicht unserer bevorzugten Farbpalette entspricht, so schnell wie möglich in rotem Terrakotta wiederaufgebaut wird."
 fer_ladizion_erculea: "L'Adizión Erculéa"
 fer_ladizion_erculea_desc: "Ferrara gilt als die „ideale Stadt“. Anstelle eines organischen mittelalterlichen Wachstums wurde die Stadterweiterung durch die breiten Straßen und symmetrischen Plätzen bereits im Voraus geplant, womit Ferrara das erste Beispiel für eine moderne Stadtplanung in Europa ist und die Ordnung und Erhabenheit des Staates wiederspiegelt. Dies verbessert auch die allgemeine Gesundheit in der Bevölkerung, erleichtert militärische Verlegungen und macht Ferrara zur modernsten und prestigeträchtigsten Stadt im Westen."
 man_studium_mantovano: "Studium Mantovano"
 man_studium_mantovano_desc: "Wir gründen in Mantua eine offizielle Hochschule, die Dozenten für Rechtswissenschaften, Philosophie und Kunst aus den großen Universitäten der Region anlocken und den Söhnen unserer Bürger und des niederen Adels eine Ausbildung bieten wird, die zuvor nur denjenigen vorbehalten war, die wohlhabend genug waren, um nach Bologna oder Padua zu reisen. Diese Institution verbindet Mantua mit dem großen Gelehrtennetzwerk Europas und bringt die neuesten Ideen in Rechtswissenschaft, Theologie und Naturphilosophie in unsere Stadt, anstatt erst Jahre später per Briefwechsel darüber informiert zu werden. Diese Hochschule, die auch #italic Studium Mantovano#! genannt wird, verbessert die Alphabetisierung unserer Herrscherschicht und sorgt dafür, dass neue Ideen bei uns ebenso schnell Fuß fassen wie im restlichen Italien."
 mod_estense_library: "Die Biblioteca Estense"
 mod_estense_library_desc: "Unter den großen Privatbibliotheken Italiens nimmt unsere eine Sonderstellung ein. Die über Generationen hinweg zusammengetragen Handschriften und Illustrationen ziehen Gelehrte aus dem ganzen Kontinent an unseren Hof. Wir müssen diese Sammlung ordnen und erweitern und sie zu einer lebendigen Institution verwandeln, in der Gelehrte unter unserer Schirmherrschaft die Grenzen des Wissens erweitern können. Dieses Bekenntnis zu Gelehrsamkeit beschleunigt die Verbreitung neuer Ideen in unserem Land und zeigt der Welt, dass unser Hof ein Ort ist, an dem die Zivilisation erblüht."
 par_the_new_duchy: "Neues Herzogtum"
 par_the_new_duchy_desc: "Die Erhebung unserer Stadt zum Hauptsitz eines unabhängigen Herzogtums läutet ein neues Kapitel für Parma ein. Dieser Ort, der in der Vergangenheit oft zwischen den Großmächten hin- und hergereicht wurde, ist nun der Sitz eines anerkannten Territorialstaates mit eigenen Traditionen und Ambitionen. Wir müssen schnell handeln und die Institutionen und Zeremonien der Souveränität etablieren, um unseren Untertanen eine klare Identität und unseren Nachbarn einen klaren Ansprechpartner zu geben. Diese Festigung unserer legitimen Autorität macht unseren Staat schwerer zu vereinnahmen und leichter zu regieren."
 pcz_piacentine_soldiery: "Piacentinisches Kriegsvolk"
 pcz_piacentine_soldiery_desc: "Die ländlichen Regionen rund um Piacenza bringen seit jeher Soldaten hervor, deren Qualitäten weit über das hinausgehen, was man angesichts der bescheidenen Größe der Stadt erwarten würde. Diese Männer, die auf den Bauernhöfen der Poebene und in den Ausläufern des Apennins aufgewachsen sind, verstehen sich besten darin, einen Feldzug durchzustehen, ohne sich zu sehr zu verausgaben und eine Stellung zu halten, ohne unter dem Druck der Angreifer zusammenzubrechen. Wir werden in die Ausbildung und Organisation dieser Männer investieren und sie zu einer dauerhaften Armee formen. Durch die Bereitstellung von Waffen, Soldzahlungen und Offizieren werden wir ihre natürlichen Fähigkeiten in professionelle Disziplin verwandeln. Diese #italic Soldatesca Piastentìna#! (#italic Soldatesca Piacentina#! in Standarditalienisch für „Piacentinisches Soldateska“ oder „Piacentinisches Kriegsvolk“) verschafft unseren Armeen einen harten Kern aus erfahrenen Infanteristen, die ihren Zusammenhalt auch unter Bedingungen halten können, unter denen andere Formationen zusammenbrechen würden."
 blg_lacademia_di_incamine: "L'Académia di Incaminè"
 blg_lacademia_di_incamine_desc: "Die unbändige Energie der Renaissance legt sich langsam und Bildung wird in organisierten Akademien gefördert. Diese staatlich geförderten Einrichtungen für Wissenschaftler, Schriftsteller und Maler haben das Ziel, die Kunstausbildung zu reformieren, indem sie sich vom Manierismus abwenden und sich dem Naturalismus und dem Aktzeichnen zuwenden. Die Reform erlaubt es dem Staat, mit dem künstlerischen und wissenschaftlichen Schaffen das eigene Ansehen zu verbessert und wird in der Errichtung der „Bologneser Schule für Malerei“ gipfeln, die Europa jahrzehntelang prägen wird."
 fer_court_of_letters: "Hof der Gelehrsamkeit"
 fer_court_of_letters_desc: "Unser Hof ist zu einer der angesehensten literarischen Sammelpunkte Italiens geworden. Dichter tragen in den großen Sälen ihre Verse vor und Gelehrte debattieren in den Gärten über Philosophie, wobei ihre Werke sowohl die Staatskunst als auch das private Vergnügen fördern. Unser Name ist zu einem Sinnbild der volkstümlichen Tradition geworden und zieht Talente aus allen Ecken der Halbinsel an, die um unsere Gunst und Förderung wetteifern. Unser Ruf als kulturelles Zentrum vertieft unser künstlerisches Erbe und verwandelt jedes hier entstandene Meisterwerk zu einem Aushängeschild für unseren Staat."
 man_palazzo_te: "Palazzo Te"
 man_palazzo_te_desc: "Federico II. Gonzaga beauftragte Giulio Romano mit dem Bau einer riesigen Palastanlage auf einer Insel am Rande der Stadt. Das Ergebnis war der #italic Palazzo Te#!, eines der modernsten Bauwerke der Renaissance. Es verband die klassische Tradition mit einer solchen Raffinesse, dass die ironischen Anspielungen Gelehrte bis heute beschäftigen. Die mit Fresken verzierten Räum, die Riesen in gemalten Trümmern bis hin zu den Pferden aus Federicos Stallungen abbildeten, sind eines der Gewagtesten Norditaliens. Dieses außergewöhnliche Werk vertieft unsere kulturelle Tradition und verleiht den unter unserem Mäzenatentum entstandenen Werken einen einzigartigen Charakter, den Sammler weit mehr schätzen als die konventionellen Schöpfungen unserer Rivalen."
 mod_palazzo_ducale: "Der Herzogspalast"
 mod_palazzo_ducale_desc: "Wir errichten einen Palast, der unsere Ambitionen wiederspiegelt. Dieses steinerne Denkmal soll zu einem Zeichen unserer Beständigkeit und Macht werden, ganz im Gegensatz zur improvisierten Pracht früherer Generationen. Jeder Saal und jede Galerie wird darauf ausgelegt sein, die besuchenden Botschafter zu beeindrucken und die Ehrfurcht unserer Untertanen gegenüber unserer Dynastie zu stärken. Diese Investition in die sichtbare Pracht wird sich in Form von Ansehen und künstlerischen Aufträgen, die unser Hauptsitz anlocken wird, bezahlt machen."
 par_the_opera_obsession: "Opernbegeisterung"
 par_the_opera_obsession_desc: "Parma wird zu einem Zentrum für theatralische Wunder verwandelt und die Errichtung des ersten dauerhaften Theaters wird der erste Schritt dafür sein. Durch die Schaffung der rahmenförmigen Bühne wird Parma eine buchstäbliche und symbolische Grenze zwischen dem Publikum und der Kunst der Aufführung schaffen. Durch die Nutzung der „Scena“, die komplexe Hydraulik und ausgeklügelte Flaschenzugsysteme vereint, wird die Oper von einem akademischen Experiment zu einem ultimativen Spektakel staatlicher Macht werden. Dieser architektonische Durchbruch wird Bühnenbildner aus der ganzen Welt anziehen und den technischen Maßstab für das moderne Opernhaus setzen."
 pcz_the_citadel: "Zitadelle von Piacenza"
 pcz_the_citadel_desc: "Da unsere Stadt an der Kreuzung des Po liegt, ist sie eines der umkämpftesten strategischen Ziele in Norditalien. Wir reagiert darauf, indem wir in eine Befestigungsanlage investieren, die diesem Umstand würdig ist. Diese Zitadelle dient einer Garnison nicht nur als Zufluchtsort, sondern ist eine autarke Festung, die einer Belagerung standhalten kann, während die Stadt außengelegene Stadt die Bedingungen aushandeln kann. Sie ist ein Konzept, das jeden Angreifer zwingt, sich mit einer mehrschichtigen Verteidigung statt einer einzigen Mauer beschäftigen zu müssen. Die #italic Cittadella#! macht die Eroberung von Parma äußerst kostspielig, was die Bereitschaft größerer Mächte mindert, unsere Stadt als etwas anzusehen, das im Rahmen eines einzigen Feldzugs eingenommen werden kann."
 blg_the_bolognese_school_of_music: "Bologneser Musikschule"
 blg_the_bolognese_school_of_music_desc: "Bologna wird zum Zentrum für die Weiterentwicklung des Konzerts und die Professionalisierung des Orchesters. Indem wir uns von den unberechenbaren modalen Traditionen der Vergangenheit lösen, können wir die strengen strukturellen Gesetze der modernen Dur-Moll-Tonalität begründen. Diese Synthese wird die Violine von einem Volksinstrument zur führenden Stimme des Barock machen und einen neuen Standard für die #italic Trio Sonata#! und das #italic Concerto Grosso#! einführen. Dank der augenscheinlichen Schlichtheit wird sie sich schnell von den italienischen Kathedralen bis zu den entlegensten Höfen Europas ausbreiten und zu einem Sinnbild der Prestige werden. Es wird auch den endgültigen Übergang von der experimentierfreudigen Renaissance zur Ära der disziplinierten, instrumentalen Virtuosität markieren."
 fer_ferrarese_silk: "Ferraresische Seide"
 fer_ferrarese_silk_desc: "Die Seidenraupen unseres Landes und die geschickten Hände unserer Weber stellen schon immer Stoffe von außergewöhnlicher Qualität her und wir haben dafür gesorgt, dass dieses Handwerk eine der zuverlässigsten Säulen unserer Wirtschaft ist. Durch die Regulierung des Handels und den Schutz unserer Handwerksmeister stellen wir sicher, dass Rohseide zu Fertigwaren verarbeitet, anstatt zu günstigen Preisen an unsere Rivalen exportiert wird. Der Tuchhandel sichert unseren Handelszünften einerseits ihren Wohlstand und stellt andererseits sicher, dass jeder Stoffballen, der in unserem Land hergestellt wird, unseren Namen auf die Märkte Europas trägt."
 man_monteverdi_orfeo: "Monteverdi's L'Orfeo"
 man_monteverdi_orfeo_desc: "Als Claudio Monteverdi in unserem Herzogspalast #italic L'Orfeo#! für die Accademia degli Invaghiti aufführte, schenkte er der Welt die erste vollendete Oper. In diesem Meisterwerk werden Stimmen, Instrumente und Drama zu einer Form verschmolzen, die das Publikum sofort als etwas erkannte, das es so noch nie zuvor gehört hatte. Mantua war die Stadt, in der dieser Wandel stattfand, und der Hof war die Institution, die ihn ermöglichte, indem er Monteverdi Sänger und Musiker zur Verfügung stellte und ihnen eine dauerhafte Förderung versprach, ohne die weder die Proben noch die Partitur hätten entstehen können. Die Geburt der Oper macht unseren Hof zum Ursprung der mächtigsten neuen Kunstform Europas und die von uns ausgebildeten Künstler tragen unseren Namen auf jede Bühne, die sie später betreten werden."
 mod_diplomazia_balsamica: "Diplomazia Balsàmica"
 mod_diplomazia_balsamica_desc: "Wir werden den Balsamico-Essig von einem traditionellen Erzeugnis des Haushalts zu einem staatlich geschützten Luxusgut machen. Wir können den ausschließlich von unserer Elite hergestellte Essig als diplomatisches Geschenk nutzen, um an den Höfen unserer Freunde und Rivalen Bündnisse und Handelsvorteile zu sichern. Dieses kleine Luxusgut wird dafür sorgen, dass die Marke „Modena“ auch weiterhin für höchste Qualität und Exklusivität steht."
 par_prosciutto_e_parmigiano: "Prosciutto e Parmigiano"
 par_prosciutto_e_parmigiano_desc: "Der rund um unsere Stadt hergestellten Rohschinken und die gereiften Käselaibe sind zu einem Luxusgutgeworden, und werden auf dem gesamten Kontinent gehandelt. An den Höfen und in den Handelshäusern gelten sie als Sinnbilder für das Beste, was die Poebene zu bieten hat. Wir schützen und regulieren die Herstellung und legen Standards fest, um dafür zu sorgen, dass die Ausfuhr unsere Staatskasse ebenso bereichert, wie er unsere Kunden erfreut. Unser kulinarischer Ruf verwandelt unsere bescheidene landwirtschaftliche Tradition in eine dauerhafte Quelle wirtschaftlichen und diplomatischen Ansehens."
 pcz_administrative_reform: "Piacentinische Verwaltungsreform"
 pcz_administrative_reform_desc: "Die Herrscher von Piacenza regierten einen Staat, der durch Vetternwirtschaft aufgebaut und durch die ungewöhnliche Kombination aus militärischer Rücksichtslosigkeit und administrativer Klugheit der Herrscherfamilie zusammengehalten wurde, wobei sich gerade letztere Eigenschaft als beständiger erwiesen hat. Um auf dieser Stärke aufzubauen, werden wir unserer Finanz- und Verwaltungsinstitutionen reformieren und die Praktiken der effizientesten italienischen Staaten auf ein Gebiet anzuwenden, das viel zu lange durch Autorität als durch institutionelle Verfahren geführt wurde. Diese #italic Riforma Amministrativa#! belohnt unsere fähigsten Untertanen mit Beförderungen, die auf Kompetenz statt auf Beziehungen beruhen, und bindet unser Bürgertum an die Effizienz eines Staates, dessen Steuererhebung nunmehr diejenigen begünstigt, die Wohlstand schaffen, anstatt diejenigen, die ihn lediglich aus anderen Händen ziehen."
 blg_galvanism: "Galvanismus"
 blg_galvanism_desc: "Die Universität Bologna repräsentiert die Aufklärung nach wie vor wie niemand sonst. Die Entdeckung der Tierelektrizität in einem Bologneser Labor hat den Grundstein für die moderne Bioelektrizität und Physik gelegt. Dieser Forschergeist verwandelt die Stadt zu einem frühen industriellen Zentrum und überbrückt damit die Kluft zwischen der antiken Scholastik und der modernen Wissenschaft."
 fer_po_delta_reclamation: "Rückgewinnung des Po-Deltas"
 fer_po_delta_reclamation_desc: "Das sumpfige Po-Delta war lange Zeit ein Ödland aus malariaverseuchtem Wasser direkt vor unserer Haustür. Durch die Umsetzung eines systematischen Entwässerungs- und Deichbauprogramms verwandeln wir das Feuchtgebiet in fruchtbares Ackerland, wodurch wir unsere Steuerbasis stärken und gleichzeitig die Krankheitslast für die Grenzgemeinden verringern. Diese Umgestaltung der Landschaft zu etwas Geordnetem und Ertragreichem macht unseren Regierungsansatz für alle sichtbar."
 man_po_agriculture: "Landwirtschaft im Po-Delta"
 man_po_agriculture_desc: "Die Tiefebene, die Mantua auf drei Seiten umgibt, zählt zu den fruchtbarsten Regionen Italiens und dank der Trockenlegung von Sümpfen, systematischen Investitionen in den Ausbau von Bewässerungskanälen und der Regulierung der Landgewinnung an den Ufern der Seen haben wir die Grundlage für eine heimische Landwirtschaft gelegt Das Ergebnis ist eine Produktionskapazität, die von Generation zu Generation zuverlässig wächst und unsere Stadt mit Nahrungsmittelüberschüssen versorgt. Diese geduldige Kultivierung der #italic Pianüra Padâna#! (#italic Pianura Padana#! in Standarditalienisch für „Po-Ebene“) sorgt dafür, dass unsere Untertanen auch in schwierigen Jahren gut versorgt sind und unsere Staatskasse durch die Steuern der wohlhabenden ländlichen Gebiete gefüllt wird."
 mod_accademia_militare: "Accademia Militare"
 mod_accademia_militare_desc: "Wir richten eine eigene Akademie für die Ausbildung von Offizieren ein und sorgen so dafür, dass sie systematischen Unterricht im Klassenzimmer erhalten anstatt zufällig Lektionen im Feldlager zu erlenen. Geometrie, Festungsbau, Taktik und die Kunst des Kommandierens werden als Disziplinen unterrichtet, um Offiziere hervorzubringen, die Probleme durch logisches Denken lösen, anstatt einfach nur der Tradition zu folgen. Diese Institution wird zu einer der besten ihrer Art in Europa werden und die Absolventen werden von Armeen begehrt, die weit über unsere Grenzen hinaus operieren."
 par_enlightened_duchy: "Aufgeklärtes Herzogtum"
 par_enlightened_duchy_desc: "Die neuste Generation von Reformern hat unseren Hof davon überzeugt, dass die alten Regierungsmechanismen – ihre Privilegien, ihre Ausnahmeregelungen, ihre langsamen, gewohnheitsrechtlichen Verfahren – eher ein Hindernis für das Wohlergehen unserer Untertanen sind und kaum zu ihrem Schutz beitragen. Wir werden das Gewohnheitsrecht systematisch durch kodifizierte Gesetze ersetzen und die Vernunft in die Besteuerung, das Bildungswesen und die Verwaltung öffentlicher Angelegenheiten einfließen. Dieses Bekenntnis zur rationalen Regierungsführung macht unseren Staat effizienter, unsere Gesetze berechenbarer und unsere Untertanen eher bereit, darauf zu vertrauen, dass die Regierung in ihrem Interesse handelt."
 pcz_new_industry: "Neue Industrie für Piacenza"
 pcz_new_industry_desc: "Die Kombination aus dem Transportweg über den Po, den Ausläufern der Berge als Quelle für Holz und Wasserkraft sowie einer seit langem am Handel gewohnten Bürgerschicht machen Piacenza ideal für eine frühe industrielle Entwicklung, die vielen größeren Städten fehlen. Wir investieren in Werkstätten, Kreditinstitute und Arbeitsmarktreformen, um dafür zu sorgen, dass unsere Industrie beständig ausgebaut werden kann und sie nicht den Beschränkungen der meisten anderen unserer Städte unterliegt. Diese Hingabe zur #italic Nuova Industria#! wird Arbeiter vom Land in die Städte locken und unserem Staat eine gute Besteuerungsgrundlage sichern."
 #Ligurian Shared
 ligurian_coastal_seafarers: "Ligurische Küstenseefahrer"
 ligurian_coastal_seafarers_desc: "Jeder Ort an der ligurischen Riviera – von den Fischereihäfen in Ventimiglia bis zu den Bergdörfern oberhalb von La Spezia – schickt seit Jahrhunderten Männer in kleinen Küstenbooten auf See und diese meisterhaften Seefahrer haben gelernt, sich in den Strömungen, Gefahren und Wetterbedingungen einer der anspruchsvollsten Küstenabschnitte im Mittelmeer zurechtzufinden. Diese Tradition reicht länger zurück als der Bau von Kriegsschiffen, die das Meer überqueren können und der Küstenhandel, den diese Männer aufrechterhielten, befördert Waren zwischen Häfen, die keine Straße im Landesinneren effizient erreichen konnte. Dank unseres Seefahrererbes haben unseren Kaufleuten einen natürlichen Vorteil im Küsten- und Regionalhandel und jede Galeerenflotte, die wir in See stechen lassen, ist mit Männern bemannt, die sich auf den Gewässern bereits auskennen."
 ligurian_merchant_diaspora: "Ligurische Handelsdiaspora"
 ligurian_merchant_diaspora_desc: "Die Händler unserer Küste haben nicht darauf gewartet, von einer der großen Handelsstädte eingeladen zu werden. Stattdessen gründeten sie Kolonien, Handelsvertretungen und Partnerschaften in jedem Hafen, von den Siedlungen Caffa und Pera am Schwarzen Meer bis hin zu den Handelshäusern in Sevilla und Lissabon. Dieses System der #italic Colonie#! stützte sich auf Netzwerk aus Vertrauen und Verwandtschaft, die ligurische Kredite in Alexandria ebenso zuverlässig machten wie zu Hause, und die Informationen, die über diese Netzwerke flossen, verschafften unseren Händlern auf jedem Markt einen Vorteil. Diese Diaspora erweiterte unsere Handelsreichweite weit über das hinaus, was die Größe unserer Flotte allein rechtfertigen würde."
 ligurian_spirit_of_navigation: "Ligurische Navigation"
 ligurian_spirit_of_navigation_desc: "Die ligurische Küste hat im Verhältnis zu ihrer geringen Größe eine überdurchschnittlich hohe Anzahl fähiger Seefahrerhervorgebracht, darunter Cristoforo Colombo, der den westlichen Atlantik für Kastilien erschloss, Giovanni Caboto, der die Nordküste der Neuen Welt für die englische Krone kartografierte, und eine ganze Generation Navigatoren, deren Fähigkeiten auf jeden Ozean Verwendung finden, den europäische Schiffe erreichen können. Dank dieser Seeleute, die mit unvollständigen Seekarten über den Horizont hinaus segeln, genießt die ligurischen Seefahrt ein hohes Ansehen, was Investitionen anzieht und uns die Gunst fremder Höfe einbringt, die sonst niemals einen Blick auf unsere kleine Küste werfen würden. Unsere Seefahrerkultur stärkt unser Ansehen und lockt qualifizierte Siedler und andere Abenteurer aus fernen Ländern in unsere Häfen."
 ligurian_artisan_craft: "Ligurische Handwerkskunst"
 ligurian_artisan_craft_desc: "Die Werkstätten an der ligurischen Küste haben eine lange Tradition des Kunsthandwerks. Zu den Erzeugnissen gehören die #italic Filigrànn-a#! (#italic Filigrana#! in Standarditalienisch für „filigran“) Silberarbeiten der städtischen Goldschmiede, die in Albisola gebrannte Majolika sowie die kunstvollen Samtgewebe, deren Herstellung unsere Weber bereits im vierzehnten Jahrhundert gemeistert haben. Für all diese Waren finden sich überall dort Käufer, wo wohlhabende Auftraggeber höchste Qualität fordern. Diese Handwerkskultur ist auch in jenen Werkstätten zu finden, in denen die weniger glamourösen Waren des täglichen Lebens hergestellt werden, was unseren Handwerkern eine Flexibilität verschafft, mit der rein auf Luxus ausgerichtete Zünfte nicht mithalten können. Die begabtesten Künstler unserer Zeit lassen sich hier nieder, um sicherzustellen, dass ihre Werke Spitzenpreise erzielen."
 ligurian_communal_councils: "Reformation des Stadtrats"
 ligurian_communal_councils_desc: "Die selbstverwalteten Gemeinden, die das Hafenleben in Ligurien jahrhundertelang geregelt haben, wurden nach und nach formalisiert, wobei informelle Gepflogenheiten durch schriftliche Satzungen, gewählte Gremien und standardisierte Verwaltungsverfahren ersetzt wurden, um die Reibung mit der Lokalverwaltung zu verringern. Diese reformierten Räte bieten dem Bürgertum ein strukturiertes Forum, in dem sie die Angelegenheiten ihrer Gemeinden regeln können, ohne auf die Gunst des Adels oder weit entfernte Justizbehörden angewiesen zu sein, und verankerten damit das Bürgertum in den Institutionen jeder ligurischen Stadt. Unsere lange Verwaltungstradition verschafft uns auch Zugang zu außergewöhnlich qualifizierten Talenten und sorgt dafür, dass unsere Institutionen besser auf die Bedürfnisse der Bürger eingehen können, die unseren Handel aufrechterhalten."
 ligurian_enlightenment: "Ligurische Aufklärung"
 ligurian_enlightenment_desc: "Die Philosophen und Rechtsgelehrten von #italic Ligurien#! haben sich so intensiv mit dem Gedanken der Aufklärung auseinandergesetzt wie kaum eine andere Schule in Europa. Ihr Verständnis über die Prinzipien der Vernunft und des Naturrechts erfordert ein grundlegendes Umdenken hinsichtlich der Art und Weise, wie Staaten regieren und Gesetze erlassen. Wir fördern diese Tradition und reformieren unsere Institutionen von innen heraus, indem wir Gewohnheiten und Privilegien durch kodifizierte Verfahren ersetzen und die besten Verwalter unserer Zeit in den öffentlichen Dienst holen. Dieses Bekenntnis zu einer vernunftgeleiteten Staatsführung macht unsere Gesetze verständlicher, unsere Reformen kostengünstiger und unseren Staat widerstandsfähiger gegen Destabilisierungsversuche."
 #Ligurian Unique
 genoese_maritime_diplomacy: "La Superba"
 genoese_maritime_diplomacy_desc: "Wir haben unsere Republik auf den beiden Säulen Handel und Kredit aufgebaut und Pionierarbeit bei der Entwicklung von Schuld- und Tauschinstrumenten geleistet, die seit dem frühen Mittelalter unsere Handelsposten von der #italic Levante#! bis zum Schwarzen Meer finanzieren. Unsere Kolonien und Handelsposten im gesamten Mittelmeerraum sind Diplomatie- und Handelsaußenposten und verschaffen uns eine Reichweite, mit der keine rein militärische Macht mithalten könnte. Dieses Netzwerk aus Finanzen und Staatskunst stellt sicher, dass unsere Banken und unsere Gesandten als Einheit agieren, wodurch die Kreditkosten niedriger ausfallen und wir mehr Botschafter in unseren Diensten halten können."
 bank_of_saint_george: "Bank des Heiligen Georg"
 bank_of_saint_george_desc: "Die #italic Casa di San Giorgio#! wurde ursprünglich gegründet, um die wachsende Schuldlast der Republik zu bündeln, hat sich seither jedoch zu einem der fortschrittlichsten Finanzinstitute des Christentums entwickelt. Private Gläubiger und der Staat sind gemeinsam an ihrer Leitung beteiligt und lenken den Reichtum Genuas in Geschäfte im Ausland, wobei die Kreditkosten niedrig gehalten werden. Dieses Zusammenwirken von öffentlichem und privatem Kapital versetzt uns in die Lage, all unsere Ambitionen zu verwirklichen."
 genoese_flexibility: "Die neue Republik"
 genoese_flexibility_desc: "In den unruhigen Jahren des frühen 16. Jahrhunderts gestaltete #italic Andrea Doria#! unsere Republik neu. Er vereinte den Adel zu achtundzwanzig großen Häusern, den #italic Aberghi#! (#italic Alberghi#! in Standarditalienisch für „große Häuser“) und sorgte damit für eine politische Stabilität, die uns lange verwehrt wurde. Derselbe pragmatische Geist prägte auch den Umbau unserer Flotte, die auf Einsätze im gesamten Mittelmeerraum ausgerichtet wurden, anstatt sich auf einen einzelnen strategischen Punkt zu konzentrieren. Dies erlaubt uns, unsere Flotte zu geringeren Kosten zu unterhalten und unsere Kriegsgaleeren bei Bedarf zu Handelsschiffen umzurüsten."
 the_age_of_the_genoese: "Genuesisches Zeitalter"
 the_age_of_the_genoese_desc: "Die großen Bankmessen von #italic Piacenza#! machen genuesische Geldgeber für die spanische Krone und die europäischen Geldströme seit Generationen unverzichtbaren. Der immense Reichtum, der durch unsere Hände fließt, findet seinen Weg in die Paläste und Villen des Kaufmannsadels, der wiederum darum wetteifert, die besten Künstler unserer Zeit zu fördern. Diese Vormachtstellung über die europäische Finanzwelt senkt die Kosten für Anleihen und macht die Förderung großer Künstler zu einem erschwinglichen Luxus."
 genoese_school: "Genuesische Kunstschule"
 genoese_school_desc: "Der aus dem Handel gewonnene Wohlstand zieht unzählige Sammler und Kunstmäzen nach $GEN$ und hat zur Gründung einer eigenständigen #italic genuesische Malerschule#! geführt, die für ihre meisterhafte Beherrschung der Lichtdramatik und der reichen Textur berühmt geworden ist. Künstler, die in unserer Republik aufgewachsen sind, haben die genuesische Kunst und das Ansehen unseres Hofs nach ganz Europa getragen. Diese künstlerische Blüte vertieft unsere Traditionen und erweitert unseren Einfluss weit über das hinaus, was Politik allein zu erreichen vermag."
 gen_free_port: "Porto Franco"
 gen_free_port_desc: "Durch die neuen Handelsrouten im Atlantik wird der Warenverkehr im Mittelmeerraum immer weiter vernachlässig. Indem wir unsere Häfen zu #italic Porto Franco#! (Freihafen) erklären, diese für alle Händler zugängig machen und sie von den Zöllen und Beschränkungen befreien, legen nun wieder Schiffe an unseren Kais an, die einst an Ligurien vorbeifuhren. Die Stadt füllt sich mit Handelsvertretern anderer Länder und die Lagerhäuser mit Geld und Wohlstand. Diese Offenheit gegenüber allen Ankommenden macht unseren Hafen zu einem der geschäftigsten Umschlagplätze des westlichen Mittelmeers."
 #Lombard Shared
 milanese_tradition: "Kommunalrechte"
 milanese_tradition_desc: "Seit der Gründung des Lombardischen Städtebunds werden die Städte der Lombardei durch gewählte Konsule und unabhängige Gerichte verwaltet, was eine Tradition des Bürgerrechts geschaffen hat, die kein Kaiser vollständig zerschlagen konnte. Wr bauen auf diesem Erbe auf, indem wir die Freiheiten der Städte in einer formell niederschreiben und ihnen für ihre Unterstützung in Form von Steuern und Truppen ein Maß an Selbstverwaltung einräumen. Diess Abkommen zwischen der Krone und den Städten sorgt dafür, dass unsere Stadtbevölkerung eingebunden bleibt, was wiederum die Spannungen minimier, die andere Staaten ausbluten lassen, wenn sie ihre Untertanen zum Einsatz rufen müssen."
 patron_of_music: "$lombard$e Bankiers"
 patron_of_music_desc: "$lombard$e Händler und Bankiers haben sich seit Generationen in europäischen Städten etabliert und gewähren Höfen und Handelshäusern Anleihen, die sonst keine zuverlässigere Kreditquelle finden würden. Indem wir regulierte Wechselstuben und Akkreditive mit festen Laufzeiten einführen, kann sich unser Finanznetzwerk zu einem bewussten Instrument des Staates entwickeln, was uns Zugang zu fremden Staatskassen verschafft und uns an den Höfen Europas eine Stimme verlieht, die wir allein durch unsere militärische Stärke niemals erlangen könnten."
 age_of_condottieri: "Navigli"
 age_of_condottieri_desc: "Das Kanalnetz, das sich durch die Lombardei schlängelt, begann als einfaches Bewässerungssystem, hat sich inzwischen jedoch zur Lebensader unserer gesamten regionalen Wirtschaft entwickelt: Es verbindet Mailand mit dem Po und befördert Getreide, Holz und Fertigwaren zu einem Bruchteil der Kosten eines Landtransports. Wir haben in die Verbreiterung und Vertiefung dieser Wasserstraßen investiert und neue Schleusen gebaut, die es selbst schwereren Lastkähnen erlauben, ganzjährig über die Wasserstraße zu fahren, ohne von saisonalen Wasserständen abhängig zu sein. Dieses Netz senkt die Kosten für die Versorgung unserer Städte und den Truppentransport und macht die Lombardei zu einem der am effizientesten verwalteten Gebiete Italiens."
 merchant_princes: "Lombardische Chiaroscuro-Malerei"
 merchant_princes_desc: "Michelangelo Merisi, geboren in einer Kleinstadt in der Nähe von Bergamo, meisterte die Kunst, Licht und Schatten so direkt und unverblümt darzustellen, dass die Werke aller anderen Schulen im Vergleich dazu künstlich wirkten. Seine Anhänger haben die #italic Chiaroscuro#!-Technik bis nach Rom, Neapel und Madrid getragen und Kunstmäzen haben begonnen, Werke ausdrücklich im lombardischen Stil in Auftrag zu geben. Dieser Ruf zieht Sammler und Kunstgelehrte gleichermaßen in unsere Städte und die von uns ausgebildeten Künstler genießen eine starke Nachfrage an den betuchten Höfen Europas."
 lombard_silk_masters: "Meisterhafte Seidenweber"
 lombard_silk_masters_desc: "Die Maulbeerhaine und Seidenwebereien am Comer See und in der lombardischen Ebene beliefern die Höfe Europas mit den feinsten Seidenstoffen, die es gibt, und unsere Weber haben den Herstellungsprozess so weit verfeinert, dass unsere Konkurrenten Mühe haben, unsere Waren nachzuahmen. Wir bewahren diesen Vorteil, indem wir die Ausfuhr von Rohseide und die Techniken unserer Meisterweber regulieren und dafür sorgen, dass die wertschöpfende Arbeit innerhalb unserer Landesgrenzen bleibt, anstatt als billiges Rohmaterial ins Ausland zu gelangen. Dieser Kontrollmechanismus erstreckt sich über die gesamte Produktionskette und macht Seide zu einer stabilen Einnahmequelle, die ihren Wert auch dann behält, wenn die Preise anderer Rohstoffe fallen."
 lombard_the_manifattura: "La Manifattura"
 lombard_the_manifattura_desc: "In den Ausläufern des Bergamo und Como ersetzen englische Spinnmaschinen und mechanische Webstühle die alten Heimwerkstätten und die an alpinen Bächen betriebenen Webereien erzeugen Stoffe schneller und kostengünstiger, als es ein Handweber je könnte. Durch die Ansiedlung von Unternehmen in den Städten und hinzugezogene Ingenieure haben wir eine Ansammlung von Familienwebstühlen zu einer modernen Industrie entwickelt. Die Lombardei ist das industrielle Herz Italiens und der Reichtum, der hier erzeugt wird, fließt bis in die entlegensten Winkel unseres Territoriums."
 #Lombard Unique
 milanese_heritage: "Il Biscione"
 milanese_heritage_desc: "Die gewundene Schlange der Visconti ist zum bekanntesten Symbol für Macht in Norditalien geworden. Sie prägt unsere Münzen, unsere Siegel und die Tore jeder Stadt, die uns untertan ist. Den #italic Biscione#! zum offiziellen Wappen des Herzogtums zu machen, wird die Loyalität der Region an unsere Dynastie binden und nicht an die bestimmter Adelsfraktion. Durch dieses visuelle Symbol unserer Autorität werden es unsere Rivalen weitaus schwerer haben, unsere Herrschaft in Frage zu stellen, und unsere Botschafter werden die Schlange auf ihren Beglaubigungsschreiben nutzen können, um Türen öffnet, die anderen italienischen Fürsten verschlossen bleiben."
 renaissance_prince: "Fabbrica del Duomo"
 renaissance_prince_desc: "Die #italic Veneranda Fabbrica del Duomo#! beschäftigt seit Generationen Steinmetze, Ingenieure und Baumeister. Sie betrachtet den Dom nicht als ein Projekt mit einem Ende, sondern als Einrichtung, die Handwerker ausbildet und Bautechniken verfeinert, solange die Arbeit dies erfordert. Wir haben ihren Aufgabenbereich und ihre Finanzierung erweitert und sichergestellt, dass das von ihr bewahrte Wissen an jede Baustelle in unserem Territorium weitergegeben wird. Diese Institution macht Mailand zu einer Schule der praktischen Baukunst, und die von ihr ausgebildeten Handwerker sind in ganz Norditalien gefragt."
 lowered_power_of_barons: "Mailändische Plattner"
 lowered_power_of_barons_desc: "Ein in unseren Werkstätten gefertigter Brustpanzer erzielt einen viel höhren Preis als die aus Köln oder Toledo und unsere Plattner beliefern Höfe und Feldherren von Portugal bis Polen. Indem wir die Schmiedezünfte unter herzoglicher Aufsicht stellen und Standards festlegen, die unseren Ruf schützen und das technische Wissen und den Gewinn innerhalb unserer Mauern halten, können wir dieses Monopol auf militärische Ausrüstung nutzen, um stetige Einnahmen zu generieren und dafür sorgen, dass unsere eigenen Truppen besser ausgerüstet sind als unsere Feinde, die ihre Rüstungen von anderswo einführen müssen."
 encouragement_of_philosophers: "Borromäische Reform"
 encouragement_of_philosophers_desc: "Als das Konzil von Trient der Kirche seine Dekrete darlegte, war es der Erzbischof von Mailand, Carlo Borromeo, der für eine konsequente Umsetzung sorgte. Er organisierte Pfarreien rigoros um, standardisierte Priesterseminare und führte regelmäßige Pastoralbesuche durch, wie sie kein Bischof in Europa zuvor in diesem Ausmaß unternommen hatte. Wir haben das von ihm geschaffene Modell vollständig übernommen und nutzen die Bistumsstruktur als verlängerten Arm des Staates, um die Bildung und Disziplin auf jedes Dorf in unserem Herrschaftsgebiet auszuweiten. Dank dieser Reform konnte eine Bevölkerung entstehen, die sowohl besser gebildet als auch enger mit den Reichsinstitutionen verbunden ist, wodurch die öffentliche Ordnung erheblich leichter aufrechterhalten werden kann."
 rulership_of_enlightened_principals: "Beccarias Abhandlung"
 rulership_of_enlightened_principals_desc: "Cesare Beccaria, dessen Abhandlung über Verbrechen und Strafen zum meistgelesenen juristischen Text Europas geworden ist, stammt aus unserer Stadt Er vertritt die Auffassung, dass Verbrechen eher durch Gesetze als durch Grausamkeit verhindert werden sollten. Indem wir unser Strafrecht nach diesem Ideal reformieren und Folter und willkürliche Urteile durch verhältnismäßige Strafen und öffentliche Gerichtsverfahren ersetzen, schaffen wir ein Rechtssystem, das von der Stadtbevölkerung als gerecht und nicht als ausbeuterisch empfunden wird. Dies wird auch dazu führen, dass sich unsere Städte leichter regieren lassen und sie für Händler und Investoren attraktiver werden, die wissen, dass ihre Streitigkeiten nach dem Gesetz und nicht durch Bestechung beigelegt werden."
 milanese_ambition: "Teatro alla Scala"
 milanese_ambition_desc: "Anstelle der alten Kirche Santa Maria alla Scala haben wir ein Theater errichtet, das Platz für zweitausend Zuschauer bietet und mit einem Bühnensystem ausgestattet ist, das in Europa seinesgleichen sucht. Bei der ersten Premiere war jeder Botschafter, Händler und Adliger anwesend, der eine Verbindung zu Mailand vorweisen konnte, und innerhalb weniger Monate sprach man von London bis Sankt Petersburg über die hier uraufgeführten Stücke. Die moderne Bühne verwandelt unseren Hof zum kulturellen Zentrum des Kontinents, und die Künstler, die an der Scala Erfolg haben, tragen den Namen unserer Stadt in jeden Winkel der Welt."
 #Maltese Shared
 maltese_the_rahal_watch: "Das Rahal-Wachtsystem"
 maltese_the_rahal_watch_desc: "Die maltesische Landschaft wird vom #italic Raħal#! (dem Dorf) geprägt, das sich um eine befestigte Pfarrkirche ansiedelt. Anders als die feudalen Gutsherrschaften Europas bildet das maltesische Dorf eine eng verbundene Gemeinschaft, in der die Bewohner selbst für ihre Sicherheit verantwortlich sind. Dadurch entsteht eine Kultur der ständigen Wachsamkeit, in der jeder Dorfbewohner lernt, Segel am Horizont zu erkennen und bei Gefahr die Stellungen der #italic Dejma#! (örtliche Miliz) aufzusuchen"
 maltese_the_korsa: "Die Korsa"
 maltese_the_korsa_desc: "Die Piraterie im Mittelmeer nimmt immer weiter zu und nun beteiligen sich auch Malteser daran. Durch die Erteilung von Kaperbriefen können wir eine Klasse von „Seemannshändlern“ schaffen, die das Meer sowohl als Quelle des Wohlstands als auch Schauplatz religiöser Auseinandersetzungen ansieht und uns zu „Wikingern des Südens“, Experten für Enteraktionen und Küstenüberfälle macht. Diese maritime Aggression stellt auch sicher, dass die Küste von einer aggressiven, privat finanzierten Küstenwache verteidigt wird, die jede versteckte Bucht kennt."
 maltese_the_bajada: "Die Bajada"
 maltese_the_bajada_desc: "Unsere Kultur hat die #italic Bajada#! (Nachtkundschafter), hervorgebracht, Männer, die über eine außergewöhnliche Kenntnis der Umgebung verfügen und selbst bei völliger Dunkelheit die felsigen Karstlandschaften und steilen Klippen der Insel durchqueren können. Für das Militär fungieren sie als Kuriere, die feindliche Linien unbemerkt umgehen oder während einer Blockade zwischen den Hafenfestungen hindurchschwimmen können. Diese Kultur der Heimlichkeit erlaubt uns, sofern wir sie gezielt fördern, einen Nachrichtendienst aufzubauen, den kein Feind zu entdecken vermag."
 maltese_the_modernized_dejma: "Modernisierte Dejma"
 maltese_the_modernized_dejma_desc: "Angesichts neuer Bedrohungen muss die Dorfwache, bekannt als Dejma, modernisiert werden. Indem wir ein staatlichen Milizsystem entwickeln, in dem jedem Mann zwischen 16 und 60 Jahren ein bestimmter Posten zugewiesen wird, schaffen wir eine Kultur der „Soldaten-Bauern“, in der der landwirtschaftliche Erntezyklus eng mit militärischen Übungen verflochten ist. Diese Vertrautheit mit dem Kriegswesen stellt sicher, dass unsere Inseln niemals durch einen überraschenden Landeversuch unserer Feinde eingenommen werden können, da die gesamte Landbevölkerung als jederzeit einsatzbereite Reserve fungiert, die unsere Berufssoldaten unterstützen wird."
 maltese_the_festa_ritualism: "Festa-Ritualismus"
 maltese_the_festa_ritualism_desc: "Im Mittelpunkt unserer Gesellschaft stehen die #italic Festa#! und die religiösen Prozessionen, die mit militärischer Präzision organisiert werden. Diese aufwendigen Feierlichkeiten zeichnen sich durch die prächtigen Umzüge, kunstvollen Straßendekorationen und gemeinschaftlichen Festessen aus und sorgen für einen starken Zusammenhalt innerhalb der maltesischen Gesellschaft. Diese Kultur der öffentlichen Frömmigkeit und des gemeinsamen rituellen Lebens überwindet selbst Klassengrenzen und vereint die Stadt- und die Landbevölkerung gleichermaßen. Die Malteser lenken ihre Ressourcen in das ästhetische und spirituelle Leben ihrer lokalen Gemeinschaften und fördern so ein unglaubliches Maß an innerem Zusammenhalt und sozialer Harmonie. Selbst im Angesicht äußerer Bedrohungen bewahren die Malteser eine geeinte und kulturell lebendige Gesellschaft."
 maltese_center_of_the_mediterranean: "Zentrum des Mittelmeers"
 maltese_center_of_the_mediterranean_desc: "Mit der zentralen Lage unserer Insel im Mittelmeer hat sich unsere Seefahrerkultur in Richtung industrieller Schiffsreparatur und globaler Logistik entwickelt. Unser Großer Hafen entwickelt sich zur führenden Marinewerft der Welt, während unsere Handwerker ihre Fertigkeiten in der Steinbearbeitung und im Schiffszimmerhandwerk an das Zeitalter von Dampf und Eisen anpassen. Diese Verbindung von industrieller Leistungsfähigkeit und seemännischer Tradition macht die Inseln zu einer Drehscheibe der weltweiten Kohleversorgung und zu einem bedeutenden Reparaturzentrum. Außerdem stellt es sicher, dass unsere Flotte unseren Rivalen technologisch stets überlegen bleibt."
 #Median Shared
 median_lo_statuto_del_comune: "Lo Statuto del Comune"
 median_lo_statuto_del_comune_desc: "Schon bevor in weiten Teilen Europas daran gedacht wurde, Bräuche schriftlich festzuhalten, hatten unsere Städte ihre Gesetze kodifiziert, einen Rat eingerichtet und die Pflichten jedes Bürgers und Amtsträgers im #italic Statuto#! niedergeschrieben. Von Ancona bis Viterbo wurden diese Dokumente von jeder Generation überarbeitet, angefochten und erneuert. So entstand eine lebendige öffentliche Debatte und Auseinandersetzung, die weder Feudalherren noch Eroberer jemals vollständig auslöschen zu vermachten. Dieses Erbe des geschriebenen Rechts verleiht unseren Institutionen Beständigkeit und bindet unser Bürgertum enger an die Stadt, an deren Regierung es selbst Anteil hat."
 median_studio_generale: "Studio Generale"
 median_studio_generale_desc: "Die 1308 gegründete Universität von Perugia unterstellt sich eher der weltlichen als der kirchlichen Obrigkeit, und die im ganzen Land aufgebauten Hochschulen bilden die Juristen, Notare und Verwaltungsbeamten aus, die die Angelegenheiten der italienischen Kommunen vorantreiben. Unsere Städte stellten Bibliotheken, Förderung und die Debattenkultur bereit und ziehen Gelehrte aus der ganzen Halbinsel an, wodurch die juristische und philosophische Ausbildung in Mittelitalien ebenso selbstverständlich war wie jedes andere Handwerk. Diese Tradition der gelehrten Regierungsführung verleiht unseren Beamten eine juristische und rhetorische Bildung, mit der ihre Amtskollegen in rein feudal geprägten Regionen nur schwer mithalten können."
 median_bastioni_e_rocche: "Bastioni e Rocche"
 median_bastioni_e_rocche_desc: "Die Italienkriege haben bewiesen, dass mittelalterliche Stadtmauern Artillerie nicht länger als einen Vormittag aufhalten können. Unsere Bergstädte reagierten darauf, indem sie ihren größten natürlichen Vorteil – den Bergrücken, die Ausläufer und die Schlucht – zu schräg angeordneten Bastionen und einem kompakten System, das als #italic Rocche#! bekannt ist, verwandelten, wodurch jede einzelne Stadt für den Angreifer zu einem ganz eigenen taktischen Problem wurde. Architekten und Militäringenieure bauten unsere Verteidigungsanlagen aus Stein und Stampflehm neu auf und positionierten Artillerie an strategischen Orten, von denen aus sie feindliche Bataillone in Angst und Schrecken versetzen konnten. Diese Tradition der an das Gelände angepassten Befestigung macht es dem Feind schwierig, unser Territorium zu überrennen und weitaus kostspieliger, sie anschließend zu halten."
 median_baroque_sacred_patronage: "Barockes Kirchenmäzenatentum"
 median_baroque_sacred_patronage_desc: "Die Gegenreformation forderte eine Frömmigkeit, die Auge und Gemüt der Gläubigen gleichermaßen anspricht, und unsere Städte antworteten darauf mit einer Fülle von Kapellen, Altären und Kirchenfassaden, die jede Stadtsilhouette zu einer Bühne der Frömmigkeit verwandelten. Bischöfe, Bruderschaften und Stadträte wetteiferten darum, die prachtvollsten Bildwerke, die eindrucksvollsten Skulpturen und die überzeugendsten Andachtsgemälde in Auftrag zu geben, die sie finanzieren konnten. Diese Tradition des Kirchenmäzenatentum sichert den Lebensunterhalt unserer Künstler, erfüllt unsere Straßen mit religiöser Bildkunst und macht jedem Besucher deutlich, dass unsere Kultur im Zentrum der geistlichen Erneuerung der lateinischen Kirche steht."
 median_jubilee_economy: "Die Jubeljahr-Wirtschaft"
 median_jubilee_economy_desc: "Die Heiligen Jahre, die Rom alle 25 Jahre ausrief, lockten Pilger aus allen Ecken der lateinisch-christlichen Welt in unser Land. Die darauffolgende #italic große Bildungsreise#! des europäischen Adels zog eine zweite Welle wohlhabender und wissbegieriger Reisender aus dem Norden an, die bereit waren, für Unterkunft, Führung und Gesellschaft großzügig zu zahlen. Unsere Gasthäuser, Märkte und Werkstätten lernten, eine landesübergreifende Kundschaft zu bedienen, und das Geld, das sie hinterließen, floss in jeden Bereich unserer Wirtschaft. Diese Tradition der Gastfreundschaft gegenüber Gläubigen und Reisenden macht unsere Städte weit wohlhabender, als es die örtliche Produktion allein jemals ermöglichen könnte."
 median_enlightenment_civic_reform: "Zivilreformen der Aufklärung"
 median_enlightenment_civic_reform_desc: "Die rationalistisch geprägten Bewegungen des 18. Jahrhunderts fanden in unserer kommunalen Tradition einen Boden, da es unsere Städte seit langem brauch war, über die Verwaltung zu debattieren, Beschlüsse zu protokollieren und Amtsträger schriftlich zur Rechenschaft zu ziehen. Reformorientierte Statthalter und Akademien setzten sich für klarere Vorschriften, eine geordnetere Stadtplanungen und eine berechenbarere Verwaltung in den Städten und auf dem Land ein, über die wir herrschen. Dieser Wandel zu einer rationalen Regierungsführung macht unsere Institutionen effizienter und führt dazu, dass unsere Untertanen den Staat eher als Partner im bürgerlichen Leben betrachten anstelle eines Hindernisses."
 #Median Unique
 pap_head_of_the_church: "Kirchenoberhaupt"
 pap_head_of_the_church_desc: "Der Bischof von Rom hat eine ganz besondere Stellung im Christentum. Er ist nicht nur der ranghöchste Prälat, sondern auch der #italic Vicarius Christi#!, dessen Verlautbarungen in Glaubensfragen für jeden katholischen Herrscher und jedes Königreich verbindlich sind, egal ob sie diese nun begrüßen oder nicht. Diese Autorität begründet sich einerseits auf unserem Glauben und andererseits auf unserer institutionellen Macht. Wir sind der Vater aller Gläubigen und nicht bloß ihr kirchlicher Vorgesetzter. Dieser Umstand lässt auch unsere Rivalen zögern, sich auf eine offene Konfrontation mit dem Heiligen Stuhl von Rom einzulassen. Diese doppelte Stellung als institutionelles Oberhaupt und Glaubensvater verlieht uns immensen Einfluss in ganz Europa und macht es für jeden Herrscher, der auf die Loyalität katholischer Untertanen angewiesen ist, zu einem kostspieligen Unterfangen, sich mit uns anzulegen."
 pea_fontana_maggiore: "Fontana Maggiore"
 pea_fontana_maggiore_desc: "Noch bevor unsere großartigsten Gemälde geschaffen oder unsere berühmtesten Condottieri ausgebildet wurden, haben wir unsere Ambitionen bereits in Wasser und Stein verkünde. Die von Nicola und Giovanni Pisano geschaffene #italic Fontana Maggiore#! erhebt sich im Herzen von Perugia und ist ein Beweis dafür, dass keine Stadt in Mittelitalien reicher, stolzer oder fähiger war. Der Brunnen, der von einem neuen Aquädukt gespeist wird, das die gesamte Gemeinde finanziert hat, ist Heiligtum, Handelsware und klassische Tugend in einem einzigen Denkmal vereint und drückte in Marmor aus, was keine Satzung so gut hätte ausdrücken können. Dieser Ausdruck städtischer Identität zieht Pilger und Händler an und festigt unseren Einfluss auf die Straßen, die sie bevölkern."
 spl_duchy_of_spoleto: "Herzogtum Spoleto"
 spl_duchy_of_spoleto_desc: "Wir sind die Erben des großen #italic Herzogtums Spoleto#!, jenes lombardischen Herrschaftsgebiets, das sich einst von Umbrien bis an die Grenzen von Mezzogiorno erstreckte. Während andere Gemeinden ihre kriegerischen Wurzeln vergaßen, hielten wir die Tradition der Garnisonen in jedem Turm auf den Hügeln und in jeder Burg unserer Ländereien am Leben. Die Erinnerung an diese weitreichende territoriale Macht prägt die Sichtweise unseres Adels hinsichtlich der Verteidigung und die unserer Bauern hinsichtlich ihrer Pflicht. So entsteht ein Gesellschaftsvertrag, der auf der Verteidigung durch Höhenlage und Steinbauwerke beruht. Das Erbe der dezentralen Befestigungsanlagen und die soldatische Kultur verliehen unseren Armeen eine Disziplin und unserem Territorium eine Widerstandsfähigkeit, mit denen kein anderer Stadtstaat, der allein auf Handel aufgebaut ist, mithalten kann."
 pap_the_word_of_the_lord: "Das Wort des Herrn"
 pap_the_word_of_the_lord_desc: "Wenn das Papsttum in Glaubens- oder Regierungsfragen vermittelt, so spricht es mit einer Autorität, die keinem anderen weltlichen Herrscher zusteht. Es spricht mit göttlichem Mandat, durch die #italic Bulla Papalis#! ausgedrückt, einer feierlichen Erklärung, die in allen katholischen Höfen Europas das Gewicht der Heiligen Schrift selbst trägt. Wir stützen uns auf eine Rechtstradition, die bis zur Übertragung der Reichsautorität selbst zurückreicht und uns nicht nur das Ansehen als Stellvertreter Gottes verleiht, sondern auch das Recht, in weltliche Angelegenheiten einzugreifen, Kriege zu sanktionieren und die Mächtigen vor einem höheren Gericht zur Rechenschaft zu ziehen, als es jeder König zu tun vermag. Diese Stellung als Stimme des Glaubens und Schiedsrichter in Rechtsfragen sorgt dafür, dass sich Verbündete schneller versammeln und Rivalen länger zögern, als sie es bei einer rein weltlichen Macht tun würden."
 pea_scuola_del_perugino: "Schule von Perugino"
 pea_scuola_del_perugino_desc: "Pietro Vannucci, der #italic Perugino#!, errichtete innerhalb unserer Stadtmauern die angesehenste Werkstatt Umbriens, und seine Schüler trugen die Anmut des umbrischen Stils nach ganz Italien. Sogar Raffael kam hierher, um an seiner Seite zu lernen, bevor Rom den größten Meister der Geschichte für sich beanspruchte. Die Stadt, die den Lehrmeister von Raffael hervorbrachte, genießt einen künstlerischen Ruf, den keiner unserer Rivalen in der Region so leichtfertig ignorieren kann. Diese Tradition der Werkstattlehre und der intensiven Ausbildung zieht Maler, Kunstmäzen und einen stetigen Strom von Aufträgen an."
 spl_lippi_frescoes: "Lippi Frescoes"
 spl_lippi_frescoes_desc: "Wir luden Filippo Lippi ein, die Apsis unserer Kathedrale zu bemalen, und was er uns schenkte, waren die #italic Geschichten der Jungfrau Maria#!, einer der prächtigsten und detailliertesten Fresken des 15. Jahrhunderts, die nur sein Tod in Spoleto unvollendet ließ, wo er in der von ihm umgestalteten Kirche mit Ehren beigesetzt wurde Sein Grab in unserer Kathedrale verwandelte die einstige Mäzenatsbeziehung zu einem dauerhaften Wallfahrtsort für Gläubige und Neugierige aus ganz Italien. Sein künstlerisches Erbe festigt noch heute unseren Ruf als Glaubenszentrum und zieht Besucher aus ganz Europa an, was den intellektuellen Austausch in unserer Stadt weiter fördert."
 glory_of_rome: "Herrlichkeit Roms"
 glory_of_rome_desc: "Die großen Päpste unserer Zeit haben Künstler, Architekten und Gelehrte damit beauftragten, den Vatikan mit einer Schönheit zu erfüllen, die jede Dynastie überdauern und die Blicke Europas auf den Apostolischen Stuhl lenken soll, wodurch sie #italic Rom#! von einer mittelalterlichen Ruine in den prächtigsten christlichen Hof verwandelt haben. Wir bauen bewusst auf den Überresten des alten Reichs auf und kleiden unsere geistliche Autorität in das Prestige der weltlichen Zivilisation. Jeder Gesandte, der unsere Stadt betritt, versteht, dass unsere Wurzeln älter sind als jedes Königreich, dem er dient. Diese Investition in beständige Pracht sorgt auch dafür, dass unser Ansehen nicht mit dem Tod einzelner Päpste schwindet. Das von uns geschaffene bleibt bestehen, selbst wenn der Mann, der es in Auftrag gab, schon lange nicht mehr unter uns weilt."
 pea_the_griffin_companies: "Greifenkompanien"
 pea_the_griffin_companies_desc: "Der #italic Greif#! ziert das Wappen unserer Stadt und die Banner der Baglioni-Condottieri, die ihre Schwerter an den Höchstbietenden verkaufen und Kriege über die gesamte Länge der Halbinsel gewinnen, haben dieses Symbol in ganz Italien bekannt gemacht. Perugia bringt Soldaten hervor, wie Florenz Maler hervorbringt: in großer Zahl, von hoher Qualität und mit Führungsinstinkten, der durch jahrhundertelange Straßenkämpfe zwischen rivalisierenden Banden und saisonale Raubzüge geschärft wurden. Diese Kriegertradition stellt loyale Offiziere in unseren Dienst und Soldaten, die die Nerven behalten, wo weniger erfahrene Männer zusammenbrechen würden."
 spl_ponte_delle_torri: "Ponte delle Torri"
 spl_ponte_delle_torri_desc: "Das uralte #italic Ponte delle Torri#! ist sowohl ein römisches Aquädukt als auch eine befestigte Brücke und erstreckt sich über die gesamte Tessino-Schlucht. Es steht auf zehn mächtigen Pfeilern und erlaubt uns, den wichtigsten Durchgang der Apenninen zwischen Umbrien und den Marken zu kontrollieren. Händler, die die Berge überqueren, müssen unsere Brücke passieren, und wir haben uns nie gescheut, dieses Privileg in Form von Münzen, Informationen oder einer Ehrerbietung einzufordern. Das kolossale Bauwerk macht unsere Grenze auch zu einem natürlichen Engpass, der jeden potenziellen Angreifer dazu zwingt, die Kosten für eine Invasion genaustens abzuwägen."
 centralize_the_states: "Staatszentralisierung"
 centralize_the_states_desc: "Das Konzil von Trient hat die Glaubenslehre reformiert und die institutionellen Grenzen der Kirche genaustens festgelegt, doch der Kirchenstaat selbst ist weiterhin ein Flickenteppich aus Städten, Lordschaften und Vasallengebieten, deren Fürsten unsere Autorität als verhandelbar betrachten. Wir müssen handeln und diese Kluft schließen, indem wir die Einnahmen, Amtsvergabe und Gerichtbarkeit, die lokale Feudalherren über Generationen hinweg stillschweigend angehäuft haben, gemäß den Vorgaben der reformierten #italic Kurie#! unter die direkte Verwaltung Roms stellen. Diese Festigung der Kronmacht über unsere Territorien verschafft dem Papsttum das finanzielle und verwaltungstechnische Fundament, um die Bestrebungen der Gegenreformation zu erfüllen."
 pea_guerra_del_sale: "Guerra del Sale"
 pea_guerra_del_sale_desc: "Als der Papst ein Monopol auf Salz verhängte, nutzte die Bevölkerung alle Waffen, die sie finden konnte, um sich dagegen aufzulehnen, was den Papst dazu veranlasste, unserem Aufstand den Namen #italic Guerra delle Forche#!, zu geben, der Krieg der Heugabeln. Wir verloren diesen Krieg und erlitten eine demütigende Niederlage. Die Baglioni wurden vertrieben und die Rocca Paolina wurde direkt über ihren Palästen als steinernes Mahnzeichen der Verachtung errichtet, doch die Niederlage verhärtete sich zu etwas Beständigerem als Stolz. Das tiefsitzende Misstrauen gegenüber einer Fremdherrschaft verwandelt jeden Hügel Perugias zu einer natürlichen Festung und zeigt jedem Eroberer, dass alles, was er uns wegnimmt, mehr kosten wird, als es irgendein strategischer Vorteil rechtfertigen würde."
 spl_cardinals_bulwark: "Kardinalsbollwerk"
 spl_cardinals_bulwark_desc: "Kardinal Albornoz ließ die #italic Rocca Albornoziana#! nicht als bloße Geste errichten, sondern als eine Machterklärung, eine uneinnehmbare Festung, die jeden niederen Fürsten zwischen Rom und Perugia begreifen ließ, dass das Papsttum voller Entschlossenheit zurückgekehrt war und Spoleto als sein stärkstes Werkzeug in Mittelitalien dient. Wir haben nicht nur das Bauwerk geerbt, sondern auch die institutionelle Rolle, die es verkörpert und unseren Kirchensitz trotz der Umwälzungen der Reformation bewahren können. Diese Verbindung aus militärischer Stärke und konfessioneller Geschlossenheit eint unsere Bevölkerung und macht das Bürgertum seiner bürgerlichen Pflichten bewusst und unsere Mauern widerstandsfähig gegen Ketzerei und Unruhen, die weniger gut regierte Gebiete heimsuchen."
 ecclesiastical_primacy: "Vorrang der Kirche"
 ecclesiastical_primacy_desc: "Der Westfälische Frieden hat uns aus der Fürstendiplomatie ausgeschlossen, doch er hat nicht die Frage geklärt, wer innerhalb jedes katholischen Königreichs für die katholische Kirche sprechen wird. Diese Frage wird nun von jenen, die die Kirche zu einem Organ der Krone machen wollen, mit äußerster Dringlichkeit vorangetrieben. Unser Vorrang vor den Bischöfen Frankreichs, Deutschlands und Österreichs darf keine bloße Formalität sein, sondern muss in Glaubens- und Kirchenfragen uneingeschränkt gelten. Daher verurteilen wir die Lehren des #italic Gallikanismus#! und fordern von allen Geistlichen, Rechenschaft abzulegen und ihre Loyalität nicht über die Autorität Roms zu stellen. Diese Bekräftigung des ausschließlichen Rechts des Papstes, die katholische Lehre zu definieren, wird unentschlossene Kirchen wieder zurück unter die Orthodoxie des Heiligen Stuhls bringen und den stetigen Fluss des Zehnt und der kirchlichen Einkünfte wieder herstellen, die Staatsoberhäupter so gewillt in ihre eigenen Taschen haben fließen lassen."
 pea_umbrian_academies: "Umbrische Akademien"
 pea_umbrian_academies_desc: "Die #italic Accademia del Disegno#! und ihre Gelehrtengesellschaften bewahrten unsere intellektuelle und künstlerische Kultur aufrecht, selbst nachdem wir unsere politische Unabhängigkeit an den Kirchenstaat verloren, indem sie Verwalter, Theoretiker und Künstler ausbildeten, die in Institutionen weit über unsere eigenen Grenzen hinaus tätig waren. Jede Großmacht auf der Halbinsel möchte die zuverlässigen Absolventen aus Perugia in ihren Dienst stellen und diese Nachfrage ließ unsere Akademien florieren, selbst als unser politischer Einfluss schwand. Diese Tradition der praxisorientierten Gelehrtenkultur erleichtert die Regierungsführung und stellt sicher, dass unsere Stadt in den wichtigen Räten ein Mitspracherecht hat, dass weit über unsere eigentliche politische Bedeutung hinausgeht."
 spl_the_spoletine_silk: "Spoletinische Seide"
 spl_the_spoletine_silk_desc: "Die Maulbeerhaine unseres Tals ernähren seit Jahrhunderten die Seidenraupen, deren Fäden von den besten Webern des Kirchenstaats verarbeitet werden. Die daraus gewonnene #italic Spoletinische Seide#! findet sowohl bei den Altären Roms als auch den Gewändern auf den Höfen von Frankreich und der Habsburgern Verwendung. Der Handel damit hat ein wohlhabendes Bürgertum hervorgebracht, das über genügend Wohlstand verfügt, um die nächste Generation auszubilden, und über genügend politischen Weitblick, um die Zünfte bei einem Wechsel des päpstlichen Statthalters funktionsfähig zu halten. Diese traditionelle luxuriöse Handwerkskunst ist in ganz Europe gefragt. Sie füllt unsere Schatzkammern und trägt die kaufmännische Mittelschicht, die das Fundament unseres Friedens bildet."
 pap_the_concordat: "Konkordat-System"
 pap_the_concordat_desc: "Die durch Revolutionen und Kriege herbeigeführten politischen Umwälzungen haben den Großteil unserer weltlichen Macht gekostet, doch das grundlegende Bedürfnis der Staaten nach religiöser Legitimation hat nicht nachgelassen. Diesen Bedarf nach Glauben nutzen wir in unseren formellen Verträgen, die wir #italic Konkordate#! nennen. Wir verhandeln mit jeder souveränen Macht einzeln und tauschen ein gewisses Maß an Unabhängigkeit in Verwaltungsangelegenheiten gegen die rechtlich verbindliche Anerkennung kirchlicher Rechte, den Schutz unsere Priesterseminare und die formell anerkannte Stellung des katholischen Klerus innerhalb ihrer Grenzen ein. Dieses System der bilateralen Abkommen verwandelt jeden katholischen Staat von einem potenziellen Feind zu einem vertraglich gebundenen Partner und verschafft uns eine diplomatische Reichweite, die keine Armee hätte sichern können."
 pea_the_old_university: "Die alte Universität"
 pea_the_old_university_desc: "Als Italien von der Revolution erfasst wurde, reagierte unsere altehrwürdige Universität nicht mit einem Rückzug zu den alten mittelalterlichen Privilegien, sondern öffnete ihre Türen für die Söhne von Kaufleuten und Handwerkern, die die neue Politik vorantreiben sollten. Die Fakultät der #italic Università degli Studi di Perugia#! brachte die Juristen und Pamphletisten hervor, die das Risorgimento in Umbrien einläuteten und die Bildung zu einem Motor des gesellschaftlichen Wandels machten. Die Fähigkeit, Wissen in Organisation zu verwandeln, sorgt dafür, dass wir bei Reformen stets auf gebildeten Männern zurückgreifen können, die sie umzusetzen vermachen."
 spl_vale_of_spoleto: "Das Tal von Spoleto"
 spl_vale_of_spoleto_desc: "Das weite, von Hügeln umschlossene Tal ernährt unser Volk bereits seit der Antike und stellt die materielle Grundlage unseres Wohlstands sicher. Wir haben die Zeit der Revolution genutzt, um Entwässerungskanäle zu errichten, für eine systematische Fruchtfolge zu sorgen und die Grenzertragsflächen in produktive Bewirtschaftungsflächen umzuwandeln, was uns selbst durch eine wirtschaftliche Krise bringen wird, die weniger gut vorbereitete Staaten nicht auffangen können. Das #italic Tal von Spoleto#! versorgt unsere Stadt, beliefert unsere Märkte mit Überschüssen und legt die Grundlage für den industriellen Aufschwung. Sorgfältig gepflegt und sinnvoll verbessert bringt uns die Ernte selbst durch Krisen, die jene unserer Nachbarn dem Untergang weihen, die ihre Mittel für weniger Nachhaltige Vorhaben aufgewendet haben."
 #Neapolitan Shared
 mercantile_spirit: "Merkantile Ausrichtung"
 mercantile_spirit_desc: "Das Königreich Neapel hat sich, inspiriert von der einflussreichen Handelsrepublik Amalfi, gänzlich dem Handel verschrieben. Strategische Häfen, darunter auch Neapel selbst, dienen als wichtige Handelszentren und verbinden das Königreich mit fernen Ländern. Unsere Handelsbeziehungen fördern den wirtschaftlichen Wohlstand sowie den Austausch von Waren und Ideen."
 consolidate_the_royal_domain: "Königliche Domäne"
 consolidate_the_royal_domain_desc: "Wir haben ein reiches Land geerbt, werden aber durch altertümliche Gesetze und Bräuche vom Wohlstand ferngehalten. Vorherige Herrscher haben sichergestellt, noble Abstammung und Reichtum zu harmonisieren, und nun liegt es an uns, die Vorschriften auf den neusten Stand zu bringen. Durch die Stärkung feudaler Höfe und die Konsolidierung von Landbesitz im Reichsgebiet schaffen wir eine klarere Rechtshierarchie. Im Land der Krone und der Bürger werden wir die Städte als Zentrum der Macht stärken und das Wachstum von Handel und Kunsthandwerk fördern."
 crush_the_barons: "Keine Macht für Barone"
 crush_the_barons_desc: "Barone üben noch immer ein gewisses Maß an Macht über die ländlichen Regionen Neapels aus. Wenn wir unser Königreich weiter zentralisieren und eine Verschwörung verhindern wollen, müssen wir diese Barone ihrer Macht berauben."
 city_of_artists: "Stadt der Künstler"
 city_of_artists_desc: "Indem wir zum Kunstmäzen der weltbesten Künstler werden, kann jeder die Herrlichkeit unserer Stadt bewundern. Jeder wird die Größe unserer Maler, Dichter, Sänger und Schauspieler bestaunen können. Lasst die neapolitanische Kultur der Maßstab sein, an dem andere Kunstzentren gemessen werden."
 a_central_power: "Zentralmacht des Mittelmeers"
 a_central_power_desc: "Unsere vorteilhafte zentrale Lage im Mittelmeer gibt uns mühelosen Zugang zu jeder Küste. Wir müssen diesen Vorteil nutzen, um Bündnisse zu schmieden, neue Freundschaften zu knüpfen und unsere Grenzen zu erweitern. Wir müssen das Meer als Tor für unser Wachstum und unseren Wohlstand nutzen. Alles in unserem Streben nach Einfluss und Sicherheit."
 neapolitan_army_reforms: "Neapolitanische Armeereformen"
 neapolitan_army_reforms_desc: "Unsere Nation muss umfassende Militärreformen durchführen und die Armee modernisieren, um die neuen Herausforderungen auf den Schlachtfeldern zu meistern. Diese Reformen müssen darauf abzielen, neue Militärtaktiken zu fördern, die Kommandostruktur zu straffen und die Ausbildungsprogramme zu verbessern. Alles, damit wir zur größten Macht in unserer Region aufsteigen können."
 #Neapolitan Unique
 university_naples: "Universität Neapel"
 university_naples_desc: "Die im Jahr 1224 durch Kaiser Friedrich II. gegründete Universität Neapel ist eine der ältesten öffentlichen Institutionen Italiens. Mit ihrer weltlichen Ausrichtung hat sie Generationen von Studenten eine umfassende Ausbildung vermittelt und zu Fortschritten in verschiedenen Bereichen beigetragen."
 academia_pontaniana: "Accademia Pontaniana"
 academia_pontaniana_desc: "Lange Zeit bemühte sich Neapel, ein Zentrum der modernen Bildung zu sein, indem es die klügsten Köpfe unserer Zeit anzog und das Licht der Renaissance verbreitete. Unter der Leitung von Giovanni Pontano erhielten diese Diskussionskreise Struktur und Organisation. Es ist nur passend, dass wir die Akademie nach ihrem fleißigen Oberhaupt benennen."
 encouraged_city_living: "Ein Leben in der Stadt"
 encouraged_city_living_desc: "Wir haben von unseren Vorfahren eine wunderbare Stadt geerbt. Wir müssen diese Metropole des Mittelmeeres weiter verschönern und ausbauen, damit sie auch in Zukunft wachsen und gedeihen kann. Wir können uns nicht damit begnügen, nur den Hafen und die Gebäude zu reparieren und zu pflegen. Wir müssen sicherstellen, dass wir mehr Menschen durch den Bau von Aquädukten, eine Entwässerung der Feuchtgebiete und durch die Verlegung von Straßen verpflegen können."
 expanded_arsenale: "Erweiterung des Arsenals"
 expanded_arsenale_desc: "Seit dem 14. Jahrhundert ist das Arsenal von Neapel das Zentrum unserer Schiffsfertigung und unsere Hauptmarineinstallation. Das Arsenal muss erweitert und modernisiert werden, um mit den feindlichen Flotten im Mittelmeer mithalten zu können. Wir sollten sowohl die maritime Seite als auch die Marine unseres Hafens ausbauen und ein effizienteres Arsenal schaffen, um eine größere und stärkere Flotte unterhalten zu können."
 institutional_reorganization: "Institutionelle Umstrukturierung"
 institutional_reorganization_desc: "Durch die Abschaffung des Zentralrats und die Gründung der Real Camera di Santa Chiara werden wir wichtige Rechtsreformen im Königreich Neapel durchführen können. Laufende Projekte zielen darauf ab, die Gesetzesstrukturen neu zu organisieren, Gesetze im Codice Carolino zu konsolidieren und das Onciario Cadastre für die Steuerreform umzusetzen."
 neapolitan_industrialization: "Neapolitanische Industrialisierung"
 neapolitan_industrialization_desc: "Zu Beginn des 18. Jahrhunderts förderte das Königreich Neapel nach und nach die Industrialisierung. Schlüsselsektoren wie die Tuchindustrie, der Schiffbau und die Eisenindustrie erlebten einen Aufschwung, den Investitionen und technologische Fortschritte weiter anheizten. Die Industrialisierung wird auch in Zukunft eine wichtige Rolle spielen, wenn es darum geht, Neapel in ein Wirtschaftszentrum zu verwandeln."
 #Piedmontese Shared
 piedmontese_the_ricet: "Der Ricèt"
 piedmontese_the_ricet_desc: "Die im piemontesischen Hinterland gelegenen Dörfer entwickelten schon früh das #italic Ricetto#! (in Standarditalienisch und „Ricèt“ auf Piemontesischen), einen befestigten Bereich innerhalb des Dorfs, in dem das Getreide und der Wein der Gemeinschaft gelagert wurde und den Bewohnern in Zeiten von Krieg und Plünderung als Zufluchtsort nutzen konnten. Es handelt sich dabei um keine Adelsburg, sondern um einen Besitz der Gemeinde selbst. Dies hat der Bauernschaft erlaubt, die zahllosen Kriege in der Region zu überstehen, ohne dabei die Grundlage ihres Wohlstands dauerhaft zu zerstören."
 piedmontese_le_fere_del_piemont: "Le fere dël Piemont"
 piedmontese_le_fere_del_piemont_desc: "Die piemontesischen Städte haben in der gesamten Region große Handelsmessen gefördert. Durch staatlichen Schutz und Steuerbefreiungen für Händler verwandelte der Staat die Alpenpässe zu Korridoren des Reichtums. Dieser Wohlstand wiederum kann dafür genutzt werden, uns die Loyalität unabhängiger Fürsten zu sichern."
 piedmontese_the_piassafort: "Das Piassafòrt"
 piedmontese_the_piassafort_desc: "Als Tor von Italien müssen wir damit beginnen, unsere Städte zu #italic Piassafòrt#! (Festungsstädte) auszubauen. Wir müssen uns an die ständige Bedrohung gewöhnen, und Artillerie und Garnisonen in die Stadtplanung einbeziehen. Diese bauliche Meisterleistung wird Piemont zur am schwersten zu erobernden Region Italiens machen und fremde Mächte dazu zwingen, zu verhandeln, anstatt eine Invasion zu beginnen."
 piedmontese_the_nebbiolo_vigne: "Nebbiolo-Weinberge"
 piedmontese_the_nebbiolo_vigne_desc: "Der Weinanbau in unserer Region reicht bis in die Antike zurück, doch dank neuer wissenschaftlicher Methoden können wir ihn noch weiter verbessern. Durch die Modernisierung und Standardisierung des Weinanbaus und der Einführung neuer Regulierungen für die Herstellung der hochwertigen Nebbiolo-Weine, kann sich der Staat ein Luxusgut sichern, das bei der Ausfuhr hohe Gewinne abwirft. Diese Maßnahmen werden der Staatskasse stabile Einnahmen verschaffen, die von den Schwankungen des Getreidemarktes weitgehend unabhängig sind."
 piedmontese_the_canal: "Kanalbau"
 piedmontese_the_canal_desc: "Unsere Regierung finanziert ein gewaltiges Projekt, um unsere wichtigsten Flüsse Po, Dora und Sesia zu zähmen. Durch den Bau eines komplexen Netzwerks aus Steinkanälen und Schleusen verwandeln wir die Überschwemmungsgebiete und ausgedehnten Sumpfgebiete in die ertragreichsten Reis- und Getreidefelder Südeuropas. Dies sichert der Region einen enormen, verlässlichen Nahrungsmittelüberschuss, wodurch die Bevölkerung wachsen und eine stehende Armee unterhalten kann, die nicht von Getreideeinfuhren aus dem Ausland abhängig ist."
 piedmontese_the_setajoj: "Setajòj"
 piedmontese_the_setajoj_desc: "Die riesigen Seidenfabriken (Filatoi), in denen moderne hydraulische Maschinen zum Einsatz kommen, machen Piemont zur Seidenhauptstadt Europas und in unseren Städten blüht eine frühe Industriekultur auf, in der eine neue Klasse von Handwerkern und Kaufleuten entsteht. Investitionen verschaffen der Region das nötige Kapital, um eine moderne Infrastruktur und militärische Modernisierungen zu finanzieren, wodurch die piemontesische Wirtschaft direkt mit dem Weltmarkt verbunden wird."
 #Piedmontese Unique
 mfa_the_paleologue_dynasty: "Palaiologen-Dynastie"
 mfa_the_paleologue_dynasty_desc: "Die ehrwürdige Abstammung von den #italic Palaiologen#! verleiht unserem Markgrafentum eine Würde und Legitimität, die selbst an den bedeutendsten Höfen Europas Anerkennung findet. Unsere Blutlinie verbindet uns mit einer Welt der höfischen Kultur und diplomatischen Traditionen, die den meisten kleineren Staaten verschlossen bleibt. Wir tragen dieses Erbe nicht nur zur Zierde, sondern auch als Schild und setzen es ein, um uns Türen zu öffnen, die sich mit militärischer Macht allein niemals erschließen ließen."
 pie_ordinanza_piedmontese: "Piemontesische Verordnung"
 pie_ordinanza_piedmontese_desc: "Seit Generationen heben die Fürsten in unseren Bergen jahreszeitenabhängig Truppen aus. Sie riefen Männer nach der Ernte zu den Waffen und schickten sie vor dem ersten Schnee wieder nach Hause. Wir haben diese lose Tradition durch eine formelle Verordnung ersetzt, die die Stärke, die Ausrüstung und die Ausbildungsstandards unserer Infanterie festlegt und unseren Städten und den Landfürsten eine einheitliche Pflicht auferlegt, auf die wir jederzeit zurückgreifen können. Die #italic Ordinansa Piemontèisa#! (#italic Ordinanza Piemontese#! auf Standarditalienisch für „Piemontesische Verordnung“) sorgt dafür, dass sich unsere Armee aus einem professionellen Kern zusammensetzt, der auch zwischen den Feldzügen zusammenhält und die Disziplin und die Tradition des Dienstes an der Waffe fördert, die weniger gut ausgebildete Truppen niemals aufrechterhalten können."
 mfa_casale_monferrato: "Casale Monferrato"
 mfa_casale_monferrato_desc: "Wir haben #italic Casale Monferrato#!, eine Stadt, deren Handel und Handwerk unter unserem Schutz gedeihen konnte, zum Herzen unseres Staates gemacht. Die Händler und Zünfte der Stadt beleben die Straßen und füllen unsere Staatskasse und ihre Lage an den Handelswegen der Großmächte macht sie zu einem natürlichen Umschlagplatz für den Handel. Diese Stadt ist unser wertvollster Besitz und der Beweis dafür, was eine gute Regierungsführung bewirken kann."
 pie_cavalleria_piemontese: "Piemontesische Kavallerie"
 pie_cavalleria_piemontese_desc: "Die Poebene mündet in unser Herrschaftsgebiet und war seit jeher die Heimat von Reitern aus dem niederen Adel, deren Reichtum von der Qualität ihrer Pferde und dem Ruf ihrer Lanzen abhing. Wir haben diese verstreuten Soldaten zu einer regulären Kavallerie geformt, ihre Ausrüstung vereinheitlicht und ihre Ausbildung auf koordinierte Manöver ausgerichtet, anstatt auf den individuellen Angriff, wie es früher üblich war. Diese #italic Cavalleria Piemontese#! sichert unsere Flanken, verfolgt einen versprengten Feind und kämpft in lockeren Formationen, um mit dem modernen Schlachtfeld mithalten zu können, wodurch sie unseren Armeen eine Mobilität verleiht, die Infanterie allein nicht bieten kann."
 mfa_the_court_culture: "Hofkultur"
 mfa_the_court_culture_desc: "Als Förderer der Künste zieht unser erlesener Hof Künstler, Gelehrte und Musiker aus Allerwelt an. Wir betrachten die #italic Hofkunst#! als Mittel zur Steigerung unseres Ansehens und die in unserem Land hergestellten Werke werfen unseren Namen in ein günstiges Licht. Diese Investition in die Kultur zahlt sich in Form von Ansehen aus, das ihre finanziellen Kosten bei weitem übersteigt."
 pie_via_delle_gallie: "Via delle Gallie"
 pie_via_delle_gallie_desc: "Die alte Straße, die von den Alpenpässen hinunter in die Poebene führt, wurde einst von den römischen Legionen genutzt. Heutzutage wird sie ununterbrochen von Händlern, Gesandten und Armeen genutzt, für die der piemontesische Korridor die direkteste Verbindung zwischen Italien und dem Norden darstellt. Durch Investitionen in die Instandhaltung und Sicherung dieser Straßen und durch das Errichten von Zwischenstationen und Mautstellen generieren wir verlässliche Einnahmen und sorgen dafür, dass Waren unser Gebiet schneller durchqueren als auf jeder anderen Route. Dank unserer Kontrolle über diese #italic Via d'le Gàlie#! (#italic Via delle Gallie#! in Standarditalienisch für „Straße der Gallier“) konnten wir uns zu einem unverzichtbaren Glied in der Kette des europäischen Handels entwickeln, die Kapazität unserer Märkte erhöhen und unseren Gesandten natürliche Zugangsmöglichkeiten zu den Höfen verschaffen, die auf die von uns verwalteten Straßen angewiesen sind."
 mfa_the_casale_citadel: "Casale-Zitadelle"
 mfa_the_casale_citadel_desc: "Wir haben die #italic Casale Monferrato#! in eine Festungsstadt verwandelt, deren Mauern und Bastionen zu den beeindruckendsten der gesamten Halbinsel gehören. Die tiefen Gräben und die schrägen Mauern sind darauf ausgelegt, jeder Belagerung standzuhalten und mögliche Angreifer ausbluten zu lassen, die in der Annahme kamen, die Stadt schnell einnehmen zu können. Dank dieser Befestigungsanlage ist unser Machtsitz zu einem der bedeutendsten militärischen Ziele unserer Zeit geworden: Zu kostspielig, um angegriffen zu werden, und zu wichtig, um ignoriert zu werden."
 pie_citadel_system: "Zitadellensystem"
 pie_citadel_system_desc: "Unsere neue Generation von Ingenieuren, die nach den neuesten italienischen Abhandlungen im Festungsbau ausgebildet wurde, hat jede bedeutende Stadt in unserem Herrschaftsgebiet vermessen und damit begonnen, die alten Stadtmauern in ein Netz moderner Bastionen umzuwandeln, die angewinkelt, niedrig und grade breit genug sind, um Artillerie aufzustellen, um dem Feind die Annährung zu erschweren. Indem wir diese Festungen durch Straßen und Signale miteinander verbinden, sorgen wir dafür, dass eine Garnison, die in einem Tal einer Bedrohung gegenübersteht, auf Unterstützung aus dem nächsten Tal zählen kann. Dieses #italic Sistema delle Cittadelle#! verwandelt Piemont in ein Land, das nicht so leicht überrannt werden kann und zwingt den Feind dazu, Festung für Festung einzunehmen, was selbst den entschlossensten Angreifer zögern lässt."
 mfa_the_marquisate_resilience: "Beständige Markgrafschaft"
 mfa_the_marquisate_resilience_desc: "Dank Flexibilität und gut gepflegter Freundschaften konnten wir selbst zwischen größeren Mächten überleben, ohne uns jemals gänzlich auf ein einzelnes Bündnis zu verlassen. Dank unseres Rufs der Vernunft und Vertragstreue, sind wir für jene nützlich, die uns sonst ihrem Herrschaftsgebiet einverleibt hätten. Diese #italic diplomatische Widerstandsfähigkeit#! ist unsere älteste und bewährteste Überlebensstrategie."
 pie_enlightened_court: "Aufgeklärter Hof"
 pie_enlightened_court_desc: "Die vielen Reformer, die sich an unseren Hof versammelt haben, überzeugten uns davon, dass die Aufgabe der Regierung nicht nur darin liegt, das Bestehende zu bewahren, sondern auch herauszufinden, was man verbessern kann und das Alte systematisch durch das Neue zu ersetzen. Wir haben unsere Verwaltung für Männer geöffnet, die an den Akademien und in den Forschungsgesellschaften unserer Zeit ausgebildet wurden, geben Abhandlungen zu Themen wie landwirtschaftlichen Erträgen bis hin zu Gerichtsverfahren in Auftrag und finanzieren die Ausbildung einer neuen Generation von Verwaltungsbeamten, die einen Haushaltsplan ebenso mühelos lesen können wie einen Vertrag. Dieser #italic Còrt Ëluminà#! (#italic Corte Illuminata#! auf Standarditalienisch für „Aufgeklärter Hof“) hat einen Staat geschaffen, dessen Institutionen durch die Vernunft ständig verbessert und nicht durch alte Gewohnheiten gelähmt werden. Die Regierung arbeitet schneller, die Forschung ist produktiver und unsere Untertanen sind gebildeter."
 mfa_the_monferrato_agricoltura: "Monferrato Agricoltura"
 mfa_the_monferrato_agricoltura_desc: "Die sanften Hügel und die fruchtbaren Täler unserer Markgrafschaft sorgen für reiche Ernten, die unser Volk ernähren und eine wachsende Zahl von Bauern und ländlichen Handwerkern tragen. Durch die sorgfältige Bewirtschaftung und gezielte Investitionen in unser Land haben wir den Ackerbau auf Hänge und Terrassen ausgeweitet, die einst brachlagen. Diese #italic landwirtschaftliche Umgestaltung#! zieht für das Land neue Siedler und für den Staat neue Einnahmen an."
 pie_industrial_base: "Industrielle Grundlage"
 pie_industrial_base_desc: "Indem wir die Wasserkraft unserer Gebirgsflüsse, die wachsende Zahl qualifizierter Handwerker in den Städten und die Rohstoffe aus den Voralpen bestmöglich nutzen, haben wir alle nötigen Voraussetzungen für eine frühe Industrialisierung geschaffen, mit der keine andere Region Italiens mithalten kann. Wir investieren in Wassermühlen, standardisierte Werkstätten und Kreditinstitute, damit unsere industrielle Grundlage systematisch ausgebaut wird, anstatt zufällig zu wachsen. Diese #italic Base Industriale#! schafft Einnahmen aus Tätigkeiten, die dem Staat früher verwehrt wurden und zieht Arbeitskräfte vom Land in die Städte, wodurch sowohl die Stadtbevölkerung als auch die Steuereinnahmen wachsen."
 #Rhaetian Shared
 rhaetian_the_vicinanza: "Vicinanza"
 rhaetian_the_vicinanza_desc: "Die rauen Lebensbedingungen in den Rätischen Alpen und den Dolomiten führten zur Entstehung der #italic Vicinanza#! (Nachbarschaft). Dabei handelt es sich um ein System, bei dem die Bewohner eines Tals Wälder und Hochweiden in gemeinschaftlichem Besitz halten. Diese Kultur der „Bergdemokratie“ verhindert, dass Feudalherren die lebenswichtigen Ressourcen der Berggipfel monopolisieren, und fördert einen ausgeprägten Lokalpatriotismus, der die rätoromanischen Täler zu autonomen Einheiten innerhalb größerer Reiche macht."
 rhaetian_the_tobia: "Tobià"
 rhaetian_the_tobia_desc: "Die rätoromanischen Völker nutzen seit jeher die #italic Tobià#!, eine spezielle Holzscheune, die für die Langzeitlagerung in hochgelegenen Gebieten konzipiert wurde. Diese Bauten sind oft mit Verteidigungselementen ausgestattet, um die Nahrungsvorräte der Gemeinschaft zu schützen. Sie sichern die Selbstversorgung und das Überleben unseres Volkes während einer langer Winterisolation, wenn sich die Bevölkerung in die Hochtäler zurückziehen und von den gelagerten Vorräten leben muss."
 rhaetian_the_mountain_warriors: "Gebirgskrieger"
 rhaetian_the_mountain_warriors_desc: "Die rätoromanischen Krieger erlangen dank unserer Herrschaft weltweit für ihre Beherrschung der Hellebarde und Pike in unwegsamem Gelände Bekanntheit. Diese Soldaten sind darauf spezialisiert, schwere Kavallerie in engen Schluchten aus dem Hinterhalt anzugreifen, und verwandeln Täler in tödliche Fallen. Unsere Militärkultur ist so ausgeprägt, dass unsere rätoromanischen Krieger als Söldner sehr gefragt sind. Der durch unzählige Konflikte gewonnene Reichtum und das taktische Wissen bringen sie anschließend mit in ihre heimatberge zurück."
 rhaetian_the_chanzun: "Chanzun"
 rhaetian_the_chanzun_desc: "Um unser Erbe zu festigen, ist es wichtiger denn je, dass die rätoromanischen Völker Epen (Chanzuns) und mündliche Dichtung nutzen, um ihre einzigartige Sprache und Geschichte zu bewahren. o entsteht eine Kultur der „sprachlichen Selbstbehauptung“, in der die auf dem Lateinischen beruhende Sprache der Bevölkerung eine Identität formt, die weder deutsch noch italienisch ist. Dieses kulturelle Selbstbewusstsein eint die Täler und macht sie widerstandsfähiger gegenüber äußeren Verwaltungsreformen."
 rhaetian_the_alpine_diplomacy: "Alpendiplomatie"
 rhaetian_the_alpine_diplomacy_desc: "Wir kontrollieren die strategischen Gebirgspässe der Alpen, was häufig unerwünschte Aufmerksamkeit anderer Nationen auf uns zieht. Aus diesem Spannungsumfeld geht eine besondere Schicht rätoromanischer Diplomaten hervor, mehrsprachigen Verhandlungsführer, die die Kunst beherrschen, Großmächte gegeneinander auszuspielen, um die lokale Autonomie zu wahren. Diese Kultur der risikoreichen Vermittlung stellt sicher, dass selbst unter einer Fremdbesatzung die rechtliche und gesellschaftliche Souveränität der Gemeinden durch sorgfältig formulierte Verträge bestehen bleibt."
 rhaetian_the_national_revival: "Nationale Widergeburt"
 rhaetian_the_national_revival_desc: "Unsere Gelehrten haben mit der systematischen Wiederbelebung unserer Sprachen begonnen, die lange Zeit anderen lateinischen Dialekten als „unterlegen“ galt. Unter unserer Herrschaft begründen die Gelehrten eine neue einheitliche Schriftsprache, in der sie die Geschichte unseres Volkes niederschreiben. Dies schafft eine solide Grundlage für unsere Sprache und stellt sicher, dass das rätoromanische Volk als gleichberechtigt und geachtet unter anderen modernen Staaten gilt."
 #Rhaetian Unique
 aqu_patriarchate_of_aquileia: "Das Patriarchat von Aquileia"
 aqu_patriarchate_of_aquileia_desc: "Aquileia war einst die viertgrößte Stadt des Römischen Reichs und der spätere Sitz eines Patriarchats, dessen geistliche Autorität sich über den gesamten Nordosten Italiens und die östlichen Alpen erstreckte. Das daraus erwachsene Ansehen und die überlieferten Institutionen prägten unsere Stadt noch lange, nachdem die politische Macht des Patriarchats erloschen war. Wir bauen auf diesem Erbe auf, indem wir Bildungseinrichtungen schaffen, die die historische Rolle der Stadt als Vermittler zwischen dem lateinischen Westen und dem slawischen und germanischen Osten widerspiegelt. Das #italic Patriarchat von Aquileia#! fungiert als Schnittstelle der Kulturen und der Gelehrsamkeit und verbindet Bildung mit Toleranz, die den Jahrhunderten des Zusammenlebens mit verschiedenen christlichen Glaubensrichtungen und einer gemeinsamen kirchlichen Ordnung entwachsen ist."
 aqu_amber_road: "Bernsteinstraße"
 aqu_amber_road_desc: "Lange bevor sie von den römischen Legionen genutzt wurde, verlief die Handelsroute, auf der baltischer Bernstein von den nördlichen Meeren bis zur Adria transportiert wurde, durch unser Land, was Aquileia zu einem der großen Umschlagplätze der Antike machte und eine Handelstradition begründete, die lange nach dem Untergang des Reichs, das später eine Straße auf der Route anlegte, fortbestand. Wir investieren in den Ausbau der Straßen und Tavernen entlang der Route, die unsere Stadt mit den Alpenpässen und den dahinter liegenden Handelsnetzen verbinden und stellen so sicher, dass unsere Händler die Märkte im Norden effizienter erreichen können als über jede andere Route. Diese Kontrolle über die #italic Bernsteinstraße#! vergrößert unseren diplomatischen Einfluss und macht unsere Handelswege zur bevorzugten Route für den Warenverkehr zwischen der Adria und Mitteleuropa."
 aqu_alpine_defense: "Alpenverteidigung"
 aqu_alpine_defense_desc: "Unser Territorium liegt an der Kreuzung zwischen den Julischen Alpen und der Karsthochebene, einer Landschaft, die denjenigen, die sie zu nutzen wissen, natürliche Verteidigungsvorteile bietet und sich für Armeen als tödlich erweist, die es nicht tun. Wir investieren in die Befestigung der wichtigsten Pässe und Talzugänge, bilden unsere Garnisonstruppen darin aus, das Gelände zu halten, anstatt dem Feind auf offenem Feld zu begegnen, und errichten ein Netz von Signalstationen, um sicherzustellen, dass wir nicht von einem möglichen Angriff überrascht werden. Dieses System der #italic Difesa Alpina#! macht unser Territorium zu einer der kostspieligsten Eroberungen in der Region und die zerklüftete Landschaft zu einem Verbündeten, der einen feindlichen Vorstoß zermürbt, lange bevor dieser auf unsere Truppen trifft."
 aqu_friulian_soldiery: "Friaulische Soldaten"
 aqu_friulian_soldiery_desc: "Das friaulische Hinterland hat eine lange Geschichte als Grenzregion und die Männer, die auf den Höfen und in den Marktstädten aufgewachsen sind, haben sich schon in jungen Jahren an das Leben eines Soldaten angepasst. Sie sind es gewohnt, Waffen zu tragen, kennen das Gelände und machen sich keine Illusionen daraus, was mit denen geschieht, die sich an einer Grenze nicht verteidigen können. Indem wir diese #italic Milizia Friulana#! organisieren, ausrüsten und ausbilden und diesen erfahrenen Männern die nötige Disziplin und Führung vermitteln, verwandelt wir ihre individuelle Standhaftigkeit in eine verlässliche Infanterie, die für ihr eigenes Land kämpft und Stellungen mit einer Hartnäckigkeit verteidigt, die Söldnerverbände selten erreichen."
 aqu_patriarchal_legacy: "Patriarchales Vermächtnis"
 aqu_patriarchal_legacy_desc: "Die Patriarchen von Aquileia herrschten jahrhundertelang über ein Gebiet, das sich von der Adriaküste bis zu den Alpenpässen erstreckte, und kümmerten sich dabei gleichzeitig um das Kirchenrecht, zivilrechtliche Streitigkeiten und die diplomatischen Beziehungen zu weltlichen Mächten. Diese Verwaltungserfahrung hat sich in unseren Institutionen fest verankerte, lange nachdem Venedig das Patriarchat für sich beansprucht hat. Wir bauen auf diesem Erbe auf, um unsere eigenen Verwaltungsstrukturen zu optimieren und wenden das Wissen, ein weitaus größeres und komplexeres Gebiet zu regieren, auf die überschaubarere Größe unseres heutigen Staates an. Dieses #italic patriarchalische Vermächtnis#! und seine ausgefeilte Verwaltung stärken das Kabinett und festigen die Gesetzgebung, was unserem Staat Regierungskapazitäten verlieht, die weit über die eigentliche Größe unseres Staates hinausgehen."
 aqu_enlightened_patriarchate: "Aufgeklärtes Patriarchat"
 aqu_enlightened_patriarchate_desc: "Die Erinnerung an Aquileia als Bindeglied zwischen West und Ost, der römischen und slawischen Welt, sowie der lateinischen und der germanischen Kultur, hat unseren Institutionen eine instinktive Offenheit gegenüber Ideen von außen verliehen, die für homogenere Staaten oft schwer zu erreichen ist. Wir knüpfen an diese Tradition an, indem wir die Gelehrten und Verwalter, die die Aufklärung hervorgebracht hat, in unsere Regierungsinstitutionen aufnehmen und unsere Gesetze nach denselben Prinzipien der Vernunft und Beweismittelpflicht reformieren, die das Patriarchat einst auf das kanonische Recht angewandt hat. Unser #italic aufgeklärtes Patriarchat#! hat den Ruf, ein Ort zu sein, an dem Ideen ernst genommen werden und Institutionen aufrichtig offen für Verbesserungen sind. Dies zieht Gelehrte und fähige Verwalter in unsere Städte, was jede von uns angestrebte Reform beschleunigt."
 #Romagnol Shared
 romagnol_al_teri_dlesarchet: "Al Téri dl'Esarchét"
 romagnol_al_teri_dlesarchet_desc: "Romagna ist ein einzigartiges juristisches Überbleibsel des byzantinischen Exarchats von Ravenna. Im Gegensatz zu dem von den Lombarden geprägten Norden hat Romagna den Großteil des römisch-byzantinischen Verwaltungsrechts bewahrt. Dies hat eine vielschichte Kultur hervorgebracht, in der selbst die kleinsten Ortschaften die alten kaiserlichen Privilegien für sich beanspruchen. Die administrative Komplexität macht es für große Reiche zu einem Albtraum, die Region effizient zu zentralisieren, da jedes Tal durch ein Geflecht aus römischen Ausnahmeregelungen und lokalen Gesetzen geschützt ist."
 romagnol_mura_malatestiani: "Mura Malatestiani"
 romagnol_mura_malatestiani_desc: "Die zwischen dem Kirchenstaat und Venedig eingekesselten Städte Romagnas verfügen über eine experimentierfreudige Verteidigungsarchitektur. Die Region war Vorreiter im Einsatz der #italic Roca#! (#italic Rocca#! auf Standarditalienisch für „Festung“), einer Festung mit rundlichen Türmen, die das Feuer primitiver Kanonen ablenken. Dank dieser Befestigungsanlagen ist jedes Dorf ein taktischer Stützpunkt, der den Angreifer zu einer langsamen, zermürbenden Belagerung zwingt, wodurch die kleinen romagnolischen Staaten in der Machtpolitik des Mittelmeerraums weit über ihre Verhältnisse mitspielen können."
 romagnol_the_sangiovese_viticulture: "Sangiovese-Weinbau"
 romagnol_the_sangiovese_viticulture_desc: "Auf den Hügeln Romagnas gedeiht die Sangiovese-Rebe. Bei der Ernte geht es jedoch um mehr als nur die Landwirtschaft. Aus ihr wird der „Wein der Krieger“ gewonnen, ein kräftiges und gehaltvolles Getränk. Durch die Festlegung einheitlicher Standards für den Weinanbau und die Kelterung können wir sowohl unsere Infanterie mit einem haltbaren und nahrhaften Erzeugnis versorgen und gewinnen gleichzeitig eine wertvolle Handelsware, die wir in andere Länder ausführen können. Dies bindet die Bauern des Apennins enger in die städtischen Märkte ein und festigt ihre Loyalität durch Wohlstand."
 romagnol_the_stampa_dpopul: "Stampa d'Popul"
 romagnol_the_stampa_dpopul_desc: "Wir entwickeln Romagna zu einem Zentrum für den Druck von Flugblättern im lokalen Dialekt, um Nachrichten, Prophezeiungen und Volkslieder auch an die ländliche Bevölkerung weiterzugeben. Diese Alphabetisierungsbemühung sorgt dafür, dass der Staat neue Verordnungen schnell und effektiv kommunizieren kann, wodurch eine gut informierte und politisch aktive Bevölkerung entsteht."
 romagnol_the_agricultural_academies: "Landwirtschaftsakademien"
 romagnol_the_agricultural_academies_desc: "Wir folgen dem Trend des Spätbarocks und gründen in jeder größeren Stadt eine #italic Académia#!, deren Schwerpunkt auf der Steigerung der landwirtschaftlichen Erträge liegt. Zu den Hauptaufgaben dieser wissenschaftlichen Gesellschaften wird die Entwässerung der #italic Vâli#! (Sümpfe) und die Züchtung krankheitsresistenter Rebsorten gehören. Diese Agrarprojekte werden die Region in ein Versuchsgut verwandeln, das Ernteüberschüsse hervorbringt, die regionale Manufakturen versorgen und vom Staat als hochwertige Handelswaren auf den Märkten der Adria angeboten werden können."
 romagnol_la_streda_rumegna: "La Strêda Rumêgna"
 romagnol_la_streda_rumegna_desc: "Der Staat und die lokalen Gemeinden werden gemeinsam die alte Küstenstraße Via Romea modernisieren. Durch den Bau neuer Steinbrücken und Entwässerungssysteme wird die romagnolische Küste wieder mit den Märkten Venedigs und des Kirchenstaates verbunden und isolierte Fischerdörfer werden zu bedeutenden Umschlagplätzen, die den Transport romagnolischer Agrarprodukte erleichtern und die strategische Mobilität gewährleisten, die für künftige Kriege erforderlich sein könnten."
 #Romagnol Unique
 rav_the_pineda_di_classe: "Pineda di Classe"
 rav_the_pineda_di_classe_desc: "Die an der Adriaküste liegenden weitläufigen Kiefernwälder (Pinedi) fungieren als strategisches Staatsvermögen. Unsere Bevölkerung verfolgt eine Kultur der Forstwirtschaft und der Salzgewinnung, indem sie Holz für den Schiffbau abforstet und die weitläufigen Salinen von Cervia bewirtschaftet. Durch die Stärkung dieser Traditionen entsteht eine nicht auf der Landwirtschaft basierte Einnahmequelle, die gegen Ernteausfälle immun ist und uns das nötige Kapital verschafft, möglichen Krisen entgegenzuwirken."
 urb_the_montefeltro_seignory: "Montefeltro Seignory"
 urb_the_montefeltro_seignory_desc: "Wir herrschen über unsere Bergstädte und Täler als Feudalherren und unsere Autorität beruht auf einer uralten Tradition. Unser Volk weiß, dass die #italic Montefeltro#! ihr Land und ihre Bräuche stets verteidigen und diese Treue hat ein Band zwischen Herrscher und Untertanen geknüpft, das stärker ist als jedes Dekret. Wir herrschen nicht einfach über ein bestimmtes Gebiet, sondern haben einen Pakt geschlossen, den beide Seiten ehren wollen."
 rav_mosaics_of_ravenna: "Mosaik aus Ravenna"
 rav_mosaics_of_ravenna_desc: "Keine Stadt in der westlichen Welt versteht sich in der Kunst des #italic Mosaiks#! so gut wie wir. Unsere Basiliken und Mausoleen sind mit Mosaiksteinen verkleidet, die in Gold und tiefem Blau leuchten und die Bilder, die auf dem Mosaik abgebildet sind, haben Jahrhunderte voller Kriege und Vernachlässigung überstanden, ohne an Ausdrucksstärke zu verlieren. Gelehrte, Pilger und Künstler kommen in unser Land, um zu ergründen, wie die alte Welt aussah, bevor sie verloren ging. Die außergewöhnliche Handwerkskunst bereichert unser kulturelles Erbe und verleiht unserem Staat ein Ansehen, das keiner unserer Rivalen ohne Weiteres nachahmen kann."
 urb_the_hill_fortresses: "Hügelfestungen"
 urb_the_hill_fortresses_desc: "Die Bergspitzen unseres Herrschaftsgebiets wurden über viele Generationen hinweg befestigt, wodurch jede höher gelegene Stadt zu einer Festung geworden ist, deren Einnahme eine entschlossene Armee Wochen kosten wird. Unsere Soldaten erlernen ihr Handwerk auf den steilen Anhöhen und verteidigen Stellungen, von denen aus kleinere Garnisonen einen weitaus größeren Feind abwehren können. Das Netzwerk an #italic Bergfestungen#! ist sowohl ein Schild als auch eine Schule, in der unsere militärische Tradition gepflegt wird."
 rav_battle_of_ravenna: "Schlacht von Ravenna"
 rav_battle_of_ravenna_desc: "Ravenna ist ein begehrtes Ziel und auf den Feldern vor unseren Mauern wurden häufig Schlachten ausgetragen, die unseren Namen zum Inbegriff für die härtesten Kriege in Italien gemacht haben. Wir knüpfen an dieses düstere Erbe an, indem wir in Befestigungsanlagen und Disziplin investieren. Dies erschwert es dem Feind, unsere Soldaten zu vertreiben und die Stadt einzunehmen."
 urb_the_ideal_court: "Der ideale Hof"
 urb_the_ideal_court_desc: "Unser Hof gilt als der am besten geordnete in ganz Italien, und sowohl Gelehrte als auch Künstler kommen von weit her, um am Hofleben teilzuhaben. Die Gespräche, Darbietungen und Kunstwerke, die hier gepflegt und geschaffen wurden, erwecken eine Vorstellung davon, wie ein #italic perfekter Hof#! aussehen könnte, und hat unseren Ruf weit über unsere Grenzen hinausgetragen. Diese Verfeinerung der Staatsführung und Kultur ist das Größte, was wir geschaffen haben."
 rav_byzantine_legacy: "Byzantinisches Erbe"
 rav_byzantine_legacy_desc: "Unsere Stadt ist das lebendige Archiv einer Zivilisation, die fast gänzlich verschwunden ist. Die mit Blattgold verzierten Apsiden, die kunstvolle Steinmetzarbeit und die ikonografische Tradition der #italic byzantinischen#! Welt sind hier in einer so starken Konzentration zu finden, wie sonst nirgendwo im Westen. Künstler und Kunstmäzen kommen her, um diese Werke zu studieren und tragen ihren Einfluss in die Welt hinaus, um den Ruf unserer Werkstätten in der Welt zu verbreiten. Dank der Bewahrung dieses einzigartigen Erbes besitzt unsere Vergangenheit einen hohen kulturellen und wirtschaftlichen Wert."
 urb_the_mathematical_school: "Mathematikschule"
 urb_the_mathematical_school_desc: "Wir begründeten eine Tradition der mathematischen und philosophischen Forschung, die unsere Stadt in ganz Europa bekannt gemacht hat. Die Übersetzungen, Kommentare und Originalwerke unserer #italic Mathematikschule#! hat die Wissenschaften vorangetrieben und uns die Bewunderung der renommiertesten Universitäten eingebracht. Dieses Bekenntnis zur Bildung schärft den Verstand unserer Bürger und unsere Fähigkeit, die Welt zu verstehen und zu gestalten."
 rav_bonifiche_ravennati: "Entwässerung Ravennas"
 rav_bonifiche_ravennati_desc: "Die Sümpfe und Lagunen, die unsere Stadt umgeben, bieten uns zwar Schutz, sind aber auch eine Last. Sie schützen uns vor Armeen, überschwemmen jedoch unsere Felder und sind Brutstätten für Krankheiten. Wir werden die Sümpfe systematisch entwässern, indem wir Kanäle graben und Deiche aufschütten, um das Wasser zurückzuhalten und dem Sumpf neues Ackerland abzugewinnen. Diese Umwandlung der Feuchtgebiete in produktives Land wird unsere wachsende Bevölkerung ernähren und die Besteuerungsgrundlage des Staates erhöhen."
 urb_the_ceramics_guilds: "Keramikzünfte"
 urb_the_ceramics_guilds_desc: "Die Töpfer und Maler unserer Stadt haben eine lange Tradition der zinnglasierten #italic Majolika#! (Keramik) und die leuchtenden Farben und detailreiche Darstellungen werden von Sammlern und an Höfen auf dem gesamten Kontinent begehrt. Unsere Töpferzünfte geben die Techniken von Generation zu Generation weiter, um sicherzustellen, dass die Qualität, auf dem unser Ruf aufgebaut wurde, bewahrt wird. Jeder bemalte Teller und jedes verzierte Gefäß, das unsere Werkstätten verlässt, trägt unsere Kultur in die Welt hinaus."
 rav_the_new_ravenna: "Das neue Ravenna"
 rav_the_new_ravenna_desc: "Nach jahrzehntelanger Stagnation investieren wir in die Erneuerung unserer Stadt. Wir sanieren alte Stadtviertel, bauen neue Straßen und Marktplätze und bieten Handwerkern und Händlern, die sich innerhalb unserer Stadtmauern niederlassen, neue Anreize. Das Ergebnis ist eine Stadt, die offener und wohlhabender ist und das Wachstum eines reformierten Staats besser auffangen kann. Dank der neuen Investitionen ist Ravenna zu einem Ort geworden, an dem die Menschen gerne verharren."
 urb_the_enlightened_university: "Aufgeklärte Universität"
 urb_the_enlightened_university_desc: "Unsere Universität hat Regierungswechsel und die Umwälzungen überstanden und zieht dank ihres guten Rufs als Lehrstätte zahlreiche Studenten und Wissenschaftler in unsere Stadt. Die lange Tradition des #italic Lernens#!, die zu unseren ruhmreichsten Zeiten begründet wurde, hat sich zu einer lebendigen Institution entwickelt und trägt unsere Wissbegierde in eine neue Epoche. Diese kontinuierliche Wissenssteigerung ist unser Geschenk an die Zukunft und unsere Verbindung zum Ruhm unserer Vergangenheit."
 #Sardinian Shared
 sardinian_the_barbagia: "Barbagia"
 sardinian_the_barbagia_desc: "Die zentralen Berge (Barbagia) gelten für Eroberer aus dem Mittelmeer seit Jahrhunderten als „Land der Barbaren“. Unsere Kultur ist von der Identität der #italic S'Ard#! (Sarden) geprägt, einer abgeschiedenen Hirtenkultur, die jede Form von Besteuerung oder Wehrpflicht von außen ablehnt. Daraus entstand eine kulturelle Hochburg, in der der alte nuragische Geist der Unabhängigkeit bewahrt wird. Ein einfallender Staat mag die Küstenstädte erobern können, doch das Herz der Insel wird ihm stets verwehrt bleiben."
 sardinian_the_artizanu: "Artizanu"
 sardinian_the_artizanu_desc: "In den Städten hat sich eine eigene Zunft aus sardischen Handwerkern und Silberschmieden entwickelt, die fremdländische Ästhetik mit einheimischen Motiven verbindet. Diese Zünfte verteidigen ihre Freiheiten mit aller Kraft und geraten dabei oft in Konflikt mit den Handelsmonopolen anderer Regionalmächte. Die daraus entstandene lebendige Stadtkultur, die im Geist mediterran und in ihrer Seele sardisch geprägt ist, stellt dem Staat eine gebildete und qualifizierte Mittelschicht zur Verfügung, die den Anforderungen des Seehandels gewachsen ist."
 sardinian_the_ademprivio: "Ademprivio"
 sardinian_the_ademprivio_desc: "Die sardinische Kultur ist fest im #italic Ademprivio“#! verankert, dem Recht der Bevölkerung, die Weiden, Bäume und das Wasser des feudalen Landbesitzes zu nutzen. Trotz der Versuche, das Land zu privatisieren, haben die sardinischen Bauern ihre Tradition der „heiligen Allmende“ bewahrt. Dies verhindert, dass die ländliche Bevölkerung völlig verarmt und sorgt für ein hohes Maß an innerer Stabilität, da diese auf dem gemeinsamen Wohlstand der Hirtengemeinschaften beruht."
 sardinian_the_turres_costeras: "Torres Costeras"
 sardinian_the_turres_costeras_desc: "Im Kampf gegen die Piraterie wird unser Volk eine Reihe Küstentürme errichten. Die daraus entstehende „Küstenwache“, erlaubt ganzen Familien von der Küste in die Hügel zu flüchten, während ein ständiger Wachdienst aufrechterhalten werden kann. Diese Kultur der „Horizontüberwachung“ macht die gesamte Inselbevölkerung zu einer strategischen Ressource und stellt sicher, dass die wichtigsten Seewege des Mittelmeers ständig von einer Bevölkerung überwacht werden, für die Verteidigung ein tägliches Ritual ist."
 sardinian_the_hymnu_sardu: "Hymnu Sardu"
 sardinian_the_hymnu_sardu_desc: "Mit dem Aufkeimen eines modernen Nationalbewusstseins verwandelt sich unsere Kultur der Feudaltreue immer mehr zu einem „Patriotismus des Königreichs“. Dies äußert sich in einem Aufschwung sardinischer Literatur und politischer Pamphlete, die ein „Sardinien für die Sarden“ fordern. Diese kulturelle Bewegung hat zu einer neuen, moderneren Verwaltungsschicht für den Staat geführt, die unsere alten Feudalgesetze in eine moderne, souveräne Verfassung überführen kann."
 sardinian_the_industrial_transition: "Industrieller Wandel"
 sardinian_the_industrial_transition_desc: "Dank der Entdeckung neuer Blei- und Zinkadern erreicht unsere traditionelle Hirtenkultur langsam das Industriezeitalter. Indem wir die ersten modernen Bergwerke und Hütten errichten und sardinische Arbeiter beschäftigen, können wir ihre traditionellen Zünfte in die Moderne übertragen. Diese Bergbaukultur wird uns die Rohstoffe liefern, die für eine moderne Kriegsführung und Infrastruktur benötigt werden, und die Insel zum industriellen Machtzentrum unseres aufstrebenden Staates machen."
 #Sicilian Shared
 legacy_of_the_normans: "Erbe der Normannen"
 legacy_of_the_normans_desc: "Geschmiedet in der Esse der Eroberungen brachte die sizilianische Normannenarmee den Ansturm der normannischen Ritter mit der strategischen Raffinesse der Kriegsführung von Byzanz, Arabien und der Lombardei zusammen. Indem sie Schlachtfelder mit Wildheit und taktischer Flexibilität meisterten, schufen sie ein Königreich an diesem Knotenpunkt der Zivilisation."
 sic_naval_vigilance: "Marinewachsamkeit"
 sic_naval_vigilance_desc: "Ständige Überfälle durch Barbaresken-Korsaren und Osmanen zwangen Sizilien dazu, seine Küsten ständig zu verteidigen. Seine Galeeren und Festungen waren für den Schutz Südeuropas unverzichtbar."
 sic_sicilian_silk: "Sizilianische Seide"
 sic_sicilian_silk_desc: "Zur Zeit Friedrichs II. war Seide Siziliens wichtigste Exportware. In den vergangenen Jahrhunderten durchlitt unsere Seidenindustrie allerdings einen Niedergang und die norditalienischen Staaten überholten uns, doch es gibt keinen Grund, warum sie nicht wieder erblühen sollte. Durch Investitionen in die Seidenproduktion hauchen wir unseren Webern und Handwerkern neues Leben ein."
 sicilian_the_cult_of_the_santuzze: "Kult der Santuzze"
 sicilian_the_cult_of_the_santuzze_desc: "Die religiöse Identität Siziliens ist seit langem mit mächtigen weiblichen Schutzheiligen verbunden, von denen man glaubt, dass sie die Städte vor der Pest und Lava beschützen. Die imposanten, theatralischen Prozessionen (wie das #italic Festino of Palermo#!) dienen als Ventil für soziale Spannungen und festigen die soziale Einheit. Diese Rituale sind fest im öffentlichen Leben Siziliens verankert."
 sic_sicilian_enlightenment: "Sizialianische Aufklärung"
 sic_sicilian_enlightenment_desc: "Obwohl es weit entfernt von den großen Salons in Paris oder Wien liegt, entwickelte Sizilien eine eigene Aufklärung. Intellektuelle stellten feudale Privilegien infrage, förderten die Wissenschaft und setzten sich für Rechtsreformen ein, oft im Rahmen eines katholischen Humanismus. Diese Ideen legten den Grundstein für die Moderne im Schatten von Monarchie und Tradition."
 sic_sicilian_reforms: "Sizialianische Reformen"
 sic_sicilian_reforms_desc: "Im Lauf der Zeit sind unsere Institutionen veraltet oder einfach nur ineffizient geworden. Reformen sind notwendig, wenn wir wollen, dass unser Land gedeiht und erblüht. Unsere besten Köpfe werden Hand in Hand arbeiten, um sicherzustellen, dass es nicht zu Verschwendung kommt und die Prozesse so effizient wie möglich sind."
 #Sicilian Unique
 sic_constitions_of_melfi: "Konstitutionen von Melfi"
 sic_constitions_of_melfi_desc: "Kaiser Friedrich II., der Hohenstaufener König von $SIC$, verfasste ein Gesetzbuch für $SIC$, das als „Konstitutionen von Melfi“ oder „Liber Augustalis“ bekannt ist. Es ist auch Jahrhunderte später noch in Gebrauch und bildet die Grundlage unseres Landes, indem es das öffentliche Recht, Gerichtsverfahren sowie das Feudal-, Privat- und Strafrecht regelt."
 sic_studium_generale: "Studium generale"
 sic_studium_generale_desc: "Die Universität Catania wurde 1434 von König Alfons V. von Aragon gegründet und war die älteste Universität Siziliens und eine der wenigen süditalienischen Einrichtungen, denen der vollwertige Status eines Studium generale verliehen wurde. Aufgrund ihrer königlichen Gründungsurkunde und ihrer einzigartigen Mischung aus scholastischer und juristischer Ausbildung brachte sie Juristen, Theologen und Wissenschaftler hervor, die sowohl der Kirche als auch der Krone in einer kulturell vielfältigen Region dienten."
 sic_the_court_of_the_royal_patrimony: "Tribunal des königlichen Kronguts"
 sic_the_court_of_the_royal_patrimony_desc: "Wir richten ein Sondertribunal ein, um die königlichen Ländereien und #italic Secretias#! (Zollämter) zu verwalten. Durch die Erhebung von Ausfuhrzöllen auf Seide, Thunfisch und Getreide wird der Staat die Korruption und die „Abzweigungen“ lokaler Machthaber erheblich eindämmen. Diese strenge Verwaltungspraxis macht unsere Ländereien zu einer zuverlässigen Einnahmequelle für die Krone und finanziert unsere Kriege in ganz Italien und im Mittelmeerraum."
 sic_licentia_populandi: "Licentia Populandi"
 sic_licentia_populandi_desc: "Um die landwirtschaftlichen Erträge und Steuereinnahmen zu maximieren, erteilte der Staat dem Adel #italic Besiedlungslizenzen#!. Diese erlaubten Feudalherren, im öden Hinterland der Insel völlig neue Städte zu errichten und Bauern mit dem Versprechen von Land und niedrigeren Steuern anzulocken. Durch die Kolonisierung des wilden Hinterlands ist so ein Flickwerk aus ertragreichen landwirtschaftlichen Gemeinden geworden."
 sic_sicilian_baroque: "Sizialianischer Barock"
 sic_sicilian_baroque_desc: "Auf unserer Insel kommt es häufig zu Erdbeben, wodurch viele Gebäude einstürzen. Um diese alten Bauwerke zu ersetzen, plant der Staat eines der ehrgeizigsten Wiederaufbauprogramme der Menschheitsgeschichte auf den Weg zu bringen. Anstatt die Ruinen einfach nur wiederaufzubauen, wird die Regierung ganze Städte im erdbebensicheren Stil des #italic sizilianischen Barocks#! neu gestalten. Dies demonstriert auch, dass der Staat in der Lage ist, bei einer Katastrophe Arbeitskräfte und Kapital zu mobilisieren."
 sic_the_marsala_wine_industry: "Marsala-Wein"
 sic_the_marsala_wine_industry_desc: "Dank ausländischer Investitionen entwickelte sich der sizilianische Wein von einem lokalen Bauerngetränk zu einem angesehenen Luxusgut, der selbst lange Seereisen überstehen kann. Die Kultur des „Weinguts“ (#italic Baglio#!) wird zum neuen Symbol des sizilianischen Reichtums und der Weltgewandtheit. Sie verbindet die alten landwirtschaftlichen Traditionen der Insel mit der modernen Industrie des globalen Handels."
 #Tuscan Shared
 birthplace_of_renaissance: "Ursprung der Renaissance"
 birthplace_of_renaissance_desc: "Unsere Hingabe für die schönen Künste, die Förderung von künstlerischem Talent und unser innovatives Denken führten dazu, dass man uns als Vorreiter des kulturellen, philosophischen und wissenschaftlichen Fortschritts sieht!"
 a_land_of_banks: "Land der Banken"
 a_land_of_banks_desc: "Die $tuscany_area$ ist das Finanzzentrum von $europe$ und viele einflussreiche Finanzinstitute haben in den großen Städten einen Sitz. Das umfangreicher Handelsnetzwerk und die lukrativen Partnerschaften erlauben ihnen, ihren Einfluss über ganz $italy_region$ bis nach Nordeuropa geltend zu machen."
 tuscan_merchant_houses: "Toskanische Handelshäuser"
 tuscan_merchant_houses_desc: "Unter den großen Handelsstädten des Kontinents ist der Name unserer Händler überall dort bekannt, wo Geld gewechselt und Waren gewogen werden. Von den Wollmärkten Englands bis zu den Gewürzrouten der Levante üben unsere Handelshäuser einen Einfluss aus, dem keine Armee das Wasser reichen kann. Dieses Netz aus Handel und Kreditwesen sorgt dafür, dass unsere Stimme an den Höfen ferner Könige Gehör findet."
 tuscan_the_mezzadria: "Mezzadria"
 tuscan_the_mezzadria_desc: "Überall in den fruchtbaren Hügeln und Tälern unseres Landes sorgt die seit langer Zeit bestehende Partnerschaft zwischen Grundbesitzer und Pächter dafür, dass die Felder bewirtschaftet und die Ernten in gutem Einvernehmen geteilt werden. Die #italic Mezzadria#! ist mehr als nur eine landwirtschaftliche Vereinbarung. Sie vereint die Bauernschaft und die Händler auf sozialer Ebene, die von den Erträgen des Contado abhängig sind. Dieses Band zwischen Stadt und Land ist das Fundament, auf dem unser Wohlstand beruht."
 tuscan_literary_academies: "Toskanische Literaturakademien"
 tuscan_literary_academies_desc: "Unsere Städte haben Gesellschaften hervorgebracht, die sich gänzlich der Sprache, dem Streben nach Wissen und der Pflege bürgerlicher Tugenden verschrieben haben. Von den philologischen Untersuchungen der Literaturwissenschaftler bis hin zur Naturphilosophie der Naturwissenschaftler ziehen unsere Akademien die klügsten Köpfe unserer Zeit an. Diese Tradition der organisierten Forschung kommt auch unserer Regierungsführung und unseren Institutionen zugute, die davon profitieren."
 tuscan_enlightenment: "Toskanische Aufklärung"
 tuscan_enlightenment_desc: "Die Rationalität der Aufklärung hat in unseren Städten tiefe Wurzeln geschlagen, wo Denker und Reformer Aberglauben bekämpfen, das Recht kodifizieren und unsere Institutionen von Grund auf neu gestalten. Unsere Herrscher, wurden in dieser neuen Philosophie geschult und betrachten das Wohlergehen ihrer Untertanen sowohl als moralische Pflicht als auch als Maßstab für gute Regierungsführung. Dieses Bekenntnis zu Vernunft und Reform macht unsere Straßen, unseren Hof und unsere Hochschulen zu Vorreitern der modernen Welt."
 #Tuscan Unique
 florino_d_oro: "Fiorino d’Oro"
 florino_d_oro_desc: "Seit 1252 ist der in unseren Münzprägen geprägte goldene #italic Fiorino d'Oro#! die vertrauenswürdigste Währung in der christlichen Welt und wird von den Handelshäusern Londons bis zu den Basaren Alexandrias ohne Einschränkung akzeptiert, da das Gewicht und die Reinheit trotz der Ambitionen Duzentender Könige stets unverändert blieben. Händler, die mit dem Florentiner handeln, handeln mit unserem Ruf und jeder mit unserer Währung getätigte Tausch repräsentiert die Zuverlässigkeit der florentinischen Institutionen. Dieses allgemeine Vertrauen in unsere Währung erleichtert jede Transaktion an unseren Höfen und versorgt die Staatskasse mit Steuereinnahmen."
 luc_the_silk_republic: "Seidenrepublik"
 luc_the_silk_republic_desc: "Unsere Weber sind dafür bekannt, seit jeher die feinsten Seidenbrokat Italiens anzufertigen und unsere Webstühle haben unserer Stadt einen Wohlstand beschert, der weit über ihre Größe hinausgeht. Unsere Weberzünfte hüten die Geheimnisse des Handwerks und garantieren eine Qualität, die auf fernen Märkten hohe Preise erzielt. Die meisterhaften Stoffarbeiten verwandeln lose Fäden in die Grundlage des Reichtums unserer Republik."
 pis_maritimes_legacy: "Vermächtnis der Seerepubliken"
 pis_maritimes_legacy_desc: "Drei Jahrhunderte lang zählte $PIS$ zu den führenden Seemächten des westlichen Mittelmeers. Unsere Galeeren erreichten jeden Hafen von Sardinien bis zur Levante und unsere Siege über die Sarazenen verschafften der Stadt privilegierten Zugang zu Märkten, zu denen kleinere Mächte keinen Zugang hatten. Die Niederlage bei der Schlacht von Meloria im Jahr 1284 schwächte zwar unsere Flotte, löschte jedoch nicht aus, was jahrhundertelanger Seehandel aufgebaut hatte. Unsere Kapitäne kennen die Gewässer, unsere Händler haben Partner in jedem Hafen und die Routen, die uns groß gemacht haben, können nach wie vor von uns befahren werden. Dieses Seefahrer-Erbe verschafft unseren Händlern im westlichen Mittelmeer einen Vorteil, den keiner unserer Rivalen im Landesinneren nachahmen kann, und die Erinnerung an unsere einstige Größe treibt uns dazu, das wiederaufzubauen zu wollen, was uns genommen wurde."
 sie_artists: "Malerschule von Siena"
 sie_artists_desc: "Die Malerei ist seit Beginn der $renaissance$ in $ITA$ aufgeblüht, doch niemand kann mit der Eleganz der in $SIE$ ausgebildeten Künstler mithalten, die ihr Kunststudium in der #italic Studium Senese#!, eine der ältesten Universitäten in $europe$, abgeschlossen haben. Die sienesische Kunst ist jenseitig und raffiniert und legt den Fokus auf die Wunder, die biblische Figuren und Heilige vollbrachten. Diese Verschmelzung von Gelehrsamkeit und Kunstfertigkeit prägt die sienesische Schule und sichert ihren Ruf für die kommenden Jahrhunderte."
 florentine_school: "Florentinische Schule"
 florentine_school_desc: "Die Werkstätten von $FLO$, insbesondere die von Giotto, Brunelleschi, Masaccio, Botticelli und Leonardo haben die Malerei und Bildhauerei für eine ganze Zivilisation revolutioniert und jede Generation versucht die Grenzen dessen zu erweitert, was das menschliche Auge und die menschliche Hand mit Stein, Farbe und Bronze erreichen kann. Wenn man als Kunstmäzen in der Kunstwelt ernstgenommen werden möchte, konsultiert man zuvor immer erst einen florentinischen Meister, und wenn unsere Künstler für ihre Arbeiten das Land bereisen, repräsentieren sie den Ruf und den Namen unserer Stadt. Unsere ungebrochene künstlerische Vorreiterrolle zieht die begabtesten Talente aus ganz $ITA$ in unsere Ateliers und stellt sicher, dass die von uns geschaffenen Werke die Bewunderung – und das Gold – der anspruchsvollsten Auftraggeber der christlichen Welt auf sich ziehen."
 luc_the_towers_of_lucca: "Die Türme von Lucca"
 luc_the_towers_of_lucca_desc: "Die von unseren Adelsfamilien errichteten großen Türme ragen über die Dächer unserer Stadt empor und jeder einzelne von ihnen ist ein Ausdruck von Prestige und Macht innerhalb der Republik. Der #italic Torre Guinigi#!, dessen Dach mit Steineichen verziert ist, ist der höchste von ihnen und haben ihn zum Wahrzeichen unserer Stadt gemacht. Diese Türme erinnern alle Besucher der Stadt daran, dass unsere Stärke im Ehrgeiz und der Rivalität unserer Bürger liegt, die gelernt haben, den Stein als Mittel des Wettkampfs zu nutzen."
 pis_the_university_of_pisa: "Die Universität Pisa"
 pis_the_university_of_pisa_desc: "Unsere Universität wurde 1343 durch ein kaiserliches Statut gegründet und nach jedem politischen Umbruch wieder aufgebaut. Die Universität hat Juristen, Ärzte und Theologen hervorgebracht, die die pisanische Tradition der strenger Gelehrsamkeit in die Höfe und Kirchen Italiens und darüber hinaus trugen. Doch es ist nicht nur das Alter, das die #italic Studio Pisano#! auszeichnet, sondern auch die Arbeitsweise. Die Fakultät zog schon immer Wissenschaftler an, die Fragen den Antworten vorzogen, was zur Entstehung eine institutionellen Kultur der Neugier geführt hat. Dies bringt Absolventen hervor, die zu mehr fähig sind, als nur überlieferte Lehren auswendig zu lernen und schafft eine Tradition der aktiven Wissenschaft, die das Bildungsniveau insgesamt anhebt und dafür sorgt, dass das Wissen eine lebendige Praxis bleibt und nicht zu einer bloßen Zeremonie verkommt."
 sie_council_priori: "Priori-Rat"
 sie_council_priori_desc: "Die neun Priore unserer Republik stammen ausschließlich aus den Kaufmannszünften und dem Hochadel Sienas, deren Fehden jede vorherige Regierung zu Fall gebracht hatten. Sie haben die Verwaltung der Stadt mit einer administrativen Sorgfalt geprägt, die unsere eher aristokratisch geprägten Nachbarn niemals erreichen werden. Ihre Amtszeiten sind kurz und sie müssen öffentlich Rechenschaft ablegen, wodurch Korruption nicht so leicht unter dem Mantel der bürgerlichen Tugend verschleiert werden kann. Diese Tradition der Herrschaft durch die Händler verleiht unseren Institutionen praktische Kompetenz und eine Legitimität, die auf Handel und Zustimmung beruht und nicht auf einem Geburtsprivileg."
 florentine_citizen_militia: "Florentinische Bürgermiliz"
 florentine_citizen_militia_desc: "Machiavellis Abneigung gegen Söldnerarmeen stieß über Generationen hinweg auf taube Ohren und die Zünfte zogen es stets vor, Condottieri zu bezahlen, anstatt selbst in den Krieg zu ziehen. Doch die Katastrophen von 1494 und 1512 zeigte uns, wofür Söldner bereit sind zu sterben und wofür nicht. Damit dies nicht erneut passiert, organisieren wir die Männer der Wohnviertel in stehende Kompanien. Wir bilden sie mit öffentlichen Mitteln aus und rüsten sie aus, damit sie $FLO$ nicht nur für einen Monatssold verteidigten, sondern ihrer eigenen Häuser und Gewerbe wegen. Die Bewaffnung unserer eigenen Bevölkerung wird eine Infanterie hervorbringen, die dort standhaft bleibt, wo sich bezahlte Söldner zurückziehen würden, und schafft einen Kern von Soldaten, die für etwas kämpfen, das am Ende des Feldzugs nicht neu verhandelt werden kann."
 luc_the_city_walls: "Stadtmauern"
 luc_the_city_walls_desc: "Wir haben unsere Stadt in jahrzehntelanger Arbeit und dank bürgerlicher Investitionen mit einem mächtigen Ring aus #italic Bastionen der Renaissance#! umgeben und so eines der prächtigsten Verteidigungswerke unserer Zeit geschaffen. Die Mauern sind an der Basis so breit, dass auf ihren Zinnen Laufstege verlaufen können, und sie wurden noch nie von einem Feind durchbrochen. Diese Befestigungsanlage erlaubt uns, unsere Freiheit zu bewahren, wo benachbarte Städte gefallen sind."
 pis_marble_tradition: "Pisanische Marmortradition"
 pis_marble_tradition_desc: "Die Steinbrüche, die $PIS$ und die umliegende Küste versorgen, beliefern unsere Stadt mit dem besten weißen Marmor Italiens. Wir nutzen diesen Marmor für die großen Kirchen und anderen Stadtdenkmäler, die die Architektur der Stadt prägen. Bildhauer und Architekten, die darin bewandert sind, Marmor zu verarbeiten, sind auf der gesamten Halbinsel sehr gefragt, und der Stein selbst erzielt hohe Preise bei Auftraggebern, die im pisanischen Stil bauen möchten. Dank der meisterhaften Steinbaukunst haben wir uns ein gutes Ansehen aufbauen können und dafür gesorgt, dass jeder unterzeichnete Vertrag und jede verkaufte Lieferung das Prestige einer Stadt mit sich trägt, die es versteht, die Welt zu verschönern."
 sie_monte_dei_paschi: "Monte dei Paschi"
 sie_monte_dei_paschi_desc: "Unsere Magistrate haben den #italic Monte dei Paschi#!, ein öffentliches Kreditinstitut, das durch die Erträge der Weiden der Maremma abgesichert ist, gegründet, um sowohl Händlern als auch den Armen erschwingliche Kredite zu gewähren und $SIE$ in einer Zeit des expandierenden Handels eine solide Grundlage zu verschaffen. Diese Innovation des öffentlichen Finanzwesens wurde zu einem Vorbild der bankwirtschaftlichen Stabilität, das ganze Reiche überdauerte und unsere Wirtschaft durch Krisen hindurch aufrechterhielt, die leichtsinnigere Konkurrenten in den Ruin trieben. Das Kreditinstitut begünstigt auch die Einführung neuer wirtschaftlicher Praktiken in unserem Land und generiert gleichzeitig beständige Steuereinnahmen."
 flo_florentine_bastions: "Florentinische Bastionen"
 flo_florentine_bastions_desc: "Die Militäringenieure unserer Stadt sind Meister beim Bau abgewinkelter Bastionen, deren schräge Mauern Artilleriefeuer zerstreuen und tote Winkel beseitigen, die ältere Rundtürme angreifbar machten. Jede bedeutende Festung, die wir errichten, basiert auf der von unseren Architekten verfeinerte Geometrie und bringt Befestigungen hervor, die für den Verteidiger kostengünstiger und für den Angreifer weitaus schwieriger zu durchbrechen ist. Dank unserer Beherrschung der #italic Trace Italienne#! gehören unsere Mauern zu den modernsten in ganz Italien und die Kosten für ihren Unterhalt sind ein überschaubarer Vorteil statt einer Belastung für die Staatskasse."
 luc_counter_reform_diplomacy: "Diplomatie der Gegenreformation"
 luc_counter_reform_diplomacy_desc: "Wir haben unseren Glauben in der Zeit der religiösen Umwälzungen unserer Zeit durch umsichtige und besonnene Diplomatie bewahrt. Unser Bekenntnis zur #italic Gegenreformation#! war stets aufrichtig, niemals jedoch fanatisch, wodurch es uns gelang, sowohl das Wohlwollen der Frommen als auch der Pragmatiker für uns zu gewinnen. Dieses Gleichgewicht aus Frömmigkeit und Besonnenheit ist zu jener Kunst geworden, durch die unsere Republik Bestand hat."
 pis_natural_philosophy: "Pisanische Naturphilosophie"
 pis_natural_philosophy_desc: "Die Gelehrten aus $PIS$ streben Verständnis durch sorgfältige Beobachtung und Messung an, statt auf Überlieferungen zurückzugreifen, und haben damit eine lange Tradition der Forschung in den Bereichen der Mechanik, Astronomie und Naturwissenschaften in unserer #italic Studio Pisano#! begründet. Diese empirische Denkweise wurde nicht nur von unseren Philosophen aufgegriffen, sondern auch von unseren Ingenieuren und Befehlshabern, die Probleme mit derselben Strenge angehen, mit der unsere Gelehrten die Bewegungen der Himmelskörper untersuchen. So ist eine Kultur der Naturphilosophie entstanden, die unser militärisches Denken prägt und uns eine taktische Präzision verlieht, mit der traditionellere Armeen nicht mithalten können."
 sie_santa_caterina: "Vermächtnis der Heiligen Katharina"
 sie_santa_caterina_desc: "Caterina di Giacomo di Benincasa, Mystikerin, Theologin und Doktorin des Glaubens, gilt nach wie vor als die berühmteste Persönlichkeit, die $SIE$ je hervorgebracht hat, und in der Zeit der religiösen Umwälzungen nach der #italic Reformation#! wurde ihr Andenken zu einem Sammelpunkt für einen selbstbewussten, frommen Katholizismus, der auf die protestantische Herausforderung eher mit Frömmigkeit als mit Polemik reagierte. $SIE_ADJ$e Priester und Gelehrte stellten sich an die Spitze dieser geistlichen Erneuerung und beriefen sich auf die Schriften der Heiligen. Sie argumentierten, dass eine Reform im Herzen beginnen müsse, bevor sie sich auf das Gesetz auswirke. Das Vermächtnis der Heiligen Katharina vertieft den Glauben unseres Volkes und verbindet Gemeinschaften, die andernfalls unter dem Druck der Glaubenskonflikte auseinanderbrechen würden."
 flo_camerata_fiorentina: "Camerata Fiorentina"
 flo_camerata_fiorentina_desc: "Im Haus des Grafen Giovanni de' Bardi versammeln sich Musiker, Dichter und Gelehrte, um den Aufführungsstil der antiken griechischen Tragödie zu rekonstruieren und nachzuempfinden, wie dieser ihrer Vorstellung nach eins geklungen haben muss. Das Unterfangen hat das Ziel, etwas völlig Neues und ganz Eigenes hervorzubringen. Die Gespräche, Experimente und Kompositionen, die aus diesen Abenden hervorgehen, ziehen auch begabte Künstler an, die die schöpferische Freiheit unseres Hofs den höheren Einkünften vorziehen, die sie andernorts erzielen könnten. Die #italic Camerata Fiorentina#! macht unsere Stadt zum Ausgangspunkt einer musikalischen Revolution, die unseren Einfluss an jeden Hof tragen wird, der dem von uns Geschaffenen zuhört."
 luc_the_musical_tradition: "Musikalische Tradition"
 luc_the_musical_tradition_desc: "Unsere Stadt fördert seit jeher die Musik und zieht Komponisten und Interpreten durch Kirchen, Salons und öffentliche Feste an. Unsere Kapellmeister und Instrumentenbauer haben einen so guten Ruf, dass talentierte Musiker eine Anstellung als Zeichen der Anerkennung anstreben. Dank unserer musikalischen Tradition ist unsere Stadt zu einer Bühne geworden, die die Straßen mit einer unverwechselbaren Kunstform füllt."
 pis_medical_tradition: "Pisan Medical Tradition"
 pis_medical_tradition_desc: "The medical faculty of the University of $PIS$ is anchored by the #italic Orto Botanico#! — among the oldest university botanical gardens in the world — where students study the healing properties of plants and develop methods to treat epidemic disease more effectively. Physicians trained in $PIS$ carry this empirical tradition across the country, improving outcomes for the sick and reducing the toll that plague and pestilence exact on our population. This commitment to medical learning strengthens the resilience of our people and spreads the literacy that comes naturally to those trained in the careful arts of diagnosis and record-keeping."
 sie_the_palio: "The Palio of $SIE$"
 sie_the_palio_desc: "Twice each year the contrade of $SIE$ compete in the #italic Palio#! — a bareback horse race around the Piazza del Campo that is as much a civic ritual as a contest, binding the neighborhoods of the city in a shared drama of rivalry, identity, and fierce communal pride. The elaborate pageantry of the event draws visitors from across $ITA$ and broadcasts $SIE_ADJ$ cultural vitality to all who witness it, reinforcing our reputation as a city that has not forgotten how to celebrate itself. This enduring tradition amplifies our influence across the region and wins us the admiration of courts that see in $SIE$ a living testament to the power of civic culture."
 flo_florentine_merchant_houses: "Florentine Merchant Houses"
 flo_florentine_merchant_houses_desc: "The great families of our city have built commercial networks that span the continent — agents in London, factors in Bruges, correspondents in Alexandria — so that the letters of exchange bearing our names pass as freely as coin in cities that have never seen our walls. By formalizing and expanding these networks under the protection of our constitutional government, we ensure that our merchants operate from a position of stability and trust that no prince-led rival can easily replicate. This reach of our #italic Merchant Houses#! drives the revenue of every trade we conduct and opens the most distant and profitable markets to the goods our workshops produce."
 luc_the_lucchese_constitution: "The Lucchese Constitution"
 luc_the_lucchese_constitution_desc: "Our ancient #italic Republican Constitution#! has survived the ages through careful governance and the determination of our citizenry to resist tyranny. When neighboring cities fell to princes and conquerors, we maintained our written laws and our councils without interruption. This enduring order gives our state a stability that larger and more powerful neighbors cannot easily replicate."
 pis_academic_prestige: "Pisan Academic Prestige"
 pis_academic_prestige_desc: "Centuries of scholarly excellence have made the name of $PIS$ synonymous with learning and refined culture among the educated courts of $ITA$ and beyond. Foreign students and wealthy patrons prize a $PIS_ADJ$ education as a mark of distinction, and the artistic works produced in this atmosphere of cultured ambition command premium prices from discerning collectors who associate the city with quality. This reputation for scholarship elevates our standing in foreign courts and enriches those who produce and sell the works of art our academic tradition inspires."
 sie_civic_pride: "Sienese Civic Pride"
 sie_civic_pride_desc: "Even as the grand ambitions of the $SIE_ADJ$ republic gave way to foreign pressure and Tuscan consolidation, the citizens of $SIE$ maintained a fierce pride in their distinct identity — their dialect, their art, their tradition of communal self-governance — that made the city difficult to absorb without provocation. Those who sought to antagonize or diminish $SIE$ found its people stubborn in their resistance, bound together by centuries of shared memory and an insistence that $SIE_ADJ$ life meant something worth defending. This deep-rooted civic spirit discourages aggression against us and sustains the prosperity that flows from a population genuinely invested in the wellbeing of the city they call home."
 #Venetian Shared
 ven_venetian_palaces: "Communal Tradition"
 ven_venetian_palaces_desc: "The cities of the Veneto built their wealth and order on the #italic Comùn#! (#italic Comune#! in standard Italian: the Commune) — a covenant between burghers and nobility to share the obligations of governance rather than leave them to a single lord. From Padua to Verona and the mountain towns beyond, this tradition of elected councils, written statutes, and civic courts gave our urban life a stability and confidence that purely feudal regions could not match. This communal heritage makes our institutions resilient and our burghers invested in the success of the city they help govern."
 ven_state_inquisition: "Venetian Humanism"
 ven_state_inquisition_desc: "Before Florence claimed the Renaissance as its own, the scholars of the Veneto were already recovering the texts of antiquity and asking what it means to live as a citizen rather than a subject. Francesco Petrarca spent his final years among us, and the libraries and courts of the region drew men of letters who saw no contradiction between classical learning and Christian faith. This tradition of #italic Umanesimo#! shapes how our governors think — not only as administrators but as men formed by history and argument, elevating the quality of every negotiation we conduct."
 ven_venetian_painting: "Venezianische Malerei"
 ven_venetian_painting_desc: "The painters of our cities have developed a style unlike any other in Italy — abandoning the hard outlines of the Florentine tradition for the warm luminosity of color and the soft blending of light that only the #italic Pittura Veneziana#! commands. Giovanni Bellini, Giorgione, and Tiziano Vecelli have made our workshops the envy of every patron in Christendom, and foreign lords send commissions across the Alps because no other school can match the richness of our pigments or the confidence of our compositions. This tradition of painting gives our culture a reputation for sensory refinement that travels further than our armies, drawing patrons, wealth, and admiration from courts that we could never reach by force."
 ven_mixed_naval_tactics: "Inigos Architektur"
 ven_mixed_naval_tactics_desc: "Andrea Palladio drew on the proportions of ancient Rome and the building materials of the Veneto to create a style that is simultaneously learned and practical, at home in a villa on the Brenta as in a civic loggia on a market square. His principles spread from Vicenza across every #italic Terraferma#! city, giving our public buildings a dignity grounded in mathematics rather than fashion. This #italic Oordine Palladiano#! not only beautifies our cities but makes them legible — a visitor entering our towns reads confidence, prosperity, and permanence in every facade."
 ven_ship_mounted_gunpowder_weapons: "Villa Culture of the Veneto"
 ven_ship_mounted_gunpowder_weapons_desc: "The aristocracy of the Veneto has made the #italic Terraferma#! its summer country, building villas that are at once working farms, places of retreat, and stages for the cultural life that cannot be conducted on a canal. Along the Brenta and through the hills of Vicenza and Treviso, these estates host salons, concerts, and philosophical conversations that rival anything the academies of the cities can offer. This culture of the #italic Vìla#! (#italic Villa#! in standard Italian: country estate) draws talent from across the region and keeps our governing class connected to the land they administer, giving them a practical knowledge that purely urban oligarchies tend to lose."
 ven_venetian_thalassocracy: "Carnevale"
 ven_venetian_thalassocracy_desc: "In the weeks before Lent, the cities of our culture put on the #italic Bauta#! and briefly become equals — a merchant in a mask walks beside a senator and cannot be distinguished, and the rules that govern dress, movement, and address are suspended by universal consent. This tradition of supervised disorder has served us for centuries as a pressure valve, and it has drawn visitors from across Europe who spend freely while marveling at the spectacle. This annual carnival sustains our reputation for a kind of governed liberty that no other culture in Europe can quite replicate."
 #Venetian Unique
 pad_carraresi_dynasty: "The Carraresi Signoria"
 pad_carraresi_dynasty_desc: "The da Carrara family have governed Padua for over a century as lords whose authority rests on a combination of personal prestige, legal sanction from the empire, and a genuine investment in the prosperity of the city they rule. Our administration has maintained the civic institutions that the commune period established, channeling their energy into the service of seignorial government rather than displacing them, and the result is a city that functions with unusual smoothness. This tradition of #italic Signoria#! that respects the civic fabric it inherits gives our urban governance an efficiency that reduces the cost of keeping our subjects settled and loyal."
 ven_stato_da_mar: "Stato da Mar"
 ven_stato_da_mar_desc: "From the days of the earliest #italic Doge#!, $VEN$ has built its power on the mastery of the sea — our merchants carry the riches of the East through the Adriatic while the #italic Stato da Mar#!, our network of overseas ports and islands, secures the routes that sustain it all. At the heart of this maritime order stands the #italic Arsenale#!, the greatest industrial complex of the medieval world, capable of launching a fully fitted galley in a single day when the Republic demands it. This combination of merchant dominance, state shipyard, and overseas empire makes $VEN$ unlike any landlocked rival, transforming the sea itself into an extension of our state."
 perpetual_general_captain_of_the_people: "Unbefristeter Capitano del Popolo"
 perpetual_general_captain_of_the_people_desc: "The Scaligeri have claimed the title of #italic Capitano del Popolo#! not as a temporary office but as a permanent grant rooted in commune law, framing every military campaign as the defense of civic rights rather than dynastic ambition and making it far harder for rivals to cast our wars as mere aggression. Cangrande della Scala built his reputation on exactly this legitimacy — riding out against Milan, Venice, and Padua while presenting each conflict as a just cause — and we formalize his example by keeping the city's councils engaged in decisions that other lords make alone. This combination of legal standing and public mandate makes rivals reluctant to antagonize us openly, since any attack on Verona reads as an attack on the commune itself."
 pad_the_bo: "The University of Padua"
 pad_the_bo_desc: "Founded in 1222, the #italic Bò#! — named for the inn where its first students gathered — has never ceased to be one of the great centers of European learning, and Padua's willingness to teach subjects that more cautious universities declined has made it a destination for the curious minds of every generation. Vesalius performed his anatomical demonstrations here, Galileo lectured from its chair of mathematics, and the law faculty has trained judges and administrators across the continent. This unbroken tradition of free inquiry raises the literacy and capacity of the burgher class that relies on the university and attracts scholars whose presence keeps the city's intellectual life in motion."
 ven_gothic_architecture: "Gotische Architektur"
 ven_gothic_architecture_desc: "The great palaces rising along our canals embody an architecture wholly our own — borrowing the pointed arch of the Gothic north, the open loggia of the Byzantine east, and the delicate tracery of Islamic craftsmen, fused into the style we call #italic Gotico Fiorito#!. Nowhere else in Italy does a merchant's wealth announce itself so confidently in stone and carved marble, and the Palazzo Ducale and the Ca' d'Oro stand as proof that our republic can raise monuments as magnificent as any king's. This architectural tradition reinforces the standing of our patrician class, making the physical face of $VEN$ inseparable from the prosperity and civic pride that sustains it."
 court_of_great_refugees: "Hof der großen Flüchtlinge"
 court_of_great_refugees_desc: "Dante Alighieri spent years of his exile walking our streets, and his presence drew others — poets, scholars, and master builders who found in Verona's Roman ruins and abundant stone a city still worth adding to. We extend this tradition of welcome into deliberate policy, offering patronage to displaced talent and drawing the finest craftsmen to the ancient workshops of the #italic Marmorina#!, where the stone-cutting skills of generations meet the fresh techniques that newcomers bring from across Italy. This reputation for hospitality draws artists of unusual quality and gives our ambitious construction projects a depth of skilled labor that rivals who must import both talent and stone cannot easily match."
 pad_medical_school: "The School of Medicine"
 pad_medical_school_desc: "The medical faculty of Padua has been recognized across Europe as the most rigorous training ground for physicians since the university was founded, combining systematic anatomical study with clinical observation in a way that the great Arab compilations alone could never provide. The students who pass through its dissection theatre carry an understanding of the body more detailed and more precise than any other school in the Christian world could offer, and the physicians they become have changed how illness is understood and treated in every city they subsequently serve. This tradition of empirical medicine gives our population a resistance to epidemic disease that more superstition-dependent approaches cannot produce and deepens the literacy of every educated class the university touches."
 ven_printing_industry: "Druckindustrie"
 ven_printing_industry_desc: "When Aldo Manuzio established the #italic Aldine Press#! in $VEN$ in 1494, we became the printing capital of the world almost overnight — our merchants had the gold to finance it, our scholars the Greek and Latin to edit it, and our trade routes to carry the finished books to every court in Europe. The italic typeface, the affordable pocket octavo, and the authoritative editions of Plato, Aristotle, and Virgil that Aldo produced set a standard that no press on the continent has since matched. This mastery of the book trade gives $VEN$ a commercial and intellectual reach that extends far beyond what our galleys can carry, making the ideas that flow from our presses as valuable as the spices in our warehouses."
 the_adige: "Die Etsch"
 the_adige_desc: "The Adige runs from the Alps through the center of our city and down to the Adriatic, carrying grain, timber, and finished goods along a route that has been profitable since Roman times. We invest in improving the river landings, clearing the shallower stretches, and negotiating passage rights with the communes downstream, turning a natural advantage into a managed commercial system. This continuous river trade fills our markets with goods from the mountains and gives our city a steady prosperity that rivals cannot easily cut off."
 pad_paduan_philosophy: "The Paduan School of Philosophy"
 pad_paduan_philosophy_desc: "The philosophy faculty of Padua has developed a tradition of rational inquiry into the natural world that operates on Aristotelian premises while reaching conclusions that trouble the Church far more than open theology might have. In Padua, it is considered legitimate to argue that the soul is mortal, that intellect is collective rather than individual, and that natural causes could explain what elsewhere requires divine intervention. This culture of secular reasoning produces lawyers, physicians, and administrators of unusual intellectual independence, trained to analyze rather than simply to accept authority. The reputation of the #italic Paduan School#! makes our state a gathering point for minds that produce more careful governance, and draw scholars who enrich our city's intellectual life."
 ven_venetian_school_of_music: "Venezianische Musikschule"
 ven_venetian_school_of_music_desc: "The twin choir lofts of San Marco, facing each other across the golden nave, gave birth to the #italic Cori Spesâi#! (#italic Cori Spezzati#! in standard Italian: Divided Choirs) technique — two ensembles answering and overlapping in a controlled interplay of sound that floods the basilica and cannot be reproduced anywhere else in the world. Adrian Willaert, the Gabrielis, and Claudio Monteverdi have all worked within this tradition, producing polyphony, madrigals, and sacred motets that courts from Madrid to Vienna pay generously to import. This school of music makes $VEN$ the acknowledged capital of European sound, and the prestige that comes from exporting composers, singers, and scores is a form of influence that costs us nothing and reaches courts that our galleys never will."
 scaligers_military_ambitions: "Spettacoli dell'Arena"
 scaligers_military_ambitions_desc: "Verona's amphitheater is one of the finest surviving Roman monuments in Italy, and we have made it the stage for the greatest public #italic Spettacoli#! in the north — bullfights, pageants, and civic competitions that draw crowds from Venice and the #italic Terraferma#! for days at a time. No other city can offer this scale of spectacle inside ancient Roman stone, and the tradition has become inseparable from how Verona understands itself, a republic that still performs its identity before thousands of witnesses in a space built two thousand years ago. This reputation for public magnificence spreads our name across northern Italy and draws visitors whose spending and whose letters home do more for our standing than any envoy we could send."
 pad_the_accademia: "The Accademia Patavina"
 pad_the_accademia_desc: "We establish the #italic Accademia Patavina di Scienze Lettere ed Arti#! to gather the leading scholars, physicians, and men of letters of the city into a single institution with the formal backing of the state — a structure that turns the individual brilliance of the university's faculty into a sustained collective enterprise capable of undertaking projects no single professor could manage. The Accademia provides a forum where the results of the university's research meet the practical needs of administration and commerce, making learned expertise available to the state at a fraction of the cost of maintaining separate advisory bodies. This institutionalization of scholarship gives our court an unusual depth of technical and administrative counsel and keeps talented men in our service who might otherwise seek the grander stages of larger states."
 ven_ridotto: "Il Ridotto"
 ven_ridotto_desc: "In 1638 the Great Council of $VEN$ took the unprecedented step of licensing a permanent public gambling house in the Palazzo Dandolo, creating the #italic Ridotto#! — the first state-supervised casino in Europe. Admission required a mask and a patrician's hat, which gave the establishment the appearance of equality while ensuring that the proceeds flowed reliably to the treasury and the behavior of the nobility remained visible to the state. This managed institution transformed a vice the Republic could not suppress into a dependable source of revenue and a mechanism for keeping the city's most powerful men where they could be watched."
 consolidate_italian_holdings: "Gateway of the Alps"
 consolidate_italian_holdings_desc: "Verona sits at the point where the road from the Brenner Pass descends into the Po plain, making whoever holds our city the keeper of the most traveled route between Italy and the German lands. We have rebuilt our walls with the full depth of bastioned fortification — angled towers, wide ditches, and interlocking fields of fire that make every assault a costly prospect — and maintained the largest permanent garrison on the #italic Terraferma#!. This position means that any army moving south must either take Verona first or leave a hostile city at its back, and we intend to make both choices expensive."
 pad_paduan_commune: "The Paduan Commune"
 pad_paduan_commune_desc: "The oldest municipal institutions of our city — the elected councils, the written statutes, the tradition of citizen participation in public decisions — have never been fully extinguished, even through the decades of seignorial government that placed a single family above them. We revive and formalize these communal structures, giving our merchants and burghers a recognized role in civic governance and restoring the sense that the city belongs to all its citizens rather than its rulers alone. This #italic Comùn Padovàn#! (#italic Comune Padovano#! in standard Italian: Paduan Commune) channels the energy of our most active citizens into institutions that serve the state, increasing the tax revenue that flows from a population that believes in the legitimacy of what it pays into."
 ven_la_fenice: "La Fenice"
 ven_la_fenice_desc: "The #italic Teatro La Fenice#! — the Phoenix — opened its doors in 1792 as the grandest opera house in $ITA$, built to replace a theatre lost to fire and named for the bird that rises from its own ashes, a symbol that would prove grimly prophetic more than once. Its gilded interior, its boxes arranged by rank, and its season of premieres turned opera from aristocratic private entertainment into the defining cultural event of a city that had run out of military victories but not beauty. This theatre gives $VEN$ a stage on which the Republic's taste, wealth, and ambition are on display every night, reaching an audience of nobles, travellers, and critics whose admiration travels further than any diplomatic dispatch."
 marmorina: "Die große Reise"
 marmorina_desc: "Verona has become a destination that the educated aristocracy of Europe cannot complete their travels without visiting — English lords, French scholars, and German princes make their way to the Arena, the Roman theatre, and the Gothic tombs of the Scaligeri, spending freely and writing the city into the correspondence of every court on the continent. Their accounts turn Verona into a byword for Italy's layered heritage, a city where Roman, medieval, and Renaissance civilization can be read in a single afternoon's walk through streets that belong to no single century. This steady stream of wealthy and influential visitors enriches our treasury, opens diplomatic conversations that our size alone would never invite, and builds a reputation for civilization that travels far ahead of our armies."
 #Vivaro-Alpine Shared
 vivaro_alpine_drailles: "The Drailles"
 vivaro_alpine_drailles_desc: "The ancient seasonal routes that shepherds use to move their flocks between highland summer pastures and lowland winter grazing — the #italic drailles#! — are among the most carefully maintained paths in the region, crossing passes and valleys in patterns refined over centuries. The communities along them have developed systems of collective grazing rights, waypoint shelters, and dispute arbitration that turn transhumance from a seasonal risk into a reliable cycle of production. This managed seasonality of the pastoral economy gives our highlands a food-producing capacity that purely sedentary agriculture cannot match."
 vivaro_alpine_infantry: "Alpine Infantry"
 vivaro_alpine_infantry_desc: "The mountain terrain has bred a tradition of light, mobile foot soldiers who could fight in conditions that make cavalry and heavy armor useless — men who need no road, no level ground, and no supply line longer than their own backs can carry. The valleys of our culture produce soldiers accustomed to cold, altitude, and sudden ambush, capable of holding narrow passes against forces many times their number. This tradition of alpine warfare gives our armies a quality in difficult terrain that opponents trained on the open lowland battlefield are consistently unprepared for."
 vivaro_alpine_passes: "The Alpine Passes"
 vivaro_alpine_passes_desc: "Mont Cenis, the Col de Montgenèvre, the Col de Larche — the great transalpine routes connecting the Mediterranean world to northern Europe all pass through our territory, making even modest lords the indispensable gatekeepers of international movement. Merchants, armies, papal legates, and pilgrims all pay to cross our ground, and the traffic that passes through our hands gives us information, contacts, and leverage that purely inland powers could never accumulate. This position as the crossroads of transalpine exchange makes our diplomacy unusually well-informed and our merchants unusually well-connected."
 vivaro_alpine_herbes_des_alpes: "Herbes des Alpes"
 vivaro_alpine_herbes_des_alpes_desc: "The alpine flora of our region provides us with an extraordinary pharmacopoeia — gentian, arnica, valerian, and dozens of others — and the communities here have developed traditions of herbal preparation and botanical knowledge that keep these isolated valley populations healthier than their lowland counterparts. This is the result not of folk magic but systematic observation, transmitted from generation to generation in the form of practical recipes and the accumulated memory of what had worked and what had not. These #italic Herbes des Alpes#! give our healers tools that the physicians of great cities, dependent on imported remedies, cannot easily replicate."
 vivaro_alpine_valley_councils: "Valley Councils"
 vivaro_alpine_valley_councils_desc: "The isolation of our mountain communities has forced them to develop functional self-governance long before larger states thought to organize them — village councils managing collective pastures, local courts arbitrating disputes, and elected officers coordinating the resources that kept valley communities alive through the winter. These institutions run on knowledge of local conditions that no governor sent from outside could replicate, and they have accumulated over generations a tradition of deliberation and record-keeping that gives our communities an administrative depth disproportionate to their size. This #italic Conseilh de Valat#! tradition makes our governance unusually competent and our subjects unusually engaged in the management of their own affairs."
 vivaro_alpine_nature: "Alpine Nature"
 vivaro_alpine_nature_desc: "Rousseau's idealization of mountain simplicity, followed by the poets and painters of the Romantic movement, transformed the Alps from a barrier to be crossed into a destination to be sought. Our valleys, peaks, and ancient communities became mirrors for everything that educated Europe felt it had lost, drawing visitors, naturalists, and artists in numbers that the passes had never seen for any other reason. This reputation for embodying a kind of unspoiled authenticity gives our culture an influence far beyond what our political weight could command — people come to us to understand themselves, and they carry home memories that outlast any treaty."
 #Vivaro-Alpine Unique
 sal_the_alpine_passages: "The Alpine Passages"
 sal_the_alpine_passages_desc: "The mountain passes that cross through our lands connect the plains of Italy with the highlands beyond, and we have learned to profit from every traveler and merchant who must pass our gates. Control of the #italic Alpine Routes#! gives us a leverage that no army alone can provide, and we use it to sustain friendships on both sides of the mountains. This geography is our greatest inheritance."
 sal_the_mountain_routes: "The Mountain Routes"
 sal_the_mountain_routes_desc: "The trails and roads that thread through our mountains are known to us as no outsider can know them, and this knowledge shapes how we move and supply our armies. Our soldiers march along paths that would leave foreign troops exhausted and disoriented, arriving fresh where others would arrive worn. This intimate mastery of the #italic Alpine Terrain#! is a form of strength no fortress can replace."
 sal_the_saluzzo_chronicles: "The Saluzzo Chronicles"
 sal_the_saluzzo_chronicles_desc: "Our court has fostered a distinctive literary tradition that weaves together the languages and voices of both sides of the mountains, producing chronicles and verse of surprising richness. The #italic Occitan and Italian tongues#! mingle in our writings as they do among our people, creating something that belongs to neither tradition entirely. This chronicle of who we are preserves our identity in letters that outlast stone."
 sal_the_alpine_strongholds: "The Alpine Strongholds"
 sal_the_alpine_strongholds_desc: "We have fortified the natural strongpoints of our mountains with walls and towers that make our land a nightmare for any invader who seeks to hold it by force. Every valley approach leads to a defended pass, and every pass to a #italic Hilltop Citadel#! that must be taken before any advance can continue. Any army that enters our lands uninvited will find the mountains themselves arrayed against them."
 sal_the_alpine_regiments: "The Alpine Regiments"
 sal_the_alpine_regiments_desc: "Our soldiers have been forged in the hard school of mountain warfare, where endurance and discipline matter more than numbers and where every man knows the value of his comrades. The #italic Highland Regiments#! of our marquisate have built a reputation for steadiness that makes them sought after even when our state is not at war. This tradition of arms is the shield behind which our people have always stood."
 sal_the_alpine_crafts: "The Alpine Crafts"
 sal_the_alpine_crafts_desc: "The highland villages of our marquisate have long sustained themselves through skilled craftsmanship, producing goods of quality that find their way into the markets of the plains below. The knowledge of our artisans is passed within families and guilds, ensuring that each generation inherits the #italic Alpine Craft Traditions#! intact. This industry sustains the prosperity of our communities and earns our highland towns a reputation for quality that outlasts any political upheaval."
 #Italian Formables
 #Sardinia
 sar_the_giudicati: "The Giudicati"
 sar_the_giudicati_desc: "Our island was once divided into four self-governing judgedoms — the #italic Giudicati#! — each with its own court, its own laws, and its own traditions of governance built entirely from within. Though that era has passed, the habits of independent administration it instilled run deep in our institutions and our people. This tradition of sovereign self-governance gives our state a legitimacy that is felt by every subject rather than merely proclaimed from above."
 sar_the_stamenti: "The Stamenti"
 sar_the_stamenti_desc: "Our parliament, the #italic Stamenti#!, is one of the oldest representative assemblies in the Mediterranean world, dividing legislative counsel among the church, the military nobility, and the royal towns in three distinct chambers. This structure gives every major constituency a recognized voice in how the island is governed, channeling disputes into procedure rather than conflict. This culture of structured representation keeps our merchant and burgher classes invested in the stability of the state."
 sar_university_of_cagliari: "The University of Cagliari"
 sar_university_of_cagliari_desc: "The foundation of a university in our capital brings the institutions of learning that have long been enjoyed on the mainland to the people of our island. Lawyers, physicians, and administrators trained here no longer need to seek their education abroad, and the talent they represent stays in our service rather than enriching distant courts. This commitment to education raises the literacy and capability of our governing class and prepares our island for the demands of a more complex world."
 sar_sardinian_tercios: "The Sardinian Infantry"
 sar_sardinian_tercios_desc: "Our foot soldiers have earned a reputation across the battlefields of the age for a tenacity that makes them exceptionally costly to break — they hold ground that others would abandon and press attacks that others would not dare. We formalize this tradition by organizing our infantry into disciplined formations trained in pike and shot, building on the fighting qualities that have always distinguished our men. This military culture produces an army of exceptional morale that serves as the backbone of any campaign we undertake."
 sar_enlightened_reforms: "The Enlightened Reforms"
 sar_enlightened_reforms_desc: "A generation of administrators has concluded that our potential has been constrained by outdated laws, uneven taxation, and a literacy gap that leaves too many of our subjects unable to participate in the life of the state. We commit to systematically reforming these institutions — codifying the tax rolls, expanding education, and replacing exemptions with a clearer and fairer legal framework. This administrative modernization increases our revenues and prepares our population for the demands of a transforming world."
 sar_the_cavalcadores: "The Cavalcadòres"
 sar_the_cavalcadores_desc: "The Sardinian interior, particularly the plains of the Campidano, has developed a world-class horse culture. The #italic Sartiglia#! and other equestrian tournaments are not mere games, but displays of extreme horsemanship and military readiness. This culture will provide the state with elite light cavalry units (the #italic Cavalleggeris de Sardigna#!) who are famous for their speed and ability to navigate the treacherous karst terrain, making them the premier scouts for our armies."
 #Tuscany
 tus_il_contado: "Il Contado"
 tus_il_contado_desc: "The #italic Contado#! — the ring of rural territory surrounding each of our cities — has long been the foundation of Tuscan wealth and power, its villages, castles, and farmlands bound by law and custom to answer to the urban lord within the walls. By formalizing our jurisdiction over the countryside, we transform scattered feudal obligations into a coherent system of agricultural surplus, military manpower, and direct revenue. This mastery of the contado anchors our legitimacy among the landed classes and extends our reach into every corner of the land we claim to rule."
 tus_il_catasto: "Il Catasto Fiorentino"
 tus_il_catasto_desc: "We shall commission the #italic Catasto#! — the most comprehensive survey of wealth and property undertaken by any government in medieval Europe, mapping the taxable assets of every citizen and household from the wealthiest merchant to the humblest artisan. By laying bare the full extent of our fiscal base, the Catasto allows us to distribute the burden of taxation with unprecedented fairness, replacing the factional manipulation of the old system with transparent and enforceable assessments. This reform earns the trust of our subjects, eases the cost of governing, and establishes a standard of administrative precision that future rulers of Tuscany will build upon."
 porto_franco: "Porto Franco"
 porto_franco_desc: "In declaring Livorno a #italic Porto Franco#!, we open our harbor to merchants of every faith and nation — Armenians, Jews, Greeks, and Flemings all welcomed without the religious conditions that other Mediterranean ports impose. This freedom draws skilled traders and financiers whose settlement enriches our city and swells our trade routes with goods that more closed ports cannot handle. This cosmopolitan harbor transforms Livorno from a modest fishing village into one of the most dynamic commercial ports in the western Mediterranean, drawing population and capital to our shores."
 tuscan_uffizi: "Uffizi"
 tuscan_uffizi_desc: "Our commissioning of the #italic Uffizi#! as the administrative heart of our new Grand Duchy creates not merely a seat of government, but a stage for our power — its long corridor soon to be lined with antiquities, sculptures, and canvases that announce our ruler's dynasty's mastery of both statecraft and beauty. Across the city, we are establishing a secret workshop in the Palazzo Vecchio, where alchemists and craftsmen perfect a soft-paste porcelain — the first produced in Europe, rivalling the precious wares imported at great expense from China. These twin achievements of administration and artisanal ambition mark the apex of our patronage, announcing to every court in Christendom that Tuscany under the Grand Dukes is as much a center of refinement as of power."
 accademia_cimento: "Accademia del Cimento"
 accademia_cimento_desc: "Our Grand Duke has established the #italic Accademia del Cimento#! — the Academy of Experiment — gathering the finest scientific minds of the age under a single roof devoted to empirical inquiry, its members bound by the motto #italic Provando e Riprovando#! — testing and retesting — that sets a new standard for the pursuit of knowledge. At the same time, the Grand Duchy is reshaping the municipalities of Tuscany, replacing the patchwork of local privileges with uniform administrative procedures that make the state's authority felt in every town and valley. This combination of scientific ambition and administrative rigor defines our duchy as a state where both ideas and governance are held to the same exacting standard of proof."
 tuscan_physiocratic_reforms: "Toskanische Physiokratiereformen"
 tuscan_physiocratic_reforms_desc: "Our ruler governs Tuscany by the principles of the #italic Physiocrates#!, which state that land and agriculture are the true sources of all wealth. We will abolish serfdom and guild monopolies, work to free the grain trade from state controls, and will be reorganizing taxation around soil productivity rather than the privileges of merchants and nobles. This same spirit of rational governance is restructuring our commercial culture, dismantling the internal barriers that previously restricted the movement of goods and opening our markets to trade that guild charters had long excluded. This comprehensive reform of land and commerce is transforming Tuscany into a model of Enlightened administration, an experiment in rational governance that observers across Europe come to study and imitate."
 #Two Sicilies
 tws_unified_legal_code: "Geeintes Gesetzbuch"
 tws_unified_legal_code_desc: "Aufgrund ungerechter Rechtsanwendung kam es in den Territorien, aus denen unser Land besteht, immer wieder zu Aufständen. Um dies künftig zu verhindern, sollten wir unser Rechtssystem vereinheitlichen und dafür sorgen, das unsere Gesetze eine gerechte Anwendung finden. Dies wird sicher ein Umsichgreifen von Aufständen verhindern."
 tws_ensure_loyal_families: "Treue der Adelsfamilien"
 tws_ensure_loyal_families_desc: "Die Adelsfamilien beider Sizilien üben in unserem Namen großen Einfluss aus. Indem wir ihnen prestigeträchtige, aber bedeutungslose Ämter am Hof ​​übertragen, sichern wir uns ihre Treue und gewährleisten die stabile Herrschaft über unser Land."
 tws_revitalize_the_lands: "Neue Leute anziehen"
 tws_revitalize_the_lands_desc: "Die Aufmerksamkeit früherer Herrscher lag zu sehr auf bestimmten Teilen unseres Landes. Wenn wir die Kontrolle über beide Sizilien behalten wollen, müssen wir in beide Teile gleichermaßen und ausgewogen investieren. Ein Schritt in diese Richtung ist es, Bevölkerung für die Besiedlung bisher vernachlässigte Regionen zu gewinnen."
 tws_capable_vicars: "Fähige Vikare"
 tws_capable_vicars_desc: "Eine besondere Herausforderung für unser vereintes Land ist die Regierungsführung auf beiden Seiten der Straße von Messina. Da unser Herrscher sich immer nur auf einer Seite aufhalten kann, muss die andere Seite einem Vikar übertragen werden, der in unserem Namen regiert. Diese entscheidende Aufgabe sollten immer nur die Fähigsten übernehmen, um Korruption im Amt zu verhindern."
 tws_oversea_ambitions: "Ambitionen in Übersee"
 tws_oversea_ambitions_desc: "Die Ausweitung unserer Territorien innerhalb Italiens gestaltet sich schwierig, da wir in ein tückisches Netz von Bündnissen verstrickt sind und den Zorn des Papstes riskieren müssen. Daher sollten wir unseren Blick nach Übersee richten, wo uns in den Landen Nordafrikas und Griechenlands potenzielle Reichtümer erwarten."
 tws_protect_the_coastline: "Marinepatrouillen ausweiten"
 tws_protect_the_coastline_desc: "Unsere Küste ist weitläufig und anfällig für Piratenüberfälle, die Sklaven erbeuten wollen. Wir müssen eine patrouillierende Marine aufbauen, die uns schützt und diese abscheuliche Bedrohung für unser Volk irgendwann besiegen kann."
 #Italy Formable Advances
 ita_connect_the_interior: "Das Inland verbinden"
 ita_connect_the_interior_desc: "Die Beschaffenheit des Geländes entlang unserer Küsten erlaubt den schnellen Transport von Waren und erleichtert das Reisen, doch das Innere der italienischen Halbinsel ist an vielen Stellen viel schwieriger durchquerbar. Indem wir nicht nur die Orte im Landesinneren, sondern auch die Küsten untereinander verbinden, beschleunigen wir nicht nur den Handel, sondern verbessern auch die Manövrierfähigkeit unserer Truppen."
 ita_increased_recruitment: "Wertvoller Besitz"
 ita_increased_recruitment_desc: "$italy_region$ ist für viele fremde Herrscher ein begehrtes Ziel. Wenn wir unser Land verteidigen wollen, müssen wir die Rekrutierung ausweiten, sowohl was unsere Land- als auch was unsere Seestreitkräfte betrifft. Da feindliche Truppen über die Alpenpässe oder aber auch über unsere ausgedehnte Küste in $italy_region$ einfallen können, müssen wir sicherstellen, dass unsere Armee und unsere Marine darauf vorbereitet sind, jedem Eroberer entgegenzutreten, der den Frieden auf der Halbinsel zu stören versucht."
 ita_flourishing_urban_centers: "Florierende Stätde"
 ita_flourishing_urban_centers_desc: "Unser Land ist die Heimat zahlreicher stark verstädterter Regionen. Diese bieten uns nicht nur reichlich Gelegenheit zur Herstellung von Waren, sondern ihre Handelsnetze erlauben es uns auch, diese zu unserem Vorteil auf fremden Märkten zu verkaufen. Indem wir alle Hindernisse für ihren Ausbau beseitigen, garantieren wir ihren anhaltenden Erfolg."
 ita_influence_over_the_clergy: "Einflussreicher Klerus"
 ita_influence_over_the_clergy_desc: "With its close proximity to the $papacy_reform$, $italy_region$ has a long tradition of powerful and talented clergy in the service of the faith. Regardless of where our religious matters will take us, we should maintain good relations with our clergy."
 ita_enduring_hardship: "Die Härten des Krieges"
 ita_enduring_hardship_desc: "Foreign interest in $italy_region$ has many times turned our lands into the battlefield of stronger countries. Sustaining our people during these times of need is a difficult task. Establishing secure locations to shelter our population during conflict will ensure their support during even the most dire wars."
 ita_attractive_migration: "Atemberaubende Landschaft"
 ita_attractive_migration_desc: "Das fruchtbare Land unserer Halbinsel zieht viele Menschen aus den umliegenden Regionen an, die sich hier ein neues Leben aufbauen wollen. Da viele unserer Städte auf Saisonarbeiter angewiesen sind, sollten wir uns verstärkt darum bemühen, diese Menschen dauerhaft in unserem Land anzusiedeln."
 #Italy Region
 italy_great_families: "Große Familien von Italien"
 italy_great_families_desc: "Nach der Gründung eines geeinten italienischen Staats nahmen wir viele große Adelsfamilien in unserem Land auf. Wir sollten ihr Prestige und ihren Ruf nutzen, um unseren eigenen zu verbessern, damit diese sehr fähigen Menschen auch beschäftigt sind."
 italian_condottieri: "Große Condottieri-Hauptleute"
 italian_condottieri_desc: "Unsere Lande sind berühmt für ihre hervorragenden Militärs, die an der Spitze ruhmreicher Armeen sowohl die eigenen Interessen als auch die des Meistbietenden voranbringen. Wir sollten dafür sorgen, dass solche Leute stets in erster Linie bereit sind, uns zu dienen."
 genoese_crossbowmen: "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"
 genoese_galley: "$n_genoese_galley$"
 genoese_galley_desc: "$n_genoese_galley_desc$"
 italian_galleass: "$n_italian_galleass$"
 italian_galleass_desc: "$n_italian_galleass_desc$"
 #Generic Advances
 republican_assembly_advance: "Republiksversammlung"
 republican_assembly_advance_desc: "Die $republican_assembly$ ist der Kern unserer Republik und eine unglaublich wichtige Institution, wenn es darum geht, edle Tugenden und Leistungen zu fördern."
 #Kanem Bornu Advances
 kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
 kbo_iron_helmet_musketeers_desc: "So wie sich die Kriegsführung weiterentwickelt, müssen sich auch unsere Taktiken weiterentwickeln. Konzepte in Bezug auf Formationen, Feuerlinien und Schießpulvertechniken von anderen Ländern zu übernehmen, wird uns mit Sicherheit zum Sieg verhelfen!"
 kbo_fixed_military_camps: "Feste Militärlager"
 kbo_fixed_military_camps_desc: "Indem wir einige feste Lager errichten, die über unsere gesamte Domäne verteilt sind, können wir sicherstellen, dass unsere Armee weniger Verluste durch Zermürbung erleiden wird und so schnell wie möglich verstärkt werden kann."
 kbo_permanent_sieges: "Kanemische Belagerungstaktiken"
 kbo_permanent_sieges_desc: "Ausgeklügelte Apparaturen, die die Mauern unserer Feinde einreißen können, sind ein vertrauter Anblick für unsere Armeen. Die Entwicklung einer beweglichen Artillerie, die einer tagelangen Belagerung standhalten und dauerhaft feuern kann, ist neu, wird uns aber mit Sicherheit zum Sieg führen."
 kbo_council_clan_heads: "Clanhäuptlingsrat"
 kbo_council_clan_heads_desc: "Lokale Clanhäuptlinge mit der Verwaltung zu beauftragen, entlastet zwar unsere Zentralverwaltung, doch unsere Berater bestehen auch darauf, dass wir im Gegenzug für diese Autonomie eine Entschädigung fordern."
 # Saxon advances
 meissen_lion: "Meißner Löwe"
 meissen_lion_desc: "Der Meißner Löwe, auch als Markmeißnischer Löwe bekannt, ist ein besonderes Wappentier unserer Heraldik. Der schwarze, bewehrte Löwe mit roter Zunge auf goldenem Hintergrund, der nach links blickt, steht für das Herrschaftssymbol der Wettiner Dynastie. Sein Abbild wird in vielen verschiedenen Formen verwendet und ist unter anderem auf Grabsteinen, Insignien, Helmen, Münzen und Siegeln zu finden. Er symbolisiert die Zugehörigkeit der Stadt Meißen zur Mark Meißen und ist Teil des Wappens zahlreicher Städte und Gemeinden. Einige setzen ihn auch mit dem umgefärbten thüringischen Löwen in Verbindung."
 a_mining_heritage: "Bergbautradition"
 a_mining_heritage_desc: "Der Bergbau prägt die Landschaft, Wirtschaft und Kultur der Region bereits seit Jahrhunderten. Die riesigen Silbervorkommen, die im 12. Jahrhundert gefunden wurden, lockten Bergleute und Händler aus den umliegenden Regionen an, was das Wachstum des Erzgebirges und die Bedeutung unseres Reichs stark förderte."
 meissner_groschen: "Meißner Groschen"
 meissner_groschen_desc: "Der Meißner Groschen ist die regionale Währung unseres Landes. Diese Münze wurde nach dem Vorbild des Prager Groschens geprägt, den er auch ersetzen wird. Der neue, größere Groschen wird eine neue Ära in der Geschichte unserer Münzprägung einläuten und es leichter machen, ihn zu kontrollieren."
 a_resilient_soul: "Unverwüstliche Seele"
 a_resilient_soul_desc: "Die Menschen unseres Landes sind äußerst zäh und verkörpern unsere unerschütterliche Entschlossenheit. Sie trotzen allen Widrigkeiten und finden ihre Stärke in der Einigkeit und dem unerschütterlichen Bekenntnis zu ihren gemeinsamen Werten. Ihre unbezwingbare Widerstandskraft treibt uns voran und erlaubt es uns, jedes Hindernis zu überwinden, das sich uns in den Weg stellt. Aus einem Konflikt werden wir stärker und entschlossener denn je hervorgehen."
 saxon_court: "Sächsischer Hof"
 saxon_court_desc: "Der Sächsische Hof ist neben dem Zivil- und Militärstaat eine Säule der öffentlichen Aufgaben in der kursächsischen Regierung. Die Hofordnung regelt den Tagesablauf am Hof und die Zuständigkeiten der Hofämter, während sich der Hofstaat selbst aus Adeligen und Bürgerlichen zusammensetzt, die der Herrscherfamilie dienen und zur Regierung und Verwaltung der Domäne beitragen. Auch wenn jedes erwachsene Mitglied der Herrscherfamilie seinen eigenen Hof unterhält, werden wir in unserem Hauptsitz einen großen dauerhaften Hof einrichten, der die klügsten Köpfe des Reichs anzieht."
 a_tolerant_society: "Tolerante Gesellschaft"
 a_tolerant_society_desc: "Wo andere Länder in Glaubensfragen durch Feindseligkeiten geplagt werden, bleiben wir tolerant, um zu verhindern, dass sie sich in unserem Reich ausbreiten. Unsere Nation ist ungeachtet der verschiedenen Glaubensrichtungen auf den starken Säulen der Toleranz und Brüderlichkeit aufgebaut, um ein harmonisches Zusammenleben aller zu fördern. Wir sind durch eine gemeinsame Vision geeint und werden ein Land aufbauen, in dem Respekt und Verständnis den Weg für eine erfolgreiche Zukunft ebnen."
 furstenschule: "Fürstenschule"
 furstenschule_desc: "Mit der Verbreitung der Reformation und der Übernahme der kirchlichen Verwaltung durch den Staat muss Letzterer eine neue Aufgabe übernehmen: das Bildungswesen, das bisher der Kirche oblag. Als Vorbereitung auf die neu gegründeten Universitäten werden drei sächsische Fürstenschulen gegründet, die säkularisiertes Klostergut nutzen. Die Schulämter werden Pforta, Grimma und Meißen unterstellt, die diese drei staatlichen Fürstenschulen beaufsichtigen und unterhalten. Der Staat übernimmt damit eine wichtige Rolle bei der Gestaltung der Bildungslandschaft sowie die Aufgabe, das Wissen und die intellektuelle Entwicklung der zukünftigen Anführer Sachsens zu beaufsichtigen."
 bonded_by_loyalty: "Durch Treue verbunden"
 bonded_by_loyalty_desc: "Sei es zum Schutz unserer eigenen Landsleute oder unserer treuen Verbündeten, unsere tapferen Armeen werden in ihrem unerschütterlichen Glauben an den Sieg niemals wanken. Sie werden mit unbeugsamen Willen in die Schlacht reiten und bis zum letzten Mann kämpfen. Wir werden geeint in unserer Zielstrebigkeit und Loyalität voranschreiten und in unserem Streben nach dem Sieg nichts unversucht lassen."
 meissner_porcelain: "Meißener Porzellan"
 meissner_porcelain_desc: "Sachsen war das erste Land Europas, das Porzellan herstellte, was dem Hof der Wettiner neben Reichtum auch viel Prestige einbrachte."
 saxon_baroque: "Sächsischer Barock"
 saxon_baroque_desc: "Dresden und Leipzig sowie kleinere Amts- und Herrensitze pflegen in dieser Epoche die gehobenen Umgangsformen und erlangen weltweit Anerkennung. Repräsentative Bauten wie der Dresdner Hof verkörperten den sächsischen Prunk, während die Werke von Johann Sebastian Bach Leipzig zur Musikstadt machten und eine blühende Hochkultur förderten. Die Region förderte während dieser Zeit einzigartige Kulturformen, darunter das erzgebirgische Kunsthandwerk und kulinarische Traditionen wie den Dresdner Christstollen."
 retablissement: "Rétablissement"
 retablissement_desc: "Nach den verheerenden Kriegen bricht für Sachsen eine neue Ära an — das sächsische #italic Rétablissement#!. Wie ein Phoenix aus der Asche wird das Land aus den Kriegstrümmern auferstehen, seine zerstörte Wirtschaft wiederaufbauen und den Weg zum Wohlstand einschlagen. Angetrieben von einer Mischung aus visionären Staatsreformen und einer disziplinierten Ausgabenpolitik wird unser Land zum Wirtschaftszentrum Deutschlands aufsteigen. Dank einer makellosen Verwaltung und einer strategischen Ausrichtung auf das wirtschaftliche Wachstum wird dieser entschlossene Wandel einen entscheidenden Moment in der deutschen Geschichte markieren und das Schicksal Sachsens bis weit in die Zukunft prägen."
 saxon_industrialization: "Sächsische Industrialisierung"
 saxon_industrialization_desc: "Da Sachsen im Vergleich zu anderen Regionen einen hoch entwickelten Industriesektor besitzt, steht die frühe Industrialisierung kurz bevor. Die Manufakturen, die hauptsächlich Waren für die Ausfuhr produzieren, haben sich bewiesen und werden Sachsen zu einem führenden Land im Industrialisierungsprozess Deutschlands machen. Das Entstehen kleinerer Gewerbelandschaften und der Handel werden das Wirtschaftswachstum der Region und die Anbindung an andere europäische Märkte maßgeblich fördern."
 # Lithuanian
 land_of_many_religions: "Land vieler Religionen"
 land_of_many_religions_desc: "Unser Volk hat die Möglichkeit, mit Menschen vieler Glaubensrichtungen zusammenzuleben. Diese vielfältige Gesellschaft ist in unseren rechtlichen Rahmenbedingungen und Überzeugungen fest verankert. Gemeinsam sind wir stärker!"
 ukrainian_farmlands: "Ukrainisches Ackerland"
 ukrainian_farmlands_desc: "Die Ukraine – oder in slawischer Sprache „das Grenzland“ – ist eine der fruchtbarsten Regionen $europe$s. Die Lande an beiden Ufern der großen Flüsse sind für ihre reichhaltige schwarze Erde berühmt, die üppige Ernten aus Getreide, Hülsenfrüchten und Faserpflanzen ermöglicht. Wer auch immer diese Territorien hält, genießt einen bedeutenden landwirtschaftlichen Vorteil und versorgt dadurch sowohl die Kornspeicher das eigenen Reichs als auch die Märkte $europe$s."
 migrant_opportunities: "Möglichkeiten für Migranten"
 migrant_opportunities_desc: "Neue Handelsmöglichkeiten und die Verheißung eines besseren Lebens sind nur einige der Gründe, warum unsere Städte und Siedlungen einen steten Zustrom neuer Migranten erleben. Viele Männer und Frauen beschließen, in unser Land zu ziehen, um ihr Glück zu suchen, was wiederum unseres mehrt."
 two_realms: "Zwei Reiche"
 two_realms_desc: "Aufgrund des schieren Ausmaßes unseres Reichs wurde die Rechtsprechung zweigeteilt. Im Norden liegen unsere Kernterritorien, die mit Stolz unsere kulturellen Traditionen und Bräuche aufrechterhalten. Im Süden und Osten gibt es jedoch ein gewisses Maß an Abweichung von diesen Normen. In diesen Territorien achten wir die Vielfalt, um unsere geopolitische Position zu stärken."
 chacery_slavonic: "Slawische Kanzleisprache"
 chacery_slavonic_desc: "Um die Weite unseres Reichs zu überbrücken, bedarf es einer einheitlichen Sprache und des Einsatzes vieler gebildeter Mitglieder des Klerus, um diese Sprache dann auch zu verbreiten. Die Entwicklung einer solchen Sprache zur Aufzeichnung unserer Geschichte und Aufrechterhaltung unseres Verwaltungsapparats ist nicht nur ein Zeichen von Stolz und Prestige, sondern auch ein Mittel, um eine eigene Regierung zu schaffen, die uns sprachlich und kulturell von unseren östlichen Nachbarn abgrenzt."
 supremus_dux_lithuaniae: "Supremus Dux Lithuaniae"
 supremus_dux_lithuaniae_desc: "Wenn wir uns gegen die Aggression unserer polnischen und russischen Feinde verteidigen möchten, müssen wir unsere Macht projizieren! Der Titel des #italic Obersten Herzogs von Litauen#! wird uns die nötige Autorität sichern, was deshalb besonders wichtig ist, da unser Adel und jene, die versuchen, unsere Souveränität zu verletzen, immer mehr an Macht gewinnen."
 ties_with_the_holy_see: "Beziehungen zum Heiligen Stuhl"
 ties_with_the_holy_see_desc: "Die vielen Jahre zahlreicher Verhandlungen mit dem Heiligen Vater führten letztlich dazu, dass wir mit dem Segen unserer polnischen Nachbarn und dem Papst selbst durch eine stürmische und einzigartige Christianisierung den katholischen Glauben annahmen. Da wir nun nicht länger auf der Suche nach unserer spirituellen Identität sind, mauserten wir uns zu einem Leuchtturm des Katholizismus und einem Schild gegen jene Heiden und Ketzer, die unsere Grenzen zu durchbrechen versuchen."
 patriarchate_of_lithuania: "Litauisches Patriarchat"
 patriarchate_of_lithuania_desc: "Unser Lossagen von der $romuva$, einem Glauben, der von unseren Vorfahren praktiziert wurde, hat das gesellschaftliche Grundgerüst des litauischen Volkes erschüttert. Um uns eine Zukunft und eine Identität zu sichern, haben wir den Weg der Orthodoxie gewählt. Die Oberhäupter unseres neuen othodoxen Glaubens müssen jedoch ihre Autonomie gegenüber fremden Patriarchaten bewahren, um eine Einmischung von außen zu vermeiden."
 columns_of_gediminids: "Gediminassäulen"
 columns_of_gediminids_desc: "Der Stolz unseres Volkes und das Wappen, das unsere Banner ziert, stammt von unserer prestigereichsten und erfolgreichsten Dynastie: den Gediminiden. Viele der klügsten Köpfe aus ihrer Dynastie haben unsere Nation durch turbulente Zeiten geführt, uns Wohlstand gebracht, sorgfältig unseren Staat aufgebaut und uns Führung gegeben. Die Säulen dieser großen Anführer symbolisieren die Stärke und die Zähigkeit unseres Landes und unserer Männer und Frauen."
 warlord_dukes: "Kriegerfürsten"
 warlord_dukes_desc: "In bemerkenswerten zwei Jahrhunderten voller erbitterter Kriege gelang es den Kriegerfürsten Litauens, das Land und die Stämme zu einen, die Eroberungspläne der katholischen Ordenskrieger zu durchkreuzen und riesige Ländereien im Osten zu erobern. Unsere militärischen Befehlshaber blicken voller Bewunderung auf ihre inspirierenden Errungenschaften."
 auksine_laisve: "Auksine Laisve"
 auksine_laisve_desc: "„Auksine Laisve“ – litauisch für „Goldene Freiheit“ – war eine Sammlung von Gesetzen und Privilegien, durch die dem Adel eine Position über allen anderen Ständen zugesichert wurde, oft sogar über dem Monarchen und dem Parlament. Dieses einzigartige System, das man aus Polen übernahme, stärkt die Treue des Adels gegenüber der Krone, solange der Monarch davon absieht, sein Versprechen von der Goldenen Freiheit zu brechen."
 magdeburg_laws: "Magdeburger Gesetze"
 magdeburg_laws_desc: "Infolge der immer westlicher werdenden Orientierung Litauens wurden in vielen städtischen Gebieten deutsche Gesetze eingeführt. Die Magdeburger Gesetze wurden an die örtlichen Gegebenheiten angeglichen und regelten, als die Verstädterung des Landes begann, viele Aspekte des wirtschaftlichen und politischen Lebens, von der Stadtplanung bis zur Steuererhebung."
 magnate_estates: "Magnaten-Stände"
 magnate_estates_desc: "Magnates in $LIT$ are called 'little kings' for their vast estates and private armies. Defending the indivisibility of their domains and trying to maximize the profits from them, they will develop a system in many regards resembling that of ancient Roman #italic Latifundia#!, wherein wealthy individuals hold large estates, often worked by slaves or tenant farmers."
 lithuanian_hussars: "Litauische Husaren"
 lithuanian_hussars_desc: "Flügelhusaren sind schwere Kavallerietruppen, die für Litauen ebenso typisch wie für Polen sind. In beiden Ländern wurden sie durch Reformen des Königs von Polen und Großherzogs von Litauen, Stephan Báthory, eingeführt. Für mehr als ein Jahrhundert sollten sie auf den Schlachtfeldern Osteuropas unbesiegbar bleiben."
 statutes_of_lithuania: "Litauische Statuten"
 statutes_of_lithuania_desc: "Die Litauischen Statuten beschreiben die Gesamtheit von drei verschiedenen Gesetzesreformen zur Sammlung, Vereinheitlichung und Modernisierung der Reichsgesetze. Ähnlich wie die zeitgenössischen westlichen Strafgesetze waren auch hier harte Strafen, bis hin zur Todesstrafe, vorgesehen. In der Theorie sollte unabhängig von der Standeszugehörigkeit die gleiche Strafe für alle gelten, doch in der Praxis hatte die Bauernschaft viele Nachteile. Die Litauischen Statuten dienten später als Beispiel für ähnliche Reformen in Russland."
 lithuanian_renaissance: "Litauische Renaissance"
 lithuanian_renaissance_desc: "Litauen erlebt im späten 15. und frühen 16. Jahrhundert eine Renaissance, die von den Ideen der Reformation und dem italienischen Einfluss, der Bildung, den Künsten, der Architektur und der Literatur in dieser Ära inspiriert ist. Die litauische Sprache wird verschriftlicht und die ersten Werke entstehen in der Landessprache."
 bavarian_legitimacy: "Herzogtum Bayern"
 bavarian_legitimacy_desc: "Der Kaiser selbst hat uns den Titel der Herzöge von Bayern verliehen. Indem wir uns als Beschützer des Herzogtums Bayern beweisen, stellen wir sicher, dass unsere Legitimität niemals infrage gestellt werden wird."
 bavarian_imperial_knights: "Bayerische Reichsritter"
 bavarian_imperial_knights_desc: "Unser Adel hat sich im Dienste des Heiligen Römischen Reichs als hervorragende Ritter bewiesen. Wir sollten die Reichsritterschaft fördern, um die Integrität unserer Herrschaft abzusichern."
 exploit_the_alpine_trade: "Handelsknoten Bayern"
 exploit_the_alpine_trade_desc: "Unser Land wird oft von Händlern besucht, die Salz, Silber und Vieh in die reichen Länder in unserem Süden bringen. Wir wären dumm, wenn wir ihre Anwesenheit nicht ausnutzen und dafür sorgen würden, dass diese Handelsrouten unseren Siedlungen zugutekommen."
 bavarian_brewing_expertise: "Meisterhafte Bierbrauer"
 bavarian_brewing_expertise_desc: "Unser Land besitzt alle Rohstoffe, die zum Bierbrauen benötigt werden, und unser Volk nutzt diese Tatsache nur zu gern aus. Viele der kleinen Brauereien könnten sich mit der richtigen Unterstützung zu erfolgreichen Unternehmen entwickeln."
 bavarian_culture_buildings: "Bayerische Kultureinrichtungen"
 bavarian_culture_buildings_desc: "Unsere Heimat liegt am Fuße der wunderschönen Alpen, eine Tatsache, die viele Künstler aus ganz Europa anzieht. Der Bau und die Förderung von Kultureinrichtungen würde uns erlauben, unseren Hof zu einem kulturellen Zentrum zu machen, und uns einen Platz unter den prestigereichsten Mächten Europas sichern."
 bavarian_stem_duchy: "Traum der Vereinigung"
 bavarian_stem_duchy_desc: "Das bayerische Volk und die bayerische Kultur standen einst unter dem vereinten Banner des Königreichs Bayern. Wir müssen es zu unserem Ziel machen, einen ebenso starken Staat zu errichten, und dem bayerischen Volk eine Heimat bieten."
 bavarian_zelousness: "Ein Glaube für Bayern"
 bavarian_zelousness_desc: "Wir müssen dafür sorgen, dass unser Volk im Glauben vereint bleibt und sich nicht von ketzerischem Gedankengut in die Irre führen lässt."
 bavarian_hofkriegsrat: "Bayerischer Hofkriegsrat"
 bavarian_hofkriegsrat_desc: "Die Einrichtung eines Rates, der die alleinige Aufgabe hat, unseren Herrscher in Konfliktsituationen zu beraten, wird dazu beitragen, die militärische Stärke des bayerischen Staates zu stärken."
 bavarian_flexible_diplomats: "Praktische Diplomatie"
 bavarian_flexible_diplomats_desc: "Ob wir es mit unserem kaiserlichen Suzerän oder mit einem potenziellen Verbündeten zu tun haben, unsere Diplomaten müssen auf alles vorbereitet sein. Nur wenn wir die bayerischen Interessen sorgfältig verteidigen und ihnen die höchste Priorität einräumen, werden wir siegreich sein."
 foundation_of_bavarian_army: "Eine Armee für Bayern"
 foundation_of_bavarian_army_desc: "Wir können unsere Ziele nur mit einer beachtlichen Armee verwirklichen. Um unsere Staatsfinanzen bei der Erweiterung unserer Armee jedoch nicht zu sehr zu belasten, müssen wir unseren Schwerpunkt weise wählen."
 bavarian_coinage: "Bayerische Münzen"
 bavarian_coinage_desc: "Unser Reich benötigt eine neue standardisierte Münze, die dem bayerischen Volk als einheitliche Währung dient. Eine vom Staat kontrollierte Münzprägung in unserem Hauptsitz zu errichten, würde uns die volle Kontrolle über diese neue Währung geben."
 bavarian_purity_law: "Bayerisches Reinheitsgebot"
 bavarian_purity_law_desc: "Die Qualität unseres Bieres wird seit Jahrhunderten anerkannt, aber um wahren Ruhm zu erlangen, müssen wir seinen prestigeträchtigen Status für alle Ewigkeit zementieren. Mehrere unserer Herrscher haben in der Vergangenheit versucht, das Brauen dieser wunderbaren Substanz zu regulieren. Wir sollten diese Regulierungen offiziell anerkennen und sie als Qualitätssiegel für unsere Brauereien einführen."
 hsa_holpfennige: "Hohlpfennig"
 hsa_holpfennige_desc: "Die ursprünglich zwischen den Städten $LUB$ und $HAM$ geprägten #italic Hohlpfennige#! waren eine Hohlwährung, die man als Gegenmaßnahme zur zu dieser Zeit häufigen Geldentwertung entwickelte. Sie rührte daher, dass jede Münzprägerei unterschiedliche Maßstäbe für die Menge an Reinsilber in jeder Münze hatte. Die Währung soll mehr Handel anziehen und die Kluft zwischen fremden Märkten und unseren eigenen Kaufleuten überbrücken."
 hsa_the_cog: "$n_hanseatic_cog$"
 hsa_the_cog_desc: "$n_hanseatic_cog_desc$"
 hsa_hanseatic_ties: "Hanseatische Diplomatie"
 hsa_hanseatic_ties_desc: "Unser Bund setzt sich aus einer Vielzahl von Städten und Handelszünften zusammen, die alle ihre eigenen Ziele verfolgen. Wenn wir unseren Wohlstand bewahren und unsere Reichweite vergrößern wollen, müssen wir unsere diplomatischen Beziehungen pflegen."
 hsa_seal_of_the_hansa: "Siegel der Hanse"
 hsa_seal_of_the_hansa_desc: "Unsere Händler sind auf allen europäischen Märkten vertreten, von $london$ bis nach Nowgorod, und für ihren Wohlstand wohlbekannt. Unsere Fähigkeit, riesige Handelsflotten zu mobilisieren und Dutzende von Städten in eine perfekte Sinfonie von Gewinnen und Warenaustausch zu bringen, ist einzigartig."
 hsa_hanseatic_shipwrights: "Schiffbauer der Hanse"
 hsa_hanseatic_shipwrights_desc: "In Zeiten, in denen in $europe$ Kriege toben und Herrscher ihre Ansprüche durchsetzen, um ihre Domäne zu erweitern, wenden sie sich an uns, um große Flotten aufzustellen, die ihnen dabei helfen, ihre Ambitionen zu erreichen. Mit dem gebündelten Wissen von Jahrhunderten und einigen der besten Hölzer des Kontinents gelingt unseren Schiffbauern Unvergleichliches!"
 hsa_hanseatic_fortifications: "$HSA_ADJ$ Fortifications"
 hsa_hanseatic_fortifications_desc: "The $hsa_burgtor$ is more than a gate. It is a statement of power and permanence, raised at the entrance to our greatest cities to announce that the wealth of the $HSA$ is well protected. Where our merchants travel and prosper, the fortifications of the $HSA$ shall stand to safeguard them."
 hsa_draft_merchant_privileges: "Handelsprivilegien"
 hsa_draft_merchant_privileges_desc: "Die Händler, die unter unserem Siegel Geschäfte machen, haben enormen Einfluss und viel Geld. Indem wir ihre Privilegien sowohl auf fremden als auch auf unseren eigenen Märkten festigen, werden unsere Gewinne weiter steigen."
 hsa_mastery_of_the_sea: "Beherrschung des Meeres"
 hsa_mastery_of_the_sea_desc: "Durch unsere Marinetraditionen ist unser Glück fest mit dem der mächtigen See verwoben. Wir wissen die Macht des Meeres zu nutzen und es zu respektieren, was uns enorme Vorteile im Handel bringt."
 hsa_exchange_of_ideas: "Austausch von Ideen"
 hsa_exchange_of_ideas_desc: "Reisende Händler, die unsere Waren in ferne Länder bringen, bringen auch fremdes Wissen mit zurück an unsere Küsten."
 hsa_global_reach: "Globale Reichweite"
 hsa_global_reach_desc: "Der Beginn des Welthandels hat große Wellen getragen. Der regelmäßige Handel mit fremden Kaufleuten aus weit entfernten Ländern boomt und davon profitiert auch unsere Staatskasse."
 hsa_hanseatic_treasury: "Schatzkammer der Hanse"
 hsa_hanseatic_treasury_desc: "Unsere starke und gesunde Wirtschaft ist das Ergebnis unseres fortwährenden Wohlstands. Dank der vielen Münzen ist unsere Schatzkammer prall gefüllt; sie hat uns als solider und verlässlicher Kreditgeber etabliert."
 hsa_regularized_contributions: "Normalisierte Abgaben"
 hsa_regularized_contributions_desc: "Die vielen Einheiten innerhalb unseres Bundes müssen unter unsere feste Kontrolle gebracht werden, um ihre monatlichen und jährlichen Beiträge zu unserer Schatzkammer zu vereinheitlichen."
 hsa_reform_the_hanstag: "Reformierung des Hansetags"
 hsa_reform_the_hanstag_desc: "Wir leben in einer Zeit, in der sich Gedanken fortwährend weiterentwickeln und zu Unruhen führen. Wir müssen unsere zentralen Versammlungs- und Beratungsinstitutionen an diese neuen Prozesse anpassen, um den Fragen unserer Zeit nachkommen zu können."
 hsa_concept_of_mercantilism: "Konzept des Merkantilismus"
 hsa_concept_of_mercantilism_desc: "In den letzten Jahrhunderten haben wir unermüdlich darauf hingearbeitet, unseren Handel auf den Welthandel auszurichten. Wir müssen jetzt jedoch mehr denn je unsere eigenen Händler schützen, damit wir nicht hinter unsere Konkurrenten zurückfallen."
 the_hansa_bank: "Hansebank"
 the_hansa_bank_desc: "Mit dem neuen Abgabensystem können wir nun eine Bank gründen, die unsere Mitglieder nutzen können. Die Wirtschaftskraft des Hansebundes wird dafür sorgen, dass die Kredite der Bank genauso nützlich wie Bargeld sind. Zusammen mit anderen Finanzinstrumenten wird dies unseren Kaufleuten einen Vorteil gegenüber anderen Ländern geben."
 #Palatine
 pal_palatine_lion: "Pfälzer Löwe"
 pal_palatine_lion_desc: "Der Pfälzer Löwe, der aus dem Wappen der Wittelsbacher stammt, repräsentiert unsere Legitimität. Die rote Krone symbolisiert unsere Rolle als Statthalter und Oberhofmeister des Heiligen Römischen Reichs. Solange der Löwe voller Stolz auf unserem Banner prangt, wird niemand unsere Legitimität infrage stellen."
 pal_castles_on_rhine: "Burgen entlang des Rheins"
 pal_castles_on_rhine_desc: "Durch den Bau mehrerer Burgen an Schlüsselpositionen entlang des Rheins werden wir in der Lage sein, unsere Kontrolle über den Fluss und den durch ihn fließenden Handel weiter auszubauen."
 pal_cultivate_vineyards: "Weinberge und Obstgärten des Rheins"
 pal_cultivate_vineyards_desc: "Unser Land ist zwar eher klein, doch das sonnige Ufer des Rheins bietet die idealen Voraussetzungen für den Anbau von Wein und Obst. Mit ein paar Investitionen könnten wir unsere Wirtschaft auf der Ausfuhr von Wein aufbauen."
 pal_protection_of_exclaves: "Örtliche Befestigung"
 pal_protection_of_exclaves_desc: "Da unsere Gebiete verstreut sind, sind wir Angriffen verschiedener fremder Mächte ausgesetzt. Der Bau zahlreicher befestigter Außenposten in unserem Land verschafft uns Zeit, eine Armee aufzustellen und jeden Versuch, eines unserer vielen voneinander getrennten Gebiete zu erobern, abzuwehren."
 pal_fractured_territory: "Vereintes Land"
 pal_fractured_territory_desc: "Unsere Verwaltung weiß, wie man mehrere nicht zusammenhängende Territorien verwaltet, ohne die Kontrolle darüber zu verlieren. Wir können diesen Umstand nutzen, um selbst die schwierigsten Aufgaben zu bewältigen."
 pal_a_just_ruler: "Gnädiger und besonnener Herrscher"
 pal_a_just_ruler_desc: "Blutvergießen führt nur zu weiterem Blutvergießen. Wir müssen vergeben und uns mit unseren Feinden versöhnen, um unserem Land langwährenden Frieden zu bringen."
 pal_heaven_of_tolerance: "Pfälzische Toleranz"
 pal_heaven_of_tolerance_desc: "Alle Christen sind unabhängig von ihrem Glauben in unseren Städten und Gemeinden willkommen. Wo andere religiöse Minderheiten unterdrücken, wird unsere Toleranz dafür sorgen, dass wir immer einen steten Strom an Zuwanderung haben."
 pal_mildness_to_the_commoners: "Vergebung für Bauern"
 pal_mildness_to_the_commoners_desc: "Wenn sich unsere Bauernschaft gegen unseren Adel auflehnt, lehnt sie sich unmissverständlich auch gegen unsere Herrschaft auf. Wir sollten die Aufständischen jedoch nicht übermäßig bestrafen. Indem wir Milde walten lassen, wird niemand unsere Herrschaft wirklich ablehnen."
 pal_humanist_court: "Humanistische Bildung"
 pal_humanist_court_desc: "Um gut zu regieren, müssen unsere Herrscher eine umfassende Bildung in humanistischen Ideen erhalten. Zu diesem Zweck müssen wir renommierte Humanisten für die Ausbildung unserer Herrscher und ihrer Nachfolger anwerben und zugleich unseren Hof nach diesen Prinzipien ausrichten."
 pal_heidelberg_catechism: "Heidelberger Katechismus"
 pal_heidelberg_catechism_desc: "Die Reformation brachte viele Diskussionen über das Wesen unseres Glaubens hervor. Wir müssen in einen Katechismus investieren, an den sich unser Volk halten kann."
 pal_bilbiotheca_palatina: "Schutz der #italic Bibliotheca Palatina#!"
 pal_bilbiotheca_palatina_desc: "Die #italic Bibliotheca Palatina#! beinhaltet zahlreiche theologische Schriften verschiedener christlicher Konfessionen und gehört damit zu unserem wertvollsten Besitz. Ihr Schutz und der des in ihr geborgenen Wissens sowie die Wahrung der kulturellen Werte, die damit einhergehen, müssen höchste Priorität haben, damit wir uns auch weiterhin auf ihre Schriftstücke verlassen können."
 palatinate_romanticism: "Unterstützung der Romantischen Bewegung"
 palatinate_romanticism_desc: "Viele Anhänger der Romantik haben sich rund um Heidelberg niedergelassen. Wir sollten uns das zunutze machen und diese und andere Künstler unterstützen, die unserem Land Ruhm einbringen."
 amazigh_slave_raids: "Berber-Sklavenraubzüge"
 amazigh_slave_raids_desc: "Die Küsten unseres Landes sind bestens dafür geeignet, für einen ständigen Strom an Vertragsbediensteten und Gefangenen aus ganz Europa zu sorgen. Diese Arbeitskräfte werden eine Schlüsselrolle dabei spielen, der Welt unsere Macht zu demonstrieren und gleichzeitig unsere Gewinne zu steigern."
 zenata_roots: "Zanatanische Wurzeln"
 zenata_roots_desc: "Unser Volk stammt von den Zanata ab, einem Stamm, der für seine bescheidene, aber dennoch wichtige Wollproduktion bekannt ist und riesige Schafherden verwaltete."
 mor_atlas_strongholds: "Festungen des Atlas"
 mor_atlas_strongholds_desc: "Die Gebirgszüge, die den größten Teil unseres Landes einnehmen – die verschiedenen Ausläufer des Atlas und des Rif – sind der Grund, warum kein Imperium $MOR$ je wirklich erobern konnte. Unsere Berber-Bergvölker verteidigen diese Pässe seit jenen Zeiten, als die römischen Armeen sie zum ersten Mal durchquerten, und unser Wissen über jeden Pfad und jede Zuflucht ist unübertroffen. Die Berge bremsen uns nicht: Sie beschützen uns."
 mor_marabouts: "Ṣūfī-Marabout"
 mor_marabouts_desc: "Mehrere Ṣūfī-Gelehrte haben Marokko zu ihrer Heimat gemacht. Wir müssen sicherstellen, dass wir diesen heiligen Männern gute Gastgeber sind und uns ihre Lehren zu Herzen nehmen."
 trans_saharan_trade: "Transsaharahandel"
 trans_saharan_trade_desc: "Die Karawanen, die die großen Sahararouten bereisen, handeln $salt$ und andere Waren aus $north_africa$ gegen $slaves_goods$ und $goods_gold$ aus den Königreichen südlich der Wüste. Auf diesen wertvollen Münzen werden wir unser großes Vermächtnis errichten."
 first_fleet_of_the_med: "Erste Flotte des Mittelmeers"
 first_fleet_of_the_med_desc: "Die einst große Dynastie der al-Muwaḥḥidūn, auch Almohaden genannt, besaß einst die eindrucksvollste Flotte im gesamten Mittelmeer. Unser Volk lebt noch immer nach ihrer Marinetradition und verfügt über das nötige Wissen, um diese Leidenschaft für Schiffe wiederaufleben zu lassen und allen unsere Größe auf See zu demonstrieren."
 slave_soldiers: "Sklavensoldaten"
 slave_soldiers_desc: "Wir nutzen die gut ausgebildeten und disziplinierten Sklavensoldaten unserer Gesellschaft, um die Treue unseres stehenden Heers zu gewährleisten."
 desert_power: "Wüstenmacht"
 desert_power_desc: "Unser Land wird von vielen Bauern und Stämmen bewohnt, die den Großteil unserer Unterschicht ausmachen. Trotz ihrer Armut verfügen sie über einen beachtlichen Einfluss auf die kargen Wüstenhandelsrouten, die unsere Städte miteinander verbinden. Indem wir uns ihre Treue sichern, bauen wir unsere Macht über die Wüste weiter aus."
 atlantic_trade_routes: "Atlantische Handelsrouten"
 atlantic_trade_routes_desc: "Die neuen Seewege, die die Europäer vorsichtig befahren, haben die Schleusen für Waren und Münzen aus der Neuen Welt und dem Fernen Osten geöffnet."
 foreign_politics: "Fremdländische Politik"
 foreign_politics_desc: "Um einen Sieg gegen unsere Feinde davonzutragen, müssen wir lernen, wie wir angemessene diplomatische Beziehungen zu jenen Ländern aufbauen, die unseren Feinden gegenüber ebenfalls feindselig eingestellt sind, und anschließend mit ihnen zusammenarbeiten."
 saharan_gold_trade: "Sahara-$goods_gold$-Handel"
 saharan_gold_trade_desc: "Das $goods_gold$, das man innerhalb unserer Grenzen abbaut, ist von überlegener Güte und ein hervorragendes Werkzeug, um unseren Einfluss über Handelsrouten in fremdländische Häfen auszudehnen."
 jaysh_armies_advance: "Dschaische Armeen"
 jaysh_armies_advance_desc: "Der Anbruch eines neuen Zeitalters in der Kriegsführung hat es erforderlich gemacht, eine Armee aus Stammesangehörigen aufzustellen, die nur uns gegenüber treu ergeben sind. Sie wird uns dabei helfen, die Ressourcen unseres riesigen Reichs nutzbar zu machen."
 black_guard: "$a_black_guard$"
 black_guard_desc: "$a_black_guard_desc$"
 shurfa_status: "Schurfā-Status"
 shurfa_status_desc: "Unter allen Bewohnern der islamischen Welt gibt es nur wenige, die ein solches Ansehen genießen wie wir und sich mit Stolz als Nachkommen des großen Propheten bezeichnen können."
 maghrebi_administration: "Maghrebinische Verwaltung"
 maghrebi_administration_desc: "Die jahrhundertelange Autonomie und die harten Bedingungen unseres Landes lösten innerhalb unserer Grenzen oft separatistische Bewegungen aus. Wenn wir in der Region eine gesunde Präsenz aufbauen wollen, müssen wir sicherstellen, dass jeder Stamm innerhalb unserer Grenzen weiß, wer sein wahrer Herr ist."
 barid: "Barīd"
 barid_desc: "Dieser Postdienst, der selbst die entlegensten Winkel unseres Reichs bereist, ist für die Kommunikation zwischen unserem Hauptsitz und den Statthaltern in unserem Land zuständig."
 karimi_merchants: "Kārimī-Kaufleute"
 karimi_merchants_desc: "Diese einflussreichen Kaufleute, die vor allem mit Gewürzen handeln, erzielen hohe Gewinne mit den exotischen Waren, die ihren Ursprung bis zu den Küsten von Aden, Indien und darüber hinaus haben."
 mamluk_soldiers: "$a_mamluk_unit_traditions$"
 mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"
 royal_mamluks: "Königliche Mamālīk"
 royal_mamluks_desc: "Die Königlichen Mamālīk sind das Elitekorps der mamlūkischen Armee, das als Leibwache des Sultans dient. Seine Mitglieder werden handverlesen und gründlichst ausgebildet, sodass sie bekannt für ihre Treue, ihr herausragendes Kampfgeschick und ihre unerschütterliche Ergebenheit sind."
 red_sea_trade: "Handel im Roten Meer"
 red_sea_trade_desc: "Da der Gewürzhandel im Roten Meer eine wichtige Einnahmequelle ist, müssen wir dafür sorgen, dass wir diesen Handel auch kontrollieren. Indem wir allen nicht unter unserer Kontrolle stehenden Häfen im Roten Meer, welche Gewürzhändler akzeptieren, damit drohen, sie niederzubrennen, werden wir uns den Löwenanteil an diesem Handel sichern."
 mamluk_halqah: "$a_halqah_unit$"
 mamluk_halqah_desc: "$a_halqah_unit_desc$"
 reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"
 kashif: "Kaschif"
 kashif_desc: "Unser Sultanat ist riesig, was eine ordnungsgemäße Verwaltung umso wichtiger macht. Es könnte sich auszahlen, Gelehrte als Statthalter einzusetzen, um die Waagschale zu unseren Gunsten zu beeinflussen."
 port_customs: "Hafenzölle"
 port_customs_desc: "Unsere Häfen zu offiziellen Handelszonen für die Einfuhr von Waren zu erklären, wird die Bedeutung unseres merkantilen Territoriums sehr zum Leidwesen unserer Nachbarn und Feinde erhöhen."
 masters_of_the_nile: "Herren des Nils"
 masters_of_the_nile_desc: "Unser Land lebt am, vom und durch den Nil. Das lebenswichtige Wasser des Flusses fließt durch unsere fruchtbarsten Lande und sorgt in unserem ganzen Reich für Wohlstand und Reichtum."
 indian_networks: "Indisches Netzwerk"
 indian_networks_desc: "Unsere Kaufleute bieten ihre Waren auf zahlreichen Märkten von Alexandria bis zu den Küsten von Aden und sogar Indien an. Unser riesiges Netzwerk an Kontakten, Geschäftsmöglichkeiten und all der Reichtum haben uns zum Spitzenreiter im maritimen Handel gemacht."
 study_foreign_gunpowder_techniques: "Schießpulver"
 study_foreign_gunpowder_techniques_desc: "Die Großreiche Europas und des Ostens machten große Fortschritte im Umgang mit Schießpulver und dessen militärischer Verwendung. Ihre Techniken zu studieren und sie zu verbessern, würde unsere eigenen Truppen deutlich stärker machen."
 secure_mediterranean_ports: "Mittelmeerhäfen"
 secure_mediterranean_ports_desc: "Unsere Mittelmeerhäfen gehören zu den wohlhabendsten in der gesamten Region. Kaufleute aus allen Teilen der Welt reisen nach Alexandria und Kairo, um mit Gewürzen, Seide und Edelsteinen zu handeln. Es könnte klug sein, eine Handelsflotte zu errichten, um unsere Seewege zu schützen und den Transport von Waren zu erleichtern."
 bohemian_imperial_standing: "$BOH_ADJ$e Stellung im HRR"
 bohemian_imperial_standing_desc: "Unsere Stellung innerhalb des Heiligen Römischen Reichs ist von Prestige, Größe und Autorität geprägt. Dank unserer fähigen Diplomaten und der weitläufigen Bündnisse verfügen nur wenige Mitglieder des Reichs über so viel Macht wie wir."
 bohemian_crystal: "Böhmischer Kristall"
 bohemian_crystal_desc: "Nur wenige Werkstätten auf der Welt haben die Fertigkeit, Glas und Kristall einer solch hohen Qualität und Klarheit zu produzieren wie wir."
 students_of_foreign_courts: "Studenten fremder Höfe"
 students_of_foreign_courts_desc: "Die Mitglieder unseres Königshauses reisen oft an fremde Höfe fernab ihrer Heimat, um Wissen zu erlangen und sich in der Staatskunst weiterzubilden."
 urbanization_decrees: "Urbanisierungsdekret"
 urbanization_decrees_desc: "Zur Modernisierung von $prague$ geben wir berühmten Persönlichkeiten der Stadt Zuschüsse, damit diese ihre Geschäfte in die Stadt verlegen. Wir ziehen auch Unternehmer aus dem Ausland an und bieten ihnen eine Chance, ihre gesellschaftliche Stellung in unserer schönen Metropole zu verbessern."
 seat_of_metropolitan_bishop: "Sitz eines Metropoliten"
 seat_of_metropolitan_bishop_desc: "Das russische Volk braucht einen religiösen Anführer. Wir haben schon immer gute Beziehungen zur Kirche gepflegt und könnten beide durch den Ausbau dieser Freundschaft profitieren. Wenn wir den Metropoliten dazu bringen könnten, seinen Sitz nach Moskau zu verlegen, würden wir die Beziehungen zwischen dem russisch-orthodoxen Glauben und unserem Staat weiter stärken."
 pomestnoe_voisko: "Pomestnoe Wojsko"
 pomestnoe_voisko_desc: "Durch die Umverteilung von konfisziertem Land an edle Kavalleristen können wir eine neue Klasse von Soldaten aufbauen, die unser Fürstentum unterstützen."
 strength_of_the_boyars: "Stärke der Bojaren"
 strength_of_the_boyars_desc: "Die Bojaren sind in vielerlei Hinsicht das Fundament, auf dem das russische Kaisertum aufgebaut ist, aber so sehr wir die Bojaren auch stärken müssen, müssen wir auch sicherstellen, dass wir sie kontrollieren. Wir müssen sowohl den Sitz der Bojaren in der Duma schützen als auch dafür sorgen, dass sie auf uns angewiesen sind, wenn sie ihren Einfluss zu erhöhen versuchen."
 zasechnaya_cherta: "Sasetschnaja Tscherta"
 zasechnaya_cherta_desc: "Um sich vor den tatarischen Überfällen zu schützen, haben unsere Vorfahren eine Reihe eng positionierter und gut zu verteidigender Festungen errichtet. Wir sollten diese „Verhaulinie“ parallel zur Expansion unseres Staates ausbauen und sicherstellen, dass wir unser Volk gegen jegliche Angriffe schützen können."
 russian_artillery_yard: "Russischer Artilleriehof"
 russian_artillery_yard_desc: "Überlegene Feuerkraft ist das, was die Belagerungen von heute und die Schlachten von morgen ausmachen. Wir müssen einen hochmodernen Artilleriehof im Kernland unserer Nation bauen, um sicherzustellen, dass unserer Armee niemals die Kanonen oder die Munition ausgehen."
 life_long_conscription: "Lebenslange Wehrpflicht"
 life_long_conscription_desc: "Um unsere ständig wachsende Armeen mit frischen Soldaten versorgen zu können, müssen wir den Militärdienst dahin gehend erweitern, dass er eine lebenslange Verpflichtung wird. Dies wird jenen soziale Mobilität bieten, die sonst ein Leben in niedrigeren Berufen führen würden, und es wird uns eine zuverlässige Quelle an Soldaten für unsere Expansionsbestrebungen gewähren."
 the_mestnichestvo_advance: "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"
 table_of_ranks: "Rangtabelle"
 table_of_ranks_desc: "Die Abschaffung des Mestnitschestwo war der erste Schritt zu einer leistungsorientierten staatlichen Bürokratie. Die Rangtabelle gab der Reform ihren gesetzlichen Rahmen und schrieb außerdem vor, dass eine Beförderung in der Armee nur in den nächsthöheren Rang möglich war."
 voivode_advance: "Woiwode"
 voivode_advance_desc: "The #italic Voivode#! is a military leader with regional administrative authority, defending territory and maintaining order. A voivode can be useful in overcoming the challenges posed by the limited means of communication available, as they have the authority to make crucial decisions without waiting for approval."
 wojewodztwo_advance: "Wojewodztwo"
 wojewodztwo_advance_desc: "In the Polish Crown, the #italic Wojewoda#! is a powerful magnate appointed by the king to administer a voivodeship and lead its regional sejmik. Holders of this dignity sit on the royal council and command significant influence over provincial affairs, often outshining the king's own reach in their lands."
 voievodate_advance: "Voievodate"
 voievodate_advance_desc: "Across the Carpathian basin, the #italic Voievod#! stands as both sovereign ruler in Wallachia and Moldavia and as a high crown office in Transylvania and the Hungarian kingdom. The office binds the ruler to a powerful nobility through ancient custom and elective right."
 vojvodstvo_advance: "Vojvodstvo"
 vojvodstvo_advance_desc: "Among the South Slavs, the #italic Vojvoda#! serves as a high military commander, leading the nobles into battle and administering frontier lands. The title is preserved through generations of war, carried by princely warlords and resistance leaders alike."
 haudenosaunee_tradition: "Hiawathas Vermächtnis"
 haudenosaunee_tradition_desc: "Der legendäre Hiawatha, der unter den Haudenosaunee als großer Redner und Anführer bekannt ist, hat uns gezeigt, wozu ein Diplomat fähig sein kann. Wir werden ihn ehren, indem wir seinem Beispiel bei unseren Diplomatiebeziehungen folgen werden."
 haudenosaunee_heritage: "Erbitterte Krieger"
 haudenosaunee_heritage_desc: "Unsere Feinde begehen einen schweren Fehler, wenn sie uns aufgrund unserer diplomatischen Fähigkeiten als schwach ansehen. Unsere Krieger kämpfen erbittert und voller Stolz und sie zu unterschätzen bedeutet für viele den Untergang."
 tree_of_peace: "Baum des Friedens"
 tree_of_peace_desc: "Der Baum des Friedens ist ein Vermächtnis des Großen Friedensstifters. Er dient den zahlreichen Stämmen als Symbol der Einheit und repräsentiert auch die Häuptlinge selbst."
 kainerekowa: "Kaianere’kó:wa"
 kainerekowa_desc: "Wir müssen das Große Friedensgesetz, ein Geschenk von Hiawatha und dem Großen Friedensstifter, für immer ehren. Dieses Gesetz hat unsere fünf Nationen unter einem gemeinsamen Zweck geeint und beschreibt jene Regeln, auf denen unsere Regierung aufgebaut ist."
 mourning_wars: "Klagekriege"
 mourning_wars_desc: "Unser Volk hat eine uralte Tradition, gefangene Krieger in den Stamm zu adoptieren. Zum Auffüllen unserer Reihen und zur Beibehaltung unserer Kampfkraft sollten wir aber nicht nur einzelne Krieger, sondern ganze Stämme in die Haudenosaunee adoptieren."
 warriors_unity: "Kriegerische Geschlossenheit"
 warriors_unity_desc: "Zahlenmäßig mögen wir zwar nicht der größte Stamm sein, aber aufgrund unserer starken Stammesstrukturen verfügen wir über etwas, woran es den anderen fehlt: Geschlossenheit! Unsere Krieger kämpfen als Brüder und stehen einander in der Schlacht bei. Solange wir uns diese Tradition bewahren, können wir nicht verlieren!"
 haudenosaunee_ambition: "Vorbildliche Konföderation"
 haudenosaunee_ambition_desc: "Die Haudenosaunee-Konföderation hat sich als äußerst erfolgreich erwiesen. Alle unsere Nachbarn blicken mit Bewunderung auf unsere Art der Regierungsführung."
 three_sisters: "Drei-Schwestern-Ackerbau"
 three_sisters_desc: "In unserem Land werden unzählige Feldfrüchte angebaut, doch der gemeinsame Anbau von Mais, Bohnen und Kürbis steigert den Ertrag weitaus mehr, als es der einzelne Anbau würde."
 maple_syrup: "Ahornsirup"
 maple_syrup_desc: "Die vielen Ahornbäume in unserem Land geben reichlich Saft ab, der gesammelt und zu köstlichem Sirup und Zucker verarbeitet werden kann."
 stickball_game: "Stickball"
 stickball_game_desc: "„Stickball“ wird bereits seit Jahrhunderten in unserem Land gespielt. Ob zu rituellen Zwecken oder zur Beilegung von Streitigkeiten versammeln sich Hunderte von Kriegern auf einem Feld mit Holzstöcken und einem Ball, der auf ein markiertes Ziel gelenkt werden muss. Dieser Brauch stärkt nicht nur die Einheit unseres Volkes, sondern sorgt auch dafür, dass unsere Krieger stets in bester Verfassung sind."
 north_american_warrior_societies: "Kriegergesellschaften"
 north_american_warrior_societies_desc: "Our people have long organized into warrior societies, brotherhoods bound by oaths, shared rituals, and a common duty to defend their kin. By formalizing these traditions into Warrior Lodges, we can train a new class of dedicated fighters whose skill and resolve will keep our communities strong long after European weapons arrive on our shores."
 wampum: "Wampum"
 wampum_desc: "Wampum sind weiße oder purpurfarbene Ketten, die aus verschiedenen Muscheln zusammengebunden wurden und für die verschiedensten Zwecke genutzt wurden, wie der Aufzeichnung von Geschichten und Verträgen bis hin zur Verwendung im Tauschhandel."
 shared_brotherhood: "Gemeinsame Bruderschaft"
 shared_brotherhood_desc: "Geeint in den Lehren des Großen Friedensgesetzes pflegt unser Volk trotz unterschiedlicher Stammeshintergründe ein starkes Gefühl der Bruderschaft und der Einheit."
 captives_in_war: "Kriegsgefangene"
 captives_in_war_desc: "Wir führen Kriege hauptsächlich, um Gefangene zu nehmen, die unsere eigenen Verluste ausgleichen. Nicht alle Gefangenen müssen jedoch in unseren Stamm adoptiert werden. Einige können auch einfach unsere Arbeit verrichten."
 haudenosaunee_present_giving: "Haudenosaunee-Geschenkaustausch"
 haudenosaunee_present_giving_desc: "Unsere Handelsbeziehungen basieren auf dem Austausch von Geschenken. Wenn unser Stamm zusammenkommt und zum Wohle der Allgemeinheit arbeitet, folgt auf ein Geschenk garantiert ein weiteres Geschenk im Gegenzug."
 pochtecayotl: "Pōchtēcayōtl"
 pochtecayotl_desc: "Händler reisen an weit entfernte Orte und sogar in Provinzen, die außerhalb unseres Machtbereichs liegen und deren Herrscher sich uns widersetzen. Wenn diese Händler auch gleichzeitig unsere Augen und Ohren sein könnten … welche Geheimnisse werden wir dann wohl in Erfahrung bringen?"
 warrior_societies: "Kriegergesellschaften"
 warrior_societies_desc: "Unsere Gesellschaft belohnt herausragende Leistung im Militärdienst und erlaubt es Bauern (#italic mācēhualtin#!), in den Adel (#italic pīpiltin#!) aufzusteigen. Dies wird durch die immer aufwendigere Kleidung (#italic tlahuiztli#!) dargestellt, die den Rang widerspiegelt. Dieses einzigartige System, das die Leistung eines Einzelnen belohnt, verschafft uns einen deutlichen Vorteil gegenüber benachbarten Gesellschaften."
 chinampas: "Chinampas"
 chinampas_desc: "Unser Volk weiß, wie man Hügel zu Terrassen formt und selbst flache Seen als Ackerland nutzen kann, indem man künstliche Inseln (#italic Chinampas#!) aufschüttet. Die landwirtschaftlichen Fähigkeiten unseres Volkes werden für unsere Gesellschaft von großem Nutzen sein."
 people_of_war: "Kriegervolk"
 people_of_war_desc: "Sei es, um Gefangene für Opferrituale zu nehmen, Prestige zu erlangen, unseren Feinden Angst und Schrecken einzujagen oder einfach nur Reichtümer zu erbeuten, unsere Bevölkerung ist an die ständigen Kriege gewöhnt und weiß mit den Härten besser umzugehen als jede andere."
 tlahtocayotl: "Tlahtohcāyōtl"
 tlahtocayotl_desc: "Um unsere Macht zu zentralisieren, werden wir ein Provinzsystem für jene Stadtstaaten schaffen, die in unser Reich eingegliedert werden."
 calpixcayotl: "Calpixcāyōtl"
 calpixcayotl_desc: "Wir werden unseren Tributprovinzen gesonderte Tributverwalter (#italic Calpixqueh#!) zuweisen. Diese stellen sicher, dass die Tributzahlungen niemals aufhören. Für jeden dieser Tributstaaten wird es einen #italic Calpixqui#! in der Region selbst und einen weiteren in unserem Hauptsitz geben."
 reformed_telpochcalli: "Tēlpōchcalli"
 reformed_telpochcalli_desc: "Da wir ständig auf neue Feinde treffen, werden auch ständig neue Militärtaktiken entwickelt oder übernommen. Dieses unbezahlbare Wissen wird in unseren #italic Tēlpōchcalli#! gelehrt."
 nahuatl_domination: "Dominanz der Nahua"
 nahuatl_domination_desc: "Unsere Kultur ist den anderen um uns herum klar überlegen und das führt dazu, dass sie von immer mehr Menschen angenommen wird. Wir sollten den Einfluss, den wir jenseits unserer Grenzen haben, zu unserem Vorteil nutzen."
 the_return_of_quetzalcoatl: "Rückkehr von Quetzalcōātl"
 the_return_of_quetzalcoatl_desc: "Der Kontakt mit Fremdländern von anderen Kontinenten sorgte für spannende neue Ideen bezüglich unserer Götter. Die Prophezeiung von #italic Quetzalcōātl#! enthüllt eine Wirklichkeit jenseits der Mythen und gibt uns einen Blick auf die Wahrheit. #italic Quetzalcōātl#!, „die Federschlange“, wird schon bald zurückkehren und eine neue Ära einläuten, in der die Dunkelheit unterliegt und man der Aufklärung den Weg ebnet. Als Symbol einer kosmischen Verschmelzung wird unser Gott Materie und Geist verbinden, das Gleichgewicht wiederherstellen und das menschliche Bewusstsein auf eine höhere Ebene führen."
 brave_as_hummingbird: "Tapfer wie ein Kolibri"
 brave_as_hummingbird_desc: "Der Kolibri spielt in unserer Mythologie eine wichtige Rolle und wird oft mit dem Kriegsgott Huītzilōpōchtli verbunden. Er verkörpert die Reinkarnation gefallener Krieger und wird besonders für seine Tapferkeit verehrt. Der Kolibri muss Teil unseres Banners werden, damit er unsere Soldaten dazu inspirieren kann, bis zum Tod zu kämpfen."
 new_trade_opportunities: "Neue Handelsmöglichkeiten"
 new_trade_opportunities_desc: "Die Bedürfnisse unseres Volkes haben sich an die neuen Märkte, die von unseren Händlern erschlossen wurden, angepasst. Unsere Händler wissen, wie sie die Gewinne maximieren, die wir erzielen."
 aztec_chargers: "$AZT_ADJ$er Ansturm"
 aztec_chargers_desc: "Die Aggressivität unserer Krieger ist weit über unsere Grenzen hinaus bekannt. Unsere Feinde erzittern, wenn unsere Krieger bei Beginn einer Schlacht wie Todesbringer auf sie zustürmen."
 chasqui: "Chasqui"
 chasqui_desc: "Die Chasqui sind die Boten unseres Landes. Sie werden aus den zähsten Läufern unseres Landes ausgewählt, um unsere Nachrichten, auch „quipus“ genannt, unsere Geschenke und andere Informationen ans Ziel zu bringen. Die Verbreitung von Ideen und ein Großteil unserer Diplomatie lastet ebenfalls auf ihren Schultern."
 military_mita: "Militärische Mit’a"
 military_mita_desc: "Die Mit’a ist ein obligatorischer Dienst für die Gesellschaft der Inka. Dieses System umfasst nicht nur die kommunalen Aspekte des Staates, sondern bildet auch das Rückgrat des Militärs. Jede Dorfgemeinschaft (Ayllu) in unserem Land muss eine gewisse Anzahl an Männern für unsere Armee bereitstellen, die für den Kampf im Hochland geeignet sind."
 warachikuy: "Warachikuy"
 warachikuy_desc: "Das Warachikuy ist eine heilige Zeremonie, bei der die körperlichen Fähigkeiten, der Mut und der Verstand von jungen Männern auf die Probe gestellt werden. Geschwindigkeit, Treffsicherheit, Nahkampf und Ausdauer bei längerem Schlafentzug werden geprüft. Diejenigen, die diese Prüfungen mit Bravour bestehen, werden in den Rang eines Offiziers für unsere ständig wachsende Armee befördert."
 mitma: "Mitma-Verpflichtungen"
 mitma_desc: "Um große Bauprojekte durchführen zu können, mussten unsere Herrscher in der Vergangenheit alte Traditionen befolgen. Diese sahen es vor, dass sie jeden einzelnen Häuptling, sei er noch so unbedeutend, in den Hauptsitz einluden, um sie mit Geschenken zu überhäufen und üppige Feste abzuhalten. In dem Maße, wie unser Staat gewachsen ist, ist diese Tradition jedoch alles andere als ideal, um solche Bauprojekte in Angriff zu nehmen. Wir sollten es zur Pflicht eines jeden Häuptlings machen, Arbeitskräfte und Baumaterial für solche Bauten bereitzustellen."
 quipu: "Quipu"
 quipu_desc: "Ein System, das Knoten auf einer Schnur nutzt, um Informationen aufzuzeichnen. Die Knoten stehen für eine Zahl zwischen null und neun und können zum Festhalten von Mengen und zur Buchhaltung genutzt werden. Die Knoten können sich auf Logogramme auf der gleichen Schnur beziehen. Die Knoten zeigen an, welche Silbe im Logogramm zu nutzen ist, und durch Kombination weiterer Schnüre lassen sich Sätze bilden."
 inc_vertical_economy: "Höhenwirtschaft"
 inc_vertical_economy_desc: "Kein anderes Reich ist so gut an die Höhen der Anden angepasst wie wir. Indem wir Siedlungen und Lagerhäuser in jeder Höhenlage unterhalten – von den tiefsten Tälern bis zu den höchsten Hochebenen – vervollkommneten wir, wie man Menschen und Güter durch schwierigstes Gelände befördert, wo andere Staaten längst kapituliert hätten. Unsere Lama-Karawanen, unsere in steile Felswände gehauenen Straßen und unsere Hochlandgemeinden verwandeln die Anden von einer Barriere in unsere eigene Verkehrsader."
 drafted_hatun_runas: "Hatun Runas"
 drafted_hatun_runas_desc: "Hatun Runas sind einfache Männer des Reichs. Einer von 50 Männern wird ausgewählt, um ab seinem 25. Geburtstag sieben Jahre lang in der Armee zu dienen. Dies erlaubt uns, eine große und professionelle Armee aufrechtzuerhalten, die disziplinierter als die unserer Feinde ist."
 llama_michis: "Lama-Michis"
 llama_michis_desc: "Lamas erfüllen zahlreiche Funktionen in unserer Gesellschaft. Sie dienen als Lasttiere, als Opfergabe, liefern Fleisch und Wolle, und selbst ihr Mist wird als Dünger genutzt. Indem wir ihre Aufzucht und Nutzung durch Michis oder Hirten überwachen, die von der Regierung gestellt werden, können wir sicherstellen, dass die Lama-Population streng überwacht und gegebenenfalls vergrößert werden kann."
 inc_tambo: "Verbesserte Tambo-Wegstationen"
 inc_tambo_desc: "Unser Straßensystem ist das Rückgrat unseres Reichs. Durch den Bau von Tambos entlang aller Hauptstraßen werden wir unsere Verwaltung und unser Militär noch effizienter machen können. Diese Wegstationen werden innerhalb eines Tagesmarsches voneinander errichtet werden und bieten Reisenden Unterschlupf und Proviant."
 adapted_incan_army: "Anpassungsfähigkeit der Inka-Armee"
 adapted_incan_army_desc: "Eindringlinge aus sonderbaren Ländern haben in unserem Land Fuß gefasst und bedrohen unser fortwährendes Überleben. Doch unsere Armeen wissen sich anzupassen. Sie stellen sich auf die neuen Taktiken ein, lernen, ihre eigenen Waffen gegen sie einzusetzen, und kämpfen mit einer unerschütterlichen Entschlossenheit."
 pukara_advance: "$pukara_building$"
 pukara_advance_desc: "$pukara_building_desc$"
 terraces_advance: "$terraces$"
 terraces_advance_desc: "$terraces_desc$"
 tambo_advance: "$tambo$"
 tambo_advance_desc: "$tambo_desc$"
 incamisana_advance: "$incamisana$"
 incamisana_advance_desc: "$incamisana_desc$"
 kor_fortresses_of_goguryeo: "Goguryeonische Festungen"
 kor_fortresses_of_goguryeo_desc: "Die koreanische Halbinsel war in der Vergangenheit Heimat zahlreicher Königreiche. Der Einfluss eines dieser Königreiche ist auch heute noch zu spüren: der von Goguryeo, dem Vorgänger von Goryeo. Sein größtes Vermächtnis, das auch heute noch genutzt wird, sind die Festungsanlagen und die Techniken, die man zum Bau solcher Burgen benötigt."
 kor_korean_artisanry: "Koreanische Kunsthandwerker"
 kor_korean_artisanry_desc: "Das Kunsthandwerk hat in unserem Land eine lange Tradition und seit der #italic wahren nationalen Vereinigung#! genießt es eine neue Blütezeit. Zwischen all den anderen Wundern, die auf der koreanischen Halbinsel zu finden sind, wird das Kunsthandwerk am meisten geschätzt."
 kor_korean_barracks_advance: "$korean_barracks$"
 kor_korean_barracks_advance_desc: "$korean_barracks_desc$"
 kor_court_poetry: "Hofpoesie"
 kor_court_poetry_desc: "Unsere Aristokratie legt großen Wert darauf, Geist und Seele zu kultivieren. Literatur wie Poesie in klassischem Chinesisch sowie andere Formen, sich mit Texten auseinanderzusetzen, werden am Hof als äußerst wertvoll angesehen. Sowohl der Adel als auch die Mitglieder des Hofs sind vom geschriebenen Wort und seiner kulturellen Wirkung fasziniert."
 kor_metal_movable_type: "Buchdruck mit beweglichen Lettern"
 kor_metal_movable_type_desc: "Der Buchdruck mit beweglichen Lettern ist eine uralte Drucktechnik, die von den Chinesen vor vielen Jahrhunderten zum ersten Mal verwendet wurde. Es war jedoch die alte Goryeo-Dynastie, die bewegliche Lettern aus Metall entwickelte und den Vorgang optimierte und nun über die Fähigkeit verfügt, Bücher mit beispielloser Effizienz zu drucken."
 kor_gunpowder_engines: "Schwarzpulvermotoren"
 kor_gunpowder_engines_desc: "Unser Militär kennt den taktischen Nutzen von Schießpulver bereits seit dem frühen 12. Jahrhundert. Dank einer Nachkonstruktion des chinesischen Schießpulvers und der wissenschaftlichen Arbeit von Choe Museon sollten wir in der Lage sein, unser eigenes Schießpulver herzustellen."
 kor_hwachas_advance: "$a_hwacha$"
 kor_hwachas_advance_desc: "$a_hwacha_desc$"
 kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"
 kor_korean_gunnery: "$korean_gunnery$"
 kor_korean_gunnery_desc: "Es werden ständig neue Anwendungsmöglichkeiten für Schießpulver entdeckt, darunter auch zahlreiche, die bei der Verteidigung unseres Heimatlandes helfen. Das Konzept mag zwar einfach erscheinen, doch der Einbau von Kanonen in unsere Festungsanlagen wird deren Verteidigungsfähigkeit enorm verbessern."
 kor_hangeul_alphabet: "Hangul-Alphabet"
 kor_hangeul_alphabet_desc: "Es gibt große Unterschiede zwischen der koreanischen und der chinesischen Sprache und nur die Gelehrtesten sind in der Lage, die chinesische Schrift zu verwenden. Unser neues Alphabet wird jedem erlauben, lesen und schreiben zu können."
 kor_grand_code: "Großer Verwaltungskodex"
 kor_grand_code_desc: "Zur Gewährleistung einer ordnungsgemäßen und stabilen Regierung werden wir genau festlegen, wie die Regierung arbeiten wird. Dies wird die erste schriftliche Verfassung Koreas sein."
 kor_border_defense_council: "Grenzverteidigungsrat"
 kor_border_defense_council_desc: "Unsere Grenzen sind ständig bedroht, sowohl durch die Barbaren im Norden als auch durch Piraten jenseits der Meere. Wir werden einen Rat von Offizieren einberufen, der sich der Kontrolle und der Sicherung unserer Grenzen widmet, damit unsere Armeen jederzeit bereit sind, einer Bedrohung entgegenzutreten."
 kor_panokseon_advance: "$n_panokseon$"
 kor_panokseon_advance_desc: "$n_panokseon_desc$"
 kor_korean_cannon: "Koreanische Kanone"
 kor_korean_cannon_desc: "Wir blicken auf eine lange Tradition zurück, was die Nutzung von Schießpulver und Kanonen in unserem Militär betrifft, aber wir dürfen uns nicht auf unseren bisherigen Fortschritten ausruhen. Indem wir kleinere, aber beständigere Kanonen sowie effizientere Methoden für das Nachladen entwickeln, wird die koreanische Artillerie eine technologische Revolution erleben, die sowohl unserer Armee als auch unserer Marine zugutekommen wird."
 hyanyak_system: "Hyangyak-System"
 hyanyak_system_desc: "Da die Landwirtschaft das Fundament unserer Wirtschaft bildet, ist es umso wichtiger, dass die Verwaltung unserer Dörfer so reibungslos wie möglich funktioniert. Zu diesem Zweck werden wir ein System der Selbstverwaltung einrichten, damit sich in den Dörfern ein Gemeinschaftsgefühl entwickeln kann."
 kor_geobukseon: "Geobukseon"
 kor_geobukseon_desc: "Wir haben das „Schildkrötenschiff“ entwickelt, um unsere Küsten zu schützen. Diese schwer gepanzerten Ungetüme werden unsere Flotte zu einer eisernen Mauer vor unserer Küste machen."
 kor_hopae_system: "Hopae-System"
 kor_hopae_system_desc: "Das Hopae-System sieht vor, dass jeder Koreaner eine Erkennungsmarke mit seinem Namen, Geburtsort, Stellung und Wohnort mit sich trägt. Dies macht es leichter, nachzuverfolgen, wer und wo jemand ist."
 kor_daedongbeop: "Daedongbeop"
 kor_daedongbeop_desc: "Der oberste Staatsberater Yi Won-ik führte nach und nach zuvor ignorierte Reformen ins Steuersystem ein. Die Steuerabgabe für Haushalte wurde von einer einheitlichen Steuer auf Ackerland ersetzt. Die Steuer auf Waren wurde auf eine Quote begrenzt, die es Farmern und Großhändlern erlaubte, einen Güterüberschuss zu produzieren und zu verkaufen. Ziel war es, niedrigere Steuern für Farmer, erhöhte Gewinne für den Staat und ein Wachstum des Handels herbeizuführen."
 natural_seamanship: "Geborene Seeleute"
 natural_seamanship_desc: "Mit dem Wachstum des Fischfangs hat auch die Anzahl an Seeleuten in unserer Domäne zugenommen. Wir sollten diese Entwicklung für unsere Marine nutzen, da die Besatzung ebenso wichtig wie das Schiff selbst ist."
 call_of_our_forefathers: "Ruf unserer Vorväter"
 call_of_our_forefathers_desc: "Vor langer Zeit stachen unsere illustren Vorväter in See und gründeten Kolonien im Norden. Unseren Legenden zufolge erreichten sie eine neue Welt und gründeten Vinland. Wir müssen ihrem Vorbild folgen!"
 pioneer_spirit: "Pioniergeist"
 pioneer_spirit_desc: "Einst trotzte unser Volk der See und gründete Kolonien an weit entfernten Küsten. Wir müssen den Geist dieser Zeit neu entfachen, damit unser Volk in die Fußstapfen seiner Vorfahren tritt."
 nor_shipbuilding: "Militärischer Schiffbau"
 nor_shipbuilding_desc: "Die Ausweitung der Fischereiindustrie führte zu einer Ausweitung des Schiffbaus, sodass wir nun über eine Menge ausgebildeter Schiffzimmermänner verfügen, mit denen wir unseren eigenen Schiffbau ausweiten können."
 write_new_sagas: "Neue Sagen"
 write_new_sagas_desc: "Ein kluger Geist bewahrt das Wissen,\ndas aus alter Zeit bekannt.\nIm Sonnenuntergang gesungen,\nbeschreiben Sagen unser Erbe.\nVerbreitet von den Reichen und Mächten,\nhat jedes Land seine eigenen."
 expansive_policies: "Expansionspolitik"
 expansive_policies_desc: "Brandenburg besteht größtenteils aus sandigem Boden, ist arm und gilt als die #italic Streusandbüchse#! des Heiligen Römischen Reichs. Unsere Anführer verspürten jedoch schon immer das Bedürfnis, die Markgrafschaft in alle Richtungen auszudehnen, und beanspruchten oft benachbarte Throne wie den von Pommern. So wurde unser Land im Reich zu einem Schmelztiegel verschiedener Kulturen."
 northern_march: "Nordmark"
 northern_march_desc: "In den frühen Tagen des Reichs wurde die Region Brandenburg von slawischen Stämmen besiedelt und regiert, bis der Kaiser die Nordmark schuf, um das Gebiet zu unterwerfen und zu befestigen. Mit der Zeit entwickelte sich diese Nordmark schließlich zu Brandenburg, einer der bedeutsamsten Regionen des Reichs."
 divide_estates: "Teilung der Stände"
 divide_estates_desc: "Sollten sich die drei Stände vereinen, könnten sie zu einem gewaltigen Hindernis für den König werden. Um unsere Kontrolle zu festigen, müssen wir den Adel systematisch gegen die anderen Stände ausspielen."
 soldiers_fortune: "Glücksritter"
 soldiers_fortune_desc: "Unser Land ist nur dünn besiedelt und größtenteils von Feinden umgeben. Die Notwendigkeit einer soliden Verteidigung hat uns dazu veranlasst, Soldaten aus fremden Ländern anzuwerben, die bereit sind, unter unserem Banner zu kämpfen."
 iron_tooth: "Eisenzahn"
 iron_tooth_desc: "Dafür zu sorgen, dass unser Hof eine stärkere Kontrolle über die Länder der Markgrafschaft ausübt, wird unserem Herrscher den Spitznamen #italic Eisenzahn#! einbringen, der verdeutlichen soll, dass wir wie ein Kampfhund zubeißen. Unsere Herrschaft wird unsere Nation prägen und selbst dem ärmsten Bauern in Brandenburg ein Gefühl des Stolzes und der Treue einflößen."
 kammergericht: "Gründung des Kammergerichts"
 kammergericht_desc: "Um die Herrschaft in der Mark Brandenburg gesetzlich zu regeln, werden wir das Lokalrecht durch römisches Recht ersetzen. Wir werden außerdem den Sitz der obersten Instanz der Justiz, der sich bislang am Hofe des Kurfürsten befunden hatte (der ständig umhergereist ist), an einen festen Ort verlegen. Dies wird zum einen die Justiz stärken und zum anderen die Macht der lokalen Magnaten beschneiden."
 margrave_council: "Geheimrat der Kurmark"
 margrave_council_desc: "Die Macht des Markgrafen wird durch die ständig wachsende Macht unserer Stände bedroht. Die Stände sind zwar von großem Nutzen für unsere Nation, doch auch eine ernsthafte Bedrohung für unsere Machtbasis. Die Schaffung eines neuen Rats, der die Macht der Stände auf eine eher beratende Position für den Markgrafen reduziert, wird uns erlauben, ihre Macht zu zügeln. Auf diese Weise können wir weiterhin die Vorteile unserer Stände genießen und müssen uns weniger Sorgen um ihre Bedürfnisse machen."
 religious_toleration: "Religiöse Duldung"
 religious_toleration_desc: "Für die Expansion nach Außen ist die Stabilität im Inneren am wichtigsten. Durch die Förderung der religiösen Toleranz werden wir nicht nur für Stabilität sorgen können, sondern unser Reich auch zu einem Zufluchtsort für all jene machen, die andernorts verfolgt werden."
 army_professionalism: "Armee-Professionalität"
 army_professionalism_desc: "Wie man bei der persischen Invasion von Griechenland gesehen hat, kann eine kleine, disziplinierte Armee gegen eine Übermacht bestehen, wenn sie besser ausgebildet ist. Wir müssen unserer Armee Ähnliches abverlangen, wenn wir unser Land zum Erfolg führen möchten."
 soldier_king: "Preußischer Soldatenkönig"
 soldier_king_desc: "Die meisten Staaten sind Länder, die eine Armee haben. Preußen hingegen ist eine Armee, die ein Land hat. Die vielen Könige Preußens waren ebenso sehr Soldaten, wie sie Monarchen waren, und jeder von ihnen beendete seine Herrschaft nicht nur mit Reformen für den Staat, sondern hinterließ auch seine Spuren in der Armee."
 auftragstaktik: "Führen mit Auftrag"
 auftragstaktik_desc: "Das Führen mit Auftrag, oft auch als #italic Auftragstaktik#! bezeichnet, ist ein System, bei dem Unteroffiziere von ihren Befehlshabern ausreichend Informationen über die Ziele der Schlacht oder des Krieges erhalten und dann auf eigene Initiative handeln können. Dieses System stärkt die Verbindung zwischen den Soldaten und ihren Befehlshabern und führt letztendlich zu besseren Ergebnissen."
 goose_step: "Gleichschritt"
 goose_step_desc: "Optisch mag er etwas merkwürdig aussehen, doch der Gleichschritt wurde entwickelt, damit unsere Truppen beim Vorrücken auf den Feind besser die Marschformation halten können. Dies verschafft unserer Armee auf dem Schlachtfeld einen nicht zu unterschätzenden Vorteil."
 dispositio_achillea: "Dispositio Achillea"
 dispositio_achillea_desc: "Dividing our lands between heirs has weakened dynasties across the Empire. We will establish a clear rule of succession, the eldest inherits all. Our nobles may grumble, but an undivided Mark is worth their discontent."
 hohenzollern_privy_council: "Hohenzollern Privy Council"
 hohenzollern_privy_council_desc: "Our estates have long held sway over the governance of the Mark. By establishing a council of advisors answerable to the Elector alone, we bring our ablest men to the center of power, and quietly reduce the estates to a consultative role."
 edict_of_potsdam: "Edikt von Potsdam"
 edict_of_potsdam_desc: "Our neighbors drive out their most industrious subjects for the sake of religious conformity. Their loss is our gain. We open our doors to the persecuted and the skilled alike, and our cities grow richer for it."
 hohenzollern_court_culture: "Hohenzollern Court Culture"
 hohenzollern_court_culture_desc: "A great court needs more than soldiers and clerks. By welcoming artists, philosophers, and men of science into our service, we turn the court of $BRA$ into a beacon of culture, and show the world that our ambitions reach beyond the battlefield."
 berliner_aufklarung: "Berliner Aufklärung"
 berliner_aufklarung_desc: "New ideas spread fast in our cities, and the minds of $BRA$ have never been idle. We will cultivate this spirit of inquiry, drawing scholars and thinkers to our court. A nation that thinks clearly governs itself well."
 teutonic_legacy: "Teutonic Legacy"
 teutonic_legacy_desc: "The knights who carved this land from the wilderness left something behind, a tradition of service, discipline, and arms as a way of life. Our noble houses carry that tradition still. They do not merely own the land; they are sworn to defend it."
 double_electorate: "Double Electorate"
 double_electorate_desc: "Governing two territories separated by foreign lands demands more than ordinary administration. We will ensure our laws reach the far corners of our realm and that every magistrate answers to the same authority, however distant from the capital he may be."
 junker_officer_corps: "Junker Officer Corps"
 junker_officer_corps_desc: "In $PRU$, a commission is not purchased, it is owed. Our nobles are expected to lead, and to lead well. Men who grew up on the land know how to march across it, and how to keep their soldiers alive along the way."
 generalkriegskommissariat: "Kriegskommisariat"
 generalkriegskommissariat_desc: "Waging war cannot wait on the consent of our estates. We will establish a permanent organ of military finance, empowered to levy what the army requires. Our estates may not approve, but a well-funded army wins wars they cannot afford to lose."
 preussische_tugenden: "Preußische Tugenden"
 preussische_tugenden_desc: "Our court will not be a place of idle luxury. Every ducat saved is a ducat for the army; every hour wasted is a march not made. We ask nothing of our soldiers that we do not first demand of ourselves."
 standing_army: "Standing Army"
 standing_army_desc: "Other nations raise armies when war arrives and dismiss them when it ends. We cannot afford that luxury. Our army will be permanent, always trained, always ready, and the storehouses to sustain it will never run dry."
 cantonment_system: "Cantonment System"
 cantonment_system_desc: "Every boy born in $PRU$ is born into a regiment. Each province will supply its own soldiers to its own officers, who will know their men by name. When war comes, we will not scramble to fill the ranks, they will already be there."
 scharnhorst_reforms: "Scharnhorst Reforms"
 scharnhorst_reforms_desc: "Shortcomings due to overconfidence and arrogance can lead to great failures and defeats. Defeat is a teacher, if we are willing to learn. We will purge our army of its complacency, noble birth alone will no longer open the officer ranks, and every soldier must understand not just his orders, but the purpose behind them."
 mounted_people: "Berittenes Volk"
 mounted_people_desc: "Unser Volk lebte schon immer auf dem Rücken von Pferden, die ein wesentlicher Bestandteil unserer Kultur und Macht sind. Wir sind sehr stolz auf die Zucht dieser majestätischen Tiere und auf unsere unübertroffenen Fähigkeiten im Umgang mit dem Bogen zu Pferde. Wir nutzen sie, um unsere Überlegenheit auf dem Schlachtfeld zu demonstrieren."
 falconry_mastery: "Falknerei"
 falconry_mastery_desc: "Die Falknerei ist tief in unserer Kultur verankert; unser Volk pflegt eine enge Verbindung zu diesen großartigen Raubvögeln. Wir haben unsere Fähigkeiten in der alten Kunst der Falknerei im Laufe der Zeit immer weiter verfeinert und unsere Falkner werden für ihre Fähigkeit, diese majestätischen Raubvögel zu fangen, zu trainieren und mit ihnen zu jagen, verehrt."
 rich_lands: "Fruchtbare Ländereien"
 rich_lands_desc: "Unser Land, das die Prärien bis hin zu den dichten Wäldern umfasst, ist fruchtbar und wartet nur darauf, von unserem Volk bearbeitet zu werden. Wir werden alle uns zur Verfügung stehenden Ressourcen nutzen, um jedem Haushalt in unserer großartigen Nation zu Wohlstand zu verhelfen, indem wir das uns anvertraute Land weise verwalten."
 jurchen_honor: "Jurchen-Ehre"
 jurchen_honor_desc: "Unser Volk respektiert jene, die ihre Stärke und Entschlossenheit unter Beweis stellen. Diese Selbstachtung hat dazu geführt, dass unsere Krieger voller Mut in die Schlacht ziehen und bereit sind, gegen jeden zu kämpfen."
 unite_the_tribes: "Stammesvereinigung"
 unite_the_tribes_desc: "Die Jurchen bestanden schon immer aus zahlreichen Stämmen, die nicht immer freundlich gesinnt und mal mehr, mal weniger geeint waren. Diese Dynamik ist eine Konstante, ebenso wie der Wunsch mehrerer Stammesoberhäupter, alle Stämme unter einem einzigen Banner zu vereinen."
 leader_under_sky: "Vom Himmel auserkoren"
 leader_under_sky_desc: "Unser Volk ist schon viel zu lange gespalten. Wir brauchen einen starken Anführer, der es vereinen kann und die Welt zum Beben bringt. Dieser Anführer wird vom Himmel selbst auserkoren werden und uns in eine strahlende Zukunft führen."
 foraging_our_way: "Eins mit der Natur"
 foraging_our_way_desc: "Wir sind Jäger und leben im Einklang mit der Natur, selbst die, die in den Städten leben. Unser Instinkt sagt uns, welchen Weg wir beschreiten sollten und welche Gaben des Waldes wir nutzen können. Diese Weisheit erlaubt uns, in jeder Situation überleben zu können."
 deliberative_council: "Beratender Prinzen- und Ministerrat"
 deliberative_council_desc: "Der #italic Beratende Prinzen- und Ministerrat#! hat das Ziel, die Zusammenarbeit zwischen den Reichsführern zu förderten. Die Struktur des Rates wurde so konzipiert, dass sie sich auf die kollektive Regierungsführung und politische Beratungen durch die Aristokratie, hauptsächlich in außenpolitischen und militärischen Angelegenheiten, konzentrierte. Die Mitgliedschaft ist außerhalb des kaiserlichen Clans auf die militärische Führung beschränkt, wodurch die Macht des Herrschers gestärkt wird."
 manchu_script: "Mandschurische Schrift"
 manchu_script_desc: "Das mandschurische Alphabet kombiniert die klassische mongolische Schrift mit der phonetischen Schrift der Jurchen. Sie wird in vertikalen Spalten von links nach rechts geschrieben. Dank der verschiedenen Buchstabenformen und der kontextabhängigen Anpassung für Anfang, Mitte, Ende und isolierte Positionen bewahrt es die linguistischen Feinheiten unserer Sprache."
 the_eight_banners: "Acht Banner"
 the_eight_banners_desc: "Das System der Acht Banner bildet den Kern unserer Gesellschaft und unserer militärischen Macht. Sie sind die Wächter unseres Reiches. Ihre Mitgliedschaft ist vererbbar und sie erhalten eine Belohnung in Form von Land und Einnahmen. Unsere Vorherrschaft in der Region hängt alleinig von der Macht unserer Banner ab, die uns dabei helfen, unsere Nachbarn zu erobern und künftige Feldzüge zu bestreiten."
 a_new_dawn: "Ein neuer Morgen"
 a_new_dawn_desc: "Unsere Nation wurde wiedergeboren. Unsere Stammesherkunft ist nur noch ein verblasster Traum, der nie wiederkehren wird. Die Modernisierung unseres Landes ist eine Tatsache und es ist an der Zeit, dass wir dies der Welt auch zeigen."
 manchu_reborn: "Wiedergeborene Mandschurei"
 manchu_reborn_desc: "Der Kern unseres Landes hat sich in den letzten Jahrhunderten stark verändert und mit ihm auch unsere Armee. Die Welt liegt vor uns wie ein offenes Buch und neue Herausforderungen tauchen am Horizont auf. Wenn wir überleben wollen, müssen wir uns anpassen."
 inigo_architecture: "Inigos Architektur"
 inigo_architecture_desc: "Wir gehen davon aus, dass Inigo Jones einen bedeutenden Einfluss auf künftige Generationen von Architekten haben wird. Sein klassischer Architekturstil und sein Schwerpunkt auf Proportionen und Symmetrie werden die britische Architektur für die kommenden Jahrhunderte prägen. Sein Beitrag ist für die neoklassizistische Bewegung Englands entscheidend."
 sailing_and_fighting_instructions: "Blakes Segel- und Seeschlachttaktiken"
 sailing_and_fighting_instructions_desc: "Robert Blake hat mehrere Regelwerke verfasst, die zu weitreichenden Reformen in der Marine geführt haben. Dazu gehören neue Taktiken für Blockaden und Strandlandungen sowie die Einführung der einlinigen Schlachtformation."
 coke_smelting: "Koksverhüttung"
 coke_smelting_desc: "Die Erfindung der Koksverhüttung und insbesondere deren Anwendung in der Eisen- und Stahlproduktion ist eng mit der industriellen Revolution verbunden. Eisen und Stahl werden derzeit mit traditionellen Methoden wie der Holzkohleverhüttung hergestellt. Diese neue Methode wird nicht nur die Produktionskapazitäten erhöhen, sondern auch die Unterhaltskosten senken."
 water_frame: "Waterframe"
 water_frame_desc: "Die „Waterframe“ ist eine Spinnmaschine, die in der Tuchindustrie zur Produktion von Baumwollgarn verwendet wird. Diese Innovation wird zum Bau großer Tuchfabriken, die durch Wasserräder angetrieben werden, beitragen."
 fortress_church_advance: "$fortress_church$"
 fortress_church_advance_desc: "$fortress_church_desc$"
 saquiyah: "Sāqiyah"
 saquiyah_desc: "Die $saquiyah$, auch Sakia genannt, ist ein mechanisch angetriebenes Schöpfwerk, das den Transport von Wasser zu einer höher gelegenen Wasserlinie erleichtern sollte. Das auch als #italic Persisches Rad#!, #italic Tablia#!, #italic Rehat#! oder #italic Tympanum#! bekannte Rad ist für Gebiete, die wenig bis gar kein Wasser haben, von entscheidender Bedeutung."
 sepak_takraw: "Sepak Takraw"
 sepak_takraw_desc: "#italic $sepak_takraw$#! ist eine Mannschaftssportart, die dem chinesischen #italic Cùjū#! entstammt und je nach Land auch als #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#! oder #italic Sipa#! bekannt ist und bereits seit langer Zeit in ganz $south_east_asia$ gespielt wird. Doch es ist nicht nur ein Spiel … Auch wenn das Hauptziel darin liegt, den Ball zwischen den verschiedenen Spielern hin- und herzuschießen und ihn dabei in der Luft zu halten, ist es auch eine Möglichkeit, sich regelmäßig körperlich zu betätigen, weshalb der Sport nicht nur zur Unterhaltung, sondern auch zur militärischen Ausbildung der Armee dient."
 three_teachings: "Drei Lehren"
 three_teachings_desc: "Die $three_teachings$ sind eine Universalphilosophie, die aus $CHI$ stammt und die Lehren des $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ und Buddhismus in einer einzigen harmonischen Lehre vereint. Der $SECT_CONFUCIANISM_NAME$ spiegelt dabei die Ideologie des Gesetzes wider, während der $SECT_DAOISM_NAME$ die Weltanschauung der radikalen Intellektuellen repräsentiert. Diese beiden gegensätzlichen Enden des philosophischen Spektrums werden durch den Buddhismus verbunden."
 #INDIAN ADVANCES
 dlh_origin_of_hindustani: "Ursprung des Hindustani"
 dlh_origin_of_hindustani_desc: "Die hindustanische Sprache leitet sich aus der Apabhramsha ab, einer mittelindoarischen Sprache, und wurde besonders in $DLH$ als Kontaktsprache verwendet. Da die hindustanische Sprache Einflüsse der persischen, der arabischen und der türkischen, aber auch der althindischen Sprache besitzt, gestaltet sich die Diplomatie mit der muslimischen Welt und der hinduistischen Welt als unkomplizierte Aufgabe."
 dlh_indo_persian_culture: "Indopersische Kultur"
 dlh_indo_persian_culture_desc: "$persian_language$ ist seit der Gründung des delhischen Sultanats im Jahr 1290 die Hauptsprache unseres Hofes. Dies hat dazu geführt, dass der persische Einfluss eine Synthese mit den lokalen indischen Kulturen geschaffen hat."
 dlh_turkic_conqueror_roots: "$turkic_group$e Eroberer"
 dlh_turkic_conqueror_roots_desc: "Wir nennen zwar $india$ unsere Heimat, doch unsere Vorfahren hatten türkische Wurzeln. Ihre frühen Eroberer und Herrscher aus der Zeit der $mamluk$-Dynastie sowie die Errungenschaften der darauffolgenden Khalji-Dynastie inspirieren unser Militär und unsere Diplomaten noch heute dazu, die delhischen Grenzen in jeden Winkel Indiens voranzutreiben."
 dlh_revert_ghiyath_reforms: "Ghiyaths wahnhafte Reformen"
 dlh_revert_ghiyath_reforms_desc: "Die törichten Wirtschaftsentscheidungen von Ghiyath al-Din haben dem Staat $DLH$ nichts als finanziellen Ruin gebracht. Wir müssen diesen Wahnsinn rückgängig machen und wieder Gold und Silber für unsere Münzen nutzen."
 dlh_restore_the_delhi_empire: "Herrlichkeit des $DLH$-Sultanats"
 dlh_restore_the_delhi_empire_desc: "Das Sultanat $DLH$ kontrolliert einmal mehr den Großteil von $india$. Wir erheben uns erneut!"
 dlh_reintegrate_former_provinces: "Reintegration ehemaliger Provinzen"
 dlh_reintegrate_former_provinces_desc: "Einst hat das riesige Sultanat $DLH$ viele seiner ehemaligen Besitztümer verloren, aber wir haben nicht vergessen, wie man sie verwaltet. Während wir daran arbeiten, unseren früheren Ruhm wiederherzustellen, werden wir die lokalen Herrscher an ihre Pflichten gegenüber dem Sultan erinnern."
 dlh_textile_innovation: "Innovative Tuchproduktion"
 dlh_textile_innovation_desc: "Die blühende Tuchindustrie Delhis macht unsere Nation zum Zentrum der technologischen Innovationen. Mit der frühen Einführung der Egreniermaschine und der Schneckengetriebewalzen wissen wir, wie wichtig es ist, in diesen Bereichen die Nase vorn zu haben. Wir müssen nun sicherstellen, dass auch das Spinnrad so gut wie möglich angenommen wird."
 dlh_afghan_nobility: "$afghan_culture$er Adel"
 dlh_afghan_nobility_desc: "Ein Großteil des delhischen Adels stammt aus den Reihen der Paschtunen-Afghanen, einem Volk mit einer langen Geschichte von Eroberung und Herrschaft in Nordindien. Obwohl sie manchmal eine politische Behinderung darstellen können, stehen ihre kriegerischen Fähigkeiten außer Frage."
 dlh_grand_trunk: "Schutz der südasiatischen Fernhandelsstraße"
 dlh_grand_trunk_desc: "Die südasiatische Fernhandelsstraße, auch „Grand Trunk Road“ genannt, verläuft von $kabul$ in Afghanistan bis zur Küste von $bengal_area$. Viele der wichtigsten Handelsstädte entlang der Route sind Teil unseres Reichs. Deshalb ist es uns wichtig, dass die Straße gut gepflegt und frei von Banditen ist."
 dlh_cosmopolitan_religions: "Religiöser Kosmopolitismus"
 dlh_cosmopolitan_religions_desc: "$india$ ist ein riesiger Subkontinent und die Heimat zahlreicher Religionen. Um die Stabilität innerhalb unseres Reichs aufrechterhalten zu können, sollten wir die Rechte der verschiedenen Konfessionen garantieren und uns ihre Loyalität sichern."
 dlh_revive_the_tughlaq_architecture: "Tughlaq-Architektur"
 dlh_revive_the_tughlaq_architecture_desc: "Während der Hochzeit der Tughlaq-Dynastie und der damit verbundenen stabilsten Epoche unseres Staates bauten große Architekten und Künstler Moscheen und Grabmäler im einzigartigen Tughlaq-Stil. Da unsere Macht im Laufe der Jahrhunderte jedoch immer mehr infrage gestellt wurde, schwanden auch die Mittel zur Erhaltung dieser Architektur. Es ist an der Zeit, dass wir diese architektonischen Meisterwerke wiederaufbauen und $DLH$ zum Reich der Kunst und Wunder erheben."
 dlh_throne_of_india: "Thron Indiens"
 dlh_throne_of_india_desc: "Seit Jahrhunderten wird jedes große indische Reich von $delhi$ aus regiert. Es ist der Sitz der Eroberer und unser Geburtsrecht. Alle müssen wissen, dass $delhi$ erneut der rechtmäßige Herrscher von ganz Indien ist!"
 dlh_hindustani_identity: "$HIN_ADJ$e Identität"
 dlh_hindustani_identity_desc: "Die Idee des Nationalismus und der kulturellen Identität hat auch den indischen Subkontinent erreicht. Die kulturelle Vielfalt Indiens bleibt natürlich bestehen, aber ist auch klar, dass die Geografie des Subkontinents und die muslimischen Werte in uns allen ein Gefühl der Einheit in Form einer hindustanischen Identität hervorrufen."
 vij_city_of_victory: "Stadt des Sieges"
 vij_city_of_victory_desc: "Vijayanagar – die #italic Stadt des Sieges#! – ist der Kern unseres Staates und wird eines Tages auch der Kern des hinduistischen Reichs von $india$ sein, das sich gegen die muslimischen Eindringlinge stellt. Möge diese Stadt ein Leuchtfeuer unserer Kultur und Tradition sein!"
 vij_an_army_for_city_of_victory: "Eine Armee für die Stadt des Sieges"
 vij_an_army_for_city_of_victory_desc: "Damit die Stadt des Sieges ihrem Namen gerecht wird, müssen wir dafür sorgen, dass wir eine Armee haben, die uns Siege einbringt. Wir müssen sicherstellen, dass unsere Truppen gut ausgebildet und stolz auf ihre Aufgabe sind."
 vij_arab_horses: "Arabische Pferde"
 vij_arab_horses_desc: "Die Pferde der Arabischen Halbinsel sind unserer eigenen Zucht weit überlegen. Wir müssen unsere Handelsbeziehungen nutzen, um einen stetigen Nachschub dieser Pferde für unsere Truppen zu garantieren."
 vij_first_indian_artillery: "Erste Indische Artillerie"
 vij_first_indian_artillery_desc: "Die Verwendung von Schießpulver für militärische Zwecke wurde noch nicht vollständig ergründet, doch wir wissen um sein enormes Potenzial, das die Zukunft der Kriegsführung neu gestalten wird. Wir müssen das Schießpulver und seinen Anwendungszweck weiter erforschen."
 vij_the_bunds: "Der Bund"
 vij_the_bunds_desc: "Unsere Gesellschaft wurde auf der Landwirtschaft des eher ariden $karnakassala_area$ aufgebaut. Der #italic Bund#! (auch #italic Anecut#! genannt), ein System, das ähnlich einem Damm oder einem Deich ist, versorgt unsere Städte und Felder gleichermaßen mit dem dringend benötigten Wasser."
 vij_adroit_diplomacy: "Geschickte Diplomatie"
 vij_adroit_diplomacy_desc: "Die zahlreichen Invasoren in unser Land haben immer wieder die gleiche Schwäche aufgedeckt, nämlich die Neigung, sich gegenseitig zu bekämpfen. Wir müssen jederzeit bereit sein, ihre Konflikte für unsere Zwecke zu nutzen."
 vij_promotion_of_trade: "Förderung des Handels"
 vij_promotion_of_trade_desc: "Unser Land befindet sich an einer der wichtigsten Handelsrouten von Ost nach West. Wir müssen sicherstellen, dass unsere Häfen sicher sind, damit die Kapitäne hier anlegen und wir sie besteuern können."
 vij_carnatic_music: "Karnatische Musik"
 vij_carnatic_music_desc: "Wir müssen der muslimischen Invasion an allen Fronten Widerstand leisten. Die musikalischen Traditionen der nördlichen Staaten weisen bereits Anzeichen fremdländischen Einflusses auf. Das ist Blasphemie! Wie wir alle wissen, ist die Musik göttlich und geht auf Devas und Devis zurück. Wir werden dem Volk der Hindu zeigen, wer sich für seine Verteidigung einsetzt."
 vij_cultural_integration: "Kulturelle Integration"
 vij_cultural_integration_desc: "Die kulturelle Vielfalt des indischen Subkontinents ist offensichtlich. Indem wir den Einheimischen erlauben, sich nach ihren eigenen Bräuchen selbst zu verwalten, können wir ihre Loyalität sicherstellen und sie leichter in unsere Gesellschaft eingliedern."
 vij_rule_in_accord_with_dharma: "Herrschaft in Übereinstimmung mit Dharma"
 vij_rule_in_accord_with_dharma_desc: "Dharma ist eine der Säulen unserer Religions- und Gesellschaftswerte. Unser Staat kann nur gerecht und tugendhaft sein, wenn unsere Herrscher in Übereinstimmung mit Dharma regieren."
 vij_harsh_penal_code: "Hartes Strafgesetz"
 vij_harsh_penal_code_desc: "Der Herrscher sorgt dafür, dass das Gesetz eingehalten wird, indem Straftäter hingerichtet werden. Wir müssen härtere Strafgesetze einführen und diese durchsetzen, damit sich unser Volk in unserem Reich sicher fühlen kann."
 vij_decentralized_rule: "Dezentralisierte Herrschaft"
 vij_decentralized_rule_desc: "Mit dem Wachstum des Staates steigen auch der Verwaltungsaufwand für die Regierung und die potenzielle Gefahr von Aufständen. Um dies zu verhindern, sollten wir eine dezentralisierte Herrschaft anstreben, bei der die Einheimischen kleinere Probleme selbst regeln können und nur die größeren den Hof erreichen."
 vij_indian_throne: "Thron Indiens"
 vij_indian_throne_desc: "$india$ ist der muslimischen Bedrohung schon viel zu lange ausgesetzt. Heidnische Reiche beanspruchen ihre Herrschaft über $india$ von $delhi$ aus – und das, obwohl ihre Ansichten in direktem Widerspruch zu dem stehen, was die Inder wirklich wollen. Das darf so nicht weitergehen! Wir müssen einen neuen Machtsitz aufbauen – und $vijayanagar$ wird der neue Thron Indiens werden!"
 #pandya advances
 tnk_legitimate_rule: "Uralte Wurzeln"
 tnk_legitimate_rule_desc: "Unsere Vorfahren haben das Land von $tamil_land_area$ bereits seit Urzeiten regiert. In diesen unruhigen Zeiten, die von fremdländischen Invasoren beherrscht werden, sollten wir uns auf unsere alte Verbundenheit zum Land berufen, um unsere Herrschaft zu legitimieren."
 tnk_resist_invaders: "Meisterhafter Widerstand"
 tnk_resist_invaders_desc: "Unser Volk hat sowohl Siege als auch vernichtende Niederlagen erlebt. Wenn unsere Dynastie noch einmal über die Region herrschen soll, müssen wir das unwegsame Gelände nutzen, um feindliche Armeen aufzuhalten oder zumindest zu verlangsamen, bis wir einen direkten Widerstand leisten können."
 tnk_pearls_of_india: "Perltauchen"
 tnk_pearls_of_india_desc: "Die Menschen unseres Volkes sind ausgezeichnete Taucher und haben die Fähigkeit perfektioniert, Perlen vor der Küste zu sammeln. Dies ist nicht nur ein klarer wirtschaftlicher Vorteil für uns, ihre natürliche Affinität zu den Gewässern erleichtert uns außerdem die Ausbildung von Seeleuten, was uns einen militärischen Vorteil gegenüber unseren Feinden verschafft."
 tnk_expertise_in_conflicts: "Vom Krieg abgehärtet"
 tnk_expertise_in_conflicts_desc: "Im Laufe unserer Geschichte haben wir zahlreiche Konflikte bestritten und unüberwindbare Hindernisse überwunden. Dies hat dazu geführt, dass das Volk stolz auf sein Land ist; etwas, das wir nutzen sollten, um die Stabilität zu sichern."
 tnk_imperial_legacy: "Pandyanisches Vermächtnis"
 tnk_imperial_legacy_desc: "Die Länder südlich von $india$ haben bereits viel zu lange unter fremden Invasoren und aufstrebenden Kriegsfürsten gelitten. Wir müssen das Vermächtnis unserer uralten Dynastie nutzen und Anspruch auf das Land erheben. Dies wird nicht nur dafür sorgen, dass wir unser rechtmäßiges Land zurückerhalten, sondern auch zu Stabilität und Frieden führen."
 paik_system_advance: "$paik_system$"
 paik_system_advance_desc: "$paik_system_desc$"
 paik_regiments_advance: "$a_paik_infantry$"
 paik_regiments_advance_desc: "$a_paik_desc$"
 advanced_paik_system_advance: "Verbesserte Paik"
 advanced_paik_system_advance_desc: "$a_late_paik_infantry_desc$"
 baghlah_advance: "$n_baghlah$"
 baghlah_advance_desc: "$n_baghlah_desc$"
 bng_bengali_vassal_system: "$BNG_ADJ$es Vasallensystem"
 bng_bengali_vassal_system_desc: "Während der Herrschaft von $DLH$ hat das bengalische Volk ihrem Suzerän als gewinnbringender Vasall gedient. Dieses System wird uns als Grundlage für unser eigenes Vasallensystem dienen, das die Zeit der bengalischen Souveränität prägen wird."
 bng_bengali_paik: "$BNG_ADJ$e Paik"
 bng_bengali_paik_desc: "Die Paik bilden das Rückgrat unseres Militärs. Im Gegensatz zu anderen Staaten, die die Paik als Hauptaufgebote nutzen, konzentriert sich unser Staat auf weniger, aber dafür besser organisierte Paik zur Unterstützung unseres Militärs."
 bng_bengali_architecture: "$bengali$e Architektur"
 bng_bengali_architecture_desc: "Der bengalische Stil ist eine Mischung aus altertümlicher Stadtarchitektur, Einflüssen der muslimischen Baukunst und klassischen bengalischen Dächern. Dieser einzigartige Stil wird sowohl für religiöse als auch für kulturelle Gebäude aller Art verwendet. Dank unseres Wissens in diesem Bereich ist der Bau solcher Gebäude wesentlich einfacher zu bewerkstelligen."
 bng_habshi_generals: "Habshi-Generäle"
 bng_habshi_generals_desc: "Abessinische Sklavensoldaten, die auf arabischen Märkten gekauft wurden, spielen eine bedeutende Rolle als Infanterie-Soldaten. Diejenigen, die sich als Anführer erweisen, erhalten einen höheren Rang, während diejenigen, die außergewöhnliche Loyalität zeigen, die Palastwache bilden."
 bng_war_elephants: "Kriegselefanten"
 bng_war_elephants_desc: "Elefanten sind zwar langsam, wegen der viele Flussgebiete in unserem Land jedoch ein großer Segen. Sie werden nicht nur für den Transport von Militärausrüstung genutzt, ihre imposante Statur inspiriert unsere Truppen darüber hinaus dazu, auf dem Schlachtfeld härter zu kämpfen."
 bng_rupees: "Prägung von Rupien"
 bng_rupees_desc: "Das Fehlen einer weit verbreiteten standardisierten Währung wirkt sich auf die Entwicklung des indischen Handels aus. Als eine der führenden Wirtschaftsmächte des Subkontinents sind wir gut aufgestellt, um mit der Prägung einer neuen Silbermünze mit Standardgewicht zu beginnen, die wir Rupie nennen werden."
 bng_bengali_traders: "$BNG_ADJ$e Händler"
 bng_bengali_traders_desc: "Der Indische Ozean verbindet die Märkte Indiens mit dem Rest von $south_east_asia$ und $china$. Um unsere Gewinne aus dem Handel zu erhöhen, müssen wir alles darauf setzen, unsere Präsenz auf diesen Märkten durch den Seeweg zu maximieren."
 bng_bengali_poetry: "$bengali$e Poesie"
 bng_bengali_poetry_desc: "Das geschriebene Wort ist eine der einflussreichsten Kunstformen. Die bengalische Poesie insbesondere behandelt Geschichten von sagenhaften Eroberern, glaubwürdige Dramen und spannende philosophische Fragen, die der bengalischen Kultur zu Ruhm verhelfen werden."
 bng_religious_pluralism: "Religiöser Pluralismus"
 bng_religious_pluralism_desc: "$india$ ist die Heimat vieler verschiedener Religionen. Der Hinduismus macht den Hauptanteil aus, obschon die Herrscherschicht den muslimischen Glauben bevorzugt. Besonders bei der Arbeiterklasse sind auch andere kleinere Religionen wie der Buddhismus und der Jainismus vertreten. Eine Religion einer anderen vorzuziehen, wird unweigerlich zu Chaos und Unruhen führen. Wir sollten den religiösen Pluralismus anstreben und in unserem Staat keine Religion bevorzugen oder diskriminieren."
 bng_artillery_corps: "Artilleriekorps"
 bng_artillery_corps_desc: "Kanonen sind im Militär zu einem nicht mehr wegzudenkenden Faktor geworden. Wir müssen dafür sorgen, dass unser Artilleriekorps stets einsatzbereit ist und es darauf ausrichten, den feindlichen Reihen Schaden zuzufügen, bevor diese auf dem Feld mit unseren eigenen Fußsoldaten zusammenstoßen können."
 bng_bengali_trade_fleet: "$BNG_ADJ$e Handelsflotte"
 bng_bengali_trade_fleet_desc: "Unsere Handelsflotten bringen exotische Waren aus fernen Ländern zu den Märkten des Gangesdelta, darunter auch wertvolles $goods_gold$ und $silver$. Dank unserer glorreichen Handelsflotte werden unsere Händler in einem Großteil der Welt sehr geschätzt."
 bng_shipbuilding_industry: "Schiffbauindustrie"
 bng_shipbuilding_industry_desc: "Der Handel ist die Lebensader unseres Staates, weshalb unsere Handels- und Kriegsschiffe auch den wichtigsten Aspekt unserer Wirtschaft ausmachen. Wir müssen unseren Fokus auf unsere Schiffbauindustrie legen."
 bng_bengali_industrialization: "Musselin-Industrialisierung"
 bng_bengali_industrialization_desc: "$BNG$ befindet sich in der einzigartigen Lage, eine Revolution in Indien zu beginnen, wie sie noch nie zuvor gesehen wurde. Musselin – ein locker gewebtes Tuch, für das die bengalischen Weber bekannt sind – ist eine der Haupthandelswaren für die Industrialisierung. Wir sind bereit, neue Entwicklungen in unseren bereits erstklassigen Tuch- und Schiffbauindustrien zu nutzen. Feuern wir eine industrielle Revolution an!"
 raj_militaristic_society: "Militaristische Gesellschaft"
 raj_militaristic_society_desc: "Bei den Rajputen gibt es fast keine Trennung zwischen zivilen und militärischen Gesellschaften. Unsere Nation wird mehr von den Menschen definiert, die darin leben, als von dem Land, das wir kontrollieren, und das Volk besteht aus Kriegern. Wir müssen sicherstellen, dass das Militär unseren administrativen Anforderungen gerecht wird, wenn wir expandieren."
 raj_combat_training: "Kampfausbildung"
 raj_combat_training_desc: "Jeder Soldat wird für die Schlacht vorbereitet. Unser Volk jedoch beginnt schon in einem viel früheren Alter, sich darauf vorzubereiten, was ihnen einen Vorteil gegenüber anderen Soldaten gibt."
 raj_clan_loyalties: "Clan-Loyalitäten"
 raj_clan_loyalties_desc: "Der Einfluss unseres Clans reicht weit über unsere eigenen Grenzen hinaus. Beim Ausheben unserer Armeen können wir uns auf die Rajputen unseres Clans in ganz Nordindien stützen."
 raj_monumental_architecture: "Monumentale Architektur"
 raj_monumental_architecture_desc: "Welchen Nutzen haben Siege, wenn es keine Gebäude gibt, die diese Errungenschaften für alle Zeit verewigen? Wir müssen riesige Bauwerke wie einen Siegesturm errichten, damit auch künftige Generationen von unseren Siegen und unserer Herrlichkeit in der Schlacht inspiriert werden können."
 raj_marwari_horses: "Marwari-Pferde"
 raj_marwari_horses_desc: "Wie ihre Reiter waren auch die rajputischen Kavalleriepferde akribisch für den Einsatz auf dem Schlachtfeld ausgebildet worden. Man sagt, dass ein Marwari-Pferd das Schlachtfeld nur unter einer von drei Bedingungen verlassen kann: bei einem Sieg, bei seinem Tod oder bei der Aufgabe, seinen verwundeten Herrn in Sicherheit zu bringen. Indem wir diese göttlichen Wesen gut pflegen und uns um sie kümmern, können wir sicherstellen, dass unsere Reiter auch weiterhin die Schlachtfelder Indiens dominieren."
 raj_reorganized_rajput_regiments: "Umstrukturierte Rajputen-Regimenter"
 raj_reorganized_rajput_regiments_desc: "Traditionelle Clanstrukturen sind eine hervorragende Grundlage für ein moderneres Regimentssystem. Bestehende Hierarchien, die auf Verwandtschaft und bedingungsloser Loyalität basieren, können leicht in eine organisierte und formelle Befehlskette übersetzt werden."
 raj_martial_smiths: "Kriegsschmiede"
 raj_martial_smiths_desc: "Kriege werden nicht nur durch Taktik und Tapferkeit gewonnen, sondern auch durch die verwendeten Waffen. Unsere Schmiede werden die besten Waffen für unsere tapferen Krieger fertigen, damit diese das Rajputen-Volk vor jeglicher Bedrohung beschützen können."
 raj_fortress_architecture: "Festungsarchitektur"
 raj_fortress_architecture_desc: "Der Aufstieg Delhis und die Invasion der muslimischen Krieger haben unser Volk wachgerüttelt. Wir müssen stets auf eine Invasion vorbereitet sein und unsere fähigsten Architekten damit beauftragen, im ganzen Reich uneinnehmbare Festungen zu errichten. Die immens langen Mauern, die notwendig sind, um unser Land zu schützen, machen dies zu einem ehrgeizigen Projekt, aber unsere Entschlossenheit, unser Volk zu verteidigen, sorgt dafür, dass es getan wird."
 raj_expanded_artillery_arm: "Erweiterter Artilleriearm"
 raj_expanded_artillery_arm_desc: "Belagerungen gewinnen Kriege. Wir müssen mit Möglichkeiten experimentieren, größere und bessere Kanonen zu bauen, und uns so einen Weg öffnen, die vielen Festungen unserer Feinde innerhalb und außerhalb Indiens niederzureißen."
 raj_the_purbias: "Purbiaren"
 raj_the_purbias_desc: "Die Rajputen haben sich in Nordindien ausgebreitet, um ihrem Clan Ehre zu bringen. Die #italic Purbiaren#!, die Elite der Rajputen-Soldaten, die sich als Söldner in den Dienst des Meistbietenden stellen, sind für ihre Fähigkeiten berühmt und haben einen furchterregenden Ruf."
 raj_mandatory_firearm_drilling: "Obligatorische Schusswaffenausbildung"
 raj_mandatory_firearm_drilling_desc: "Viele Rajputen-Soldaten sind zu Experten im Umgang mit persönlichen Feuerwaffen geworden. Wir müssen diese hartgesottenen Veteranen dazu bringen, die nächste Generation von Soldaten auszubilden, anstatt zu riskieren, dass ihr Wissen in einer Schlacht verloren geht. Alle unsere Soldaten müssen an der Schusswaffe trainiert werden, bevor sie unseren Feinden an der Front begegnen können."
 raj_painting_school: "Rajputen-Malerschule"
 raj_painting_school_desc: "Rajputen-Maler haben einen hervorragenden Ruf. Wir müssen unsere Künstler dazu ermutigen, ihre Fähigkeiten ständig weiterzuentwickeln, und den Ruhm unserer Dynastie durch den Bau einer besonderen Malerschule vergrößern."
 raj_rajput_resistance: "Rajputen-Widerstand"
 raj_rajput_resistance_desc: "Rajputen-Barden erzählen Geschichten von den zahlreichen Schlachten unseres Volkes gegen ausländische Invasoren und davon, dass unsere Vorväter lieber starben, als eine Niederlage hinzunehmen. Wir müssen diesen Einheitsgedanken fördern und den Barden einen Grund dafür liefern, neue Balladen über Tapferkeit im Angesicht des Todes zu schreiben."
 raj_martial_ethos: "Kriegerethos"
 raj_martial_ethos_desc: "Die Erziehung und die Traditionen der Rajputen-Krieger versorgen uns mit einem ständigen Strom neuer Offiziere. Wir sollten dafür sorgen, dass es Karrierechancen im Überfluss gibt, damit sich all diese vielversprechenden jungen Männer für eine Offizierslaufbahn in unseren Armeen entscheiden."
 npl_himalayan_homeland: "Kinder des Himalaja"
 npl_himalayan_homeland_desc: "Unser Volk lebt seit jeher im Schatten jener Berge, die den Himmel tragen. Die hohen Pässe, die steilen Bergrücken, die tiefen Flusstäler: Sie alle sind für uns keine Hindernisse, sondern das Wesen unserer Heimat. Selbst die Luft ist anders als die der Tiefebenen, und kein Heer aus den Ebenen kann erwarten, sich in diesem Land so zu bewegen wie unsere Soldaten."
 npl_the_divya_upadesh: "Divya Upadesh"
 npl_the_divya_upadesh_desc: "Die Divya Upadesh stellt die neun Prinzipien dar, die den Kern der nepalesischen Politik und des nationalen Lebens bilden. Sie dienen auch als Richtlinie für eine erfolgreiche Außenpolitik. Sie umfassen Jahrhunderte nepalesischen Gedankenguts über Staatsführung, Krieg und Frieden. Diese Prinzipien zu befolgen erlaubt es Nepal, einer Unterwerfung durch benachbarte Großmächte oder andere Kriegstreiber zu entgehen."
 npl_gurkhas: "$a_gurkha$"
 npl_gurkhas_desc: "$a_gurkha_desc$"
 ori_bulwark_of_the_hindu: "Bollwerk des $hindu$"
 ori_bulwark_of_the_hindu_desc: "Der muslimische Glaube ist in den indischen Subkontinent eingefallen und hat viele hinduistische Gläubige unter seine grausame Herrschaft gestellt. $ORI$ jedoch bleibt standhaft und stellt sich gegen diese muslimischen Glaubenskrieger. Wir sind das Bollwerk des $hindu$ und werden unsere Traditionen und unsere Kultur vor jedem Eindringling verteidigen."
 ori_anka_year_system: "Anka-Jahr"
 ori_anka_year_system_desc: "Wir nutzen das Anka-Jahr, um das Regierungsjahr unserer Herrscher zu dokumentieren. Jahre, die auf 6 oder 0 enden, abgesehen von 10, werden übergangen und das Anka beginnt immer am #italic Sunia#!, dem neuen Geschäftsjahr der Odia."
 ori_lord_of_elephants: "Gajapati"
 ori_lord_of_elephants_desc: "Pferde sind in $ORI$ nur selten zu sehen, da das hiesige Land nicht für ihre Zucht geeignet ist. In den dichten Dschungeln Ostindiens wimmelt es jedoch nur so von Elefanten, die in taktischen Manövern zusammen mit Infanterie-Einheiten genauso tödlich wie Kavallerie-Angriffe sein können. Wir sollten unser Elefantenkorps vergrößern und diese Taktiken verfeinern. So können wir uns einen Namen als ein wahrer #italic Gajapati#! oder Herr der Elefanten machen."
 ori_servitor_of_jagganath: "Diener Jagannathas"
 ori_servitor_of_jagganath_desc: "Das Land ist in der Verehrung von Jagannatha geeint, dem Herrn des Universums. Die früheren Herrscher von $ORI$ wurden deshalb oft auch als Söhne Jagannathas angesehen. Das mag zwar nicht auf unseren jetzigen Herrscher zutreffen, doch wir müssen dennoch allen zeigen, dass unser Herrscher ein treuer Diener Jagannathas ist und dass jedweder Ungehorsam einem Verrat gegen Fürst Jagannatha selbst gleichzustellen ist."
 ori_parikshas: "Parikshas"
 ori_parikshas_desc: "Das Land von $ORI$ war schon immer unter vielen verschiedenen Fürsten aufgeteilt. Doch die Zeit dieser Mandaleshvaras ist jetzt vorüber! Wir müssen die direkte Kontrolle über unser Land übernehmen und regionale Statthalter, die Parikshas, ernennen, die dieses Land in unserem Namen verwalten. Diesen kleinlichen Fürsten darf nicht länger erlaubt werden, unsere Autorität infrage zu stellen!"
 ori_odia_militarization: "Odia-Militarisierung"
 ori_odia_militarization_desc: "Die muslimische Bedrohung macht vor niemandem Halt. Wir müssen sicherstellen, dass unser Militär jederzeit bereit ist, sich den Eindringlingen entgegenzustellen."
 ori_refined_cloth_production: "Feinere Stoffproduktion"
 ori_refined_cloth_production_desc: "$ORI$ ist seit der Antike für seine qualitativ hochwertigen Stoffe berühmt. Wir müssen die Stoffzünfte Orissas auch in Zukunft dazu ermutigen, ihre Herstellungsmethoden des edlen Kalinga-Tuchs weiter zu verfeinern."
 ori_patronize_temple_construction: "Förderung von Tempelbauten"
 ori_patronize_temple_construction_desc: "Der Ruhm vergangener Dynastien spiegelt sich in der Größe der Tempel wider, die sie hinterlassen haben. Wir sollten ebenfalls danach streben, die zahlreichen prächtigen Tempelkomplexe in unserem Land zu verbessern, und Architekten anheuern, um gänzlich neue Komplexe zu errichten. Nur so werden wir die kalingische Architektur vorantreiben können."
 ori_encourage_salt_trade: "Salzhandel"
 ori_encourage_salt_trade_desc: "Das qualitativ hochwertige $salt$ aus $ORI$ wird in ganz $india$ stark nachgefragt. Wir müssen alles in unserer Macht Stehende tun, um den Salzhandel zu fördern und höhere Gewinne einzufahren."
 ori_expansion_of_infrastructure: "Infrastrukturausbau"
 ori_expansion_of_infrastructure_desc: "Dank des technischen Fortschritts konnte sich auch die Bevölkerung unseres Staates weiterentwickeln. Die Industrialisierung hat unserer Bevölkerung zu neuen Höhen verholfen. Wir müssen unsere Infrastruktur jedoch noch weiter ausbauen, um diesem Fortschritt gerecht zu werden."
 bah_arabian_horses: "Arabische Pferde"
 bah_arabian_horses_desc: "Das raue Klima Indiens ist bestenfalls mäßig für die Zucht und Aufzucht von Pferden geeignet. Die Pferde der Arabischen Halbinsel sind jedoch hervorragende Reittiere und übertreffen unsere heimischen Pferde bei Weitem. Wir müssen unsere Handelsbeziehungen nutzen, um einen stetigen Nachschub dieser Pferde für unsere Truppen zu garantieren."
 bah_amir_rebellion: "Aufstand der Amire"
 bah_amir_rebellion_desc: "Unser Staat ist aus dem Aufstand der Amire entstanden, die sich gegen die erbärmliche Herrschaft von $DLH$ aufgelehnt haben. Ihr Sieg gegen das delhische Sultanat lebt noch immer in unserem eigenen Adel und Militär weiter."
 bah_nobility_hindu_expansion: "Ausweitung des hinduistischen Adels"
 bah_nobility_hindu_expansion_desc: "Auch wenn der $nobles_estate$ manchmal ein Fluch für die Souveränität des Herrschers ist, so ist er doch einer der wichtigsten Aspekte unserer Regierung, da er unser riesiges Land verwaltet. Jetzt, da wir die Unabhängigkeit von $DLH$ erlangt haben, herrschen wir jedoch über fast ausschließlich hinduistische Untertanen und unser muslimischer Adel macht nur noch eine Minderheit aus, die nicht in der Lage ist, der Massen Herr zu werden. Wir müssen den Adel erweitern und vielversprechende hinduistische Kandidaten in ihn aufnehmen."
 bah_gharbians: "Gharbianer"
 bah_gharbians_desc: "Als wir vor fast hundert Jahren unsere Beziehungen zu $DLH$ abbrachen und unser eigenes Königreich gründeten, wurden wir auch vom überwiegend muslimischen Nordindien abgeschnitten. Da unser Staat keinerlei Wurzeln in der muslimischen Aristokratie besitzt, befinden wir uns in einer prekären Lage und könnten vollkommen der Gnade lokaler hinduistischer Adeliger ausgeliefert sein.\n\nGlücklicherweise eilt uns unser Ruf jedoch voraus und Geschichten über die Reichtümer des Dekkan werden in der gesamten muslimischen Welt verbreitet. Dies hat auch dazu geführt, dass ehrgeizige Abenteurer die lange Seereise auf sich nehmen, um unsere Häfen zu besuchen. Indem wir die großen Reichtümer Indiens dazu nutzen, um talentierte Abendländische, sogenannte Gharbianer, an unseren Hof zu locken, können wir sicherstellen, dass es unserem Land niemals an fähigen Männern mangeln wird, die unsere Armeen führen, unsere Steuern eintreiben oder über unsere Untertanen herrschen."
 bah_legacy_of_gisu_daraz: "Gisu Daraz’ Vermächtnis"
 bah_legacy_of_gisu_daraz_desc: "$india$ im Allgemeinen, aber insbesondere unser eigener Staat, blickt auf eine lange Geschichte als Zentrum der Sufi-Lehre zurück. Die Bemühungen unserer Herrscher, Sufi-Scheiche aus der ganzen Welt in unser Land zu locken und sie zu fördern, zeugen von der Frömmigkeit und der großen spirituellen Stärke unserer Monarchen und unseres Hofes.\n\nIndem unser Staat die Sufi-Konzepte der geistlichen Souveränität und die Sufi-Lehren im Allgemeinen annimmt, können wir einen Rahmen schaffen, in dem sich die diversen religiösen Glaubensrichtungen der Gharbianer und der dekkanischen Einheimischen vermischen und ohne Konflikte oder unproduktive Zerwürfnisse florieren können."
 bah_meltpot_of_languages: "Schmelztiegel der Sprachen"
 bah_meltpot_of_languages_desc: "Die Region $deccan_region$ ist Heimat vieler Kulturen und Sprachen. Durch den Zustrom von Iranern, Turanern, Afghanen und Arabern wurde die kosmopolitische Natur unseres Staates noch stärker betont. Obwohl die persische Sprache alle Bedürfnisse, die unsere Vorfahren an eine Sprache hatten, erfüllt hatte, wurde eine Mischung aus Persisch und Arabisch immer geläufiger. Diese bunte Sprachmischung dient als Quelle der Inspiration für aufstrebende Künstler."
 bah_karimis: "Kārimī"
 bah_karimis_desc: "Seit Jahrhunderten wird der indo-ägyptische Handel von einer Gruppe aus Händlern und Kapitänen aus Ägypten abgewickelt, die als $bah_karimis$ bekannt sind. Diese Handelsorganisation, die für das Tagesgeschäft im Indischen Ozean von entscheidender Bedeutung ist, ist äußerst wohlhabend und mächtig. Sultane, Edelleute und auch Gemeine kommen von den tamilischen Küsten und den Häfen der swahilischen Handelsstädte bis hin zu den unterägyptischen Hafenstädten hinter dem Golf von Aden her, um von den $bah_karimis$ exotische Waren zu kaufen oder sich Geld für ihre Vorhaben zu leihen.\nDiese Organisation zeigte in letzter Zeit ein sehr reges Interesse an unserem Staat, und wir können nur gewinnen, wenn wir unsere Beziehung zu ihr weiter pflegen."
 bah_takht_e_firoza: "Takht-e-Fīrozā"
 bah_takht_e_firoza_desc: "Das Erste, das jeder Gast in unserem königlichen Audienzsaal sieht, ist der Türkisthron unserer Dynastie. Dieses einzigartige majestätische Möbelstück war ursprünglich eine Spende des besiegten Telugu Raja Kapaya und repräsentiert unsere Dynastie in vielerlei Hinsicht. Mit seiner Erlesenheit und prachtvollen Einzigartigkeit verkörpert er die Reichtümer des Dekkan und die ungewöhnlichen Stilkombinationen, die unseren kosmopolitischen Staat kennzeichnen."
 bah_bahmani_primogeniture: "Bahmani-Primogenitur"
 bah_bahmani_primogeniture_desc: "Unser ungewöhnlicher Brauch, den Thron immer an den ältesten Sohn des derzeitigen Herrschers weiterzugeben, führt gelegentlich zu Instabilität, da machthungrige Regenten und opportunistische Edelleute anfänglich nur wenig Hemmungen zeigten, einen kindlichen Herrscher auszunutzen oder den Thronanspruch eines neidischen Verwandten zu unterstützen. Diese Tradition wurde mittlerweile jedoch stark institutionalisiert und wenn die Zeit der Nachfolge kommt, gibt es nur sehr wenige, die sich dem wahren Erben unserer Dynastie entgegenstellen werden."
 bah_madrasa_of_mahmud_gawan: "Groß-Madrasa des Dekkan"
 bah_madrasa_of_mahmud_gawan_desc: "Seit vielen Jahren bezieht unser Staat fähige Männer aus der weiteren muslimischen Welt und übernimmt die besten Eigenschaften ihrer Ursprungsländer. Dies schuf eine reiche, kosmopolitische dekkanische Kultur, die weder vollkommen persisch noch arabisch, marathisch, telugisch oder kannadaisch ist. Indem wir unseren Hauptsitz von einem Großmadrasa verwalten lassen, könnten wir diese kulturellen Einflüsse noch weiter fördern. So könnten wir der Welt beweisen, wie groß unser Staat wirklich ist."
 guj_hub_of_the_indian_ocean_trade: "Hauptumschlagplatz des Indischen Ozeans"
 guj_hub_of_the_indian_ocean_trade_desc: "Aufgrund der Passatwinde und der geografischen Lage diente $GUJ$ lange als Hauptumschlagplatz für alle Ost-West-Handelsgeschäfte im Indischen Ozean und verband damit das Rote Meer, $egypt_region$ und Malakka miteinander. Gujaratische Händler waren dadurch wichtige Zwischenhändler, die Gewürze von den Molukken und Seide aus China importierten und sie dann an die Ägypter und Araber verkauften."
 guj_garba: "Garba!"
 guj_garba_desc: "Unser Volk hat aus den Verehrungstänzen von Frauen für die Hindu-Gottheit Ambaji einen neuen und sehr anmutigen Tanz namens Garba entwickelt. Die Grundlagen des Tanzes sind Gesang und rhythmisches Klatschen im Kreis. Heute versammeln sich unsere Männer und Frauen, um diesen Tanz bei jeder Gelegenheit aufzuführen, sich als Gemeinschaft näher zu kommen und kunstvoll bestickte Gewänder zu tragen. Jung und alt, Bauern und Prinzen, Muslime und Hindus tanzen gemeinsam in einem immer größer werdenden Kreis."
 guj_jain_routes: "$jain_ADJ$e Verbindungen"
 guj_jain_routes_desc: "Der Jainismus ist eine altertümliche Lebensweise, die von Mahāvīra in ihre jetzige Form gebracht wurde. Tausend Jahre lang war $GUJ$ eine Hochburg für die jainistische Gemeinschaft und ihren Glauben, weshalb dort auch viele ihrer Sakralstätten und Tempel errichtet wurden. Königsdynastien förderten die Religion weiter, was zu einer jainistisch-hinduistischen Bevölkerung führte. Muslimische Invasionen aus dem Osten unter Führung von Mahmud Ghazni und Mohammed Ghori unterdrückten die jainistische Gemeinschaft, brannten Tempel nieder oder wandelten sie in Moscheen um und verwüsteten ihre Bibliotheken. Das jainistische Volk von $GUJ$ hat die Zeit jedoch überdauert, sich angepasst und Wohlstand erlangt. Dazu haben es seine Verbindungen zu jainistischen Gemeinschaften auf der ganzen Welt genutzt und ein spirituelles und kommerzielles Zentrum aufgebaut."
 guj_gujarati_lipi: "$GUJ_ADJ$e Lipi"
 guj_gujarati_lipi_desc: "Die Gujarati-Lipi ist eine neue Schrift und ein Schreibsystem, das sich aus den merkantilen Bestrebungen des Staates entwickelt hat. Sie ist auch als Saraphi (Bankiers), Vaniasai (Kaufleute) oder Mahajani (Händler) bekannt. Sie hat sich schnell in ganz $GUJ$, $KUT$ und $SND$ verbreitet, um die dort gesprochenen Sprachen abzudecken und die sanskritische Sprache zu studieren, und wurde sogar von den Zoroastriern beim Verfassen der Avesta übernommen. Die Gujarati-Lipi bietet damit vielen unterschiedlichen Gemeinschaften ein einheitliches Schriftsystem, was ihr Einheitsgefühl stärkt und eine gemeinsame Identität schafft."
 guj_gujarati_merchant_diaspora: "$GUJ_ADJ$e Handelsdiaspora"
 guj_gujarati_merchant_diaspora_desc: "Unser Volk treibt auf der ganzen Welt Handel! Es folgt den Passatwinden und geht an jeder Küste seinen Geschäften nach. Unsere Flotten segeln von Küste zu Küste, immer auf der Suche nach neuen Geschäftsmöglichkeiten. Unsere Händler wissen, wie man gute und robuste Schiffe baut."
 mug_zamindar_system: "Zamindar-System"
 mug_zamindar_system_desc: "Die Zamindar sind Feudalherren, die autonom oder halbautonom über unsere Territorien herrschen. Sie sind zwar die Eigentümer des Landes, das sie verwalten, und gehören zu unserem Adel, aber letztlich sind sie Vasallen der Krone."
 mug_mughal_ibadat_khana: "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"
 mug_an_indian_padshah: "Indischer Padischah"
 mug_an_indian_padshah_desc: "In unserem Reich gibt es viele Glaubensrichtungen und unzählige Kulturen und obwohl wir für diese Länder Fremde sind, reizen uns die Traditionen und Werte Indiens. Trotz der reichen Kultur scheint das Volk jedoch kein gemeinsames Ziel zu verfolgen. Wir müssen sicherstellen, dass all unsere Untertanen, ungeachtet der Kaste, Religion oder Kultur, die gleiche Gelegenheit bekommen, unserem großartigen Haus zu dienen."
 mug_mughal_architecture: "$MUG_ADJ$e Architektur"
 mug_mughal_architecture_desc: "Ein Großreich benötigt monumentale Bauten, um künftige Generationen ins Staunen zu versetzen. Diese grandiosen Gebäude werden von unseren Architekten gebaut. Unsere Dynastie wird an vorderster Front dieser architektonischen Bewegung stehen und die großartigsten Bauwerke errichten, die die Welt jemals gesehen hat."
 mug_fatawa_e_alamgiri: "Fatawa-i-Alamgiri"
 mug_fatawa_e_alamgiri_desc: "Die $mug_fatawa_e_alamgiri$ ist eine auf der Scharia basierende Rechtsgrundlage, die als primäres Gesetzbuch dient und verschiedene Aspekte des Lebens regelt, darunter muslimisches Recht, Ethik, Militärstrategien, Wirtschaftspolitik, Gerechtigkeit und andere Verhaltensrichtlinien."
 samanta_advance: "Sāmanta-Feudalismus"
 samanta_advance_desc: "Sāmanta – #italic Nachbar#! – ist gleichermaßen eine Bezeichnung für Vasallen als auch für andere Tributzahler. Es handelt sich dabei um ein Feudalsystem, das man lange Zeit nutzte und das erst nun langsam an Bedeutung verliert. Es ist eine der Säulen, auf denen unsere Gesellschaft seit Jahrhunderten aufbaut."
 kalaripayattu_advance: "Kalarippayat"
 kalaripayattu_advance_desc: "Das Kalarippayat — #italic Übungen der Kriegskunst auf dem Schlachtfeld#! — ist eine alte indische Kampfkunst, die ihren Ursprung in $malabar_area$ hat. Die Krieger unseres Staates müssen in den Künsten des Kalarippayat ausgebildet werden, um ihre Fähigkeiten im Nahkampf zu verbessern."
 nair_military_advance: "Nair-Armee"
 nair_military_advance_desc: "Die Nair sind eine hinduistische Kaste aus $malabar_area$, die auf eine lange Geschichte im Militär zurückblicken kann. Ihre Erfahrung und die Rolle, die sie für das $kalari$ spielen, werden für die anstehenden Konflikte von großem Wert sein."
 mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"
 mhr_tradition_of_military_service: "Traditioneller Militärdienst"
 mhr_tradition_of_military_service_desc: "Der Dienst der marathischen Reiterei hat als „Bargire“ eine lange Tradition in Diensten der dekkanischen Sultanate. Die zunehmende Militarisierung des Dekkans durch die zahlreichen in dieser Region ausgetragenen Kriege hat unsere Kavallerie zu einer der gefährlichsten Streitmächte in ganz Indien gemacht."
 mhr_forts_of_maharashtra: "Maharashtra-Festungen"
 mhr_forts_of_maharashtra_desc: "In unserem hügeligen und dicht bewaldeten Land sind Festungen für die Offensive und Defensive unerlässlich. Unsere oberste Priorität muss darin liegen, diese Festungen instand zu halten."
 mhr_peasant_soldiers: "Bauernsoldaten"
 mhr_peasant_soldiers_desc: "In den Dörfern der Desch-Region leben viele fähige Männer, die nur zu gerne in unseren Armeen dienen würden. Wir müssen jeden rekrutieren, der Marathi sprechen kann, und ihn für den Militärdienst ausbilden."
 mhr_office_of_the_peshwa: "Amt des Peshwas"
 mhr_office_of_the_peshwa_desc: "Wir müssen ein Amt schaffen, das einzig und allein für die Verwaltung unseres Staats und seiner Armeen zuständig ist. Unter der Führung eines fähigen Ersten Ministers, dem Peshwa, wird unser Land flexibel genug sein, schnell und effizient zu expandieren."
 mhr_encourage_brahmin_ties: "Brahmanen-Bande stärken"
 mhr_encourage_brahmin_ties_desc: "Der Finanzsektor unseres Staates wird größtenteils von brahmanischen Bankiersfamilien kontrolliert. Wir sollten sie fester in unseren Staat eingliedern, indem wir sie zu Steuereintreibern machen, Gesetze zur Stärkung ihrer Rechte verabschieden und ihre Traditionen schützen. Dies sichert uns die Gunst unserer Geldgeber und verschafft uns fähige und fachkundige Verwalter."
 pun_breadbasket_of_india: "Brotkorb Indiens"
 pun_breadbasket_of_india_desc: "Die fünf großen Flüsse — Indus, Jhelam, Chenab, Ravi und Sutlej — durchziehen das Land der Region $punjab_area$ und machen den Boden unvergleichlich fruchtbar. Abgesehen davon, dass wir Nahrung und Baumwolle zu unseren Nachbarn ausführen können, beschleunigt dies auch das Wachstum unserer Städte und fördert die Herstellung vielerlei Produkte. Wir müssen das Wachstum unserer Landwirtschaft fördern und unsere Bauern vor den Banditen und Briganten der angrenzenden Gebiete schützen."
 pun_encourage_indo_persian_trade: "Indo-persischer Handel"
 pun_encourage_indo_persian_trade_desc: "$PUN$ liegt an der westlichsten Grenze von Indien und war schon immer ein Dreh- und Angelpunkt des wirtschaftlichen und kulturellen Austauschs zwischen $india$ und $persia_region$. Die alte Sarak-i-Azam (Königliche Straße), die Ostindien mit der farsisprechenden Welt verbindet, führt geradewegs durch unser Land, bevor sie sich die afghanischen Gebirgspässe hinaufwindet. Letztere werden jedoch von Stammesräubern und Plünderern heimgesucht. Wir sollten die Nutzung dieser alten und lebendigen Route fördern und alles in unserer Macht Stehende unternehmen, um das Wohlergehen der Händler zu garantieren. Dies könnte durch den Bau von Karawansereien und die Überwachung dieser Straßen geschehen."
 pun_punjabi_textile_industry: "$PUN_ADJ$e Tuchindustrie"
 pun_punjabi_textile_industry_desc: "$PUN$ ist ein wichtiges Zentrum der Tuchherstellung. Unsere Weber, die zu den produktivsten in ganz $india$ gehören, fertigen Tücher für Märkte in ganz Asien und Europa an."
 pun_foundation_of_the_khalsa: "Khalsa"
 pun_foundation_of_the_khalsa_desc: "Der $sikhism$, eine aus $PUN$ stammende Religion, breitet sich rasant in unserem Land aus. Die Anhänger dieses Glaubens kommen aus allen Kasten und Schichten und werden ihren Staat unabhängig von ihren früheren Berufen verteidigen."
 pun_gurmukhi_script: "Gurmukhi-Schrift"
 pun_gurmukhi_script_desc: "Die Gurmukhi-Schrift ist eine Abugida, die in $PUN$ entwickelt wurde und besonders von den sikhistischen Gurus genutzt wird. Unser Klerus nutzt diese Schrift ebenfalls, um sikhistische Texte aufzuzeichnen."
 pun_strength_of_the_misls: "Stärke der Misls"
 pun_strength_of_the_misls_desc: "Das Verwaltungssystem der Misl-Staaten des $PUN$ führen beeindruckende Kavallerietruppen in die Schlacht. In Notzeiten können wir zum Kampf gegen einen gemeinsamen Feind auf diese Truppen zurückgreifen."
 pun_reforming_the_punjabi_army: "Reformierung der punjabischen Armee"
 pun_reforming_the_punjabi_army_desc: "Die Gepflogenheiten unserer Vorväter waren in sich stimmig und haben uns viele Jahre gute Dienste erwiesen. Damit unsere Armeen aber ihre Triumphe auf dem Schlachtfeld fortsetzen können, müssen wir mehr in Richtung einer Berufsarmee denken. Indem wir die Organisationsweise der Armeen weit entfernter Länder studieren und deren Methoden an unsere Situation anpassen, werden wir unter Beibehaltung der einzigartigen Qualitäten unseres jetzigen Militärsystems die Effizienz der punjabischen Armee steigern."
 #Thai Culture
 religious_melting_pot: "Religiöser Schmelztiegel"
 religious_melting_pot_desc: "Unser Volk wurde im Lauf der Zeit von vielen verschiedenen Religionen beeinflusst, darunter die traditionellen Volksglauben bis hin zum Hinduismus und Buddhismus aus $india$ und $china$. Mit der Zeit hat unser Volk eine Art Synkretismus entwickelt und einige Überzeugungen miteinander vermischt, ohne eine der Glaubensrichtungen völlig außer Acht zu lassen."
 akson_thai: "Akson Thai"
 akson_thai_desc: "Die thailändische Schrift beruhte ursprünglich auf der alten khmerischen Schrift, wurde aber in Abgrenzung zu dieser entwickelt, um der Phonologie der Sprache Rechnung tragen zu können. Eine individuelle Schriftsprache half unserem Volk, eine einzigartige Kultur zu entwickeln."
 father_governs_children: "Ein Vater gebietet über seine Kinder"
 father_governs_children_desc: "Unser Herrscher pflegen eine enge Beziehung zum gemeinen Volk. Möge unser Volk frei und glücklich unter dem führenden Licht seiner majestätischen, himmlischen Herrscher leben."
 thai_war_elephants: "Kriegselefanten"
 thai_war_elephants_desc: "Kriegselefanten finden in $indochina_region$ bereits seit Generationen Verwendung. Sie sind zum einen Kavallerie, die die Infanterie unterstützt, und zum anderen das persönliche Reittier der Könige, um mit anderen Staatsoberhäuptern Elefantenduelle zu bestreiten."
 thai_royal_poets: "Königliche Dichter"
 thai_royal_poets_desc: "Was nützt es, Kriege zu gewinnen, wenn es niemanden gibt, der darüber singt? Unser Hof soll einen sicheren Ort für Dichter bieten, und unsere Geschichte soll ihre Inspirationsquelle sein."
 trading_links: "Handelsbeziehungen"
 trading_links_desc: "Unser Land liegt bereits seit Urzeiten an einer Schnittstelle des Handels. Unsere Nähe sowohl zu $india$ als auch zu $china$ hat es dem Handel erlaubt, frei durch unser Land zu fließen, und hat zu vielen Beziehungen und Betätigungen mit den verschiedenen Ländern um uns herum geführt."
 foreign_mercenaries: "Fremdländische Söldner"
 foreign_mercenaries_desc: "Seit Kurzem beobachten wir einen steten Zustrom barbarischer Einflüsse aus fernen Ländern. Zum Teil handelt es sich dabei um Händler, aber gelegentlich befinden sich auch Krieger unter ihnen. Wir sollten diese Männer für unsere Armee nutzen."
 toi_muay: "Toi Muay"
 toi_muay_desc: "Das Toi Muay ist eine unbewaffnete Kampfkunst, die man unsere Soldaten für den Einsatz im Krieg lehrt und die Schläge, Griffe und Bodenkampftechniken umfasst. Diese Kampfkunst zu beherrschen, erlaubt es unseren Soldaten, im Kampf tödlicher zu sein, selbst wenn sie ihre Waffen verlieren."
 trading_embassies: "Handelsbotschaften"
 trading_embassies_desc: "Zahlreiche Händler treiben auf den Gewässern in der Nähe unseres Landes Handel. Dies hat es uns erlaubt, Wissen über Reiche anzusammeln, die weit entfernt liegen. Wir können dort Botschaften errichten und Beziehungen zu diesen Nationen aufbauen."
 photduang: "Photduang"
 photduang_desc: "Unsere Währung mag für viele andere Staaten sonderbar sein, doch der #italic $photduang$#! leistet uns schon seit Jahrhunderten gute Dienste. Die rundlichen Kugeln aus Silber werden mit unserem offiziellen Amtszeichen versehen und bilden die Grundlage unserer Wirtschaft."
 personal_executions: "Persönliche Hinrichtungen"
 personal_executions_desc: "Es ist nur angebracht, dass die Menschen erfahren, wie sehr wir uns für die Rechtsprechung einsetzen. Von heute an wird unser Herrscher persönlich die Hinrichtung der ruchlosesten Verbrecher übernehmen. Damit werden die Menschen wissen, dass es in unserem Land gesittet zugeht und sie dazu aufgefordert sind, sich an die Gesetze zu halten."
 close_subjects: "Enge Beziehungen zu Klientelländern"
 close_subjects_desc: "Wir sehen unsere Klientelländer als wesentlichen Bestandteil unseres Landes an. Wir pflegen enge Beziehungen zu ihnen und gliedern sie in unsere Verwaltung und unsere Bürokratie ein."
 #Ayutthaya
 ayu_prestigious_cavalry: "Prestigeträchtige Kavallerie"
 ayu_prestigious_cavalry_desc: "Sei es zu Pferd oder auf dem Rücken eines Elefanten: Unsere Kavallerie reitet voller Stolz in die Schlacht und stammt in der Regel von den prestigeträchtigsten Familien unseres Landes ab. Ihre Wirksamkeit bei der Unterstützung unserer Infanterie ist unbestreitbar."
 ayu_white_elephant: "Weißer Elefant"
 ayu_white_elephant_desc: "Der Weiße Elefant repräsentiert die Macht unserer Herrscher und ist ein sehr günstiges Omen, das wir zu unserem Vorteil nutzen werden. Wenn unser Herrscher auf dem Weißen Elefanten reitet, wird niemand sein Herrschaftsrecht infrage stellen können."
 ayu_ayutthaya_literature: "$AYU_ADJ$e Literatur"
 ayu_ayutthaya_literature_desc: "Die in unserem Land verfasste Literatur ist äußerst vielseitig und reicht von epischen Gedichten, den #italic Lilit#!, die berühmte militärische Konflikte beschreiben, bis hin zum #italic Nirat#!, Dichtungen über Reisen und die Sehnsucht nach verlorenen Liebschaften, von Folklore über örtliche Helden, bis hin zu Festreden, die die Taten unserer glorreichsten Herrscher preisen."
 ayu_phrai_luang: "Phrai Luang"
 ayu_phrai_luang_desc: "Alle freien Männer sind per Gesetz dazu verpflichtet, als Phrai zu dienen, nicht nur im Fall eines Krieges (#italic $ayu_phrai_thaan$#!), sondern auch zur Unterstützung öffentlicher Bauvorhaben, je nach Ermessen der örtlichen Statthalter."
 ayu_phrai_thaan: "Phrai Thaan"
 ayu_phrai_thaan_desc: "Alle Männer, die das 18. Lebensjahr erreichen, müssen registriert werden, damit die Bürokratie der Regierung von ihnen erfährt. Jeder männliche Bürger kann im Fall eines Krieges zum Dienst in der Armee herangezogen werden, und wir sorgen auch dafür, dass sie diesem Ruf Folge leisten."
 ayu_floating_rice: "Nassreisanbau"
 ayu_floating_rice_desc: "Reis baut man in unserem Land bereits seit Jahrhunderten an, doch die ständigen Überschwemmungen unserer Flüsse schaden der Ernte oft. Diese neue Reissorte, die auch bei Überschwemmung gedeiht, erlaubt es uns, selbst dann Nahrung zu haben, wenn die Flüsse Hochwasser führen."
 ayu_sakdina: "Sakdina"
 ayu_sakdina_desc: "Unsere Gesellschaft ist streng nach dem $ayu_sakdina$-System organisiert, einer Ordnung, die den gesellschaftlichen Rang in Ziffern ausdrückt: Jeder unserer Untertanen weiß, welchen Platz er darin einnimmt und wie viel Reichtum und Eigentum ihm zusteht. Dies macht die Steuererhebung deutlich effizienter."
 ayu_cosmopolitan_trade: "Kosmopolitischer Handel"
 ayu_cosmopolitan_trade_desc: "Unser Land ist die Heimat vieler Menschen, die von weit herkommen, um an unseren Märkten zu handeln und vom Reichtum unseres Landes zu profitieren. So viele Menschen und Waren zu haben, die unsere Grenzen passieren, ist etwas, aus dem auch wir einen gehörigen Nutzen ziehen."
 #Sukhothai
 suk_breaker_of_chains: "Kettensprenger"
 suk_breaker_of_chains_desc: "Es ist noch nicht lange her, dass wir unter khmerischer Herrschaft standen, ehe wir unsere Freiheit und unseren rechtmäßigen Platz als unabhängige Macht einnahmen. Wir haben uns die Bewunderung und den Respekt unseresgleichen verdient."
 suk_birthplace_of_a_culture: "Geburtsort einer Kultur"
 suk_birthplace_of_a_culture_desc: "Man nennt uns das erste unabhängige thailändische Königreich, da wir die Ersten waren, die sich gegen die khmerische Herrschaft auflehnten und uns von ihrem Einfluss lösten. Jeder, der sich als Thai betrachtet, sieht in staunender Bewunderung zu uns auf."
 suk_ram_khamhaeng_stele: "Stele von $name_ram_khamhaeng$"
 suk_ram_khamhaeng_stele_desc: "Ein Großteil der geschichtlichen Überlieferungen des frühen sukhothaischen Königreichs stammt von Inschriften der $suk_ram_khamhaeng_stele$, die einst ein großer König anfertigte, um seine glorreiche Herrschaft für die Nachwelt festzuhalten. Die Stele von $name_ram_khamhaeng$ ist ein heiliges Erbstück, das unseren Platz in der Geschichte belegt."
 suk_akson_sukhothai: "Akson-$SUK$"
 suk_akson_sukhothai_desc: "Auch wenn die thailändische Schrift unter dem thailändischen Volk weitverbreitet ist, sollte man nicht vergessen, dass sie in unserem Land entwickelt wurde und aus der Schrift unserer ehemaligen khmerischen Unterdrücker stammt. Sie vereint deshalb auch nicht nur unsere Kultur, sondern ist gleichzeitig auch ein Zeugnis für unsere Individualität und Einzigartigkeit."
 suk_wat_si_sawai: "Wat Si Sawai"
 suk_wat_si_sawai_desc: "Wir sind für unsere unzähligen großen Tempel berühmt, zu denen auch der $suk_wat_si_sawai$ gehört, einer der ältesten Tempel in $sukhothai$. Der unter der Herrschaft der Khmer gebaute hinduistische Tempel ist heute zu einem Symbol unserer Identität geworden. Der Glaube unseres Volkes ist stark."
 suk_sukhothai_ceramics: "Keramik von Sukhothai"
 suk_sukhothai_ceramics_desc: "Das thailändische Volk stellt bereits seit Urzeiten Keramik her, die von der chinesichen Keramik beeinflusst ist, sich aber ihren einen eigenen Stil bewahrt hat. Jene Keramik, die man in unserem Land herstellt, ist auf den Märkten jedoch am begehrtesten und wird oft über große Entfernungen hinweg gehandelt."
 suk_military_history: "Militärgeschichte"
 suk_military_history_desc: "Unsere Armeen können auf eine lange Geschichte von Erfolgen und großen Siegen zurückblicken. Dies hat auch dazu geführt, dass eine Position in unserem Militär als ehrenvoll und prestigeträchtig angesehen wird und viele bereit sind, einen Wehrdienst zu leisten."
 suk_unstoppable_army: "Unaufhaltbare Armee"
 suk_unstoppable_army_desc: "Viele haben in der Vergangenheit versucht, unseren Fortschritt und unsere Expansion aufzuhalten, doch sie alle sind beim Anblick unserer Armee gescheitert. Sie hat sich als unaufhaltbare Kraft erwiesen, die alle Hindernisse in ihrem Weg beiseitefegt."
 #Siam
 sia_experienced_ambassadors: "Erfahrene Botschafter"
 sia_experienced_ambassadors_desc: "Wir haben viel Erfahrung in Sachen Politik, und die Anfänge unseres Landes wurden nicht nur durch die Stärke unseres Militärs geprägt, sondern auch durch unser diplomatisches Ansehen, was uns einen gewissen Einfluss verschafft hat."
 sia_rise_to_equal_heights: "Verbesserte Lebensbedingungen"
 sia_rise_to_equal_heights_desc: "Große Teile unseres Landes sind entvölkert. Wir sollten die Lebensbedingungen dort verbessern und sicherstellen, dass es keine Region in unserem Land gibt, die man als glanzlos erachtet, sondern dass vielmehr alle Teile gleichermaßen glänzen können."
 sia_advanced_elephant_warfare: "Fortschrittliche Elefanten-Kriegsführung"
 sia_advanced_elephant_warfare_desc: "Es ist nicht ungewöhnlich, dass die größten Gedichte über uns Zeilen enthalten, in denen unsere stärksten Kriegselefanten einzeln aufgeführt und geehrt werden. Wir werden unseren Feinden zeigen, warum dies der Fall ist."
 sia_consolidation_of_state: "Konsolidierung des Staates"
 sia_consolidation_of_state_desc: "Ein dezentralisiertes System könnte dazu führen, dass wir etwas Macht in unseren entferntesten Provinzen verlieren. Wenn wir ein wahres vereintes thailändisches Reich aufbauen wollen, müssen unsere Provinzen ebenfalls vereint sein."
 sia_education_reform: "Bildungsreformen"
 sia_education_reform_desc: "Wie Meister Buddha einst sagte, werden wir etwas nicht einfach nur deshalb akzeptieren, weil es oft gesagt wird, sondern weil wir es selbst erfahren haben. Bildung ist die Grundlage des Wissens, und wenn wir Technologien meistern wollen, müssen wir zuerst die Bildung meistern."
 sia_royal_absolutism: "Königlicher Absolutismus"
 sia_royal_absolutism_desc: "Ein Herrscher sollte nur dem Himmel gegenüber Rechenschaft ablegen müssen. Verehrt und angebetet gebieten unsere Anführer über die Erde, wie die Götter über den Himmel."
 sia_thai_unity: "$thai_culture$e Einigkeit"
 sia_thai_unity_desc: "Es gibt keinen Zweifel, dass wir die wahren Herrscher des ganzen thailändischen Volkes sind. Unsere Truppen sind stolz, nicht nur dem Land zu dienen, sondern auch dafür einzutreten, unsere Kultur und Identität zu verteidigen, und sie kämpfen entschlossen dafür."
 #Rome
 rom_spqr: "S.P.Q.R."
 rom_spqr_desc: "Der Senat und das Volk von Rom sind das ewige Fundament unseres Staates. Indem wir uns auf diese alte Autorität berufen, erinnern wir alle daran, dass Rom nicht nur mit Waffengewalt regiert, sondern durch den Willen seiner Bürger und seiner Institutionen."
 rom_pax_romana: "Pax Romana"
 rom_pax_romana_desc: "„Frieden unter Rom“ bedeutet nicht die Abwesenheit von Krieg, sondern den Triumph der Ordnung. Durch Gesetze, Straßen und die Macht unserer Armeen bringen wir Stabilität und Wohlstand in jeden Winkel unseres Reiches."
 rom_restore_the_legions: "Wiederherstellung der Legionen"
 rom_restore_the_legions_desc: "Die Legionen waren einst der Stolz Roms und in der gesamten bekannten Welt gefürchtet und respektiert. Ihre Wiederherstellung bedeutet, die Disziplin, die Organisation und den unbeugsamen Geist wiederzubeleben, auf die wir uns einst gründeten."
 rom_revival_of_arts_and_culture: "Wiederbelebung der Künste und Kultur"
 rom_revival_of_arts_and_culture_desc: "Rom war ebenso ein Leuchtfeuer der Kultur wie ein Ausgangspunkt von Eroberungen. Wenn wir Dichter, Gelehrte und Architekten fördern, entfachen wir erneut diese schöpferische Flamme, die einst die antike Welt erhellte."
 rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
 rom_new_corpus_juris_civilis_desc: "Unsere Juristen fassen die Gesetze zu einem kohärenten Ganzen zusammen und verfeinern sie, wobei sie sich auf die Weisheit Justinians und der Republik stützen. So gewährleisten wir Gerechtigkeit für alle Bürger unter römischer Herrschaft."
 rom_bread_and_circuses: "Panem et Circenses"
 rom_bread_and_circuses_desc: "Das Volk muss bei Laune gehalten werden, denn Unzufriedenheit führt zu Aufständen. Indem wir für Getreide in den Bäuchen und Unterhaltung vor den Augen sorgen, gewinnen wir Treue und stärken den Staat."
 rom_citizenship: "Römisches Bürgertum"
 rom_citizenship_desc: "Das Bürgertum ist der Lebenssaft Roms, das die Völker aller Provinzen zu einem einzigen politischen Körper verbindet. Die Ausweitung dieser Rechte gewährleistet die Eingliederung und verspricht allen, die dem Imperium dienen, Aufstiegsmöglichkeiten."
 rom_all_roads_lead_to_rome: "Alle Wege führen nach Rom"
 rom_all_roads_lead_to_rome_desc: "Das römische Straßennetz wird weltweit beneidet. Es verbindet unser Reich im Inneren und macht unsere Händler, Boten und Soldaten schneller, denn alle Wege kreuzen sich in der Ewigen Stadt."
 rom_provincial_governors: "Provinzstatthalter"
 rom_provincial_governors_desc: "Die Provinzen können nicht allein von Rom regiert werden. Indem wir fähige Statthalter mit Macht ausstatten, stellen wir sicher, dass unsere Gesetze und Steuern auch die fernsten Lande unseres Imperiums erreichen."
 rom_imperium_sine_fine: "Imperium Sine Fine"
 rom_imperium_sine_fine_desc: "Das Schicksal Roms kennt keine Grenzen. Uns ist vorbestimmt, unsere Herrschaft von den Säulen des Herkules bis zum Ende der Welt auszudehnen und die Zivilisation überallhin dorthin zu tragen, wohin unsere Adler marschieren."
 rom_triumphs: "Römische Triumphzüge"
 rom_triumphs_desc: "Ein Triumphzug ist mehr als eine Prozession. Er ist vielmehr ein lebendes Denkmal der Eroberung, das durch die Straßen unserer größten Städte zieht. Solche Zeremonien inspirieren Treue, Ehrfurcht und Ehrgeiz in gleichem Maß."
 rom_roman_architecture: "Römische Architektur"
 rom_roman_architecture_desc: "Ob bei Aquädukten oder Amphitheatern: Römische Ingenieurskunst bringt Denkmäler und Monumente hervor, die Jahrhunderte überdauern. Unsere Meisterschaft in Sachen Stein und Bogen zeigt der Welt, das Roms Größe ewig ist."
 #Byzantium
 byz_heart_of_orthodoxy_advance: "Zentrum des orthodoxen Glaubens"
 byz_heart_of_orthodoxy_advance_desc: "$constantinople$ liegt im Zentrum eines lebendigen und alten Glaubens. Wir sind der stolze Kopf dieses orthodoxen Glaubens, Halter des Ökumenischen Patriarchats und Verteidiger des Christentums gegen unsere heidnischen Feinde."
 byz_akritai_advance: "Akritai"
 byz_akritai_advance_desc: "Die stolzen Akriten, eine leichte Infanterie, verteidigen unsere Grenzen gegen äußere Bedrohungen und erhalten im Gegenzug Land. Die Akriten sind besonders in der defensiven Kriegsführung bewandert, vor allem gegen Kavallerie, und sind meistens die Ersten, die sich einer äußeren Bedrohung stellen."
 byz_cataphracts_advance: "Späte Kataphrakten"
 byz_cataphracts_advance_desc: "Trotz der Veränderungen, die das Schießpulver auf die Kriegsführung hatte, können wir uns noch immer auf unsere altbewährten Taktiken verlassen, die unsere Vorfahren vor Jahrhunderten verfeinerten."
 byz_historiography_advance: "Byzantinische Geschichtsschreibung"
 byz_historiography_advance_desc: "Unser Volk steht auf den Schultern von Riesen. Die sorgfältige Dokumentation unserer Vorfahren, die Rückverfolgung unserer ehrwürdigen Blutlinie und die ordnungsgemäße Bewahrung unserer großen Traditionen sind eine Ehrfurcht gebietende Verantwortung, die sich aus unserer großen Stellung in der Geschichte ergibt."
 byz_bureaucracy_advance: "$BYZ_ADJ$e Bürokratie"
 byz_bureaucracy_advance_desc: "Unsere Verwaltung ächzt unter der Last unseres komplexen Bürokratiegeflechts, ein Erbe der Jahrhunderte kaiserlicher Herrschaft."
 men_of_letters_advance: "Literaten"
 men_of_letters_advance_desc: "Es ist kein Geheimnis, dass uns der Westen um unsere literarischen Errungenschaften und unsere aufgeklärte Vergangenheit beneidet. Deswegen heuern sie häufig Tutoren aus unserem Hof an, die ihnen jenes Wissen vermitteln, aus dem jene mächtigen Reiche hervorgingen, die die kulturelle Landschaft des gesamten Kontinents geprägt haben. Diese Gelehrten werden auch dafür sorgen, dass sich unsere westlichen Nachbarn in unsere Geschichte verlieben und sich an unserer Lebensweise ein Vorbild nehmen."
 byz_shield_of_the_west: "Schild des Westens"
 byz_shield_of_the_west_desc: "Wir schützen Europa vor einem Meer von Heiden. Wir sind der Schild gegen die fremde Bedrohung. Unser Schwert bekämpft jene, die unseren Glauben untergraben wollen. Wir sind der mächtige Hieb, der auf alle niederkommt, die das Ende unserer Traditionen wünschen."
 byz_court_of_languages: "Hof der vielen Sprachen"
 byz_court_of_languages_desc: "Der Hof von $constantinople$ ist die Heimat zahlreicher Diplomaten und Würdenträger aus jedem Winkel der uns bekannten Welt. Dieser Umstand hat dazu geführt, dass jede Sprache gehört und respektiert wird. Es ist ein Zeichen unseres Wohlstands und unseres Fortschritts und spiegelt den Gedanken eines Volkes wider, dessen Geschichte und Sprache die Welt geprägt haben."
 byz_poikilia: "Poikilia"
 byz_poikilia_desc: "Die byzantinische Kultur eroberte ganz $europe$ im Sturm. Die große Palette an eleganten Farbtönen brachte eine neue Art hervor, die Sinfonie der Farben und Elemente in der Kunst und Architektur zum Ausdruck zu bringen."
 byz_crossroads_of_continents: "Kreuzung der Kontinente"
 byz_crossroads_of_continents_desc: "Byzanz liegt am Scheidepunkt zwischen $europe$ und $asia$. Diese vorteilhafte Lage hat der Stadt großen Einfluss und maritime Bedeutung beschert."
 byz_the_new_helepolis: "Stadteinnehmer"
 byz_the_new_helepolis_desc: "Unsere Tradition, die mächtigsten und beeindruckendsten Belagerungsmaschinen einzusetzen und sie stetig zu verbessern, prägt unsere Kriegsführung bereits seit Urzeiten. Indem wir das Schießpulver in unsere Konstruktionen aufnehmen, werden unsere Kanonen unsere Feinde noch viel leichter dominieren können."
 byz_reaffirm_synod_powers: "Reformierung der Heiligen Synode"
 byz_reaffirm_synod_powers_desc: "Die Bürokratie ist ein Albtraum für ein Land unserer Größe. Um die Einberufung unserer Heiligen Synode zu vereinfachen, werden wir die Bürokratie abbauen und die Gesetzgebung dazu überarbeiten."
 byz_byzantine_inquisition: "Byzantinische Inquisition"
 byz_byzantine_inquisition_desc: "Um nicht wie $europe$ Gefahr zu laufen, Opfer von Ketzerei und Instabilität zu werden, die unweigerlich aus den religiösen Unruhen entstehen, von denen sie derzeit heimgesucht werden, müssen wir uns darauf vorbereiten, jedes Unkraut zu vernichten, das in unserem Garten keimen könnte."
 byz_autokratoria_rhomaion: "Autokratoría Rhōmaíōn"
 byz_autokratoria_rhomaion_desc: "Unsere glorreiche Nation ist der unbestrittene Nachfolger des römischen Ruhms und seines Prestiges. Seine ehemaligen Gebiete wiederzuerlangen ist unser vorrangiges Ziel und das, was uns antreibt."
 byz_modernized_strategikon: "Modernisiertes Stratēgikon"
 byz_modernized_strategikon_desc: "Das vor langer Zeit von Maurikios verfasste Militärhandbuch hat unserem Volk in Kriegszeiten gut gedient. Da sich die Kriege unserer Zeit jedoch stark verändert haben, müssen auch wir uns verändern. Wir haben unsere Taktiken angepasst und auch unsere Regimenter haben sich auf neue Methoden der Kriegsführung und auf neue Waffen eingestellt, die weitaus verheerender sind als alles, was unsere Feinde nutzen."
 byz_ancient_greek_studies: "Studium der altgriechischen Kultur"
 byz_ancient_greek_studies_desc: "Das Wiederaufleben klassischer Werke und die Förderung der altgriechischen Künste hat dem Westen eine wunderbare Gelegenheit gegeben, die Massen zu bilden und die verschiedenen Ideale und Traditionen der Kultur und Wissenschaft zu wahren."
 byz_the_new_imperial_army: "Neue kaiserliche Armee"
 byz_the_new_imperial_army_desc: "Unsere Armee ist im Vergleich zu denen Europas im Rückstand. Wir müssen unsere Armee reformieren und die Rekrutierung ausweiten, um eine Armee aufstellen, die dem wiederauferstandenen mächtigen Phoenix gerecht wird."
 expand_varangian_guard_advance: "Ausweitung der Warägergarde"
 expand_varangian_guard_advance_desc: "Die ehrenhaften Waräger dienen unserem Land bereits seit Jahrhunderten. Durch die Ausweitung ihrer Reihen werden wir sicherstellen können, dass das Byzantinische Reich auch in den kommenden Jahrhunderten Stabilität und Schutz genießen wird."
 imperatorskiy_moskovskiy_universitet: "Imperatorskij Moskowskij Uniwersitet"
 imperatorskiy_moskovskiy_universitet_desc: "Die Kaiserliche Universität ist dem Studium der Philosophie, der Medizin und der Rechtsgrundlagen gewidmet und spielt eine bedeutende Rolle in der Bildung und Forschung Russlands. Sie wurde von dem Universalgelehrten Michail Lomonossow als Teil der russischen Bildungsreform gegründet, um die Bedeutung der wissenschaftlichen Forschung und Innovation zu betonen."
 hurricane_hardy: "Orkanbeständig"
 hurricane_hardy_desc: "Die Entwürfe von Fjodor Apraxin erlauben uns den Bau besonders widerstandsfähiger Schiffe, die die meisten Naturgewalten überstehen können. Diese Innovation ist ein wichtiger Beitrag für unsere aufkommenden maritimen Ambitionen."
 preobrazhensky_semyonovsky_imperial_guard: "Semjonowski-Leibgarderegiment"
 preobrazhensky_semyonovsky_imperial_guard_desc: "Die Spielzeugarmee ist in Elitetruppen organisiert, die die kaiserliche Garde bilden und die Interessen der Monarchie schützen. Sie ist häufig an Hofzeremonien, Paraden und anderen wichtigen Ereignissen beteiligt, was ihre Bedeutung über ihre militärischen Pflichten hinaus unterstreicht."
 #Poland
 kasztelanowie: "Kasztelanowie"
 kasztelanowie_desc: "Die Kastellane sind das offizielle Sprachrohr des Monarchen und vertreten diesen im gesamten Herrschaftsbereich. Sie sind für die Erhebung von Steuern und die Gewährleistung der Rechtsstaatlichkeit zuständig und sorgen im Namen der Krone für Gerechtigkeit."
 land_of_promise: "Land der Möglichkeiten"
 land_of_promise_desc: "Das fruchtbare Land unserer Domäne ist besonders für die unteren Schichten unserer Bevölkerung, die nach einem neuen und besseren Leben suchen, eine neue Heimat geworden."
 statute_of_kalisz: "Statut von Kalisz"
 statute_of_kalisz_desc: "Die auch als „Allgemeine Charta der jüdischen Freiheiten“ bekannte Gesetzgebung gewährt allen Juden die Freiheit, an Gottesdiensten teilzunehmen, Handel zu treiben und zu reisen. Das Gesetz zielte auch darauf ab, die von der katholischen Kirche verbreiteten Anschuldigungen zu Ritualmorden gegen Juden einzudämmen."
 corona_regni_poloniae: "Corona Regni Poloniae"
 corona_regni_poloniae_desc: "Der Gedanke, dass das Königreich unteilbar ist und nicht einer Dynastie oder einem Monarchen, sondern der Gesamtheit der politischen Gemeinschaft in unserem Herrschaftsbereich gehört, ist zwischen uns und den verschiedenen Herzögen unter unserem Banner fest verankert."
 krakow_grosz: "Grosz Krakowski"
 krakow_grosz_desc: "In dem Versuch, unser Währungssystem zu reformieren, haben wir eine neue Währung eingeführt, den Krakauer Groschen. Diese aus Silber geprägten Münzen sollen die Vorherrschaft des böhmischen Prager Groschens herausfordern und unser Reich an die Spitze der zentralisierten Besteuerung stellen."
 stone_and_brick: "Stein und Ziegel"
 stone_and_brick_desc: "Jahrhundertelang haben wir uns auf schwaches Holz verlassen, um Häuser zu bauen und Verteidigungsanlagen zu errichten. Dank unseres Reichtums und unserer politischen Macht können wir die Infrastruktur unseres Reichs ausbauen. Wir haben hölzerne Städte geerbt und werden sie mit Stein und Ziegeln befestigen."
 council_of_three_lands_advance: "Rat der drei Länder"
 council_of_three_lands_advance_desc: "Unser Land hat die oft mittellosen und verfolgten Juden schon immer willkommen geheißen. Die Gründung eines Rates, der sich um ihre Bedürfnisse kümmert und ihre Rechte schützt, wird deshalb unserer Stabilität sehr zugutekommen."
 polish_renaissance: "Polnische Renaissance"
 polish_renaissance_desc: "Von der italienischen Renaissancebewegung inspiriert, wird auch in unserem Land die Kunst und Kultur erblühen."
 granary_of_europe: "Kornkammer Europas"
 granary_of_europe_desc: "Auf den fruchtbaren Feldern unseres Reichs wird jedes Jahr die größte Getreideernte Europas eingefahren, nicht zuletzt wegen unseres Vorwerk-Systems. Wir beliefern die Märkte jenseits unserer Grenzen und sorgen dafür, dass unser Volk Wohlstand genießen kann und niemals hungern muss."
 komisja_edukacji_narodowej: "Komisja Edukacji Narodowej"
 komisja_edukacji_narodowej_desc: "Als Antwort auf den Bedarf an fähigen Verwaltern und um den reibungslosen Ablauf entsprechender Verfahren gewährleisten zu können, werden wir die erste Kommission für nationale Bildung Europas finanzieren und aufbauen. Sie wird sich auch darum kümmern, die Alphabetisierung unseres Volks voranzutreiben."
 szkola_rycerska: "Szkoła Rycerska"
 szkola_rycerska_desc: "Indem wir der nächsten Generation von Adligen ein Nationalgefühl einflößen, können wir diese zu wertvollen Militär- und Verwaltungsbeamten heranziehen."
 great_sejm_reforms: "Sejm-Reformen"
 great_sejm_reforms_desc: "Wenn wir überleben und gedeihen wollen, müssen wir sicherstellen, dass unser Regierungsapparat gut funktioniert und auf einer soliden Grundlage aufgebaut ist. Aus diesem Grund müssen wir die Prozesse unseres Parlaments modernisieren und ihm weitreichende Befugnisse einräumen. Unser Ziel muss darin liegen, die Macht des Adels zu beschränken und die zunehmenden Missstände der Leibeigenschaft abzuschaffen."
 late_winged_hussars_advance: "Späte polnische Husaren"
 late_winged_hussars_advance_desc: "Im späten 17. Jahrhundert wurden die polnischen Husaren mit schweren Rüstungen in den Farben Rot und Weiß ausgerüstet. Sie benutzten auch eine längere Lanze von etwa sechs Metern Länge und ihr Angriff war unglaublich verheerend, brach oft die Moral ihrer Feinde und zwang sie zur Flucht."
 winged_hussars_advance: "Polnische Husaren"
 winged_hussars_advance_desc: "Ursprünglich handelte es sich bei den Husaren um leichte Kavallerietruppen, die als Kundschafter fungierten. Der Niedergang der alten Feudalarmee veranlasste uns jedoch dazu, uns mehr auf ein stehendes Heer zu verlassen. Die neuen, schwerer gepanzerten Husaren werden den Kern davon bilden. Die Polnischen Husaren werden unsere Feinde schon bald in Angst und Schrecken versetzen!"
 wojsko_komputoe: "Wojsko Komputowe"
 wojsko_komputoe_desc: "Die sogenannte „Berechnete Armee“ (Wojsko Komputowe) basierte auf einer jährlichen Etatberechnung, die vom Sejm durchgeführt und genehmigt wurde. Ziel war es, für Polen-Litauen ein zuverlässiges stehendes Heer zur Landesverteidigung zu schaffen."
 folwark_system: "Vorwerk-System"
 folwark_system_desc: "Das Vorwerk-System war ein Produktionssystem, das die Erzeugung landwirtschaftlicher Überschüsse anregen sollte. Bauern wurden zur Arbeit auf diesen Gütern angehalten, entweder gegen Pacht oder unter Zwang. Das System sollte zum Stützpfeiler der polnischen Gesellschaftsordnung werden."
 #China & Variations
 baihua: "Báihuàwén"
 baihua_desc: "Unser Reich erstreckt sich bis jenseits des Horizonts und ist die Heimat zahlreicher Kulturen und Sprachen. Eine gemeinsame Schriftsprache einzuführen wird die Kluft verringern, unsere Kultur zu einer Hochkultur erheben und die Spannungen, die durch Missverständnisse und Sprachbarrieren entstehen können, reduzieren."
 zaju: "Zájù"
 zaju_desc: "Diese in der Regel aus vier Akten bestehenden Theaterstücke beinhalten sowohl Tänze als auch Musik und sind ein leuchtendes Beispiel für die künstlerischen Fähigkeiten unserer Gesellschaft."
 successors_of_genghis_khan: "Nachfolger von $genghis_khan_name_no_tooltip$"
 successors_of_genghis_khan_desc: "Unser Volk stammt von $genghis_khan_name_no_tooltip$ ab, dem Erderschütterer, dessen umfassende Eroberung ein riesiges Reich schuf. Wie einst er sind auch wir dazu ausersehen, Geschichte zu schreiben."
 confucian_influences: "Konfuzianische Einflüsse"
 confucian_influences_desc: "Für die ordnungsgemäße Verwaltung unseres Reichs lässt sich viel aus den Lehren des Konfuzius lernen, die besonderen Wert auf Details, Meritokratie und eine gesunde, florierende Regierung legen."
 chi_bureaucracy_advance: "Imperiale Bürokratie"
 chi_bureaucracy_advance_desc: "Our realm rests upon a tradition of sophisticated administrative institutions, from the Central Secretariat that coordinates all civil governance to the Censorate that holds our officials to account. We shall make this legacy of imperial administration the foundation of our state."
 extensive_canal_works: "Weitreichende Kanalarbeiten"
 extensive_canal_works_desc: "Die vielen Flüsse in unserem Reich bringen uns oft Wohlstand. Um diesen Wohlstand zu nutzen und Wasser für Transportwege zwischen den Flüssen und ins Landesinnere zu richten, muss die Infrastruktur in Form von Kanälen ausgebaut werden."
 zhongshu_sheng: "Zhōngshū Shěng"
 zhongshu_sheng_desc: "Das kaiserliche Sekretariat, der wichtigste Zweig der #italic drei Abteilungen und sechs Ministerien#!, ist dafür zuständig, die vielen Erlasse des Kaisers zu kodifizieren."
 improves_central_secretariat_bureaucracy_tt: "Improves [ShowBureaucracyTypeName('central_secretariat_bureaucracy')] [bureaucracy|e] positive effect by #G 50%#!"
 lijia_system: "Lǐ Jiǎ"
 lijia_system_desc: "Das „Lǐ Jiǎ“-System erlaubt uns, Kontrolle über unsere Grenzgebiete durch die Stationierung von Armeen auszuüben. Indem wir diesen Truppen Land geben und ihnen erlauben, dieses Land zu bearbeiten, können wir dafür sorgen, dass unsere Grenzen sicher sind und wir die Kontrolle haben."
 yulin_tuce: "Yúlín Túcè"
 yulin_tuce_desc: "Steuerhinterziehung ist ein Problem, das schon unsere Vorfahren geplagt hat. Indem wir ein Register für Bezirke und Provinzen erstellen, werden wir einen besseren Überblick über die einzutreibenden Steuern haben, die sie der Zentralregierung schulden. Diese Steuern werden größtenteils auf der Grundlage des Getreideertrags ermittelt."
 weisuo_system: "Wèi Suǒ"
 weisuo_system_desc: "Unser Land ist ein Objekt der Begierde für viele Eroberer. Wenn wir es verteidigen wollen, müssen wir ein Garnisonssystem einrichten, das schnell auf feindliche Invasionen reagieren kann. Durch die Rekrutierung von einheimischen Truppen und die damit verbundene leichtere Versorgung und effizientere Logistik wird unsere Verteidigungsfähigkeit stark wachsen."
 grand_coordinators: "Großkoordinatoren"
 grand_coordinators_desc: "Für den Fortbestand unserer Dynastie ist es von entscheidender Wichtigkeit, dass wir die Kontrolle über unsere Territorien, die Politik und das Militär aufrechterhalten. Die Gründung eines Regierungsausschusses, der von hochrangigen Beamten geführt wird, erlaubt uns, unsere Position durch die Stabilisierung innen- und außenpolitischer Angelegenheiten weiter zu festigen."
 the_censorate: "Zensorat"
 the_censorate_desc: "Diese Regierungsabteilung arbeitet parallel zur restlichen Verwaltung und ist dafür zuständig, Korruption zu verhindern. Die Zensoren haben die Aufgabe, Intrigen und andere Gesetzesüberschreitungen im Palast unter Kontrolle zu halten, und werden oft als die Augen und Ohren des Kaisers betrachtet."
 improves_imperial_censorate_bureaucracy_tt: "Improves [ShowBureaucracyTypeName('imperial_censorate_bureaucracy')] [bureaucracy|e] positive effect by #G 50%#!"
 the_tea_trade: "Teehandel"
 the_tea_trade_desc: "Der Tee ist eines der beliebten Getränke in unserer Gesellschaft und dominiert besonders gesellschaftliche Zusammenkünfte. Dies führt nicht nur dazu, dass neue Sorten gezüchtet werden, sondern auch dazu, dass die Produktion im Allgemeinen angekurbelt wird."
 tu_bing: "Tǔ Bīng"
 tu_bing_desc: "Zur Verteidigung unserer Grenzen müssen wir ein Rekrutierungssystem einführen, das sich auf einheimische Soldaten und Regierungsgetreue konzentriert. Diese Männer werden eine große Bereicherung für unser Militär darstellen und das #italic „Wèi Suǒ“#!-System ergänzen."
 tusi_titles: "Tǔsī-Titel"
 tusi_titles_desc: "Diese Titel werden Kriegsfürsten und anderen lokalen Machthabern verliehen, um Unruhen in Zaum und die Landbevölkerung unter der Kontrolle der Zentralverwaltung zu halten."
 salt_monopoly: "Salzmonopol"
 salt_monopoly_desc: "Das Salzmonopol war einst die lukrativste Einnahmequelle des Staates. Trotzdem hielten frühere Kaiser es für ratsam, das Monopol zugunsten des Handels abzuschaffen. Es ist an der Zeit, dass der Salzhandel wieder unter der Kontrolle des Staates steht."
 reform_the_grand_secretariat: "Großsekretariat"
 reform_the_grand_secretariat_desc: "Considered the #italic de facto#! highest institution in our nation, the #italic [ShowBureaucracyTypeName('grand_secretariat_bureaucracy')]#! has served our rulers for centuries. Wielding immense influence over administrative affairs, this body of cabinet ministers must undergo a reform to further increase its effectiveness."
 improves_grand_secretariat_bureaucracy_tt: "Improves [ShowBureaucracyTypeName('grand_secretariat_bureaucracy')] [bureaucracy|e] positive effect by #G 50%#!"
 grand_military_parades: "Große Militärparaden"
 grand_military_parades_desc: "Die ruhmreiche Militärgeschichte unseres Volkes muss für alle sichtbar sein und Ehrfurcht erwecken. Indem wir unsere Armee auf unseren Straßen präsentieren, demonstrieren wir unsere militärische Macht und unsere unangefochtene Stärke."
 silver_standard: "Silberstandard"
 silver_standard_desc: "Indem wir aus den meisten Verpflichtungen gegenüber der Zentralregierung – von der Kopfsteuer bis hin zu den Arbeitsverpflichtungen des Landvolkes oder den Tributen der lokalen Beamten – eine Einmalzahlung aus Silber in einer Höhe basierend auf der Bevölkerung und dem kultivierten Land in jeder Präfektur erheben, kann der zur Steuereintreibung erforderliche Aufwand verringert und unsere Einnahmen erhöht werden."
 nine_garrisons_of_the_great_wall: "Neun Garnisonen der Großen Mauer"
 nine_garrisons_of_the_great_wall_desc: "Um uns gegen die teuflischen Barbaren verteidigen zu können, wird es nicht ausreichen, die Große Mauer einfach nur instand zu halten. Die Neun Garnisonen sind militarisierte Garnisonsstädte entlang der Mauer, die uns nicht nur dabei helfen werden, die wichtigen Pässe zu verteidigen, sondern auch die logistische Gesamtsituation an der nördlichen Grenze zu verbessern."
 the_red_cannon: "Rote Kanone"
 the_red_cannon_desc: "Die rothaarigen Barbaren aus Europa mögen unzivilisiert und ungehobelt sein, sie wissen jedoch, wie man hochwertige Artillerie und Feuerwaffen herstellt. Durch die Einfuhr und die Vervielfältigung ihrer Waffen werden wir unsere Armee verbessern und sie weitaus wirksamer gegen mögliche Eindringlinge machen."
 woodblock_printing: "Holztafeldruck"
 woodblock_printing_desc: "Die Fertigungsmethoden, die es uns erlauben, elegante Illustrationen, Kunstwerke und Bücher mit einem Druckverfahren zu vervielfältigen, haben das Interesse unseres Volkes geweckt, das sich nun darum bemüht, diese Technik zu perfektionieren. Der Holztafeldruck ist Teil unserer Kultur geworden und mit den jüngsten Fortschritten ist die Einführung neuer literarischer Werke einfacher denn je. Unser Prestige wird nur noch weiter steigen!"
 green_standard_army: "Grüne Standarte"
 green_standard_army_desc: "Die Grüne Standarte ist ein Armeeregiment, das neben den Acht Bannern existiert und sich hauptsächlich aus Hàn-Soldaten zusammensetzt. Ursprünglich wurde sie aus kapitulierenden Truppen zusammengestellt, die längerfristig als Freiwillige rekrutiert wurden und meist aus sozial benachteiligten Bevölkerungsschichten stammten. Seit der Vereinigung wird sie als Polizeitrupp eingesetzt und spielt eine entscheidende Rolle, um die lokale Militärverwaltung zu unterstützen, während die Bannermänner für Notfälle und anhaltende Widerstände genutzt werden."
 great_tax_reform: "Große Steuerreform"
 great_tax_reform_desc: "Unsere große Nation verfügt über reichlich Münzen und Möglichkeiten, diese auszugeben. Wir müssen uns darum bemühen, neue Formen der Besteuerung einzuführen, um unseren Staatshaushalt zu entlasten."
 junji_chu: "Jūnjī Chù"
 junji_chu_desc: "Das auch als #italic Großer Rat#! bekannte Verwaltungsorgan kümmert sich um alle militärischen Belange unseres Reichs. Als oberster Staatsrat hält er mehr Einfluss inne als das von vorherigen Dynastien eingerichtete Großsekretariat. Trotz seiner wichtigen Rolle wird der Rat jedoch seinen informellen Charakter innerhalb des inneren Hofes beibehalten und parallel zu den anderen Aufgabenbereichen seiner Mitglieder agieren."
 jingdezhen_porcelain: "Jǐngdézhèn-Porzellan"
 jingdezhen_porcelain_desc: "Die Kunst, das Zeichen einer wohlhabenden Gesellschaft, ist nur ein Aspekt, durch den sich unser Volk auszeichnet. Die Perfektionierung der Porzellanherstellung und die Einführung einer neuen Sorte, die #italic Jǐngdézhèn#! genannt wird, wird unsere Kultur noch viel weiter verbreiten."
 sanxitang: "Sānxītáng"
 sanxitang_desc: "Die Halle der Drei Raritäten ist ein Aufbewahrungsort für seltene und wertvolle Objekte sowie Kunstgegenstände. Dank unseres Herrschers, einem großen Kunstmäzen, konnte sie zu einem Ort für akademische Diskussionen, Vorträge und sogar kulturelle Veranstaltungen werden, der den intellektuellen Austausch und die Wissenschaft fördert."
 monuments_to_greatness: "Monumentalbauten"
 monuments_to_greatness_desc: "Die Geschichte unseres Volkes reicht Jahrtausende zurück und beschreibt zahlreiche Katastrophen, die wir aus reiner Zähigkeit überstanden haben. Diese Stärke ist zu einem sozialen Merkmal unserer Gesellschaft geworden und unsere Widerstandsfähigkeit spiegelt sich auch in der Stärke unserer Armee und der Herrlichkeit unserer Kunst wieder."
 ten_great_campaigns: "Zehn Große Feldzüge"
 ten_great_campaigns_desc: "Die Zehn Großen Feldzüge zielen darauf ab, unseren Einfluss sowohl innerhalb als auch außerhalb unserer Grenzen auszuweiten. Für ihre Umsetzung wird eine riesige Armee aufgestellt, die jeglichen Widerstand niederschlagen wird, der sich uns in den Weg stellt, und dafür sorgt, dass Rebellionen sterben, bevor sie überhaupt entstehen können. Unser Ruhm wird ewig sein!"
 tributary_system: "Tributsystem"
 tributary_system_desc: "Dieses System verpflichtet unterworfene Kriegsherren und andere Herrscher dazu, uns einen Tribut als Zeichen ihrer Treue zu schicken. Die Zentralisierung dieses Systems würde unsere Macht über sie noch weiter festigen."
 #Timurids
 timurid_cavalry: "$TIM_ADJ$e Kavallerie"
 timurid_cavalry_desc: "So wie einst der große $genghis_khan_name_no_tooltip$ die Steppe mit der Macht seiner Kavallerie beherrschte, werden auch wir die Macht unserer Pferde nutzen, um zu triumphieren. Für die erbittertsten Kriege gezüchtet und von den bestausgebildeten Soldaten geritten werden sie die Herzen unserer Feinde in Angst und Schrecken versetzen."
 timurid_architecture: "$TIM_ADJ$e Architektur"
 timurid_architecture_desc: "Die persische Architektur wird bereits seit Jahrhunderten von der ganzen bekannten Welt beneidet. Wir müssen eine neue Art von Architektur fördern, damit wir ihren Platz einnehmen können. Es ist unser Geburtsrecht!"
 the_mantle_of_the_great_khan: "Der Mantel des Groß-$rank_kingdom_horde_ruler_suffix_male$s"
 the_mantle_of_the_great_khan_desc: "Der Tod von $genghis_khan_name_no_tooltip$ hinterließ ein Machtvakuum, das Menschen, die es hätten besser wissen sollen, zu füllen versuchten. Durch Eheschließungen gelang es uns jedoch, unseren Anspruch zu festigen. Unsere Herkunft lässt sich bis auf den Groß-$rank_kingdom_horde_ruler_suffix_male$ selbst zurückverfolgen, und die Krieger der Steppe wissen, wem sie zu folgen haben."
 turco_persian_tradition: "Türkisch-Persische Tradition"
 turco_persian_tradition_desc: "Es ist unbestreitbar, dass $persia_region$ schon immer das kulturelle und sprachliche Zentrum der Region war und großen Einfluss auf die verschiedenen türkischen Völker hatte, die seit Jahrhunderten um uns herum existieren. Wir müssen diese Mischkultur fördern, um unsere eigene Tradition zu schaffen."
 tamerlane_chess: "Tamerlan-Schach"
 tamerlane_chess_desc: "Diese neue Schachvariante, die von unserem großen gleichnamigen Gründer entwickelt wurde, ist eine Verbesserung der vorherigen Version und wird besonders von unseren fähigen Generälen benutzt, um ihre Strategien und Taktiken zu verfeinern."
 chagatai_literature: "$karluk_language$e Literatur"
 chagatai_literature_desc: "Die karlukische Sprache, die in der östlichen Steppe gesprochen wird, kann die Gedanken und Ideen unseres großartigen Hauses weitaus besser überliefern, als es die persische oder arabische Sprache jemals könnten. Wir müssen die Sprache unserer Ahnen fördern und eine neue Literaturtradition begründen."
 nambardar_levy: "Nambardaren-Aufgebote"
 nambardar_levy_desc: "Die $nambardar_levy$e, auch #italic čerig-i nambardar#! genannt, sind jene Truppen, die weder mongolisch noch türkisch sind, sondern aus der einheimischen iranischen Bevölkerung rekrutiert werden. Dank ihnen kann unsere Armee noch viel größer sein."
 timurid_renaissance: "$TIM_ADJ$e Renaissance"
 timurid_renaissance_desc: "Seit der timuridischen Expansion zog unser Land die größten Handwerker und Weisen seiner Zeit an. Durch die fortwährende Förderung von Kunst, Wissenschaft und Literatur machten wir die Städte $herat$ und $samarkand$ zu den funkelndsten Juwelen der Welt."
 riches_of_the_silk_road: "Kontrolle über die Seidenstraße"
 riches_of_the_silk_road_desc: "Solange unsere Händler den Handel zwischen $transoxiana_area$ und $samarkand$ kontrollieren, wird der Handel der Seidenstraße ungehindert florieren und der Reichtum unserer Dynastie weiter wachsen."
 reform_the_diwan: "Reformierung des Dīwān"
 reform_the_diwan_desc: "Wir sind mit treuen und gut ausgebildeten farsischen Verwaltern gesegnet, die die Kunst des Regierens über Generationen hinweg perfektionierten. Traurigerweise jedoch ist ein erbliches Amt eines, das im Lauf der Zeit stagniert und dem es an Innovationen mangelt. Indem wir die Anzahl an vererbbaren Ämtern mit jeder Generation verringern, stellen wir sicher, dass wir nicht nur Treue, sondern auch Kompetenz belohnen. Fähige Verwalter müssen zu hohen Positionen aufsteigen können, ganz gleich, aus welcher Familie sie kommen."
 conquerors_legacy: "Erben der Eroberer"
 conquerors_legacy_desc: "Unsere glorreiche Nation ging aus dem Vermächtnis großer Eroberer hervor. Es war die Wildheit von $genghis_khan_name_no_tooltip$ und seinen Truppen, die es ihm erlaubten, Land von $europe$ bis nach $china$ zu erobern. Als seine Nachkommen werden unsere Truppen ebenso furchterregend sein, wie es einst seine Armee war."
 #Golden Horde
 glh_kipchak_khanate: "Kiptschak-Khanat"
 glh_kipchak_khanate_desc: "Unser glorreiches Land wird auch als Kiptschak-Khanat bezeichnet, da es alle Territorien der einstigen Kuman-Kiptschak-Konföderation kontrolliert. Dank dieses Landes werden die Armeen, die wir unter unseren Befehl stellen, unzählig sein."
 glh_legacy_of_jochi: "Vermächtnis des Jochi"
 glh_legacy_of_jochi_desc: "Auch wenn sein Sohn Jochi kurz nach dem Tod von $genghis_khan_name_no_tooltip$ ebenfalls starb, ist sein Vermächtnis nach wie vor in unserem Land zu spüren: Wir sind noch immer die Ulus von Jochi. Krieger aus dem ganzen Land strömen zu unserem Banner, um dieses Erbe hochzuhalten."
 glh_legacy_of_the_golden_horde: "Vermächtnis der Goldenen Horde"
 glh_legacy_of_the_golden_horde_desc: "Die Welt wird vor uns erbeben! Wir waren einer der Hauptbestandteile in $genghis_khan_name_no_tooltip$s Reich und seit Jahrhunderten die wichtigste politische Kraft in Osteuropa und in den Steppen."
 glh_perso_mongol_administration: "Persisch-Mongolische Administration"
 glh_perso_mongol_administration_desc: "Unsere Vorfahren verfeinerten das mongolische Verwaltungssystem im Lauf der Jahrhunderte, doch sie scheuten nicht davor zurück, die Ideen und Methoden unterworfener Kulturen zu übernehmen. Unser Verwaltungssystem beruht zum einen Teil auf Traditionen, die bis zum großen $genghis_khan_name_no_tooltip$ selbst zurückführen, und zum anderen Teil auf Elementen, die wir von persischen und muslimischen Bürokraten in eroberten Ländern übernahmen."
 glh_tatar_traditions: "Tatarische Traditionen"
 glh_tatar_traditions_desc: "Unser Reich mag zwar nicht mehr vom Pferdesattel aus regiert werden, doch unsere Armeen funktionieren noch immer so. Über Jahrhunderte blieben wir unseren Ursprüngen treu, sodass es nur wenige mit unseren fähigen Reitern aufnehmen können. Wir schreiten voran und nutzen neue Technologien und Taktiken. Wir bauen auf die starke Organisation und die kriegerische Tradition des Mongolenreiches."
 glh_secure_the_trade_routes: "Sicherung der Handelsrouten"
 glh_secure_the_trade_routes_desc: "Nicht alle Reichtümer dieser Welt stammen aus den von uns beherrschten Ländereien. Der Handel ist die Quelle allen Wohlstands und die Goldene Horde hat sich schon immer für die Händler eingesetzt. Indem wir die Sicherheit eines jeden gewährleisten, der Waren durch unser Land bewegen möchte, sorgen wir für einen konstanten Fluss an Pelzen, chinesischer Handwerkskunst, Seiden, Gewürzen und anderen Bedarfsgütern. Dabei ist es egal, ob sie ihre Waren an uns verkaufen oder nicht. Ihre alleinige Anwesenheit wird unserem Volk Wohlstand bringen."
 glh_religious_pragmatism: "Religiöser Pragmatismus"
 glh_religious_pragmatism_desc: "Eine hemmende und unflexible Glaubenslehre konnte unter den tatarischen Horden noch nie viele Anhänger gewinnen. Als der große $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ zum Islam konvertierte, war es der Islam der Sufi-Scheichs und nicht der der eifrigen Qadis, den er in unser Land brachte. Unser Staat sollte auf Jahrhunderten der Tradition und der Treue errichtet werden. Die Religion spielt eine Rolle, doch wir wollen unser Land lieber erblühen sehen, als in einem Kampf auseinanderzubrechen, der sicherstellen soll, dass alle einen gemeinsamen Glauben teilen."
 glh_modernization_of_steppes: "Modernisierung der Steppe"
 glh_modernization_of_steppes_desc: "Es ist schon lange her, dass die Armeen von $genghis_khan_name_no_tooltip$ die Steppe beherrschten. Unser Land übertraf den Traum unserer Vorfahren jedoch, und wir wuchsen zu einer eigenständigen Macht heran. Wir werden unsere Territorien modernisieren, um zum strahlenden Vorbild für die Welt zu werden."
 #Crimea
 cri_genghisid_legacy: "Dschinghisisches Vermächtnis"
 cri_genghisid_legacy_desc: "Unsere Vorväter ritten mit $genghis_khan_name_no_tooltip$, als er die bekannte Welt verwüstete. Wir hielten unsere militärischen Traditionen lebendig und setzten die Herrschaft der Khane fort, die in Anspruch nehmen, aus der dschinghisischen Linie stammen."
 cri_slavers: "Sklaventreiber der Steppe"
 cri_slavers_desc: "Mit dem Sklavenhandel lässt sich ein Vermögen verdienen: Ahnungslose Christen, die in unsere Fänge geraten, bringen einen hohen Preis auf türkischen, arabischen und persischen Märkten."
 cri_free_cattle_grazing: "Freier Viehtrieb"
 cri_free_cattle_grazing_desc: "Wir schränken unsere Viehhirten nicht ein, wenn es um das Grasen ihrer großen Herden von Pferden und Rindern geht. Hirten können ihren Angelegenheiten nachgehen, wie sie möchten, und frei die Steppe durchstreifen und Handel treiben."
 cri_steppe_commanders: "Steppenbefehlshaber"
 cri_steppe_commanders_desc: "Kavalleriebefehlshaber von der Krim meisterten die Mobilität der Steppenkriegsführung: Tempo, Flankenangriffe und Überfälle können langsamere europäische Armeen überwältigen."
 cri_devshirme_of_the_steppes: "Die Dewschirme der Steppen"
 cri_devshirme_of_the_steppes_desc: "Eliten von der Krim ahmen Aspekte der osmanischen Militärverwaltung nach und vermischen türkische und islamische Systeme, um Mannstärke und militärische Effektivität zu verwalten."
 #Chagatai
 chg_legacy_of_chagatai: "Vermächtnis von Tschagatai"
 chg_legacy_of_chagatai_desc: "Das Vermächtnis von $genghis_khan_name_no_tooltip$ lebt durch seinen Sohn Tschagatai in uns weiter. Ein jeder wird vor uns erzittern, wenn wir seine Herrlichkeit zurückfordern."
 chg_chagatai_riders: "Tschagataische Reiter"
 chg_chagatai_riders_desc: "Die Pferde von $genghis_khan_name_no_tooltip$ zertrampelten alles von Europa bis China. Als seine Erben und Nachfolger werden unsere Reiter unseren Feinden ebenso viel Angst einjagen."
 chg_the_mountain_khanate: "Berg-Khanat"
 chg_the_mountain_khanate_desc: "Unser Land liegt geschützt zwischen dem Balchaschsee und dem Tiānshān-Gebirge. Es ist ein raues und unwirtliches Land, eines, das unser Volk als Waffe gegen mögliche Eindringlinge nutzen kann."
 chg_border_wars: "Endlose Grenzkriege"
 chg_border_wars_desc: "Wir sind von zahlreichen Feinden umgeben, die unseren Untergang herbeisehnen, und müssen ständig darum kämpfen, unsere Grenzen aufrechtzuerhalten. Unsere stets wachsamen Soldaten haben reichlich Gelegenheit, ihre Fähigkeiten im Kampf unter Beweis zu stellen, und unser kampferprobtes Kriegervolk ist bereit, das Erbe des Groß-$rank_kingdom_horde_ruler_suffix_male$s zurückzufordern."
 chg_sons_of_chagatai: "Söhne des Tschagatai-$rank_kingdom_horde_ruler_suffix_male$s"
 chg_sons_of_chagatai_desc: "Unsere Blutlinie reicht bis zu Tschagatai-$rank_kingdom_horde_ruler_suffix_male$ zurück, den zweiten Sohn von $genghis_khan_name_no_tooltip$, der einst über dieses Land herrschte und einen mächtigen mongolischen Nachfolgestaat errichtete. Obwohl bereits einige Zeit vergangen ist, können wir noch immer eine beträchtliche Legitimität beanspruchen, indem wir uns auf das Erbe unseres Vorfahren berufen."
 chg_tradition_of_conquest: "Eroberungstradition"
 chg_tradition_of_conquest_desc: "Es kann schwierig sein, andere Völker zu erobern, denn nicht jeder ist bereit für unsere erleuchtete Herrschaft. Wir haben allerdings erkannt, dass es bessere Methoden als einen Berg aus Leichenschädeln gibt, wenn man Menschen unter seine Herrschaft bringen möchte. In dieser Hinsicht sind wir unseren Vorfahren einen Schritt voraus."
 chg_scheming_court: "Intriganter Hof"
 chg_scheming_court_desc: "Die ständigen Machtkämpfe zwischen den verschiedenen Fürsten, lokalen Adligen, Städten und Stämmen im Tschagatai-Khanat haben viele erfahrene Intriganten hervorgebracht. Unsere Streitigkeiten beiseitezulegen und ihre Fähigkeiten dazu zu nutzen, unsere Feinde zu überlisten, wäre ein großer Segen für unser Volk."
 chg_glory_of_conquest: "Ruhm der Eroberung"
 chg_glory_of_conquest_desc: "Es soll Gesetz sein, dass ein Junge nicht eher als Mann gilt, bis er nicht Teil unserer unbesiegbaren Armee geworden ist, dass er sich keine Frau nehmen kann, bis er nicht erst die Frau eines anderen genommen hat, und dass er es nicht wert ist, in der schäbigsten Hütte zu hausen, bis er nicht die Hütte eines anderen niedergebrannt hat. Der Dienst in unserer Armee soll der einzige Pfad zur Männlichkeit sein."
 chg_unrelenting_horde: "Unnachgiebige Horde"
 chg_unrelenting_horde_desc: "Unsere Armeen werden marschieren wie die großen Horden von $genghis_khan_name_no_tooltip$. Unsere Truppen werden unsere Feinde unter ihren Hufen zertrampeln wie die Grashalme unserer heimischen Steppe. Jeder wird die Macht unserer Armee zu fürchten lernen!"
 #Mongol Empire
 mge_pax_mongolica: "Pax Mongolica"
 mge_pax_mongolica_desc: "Da wir alle mongolischen Territorien unter unserem Banner vereint haben, kann unser Volk endlich jene Stabilität und jenen Wohlstand genießen, wie sie einst zur Zeit des großen $genghis_khan_name_no_tooltip$ herrschten."
 mge_all_under_a_khan: "Alles geeint unter einem $rank_kingdom_horde_ruler_suffix_male$"
 mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ einte einst ein riesiges Territorium unter seinem Banner. Da auch wir all diese Territorien unter der Autorität unseres $rank_kingdom_horde_ruler_suffix_male$s vereint haben, müssen alle Menschen im Reich unserem Banner die Treue schwören."
 mge_ghostly_horses_of_the_plain: "Geisterpferde der Ebenen"
 mge_ghostly_horses_of_the_plain_desc: "Die Stärke der mongolischen Reiter ist auf der ganzen Welt bekannt. Unsere Feinde werden allein vor dem Anblick einer Staubwolke in der Ferne erzittern, da sie fürchten, dass dies unsere herannahende Kavallerie sein könnte."
 mge_yeke_mongol_ulus: "Yeke Mongol Ulus"
 mge_yeke_mongol_ulus_desc: "Als die ursprünglichen Mongolen haben wir den #italic Yeke Mongol Ulus#!, den Großmongolischen Staat, wiederhergestellt und damit den Ruhm des Großreichs von $genghis_khan_name_no_tooltip$ zurückerlangt. Bei jeder sich bietenden Gelegenheit wird unser Volk versuchen, die Taten des Großkhans nachzuahmen, sein Erbe zurückzufordern und die einst riesigen Gebiete des mongolischen Khanats wieder zu vereinen."
 mge_life_of_steppe_warrior: "Das Leben eines Steppenkriegers"
 mge_life_of_steppe_warrior_desc: "Die Steppe ist ein unbarmherziges und unheilvolles Land. Unser Volk ist an das Leben in dieser rauen Umgebung gewöhnt und besitzt die Widerstandskraft und das Wissen, um dort zu überleben. Unsere Soldaten können auf dieses Wissen zurückgreifen, was die Chancen erhöht, dass sie im Kampf überleben."
 mge_multicultural_empire: "Multikulturelles Reich"
 mge_multicultural_empire_desc: "Die Territorien des großen Mongolenreichs umfassen viele verschiedene Länder und Völker, die alle unter dem Ruhm unseres großen $rank_kingdom_horde_ruler_suffix_male$s vereint sind."
 mge_improved_yam_system: "Verbessertes Yam-System"
 mge_improved_yam_system_desc: "Das Yam-System ist ein System von Wegposten, die über das gesamte Reich verteilt sind und die Kommunikation und die Logistik seit der Zeit von $genghis_khan_name_no_tooltip$ erleichterten. Durch die Wiederaufnahme und die Verbesserung dieses Systems bewältigen unsere Boten die riesigen Entfernungen unseres Reiches viel schneller."
 mge_mongolian_mobility: "Mongolische Mobilität"
 mge_mongolian_mobility_desc: "Jeder unserer Soldaten unterhält üblicherweise drei oder vier Pferde, damit er jedes Mal das Pferd wechseln kann, wenn eins von ihnen erschöpft ist. Dies erlaubt es ihnen, tagelang mit hoher Geschwindigkeit unterwegs zu sein, ohne haltmachen zu müssen. Diese zusätzlichen Pferde dienen zudem als Proviant in Form von Stutenmilch und Pferdefleisch, was unsere Armee viel weniger anfällig für Hungersnöte macht als die Armeen der sogenannten „zivilisierten Nationen“. Es erlaubt uns auch, unsere Feinde mit Leichtigkeit aus dem Weg zu räumen und in kürzerer Zeit ein viel größeres Gebiet abzudecken, als sie es je für möglich gehalten hätten."
 mge_kheshig: "Kheshig"
 mge_kheshig_desc: "Die Kheshig waren einst die beeindruckenden Leibwächter des großmongolischen $rank_kingdom_horde_ruler_suffix_male$s. Ihre Nachkommen werden weiterhin die $rank_kingdom_horde_ruler_suffix_male$e der Mongolei beschützen, während diese gegen die Feinde ihres Volkes kämpfen."
 mge_glory_of_the_khan: "Ruhm des $rank_kingdom_horde_ruler_suffix_male$s"
 mge_glory_of_the_khan_desc: "Der große $genghis_khan_name_no_tooltip$ versammelte einst ein riesiges Heer unter seinem Banner, größer als man es je zuvor gesehen hatte. Wir sind seine Erben, und unsere Armee wird die großen Mongolenhorden der Vergangenheit bei Weitem übertreffen."
 #Steppe Hordes
 horse_lords: "Pferdemeister der Steppe"
 horse_lords_desc: "Die einzig wahre Bestie ist der Mensch. Pferde sind mit unseren Kindern geboren und aufgewachsen, und sie haben gelernt, so edel und wild zu sein wie unser eigenes Volk. Wir erkennen ihre Zähmung als unseren größten Stolz an, und sie uns als ihre größten Herrn."
 kurultai_advance: "Kurultai"
 kurultai_advance_desc: "Indem wir alle Anführer aus jeder Kriegerbande versammeln, können wir einen $rank_empire_horde_ruler_suffix_male$ wählen, der unsere Horde zum Sieg führen wird. In einem Zelt wird über das Schicksal unseres Volkes entschieden, und unser neuer Anführer wird aus jenen Kandidaten gewählt, die sich für würdig halten, uns anzuführen."
 beyond_the_sun: "Jenseits der Sonne"
 beyond_the_sun_desc: "Das Zeitalter der großen Horden ist noch nicht vorbei. Wir haben aus den Fehlern unserer Feinde gelernt und werden uns weiser und stärker als zuvor erneut erheben. Jedes Land, in dem die Sonne lebt und stirbt, muss uns gehören."
 steppe_slave_raiding: "Sklavenraubzüge"
 steppe_slave_raiding_desc: "Unsere Überfalltruppen bewegen sich so schnell wie der Wind. Sie schlagen zu und sind bereits wieder fort, bevor auch nur jemand gemerkt hat, dass sie da waren. Doch das Plündern von Siedlungen ist nicht die einzige Möglichkeit, gutes Geld zu machen: Gefangene können ebenfalls für viel Geld verkauft werden."
 caravanserai_advance: "$caravanserai$"
 caravanserai_advance_desc: "Während des letzten Jahrtausends entstanden in Zentralasien Handelsrouten, die heute als „Seidenstraße“ bekannt sind. Ihr Wohlstand basierte auf der $caravanserai$, einem Ort, an dem Händler und ihre Karawanen Halt machen und rasten konnten."
 borjigin_blood: "Blut der $Borjigin$"
 borjigin_blood_desc: "Wir sind die Nachkommen der $Borjigin$ und stammen von $genghis_khan_name_no_tooltip$ selbst ab. Jeder wird sich unserem Vermächtnis beugen, und die gesamte Steppe muss uns als ihre Herrscher anerkennen."
 turco_mongol_tradition: "Türkisch-mongolische Tradition"
 turco_mongol_tradition_desc: "Auch wenn die $Borjigin$-Dynastie mongolischen Ursprungs ist, wurden die von $genghis_khan_name_no_tooltip$ in $central_asia$ eroberten Territorien hauptsächlich von einer türkischen Bevölkerung bewohnt. Als Folge bildete sich eine Mischkultur, die das Beste aus beiden Welten vereint."
 yams_of_the_great_khan: "Yam des Groß-$rank_kingdom_horde_ruler_suffix_male$s"
 yams_of_the_great_khan_desc: "Damit Kuriere schnell genug reisen konnten, um mit den mongolischen Armeen Schritt zu halten, richtete $genghis_khan_name_no_tooltip$ ein System von Poststationen ein. Diese „Yam“ errichtete man in 30 bis 60 km Entfernung zueinander. Sie boten einerseits der mongolischen Armee Proviant und Unterkunft und erlaubten es den Kurieren andererseits, so rasch zu reisen, wie ein Pferd galoppieren konnte, ohne dabei durch die Ermüdung der Pferde aufgehalten zu werden. Die Posten lösten damit logistische Probleme, die durch das riesige Ausmaß der Pax Mongolica verursacht wurden – zumindest vorübergehend."
 mandate_of_the_khan: "Mandat des $rank_kingdom_horde_ruler_suffix_male$s"
 mandate_of_the_khan_desc: "So wie die Götter gebieten, gebietet der $rank_kingdom_horde_ruler_suffix_male$. Die Einheit unseres Volkes entspringt unserer Treue zu unserem großen Anführer. Nur ein Mann, der in der Lage ist, den Willen jener zu beugen, die sich der Krone beugen, ist unserer Hingabe würdig."
 there_shall_be_no_grass: "Verbrannte Erde"
 there_shall_be_no_grass_desc: "Wo unsere Horde auch vorbeizieht, wird kein Gras mehr wachsen. Das Land wird unsere Feinde nicht mehr ernähren. Tag und Nacht werden vergehen, doch der Boden wird karg bleiben und es wird keine Ernte mehr geben, die geerntet werden muss. Manchem Hunger kann man nicht entkommen."
 slavery_before_death: "Sklaverei oder Tod"
 slavery_before_death_desc: "Städte zu plündern und zu brandschatzen, gehört zu einem Krieg dazu. In der Vergangenheit wüteten unsere Krieger ungezügelt. Sie plünderten, was sie finden konnten, zerstörten Gebäude und töteten jeden, der sich ihnen in den Weg stellte. Dies stärkte zwar ihre Moral, doch ihre Taten waren kaum wirtschaftlich. Mit unserer neuen Herangehensweise versklaven wir zumindest jene, die fähig sind, zu arbeiten, anstatt sie blindlings zu köpfen, um uns einen Thron aus Schädeln zu errichten."
 horde_loyalty: "Hordentreue"
 horde_loyalty_desc: "Die Treue unseres Volkes ist unbestreitbar. Keine Seele, die unter der glorreichen Herrschaft des $rank_kingdom_horde_ruler_suffix_male$s lebt, käme auf die Idee, sie jemals zu verlassen."
 horde_loot_discovery_advance: "Gewinne durch Raubzüge"
 horde_loot_discovery_advance_desc: "Raubzüge waren schon immer Teil unserer Identität. Durch das Plündern und Brandschatzen hat unser Volk sowohl gelernt zu kämpfen als auch einen Großteil seines Reichtums erlangt. Es kann nicht schaden, diese Raubzüge weiter zu fördern – zumindest nicht uns."
 trampling_horde: "Trampelnde Horde"
 trampling_horde_desc: "$genghis_khan_name_no_tooltip$ brachte die ganze Welt mit seinen Eroberungsfeldzügen zum Erbeben, und wir werden dasselbe tun. Die Welt wird den Galopp unserer Pferde zu fürchten lernen."
 watchers_of_the_silk_road: "Wächter der Seidenstraße"
 watchers_of_the_silk_road_desc: "Wir bauen nicht und wir handeln nicht. Wir nehmen uns, was wir brauchen … und manchmal mehr. Unsere Krieger haben die fremden Händler und ihre Gebräuche aufmerksam beobachtet und wir kennen nun die sichersten Wege, um unsere Waren zu transportieren."
 logistics_of_khan: "Logistik des $rank_kingdom_horde_ruler_suffix_male$s"
 logistics_of_khan_desc: "Man vergisst allzu leicht, dass die Eroberungen des großen $rank_kingdom_horde_ruler_suffix_male$s ebenso sehr seiner überlegenen Logistik zu verdanken waren wie seiner überlegenen militärischen Stärke. Wir müssen diese Techniken nachahmen und an unser Zeitalter anpassen, um die Reichweite unserer Eroberungen auszuweiten."
 populating_the_steppes: "Bevölkerung der Steppen"
 populating_the_steppes_desc: "So wie wir unseren Feinden Zerstörung bringen, müssen wir den vielen, die innerhalb unserer Grenzen leben, auch Frieden bringen. Indem wir den inneren Frieden aufrechterhalten und talentierte Männer und Frauen aus unserem ganzen Reich dazu ermutigen, neue und großartige Städte zu planen und zu bevölkern, werden wir die Steppen bändigen."
 a_magnanimous_empire: "Großmütiges Reich"
 a_magnanimous_empire_desc: "Die wohlhabende Herrschaft des Groß-$rank_kingdom_horde_ruler_suffix_male$s war nicht nur für sein furchterregendes Schwert bekannt, sondern auch für seine außergewöhnliche Hingabe gegenüber jenen, die weise das Knie vor ihm beugten. Wer unser duldsames Reich willkommen heißt, soll auch als Teil davon behandelt werden."
 horde_ardor: "Brennende Horde"
 horde_ardor_desc: "Unsere Pferde sind nicht minder wild und Furcht einflößend für unsere Feinde wie ihre Reiter. Der Anblick unserer in den Krieg stürmenden Kavallerie gleicht der einer unaufhaltsamen Dämonenstreitmacht aus der Hölle."
 #Persia
 ira_sasanian_heritage: "Sassanidisches Erbe"
 ira_sasanian_heritage_desc: "Vor der islamischen Eroberung von $persia_region$ war die Region die Heimat des Sassanidenreichs, das einst über ein Land herrschte, welches sich von Kaukasien im Westen bis zum Kirthar-Gebirge im Osten erstreckte. Viele seiner großen kulturellen Errungenschaften haben die persische Kunstwelt geprägt und eine einzigartige kulturelle Identität hervorgebracht."
 ira_islamized_persia: "Persischer Islam"
 ira_islamized_persia_desc: "Die Islamisierung Persiens war ein langwieriger Vorgang, der auch heute noch nicht ganz abgeschlossen ist, aber dennoch eine wichtige Säule unserer Identität darstellt. Viele unserer alten Traditionen wurden mit den Lehren des Islam verflochten und schufen so unsere heutigen Grundwerte."
 ira_shahnameh: "$shahnameh$"
 ira_shahnameh_desc: "Das #italic $shahnameh$#! – das Buch der Könige – ist ein Heldenepos, das sich mit der Geschichte des farsischen Volks befasst. Es beschreibt die historische und mythische Vergangenheit der Reiche, die einst in Großpersien existierten, und trägt auf vielfache Weise zur farsischen Kultur bei."
 ira_restoration_of_cities: "Stadtrestauration"
 ira_restoration_of_cities_desc: "Der Einfall der Mongolen in Persien zwischen 1219 und 1221 war ein katastrophales Ereignis für die gesamte Region. Bevölkerungszentren von atemberaubender Größe wurden in Schutt und Asche gelegt. Es ist an der Zeit, dass wir das Zerstörte wiederaufbauen und die ehrfurchtgebietende Metropole Persien wiederherstellen."
 ira_improved_silk_road: "Ausbau der Seidenstraße"
 ira_improved_silk_road_desc: "Ein System ausgebauter Straßen und Brücken, eine Reihe von Wachposten zum Schutz der Straßen (gegen eine geringe Gebühr) sowie eine Kette von Karawansereien, an denen eine Rast möglich ist: All dies hilft Kaufleuten bei ihrer Reise entlang der Seidenstraße und wirft dabei auch eine hübsche Summe für das Staatssäckel ab."
 ira_promotion_of_irrigation: "Ausbau der Bewässerungssysteme"
 ira_promotion_of_irrigation_desc: "Infolge vergangener mongolischer Invasionen wurde die persische Region im Vergleich zu jenen Reichen, die diese Territorien einst ihre Heimat nannten, stark entvölkert. Indem wir in neue Bewässerungssysteme investieren, sollten wir es schaffen, die Landwirtschaft wiederaufzubauen, um einen starken Bevölkerungsanstieg zu unterstützen, der die Region wiederbeleben wird."
 ira_persian_plateau: "Iranische Hochebene"
 ira_persian_plateau_desc: "Die gewaltige Hochebene im Herzen unseres Reiches ist keine Schwäche, sondern vielmehr unsere Stärke. Als Urquell mächtiger Reiche durchquert unser Volk seit unzähligen Generationen seine weiten Ebenen und die schroffen Gebirgszüge, die es umgeben, darunter Zagros und Elburs. Dasselbe Terrain, das fremde Armeen erschöpft, ist der Nährboden für unsere Soldaten, Händler und Verwalter. Wir nutzen diese Vertrautheit, um uns in unseren Landen zu bewegen und sie mit einer Leichtigkeit zu regieren, die kein Fremder erreichen kann."
 ira_persian_horses: "Persische Pferde"
 ira_persian_horses_desc: "Pferde spielen in unserer Gesellschaft eine bedeutende Rolle. Viele innerhalb unseres Volkes wachsen Seite an Seite mit ihren majestätischen Rossen auf, etwas, was sich sowohl in den Fähigkeiten unserer Pferdezüchter als auch in der Belastbarkeit unserer Kavallerie widerspiegelt."
 ira_spread_of_persian_influence: "Persischer Einfluss"
 ira_spread_of_persian_influence_desc: "Die persische Sprache ist eine sehr alte Sprache, deren Geschichte länger zurückreicht als die Herrschaft vieler Großreiche zusammen. Selbst der muslimische Vormarsch konnte den Kern der persischen Identität nicht auslöschen, und viele Staaten versuchen, unsere Kultur zu imitieren."
 ira_persian_rug_production: "Persische Teppichherstellung"
 ira_persian_rug_production_desc: "Persien ist seit Langem für seine ausgezeichneten Teppichwaren bekannt, doch als die Mongolen in unser Land einfielen, brachten sie große Zerstörung und Verwüstung. Wenn Persien sich jemals davon erholen soll, müssen wir unsere wirtschaftliche Macht zurückgewinnen. Es wird höchste Zeit, dass wir aus der Asche wiederauferstehen und uns wieder auf unsere Stärken besinnen."
 ira_safaviyya_order_hall: "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"
 ira_the_qizilbash: "Die $qizilbash$"
 ira_the_qizilbash_desc: "Die #italic $qizilbash$#! – oder Rotköpfe – sind eine schiitische Militärbewegung, die von den Ṣafawiyya gegründet wurde. Diese von ihrer religiösen Überzeugung und der tiefen Verbundenheit zum Sufismus geleiteten Krieger sind bereit, unseren Staat zu verteidigen, und könnten den Kern unserer Armee bilden."
 ira_the_qurchi: "Die Qurchi"
 ira_the_qurchi_desc: "Während die $qizilbash$ das Rückgrat des persischen Militärs ausmachen, sind die #italic Qurchi#! die königliche Leibwache, die aus den $qizilbash$ rekrutiert wird. Anstelle von Land werden diese Soldaten geradewegs aus der königlichen Schatzkammer bezahlt."
 ira_religious_state: "Glaubensstaat"
 ira_religious_state_desc: "Ganz gleich, welchem Glauben unser Staat auch immer folgen mag: Persien wird immer ein religiöses Land sein. Jeder Aspekt unseres Lebens wird von unseren religiösen Überzeugungen geleitet, und sogar der Staat selbst handelt nach unseren tiefsten Grundwerten der Moral und Gerechtigkeit."
 ira_the_ghilman: "Die $a_ghilman$"
 ira_the_ghilman_desc: "Die $a_ghilman$ sind Militärsklaven mit kaukasischen Wurzeln. Sie werden in der Regel aus Christen rekrutiert und durchlaufen eine strenge militärische Ausbildung. Sie sind zudem im Umgang mit Schusswaffen geübt, was sie zu einem unverzichtbaren Bestandteil der Armee macht. Sie dienen als Gegengewicht zu anderen einflussreichen Militärzweigen."
 ira_encouraged_art: "Kunstförderung"
 ira_encouraged_art_desc: "Die persische Kunst ist auf der ganzen Welt begehrt. Kunstsammler von nah und fern reisen in unser Land, um einige unserer erlesensten Werke zu kaufen. Wir sollten diesen Wirtschaftszweig fördern und aufstrebende Künstler unterstützen."
 ira_nazir: "Hof-Nāẓir"
 ira_nazir_desc: "Die Nāẓir sind die Aufseher und Verwalter unserer Territorien. Gleichzeitig sind sie auch die Augen und Ohren des Šâhanšâh, des Königs der Könige. Alles, was am Hof geschieht, wird von den Nāẓir beaufsichtigt, und Höflinge werden befördert, wenn die Nāẓir dies wünschen. Selbst der Großwesir muss sich nach den Nāẓir richten."
 ira_the_tofangchi: "Die $a_tofangchi$"
 ira_the_tofangchi_desc: "Die $a_tofangchi$ sind die Musketiere des Reichs. Das persische Militär bevorzugt in der Regel traditionelle Waffen wie Pfeil und Bogen, was die $a_tofangchi$ zu einer äußerst ungewöhnlichen Einheit macht. Die Regimenter der $a_tofangchi$ wollen dies aber ändern, denn sie sind im Umgang mit modernen Waffen geschult."
 ira_the_tupchi: "Die $a_tupchi$"
 ira_the_tupchi_desc: "$a_tupchi_desc$"
 ira_religious_unity_policy: "Politlinie der Glaubenseinigkeit"
 ira_religious_unity_policy_desc: "Die Zeit der großen religiösen Spaltung ist zu Ende. In der heutigen Zeit kann es sich der Islam einfach nicht mehr leisten, innere Zwiste auszutragen. Wir werden eine Politik der inneren und äußeren Glaubenseinigkeit verfolgen und Frieden mit jenen schließen, die wir früher als Ketzer ansahen."
 ira_afsharid_navy: "Küstenverteidigung am Persischen Golf"
 ira_afsharid_navy_desc: "Unser Land liegt zwar größtenteils in den Bergen und im Hochland des Zagrosgebirges, doch der persische Staat herrscht auch über einige Küstenterritorien. Obgleich frühere Dynastien dem maritimen Schutz des Reichs eher wenig Aufmerksamkeit schenkten, weiß unser Volk noch immer mit dem Meer umzugehen und unsere Seeleute sind eifrig dabei, unsere Küsten zu verteidigen."
 ira_jazayerchi: "Das $a_jazayerchi$-Infanteriekorps"
 ira_jazayerchi_desc: "$a_jazayerchi_desc$"
 #Beyliks and Rum
 uc_bey_advance: "$uc_bey$"
 uc_bey_advance_desc: "$uc_bey_desc$"
 seljuk_roots: "Seldschukische Wurzeln"
 seljuk_roots_desc: "Wir sind in allen Richtungen von Feinden umgeben, was eine starke Armee zu einer Notwendigkeit macht. Zum Glück sind wir kein schwaches Volk. Ob irreguläre Ġuzāt, Akıncılar oder Sipâhi des osmanischen Reichs – die Welt hat die Macht des türkischen Volkes kennengelernt. Wir müssen eine Armee für unser Reich aufbauen und uns dabei von unserer glorreichen Tradition und reichen Geschichte inspirieren lassen, die wir im Laufe der Zeit kultiviert haben."
 heirs_of_rum: "Erben von Rûm"
 heirs_of_rum_desc: "Wir haben lange Zeit gegen unsere benachbarten Beylik um die Vorherrschaft gekämpft; nun ist es endlich an der Zeit, die Grenzen des einst großen Sultanats von Rûm wiederherzustellen."
 splendor_of_anatolia: "Anatolische Pracht"
 splendor_of_anatolia_desc: "Unsere Region ist die Heimat einiger der beeindruckendsten Madaris und Moscheen in der gesamten islamischen Welt. Die Liebe zum Detail und das Talent unserer Architekten machen uns unübertroffen."
 persian_in_the_court: "Persisch als Hofsprache"
 persian_in_the_court_desc: "Aufgrund unserer Wurzeln basiert ein Großteil unserer Verwaltung seit Langem auf der persischen Sprache. In Verbindung mit der kulturellen Vielfalt der Region hat dies eine Zusammenarbeit ermöglicht, die Grenzen überwindet."
 akinji_cavalry: "Akindschi"
 akinji_cavalry_desc: "Unsere leichte Kavallerie führt häufig Überfälle auf benachbarte Ländereien durch und lässt sich gelegentlich sogar dort nieder. Historisch gesehen war sie damit eine der ersten Einheiten, die sich dem Feind stellte, um feindliche Handelsrouten zu stören und so seine Versorgung zu unterbrechen. Sie war für ihren Mut im Kampf bekannt und ihre Mitglieder lebten als Räuber an den Grenzen."
 crossroads_of_commerce: "Kreuzung des Handels"
 crossroads_of_commerce_desc: "Unsere Karawansereien unterstützen den steten Strom von Waren, Informationen und Reisenden, der von China über unser Land nach Europa führt. Das Geld und der Reichtum, die durch unser Land fließen, ist ein ungeheuer lukratives Geschäft."
 fratricide_succesion_advance: "$fratricide_succesion$"
 fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"
 #Ruthenia
 flexible_loyalty: "Wechselnde Loyalitäten"
 flexible_loyalty_desc: "Unser Land liegt an einem Schnittpunkt zahlreicher europäischer Länder und vieler Mächte, die eine Bedrohung für unser Volk darstellen könnten. Wir werden nur überleben, wenn wir eine flexible Haltung einnehmen und mit den verschiedenen Söldnern in der Region zusammenarbeiten."
 heritage_of_the_rus: "Vermächtnis der Rus"
 heritage_of_the_rus_desc: "Das Land der Rus ist zwar in mehrere Staaten zersplittert, doch die Erinnerungen an den großen Staat von einst, der von Kiew aus regiert wurde, ist noch immer stark in unseren Köpfen verankert. Indem wir uns an diesen alten Herrschern orientieren und unsere Verbundenheit zu ihnen betonen, schaffen auch wir eine starke Tradition für unser Volk."
 mother_of_russian_cities: "Die Mutter aller Rus-Staaten"
 mother_of_russian_cities_desc: "Kiew war einst der leuchtende Hauptsitz eines großen Staates, der über ein Gebiet herrschte, das sich von den nördlichen Wäldern in Nowgorod bis zu den Küsten im Süden am Schwarzmeer erstreckte. Nach der Auflösung der Rus und der Invasion der Mongolen blieb jedoch wenig von diesem einst großen Reich übrig. Wir müssen sicherstellen, dass sich unsere Städte erholen können und in den kommenden Jahrhunderten gedeihen."
 international_influences: "Fremdländische Einflüsse"
 international_influences_desc: "Viele Händler und Reisende aus fernen Ländern nutzen unsere Straßen und bringen unserem Land Wohlstand und Reichtum. Wir sollten versuchen, einige davon zu überzeugen, sich dauerhaft in unseren Städten niederzulassen, indem wir ihrem Glauben Schutz gewähren."
 reuniting_rus: "Wiedervereinigung der Rus"
 reuniting_rus_desc: "Wir sind die wahren Erben der Kiewer Rus und werden das Land unter unserem Banner wiedervereinen!"
 united_faith: "Vereinter Glaube"
 united_faith_desc: "Unabhängig von der Lage, in der wir uns befinden mögen, müssen wir sicherstellen, dass unser Glaube vereint ist. Nur wenn sich unser Klerus einig ist und keine Zwietracht zwischen den Gläubigen besteht, kann er sich ganz seiner Hauptaufgabe – der Führung und Beschwichtigung der Bevölkerung – widmen."
 east_and_west: "Ost und West"
 east_and_west_desc: "Unsere geografische Lage zwischen den östlichen und westlichen Staaten erlaubt es unseren Händlern, als Mittelmänner auf den äußerst gewinnträchtigen Handelsrouten der Region aufzutreten."
 ruthenian_state_advance: "Ruthenischer Staat"
 ruthenian_state_advance_desc: "In der Vergangenheit mussten wir uns oft fremden Einflüssen beugen und uns an die eine oder andere Gepflogenheit anpassen, um freundschaftliche Beziehungen zu gewährleisten. Da sich die Zeiten jedoch ändern, müssen wir unsere eigenen Bräuche stärken, um nicht erneut Gefahr zu laufen, in die Einflusssphäre anderer zu geraten."
 ruthenian_rural_buildings: "Ruthenische Dörfer"
 ruthenian_rural_buildings_desc: "Ruthenien ist ein sehr weitläufiges Land. Obwohl unsere großen Städte wie Kiew einen wichtigen Zweck erfüllen, sollten wir nicht die abgelegeneren Dörfer vernachlässigen, die unsere Wirtschaft mit lebenswichtigen Nahrungsmitteln und Rohstoffen versorgen."
 ruthenia_commoner_education: "Bildung für alle Ruthenen"
 ruthenia_commoner_education_desc: "Durch den Aufbau örtlicher Schulen stellen wir sicher, dass unsere Bevölkerung über alle Schichten hinweg gut gebildet ist."
 #Cossacks
 cossack_raids: "Kosakenüberfälle"
 cossack_raids_desc: "Unsere Kosaken sind es gewöhnt, fast dauerhaft in einer Art Kriegszustand zu leben, und haben sich ähnliche Raub- und Plünderungstaktiken wie die Horden angeeignet. Sie werden sich damit zwar gewiss nicht viele Freunde machen, doch zumindest bereichern sie damit unsere Staatskassen."
 tamed_steppes: "Gezähmte Steppe"
 tamed_steppes_desc: "Obwohl die meisten Menschen die Steppe als unwirtliches und unrentables Land bezeichnen würden, haben sich unsere Kosaken an diese raue Umgebung angepasst und sind in der Lage, dort nicht nur zu überleben, sondern auch zu gedeihen. Sie sind es, die uns dazu ermächtigen, dieses Land zu nutzen und davon zu profitieren."
 cossacks_recruitment: "Kosakenrekrutierung"
 cossacks_recruitment_desc: "Die Kosaken sind furchteinflößende Krieger, und ihre Fähigkeit, in der Steppe überleben zu können, ist unübertroffen. Sie sind die Elite unseres Staates und unserer Armee und stellen unsere Suzeränität über die Steppe sicher."
 cossacks_escaped_serfs: "Entflohene Sklaven und Leibeigene"
 cossacks_escaped_serfs_desc: "Viele Kosaken wurden in die Leibeigenschaft geboren. Feudaler Unterdrückung müde flohen sie vor ihren Herren und suchten nach Freiheit in der Steppe. Wir müssen weiterhin alle entflohenen Sklaven und Leibeigenen in unserer Gesellschaft willkommen heißen."
 cossacks_hetmanate: "Kosaken-Hetmanat"
 cossacks_hetmanate_desc: "Es gibt keine Könige oder Khane unter den Kosaken. Wir werden stattdessen vom Ataman, unserem obersten militärischen Befehlshaber angeführt, der in Sachen Staat und Gesellschaft jedoch nur der Erste unter Gleichen ist. Die politische Macht liegt bei der Rada, unserer gesetzgebenden und militärischen Versammlung, in der alle Kosaken zu Wort kommen können."
 cossack_administration: "Kosakenverwaltung"
 cossack_administration_desc: "Indem wir unseren Kosakenanführern Doppelrollen als Generäle und Verwalter zugestehen, optimieren wir die Rekrutierung von Mannen für unsere Armee und gewährleisten gleichzeitig hohe Maßstäbe für deren Ausbildung."
 steppe_riders: "Steppenreiter"
 steppe_riders_desc: "Die Steppe ist ein sonderbarer und trügerischer Ort zum Leben, und wenn es um das Sterben geht, so sind die Möglichkeiten dort schier endlos, falls man kein Pferd besitzt. Sobald man das endlose Grasmeer betritt, ist das eigene Pferd nicht mehr nur bloß ein Tier und Eigentum, sondern es wird zu einem wahren Teil von einem selbst. Wie der Körper nicht ohne Herz oder Leber überleben kann, so überlebt man in der Steppe gewiss nicht ohne Pferd."
 cossacks_exploration_advance: "Kosaken-Entdecker"
 cossacks_exploration_advance_desc: "Unsere Kosaken leben an der Grenze unseres Reichs. Dieser Umstand macht sie zu ausgezeichneten Entdeckern. Sie werden mutig fremde Länder erkunden, neue Zivilisationen erforschen und dorthin gehen, wo noch nie ein Mensch zuvor gewesen ist."
 cossacks_military_society: "Militärgesellschaft"
 cossacks_military_society_desc: "Bei den Kosaken gibt es nahezu keine Trennung zwischen Zivil- und Militärgesellschaft. Sie sind ein Heer, das mehr von den Menschen ausgemacht wird, als von dem Land, das sie kontrollieren, und ihr Volk besteht aus Kriegern. Wir müssen sicherstellen, dass das Militär unseren administrativen Anforderungen gerecht wird, wenn wir expandieren."
 cossacks_serf_autonomy: "Autonome Kosaken"
 cossacks_serf_autonomy_desc: "Niemand soll unter den Kosaken Tyrannei erleiden müssen. Wenn wir neue Territorien erobern, müssen Leibeigene, Bauern und Sklaven als gleichberechtigt zu unseren eigenen Kosaken angesehen werden."
 cossacks_colonization_advance: "Kosakenkolonisierung"
 cossacks_colonization_advance_desc: "Unsere Kosaken sind es gewöhnt, sich frei bewegen zu können und über unsere Grenzen hinauszugehen. Wir können diesen Umstand nutzen, um Siedlungen zu errichten und unseren Einfluss auf unbeanspruchtes Land auszudehnen."
 cossacks_registered: "Kosakenregister"
 cossacks_registered_desc: "Da unser Kosakenheer immer weiter wächst, müssen wir einen Überblick darüber behalten, wie stark ein Regiment ist. Eine zentrale Registrierung ermöglicht es uns, die Bedürfnisse aller Kosaken im Auge zu behalten."
 cossack_reputation: "Berüchtigte Kosaken"
 cossack_reputation_desc: "Unsere Kosaken haben den Ruf wilder Krieger. Dies allein reicht oft schon aus, um die Herzen unserer Feinde in Angst und Schrecken zu versetzen, wenn sie ihnen auf dem Schlachtfeld gegenüberstehen."
 #Georgian culture
 geo_georgian_highlands: "$GEO_ADJ$es Hochland"
 geo_georgian_highlands_desc: "$GEO$ liegt inmitten des Kaukasusgebirges, was es fremden Mächten erschwert, in unser Land einzudringen. Unsere Zähigkeit und unsere Widerstandsfähigkeit sind legendär."
 geo_georgian_script: "$georgian_culture$e Schrift"
 geo_georgian_script_desc: "Das georgische Alphabet, das vor Jahrhunderten geschaffen wurde, ist nicht nur ein Alphabet, sondern umfasst drei unterschiedliche Schrifttypen: das Mchedruli, das die Zivilverwaltung nutzt, sowie das Assomtawruli und das Nuschuri, die von der Kirche verwendet werden. Diese Aufteilung sorgt dafür, dass unsere Heilige Schrift nicht von der Laiensprache beeinflusst wird, sich unser Volk aber dennoch mit diesen Texten verbunden fühlen kann."
 geo_georgian_isolation: "$GEO_ADJ$e Abschottung"
 geo_georgian_isolation_desc: "Aufgrund der mächtigen Länder um uns herum, die unterschiedlichen Glaubensrichtungen und Kulturen folgen, sind wir oft gezwungen, eine eher opportunistische Diplomatie zu verfolgen. Diese beinhaltet, dass wir häufig unsere Gefolgschaft wechseln, um so lange wie möglich den Frieden zu bewahren."
 geo_legacy_of_saint_nino: "Vermächtnis der Heiligen Nino"
 geo_legacy_of_saint_nino_desc: "$GEO$ hat eine der ältesten christlichen Kirchen der Welt, die über ein Jahrtausend bis zur Christianisierung der Region durch die Heilige Nino zurückreicht. Im Lauf der Jahrhunderte diente die georgische Kirche als vereinigende Kraft für alle georgischen Staaten und war ein wesentliches Element der georgischen Kultur, sowohl gegen byzantinische als auch gegen mongolische oder muslimische Einflüsse. Da es nur wenige andere christliche Reiche in der Region gibt und die Treue innerhalb von $GEO$ stark gespalten ist, spielt die Kirche noch immer eine wichtige Rolle als einigende Kraft gegen äußere Einflüsse."
 geo_restoration_of_fortresses_and_churches: "Instandsetzung von Festungen und Kirchen"
 geo_restoration_of_fortresses_and_churches_desc: "Unsere zahlreichen Festungen und Kirchen haben es unserem Land erlaubt, den vielen Einflüssen von jenseits unserer Grenzen zu widerstehen und unser Überleben zu sichern. Unsere Festungen schützen unser Land, während unsere Kirchen unseren Geist schützen. Wir müssen beide in bestem Zustand halten, wenn wir erfolgreich sein wollen."
 geo_sadrosho_districts: "Sadrosho-Bezirke"
 geo_sadrosho_districts_desc: "Die Sadrosho (Banner) sind besondere Militärbezirke, die man zu Mobilisierungszwecken einrichtete. Indem wir unsere Territorien in mehrere Sadrosho aufteilen und sie unter die Befehlsgewalt eines ihnen eigens zugewiesenen Militärverwalters stellen, verbessern wir unsere Rekrutierung und die Verteilung von Truppen an unsere Armee."
 geo_dasturlamali: "Dasturlamali"
 geo_dasturlamali_desc: "$GEO$ hat in den letzten Jahrhunderten seit der Invasion durch die Mongolen eine turbulente Zeit durchgemacht. Die alte georgische Feudalordnung ist aufgrund zeitweiser Teilung, dem wachsenden Einfluss örtlicher Adliger und wechselndem äußeren Druck im Grunde überflüssig geworden. Das $geo_dasturlamali$, eine Sammlung von Regeln, Richtlinien und Vorschriften, die die Pflichten der Untertanen und des Adels gegenüber dem König und dem Staat beschreibt, dient als Rechtsgrundlage unseres Königreichs und sorgt für Ordnung und Stabilität."
 geo_georgian_embassies: "$GEO_ADJ$e Botschaften"
 geo_georgian_embassies_desc: "Es liegt in unserer Tradition, ungeachtet möglicher Differenzen enge diplomatische Beziehungen zu allen Nationen in unserer unmittelbaren Umgebung zu pflegen. Dies ist auch der Grund, warum unsere Diplomaten stets empfangen und respektiert werden."
 geo_georgian_unification: "$GEO_ADJ$e Vereinigung"
 geo_georgian_unification_desc: "$GEO$ war in der Vergangenheit gespalten, aufgrund äußerer wie innerer Einflüsse. Unser stolzes georgisches Volk ist jedoch gewillt, dafür zu kämpfen, dass $GEO$ niemals wieder geteilt ist."
 #Georgia Specific
 geo_legacy_of_saint_george: "Vermächtnis des Heiligen Georg"
 geo_legacy_of_saint_george_desc: "Unsere Verbindung zum Heiligen Georg ist sowohl in der christlichen als auch in der muslimischen Welt bekannt, und so wie er sich einst mutig dem furchterregenden Drachen stellte und diesen erschlug, so werden auch unsere Soldaten unseren Feinden auf dem Schlachtfeld gegenübertreten."
 geo_bagrationi_dynasty: "$Bagrationi$-Dynastie"
 geo_bagrationi_dynasty_desc: "Die Könige und Königinnen aus dem Haus der $Bagrationi$ – eine Dynastie, die so alt ist, dass ihr Ursprung geheimnisumwittert ist – regiert bereits seit dem 9. Jahrhundert über $GEO$, zuerst als Fürsten und danach als Monarchen."
 geo_georgian_golden_age: "$GEO_ADJ$es Goldenes Zeitalter"
 geo_georgian_golden_age_desc: "Das kulturelle und religiöse Goldene Zeitalter von $GEO$ fand durch die Invasion der Mongolen ein jähes Ende. Es war diese Periode, die die zahlreichen kulturellen Errungenschaften unserer Nation hervorbrachte, und nun werden wir daran anknüpfen und sogar noch größere Höhen erreichen."
 geo_legacy_of_tamar: "Vermächtnis von Tamar"
 geo_legacy_of_tamar_desc: "Tamar war eine der größten Herrscherinnen, die unsere Nation jemals hatte. Ihre militärischen und kulturellen Erfolge sind legendär, und allein die Erwähnung ihres Namens erweckt noch immer Ehrerbietung in den Herzen aller, die sich als georgisch betrachten."
 geo_david_the_builder: "David der Erbauer"
 geo_david_the_builder_desc: "König David der Erbauer wird noch heute als der größte Herrscher in der Geschichte unseres Landes angesehen, da er Georgien zu dem machte, was es heute ist. Er errichtete ein mächtiges, kulturell einflussreiches Königreich und wurde zu einem Vorbild für das gesamte Christentum und besonders das georgische Volk."
 geo_georgian_titles: "$GEO_ADJ$er Königstitel"
 geo_georgian_titles_desc: "„König der Könige, stark und unbesiegbar, majestätisch und Beschützer des heiligen Königreichs der Abchasen, Iberer, Ranis, Kachetier, Armenier, Schahanschah und Schirwanschah, des Ostens und Westens, des Südens und Ostens, beider Länder, beider Throne und beider Kronen, der gottgleiche Suzerän und Herrscher über den Thron.“ Unsere Herrscher tragen viele Titel, und alle am Hof respektieren sie."
 geo_georgian_numismatics: "$GEO_ADJ$e Numismatik"
 geo_georgian_numismatics_desc: "Die Münzprägung hat eine lange Tradition in unserem Land, und Münzen werden nicht nur in georgischer, sondern auch arabischer und persischer Sprache beschriftet, da sie als Linguae franca für den Handel in unserem und dem Land unserer Nachbarn dienen."
 geo_beacon_of_christianity: "Bollwerk des Christentums"
 geo_beacon_of_christianity_desc: "$GEO$ ist seit Jahrhunderten ein Symbol des Christentums im Kaukasus, selbst nachdem es von den Anhängern des Islam umzingelt und vom Rest der christlichen Welt abgeschottet wurde. Der Glaube unseres Volkes dient all unseren Brüdern als Quelle der Inspiration."
 geo_georgian_principalities: "$GEO_ADJ$e Fürstentümer"
 geo_georgian_principalities_desc: "Die Verwaltung unserer Territorien ist in mehrere Fürstentümer aufgeteilt. Diese Machtübertragung erlaubt es uns, unsere Herrschaft wirksamer über unser gesamtes Land hinweg auszuüben."
 geo_georgian_resilience: "$GEO_ADJ$e Zähigkeit"
 geo_georgian_resilience_desc: "Unser Land ist in seiner langen Geschichte mehr als nur einmal durch äußere und innere Einflüsse auseinandergerissen worden. Doch wie ein aufsteigender Phönix ist es stets wieder aus der Asche auferstanden. Die Widerstandsfähigkeit unseres Volkes ist grenzenlos."
 #Samtskhe
 sme_jaqeli_dynasty: "$Jaqeli$-Dynastie"
 sme_jaqeli_dynasty_desc: "Trotz ihrer eher bescheidenen Ursprünge hat es die $Jaqeli$-Dynastie geschafft, viele einflussreiche Bande zu Königen und Kaisern um uns herum zu knüpfen. Dies hat dazu geführt, dass wir in diplomatischen Kreisen ein hohes Ansehen genießen."
 sme_atabegs_of_samtskhe: "Atabeg von $SME$"
 sme_atabegs_of_samtskhe_desc: "Wir sind mehr als nur Teil des Königreichs $GEO$. Wir erhielten bereits vor langer Zeit die königliche Anerkennung und damit den Titel Atabeg. Dieser Titel war zuvor nur den armenischen Vasallen verliehen worden und ist ein Zeichen der Anerkennung und des Respekts, den der georgische Monarch für uns hat."
 sme_proactive_diplomacy: "Vorgreifende Diplomatie"
 sme_proactive_diplomacy_desc: "$SME$ ist zwar Teil von $GEO$, doch weitgehend unabhängig, was Verwaltung und Diplomatie angeht. Dies erfordert ein ständiges Bewusstsein für die politischen Verhältnisse in $GEO$ und eine sehr tatkräftige Diplomatie mit jenen größeren Reichen, an die wir angrenzen. Unsere Herrscher achten stets darauf, dass wir einen unmittelbaren Zugang zu jenen haben, die über die größte Macht verfügen. Wir haben auch bereits im Bedarfsfall eine eigene Rolle in der Innenpolitik von $GEO$ gespielt und uns dabei sowohl in Nachfolgekämpfe eingemischt als auch mit der herrschenden Dynastie Bündnisse geschlossen, je nachdem, was für uns vorteilhafter war. Wir täten gut daran, diese Tradition in Zukunft aufrechtzuerhalten, damit niemand behaupten kann, wir hätten zu wenig getan oder ohne ausreichendes Wissen gehandelt."
 sme_fortresses_of_samtskhe: "Die Festungen von $SME$"
 sme_fortresses_of_samtskhe_desc: "Unsere Nation ist ein im Gebirge gelegenes Grenzland, das viele Male als Wall gegen Invasoren diente, die nach $GEO$ einfallen wollten. Daher haben wir gelernt, starke Festungen zu bauen und bereit zu sein, langwierige Verteidigungskriege zu führen. Dieses Vermächtnis müssen wir um jeden Preis weiterverfolgen, um die Festungen von $SME$ in gutem Zustand, ausreichend bemannt und gegen Invasoren versorgt zu halten."
 sme_independent_ambitions: "Unabhängige Ambitionen"
 sme_independent_ambitions_desc: "Ob muslimisch oder christlich, georgisch, türkisch oder iranisch: Samzche musste sich oft vor fremden Königen oder Sultanen beugen. Um einen dauerhaften Staat mit einer stabilen Wirtschaft zu errichten, müssen wir Institutionen aufbauen, die unabhängig davon handeln können, wer unser Land gerade begehrt. Wir müssen unsere eigene Münzen und Gesetze herausgeben und unsere eigenen Theologen und Schriftsteller fördern."
 sme_protect_trade_routes: "Schutz der Handelsrouten"
 sme_protect_trade_routes_desc: "Unsere geografische Lage zwischen $georgia_area$, $anatolia_region$, $armenia_area$ und $azerbaijan_area$ bedeutet auch, dass eine große Anzahl Händler versucht, unser Land zu durchqueren. Die ständigen Überfälle nomadischer Stämme bedingen jedoch, dass viele an der Sicherheit unserer Straßen zweifeln. Wir müssen alle Straßen und Gaststätten verteidigen, damit der Handel ungehindert durch unseren Staat fließen kann."
 sme_frontier_warriors: "Grenzkrieger"
 sme_frontier_warriors_desc: "Der Kaukasus wird bereits seit langer Zeit von nomadischen Kaisern geprägt und die Weiden von $SME$ zogen viele Stammesleute an, die sich in unserem Land niedergelassen haben. Wir dürfen nicht zulassen, dass dies die Stabilität unseres Königreichs gefährdet, sondern sollten uns mit den Stämmen zusammentun und sie an unseren militärischen Ambitionen teilhaben lassen."
 sme_sacred_land: "Heiliges Land"
 sme_sacred_land_desc: "Samzche ist die Heimat zahlreicher heiliger und verehrter Orte des georgischen Volkes. Das Höhlenkloster von Wardzia, die antike Kirche von Atskuri mit ihrer wundervollen Ikone der Jungfrau Maria und das Kloster von Ancha mit seiner Ikone Antschischati sind einige der bedeutendsten Orte unter unserem Schutz. Indem wir die Kirche von Samzche unter unseren Schutz stellen und sie getrennt von der georgischen halten, stellen wir sicher, dass unser Volk im Angesicht aller Widrigkeiten vereint steht."
 sme_bridge_between_worlds: "Brücke zwischen zwei Welten"
 sme_bridge_between_worlds_desc: "Unser Land liegt zwischen der christlichen und der muslimischen Welt und diente in der Vergangenheit oft als Brücke und Verbindungsstück zwischen ihnen. Dies ist auch der Grund, warum die Anhänger beider Glaubensrichtungen innerhalb unserer Grenzen schon immer miteinander Umgang pflegten."
 #Armenia
 arm_legacy_of_hayk: "Vermächtnis von Hayk"
 arm_legacy_of_hayk_desc: "Hayk, ein Nachfahre Noahs, wurde zum Patriarchen unseres Volkes ernannt, als er nach dem Sieg gegen die Babylonier am Fuß des Berges Ararat unser Königreich gründete. Jeder in unserem Volk kennt diese Geschichte, und alle sind stolz darauf, von einer derart alten Linie abzustammen."
 arm_mount_ararat: "Berg Ararat"
 arm_mount_ararat_desc: "Der Berg Ararat – jener Berg, an dem sich Noah mit seiner Arche nach der großen Flut niederließ – ist auch zugleich der Ort, an dem unsere Nation gegründet wurde. Diese Tatsache ermutigt unser Volk dazu, Widerstand zu leisten, wenn die Heiligkeit unseres Landes bedroht ist."
 arm_apostolic_church: "$ARM_ADJ$e Apostolische Kirche"
 arm_apostolic_church_desc: "$ARM$ war das erste Land, dass das Christentum im Jahr 301 als Staatsreligion annahm. Es ist diesem Umstand zu verdanken, dass unsere Glaubenstraditionen und unser Klerus eine Identität für uns schufen."
 arm_land_reclamation: "Landrückgewinnung"
 arm_land_reclamation_desc: "$ARM$ wurde jahrhundertelang durch Kriege verwüstet und von seinen Nachbarn zerrissen. Indem wir unser verlorenes Land zurückfordern und es – zusätzlich zur Instandsetzung zerstörter Kirchen und Festungen – wieder bewohnbar machen, üben wir eine stärkere Kontrolle aus und verbessern das Leben unseres Volkes."
 arm_border_nation: "Grenznation"
 arm_border_nation_desc: "$ARM$ ist häufig der Austragungsort von Streitigkeiten größerer Nationen. Selbst nachdem wir unsere Souveränität wiedererlangt haben, ist es häufig schwierig, neutral zu bleiben. Es ist schwer, jedem gerecht zu werden, aber nicht unmöglich."
 arm_melikdom_organization: "Meliktum-Organisation"
 arm_melikdom_organization_desc: "$ARM$ wird nach dem Zusammenbruch der alten Nacharar-Ordnung aufgrund der mongolischen Invasionen als eine der wenigen Bastionen eines unabhängigen armenischen Staates von feudalen Suzeränen, den „Meliks“, regiert. Die Beziehung zwischen den Meliks und deren Untertanen ist die eines militärischen Befehlshabers und eines Nachwuchsoffiziers und nicht die eines feudalen Fürsten und eines Leibeigenen."
 arm_mountain_armies: "Gebirgsarmeen"
 arm_mountain_armies_desc: "$ARM$ ist ein sehr gebirgiges Land. Unser Volk lernte über die Jahrhunderte hinweg, in ihnen zu leben und sie zu unserem Vorteil zu nutzen. Dies hat dazu geführt, dass unsere Armeen stets bereit sind, sich aus allen Ecken unseres Landes unter unserem Banner zu vereinen."
 arm_nakharar_titles: "Nacharar-Titel"
 arm_nakharar_titles_desc: "Das Nacharar-Titelsystem wurde seit der Gründung von $ARM$ genutzt und blieb bis zur Invasion der Mongolen unverändert, als die gesamte Ordnung zusammenbrach. Obwohl die Titel selbst nicht mehr vergeben werden, haben wir bestimmte Merkmale des Systems übernommen, um die Privilegien unseres Adels und unserer Armee zu verbessern."
 arm_greater_armenia: "Groß-$ARM$"
 arm_greater_armenia_desc: "Unser Land hat eine glorreiche und langen Geschichte und stammt von jenen armenischen Königreichen der Vergangenheit ab, denen es gelang, sich über ein riesiges Territorium hinweg auszubreiten, und damit auch das armenische Volk dort ansiedelten. Indem wir ihrem Beispiel folgen, werden wir zu einem Bollwerk für alle, die sich als armenisch betrachten und sich unter unserem Banner versammeln wollen."
 arm_highland_fortresses: "Hochlandfestungen"
 arm_highland_fortresses_desc: "Unser gebirgiges Kernland hat uns viel über Widerstandsfähigkeit und Ausdauer gelehrt, und unsere Festungen spiegeln dies wider. Sie wurden gebaut, um nicht nur den schwierigen Bedingungen der Berge zu trotzen, sondern auch jedem Eindringling, der es wagt, in unser Land einzufallen."
 #Switzerland
 swiss_oath_of_rutli: "Rütlischwur"
 swiss_oath_of_rutli_desc: "Sagen wir das Gelübde dieser neuen Eidgenossenschaft auf: „Wir wollen sein ein einzig Volk von Brüdern, in keiner Not uns trennen und Gefahr …“ Kein fremder Tyrann wird über unser Land herrschen."
 swiss_halberd_infantry: "Vermächtnis vom Morgarten"
 swiss_halberd_infantry_desc: "Als wir unsere Freiheit bei der Schlacht am Morgarten verteidigten, hatten wir einen entscheidenden Vorteil gegenüber den habsburgischen Eindringlingen: Die Hellebarde ist eine einfache, aber tödliche Waffe, die jeden Feind mit Leichtigkeit aufhält. Indem wir unsere Truppen in der Nutzung dieser Waffe ausbilden, haben wir stets einen Vorteil gegenüber unseren Feinden, selbst wenn sie weitaus mehr Truppen besitzen."
 swiss_alpine_passes: "Meister der Alpenpässe"
 swiss_alpine_passes_desc: "Die gewaltigen Alpen sind für uns nicht bloß Hindernisse: Sie sind unsere Heimat. Ihre großen Pässe – der Gotthard, der Simplon, der Grimsel – sind unsere Straßen. Generationen von Pilgern, Händlern und Heeren, die durch diese tückischen Höhen zogen, machten unser Volk mit jedem Weg, jeder Unterkunft und jeder Abkürzung bestens vertraut. Kein fremdes Heer wird unsere Berge so rasch durchqueren wie wir."
 swiss_eternal_alliance: "Ewiges Bündnis der Waldstätten"
 swiss_eternal_alliance_desc: "Wir sind ein ewiges Bündnis mit unseren Freunden und benachbarten Stätten eingegangen. Ohne diesen Vertrag wären wir mit Sicherheit den habsburgischen Eindringlingen erlegen und erneut unter die Herrschaft fremder Tyrannen geraten. Dieses Bündnis wird in den kommenden Jahrhunderten unser Überleben sichern."
 swiss_mercenaries: "$SWI_ADJ$e Söldner"
 swiss_mercenaries_desc: "Unsere Truppen genießen hohes Ansehen unter unseren Nachbarn. Glücklicherweise sind wir nicht ständig auf ihre Dienste angewiesen, weshalb wir sie an andere vermieten können. Dies wird zum einen unsere Staatskasse füllen und zum anderen können unsere Soldaten Erfahrung sammeln."
 the_swiss_confederation: "Grundsätze der Eidgenossenschaft"
 the_swiss_confederation_desc: "Jedes Mitglied unserer Eidgenossenschaft leistet seinen Beitrag zur Erfüllung unserer Ziele. Unser dezentralisierter Ansatz zur Verwaltung dieses Staatenbündnisses dient einem größeren Ziel, weshalb niemals ein Bürgerkrieg ausbrechen wird, trotz möglicher Meinungsverschiedenheiten."
 swiss_reislaufer: "Reisläufer"
 swiss_reislaufer_desc: "$a_reislaufer_desc$ Wir sollten diese Veteranen in Regimenter unterteilen und sie in unsere Armeen eingliedern."
 swiss_recovery_and_prosperity: "Gepeinigtes Reich"
 swiss_recovery_and_prosperity_desc: "Die Zwiste der Vergangenheit haben gezeigt, dass die Abwehr von Eindringlingen nicht die einzige Aufgabe ist, um die wir uns kümmern müssen. Die Täler unserer Kantone werden mit jeder Schlacht verwüstet, und es müssen Schritte unternommen werden, um den Wohlstand zurückzubringen."
 alpine_defensiveness: "Alpine Wehrhaftigkeit"
 alpine_defensiveness_desc: "Die Schweiz ist von rauem Gelände, Gebirgen und Tälern durchzogen. Wir müssen lernen, wie wir uns das Land zunutze machen können, und dies in unsere Militärtaktik miteinbeziehen. Auf diese Weise triumphieren wir mit Sicherheit über jeden Feind, der es wagt, einen Fuß in unser Land zu setzen."
 swiss_religious_refuge: "Zufluchtsort für Flüchtlinge"
 swiss_religious_refuge_desc: "Andere vertreiben religiöse Minderheiten und schwierige Persönlichkeiten nur zu gern, doch wir bieten wir ihnen freudig ein neues Zuhause an. In der $SWI$ werden sie ein neues Leben beginnen können und unsere Herrschaft lobpreisen."
 swiss_tolerance: "$SWI_ADJ$e Toleranz"
 swiss_tolerance_desc: "Warum sollten wir uns wegen der Transsubstantiation und Prädestination gegenseitig umbringen, wenn wir unsere Bergheimat wieder vereinen könnten?\n\nJeder Kanton in der $SWI$ wird selbst entscheiden können, wie er mit Glaubensfragen verfährt. Auch wenn dies nicht sämtliche Glaubensstreitigkeiten in unserem Land beseitigen wird, stellt es zumindest sicher, dass unser Volk unabhängig von seiner Konfession einen Platz hat, an dem es nicht verfolgt wird."
 swiss_clockwork: "Meisterhafte Uhrwerke"
 swiss_clockwork_desc: "Manche Narren denken, Uhrwerke seien nur für Uhren da. Wenn man sich aber die Kraft der sich drehenden Zahnräder ansieht und wie sie immer weiter laufen, ist offensichtlich, dass Uhrwerke so ziemlich alles erreichen können: Vielleicht hat sogar der Schöpfer des Universums alles Leben wie eine Uhr aufgezogen und lässt die Zahnräder sich frei drehend die Jahrhunderte herunterticken. $SWI_ADJ$e Uhrmacher sind die besten Uhrwerksmeister der Welt. Natürlich außer Gott selbst."
 swiss_ambition: "$SWI_ADJ$e Aufklärung"
 swiss_ambition_desc: "Wir müssen nicht erst eine eigene Identität für unser Land suchen: Unsere Bevölkerung ist nur zu gern bereit, sich um die Banner ihrer Kantone und die Ideale unserer Eidgenossenschaft zu scharen. Indem wir die aufgeklärten Gelehrten unserer Zeit finanzieren, können wir das schweizerische Volk in ein neues Zeitalter führen und gleichzeitig die einzigartigen Eigenschaften der Eidgenossenschaft beibehalten. Der Helvetismus wird als Grundlage für unsere aufgeklärten Grundsätze dienen."
 swiss_banking: "$SWI_ADJ$es Bankwesen"
 swiss_banking_desc: "Wir sind eine Zuflucht nicht nur für jene, die in anderen Ländern verfolgt werden, sondern auch für deren Reichtum. Mit unseren riesigen Tresoren, die hinter dicken Mauern versteckt liegen und von unseren vertrauenswürdigsten Soldaten verteidigt werden, sind wir die beste Wahl für jeden Bürger der kriegsgebeutelten Länder dieser Welt, der seine Wertsachen sicher verwahrt wissen will."
 #Zimbabwe
 zmw_experienced_cattle_herder: "Erfahrene Hirten"
 zmw_experienced_cattle_herder_desc: "Das Hüten von Tieren ist keine leichte Aufgabe, doch es ist für unser Überleben unerlässlich. Um unser Land zu stabilisieren und unsere Herrschaft auszubauen, dürfen wir nicht davor zurückschrecken, unsere Weideflächen zu erweitern."
 zmw_stone_builders: "Simbabwische Baumeister"
 zmw_stone_builders_desc: "Die großen Steinbauten von Simbabwe versetzen die vielen Besucher unseres Landes oft in Staunen. Indem wir diese Tradition aufrechterhalten, stellen wir sicher, dass unsere großen Städte aus Stein den Lauf der Zeit überdauern."
 zmw_encourage_new_settlements: "Neues Weideland und Ressourcen"
 zmw_encourage_new_settlements_desc: "Jenseits unserer Grenzen liegt ein riesiges, unerschlossenes Land, dessen Ressourcen und Weideland nur darauf warten, dass unser Volk sie nutzt. Wir müssen unser Volk dazu ermutigen, sich in diesen Territorien niederzulassen und neue Städte zu gründen."
 zmw_rekindling_the_royal_fires: "Neuentfachung der Königsfeuer"
 zmw_rekindling_the_royal_fires_desc: "Damit unsere Unterhäuptlinge uns und den Göttern ihre Treue beweisen können, müssen sie einmal im Jahr zum Hauptsitz reisen, um ihre eigenen Feuer mit unserem Feuer neu zu entfachen. Sobald ein Jahr vergangen ist, wird unsere Armee ihr Feuer löschen, und sie müssen die Reise erneut antreten."
 zmw_strict_gold_regulations: "$goods_gold$-Handelsbeschränkungen"
 zmw_strict_gold_regulations_desc: "Das Land bietet uns reichlich Waren, an denen fremdländische Händler sehr interessiert sind, doch es sind unsere reichen $goods_gold$reserven, die alles andere überstrahlen. Auch wenn solche Reichtümer ein Segen für unseren Staat sind, muss er jeglichen Handel und den Besitz von Gold strikt regeln, um die zerstörerischen Einflüsse menschlicher Gier und Betrügereien von unseren Gewinnen fernzuhalten."
 zmw_spokesman_before_the_dead: "Totensprecher"
 zmw_spokesman_before_the_dead_desc: "Unser Herrscher ist nicht nur im weltlichen Sinn unser Anführer, sondern von ihm wird zugleich erwartet, für uns vor den Geistern der Toten zu sprechen. Vor jedem Feldzug und vor jeder Ernte wird eine Zeremonie oder ein Tanz abgehalten, in dem er den Geistern unserer Vorfahren unseren Respekt zollt und unsere Wünsche an sie weitergibt. Ohne diesen großen Herrscher, der die Königsgräber unterhält und regen Umgang mit unseren Toten pflegt, könnte sich die Lage unseres Landes rasch verschlechtern."
 zmw_elected_administrators: "Provinzverwalter"
 zmw_elected_administrators_desc: "Traditionell stammen all unsere Verwalter, selbst auf örtlicher Ebene, aus dem erweiterten Kreis der Königsfamilie. Da unser Reich jedoch immer weiter wächst, ist es an der Zeit, dass wir das regionale Wissen unserer Untertanen nutzen, und es ihnen erlauben, ihre eigenen Verwalter zu wählen."
 zmw_discipline_and_traning: "Regelmäßige Ertüchtigung"
 zmw_discipline_and_traning_desc: "Disziplin, Vorbereitung und Ausbildung gewinnen Schlachten. Vor diesem Hintergrund haben unsere Befehlshaber erfolgreich neue Taktiken eingeführt und unsere Armeeorganisation geprägt. Indem wir unsere Krieger in Regimenter einteilen und sie anschließend regelmäßig im Umgang mit Bogen, Assegai, Dolch und Axt ausbilden, nutzen wir diese Innovationen am besten. Nur durch regelmäßige Übungen werden sie ohne Angst in Formation kämpfen und zahlenmäßig überlegene Feinde besiegen."
 zmw_merchant_taxes: "Handelsgebühren"
 zmw_merchant_taxes_desc: "Da immer mehr Händler in der Region Sambesi eintreffen, ist es nötig geworden, unsere Autorität zu sichern. Jeder, der den Wunsch hegt, hier Handel zu treiben und unser geliebtes $goods_gold$ und $ivory$ an andere Gestade zu bringen, muss zuerst von unserem Herrscher zugelassen werden und uns eine Steuer entrichten, um freien Zugang zu erhalten. Bei Zahlungsverzug werden sämtliche Waren von unserem Staat konfisziert."
 zmw_controlling_the_mutapan_riches: "Kontrolle über den Reichtum"
 zmw_controlling_the_mutapan_riches_desc: "Reisende aus dem Westen nennen unser Land „Ophir“, das Land des Goldes, und im Lauf der Jahrhunderte riefen die Goldminen der Hochebene und der sambesische Handel viele Neider hervor. Wir müssen unsere Kontrolle über diesen Reichtum nutzen, um dauerhafte Handelsposten zu errichten, die womöglich zu ausgedehnten Städten heranwachsen."
 zmw_empowering_the_rozwi: "Ermächtigung der Rozwi"
 zmw_empowering_the_rozwi_desc: "Unsere Lande sind die Heimat vieler ausgezeichneter Krieger. Unter ihnen sind auch die Rozwi, disziplinierte Kämpfer, die unser Volk gegen alle verteidigen, die uns unser Land nehmen wollen."
 zmw_cow_horn_tactics: "Kuhhorn-Formation"
 zmw_cow_horn_tactics_desc: "Neue Taktiken für die sich ständig verändernden Kriege zu entwickeln oder zu übernehmen, ist keine leichte Aufgabe. Gegen potenziell überlegene Feinde sollten wir vor allem auf unsere eigene Beweglichkeit setzen. Wenn wir es schaffen, unsere Feinde in den Nahkampf zu verwickeln, und sie durch Regimenter an den Flanken einkreisen, können wir ihnen verheerende Verluste beibringen."
 #Khmer
 khm_religious_flexibility: "Ein Glaube für $KHM$"
 khm_religious_flexibility_desc: "Unser Land hat sowohl stürmische Zeiten als auch Monarchen erlebt, die neben dem Hinduismus auch verschiedene Zweige des Buddhismus förderten. Wir müssen auf die Entscheidungen unserer Herrscher vertrauen, dem von ihnen gewählten Glauben folgen und diesen in jedem Teil unseres Landes verbreiten."
 khm_royal_procession: "$KHM_ADJ$e Königsprozessionen"
 khm_royal_procession_desc: "Die Prozessionen unserer Herrscher sind ein beindruckendes Schauspiel und werden nur von wenigen anderen Ereignissen übertroffen. Wir nutzen sie, um unsere Autorität unter Beweis zu stellen und die Pracht unseres Staates hervorzuheben. Elefanten und die königliche Garde verkörpern den Reichtum und die Macht des Herrschers und sorgen dafür, dass das Vertrauen unseres Volkes stets ungebrochen bleibt."
 khm_ballista_elephants: "Ballisten-Elefanten"
 khm_ballista_elephants_desc: "Elefanten sind imposante Geschöpfe und weitaus größer als alle anderen uns bekannten Tiere. Es ist an der Zeit, dass wir sie in unseren Kriegen einsetzen und ihre Eigenschaften nutzen, um unsere Feinde das Fürchten zu lehren. Elefanten sind zudem in der Lage, große Lasten zu befördern, was es uns erlaubt, Kriegsmaschinen auf ihnen anzubringen. Riesige, doppelsehnige Armbrüste geben uns die nötige Feuerkraft, um die Schlachtfelder zu dominieren."
 khm_great_builders: "Hydraulische Städte"
 khm_great_builders_desc: "Unsere Städte sind die Heimat zahlreicher Baray (Wasserreservoirs) und Kanäle, die das Wasser für die gesamte Stadt lagern und verteilen. Unsere Fähigkeit, diese Wasserwege zu errichten und zu unterhalten, stellt sicher, dass unsere Bevölkerung selbst während der verheerenden Monsunzeit gedeiht."
 khm_recruitment_of_peasants: "Bauernrekrutierung"
 khm_recruitment_of_peasants_desc: "Wir müssen unsere Armeen mit neuen Rekruten verstärken. Diese Rekruten finden wir mit Leichtigkeit in unserer Bauernschaft. Mit etwas Ausbildung stellen wir sicher, dass unsere Reihen jederzeit mit fähigen Soldaten aufgefüllt werden."
 khm_foreign_production_skills: "Fremdländische Fachleute einladen"
 khm_foreign_production_skills_desc: "Da unser eigenes Volk andere Stoffe vorzieht und deshalb keine Erfahrung darin hat, Seidenstoffe herzustellen, sind wir froh, dass sich Weber aus der Fremde in unseren Städten niedergelassen haben, um ihre eigenen Webstuben in unserem Land zu errichten. Wir sollten denselben Ansatz auch für andere Industriezweige nutzen, um unsere Produktivität im Allgemeinen auszuweiten."
 khm_utilize_the_rivers: "Die Lebensadern von $KHM$"
 khm_utilize_the_rivers_desc: "Die Flüsse unseres Landes bieten uns die hervorragende Möglichkeit, die zahlreichen, in unserem Inland geernteten und erzeugten Waren in unsere Häfen zu befördern, wo sie anschließend über die Handelsrouten weiterverteilt werden, um die Märkte ferner Länder zu erreichen. Dieses Transportnetz verbindet zudem unsere Städte und erleichtert die Verständigung zwischen ihnen."
 khm_champa_mercenaries: "$CHA_ADJ$e Söldneranführer"
 khm_champa_mercenaries_desc: "In der Vergangenheit verließen wir uns oft auf die wilden Soldaten aus $CHA$ und kämpften auch gegen sie. Indem wir uns die Dienste ihrer fähigsten Befehlshaber sichern, gewährleisten wir, dass unsere Armee stets gut ausgebildet ist und mit jeder Lage auf dem Schlachtfeld zurechtkommt."
 khm_restore_angkor: "Wiederaufbau von $angkor$"
 khm_restore_angkor_desc: "Die große Stadt $angkor$ war einst das strahlende Juwel unserer meisterlichen architektonischen Handwerkskunst. Aufgrund äußerer Einflüsse mussten wir jedoch Abstriche bei geplanten Bauvorhaben machen. Wir sollten uns auf unsere Wurzeln besinnen und erneut damit beginnen, Gebäude und Anlagen monumentalen Ausmaßes zu errichten, die von unserer Pracht zeugen."
 khm_modern_navy: "Moderne khmerische Marine"
 khm_modern_navy_desc: "Wir dürfen nicht zulassen, dass andere die Meere beherrschen und den Handel kontrollieren, wenn unser Staat derart abhängig davon ist. Wir müssen eine neue und moderne Marine aufbauen, die in der Lage ist, es mit allen Piraten und jeder rivalisierenden Marine in $south_east_asia$ aufzunehmen."
 khm_invest_in_irrigation: "Erweiterung der Baray"
 khm_invest_in_irrigation_desc: "Obwohl unsere derzeitigen Wasserreservoirs ausreichen, um unsere Nachfrage an Landwirtschaftserzeugnissen zu befriedigen, könnten wir weitaus mehr Menschen versorgen, wenn wir neue Baray in anderen Teilen unseres Landes ausheben würden, wo neue Stadtzentren für unser Volk entstehen können."
 khm_protection_from_raids: "Grenzsicherung"
 khm_protection_from_raids_desc: "Unser Land wird immer wieder von Invasionen bedroht, und vor allem unser kostbares $angkor$ ist Belagerungen schutzlos ausgeliefert. Wir müssen in ein ausgedehntes System von Festungsanlagen investieren, die über ausreichend große Garnisonen verfügen und jeder Invasionsmacht standhalten können, damit wir unser Volk vor der Versklavung und einer Fremdherrschaft schützen."
 khm_old_grudges: "Von Rivalitäten geleitet"
 khm_old_grudges_desc: "Unser Volk wurde in der Vergangenheit oft von Invasoren erniedrigt, denen wir uns beugen mussten. Obgleich nicht jede Niederlage zu vermeiden ist, sollten wir diesen Umstand zumindest dazu nutzen, um unser Volk zu noch größeren Taten auf den vor uns liegenden Schlachtfeldern anzuspornen."
 peasant_connections_advance: "Beziehungen zu Bauern"
 peasant_connections_advance_desc: "Unsere Händler haben viele Verbindungen zu den ländlichen Siedlungen innerhalb und außerhalb unserer Grenzen aufgebaut. Dies versetzt sie in die Lage, bessere Preise für Lebensmittel zu erzielen, als es eigentlich üblich wäre."
 settle_the_frontier_advance: "Ruf der Grenze"
 settle_the_frontier_advance_desc: "Wir sind von Territorien umgeben, die nur darauf warten, dass wir sie erobern. Indem wir die abenteuerlustigeren Mitglieder unseres Hofstaates dazu aufrufen, sich in diese umkämpften Gebiete zu begeben, setzen wir dort unsere Herrschaft durch."
 #Trebizond
 tre_pontic_trail_mastery: "$pontic_greek_culture$e Trampelpfade"
 tre_pontic_trail_mastery_desc: "Unser Land ist unsere Heimat, und unsere Wälder sind unser Garten. Wir kennen unsere Gebiete besser als jeder andere. Wir wissen um jeden Pfad und jeden Weg, und wir werden dieses Wissen nutzen, sollte es jemals jemand wagen, in unser Land einzudringen."
 tre_komnenos_legacy: "Vermächtnis der $komnenos_dynasty$"
 tre_komnenos_legacy_desc: "Niemand darf vergessen, dass wir die Nachkommen der $komnenos_dynasty$ sind, jener Dynastie, die einst über das riesige byzantinische Reich herrschte. Obwohl wir inzwischen über einen anderen Staat gebieten, ist das Vermächtnis und Prestige unserer Dynastie etwas, was unbestreitbar bleibt."
 tre_empire_in_exile: "Großreich im Exil"
 tre_empire_in_exile_desc: "Wir erben einen Teil der Bürokratie unseres ehemaligen Großreichs, was es uns erlaubt, trotz unser geschmälerten Umstände die Ordnung und die Kontrolle zu bewahren."
 tre_princes_of_the_lazes: "$laz_culture$e Fürsten"
 tre_princes_of_the_lazes_desc: "Das lasische Volk bewohnt dieses Land bereits seit Jahrhunderten, und obwohl unser eigenes Reich durch griechische Einflüsse geformt wurde, lebt auch eine große lasische Gemeinschaft innerhalb unserer Grenzen. Viele unserer Feinde bezeichnen uns deshalb spöttisch als „lasische Fürsten“ und sehen unsere Kultur als minderwertig an. Dies schmälert jedoch nicht unsere Ansprüche, und wir tragen diesen Titel mit Stolz."
 tre_strategic_marriages: "Strategische Ehen"
 tre_strategic_marriages_desc: "Es ist nicht nur die Macht des Schwertes, die es einem erlaubt, Königreiche und sogar Großreiche zu erobern. Indem wir Staatsehen mit den umliegenden Nationen eingehen, erhalten wir einen Anspruch auf die Nachfolge ihrer Throne. Oder weiten zumindest unseren Einfluss auf selbige aus."
 tre_grand_komnenoi: "Das große Haus der Komnenen"
 tre_grand_komnenoi_desc: "Die $komnenos_dynasty$-Dynastie mag vom byzantinischen Thron gedrängt worden sein, doch ihr Ruhm wird nie ausgelöscht werden können. Unsere Blutlinie genießt noch immer viel Anerkennung, und der Respekt, den uns sowohl unser Volk als auch andere Länder entgegenbringen, ist nicht unverdient."
 tre_pontic_mountains: "$pontic_greek_culture$es Gebirge"
 tre_pontic_mountains_desc: "So wie die Alpen die Franzosen von den Italienern trennen, trennt das Pontische Gebirge unseren letzten griechischen Rückzugsort in $anatolia_region$ von den türkischen Eindringlingen, die das anatolische Hochland eingenommen haben. Pontos war schon immer griechischer als das restliche $anatolia_region$ … Vielleicht wird das Vermächtnis des großen Mithridates von einst unsere Krieger inspirieren und so viel Angst und Furcht unter den Türken säen wie einst unter den Römern."
 tre_byzantine_birthright: "$BYZ_ADJ$es Geburtsrecht"
 tre_byzantine_birthright_desc: "Das große $BYZ_ADJ$e Reich konnte sich unter der Herrschaft unserer Vorväter wahrlich sehen lassen. Es waren Betrug und Verrat, die uns dazu zwangen, es aufzugeben, nur um es anschließend in unserem eigenen Land neu zu schmieden und wiederauferstehen zu lassen. Niemand darf je an unserer Autorität zweifeln."
 tre_trapezuntine_monasteries: "$TRE_ADJ$e Klöster"
 tre_trapezuntine_monasteries_desc: "Es ist unser Glaube, der die Seelen unseres Volkes sicher bewahrt. Unser Klerus sorgt für ihre Erlösung. Was also sind unsere Klöster? Sind sie nicht die Quelle und der Ursprung dieser Erlösung?"
 tre_greek_stronghold: "$greek_language$e Hochburg"
 tre_greek_stronghold_desc: "Seit der Antike wird $greek_language$ als Bildungs- und Wissenschaftssprache angesehen. Als unsere Vorfahren in dieses Land kamen, übten sie nicht nur ihre Autorität über das Land aus, sondern brachten auch ihre Kultur und ihre Sprache mit. Die griechische Tradition des Lernens ist deshalb auch in unserem Land weitverbreitet."
 tre_komnenoi_princesses: "Prinzessinnen der Komnenen"
 tre_komnenoi_princesses_desc: "Der $komnenos_dynasty$-Dynastie sind viele bemerkenswerte Frauen entsprungen, und zahlreiche Herrscher aus $europe$ und sogar einige Ungläubige hielten um ihre Hand an. Unsere Blutlinie genießt größten Respekt und unsere Prinzessinnen erst recht, da sie es sind, die es fremden Ländern erlauben, durch unsere Linie die nötige Legitimität zu beanspruchen, die sie brauchen, um an ihren Höfen weiter Einfluss zu haben."
 tre_terminus_of_the_silk_road: "Endstation der Seidenstraße"
 tre_terminus_of_the_silk_road_desc: "Die Griechen erkannten bereits in der Antike, als man ihn noch „Trapezoús“ nannte, wie nützlich dieser Standort war. Hier ist jener Punkt, an dem der Landweg durch $asia$ auf das Meer trifft, welches wiederum mit dem Mittelmeer verbunden ist. Wir sind als Endstation der großen Seidenstraße bekannt, ein Sammelpunkt für all die Reichtümer aus $china$ und $india$, die auf dem Weg nach $europe$ sind. Es gibt keinen Grund, warum wir nicht versuchten sollten, einige der Reichtümer zu behalten, die man durch unser Land befördert."
 tre_lessons_of_the_fourth_crusade: "Lektionen aus dem Vierten Kreuzzug"
 tre_lessons_of_the_fourth_crusade_desc: "Isaak II. Angelos, der unsere Dynastie im Jahr 1185 vom Thron stieß, wurde selbst vom Thron gestoßen und geblendet. Unter dem Vorwand den alten blinden Narren wieder einzusetzen, plünderten die venezianischen Truppen 1204 $constantinople$. Wenn es eins gibt, was wir daraus lernen können, dann Folgendes: Verrat und Täuschung sind im Kampf um die Macht allgegenwärtig, doch sie sind es auch, die einen Sieg sichern."
 tre_trapezuntine_endurance: "$TRE_ADJ$es Durchhaltevermögen"
 tre_trapezuntine_endurance_desc: "Wir wurden aus unserem Land vertrieben, und dennoch hat unsere Dynastie überlebt. Wir wurden gezwungen, in einem gebirgigen Land zu leben, umgeben von Feinden, und dennoch gedeiht unser Volk. Wir machen stets das Beste aus der Lage, in der wir uns gerade befinden, und unser Volk macht das Beste aus den Ressourcen, die ihm zur Verfügung stehen."
 #Kilwa
 palm_tree_masters: "Beherrschung der Palme"
 palm_tree_masters_desc: "Es mangelt uns zwar an vor Ort hergestellten Waren, doch wir haben zumindest Palmen im Überfluss. Ihr Holz ist hart genug, dass man es für Bauwerke und Schiffe nutzen kann, und weich genug, um sich biegen und durch unser handwerkliches Geschick in Form bringen zu lassen. Zu wissen, was wir mit dieser Art von Holz erreichen können, erlaubt es uns, unseren Reichtum zu mehren und unsere Betätigungen auf dem Meer auszuweiten."
 kilwan_trade_network: "$ZAN_ADJ$e Handelsnetze"
 kilwan_trade_network_desc: "Unser Hauptsitz zieht viele Händler aus $persia_region$ und $arabia_region$ an und ist zu einem echten Zentrum für den gesamten Handel vom Horn von $africa$ bis nach $china$ geworden."
 the_dhow: "$n_kilwan_dhow$"
 the_dhow_desc: "$n_kilwan_dhow_desc$"
 the_kilwan_zambuc: "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"
 bantu_and_perso_arabian: "$bantu_language_family$ und Persoarabisch"
 bantu_and_perso_arabian_desc: "Seit unserer Vertreibung aus $arabia_region$ und $persia_region$ gründeten wir zahlreiche Gemeinschaften entlang der $swahili_coast_region$. Diese haben die bantuische Sprache angenommen, um die gesellschaftliche Ordnung aufrechtzuerhalten und Platz für neue architektonische und kulturelle Errungenschaften zu schaffen."
 zanj_taxation: "Zandsch-Besteuerung"
 zanj_taxation_desc: "Die „Zandsch“ – ein Begriff, der ursprünglich für die Bewohner von Ostafrika genutzt wurde, besonders jene mit bantuischen Wurzeln – ließen sich in unseren Siedlungen nieder und machen einen erheblichen Teil unserer Bevölkerung aus. Sie genießen zwar viele Freiheiten und Pflichten, werden aber auch entsprechend besteuert, um ihre Privilegien zu erhalten. Ihre verhältnismäßig große Autonomie innerhalb unseres Rechtsrahmens brachte viele sprachliche Phänomene und neue kulturelle Traditionen hervor."
 zan_food_imports: "Nahrungseinfuhren"
 zan_food_imports_desc: "Ein neues Zeitalter der Seefahrt ist angebrochen und hat neue Wege eröffnet, um unser Volk zu ernähren. Während wir in der Vergangenheit nur mit dem Landesinneren von $africa$ Handel trieben, um die so lebenswichtige Hirse, Rinder und Reis zu bekommen, können wir heute Häfen erreichen, in denen Nahrungsmittel günstiger und leichter erhältlich sind."
 zan_kilwan_latitude_staves: "Gradstock"
 zan_kilwan_latitude_staves_desc: "Unsere überlegene Schiffstechnologie erlaubt es uns, weiter und schneller als unsere Konkurrenten zu segeln, was uns einen Vorteil verschafft."
 shirazi_legacy: "Schirazis Vermächtnis"
 shirazi_legacy_desc: "Unser Stammvater kam aus $shiraz$. Als Sohn des Emirs von $persia_region$ besteht kein Zweifel an unserem Herrschaftsrecht."
 zan_gold_trade_of_africa: "$africa$nischer $goods_gold$handel"
 zan_gold_trade_of_africa_desc: "Unsere großen Reserven an $goods_gold$, das aus weiten Teilen des östlichen Afrikas stammt, bilden das Fundament unseres Wohlstands. Wir müssen das Potenzial unserer Reserven voll ausschöpfen und unsere Währung stärken."
 zan_diplomacy_through_trade: "Diplomatie durch Handel"
 zan_diplomacy_through_trade_desc: "Unsere einzigartige Position zwischen dem Reichtum von $china$, $india$ und $europe$ verleiht uns großen Einfluss in der Diplomatie mit Großreichen und anderen Mächten …"
 #Dai Viet
 cha_matrilineal_heritage: "Matrilinearität"
 cha_matrilineal_heritage_desc: "Die Stellung der Frau wird in unserer Gesellschaft im Vergleich zu unseren Nachbarn höher geschätzt und verehrt. Ein jedes Kind wird von einer Mutter geboren, und Frauen genießen daher eine Vielzahl von Freiheiten."
 cha_religious_tolerance: "Religiöse Toleranz"
 cha_religious_tolerance_desc: "Unser Volk ist ein Schmelztiegel verschiedener religiöser Einflüsse. Die buddhistischen Ideen aus $china$, die hinduistischen Praktiken aus $india$ und der muslimische Glaube, der sich immer weiter in $south_east_asia$ verbreitet, haben eine einzigartige Umgebung erschaffen, in der allein die religiöse Toleranz die Gesellschaft zusammenhalten kann."
 cha_dharmic_presence: "$dharmic_ADJ$e Götter"
 cha_dharmic_presence_desc: "Die dharmischen Götter segnen uns mit ihrer Anwesenheit. Möge uns ihre Stärke selbst in den schwierigsten Zeiten leiten."
 cha_kshatriya: "Kshatriya"
 cha_kshatriya_desc: "Der Begriff „$cha_kshatriya$“ stammt auf dem $hindu$ und beschreibt die Mitglieder des Adelsstandes in unserem Staat. Unser Adel spielt dabei eine ähnliche Rolle bei militärischen und höfischen Angelegenheiten wie seine Gegenstücke in $india$."
 cha_veteran_shipbuilders: "Erfahrene Schiffbauer"
 cha_veteran_shipbuilders_desc: "Unser Staat ist auf eine Marinedominanz angewiesen, um unsere starke politische, militärische und wirtschaftliche Position in $indochina_region$ aufrechtzuerhalten. Schnell Schiffe bauen zu können, ist daher für unser Überleben umso wichtiger."
 cha_haluwbilau: "Haluwbilau"
 cha_haluwbilau_desc: "Die $cha_haluwbilau$ sind Elitekrieger, die oft als Offiziere Schlüsselpositionen in unserem Militär sowohl zu Land als auch zu Wasser besetzen. Sie werden anhand ihrer Fähigkeiten und Tapferkeit ausgewählt und führen Armeen und Schiffe gegen die Feinde unseres Staates in die Schlacht. Sie schlichten zudem Streitigkeiten in unseren vielen Gemeinden."
 cha_commercial_state: "Handelsstaat"
 cha_commercial_state_desc: "Ein Großteil unseres Reichtums beruht auf den Handelsmöglichkeiten, die uns unsere Territorien verschaffen. Wir sollten unsere Bemühungen darauf ausrichten, den Handel noch weiter auszudehnen, um einen echten Handelsstaat aufzubauen."
 cha_boarding_tactics: "Entertaktik"
 cha_boarding_tactics_desc: "Aufgrund des schwierigen Terrains unseres Landes sind Invasoren oft auf eine überlegene Marine angewiesen, wenn sie uns erobern wollen. Die bereits seit Jahrzehnten andauernde Piraterie auf den Meeren Indochinas hat uns gelehrt, wie man Entertaktikten effizient einsetzt, um die eigenen Schiffe der Eindringlinge gegen sie zu verwenden."
 cha_towers_on_water: "Türme auf dem Wasser"
 cha_towers_on_water_desc: "Als Seemacht entspringt ein Großteil unseres Reichtums und unserer Macht dem Meer und unserer Kontrolle darüber. Um diese Kontrolle aufrechtzuerhalten, haben unsere Schiffbauer riesige Kriegsschiffe entworfen, die auch als #italic Türme auf dem Wasser#! bekannt geworden und eine Mischung aus Großschiff und Galeere sind."
 cha_cham_cultural_influence: "$cham_culture$er Kultureinfluss"
 cha_cham_cultural_influence_desc: "Obwohl einige unserer Nachbarn unsere Kultur als minderwertig ansehen, leugnen sie damit nur, dass viele Aspekte unserer Kultur auch Einzug in ihre – wie sie es ausdrücken – „zivilisierten“ Höfe gefunden haben. Champaische Trommelrhythmen, champaische Lieder, champaische Tänze und die champaische Poesie – all diese kulturellen Errungenschaften üben unweigerlich Einfluss auf unsere Nachbarn aus."
 dai_vietnamese_architecture: "$vietnamese_culture$e Architektur"
 dai_vietnamese_architecture_desc: "Unsere Architektur weist zwar starke chinesische Einflüsse auf, hat allerdings auch unverwechselbare und einzigartige Merkmale beibehalten. Wir folgen zwar nach wie vor dem Konzept des Fēng Shuǐ, lassen jedoch viele Elemente, die die chinesische Architektur ausmachen, weg oder passen sie an unsere einzigartige Umgebung an."
 dai_tran_hung_dao: "Trần Hưng Đạo"
 dai_hung_dao_trans_military_feats: "Taktiken von $dai_tran_hung_dao$"
 dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ – ein Prinz aus $DAI$ – diente vor vielen Jahrzehnten als Offizier während der ersten mongolischen Invasion von $DAI$ im Jahr 1258. Im zweiten Krieg gegen die Mongolen im Jahr 1285 und im dritten Krieg im Jahr 1287 wurde er in den Rang eines Befehlshabers erhoben. Während dieser blutigen Konflikte entwickelte $dai_tran_hung_dao$ zahlreiche Taktiken, um dem mongolischen Kavallerieansturm standzuhalten."
 dai_nha_nhac: "Nhã nhạc"
 dai_nha_nhac_desc: "$dai_nha_nhac$ ist jene traditionelle Musik, die man an unserem Hof und bei den jährlichen Zeremonien spielt. Sie ist ein wichtiger Aspekt unserer Kultur und ein Eckpfeiler unserer Tradition."
 dai_confucian_administration: "Konfuzianische Verwaltung"
 dai_confucian_administration_desc: "Die Verwaltung unseres Staates ist von großer Wichtigkeit, und daher werden auch nur die fähigsten Verwalter ausgewählt, um diese Ämter zu übernehmen. Unsere Bürokraten haben die konfuzianischen Schriften aus $CHI$ studiert und stellen sicher, dass unser Staatsapparat wie ein Uhrwerk funktioniert."
 dai_giao_chi_arquebus: "Giao–Chỉ-Arkebuse"
 dai_giao_chi_arquebus_desc: "Die $dai_giao_chi_arquebus$ gehört zur Hauptbewaffnung unseres Militärs. Diese Art von Arkebuse wird in unserem Land hergestellt und eigens an die Bedürfnisse unserer Truppen angepasst, wobei nicht nur chinesische, sondern auch westliche Beobachter sie loben."
 dai_ca_tru: "Ca trù"
 dai_ca_tru_desc: "Das $dai_ca_tru$ ist eine vietnamesische Musikform, in der man Erzählungen singt. Sie dient der Unterhaltung, wird aber auch bei religiösen Riten vorgetragen."
 dai_trade_advance: "Handelsverträge"
 dai_trade_advance_desc: "Unsere Geschichte wird schon viel zu lange von $CHI$ diktiert. Wenn wir jemals unsere eigenen Spuren hinterlassen wollen, müssen wir unsere Reichweite über die chinesische Interessensphäre hinaus ausweiten."
 dai_literary_reform: "Schriftreform"
 dai_literary_reform_desc: "Viele Jahrhunderte lang verfassten wir unsere Texte in Klassischem Chinesisch. Die Schrift, die man für unsere Sprache eigentlich nutzt, ist jedoch das Chữ Nôm, das auf dem chinesischen Chữ Hán fußt. Da das Chữ Nôm nicht einheitlich und weniger gebräuchlich als das Chinesische ist, wurde vorgeschlagen, die Schriftsprache für Verwaltungszwecke auf Staatsebene zu reformieren."
 dai_don_dien: "Đôn Điên"
 dai_don_dien_desc: "Das Đôn Điên ist ein System von Militärkolonien, bei dem Soldaten und landlose Bauern eine bestimmte Region roden und bewohnbar machen, um dort später Siedlungen zu gründen. Besagte Siedlungen werden nach drei Jahren in unser Verwaltungssystem eingegliedert, woraufhin die Soldaten und landlosen Bauern auf das neu gewonnene Land ziehen."
 dai_thuan_thien: "Thuận Thiên"
 dai_thuan_thien_desc: "$dai_thuan_thien$, der „Wille des Himmels“, ist der Name jenes legendären Schwertes, das von unserem Befreier Lê Lợi in der Schlacht getragen wurde. Der Sage nach verlieh ihm das Zauberschwert die Kraft von tausend Kriegern, damit er endlich das Joch der chinesischen Herrschaft abstreifen konnte. Lê Lợi wird als die perfekte Verkörperung des idealen Anführers angesehen."
 #Majapahit
 foreign_architectural_influence: "Fremde architektonische Einflüsse"
 foreign_architectural_influence_desc: "Bei unseren vielen Eroberungen in $indonesia_region$ sind wir häufig mit verschiedensten architektonischen Stilen in Berührung gekommen und haben Wege gefunden, sie zu nutzen, um unser eigenes Erbe auszubauen. Indem wir neue kulturelle und künstlerische Strömungen in die Stadtentwicklung einbringen, sorgen wir dafür, dass unsere Kultur nur die besten künstlerischen Aspekte der Region übernimmt."
 maj_home_of_the_sea_nomads: "Heimat der Seenomaden"
 maj_home_of_the_sea_nomads_desc: "$n_kabang_desc$"
 maj_jong_advance: "$n_jong$"
 maj_jong_advance_desc: "$n_jong_desc$"
 maj_bajang_ratu: "Das Tor $bajang_ratu$"
 maj_bajang_ratu_desc: "$bajang_ratu_desc$"
 maj_late_karambit_warriors: "$a_late_karambit_warrior$"
 maj_late_karambit_warriors_desc: "$a_late_karambit_warrior_desc$"
 maj_sumpah_palapa: "Sumpah Palapa"
 maj_sumpah_palapa_desc: "Unser militärischer Anführer und die Person, die unserem Herrscher unmittelbar unterstellt ist, besitzt großen Einfluss und Macht und prägt die Geschichte unseres Volkes. Damit diese Person stets effizient handeln kann und sich der Bedeutung ihrer Position bewusst ist, wird ein besonderer Eid verlangt, der unseren Wunsch nach Eroberungen unterstreicht und uns Mut schenkt."
 maj_bubu_and_jala: "Bubu & Jala"
 maj_bubu_and_jala_desc: "$bubu_building_desc$"
 maj_the_magic_arrow: "Magischer Pfeil"
 maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"
 maj_maritime_silk_road: "Maritime Seidenstraße"
 maj_maritime_silk_road_desc: "Unsere geografische Lage zusammen mit unserem wachsenden Einfluss haben es uns erlaubt, jenes weitläufige und gewinnbringende Handelsnetz zu kontrollieren, von dem aus $silk$ und Gewürze von Ost nach West gebracht werden."
 maj_restore_candi_shrines: "Wiederaufbau der Candi-Schreine"
 maj_restore_candi_shrines_desc: "Über ganz Nusantara hinweg verstreut gibt es eine Reihe von Tempeln, die als Candi bekannt sind. Wir müssen dafür sorgen, dass diese Tempel nicht verfallen und sie instand halten, um den Glauben unseres Volkes wiederzubeleben."
 maj_the_ghali: "$n_madurese_gali$"
 maj_the_ghali_desc: "$n_madurese_gali_desc$"
 maj_island_colonies: "Inselkolonien"
 maj_island_colonies_desc: "Unser Kontakt zu unseren zahlreichen Nachbarn auf dem Archipel führte uns vor Augen, wie wichtig es ist, die Rohstoffe und das freie Land für uns zu beanspruchen. Unter unserer Kontrolle wird es sicher und wohlhabend sein."
 maj_preservation_of_javanese_history: "Bewahrung der javanesischen Geschichte"
 maj_preservation_of_javanese_history_desc: "Die Geschichte des javanesischen Volkes ist ein wesentlicher Bestandteil unserer kulturellen Identität. Zum Schutz dieser Identität müssen wir jene Traditionen bewahren, auf denen wir das Fundament eines großen Landes errichteten."
 #Japan
 heian_kyo: "Heian-kyō"
 heian_kyo_desc: "Die Stadt Heian-kyō ist seit Jahrhunderten die Residenz des Kaisers und ein Zentrum für Kunst und Kultur. Sie ist auch jener Ort, an dem der prunkvolle Hof zur Zeit der $fujiwara$ erblühte, und eine Inspiration für alle Menschen Japans. Wir müssen an diese Tradition anknüpfen und die Kultur in unserem Hauptsitz wieder zum Blühen bringen."
 matsuri: "Matsuri"
 matsuri_desc: "Jeder örtliche Schrein und Tempel hält eigene Feste und Feierlichkeiten ab und die umliegende Bevölkerung nimmt gern an diesen Teil. Es ist eine Gelegenheit für sie, jenen Kami ihre Ehrerbietung und Dankbarkeit entgegenzubringen, die sie vor Ort behüten."
 onmyodo: "Onmyōdō"
 onmyodo_desc: "Die Theorien von Yin und Yáng, die vor Jahrhunderten aus $china$ in unser Land kamen, haben sich in $japan_region$ zum „$onmyodo$“ entwickelt. Jene, die diese Konzepte besonders eingehend studiert haben, nennt man Onmyōji. Onmyōji sind für die Läuterung und die Austreibung böser und rachsüchtiger Geister zuständig und befassen sich mit Wahrsagung, Astronomie und dem Studium der Natur."
 sumo: "Sumō"
 sumo_desc: "Das $sumo$ war ursprünglich ein ritueller landwirtschaftlicher Tanz, mit dem man für gute Ernten betete. Mit der Zeit hat es sich jedoch immer mehr vom Hof und den Priestern gelöst und ist heute zu einer beliebten Sportart geworden, die sowohl vom gemeinen Volk praktiziert wird als auch als eine Art militärische Kampfausbildung dient."
 nanto_rokushuu: "Nanto Rokushū"
 nanto_rokushuu_desc: "Die Tempel von $nara$ genießen, seit der $buddhist$ aus $china$ in unserem Land Fuß fasste, großen Einfluss. Die sechs Schulen, die sich mit dieser Lehre befassen, bündeln das Wissen über die Lehren des Buddha und die verschiedenen Wege zur Erleuchtung, beschreiben aber auch andere, eher weltliche Themen wie die richtige Verwaltung eines Klosters."
 shinbutsu_shuugou: "Shinbutsu-Shūgō"
 shinbutsu_shuugou_desc: "Seit der $buddhist$ in $japan_region$ Einzug fand, haben sich seine Lehren mit der Anbetung der örtlichen Kami vermischt und sind zu einem einheitlichen Glaubenssatz verschmolzen, wenn auch mit deutlich unterschiedlichen rituellen Zeremonien."
 honji_suijaku: "Honji Suijaku"
 honji_suijaku_desc: "Eines der Schlüsselmerkmale des $shinbutsu_shuugou$ liegt darin, örtliche Kami als Manifestation verschiedener Buddhas zu identifizieren und die Buddhas als Manifestationen der verschiedenen Kami. Am Ende sind beide ein und dasselbe. Sie stellen die Kernform oder #italic Honji#! dar, die verschiedene Manifestationen annimmt, welche man auch #italic Suijaku#! nennt."
 hachiman_worship: "Anbetung von Hachiman"
 hachiman_worship_desc: "Hachiman ist eine der am meisten verehrten Gottheiten. Er wurde ursprünglich als Deifikation von Ōjin Tennō betrachtet und nach Einführung des $buddhist$ als Boddhisattwa. Er ist der Beschützer der kaiserlichen Blutlinie und der Schutzgott der Kriegerklasse."
 gozan_jissetsu: "Gozan Jissetsu"
 gozan_jissetsu_desc: "Das System der „Fünf Berge“ kam ursprünglich aus $china$ und beschrieb vom Staat finanzierte zen-buddhistische Klöster, die am Gipfel der heiligen Berge gelegen waren. $japan_region$ übernahm diese Praktik während der Kamakura-Zeit, indem es die Zen-Tempel, die fünf Berge von $kyoto$ und die fünf Berge von $kamakura$, finanzierte. Die Finanzierung solcher Institutionen stellt sicher, dass unsere Herrschaft Stabilität genießt."
 bodaiji: "Bodaiji"
 bodaiji_desc: "In unserem Land ist es üblich, seine Vorfahren zu verehren. Die einflussreichsten Herrscher errichten aus diesem Grund ganze Tempel, damit man sie dort nach ihrem Tod begraben und anbeten kann. So wird auch die Erinnerung an ihr Leben und ihre Taten bewahrt und niemals vergessen."
 kagura: "Kagura"
 kagura_desc: "Die Kagura waren ursprünglich Ritualtänze, die von den #italic Miko#!, den Schreinmaiden, am Hof vorgeführt wurden. Später dienten die $kagura$ auch als Inspiration für zahlreiche andere Ritualtänze in ganz $japan_region$. Diese Tänze haben im Lauf der Zeit eine Vielzahl verschiedener Formen angenommen, doch sie alle folgen noch immer den traditionellen Ritualen."
 obon: "Obon"
 obon_desc: "Am $obon$, einem unserer wichtigsten Feste, ehren wir unsere Toten und unsere Ahnen. Während der Feier werden Speisen als Opfergaben dargebracht und rituelle Tänze aufgeführt. Die Menschen zünden Feuer und Laternen an, um die Seelen der Verstorbenen für die Feierlichkeiten in ihr Haus und anschließend wieder zurück in das Land der Toten zu geleiten."
 neo_confucianism: "Neo-$SECT_CONFUCIANISM_NAME$"
 neo_confucianism_desc: "Den Neo-$SECT_CONFUCIANISM_NAME$, eine spätere Entwicklung des $SECT_CONFUCIANISM_NAME$ in seiner Jahrtausende währenden Geschichte, gibt es auch schon seit Jahrhunderten in $japan_region$. Die fortwährende Unterstützung durch den Staat stellt sicher, dass unsere Regierung das Land stets fest im Griff hat."
 danka_system: "Danka-System"
 danka_system_desc: "Seit Jahrhunderten unterstützen die Haushalte in $japan_region$ ihre örtlichen buddhistischen Tempel finanziell und erhalten im Gegenzug spirituelle Unterstützung. Dieses System auf die gesamte Bevölkerung auszuweiten, sorgt dafür, dass der Glaube unseres Volkes niemals ins Wanken gerät."
 harae: "Harae"
 harae_desc: "In unserem Glauben ist die Praktik des #italic $harae$#!, der rituellen Reinigung, einer der wichtigsten Riten und hilft dabei, alle #italic Tsumi#! oder Sünden und #italic Kegare#! – Unreinheiten – zu beseitigen. Sicherzustellen, dass unsere Bevölkerung das Ritual des $harae$ den Bräuchen entsprechend und regelmäßig praktiziert, sorgt dafür, dass unser Land rein bleibt."
 jisha_bugyou: "Jisha-bugyō"
 jisha_bugyou_desc: "Die $jisha_bugyou$ sind die Verwalter und Aufseher aller Tempel und Schreine. Sie überwachen sämtliche Betätigungen dieser religiösen Institutionen und stellen sicher, dass ihre Interessen mit denen der Regierung übereinstimmen."
 kokugaku: "Kokugaku"
 kokugaku_desc: "Seit der Gründung von $japan_region$ und dem $shinto$ wurden sowohl das Land als auch die Religion oft von fremdländischen Ideen geprägt, die überwiegend aus $china$ und dem $buddhist$ stammten. Infolgedessen ist eine neue Bewegung entstanden, die behauptet, unser eigener Nationalgeist sei von Natur aus rein und alle fremden Einflüsse wären abzulehnen."
 home_shrines: "Hausaltäre"
 home_shrines_desc: "Die Verehrung ihrer Toten und Ahnen sowie die zugehörigen Rituale fanden traditionell in Schreinen und Tempeln statt. Doch immer mehr Menschen beginnen, sowohl eigene Familienschreine – die #italic Kamidana#! – zur Verehrung der Kami als auch #italic Butsudan#!, buddhistische Altäre zur Verehrung der Ahnen, aufzustellen."
 fukko_shinto: "Fukko Shintō"
 fukko_shinto_desc: "Unsere Kultur neigt immer mehr dazu, fremdländische Einflüsse abzulehnen und damit auch die Vermischung des $buddhist$ und $SECT_CONFUCIANISM_NAME$ mit unserem Glauben. Dieser Denkrichtung zufolge ist eine Neubelebung des $shinto$ unumgänglich."
 jap_bushido: "Bushidō"
 jap_bushido_desc: "Auch wenn sie nie wirklich durch feste Regeln kodifiziert wurden, sind die Verhaltensanweisungen für einen Krieger dennoch klar: Ein Krieger hat die Pflicht, Schlachten zu schlagen und zu gewinnen sowie den Ruhm des eigenen Clans zu mehren, ungeachtet der Mittel, die er dazu heranzieht."
 jap_land_of_the_rising_sun: "Land der Aufgehenden Sonne"
 jap_land_of_the_rising_sun_desc: "Japan hat als Land eine lange und ruhmreiche Geschichte. Unsere einzigartige Kulturtradition, unsere tapferen Soldaten und unsere Eroberungen ungemein erschwerende Geografie macht uns stärker als jeden anderen Staat in unserer Region. Die Zeit ist gekommen, dass das Land der Aufgehenden Sonne seinen Platz unter den großen Nationen der Welt einnimmt."
 jap_ancestral_legacy: "Vermächtnis der Ahnen"
 jap_ancestral_legacy_desc: "Die Ahnenreihe unseres Clans ist wohlbekannt und eine Stütze, die wir erhalten und bewahren müssen. Unsere Vergangenheit macht uns aus und sichert uns unser Recht auf die Herrschaft."
 jap_shinobi: "Shinobi no Mono"
 jap_shinobi_desc: "Wissen ist entscheidend, um einen Vorteil zu erlangen. Zu diesem Zweck setzen wir schon lange Spione und Unterwanderer ein, die Informationen für uns sammeln. Diese $jap_shinobi$ stammen meist aus dem Samurai-Stand, auch wenn man sie bisweilen aus der örtlichen Bevölkerung anwirbt: Sie werden in Feindesland geschickt, um sich dort unter die Bevölkerung zu mischen und ein Informationsnetz aufzubauen, das wir im Anschluss nutzen können."
 jap_head_hunting: "Kopfjagd"
 jap_head_hunting_desc: "Die Leistungen eines Kriegers in der Schlacht können nur wirklich glorreich sein, wenn sie sich auch beweisen lassen. Daher sammeln Samurai die Köpfe der Feinde, die sie niedergestreckt haben, um sie später ihren Generälen zu präsentieren. Je zahlreicher und wichtiger die von einem Samurai genommenen Köpfe sind, desto größer wird die Belohnung sein, die er erhält."
 jap_ichiban_yari: "Ichiban Yari"
 jap_ichiban_yari_desc: "Der erste Krieger zu sein, der dem Gegner Schaden zufügt, ist eine große Ehre, und daher sind unsere Krieger alle bereit, der erste Speer sein, der in den Truppen der Feinde einschlägt, sobald sich die Gelegenheit ergibt."
 jap_ashigaru: "Ashigaru"
 jap_ashigaru_desc: "Die Kriegsführung ist seit jeher das Betätigungsfeld der mächtigen Samurai. Jüngste Entwicklungen haben allerdings bewiesen, dass es eine beträchtlich größere Quelle für Truppen gibt als die Samurai: das Ausheben von Bauerntruppen. Diese Ashigaru werden jedoch kein gemeiner Pöbel sein. Eine ständige Ausbildung und ihre mehr als ausreichende Schlachtfelderfahrung machen sie zu gefürchteten Kämpfern auf Augenhöhe mit den Samurai."
 jap_daiku_construction: "Daiku-Bau"
 jap_daiku_construction_desc: "Den Bau von Gebäuden mit traditionellen Zimmermannstechniken – auch als #italic Daiku#! bekannt – gibt es in $japan_region$ schon seit der Entstehung dieser Nation. Unsere Holzgebäude sind widerstandsfähig und doch flexibel und werden von allen bewundert. Angefangen bei niederen Hütten bis hin zu den erhabensten Palästen findet man Holz in all unseren Gebäuden."
 jap_wandering_ronin: "Wandernde Rōnin"
 jap_wandering_ronin_desc: "Es ist sehr verbreitet, dass Samurai durch das Land ziehen und sich dabei die besten Posten suchen und sogar jenem Fürsten die Treue schwören, der sie am besten bezahlt. Diese Mannen kommen und gehen wie die Wellen, doch wir können immer mehr von ihnen brauchen."
 jap_reformed_land_holding: "Reformierter Landbesitz"
 jap_reformed_land_holding_desc: "Traditionell wurde das Land nur nach seiner Größe beurteilt, doch dabei fiel unter den Tisch, dass nicht jedes Land gleich beschaffen ist. Von nun an soll es nach dem Wert des Reises beurteilt werden, der sich auf ihm anbauen lässt. So wird es viel einfacher, unser Territorium bestmöglich zu nutzen."
 jap_jokamachi: "Jōkamachi"
 jap_jokamachi_desc: "Stürmische Zeiten stellen eine große Bedrohung für die Bevölkerung dar. Deshalb sammeln sich die Menschen in der Sicherheit befestigter Orte. Das Wachstum von Städten um befestigte Burgen herum wird zweifelsohne Handel und Wohlstand anziehen."
 jap_terakoya: "Terakoya"
 jap_terakoya_desc: "Diese Privatschulen bieten dem einfachen Volk eine Grundbildung, indem sie die Menschen das Lesen, Schreiben und Rechnen sowie moralische Werte lehren. Sie spielen auch eine wichtige Rolle, um eine gebildete und sozial bewusste Bevölkerung hervorzubringen, und tragen zur Stabilität und zum Fortschritt dieser Ära bei."
 jap_codified_bushido: "Kodifizierter Bushidō"
 jap_codified_bushido_desc: "Das von einem Krieger erwartete Verhalten wird immer mehr vergöttert, wobei Werte wie Ehre und Treue wichtiger werden als ihre tatsächliche Nützlichkeit in einer echten Schlacht. Diese romantisierte und kodifizierte Fassung des Bushidō wird jedoch sicher die Wahrnehmung unserer Armeen verbessern, selbst wenn sie sich nicht wirklich entsprechend verhalten."
 #Japanese unique
 kgk_omi_genji: "Ōmi Genji"
 kgk_omi_genji_desc: "Unsere Ahnen gehörten einst zum Uda-Genji-Clan der Minamoto-Familie, und wir sind seit Generationen die Shugo von Ōmi. Unser Recht, es zu verteidigen, ist gesichert."
 kgk_emerging_clan: "Aufstrebender Clan"
 kgk_emerging_clan_desc: "Trotz des Vermächtnisses unserer Ahnen ist die Abspaltung unseres Clans von den Sasaki noch recht frisch. Daher verspürt unser Volk das Bedürfnis, unseren Wert als unabhängigen Namen zu beweisen."
 akt_march_of_akita: "Marsch von Akita"
 akt_march_of_akita_desc: "Unser Lehen Akita in der nördlichen Dewa-Provinz war eine uralte Region Japans, in der es immer wieder Konflikte mit den nördlichen „Barbaren“ gab. Die Grenze Japans hat sich seitdem weit in den Norden ausgedehnt, doch der Geist unserer Ahnen lebt in unserem Blut weiter."
 akt_ezo_kanrei: "Ezo Kanrei"
 akt_ezo_kanrei_desc: "Das Amt des Ezo Kanrei („Verwalter von $ezo_area$“) wird unserem Clan schon seit dem Kamakura-Shogunat übertragen. Wir sind für die Verwaltung der Insel als Exil für Verbrecher zuständig und pflegen daher gut geknüpfte Bande über die Meerenge hinweg."
 akt_ainu_trade: "Ainu-Handel"
 akt_ainu_trade_desc: "Wir gehören zu den ersten Japanern, die einen dauerhaften Handel mit den Ainu aufbauten. Unsere Schiffe verkehren zwischen ihren Landen und unseren, was von großem Vorteil für beide Seiten ist."
 asa_legacy_of_emperor_keitai: "Vermächtnis von Kaiser Keitai"
 asa_legacy_of_emperor_keitai_desc: "Vor vielen Jahrhunderten nutzte Kaiser Keitai die Provinz Echizen, um seinen Krieg um den Kaiserthron zu beginnen. Wie er dürfen wir nicht zögern, unsere Macht über unsere Grenzen hinaus zu projizieren und in benachbarte Reiche einzudringen, wenn die Lage es verlangt."
 asa_control_of_buddhist_sects: "Kontrolle über buddhistische Sekten"
 asa_control_of_buddhist_sects_desc: "Echizen ist die Heimat vieler wichtiger Tempel unterschiedlicher Sekten wie dem Eiheiji der Sōtō-Sekte und dem Heisenji der Tendai-Sekte. Wenn wir sie alle kontrollieren und für einen Glaubensfrieden in der Provinz sorgen könnten, hätten wir die Grundlage einer idealen Politlinie in Sachen Religion für unser gesamtes Territorium."
 ask_defender_of_the_imperial_court: "Verteidiger des kaiserlichen Hofs"
 ask_defender_of_the_imperial_court_desc: "Als das Kamakura-Shogunat fiel, sorgten wir für die Sicherheit des Kaisers und des kaiserlichen Hofs. Dies verschaffte uns einen Platz an vorderster Stelle sämtlicher Clans in Japan – als wahre Beschützer des Kaiserreiches und der höfischen Traditionen."
 ask_bugyoshu_and_hokushu: "Bugyōshū und Hōkōshū"
 ask_bugyoshu_and_hokushu_desc: "Wir müssen die Beamten unserer Verwaltung – darunter die Bugyōshū-Magistrate und Hōkōshū-Befehlshaber – stärken. Eine starke Bürokratie ist manchmal das Einzige, was zwischen uns und einem offenen Bürgerkrieg steht."
 ask_higashiyama_culture: "Higashiyama-Kultur"
 ask_higashiyama_culture_desc: "Auf Grundlage der Askese des Zen-Buddhismus sieht die Higashiyama-Kultur die Schönheit vor allem im Schlichten. Sie fördert die Entwicklung der Teezeremonie und des Blumensteckens sowie von Theater und Kunst. Dieses Aufblühen der Kultur hat jenen großes Prestige eingebracht, die sich entsprechend betätigen, und dies wird Großes für uns leisten."
 ask_shugo_system: "Shugo-System"
 ask_shugo_system_desc: "Shugo sind wichtige Vasallen des Shogunats, die Land im Namen des $JAPANESE_SHOGUNATE_LEADER_MALE$ verwalten. Dank ihnen können wir unsere Lande besser und effizienter verwalten."
 cba_lineage_of_taira: "Taira-Abstammung"
 cba_lineage_of_taira_desc: "Der Chiba-Clan ist eine alte Abspaltung der Taira der späten Heian-Periode. Dieser Umstand räumt uns mehr Macht und Einfluss ein, als es unsere politische Lage uns sonst zugestünde."
 cba_katori_jingu: "$katori_shrine$"
 cba_katori_jingu_desc: "Am $katori_shrine$ ehrt man Futsunushi no Kami, einen Schutzgott der Kampfkunst, den alle Krieger Japans verehren. Wir sollten diesen Umstand ausnutzen, um unsere eigenen Samurai zu verbessern."
 cba_dream_of_masakado: "Traum des Masakado"
 cba_dream_of_masakado_desc: "Taira no Masakado, ein großer Krieger und enger Verwandter unseres Clans in uralter Zeit, versuchte einst, Kaiser des östlichen Japans zu werden. Sein Streben konnte Masakado leider nicht verwirklichen, doch sein Traum von der Schaffung eines neuen Landes für die Samurai sollte uns stets führen."
 cba_irrigation_of_southern_kanto: "Bewässerung des südlichen Kantō"
 cba_irrigation_of_southern_kanto_desc: "Große Teile unserer Domänen sind sumpfiges Gebiet, das keine intensive Landwirtschaft erlaubt. Neuere technische Entwicklungen im Bereich der Bewässerung erlauben es uns aber, neue Felder einzurichten und Sümpfe bei Bedarf trockenzulegen. Machen wir uns also ein großes Vorhaben, um die Lande unter unserer Kontrolle zum Wohl der Wirtschaft zu verbessern."
 csk_clans_of_tosa: "Clans von Tosa"
 csk_clans_of_tosa_desc: "Unsere Heimatprovinz Tosa ist traditionell unter mehreren mächtigen Clans aufgeteilt. Wollen wir uns weiter ausdehnen, müssen wir uns alle zusammentun. Die anderen werden uns bei unserem Aufstieg helfen, und im Gegenzug mehren wir ihre Macht."
 csk_god_of_arts: "Gott der Kunst"
 csk_god_of_arts_desc: "Der Stammvater unseres Clans Hata no Kawakatsu wird als Schutzgott aller Künste bewundert – angefangen bei traditionellen Tänzen bis hin zum Theater. Unser Clan muss diesem Vermächtnis gerecht werden, um sich den Respekt des japanischen Volks zu verdienen."
 csk_unification_of_shikoku: "Vereinigung von Shikoku"
 csk_unification_of_shikoku_desc: "Shikoku wird vom Rest Japans als armes, abgeschottetes Land gesehen, wo nichts von Bedeutung geschieht. Sollen sie dies nur weiter denken und die Vereinigung der Insel übersehen – bis es dann zu spät ist."
 csk_expand_the_navy: "Erweiterung der Marine"
 csk_expand_the_navy_desc: "Japan ist eine Inselnation und braucht eine starke Marine, um zu florieren. Tosa ist ein idealer Ort, um mit dem Bau einer eigenen Armada zu beginnen."
 dte_fujiwara_hokke: "$fujiwara$ Hokke"
 dte_fujiwara_hokke_desc: "Als einer der Zweige des nördlichen Hauses von $fujiwara$ ist die Legitimität unserer Herrschaft unbestreitbar."
 dte_oshu_shugo: "Ōshū Shugo"
 dte_oshu_shugo_desc: "Als ehrbarer Clan, der noch aus der frühen Kamakura-Periode stammt, haben wir einen starken Anspruch auf die Herrschaft über die ganze Ōshū-Provinz. Zum Glück für uns ist nicht genau festgelegt, welches Gebiet Ōshū eigentlich abdeckt."
 dte_dragon_of_oshu: "Drache von Ōshū"
 dte_dragon_of_oshu_desc: "Unsere Macht und Stärke werden unsere Feinde neidisch machen. Unser Name wird für immer mit dem Drachen von Ōshū in Verbindung gebracht werden."
 dte_intensive_domain_development: "Intensive Domänenentwicklung"
 dte_intensive_domain_development_desc: "Schlechtes Wetter und gebirgiges Gelände machen $ou_area$ in den Augen vieler zu einer armen Region. Es gibt allerdings ein großes Potenzial, unsere Lande zu verbessern. Wenn wir neue Städte gründen, den Handel ermutigen und schützen, Wasserwege bauen und das bestellte Land ausdehnen, werten wir unser Herzland merklich auf. Wenn wir erstickende Zölle und Steuern abschaffen, machen wir unsere Untertanen reicher und die ganze Region wohlhabender."
 htk_hatakeyama_heritage: "Hatakeyama-Erbe"
 htk_hatakeyama_heritage_desc: "Manche betrachten unsere Clanführer aufgrund der Vorgeschichte unseres Clannamens als rebellische Unruhestifter. Dies ist allerdings nur ein Zeichen unserer Unverwüstlichkeit. Wir wurden neu geboren und werden niemals aufgeben! Wir werden für das kämpfen, was uns gehört, ganz gleich, wer sich uns entgegenstellt!"
 htk_shogunate_ties: "Shogunatsbande"
 htk_shogunate_ties_desc: "Als ein Clan, der von einem der Zweige der Ashikaga abstammt, sind unsere Bande zur Autorität des Shogunats stark. Unsere Verbindung mit ihm wird stets dafür sorgen, dass wir hohes Ansehen genießen."
 htk_clan_spread: "Verstreuter Clan"
 htk_clan_spread_desc: "Wir sind nicht damit zufrieden, unseren Clan auf einen Ort zu beschränken, und versuchen, unseren Einfluss über das ganze Land zu verstreuen. Ganz gleich, wie sehr wir uns ausbreiten: Die Autorität unseres Clans wird in unserem Territorium unantastbar sein."
 hsk_rising_clan: "Aufstrebender Clan"
 hsk_rising_clan_desc: "Obschon wir von bescheidener Herkunft sein mögen (selbst im Vergleich zu anderen Clans, die von den Ashikaga abstammen), ist es uns dennoch gelungen, beträchtlichen Einfluss anzusammeln. Unser Clan ist wahrlich auf dem aufsteigenden Ast – und er wird dies auch weiter sein."
 hsk_control_of_izumi_sea: "Kontrolle über das Izumi-Meer"
 hsk_control_of_izumi_sea_desc: "Die Territorien unseres Clans liegen traditionell am Kii-Kanal. Durch die Kontrolle des Handels, der von der Hauptinsel hier hindurchfließt, erzielen wir hohe Gewinne und blühen ungeheuer auf."
 hsk_branches_and_retainers: "Äste und Gefolgsleute"
 hsk_branches_and_retainers_desc: "Unsere Blutlinie ist weit verbreitet: Unsere Verwandten und Gefolgsleute besitzen viele reiche Territorien und wahren zugleich die Treue zum Clanführer. Durch innere Harmonie wird unser Clan zum mächtigsten in Japan aufsteigen."
 img_claim_to_shogunate: "Shogunatsanspruch"
 img_claim_to_shogunate_desc: "Da unser Clan aus der Ashikaga-Familie stammt, haben wir einen guten Anspruch auf den Mantel des $JAPANESE_SHOGUNATE_LEADER_MALE$, falls die Hauptlinie vergehen sollte. Obwohl Bakufu bisher sicher zu sein scheint, müssen wir dennoch sicherstellen, dass niemand vergisst, was unser Geburtsrecht ist."
 img_supreme_ruler_of_tokaido: "Kontrolle über den Tōkaidō"
 img_supreme_ruler_of_tokaido_desc: "Der Tōkaidō ist die wichtigste Handelsroute zwischen Zentral- und Ostjapan. Unsere Lande liegen traditionell in seiner Mitte, was es uns erlaubt, die Kontrolle auszuüben, wodurch wir die Wirtschaft der ganzen Region steuern."
 img_unlikely_alliances: "Ungewöhnliche Bündnisse"
 img_unlikely_alliances_desc: "Manchmal besteht der beste Weg, einen Feind zu besiegen, darin, ihn zum Freund zu machen. Unsere Flanken durch Ehen zu sichern, bringt nicht nur unsere Feinde zur Ruhe und verschafft uns neue Verbündete, sondern stellt zudem sicher, dass wir letzten Endes auch durch das Blut über sie herrschen."
 img_march_to_kyoto: "Marsch nach $kyoto$"
 img_march_to_kyoto_desc: "In Zeiten, in denen Japan und $kyoto$ in politisches Chaos gestürzt sind, könnte man auf die Idee kommen, zum Hauptsitz zu marschieren und die Macht an sich zu reißen. Als enge Verwandtschaft der Ashikaga ist es unsere Verpflichtung – und unser Recht –, für die Stabilität des Landes zu sorgen."
 isk_sanindo_gate: "$sanindou_area$-Tor"
 isk_sanindo_gate_desc: "Die Provinz $tango_province$ ist das Tor nach $kyoto$ in $sanindou_area$ und ein Land von großer wirtschaftlicher Bedeutung. Wenn wir unsere Präsenz dort aufbauen, gereicht uns dieser Wohlstand zum Vorteil."
 isk_minister_of_samurai_dokoro: "Minister des Samurai-Dokoro"
 isk_minister_of_samurai_dokoro_desc: "Wir sind einer von vier mächtigen Clans, von denen man eines ihrer Mitglieder traditionell als Leiter des Militärs und der Polizei in Form des Samurai-Dokoro einsetzt. Es ist unsere Verantwortung und unser Privileg, den Frieden im Hauptsitz und anderen wichtigen Gebieten zu wahren."
 ito_gokenin_family: "Gokenin-Familie"
 ito_gokenin_family_desc: "Unsere Ahnen halfen Minamoto no Yoritomo während der Gründung des Kamakura-Shogunats. Als Belohnung für ihre Unterstützung erhielten sie den Rank seiner Gokenin und die $hyuuga_province$-Provinz als Lehen: eine Ehre, die nur sehr wenigen Familien in Kyūshū zuteilwurde."
 ito_sympathy_to_foreign_faiths: "Verständnis für neue Glauben"
 ito_sympathy_to_foreign_faiths_desc: "Fremdländer, die zu uns kommen, bringen fremdländische Glauben mit. Wir müssen natürlich sicherstellen, dass sie ungefährlich für unsere traditionellen Religionen sind. Doch solange sie uns nicht schaden, gibt es keinen Grund, den Leuten zu verbieten, ihren Glauben frei zu wählen."
 kkc_disinguished_family_in_kyushu: "Verdiente Familie"
 kkc_disinguished_family_in_kyushu_desc: "Im Gegensatz zu anderen Clans in Kyūshū siedelte unsere Familie hier schon vor der Einrichtung des Kamakura-Shogunats. Unsere Leistungen sind weithin bekannt und unser Name wird geachtet."
 kkc_resistance_against_foreign_intervention: "Widerstand gegen Invasionen"
 kkc_resistance_against_foreign_intervention_desc: "Unser Beitrag zur Verteidigung des Landes während der mongolischen Invasionen ist wohlbekannt. Die Leistungen von Kikuchi Takefusa bei der Abwehr der Invasoren werden gepriesen, und all unsere Truppen wollen so tapfer kämpfen wie er."
 ktb_southern_court: "Unterstützer des Kaisers"
 ktb_southern_court_desc: "Obwohl der kaiserliche Zweig politischen Einfluss verloren hat, sind wir nach dessen Teilung nach wie vor als tapfere Unterstützer des südlichen Hofs bekannt. Dieser Ruf des treuen Dienstes gegenüber dem Chrysanthemen-Thron selbst zeigt der Welt, dass unsere Entschlossenheit größer ist als die vieler der niederen Häuser, die Japan nun dominieren."
 ktb_control_of_ise: "Kontrolle von $ise_province$"
 ktb_control_of_ise_desc: "Vom reichen Süden bis zum dicht bevölkerten und städtischen Norden ist es uns gelungen, unsere Kontrolle über die ganze $ise_province$-Provinz. Dies erlaubt es uns, die Ressourcen der Provinz voll auszunutzen, um den Einfluss unseres Clans weiter wachsen zu lassen."
 ktb_blessing_of_amaterasu: "Segen der Amaterasu"
 ktb_blessing_of_amaterasu_desc: "Als Hüter der heiligsten Schreine $japan_region$s in $ise_province$ wurden wir von der Göttin der Sonne und des Universums gesegnet. Wir müssen uns der Aufgabe gewachsen zeigen, dieses Nationalheiligtum zu erhalten und zu pflegen, was uns den Respekt des japanischen Volks einbringen wird."
 ktb_the_march_of_kitabatake_akiee: "Marsch von Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc: "Unser ehrbarer Ahn Kitabatake Akiie bewies, dass der Marsch von $ou_area$ nach Zentraljapan in kürzester Zeit möglich ist, wenn man nur genügend Entschlossenheit an den Tag legt. Wir müssen aus dieser Tat lernen und unsere Armeen für schnelle Manöver ausbilden, damit man sie rasch von einer Front an die andere verlegen kann, wenn die Lage es erfordert."
 kno_shugo_of_iyo: "Shugo von $iyo_province$"
 kno_shugo_of_iyo_desc: "Seit der späten Heian-Periode im 12. Jahrhundert sind wir die größte Seemacht der Seto-Inlandsee, und durch unsere starke Marine konnten wir auch den Titel des Shugo dieser Provinz erlangen."
 kno_ruler_of_inland_sea: "Herrschaft über die Inlandsee"
 kno_ruler_of_inland_sea_desc: "Die Seto-Inlandsee hat eine besondere Bedeutung für die Handelsrouten Japans, und hier eine Marine-Vorherrschaft aufrechtzuerhalten, kann unseren Clan groß machen oder seinen Untergang bedeuten. Wir müssen sicherstellen, dass wir stets eine starke Marine haben, um den Seehandel zu kontrollieren."
 kno_murakami_suigun: "Murakami Suigun"
 kno_murakami_suigun_desc: "Der Murakami-Clan ist weithin als eine Bande von Piraten bekannt, die auf der Seto-Inlandsee ihr Unwesen treibt. Gliedern wir ihn ganz in unseren Clan ein und hetzen wir diese gefürchteten Freibeuter auf unsere Gegner!"
 mri_descendant_of_oe_hiromoto: "Nachfahren von Ōe no Hiromoto"
 mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, ein Gelehrter und Politiker, der viel zur Einrichtung des Kamakura-Shogunats beitrug, war der Stammvater unseres Clans. Bis zum heutigen Tag lebt sein Geist in unserem Clan weiter, und wir sind stolz darauf, eine effektive Verwaltung aufrechtzuerhalten."
 mri_munakata_three_goddesses: "Drei Göttinnen von Munakata"
 mri_munakata_three_goddesses_desc: "Die drei Töchter von Susanoo-no-Mikoto sind die Schutzgötter des Meeres und der Navigation. Ihr Segen wird unsere Marineflotten zur See unaufhaltsam machen."
 nbu_genji_in_the_north: "Ōshū Genji"
 nbu_genji_in_the_north_desc: "Ursprünglich waren wir eine Nebenlinie der Kai Genji, und unserem Gründer wurde im 12. Jahrhundert ein Lehen in der Ōshū-Provinz verliehen – als Belohnung für treue Dienste im Kamakura-Shogunat. Im Anschluss daran passten wir uns an diese Region mit ihren harten Wintern an und lernten, wie man diese Bedingungen in unseren Strategien und Taktiken am besten nutzt."
 nbu_fight_against_famines: "Bekämpfen der Hungersnöte"
 nbu_fight_against_famines_desc: "Aufgrund der kalten Winde im Spätherbst und der starken Schneefälle zum Anfang des Frühlings hat unser Volk oft unter Hungersnöten zu leiden. Wir müssen Nahrungsvorräte aufbauen und nach Wegen suchen, das Land unter unserer Herrschaft aufzuwerten, um zukünftige Katastrophen zu verhindern."
 nbu_northern_horses: "Pferde aus dem Norden"
 nbu_northern_horses_desc: "Die Viehhöfe von Mutsu stammen noch aus uralten Tagen, als man Pferde nach Kyoto schickte. Die Tradition der Pferdezucht wurde seitdem fortgesetzt, und wir sollten sie weiter kultivieren, denn so können wir leichter Kavallerie ausheben als viele unserer Nachbarn."
 oda_uninspiring_clan: "Wenig inspirierender Clan"
 oda_uninspiring_clan_desc: "Trotz seiner Ahnenlinie ist unser Clan offensichtlich nicht so bedeutend wie seine Nachbarn. Unsere Stärke zu unterschätzen, wird ihr Untergang sein."
 oda_generals: "$ODA$-Generäle"
 oda_generals_desc: "Eine Besessenheit in Sachen Geburtsrechte und Privilegien hat diese Nation geschwächt und überall im ganzen Reich für den Aufstieg selbsternannter mächtiger Clans gesorgt – ein klarer Beweis dafür, wie unsinnig solche Vorstellungen sind. Nehmen wir uns diese Lektion zu Herzen und machen wir Erfolg und Geschick zum Leitstern für all jene, die zu Befehlshabern unserer Armeen werden. Eine starke Führung ist für eine rasche Expansion unverzichtbar."
 oda_tenka_fubu: "Tenka Fubu"
 oda_tenka_fubu_desc: "Es ist offenkundig unser Schicksal, das ganze Land im Griff zu behalten. Niemand soll sich unserer Autorität widersetzen, und alles unter dem Himmel wird sich der Macht unseres Militärs beugen."
 oda_triple_firing: "Dreifachfeuer"
 oda_triple_firing_desc: "Der Einzug von Feuerwaffen hat die Kriegsführung auf dem japanischen Archipel revolutioniert und wird dies auch weiter tun. Durch das Meistern dieser neuen Waffen beherrschen wir jedes Schlachtfeld. Um ihre Feuerrate zu verbessern, bilden unsere Arkebusenschützen Reihen, sodass immer einer von ihnen feuert, während zwei andere nachladen."
 oda_influential_strongholds: "Einflussreiche Festungen"
 oda_influential_strongholds_desc: "$japan_region$ ist in vielem ein Land der Burgen und Befestigungen. Durch den Bau starker Abwehrstellungen üben wir Einfluss sowohl im politischen Bereich als auch auf die für militärische Feldzüge wichtigen Routen aus. Diese Lehre müssen wir uns zu Herzen nehmen. Dank der Burgen stellen wir sicher, dass sich das Volk beständig an unsere Präsenz und unsere Macht erinnert. Wir müssen stets die Priorität darauf legen, dem Gegner Befestigungen zu nehmen und eigene an strategischen Orten zu errichten."
 oda_patronization_of_the_west: "Gönnerschaft des Westens"
 oda_patronization_of_the_west_desc: "Westliche Missionare brachten viele Ideen und Techniken in unser Land, und im Gegensatz zu den alten buddhistischen Sekten besitzen sie keine Verbindungen zu korrupten Landbesitzern oder rebellischen Städten. Wir sollten die Westler in unseren Städten willkommen heißen und den Vorteilen nachgehen, die sie unserem Hof bringen könnten."
 ogs_ogasawara_ryu: "Ogasawara-Ryū"
 ogs_ogasawara_ryu_desc: "Traditionelle Stile haben einen hohen Stellenwert in unserer Gesellschaft. Seit Ogasawara Nagakiyo, der Gründer unseres Clans, seine eigene Schule entwickelte, haben wir das System der Kampfkünste und der Etikette formalisiert. Alle Samurai sollten die Kriegsführung unserer Schule erlernen."
 ogs_shinano_shugo: "$shinano_province$-Shugo"
 ogs_shinano_shugo_desc: "Unser Clan gehört zu einem alten Zweig der Genji und regiert die Provinz $shinano_province$ als ihr Shugo. Dieses gebirgige Land wirkt auf manche ungastlich. Doch für unser Volk ist dieser Umstand schon lange ein wesentlicher Aspekt seiner Verteidigung. Lasst uns unsere Erfahrung stets mit uns nehmen, wohin unsere Armeen auch immer ziehen. Wir sollten uns stets gut mit der örtlichen Lage vertraut machen und das Gelände einer Region bestmöglich für die Schlacht nutzen."
 ogs_kiso_uma: "Kiso-Uma"
 ogs_kiso_uma_desc: "Die Pferde aus der Region Kiso sind unsere einzigartigen Freunde. Sie sind nicht so groß oder schnell wie andere Arten, doch sie verfügen über große Ausdauer und sind robust genug, um auch im Hochgebirge zu überleben."
 ogs_improvment_of_nakasendo: "Verbesserung des Nakasendō"
 ogs_improvment_of_nakasendo_desc: "Der Nakasendo ist eine der wichtigsten Routen zwischen Zentral- und Ostjapan. Ihn zu kontrollieren, bedeutet, zugleich auch den Handel zu kontrollieren, der über ihn fließt."
 suw_suwa_taisha: "Suwa-Taisha"
 suw_suwa_taisha_desc: "Suwa-Taisha am Suwa-See ist einer der ältesten Schreine in Japan und wird nicht nur in Shinano sehr geschätzt. Sein wichtigstes Fest, das Onbashira-sai, beweist die Tapferkeit unseres Volkes, während es die heiligen Holzstämme vom Berg zum Schrein befördert."
 otm_lord_of_bungo: "Fürst von Bungo"
 otm_lord_of_bungo_desc: "Wir sind seit der Kamakura-Ära der Shugo von Bungo. Diese Lande sind für ihre sehr fruchtbaren Böden bekannt, und dank der reichen Ernten dieser Region können wir größere Armeen ernähren, als es vielen anderen $daimyo$s möglich ist."
 otm_domination_of_kyushu: "Vorherrschaft über Kyūshū"
 otm_domination_of_kyushu_desc: "Wir wurden als Shugo von $bungo_province$, $hizen_province$ und $hyuuga_province$ eingesetzt. So sind wir in einer guten Stellung, um die ganze Insel Kyūshū für uns zu beanspruchen."
 otm_nanban_trade: "Willkommener Nanban-Handel"
 otm_nanban_trade_desc: "Andere mögen die Fremdländer als Barbaren scheuen, doch wir erkennen die Vorteile und den Nutzen des Handels mit ihnen. Sie sollen wissen, dass sie in unseren Häfen immer willkommen sein werden. Wir werden unser Handelsnetz weiter ausbauen können als unsere Rivalen."
 otm_christian_conversion: "Christliche Konvertiten"
 otm_christian_conversion_desc: "Unser häufiger werdender Umgang mit den Fremdländern hat viele innerhalb unseres Clans auf den christlichen Glauben aufmerksam gemacht. Die Christen haben viele mächtige Beschützer unter unseren Fürsten und Vasallen, doch wenige sind so eifrig wie die frisch Bekehrten. Lasst uns diese christlichen Konvertierten gut nutzen, unabhängig davon, welchen Weg unser Reich einschlägt, damit ihr Einfluss und ihr Eifer unsere Sache voranbringen."
 ouc_descendant_of_baekje: "Nachfahren von Baekje"
 ouc_descendant_of_baekje_desc: "Unsere Chronik besagt, dass wir Nachfahren von Prinz Imseong aus dem alten Königreich Baekje auf der koreanischen Halbinsel sind. Dank dieser Legende erlangten wir eine prestigeträchtige Stellung in Ostasien."
 ouc_korea_trade: "Koreahandel"
 ouc_korea_trade_desc: "Durch unsere geografische Lage sind wir der Clan mit der größten Beteiligung am Handel mit Korea. Auf viele exotische Waren haben unsere Händler fast schon ein Monopol. Wir müssen tun, was wir können, um diese günstige Stellung zu erhalten und sie so zu nutzen, dass kein Emporkömmling uns herausfordern kann."
 ouc_fight_against_wokou: "Schutz vor Piraterie"
 ouc_fight_against_wokou_desc: "Um die guten Beziehungen zum Kontinent für unsere Händler zu erhalten, müssen wir ständig im Ostchinesischen Meer patrouillieren. Solange Piraten und Schmuggler in diesen Gewässern ihr Unwesen treiben, vertrauen die Fremdländer uns nicht und könnten etwas gegen uns unternehmen."
 ouc_welcome_missionaries: "Die Westler willkommen heißen"
 ouc_welcome_missionaries_desc: "Während sich unser Handelsnetz ausbreitet, kommen wir mit immer mehr fremden Menschen und Glaubensrichtungen in Berührung. Unabhängig davon, was diese Leute glauben, haben sie gutes Geld parat, und daher sollten wir so offen für ihre Ideen sein, wie es nötig ist, um sich den Handel mit ihnen zu sichern."
 stk_hitachi_genji: "$hitachi_province$ Genji"
 stk_hitachi_genji_desc: "Wir sind einer der ältesten Genji in der Kantō-Region und haben für den Ruhm des Clans in Ostjapan gekämpft, noch bevor Minamoto no Yoritomo das Kamakura-Shogunat gründete. Unsere Stellung als Shugo von $hitachi_province$ ist daher unangreifbar."
 stk_kashima_jingu: "$kashima_shrine$"
 stk_kashima_jingu_desc: "$kashima_shrine$ ist einer der drei wichtigsten Schreine in Kantō. Dieser Schrein ehrt Takemikazuchi, den Gott des Donners und der Schwerter, der auch als Schutzgott des $sumo$-Ringens bekannt ist. Die Erhaltung dieses Schreins stärkt die Entschlossenheit unserer Armeen."
 stk_eastern_coalitions: "Östliche Koalitionen"
 stk_eastern_coalitions_desc: "Ganz gleich, wie verfeindet die Clans um uns herum auch waren: Es gelang uns stets recht gut, uns als vernünftige dritte Partei für andere Clans darzustellen, an die man sich wenden kann, um vor Invasoren geschützt zu sein. Diese Tradition östlicher Koalitionen wird uns gute Dienste leisten, solange wir sicherstellen, dass die Clans, die sich auf uns verlassen, niemals Grund haben, sich um ihren Schutz zu sorgen."
 sba_multiple_shugo: "Mehrfacher Shugo"
 sba_multiple_shugo_desc: "Wir wurden als Shugo mehrerer Provinzen eingesetzt. Diese Lande erlauben es uns, durch Reisfelder und Werkstätten mit Japans erfahrensten Handwerkern reich zu werden."
 sba_access_to_northern_japan: "Ōshū-Bande"
 sba_access_to_northern_japan_desc: "Die Provinz Ōshū ist unsere zweite Heimat und der Ursprung des Namens unseres Clans. Wir müssen unsere Bande in Ōshū nutzen, um uns die starken Schlachtrösser dieser Region zu sichern."
 sba_shiba_retainers: "$SBA$-Gefolgsleute"
 sba_shiba_retainers_desc: "Wir haben talentierte, aber ehrgeizige Vasallen in unserem Clan. Diese Familien könnten unseren Clan allerdings auch zerbrechen lassen, weshalb wir klug daran täten, sie an die Kandare zu nehmen. Eine genaue Überwachung und ausreichend Belohnungen könnten diese Familien zur wichtigsten Stütze unserer Herrschaft machen."
 smz_satsuma_shugo: "$satsuma_province$-Shugo"
 smz_satsuma_shugo_desc: "Wir sind traditionell der Shugo der Provinz $satsuma_province$, und zwar so sehr, dass ihr Name gleichbedeutend für unseren Clan steht. Unsere Krieger sind darauf stolz und bereit, für uns zu kämpfen."
 smz_tsurinobuse: "Tsurinobuse"
 smz_tsurinobuse_desc: "Tsurinobuse – „Anlocken und aus dem Hinterhalt überfallen“ – ist unsere effektivste Taktik: Mit ihr können wir auch überlegene Feinde schlagen. Wir müssen dies zur zentralen Taktik unserer Armeen machen und so die stumpfsinnigen Befehlshaber anderer Clans übertölpeln."
 smz_shimazu_charge: "$SMZ$-Ansturm"
 smz_shimazu_charge_desc: "Selbst wenn sie umzingelt und in der Unterzahl sind, marschieren unsere Soldaten weiter, bis sie die andere Seite der gegnerischen Reihen erreichen. Der Ansturm unserer Truppen ist legendär."
 smz_tanegashima: "Tanegashima Teppō"
 smz_tanegashima_desc: "Die Westler, die zuerst auf der Tanegashima-Insel landeten, brachten neue und interessante Waffen mit. Diese Arkebusen werden seitdem in ganz $japan_region$ immer geläufiger, doch nirgendwo sind sie schon so lange verfügbar wie hier."
 smz_early_westernization: "Frühe Verwestlichung"
 smz_early_westernization_desc: "Dank der häufigen und frühen Kontakte mit westlichen Ländern haben wir viel über fremdländische Technologien und Ideen gelernt. Auf dieser Grundlage können wir Reformen in Wirtschaft, Industrie und Bildung durchführen, um so einen Vorteil gegenüber anderen japanischen Clans zu erlangen."
 shn_vice_minister_of_dazaifu: "Vizeminister von Dazaifu"
 shn_vice_minister_of_dazaifu_desc: "Wie man schon am Namen unseres Clans erkennt, entstanden wir, als der Vizeminister der Dazaifu in der $chikuzen_province$-Provinz eingesetzt wurde. Diese Institution ist schon seit grauer Vorzeit das diplomatische und militärische Zentrum der Region, und wir regieren traditionell das nördliche Kyūshū als Vertreter des Kaisers."
 shn_defender_against_mongols: "Verteidiger Japans"
 shn_defender_against_mongols_desc: "Als eine der führenden Samuraifamilien im nördlichen Kyūshū haben wir tapfer gegen zwei mongolische Invasionen gekämpft. Wenn es nötig wird, werden wir erneut sowohl Kyūshū als auch das Reich vor fremdländischen Eindringlingen verteidigen."
 shn_diplomacy_through_tsushima: "Diplomatie durch Tsushima"
 shn_diplomacy_through_tsushima_desc: "Dank unserer Präsenz in $tsushima_province$ haben wir einen reichhaltigen Erfahrungsschatz bei Verhandlungen mit Korea. So konnten wir stets einen Kanal nach außen offen halten, auch in Zeiten, in denen offizielle Beziehungen verboten waren."
 soo_tradition_of_wakou: "Wakō-Tradition"
 soo_tradition_of_wakou_desc: "Obwohl wir den rechtmäßigen und friedlichen Handel schätzen, müssen wir uns während dieser militärischen Spannungen auf eine schlechtere Lage einstellen. Glücklicherweise könnte unsere Piraterietradition dabei helfen, Machtfragen zu klären."
 soo_fight_for_tsushima: "Für Tsushima kämpfen"
 soo_fight_for_tsushima_desc: "Zwischen dem asiatischen Kontinent und den japanischen Inseln liegt unsere Heimat $tsushima_province$, und das sie umgebende Meer ist ein Ort, an dem die Flotten verschiedener Länder aufeinanderprallen und Seeschlachten schlagen. Mögen unsere Flotten stark sein, damit wir unsere Lande nicht nur verteidigen, sondern auch erweitern können!"
 soo_bahan_ship: "Bahan-Schiffe"
 soo_bahan_ship_desc: "Unsere Freibeuterschiffe, die Bahan, werden wegen der Flagge von Hachiman gefürchtet. Niemand wird unsere Flotte angreifen wollen, solange sie dieser Kriegsgott schützt!"
 tkd_kai_shugo: "$kai_province$-Shugo"
 tkd_kai_shugo_desc: "Wir sind die Nachfahren des Genji von $kai_province$ und werden traditionell als Shugo dieser Provinz eingesetzt. Dadurch sind wir auch untrennbar mit ihren berühmten Pferden verbunden, die bereits gleichbedeutend für unsere Kavallerie stehen."
 tkd_takeda_ryu: "Takeda-ryū"
 tkd_takeda_ryu_desc: "Traditionelle Formen der Kampfkunst werden seit Generationen innerhalb unserer Familie weitergegeben. Zu ihnen zählen die besondere Betonung des Pferdereitens und des Schießens vom Pferderücken aus, sodass unsere Truppen äußerst effektive Soldaten abgeben."
 tkd_tiger_of_kai: "Tiger von Kai"
 tkd_tiger_of_kai_desc: "Starke Führer sind eine zuverlässigere Absicherung für ein Reich als eine beliebige Zahl starker Burgen. Unsere Generäle müssen hart für ihre zukünftige Tätigkeit arbeiten, um sich das Recht zu verdienen, „Tiger von Kai“ genannt zu werden."
 tkd_fuurinkazan: "Fūrinkazan"
 tkd_fuurinkazan_desc: "Schnell wie der Wind, sanft wie der Wald, angriffslustig wie das Feuer, unbeweglich wie der Berg. Die Worte des großen Kriegsmeisters Sunzi sollen in unseren Familiennamen eingraviert und zu unserem Motto werden."
 tki_genji_in_mino: "Genji von $mino_province$"
 tki_genji_in_mino_desc: "Als Kopf der Genji in $mino_province$ und eingesetzter Shugo dieser Provinz führen wir andere örtliche Samurai seit Generationen an. Unsere Domäne befindet sich in einer strategisch günstigen Lage, von der aus man die Nachbarregionen kontrollieren kann."
 tki_banner_of_bellflower: "Banner der Glockenblume"
 tki_banner_of_bellflower_desc: "Da wir schon seit Generationen ihr Shugo sind, steht unser Emblem gleichbedeutend auch für die Provinz $mino_province$. Alle Männer in dieser Provinz werden unter unserem Banner kämpfen."
 tki_flood_control_of_three_rivers: "Hochwasserschutz"
 tki_flood_control_of_three_rivers_desc: "In unserer Heimatprovinz verursachen die drei großen Flüsse Kiso, Nagara und Ibi oft schwere Überschwemmungen auf unseren Reisfeldern. Wir sollten diese Flüsse bändigen und so die Fruchtbarkeit unserer Lande in allen Provinzen unter unserer Herrschaft mehren."
 ues_strong_dynastic_ties: "Starke Dynastiebande"
 ues_strong_dynastic_ties_desc: "Unsere Familie stammt von der prestigeträchtigen $fujiwara$-Linie ab und wir haben auch starke Bande zu den Ashikaga, da die Mutter von Ashikaga Takauji ein Mitglied unseres Clans war. Diese Dynastiebande werden sich sich noch als äußerst wertvoll für den Wohlstand unseres Clans erweisen."
 ues_double_shugo: "Doppel-Shugo"
 ues_double_shugo_desc: "Wir wurden als Shugo der beiden Provinzen $kouzuke_province$ und $tango_province$ eingesetzt. Ihre reichhaltigen Lande werden uns gut bei unserer Ausdehnung dienen."
 ues_eastern_power: "Östliche Macht"
 ues_eastern_power_desc: "Obwohl man uns Territorium im Osten wie im Westen von $japan_region$ gewährte, können wir im Osten besser erblühen. In den reichen Territorien dort können wir viele Krieger finden, die für unsere Sache kämpfen."
 ues_dragon_of_echigo: "Drache von Echigo"
 ues_dragon_of_echigo_desc: "Unser Clan pflegt einen Geist der Tapferkeit und der Gerechtigkeit, der Gegner auf dem Schlachtfeld das Fürchten lehrt. Wir müssen der Welt die Stärke unserer Clanführer beweisen, denn dann wird jeder den Drachen von Echigo fürchten und achten."
 utn_fujiwara_descendant: "$fujiwara$-Nachfahren"
 utn_fujiwara_descendant_desc: "Laut unserer Abstammungslinie waren die Vorfahren unseres Clans ursprünglich Mitglieder der $fujiwara$-Familie in Kyoto. Die Verwandtschaft zu einer so alten und ehrbaren Familie können wir heute noch im Rahmen diplomatischer Verbindungen zum kaiserlichen Hof und zu anderen Clans nutzen."
 utn_legacy_of_nasu_no_yoichi: "Vermächtnis von Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ war einst die Heimat von Nasu no Yoichi, den man für sein Können als Bogenschütze im alten Genpei-Krieg rühmt. Bis heute halten ihn die Krieger von $shimotsuke_province$ in Ehren und werden als „beste Bogenschützen von Kantō“ bezeichnet."
 utn_mediator_of_kanto: "Schlichter von Kantō"
 utn_mediator_of_kanto_desc: "Als einer der ältesten Clans in Kantō haben wir tiefe Einblicke in die Politik dieser Region und arbeiteten schon vielmals als Vermittler zwischen verschiedenen Fraktionen. So wissen wir auch, wie wir unser Territorium effektiv ausbauen können, ohne den Hass und die Angst anderer zu wecken."
 ymn_descendant_of_nitta: "Nachfahren von Nitta"
 ymn_descendant_of_nitta_desc: "Wir sind Nachfahren des Nitta-Clans, dem größten Konkurrenten der alten Ashikaga-Familie. Für einige ist dies ein Beweis unserer Treue, für andere hingegen sind wir ein natürlicher Gegenkandidat. Nun gilt es, diese Abstammung bei den vielen politische Unterfangen unseres Zeitalters geschickt zu nutzen."
 ymn_mediate_succession_disputes: "Schlichter von Erbfolgestreitigkeiten"
 ymn_mediate_succession_disputes_desc: "Viele der anderen Shugo-Clans streiten darüber, wer wessen rechtmäßiger Erbe ist. Sie wenden sich an uns, um solche Streitigkeiten beizulegen. So können wir weitere Verbündete und Kontakte gewinnen, ganz zu schweigen davon, dass wir unsere Rivalen zu destabilisieren vermögen."
 ymn_leader_of_western_army: "Die westliche Armee"
 ymn_leader_of_western_army_desc: "Lasst uns eine große westliche Armee schmieden, um die streitenden Staaten Japans zu vereinigen. Tapfere und geübte Generäle mit gut ausgebildeten Soldaten werden die Ostler leicht in die Knie zwingen!"
 ymn_isolated_heartland: "Abgeschottetes Kernland"
 ymn_isolated_heartland_desc: "Unsere Heimatlande sind bergig und abgeschottet. Glücklicherweise bedeutet dies auch, dass sie für jeden Möchtegern-Eroberer schwer zu erreichen sind. Lasst uns unsere Verteidigung auf den natürlichen Stärken unserer Landschaft gründen und jeden Angreifer bereuen lassen, einen gierigen Blick auf unseren Besitz geworfen zu haben."
 #West Africa
 dahomey_amazons: "Dahomey-Amazonen"
 dahomey_amazons_desc: "Dieses Korps weiblicher Kriegern wird aus den Frauen des Königs rekrutiert. Durch ihre Wildheit im Kampf sieht man sie als Nachfolgerinnern der Amazonen der griechischen Sagenwelt, was Angst in die Reihen unserer Feinde trägt. Diese $dahomey_amazons$ werden $DAH$ und seinen Interessen dienen."
 dah_children_of_the_panther: "Kinder des Panthers"
 dah_children_of_the_panther_desc: "Unsere uralten Legenden besagen, dass unser königlicher Stammbaum auf die Vereinigung einer Prinzessin und eines Panthers zurückgeht. Diese Geschichte aus grauer Vorzeit kann unser Ansehen und unseren Ruhm bei unseren Nachbarn nur mehren."
 dah_slave_hunts: "Sklavenjagden"
 dah_slave_hunts_desc: "Durch Überfälle auf unsere Nachbarn erlangen wir Sklaven, die nicht nur in der Wirtschaft beschäftigt oder bei unseren Nachbarn eingetauscht werden können – wir können sie auch in den Dienst unserer Armee stellen. So wächst die Zahl an Mannen, die wir an die Waffen rufen können."
 dah_migan_mehu: "Migan und Mehu"
 dah_migan_mehu_desc: "Der Migan und der Mehu sind die zwei obersten Minister unserer Könige. Einer überwacht den Norden, der andere den Süden. Einer ist für die Justiz zuständig, der andere für die Wirtschaft. Gemeinsam bringen sie unserem Land Frieden und Wohlstand."
 dah_lagredis: "Lagredis"
 dah_lagredis_desc: "Wenn wir eine gewisse Zahl an verweiblichten jungen Edelleuten in den königlichen Harem aufnehmen und sie als königliche Frauen darstellen, haben sie die Freiheit, ungesehen als Augen und Ohren des Königs zu wirken – vor allem in Bezug auf Palastintrigen."
 dah_yovogan: "Yovogan"
 dah_yovogan_desc: "Da immer mehr Fremdländer an unseren Küsten anlanden, ist es notwendig, ein neues Amt in unserer Regierung zu begründen, um ihre Praktiken zu studieren und ihre Geheimnisse zu erfahren: Nur so können wir von ihnen profitieren."
 dah_dahomey_palaces: "Paläste von Abomey"
 dah_dahomey_palaces_desc: "Eine weitläufige Palastanlage in unserem Hauptsitz wäre ein deutliches Symbol unserer Macht für alle, die es wagen könnten, uns herauszufordern."
 kbo_ribat_fortifications: "Ribāṭ-Befestigungen"
 kbo_ribat_fortifications_desc: "Diese kleinen Befestigungen werden überall in der muslimischen Welt verwendet, um Karawanen, Handelsknoten und abgeschiedene Gemeinden zu schützen."
 #Muslim
 people_of_allah: "Volk von $muslim_god_name$"
 people_of_allah_desc: "Wir sind die Anhänger von $muslim_god_name$, der der einzig wahre Gott ist, und wir gehorchen seinem Wort. All jene, die an ihn glauben, sind in seinen Augen unsere Brüder und Schwestern."
 holy_revelation: "Heilige Offenbarung"
 holy_revelation_desc: "Das Wort von $muslim_god_name$ wurde seinem Propheten Mohammed offenbart – Friede sei mit ihm – und im Heiligen $common_string_quran$ niedergeschrieben. Durch seine Verse wird der Wille von $muslim_god_name$ an seine Gläubigen weitergegeben, und alle muslimischen Gläubigen sollten mit seinen Suren vertraut sein."
 islamic_calligraphy: "Islamische Kalligrafie"
 islamic_calligraphy_desc: "Der Islam ist nicht nur eine Religion des Friedens, sondern auch eine der Künste. Die Kalligrafie der Verse des $common_string_quran$s und die Namen der Propheten ist vielfach Kunst und Niederschrift zugleich."
 islamic_prayer: "Aṣ-Ṣalāh Farḍ"
 islamic_prayer_desc: "‚Aṣ-Ṣalāh‘ ist eine der Fünf Säulen des Islam: die Verpflichtung aller muslimischen Gläubigen, täglich zu beten. Die Zahl der Gebete am Tag und die genauen Bewegungen dabei mögen sich von Schule zu Schule unterscheiden, doch das tägliche Gebet selbst gibt es unter allen Muslimen."
 zakah: "Al-Zakāh Wājib"
 zakah_desc: "Al-Zakāh als eine der Fünf Säulen des Islam ist eine Form von Almosen als religiöse Verpflichtung aller muslimischen Gläubigen. Den Bedürftigen Geld zu geben, ist eine vorgeschriebene Mildtätigkeit für jeden, der es sich leisten kann. Sie gilt sogar als Steuer."
 muslim_lineage: "Muslimische Abstammung"
 muslim_lineage_desc: "Schon seit den Tagen Mohammeds – Friede sei mit ihm – ist der Islam eng mit den Strukturen der Herrschaft verbunden. Daher wird unsere Ahnenlinie durch den Glauben selbst legitimiert."
 muslim_caravans: "Muslimische Karawanen"
 muslim_caravans_desc: "Ob nun auf den vielen Routen der Seidenstraße oder den Salzrouten durch die Sahara: Unser Volk hat die Tradition, Handelskarawanen in ferne Lande zu führen und eine Vielzahl von Gütern in der ganzen muslimischen Welt zu verbreiten."
 islamic_golden_age: "Blütezeit des Islam"
 islamic_golden_age_desc: "Obwohl die kulturell rumreichen Tage des Islam bereits hinter uns liegen, ist die Auswirkung der $islamic_golden_age$ überall in der Welt unbestreitbar – und nicht nur in muslimischen Ländern. Einige dieser ungläubigen Ländern beginnen erst jetzt, unsere Größe in den Künsten und Wissenschaften zu erkennen, während sie selbst noch in einem Zeitalter des Unwissens steckten."
 ramadan: "Ramaḍān"
 ramadan_desc: "Im Gedenken an die erste Offenbarung des Propheten Mohammed – Friede sei mit ihm – gilt der $ramadan$ als heiligster Monat des Islam. Während dieses Monats wird von allen gläubigen Muslimen erwartet, während des Tageslichts Ṣawm (Fasten und Abstinenz) zu praktizieren und sich Gebeten und innerer Versenkung zu widmen."
 sunnah: "Sunna"
 sunnah_desc: "Die $sunnah$ sind Praktiken und Traditionen, die man Mohammed – Friede sei mit ihm – zuschreibt. Es handelt sich dabei um Verhaltensweisen für jeden gläubigen Moslem, die zugleich den Sunniten den Namen gaben. Die unterschiedlichen Auslegungen mögen sich in Einzelheiten unterscheiden, sie gründen sich jedoch alle auf die $sunnah$."
 imamate: "Imamat"
 imamate_desc: "Die Grundlage des schiitischen Glaubens besteht darin, dass Mohammed – Friede sei mit ihm – Alī ibn Abī Ṭālib zu seinem Nachfolger ernannte. Damit einher geht, dass der Imām als spiritueller Anführer in einer Reihe mit Mohammed – Friede sei mit ihm – steht und daher alle gläubigen Moslems führt."
 indian_sea_trade: "Indischer Seehandel"
 indian_sea_trade_desc: "Muslimische Händler segeln schon seit Generationen auf dem Indischen Ozean, wobei sie auf der Suche nach lohnenswerten Waren immer weiter reisen. Von der Ostküste $africa$s bis nach $india$ und sogar bis zu den Gewürzinseln von $indonesia_region$: Der Bug muslimischer Schiffe durchpflügt überall die Wogen."
 muslim_trade_communities: "Muslimische Handelsgemeinden"
 muslim_trade_communities_desc: "Die Anwesenheit muslimischer Händler in fernen Ländern bringt sie mit vielen unterschiedlichen Völkern und Glaubensvorstellungen in Berührung. Der Aufbau von Handelsgemeinden unter ihnen erlaubt ein gewisses Maß an Vermischung und Synkretismus ihrer Vorstellungen mit dem wahren Wort von $muslim_god_name$."
 expansionist_faith: "Expansionistischer Glaube"
 expansionist_faith_desc: "Früher dehnte sich der Islam sehr rasch über seine Ursprünge in $arabia_region$ hinaus aus. In nur wenigen Generationen schaffte er es bis nach $iberia_region$ und $india$, in der wohl schnellsten Expansion, die die Welt je gesehen hatte. Es gibt nun neue Lande jenseits unserer Grenzen, und vielleicht wird es Zeit für ein zweites muslimisches Wachstum jener Art."
 blend_of_influences: "Vermischung von Einflüssen"
 blend_of_influences_desc: "Der Islam konnte sich seit seiner Entstehung in $arabia_region$ an viele Orte ausdehnen und kam im Zuge dessen mit vielen Völkern und Lebensarten in Berührung. Oft folgte darauf ein Austausch von Einflüssen, sodass sogar einige Eigenheiten, die gar nicht aus dem Islam stammen, untrennbar mit ihm verflochten scheinen, was sich auf viele Kulturen auswirkte, die den Islam bereits angenommen hatten."
 islamic_schoolars: "Islamische Schulen"
 islamic_schoolars_desc: "Der Islam hat stets das Bedenken und Studieren seiner Schriften gefördert, sodass es sogar zur Entstehung verschiedener Schulen kam, die jeweils andere Auslegungen vertreten. Unsere Gelehrten für den $common_string_quran$ und andere heilige Schriften sind somit sehr gebildete Menschen, die auch an äußerst tiefgründigen Diskussionen teilnehmen können."
 gunpowder_empires: "Schießpulverreiche"
 gunpowder_empires_desc: "Das Schießpulver mag in Fernost erfunden worden sein, doch erst durch den Islam hat es sich in der ganzen Welt verbreitet und wird weithin eingesetzt. Schießpulverwaffen sind schon seit Generationen in unserer Armee üblich, und seine Herstellung und Verwendung zählen zu jenen Eigenschaften, die uns ausmachen."
 established_holy_sites: "Etablierte Sakralstätten"
 established_holy_sites_desc: "Während andere Religionen recht lax und unbeständig sind, was den Umgang mit Sakralstätten angeht, sind die Regeln des Islam zu diesem Thema sehr klar. So werden wir zweifelsohne pflichtgemäß unsere Pilgerreisen durchführen, wenn es an der Zeit ist."
 islamic_courts: "Islamische Höfe"
 islamic_courts_desc: "Die Königshöfe muslimischer Länder gehörten seit jeher zu den am meisten bewunderten der Welt. Gepriesen für unsere verfeinerte Kultur und exotischen Waren haben sich Geschichten über die Pracht unserer Höfe überallhin verbreitet, und unser Volk ist stolz, zu solch einem Hof zu gehören."
 schools_of_thought: "Denkschulen"
 schools_of_thought_desc: "Der Islam war schon immer eng mit Wissen und Bildung verflochten. Angefangen bei den verschiedenen Schulen der Auslegung und der Theologie bis hin zu den unterschiedlichen Schulen des Wissens, die diverse Herrscher schufen, werden die Werke muslimischer Gelehrter nicht nur in der muslimischen Welt bewundert, sondern auch unter den Ungläubigen."
 distant_trade_ventures: "Ferne Handelsunternehmungen"
 distant_trade_ventures_desc: "Aus den fernsten Landen holen wir auch die kostbarsten Waren. Viele Jahre schon überwinden muslimische Händler weite Entfernungen sowohl zu Land als auch zur See, um gewinnträchtige Handelsmöglichkeiten zu finden."
 resilient_merchants: "Zähe Händler"
 resilient_merchants_desc: "Muslimische Händler müssen auf ihren Expeditionen schlimmste Umstände erdulden. Sei es bei der Durchquerung des glühenden Sands in der Sahara oder in der Wüste Gobi bis zum Durchsegeln der von Monsun geplagten Fluten des Indischen Ozeans: Sie haben immer wieder ihre Zähigkeit bewiesen, wenn es darum geht, Strapazen zu erdulden, um erfolgreich Handel zu treiben."
 jewels_of_the_desert: "Juwelen der Wüste"
 jewels_of_the_desert_desc: "Es ist wahr, dass der Islam aus den Sanden $arabia_region$s stammt und sich danach auch in viele andere Trockenregionen ausbreitete. Doch manche muslimische Städte erstrahlen hell, obwohl sie mitten in Wüstengebieten liegen, und diese preist man auch als Zentren des wohlhabenden Lebens. Mit ausreichend Mühe kann jede Siedlung so reich werden wie sie."
 comprehensive_land_survey: "Umfassende Landerfassung"
 comprehensive_land_survey_desc: "Damit wir wissen, wer uns Steuern zahlen muss, müssen wir über die Besitzverhältnisse im Bilde sein. Eine umfassende Landvermessung und anschließende Überprüfungen, um alles auf dem jeweils neuesten Stand zu halten, sind dafür allerdings entscheidend. So bekommen wir immer, was uns zusteht."
 counting_the_people: "Volkszählung"
 counting_the_people_desc: "Da wir nun wissen, wer über welchen Besitz verfügt, werden wir uns der nächsten Frage zuwenden und herausfinden, wer an welchem Ort wohnt. So werden wir wissen, wo wir Mannen für unsere Armeen rekrutieren können."
 cosmopolitan_court: "Weltmännischer Hof"
 cosmopolitan_court_desc: "Völker überall versammeln sich an unserem muslimischen Hof. Die Anziehungskraft eines solchen Hofs nimmt nicht ab, sodass in unseren Hallen sehr unterschiedliche Talente zugegen sind."
 caliphate: "Ḵilāfa"
 caliphate_desc: "Das Ḵilāfa oder Kalifat ist die Vereinigung aller muslimischen Gläubigen unter einem einzelnen Herrscher in Form des Ḵalīfa oder Kalifen, der politisch wie spirituell ein Nachfahre Mohammeds – Friede sei mit ihm – sein soll. Auch wenn es Differenzen dazu gibt, wer als Ḵalīfa zulässig ist, so ist die Vorstellung einer Vereinigung aller Muslime unter einem Banner schon seit seiner Gründung Teil des Islam."
 ibadi_imamate: "$ibadi_ADJ$es Imamat"
 ibadi_imamate_desc: "Anders als bei die Ideen des Kalifats oder des vom Himmel eingesetzten schiitischen Imām, muss ein ibaditischer Imām nicht über die ganze muslimische Welt herrschen. Stattdessen soll über jede Gemeinde, die sich unabhängig regieren lässt, ein eigener Imām herrschen."
 contacts_network: "Kontaktenetzwerk"
 contacts_network_desc: "Die Verbreitung des Islam über ausgedehnte Gebiete hat es muslimischen Ländern erlaubt, mit vielen unterschiedlichen fernen Nationen in Kontakt zu treten. Ein derart reiches Netzwerk an Kontakten zu unterhalten, ist stets von Vorteil für die diplomatische Sphäre."
 infiltration_tactics: "Unterwanderungstaktiken"
 infiltration_tactics_desc: "Auch wenn der uralte nizārī-schiitische Orden der Ḥashshāshīyīn weit über seine ursprünglichen Ausmaße hinaus zum Mythos wurde, ist wohl unbestreitbar, dass seine Taktiken des heimlichen Vorgehens und Mordens wirksam waren. Wenn wir selbst solche Unterwanderungstaktiken einsetzen, wird uns gewiss der gleiche Erfolg zuteilwerden."
 unified_armies: "Geeinte Armeen"
 unified_armies_desc: "Es ist unbestreitbar, dass der Islam sich in viele unterschiedliche Kulturen und Völker hineinverbreitet hat, seitdem er in $arabia_region$ entstand. Solange er an $muslim_god_name$ glaubt, kann jeder Mensch auch in seinem Namen kämpfen, ungeachtet seiner Herkunft."
 harsh_environments: "Harte Umgebungen"
 harsh_environments_desc: "Der Islam hat sich seit seiner Entstehung durch einige der härtesten Umgebungen der Welt verbreitet. Ungläubigen wird es stets schwer fallen, wenn sie den Kampf in unsere Lande tragen oder ihn zu unseren Bedingungen ausfechten müssen."
 #Buddhism
 four_noble_truths: "Vier Edle Wahrheiten"
 four_noble_truths_desc: "Als Ursprung und Fundament der Lehren Buddhas sind die „Vier Edlen Wahrheiten“ eine Erklärung der Wirklichkeit des Seins. Nichts ist von Dauer, was dem Geist aufgrund seiner Verbindung mit der vergänglichen Existenz Leid bereitet. Dieses Leid ist nur zu lindern, indem man sich selbst befreit und von derlei Bindungen ablässt, was man durch das Befolgen des edlen achtfachen Pfads erreicht."
 noble_eightfold_path: "Edler achtfacher Pfad"
 noble_eightfold_path_desc: "Zusammengefasst geht es bei diesem Pfad um die Befreiung von Saṃsāra hin zum Nirvāṇa: Der Edle achtfache Pfad ist somit die Quintessenz der buddhistischen Praktiken. Er schreibt sowohl eine geistige Verfassung als auch körperliche Handlungen vor und bestimmt so das Verhalten aller Anhänger des Buddhismus."
 middle_way: "Mittlerer Weg"
 middle_way_desc: "Der Buddha lehrt uns, dass wir Extreme meiden sollen, denn weder durch sinnlichen Genuss noch durch extreme Askese kann man Erleuchtung finden."
 three_jewels: "Drei Juwelen"
 three_jewels_desc: "Die $three_jewels$ oder auch Dreifache Zuflucht sind die drei Stützen, in denen Anhänger des Buddhismus Zuflucht finden können. Diese Zufluchten sind der #italic Buddha#!, der Erleuchtete; der #italic Dharma#!, die Lehren des Buddha; und der #italic Sangha#!, die Klostergemeinde, die das Dharma bewahrt."
 buddhist_syncretism: "Buddhistischer Synkretismus"
 buddhist_syncretism_desc: "Auch wenn er sich in nah und fern verbreitet hat, stammt der Buddhismus dennoch aus $india$ und kam so in Berührung mit vielen unterschiedlichen Glauben. Von daher beinhaltet er viel Synkretismus – nicht nur mit vorhergehenden hinduistischen Traditionen, sondern auch mit den vielen anderen Gottheiten, denen er sich ausgesetzt sah."
 sutra: "Sūtra"
 sutra_desc: "Diese Art von heiliger Schrift sowohl in dharmischen als auch buddhistischen Religionen unterscheiden sich in Form und Inhalt. Dessen ungeachtet gelten sie stets als Quelle des Wissens, und sie richtig zu studieren, ist erforderlich, wenn man den Geist entwickeln will."
 buddhist_councils: "Buddhistische Räte"
 buddhist_councils_desc: "Seit dem Tod von Siddhārtha Gautama fanden zahlreiche Räte innerhalb der Klostergemeinschaften statt, um die Inhalte der verschiedenen Schriften zu diskutieren. Obwohl die Aufzeichnungen bestimmter Räte sich von Schule zu Schule unterscheiden, ist die einende Kraft eines solchen Rats unbestreitbar."
 buddhist_canon: "Buddhistischer Kanon"
 buddhist_canon_desc: "Unter verschiedenen Namen und mit unterschiedlichen Texten als Inhalt je nach Zweig des Buddhismus ist ein buddhistischer Kanon eine Sammlung heiliger Schriften. Angefangen bei klösterlichen Regeln bis hin zu #italic Sūtren#! oder den Lehren Buddhas sollte jeder Mensch, der sich dem Buddhismus verschrieben hat, mit diesen Schriften vertraut sein."
 pali_canon: "Pali-Kanon"
 pali_canon_desc: "Obwohl es verschiedene Kanones im Buddhismus gibt (je nach Schule) ist der $pali_canon$ der Theravadins der älteste und prestigeträchtigste. Andere Schulen haben eigene Kanones geschaffen, die Zusammenstellungen von Texten aus verschiedenen Quellen darstellen, doch der $pali_canon$ ist seit den Zeiten von Ashoka dem Großen unverändert geblieben und enthält die Worte des Buddha selbst. Er dient zudem als Grundlage oder Referenz für viele andere Schulen."
 buddhist_universities: "Buddhistische Universitäten"
 buddhist_universities_desc: "Seit der Antike sind buddhistische Zentren zugleich Zentren der Bildung und des Wissens, die Menschen von überallher anziehen, die in ihren Mauern lernen wollen. Nālandā war das größte dieser Zentren der Antike, doch viele andere sind ihm seitdem nachgefolgt."
 xuanzang_travels: "Xuánzàng-Reisen"
 xuanzang_travels_desc: "Xuánzàng, ein chinesischer buddhistischer Mönch während der Táng-Dynastie im 7. Jahrhundert, brach auf eine 17 Jahre lange Überlandreise nach $india$ auf, um die dortigen Zentren der Bildung zu besuchen und möglichst viele Schriften seines Glaubens zu sammeln. Er besuchte unter anderem Nālandā, wo er von den besten Meistern lernte. Bei seiner Rückkehr nach $china$ brachte er mehr als tausend Dokumente mit, die viel zum östlichen Buddhismus beitrugen. Seine Reise und seine Aufzeichnungen waren die Grundlage für #italic Die Reise nach Westen#!: In dieser Geschichte erhält ein Mönch von Buddha die Aufgabe, nach $india$ zu reisen und nach bestimmten heiligen Schriften zu suchen. Begleitet wird er dabei unter anderem vom Affenkönig Sūn Wùkōng."
 silk_road_transmission: "Verbreitung über die Seidenstraße"
 silk_road_transmission_desc: "Es lässt sich nicht bestreiten, dass die Seidenstraße sich auf die Verbreitung des Buddhismus auswirkte. Ob nun über die Landrouten oder über die maritime Seidenstraße: Durch den Handel vermochte der Buddhismus seine Reichweite auch fernab seines Ursprungs in $india$ zu vergrößern."
 bodhisattva: "Bodhisattwa"
 bodhisattva_desc: "Ungeachtet der Schule gilt ein $bodhisattva$ als wichtige Figur. Welche genauen Eigenschaften er besitzt und wie es um seine konkrete Bedeutung bestellt ist, unterscheidet sich jedoch von Schule zu Schule. Ihnen ist allerdings in allen Fällen gemein, dass sie Verehrung und Bewunderung verdienen."
 avalokitesvara: "Avalokiteśvara"
 avalokitesvara_desc: "$avalokitesvara$, auch bekannt als Guānyīn oder Kannon, ist einer der am meisten verehrten Boddhisattwa. Er wird je nach Schule als männlich oder weiblich dargestellt und gilt in manchen sogar als Ursprung aller hinduistischen Götter. $avalokitesvara$ ist der $bodhisattva$ des Mitgefühls und wird mit dem Mantra #italic Oṃ maṇi padme hūm̐#! verbunden."
 maitreya: "Maitreya"
 maitreya_desc: "$maitreya$ ist derzeit ein $bodhisattva$, der der Prophezeiung nach der zukünftige und letzte Buddha der derzeitigen Ära sein wird. Sein Schicksal ist es, die Lehren des Dharma in der Welt zu verbreiten, nachdem die Menschheit sie vergessen hat. Somit ist er der Nachfolger von Siddhārtha Gautama."
 mount_meru: "Meru"
 mount_meru_desc: "Der $mount_meru$ ist der heilige Berg in der Mitte des Universums sowohl im körperlichen als auch im spirituellen Sinn für den Hinduismus, den Buddhismus und den Jainismus. Er ist der Mittelpunkt, um den sich alles dreht, genau so, wie sich das ganze Land um unseren Herrscher dreht."
 naraka: "Naraka"
 naraka_desc: "$naraka$ – auch als Niraya bekannt – meint jene Reiche des Leidens, in denen man von schlechtem Karma geläutert wird, ehe die nächste Wiedergeburt für einen ansteht. Es gibt viele $naraka$-Reiche, und die Zeit, die man in ihnen verbringen muss, sowie die Qualen, die man dort währenddessen erleidet, hängen vom Karma ab, das man braucht, um in einem höheren Reich wiedergeboren zu werden."
 four_heavenly_kings: "Vier himmlische Könige"
 four_heavenly_kings_desc: "Die vier himmlischen Könige herrschen jeweils über eine der Himmelrichtungen und sind für den Schutz des Deva-Reichs vor den Asura zuständig. Sie sind auch dafür verantwortlich, über die Tugend und die Moral unter den Sterblichen zu wachen."
 vegetarianism: "Vegetarismus"
 vegetarianism_desc: "Obwohl von Schule zu Schule Unterschiede bestehen, gibt es doch immer Regeln im Dharma bezüglich der fleischlosen Ernährung. Jede Schule hat andere Regeln dazu, wie streng diese Enthaltsamkeit geachtet wird und ob sie nur in Klostergemeinschaften oder für die breite Bevölkerung gilt."
 edicts_of_ashoka: "Ashoka-Edikte"
 edicts_of_ashoka_desc: "Ein Gesetzbuch, das Kaiser Ashoka der Große im Jahr 300 v. u. Z. herausgab. Darin enthalten ist auch die Förderung des Buddhismus. Obwohl es viele Jahrhunderte alt ist, verdient es dennoch nach wie vor großen Respekt und Verehrung seitens aller buddhistischen Gläubigen."
 five_precepts: "Fünf Silas"
 five_precepts_desc: "Die $five_precepts$ dienen als Grundlage der buddhistischen Ethik und Moral: Sie stellen die grundlegendsten Regeln dar, an die sich jeder halten muss, der dem Buddhismus folgt – ungeachtet dessen, ob man Teil einer geweihten Klostergemeinschaft ist oder nicht. Sie weisen das Volk an, nicht zu töten, nicht zu stehlen, kein sexuelles Fehlverhalten zu begehen, nicht zu lügen und sich nicht zu berauschen."
 monastic_communities: "Klostergemeinschaften"
 monastic_communities_desc: "Der Mittelpunkt des buddhistischen Lebens sind seine Gemeinschaften von Mönchen und Nonnen, die man #italic Sangha#! nennt. Sie werden von #italic Vinaya#! festgelegt, dessen Regeln und Gebote über das Verhalten aller buddhistischen Klostergemeinschaften bestimmen."
 prestigious_schools: "Prestigeträchtige Schulen"
 prestigious_schools_desc: "Der Buddhismus hat sich zu einer Vielzahl von Schulen entwickelt, die sich jeweils auf eine Art von Klostergemeinschaft gründen und bestimmte Schriften vorziehen. Manche dieser Schulen haben allerdings mehr Anerkennung erfahren, wohingegen andere in Vergessenheit gerieten. Wenn man uns mit den prestigeträchtigeren in Verbindung bringt, erlangt unser Volk einen Abglanz dieser Anerkennung."
 offerings: "Opfergaben"
 offerings_desc: "Es ist eines der Gebote des Buddhismus, das man den Drei Juwelen Opfergaben bringt, um Gunst zu erlangen. Diese Opfergaben könnten materiell oder nicht materiell sein, und manche Klostergemeinschaften sind für ihr Überleben darauf angewiesen, dass ihre Anhänger ihnen Nahrung spenden."
 incense_burning: "Weihrauchverbrennung"
 incense_burning_desc: "Die Praktik, Weihrauch zu verbrennen, gehört fest zu buddhistischen Ritualen und Opfergaben. Es ist üblich, dass Laien wie Mönche und Nonnen in Orden bei allen Ritualen und Meditationen unterschiedlich geformten und gestalteten Weihrauch entzünden. Daher durchdringt der Geruch von Weihrauch auch alle buddhistischen Tempel."
 ascetic_practices: "Asketische Praktiken"
 ascetic_practices_desc: "Obwohl uns der Buddha vor den Gefahren übersteigerter Askese warnte, praktiziert man in manchen Klostergemeinschaften dennoch gewisse Formen der Enthaltsamkeit. Es gibt Einschränkungen bei der Art von Kleidung, die man trägt, bei den Speisen, die man isst, und hinsichtlich der Orte, an denen man leben darf. Wer diesen Pfad beschreiten möchte, muss sich an diese Vorgaben halten, was zwar keine gesonderte Gunst einbringt, aber dem Praktizierenden dennoch ganz eigene Vorteile verschaffen kann."
 mindfulness: "Achtsamkeit"
 mindfulness_desc: "Ein entscheidender Teil der Praktiken des Buddhismus ist die $mindfulness$, was bedeutet, dass man sich der Phänomene des eigenen Körpers und Geistes bewusst ist, sich zugleich aber auch stets die Lehren Buddhas vor Augen hält. So lässt sich das Erstarken ungewollter Zustände vermeiden und die Entwicklung erwünschter Zustände voranbringen."
 dana: "Dāna"
 dana_desc: "$dana$ steht für Großzügigkeit und wird als ein Geben ohne Gegenleistung definiert. Dies ist eine Schlüsseltugend in allen Religionen, die mit dem Dharma verbunden sind. Anderen selbstlos zu helfen – ob nun einzeln oder gemeinschaftlich –, ist einer entscheidenden Wege, um Karma anzusammeln."
 ahimsa: "Ahiṃsā"
 ahimsa_desc: "Das Konzept der $ahimsa$ oder Gewaltlosigkeit ist eine Schlüsseltugend in allen Religionen, die dem Dharma folgen. Jeder Konflikt sollte friedlich durch einen Dialog anstelle von Gewalt gelöst werden. Leider ist dies nicht immer möglich, doch Gewalt sollte stets das Mittel der letzten Wahl sein, und man darf nur zu ihr greifen, wenn es gerecht ist."
 resistance_to_persecution: "Verfolgungsresistent"
 resistance_to_persecution_desc: "Obschon er sich weit verbreitet hat, litt auch der Buddhismus im Lauf der Jahrhunderte unter Verfolgung. Seine Tempel und Bilder wurden zerstört und seine Anhänger abgeschlachtet oder in den Untergrund getrieben, doch trotz allem ist der Glaube an sich stark geblieben."
 buddhist_meditation: "Buddhistische Meditation"
 buddhist_meditation_desc: "Eine ungeachtet der Schulzugehörigkeit unter Buddhisten weit verbreitete Praktik ist die Meditation. Sie zielt darauf ab, den Verstand und den Geist auszubilden, um Achtsamkeit, Seelenruhe und Einsicht zu entwickeln und so zur Erleuchtung zu gelangen."
 #Hinduism
 sruti: "Shrutis"
 sruti_desc: "$sruti$ („das Gehörte“) sind die ältesten und heiligsten Schriften des Hinduismus. Sie gelten als göttliche Offenbarung und werden daher keinem menschlichen Verfasser zugeschrieben, wobei manche ihren göttlichen Ursprung bestreiten und dennoch ihre Autorität anerkennen."
 vedah: "Veden"
 vedah_desc: "Die Haupttexte unter den $sruti$ sind die $vedah$, was die ältesten Texte in Sanskrit meint. Als Verfasser wird im $mahabarata$ Brahmā genannt, und die einzelnen Sammlungen heißen Rigveda, Yajurveda, Sāmaveda und Atharvaveda."
 smrti: "Smritis"
 smrti_desc: "$smrti$ („das Erinnerte“) sind Texte, die von den $vedah$ inspiriert wurden oder aus ihnen stammen. Damit haben sie weniger Autorität als die $sruti$, da sie Ableitungen von diesen sind. Anders als die $sruti$ werden $smrti$ bestimmten Verfassern zugeschrieben und über Manuskripte weitergegeben."
 mahabarata: "Mahabharata"
 mahabarata_desc: "Das $mahabarata$ ist neben dem $ramayana$ einer der beiden wichtigsten Texte der $smrti$. Es handelt sich bei ihm um ein Epos aus dem antiken $india$. Es ist zudem das längste epische Gedicht, das je geschrieben wurde, und etwa zehnmal länger als die griechische #italic Ilias#! und #italic Odyssee#! zusammen. Es erzählt die Geschichte des dynastischen Ringens um den Thron des antiken indischen Königreichs Kuru. Dieses mündet schließlich im $mahabarata$-Krieg und endet mit dem Tod von $krishna_avatar$ und dem Untergang seiner Dynastie."
 ramayana: "Ramayana"
 ramayana_desc: "Als einer der beiden wichtigsten $smrti$-Texte (zusammen mit dem $mahabarata$) ist auch das $ramayana$ ein Epos aus dem antiken $india$. Es erzählt die Geschichte von $rama_avatar$, dem Avatar $vishnu_god$s als Prinz des Königreichs Kosala. Es betont die Bedeutung der Tugend in allen Aspekten des eigenen Lebens."
 purana: "Puranas"
 purana_desc: "Die $purana$ gelten als Teil der $smrti$ und sind Schriften unterschiedlichen Inhalts. Kosmologie, göttliche Abstammungen, Astronomie, Grammatik, Liebesgeschichten – man findet wirklich alles Mögliche darin. Trotzdem und obwohl sie nicht Teil der $sruti$ ist, ist ihr Einfluss auf den hinduistischen Glauben und die hinduistische Gesellschaft unbestreitbar, denn viele örtliche Glaubensvorstellungen und Traditionen werden durch sie in das gemeinsame Narrativ der $vedah$ integriert."
 atman: "Atman"
 atman_desc: "Der $atman$ bezeichnet das wahre und ewig unveränderliche Selbst, die Essenz des Bewusstseins jeder Person. Laut den $astika$-Schulen ist dieser $atman$ etwas anderes als Körper und Geist und unterscheidet sich auch vom Jivatman, der mehrere Lebenszeiten überdauert. Die Nastika-Schulen hingegen deuten das Konzept anders oder lehnen es sogar ganz ab."
 nastika_schools: "Nastika-Schulen"
 nastika_schools_desc: "Manche Denkschulen des Hinduismus haben sich von den Hauptströmungen abgespalten und lehnen die Autorität der $vedah$ und die Existenz des $atman$s ab. Diese Schulen sind wie der Jainismus der Buddhismus daher heterodox, auch wenn sie viele gemeinsame Kernglaubensvorstellungen mit dem Hinduismus teilen."
 astika_schools: "Astika-Schulen"
 astika_schools_desc: "Diese Schulen des Hinduismus werden auch als orthodox bezeichnet: Sie akzeptieren die Autorität der $vedah$ und die Existenz des $atman$s. Auch wenn es viele unterschiedlichen Schulen gibt, sorgt diese gemeinsame Akzeptanz doch dafür, dass die $astika_schools$ viele Schnittmengen aufweisen."
 diversity_of_beliefs: "Glaubensdiversität"
 diversity_of_beliefs_desc: "Die Glaubensvorstellungen der Menschen $india$s drehen sich um das Konzept des Dharma und die Texte der $vedah$, doch sie manifestieren sich in einer breiten Palette von Formen und Praktiken. Selbst die anerkannten und verehrten Götter unterscheiden sich untereinander, doch es gibt dennoch einen roten Faden an Konzepten, die man überall findet."
 ishvara: "Ishvara"
 ishvara_desc: "Je nach Schule und Zweig des Hinduismus wird der $ishvara$ unterschiedlich ausgelegt, meint aber das höchste Wesen oder Gott. Es kann sich daher im $shaivism$ auf $shiva_god$, im $vaishnavism$ auf $vishnu_god$ oder auf den persönlichen Gott einer Person beziehen."
 sanskritization: "Sanskritisierung"
 sanskritization_desc: "Der Hinduismus hat sich weit über seine Ursprüngen in $india$ hinaus verbreitet, und viele andere Kulturen und Länder haben Konzepte und Titel aus dem Sanskrit übernommen, um ihre eigene Identität zu beschreiben. So haben hinduistische Vorstellungen mit Leichtigkeit fremdländische Glauben durchdrungen und sich mit ihnen vermischt."
 bhakti_movement: "Bhakti-Bewegung"
 bhakti_movement_desc: "Seit ihrer Entstehung im 6. Jahrhundert fördert sie Liebe und Ergebenheit gegenüber dem eigenen persönlichen Gott oder einer erleuchteten Person. Die allgemeine Bevölkerung fordert sie auf, unverwandt in ihren eigenen Worten mit ihnen zu sprechen. Als äußerst einflussreiche Bewegung veränderte sie, wie Religion und Glaube von der Bevölkerung empfunden wurden."
 yoga: "Yoga"
 yoga_desc: "$yoga$ ist eine der hinduistischen Schulen und Philosophien, aber zugleich auch eine Reihe körperlicher und spiritueller Praktiken, die Geist und Körper kontrollieren sollen. Es wird seit Jahrtausenden praktiziert und ist fast schon zum Synonym für den Pfad des Erleuchteten geworden."
 diwali: "Diwali"
 diwali_desc: "$diwali$ ist ein Lichterfest, bei dem man den Triumph des Dharma feiert: den Sieg des Guten über das Böse und des Lichts über die Finsternis. Man entzündet dabei Kerzen und Laternen, die eben dies symbolisieren. Zugleich werden damit auch unsere Ahnen geehrt."
 holi: "Holi"
 holi_desc: "$holi$ findet zu Beginn des Frühlings statt, um dessen Ankunft zu feiern. Es ist ein Fest der Farben und der Liebe, bei dem man der Landwirtschaft und einer guten Ernte gedenkt, zugleich aber auch die Vielzahl von Farben genießt, die der Frühling zu bieten hat. Es ist überdies eine Zeit der Vergnügungen und der Beilegung von Streitigkeiten, um sich von eigenen gefühlsmäßigen Unreinheiten zu läutern."
 holy_rivers: "Heilige Flüsse"
 holy_rivers_desc: "Flüsse und deren Verehrung sind seit jeher ein wichtiger Teil des Hinduismus. Vom Indus bis zum Ganges gibt es viele Flüsse, die als heilig gelten und an deren Ufern man viele Rituale abhält. Auch ihr Wasser gilt als heilig, weswegen Reinigungsrituale verbreitet sind."
 advaita_vedanta: "Advaita-Vedanta"
 advaita_vedanta_desc: "In Ablehnung des Dualismus von Bewusstsein und Materie geht der $advaita_vedanta$ davon aus, dass der $atman$ (oder das innerste Bewusstsein) mit der obersten Wirklichkeit oder dem obersten Bewusstsein des Universums – dem Brahman – identisch ist. In diesem Sinne ist die stoffliche materielle Welt also nur eine Illusion, die die oberste Wirklichkeit des Brahman verbirgt."
 hindu_muslim_relations: "Hinduistisch-muslimische Beziehungen"
 hindu_muslim_relations_desc: "In der Vergangenheit gab es schon viele Interaktionen zwischen Hinduismus und Islam, und dies wird sich wohl auch fortsetzen. Unsere Völker haben gelernt, friedlich miteinander zu leben, und es gibt sogar ein gewisses Maß an Synkretismus zwischen den beiden Glauben."
 hindu_unification: "Hinduistische Einheit"
 hindu_unification_desc: "Trotz der Unterschiede in Glaube und Praktiken innerhalb des Hinduismus gibt es doch mehr Dinge, die uns einen, als solche, die uns trennen. Eine allgemeine geeinte Sicht des Hinduismus ist in der Entstehung begriffen, aus der unser Volk ein großes Gefühl der Einigkeit ziehen könnte."
 hindu_architecture: "Hinduistische Architektur"
 hindu_architecture_desc: "Ungeachtet ihrer Bauart – sei es Śikhara, Vimāna oder Prāṅg – zeichnen sich hinduistische Tempel vor allem durch ihre hohen geschmückten Türme aus. Als Darstellung des $mount_meru$, die je nach Region unterschiedliche Schwerpunkte aufweist, dienen diese Spitzen als Symbol und Machtdemonstration gleichermaßen."
 varna_system: "Varna-System"
 varna_system_desc: "Schon seit der Zeit der $vedah$ gibt es die Vorstellung, dass das Dharma einer Person sich in eine von vier „Möglichkeiten“ einordnen lässt: #italic Brāhmaṇa#!, Gelehrte oder Priester; #italic Kṣatriya#!, Herrscher oder Krieger; #italic Vaiśya#!, Bauern und Händler; oder #italic Śūdra#!, Handwerker oder Diener. Diese Unterteilungen sind nicht völlig starr, sondern stellen eher das Ideal einer persönlichen Berufung dar. Trotzdem haben sie großen Einfluss in der hinduistischen Gesellschaft."
 extreme_pacifism: "Extremer Pazifismus"
 extreme_pacifism_desc: "Auf Grundlage der $ahimsa$ tritt der Hinduismus seit jeher für Pazifismus und Gewaltlosigkeit ein. Doch unsere Feinde sollten trotzdem zögern, uns zu reizen, damit wir nicht ins völlige Gegenteil verfallen, wenn man uns zum Krieg nötigt."
 hindu_empires: "Hinduistische Großreiche"
 hindu_empires_desc: "Es gab schon viele Großreiche, die dem Hinduismus folgten. Angefangen bei den Maurya- und Gupta-Reichen in $india$ bis zum Śrīvijaya-Reich in $indonesia_region$ und der beständigen Chola-Dynastie stand der Hinduismus seit jeher hinter dem Thron mächtiger Herrscher."
 sacred_cattle: "Heilige Kühe"
 sacred_cattle_desc: "Im Rahmen der $ahimsa$ ist die Schlachtung von Rindern verboten. Daher werden sie als mütterliche Figuren und als Symbol der selbstlosen Versorgung und des Opfers geachtet und verehrt. Sie werden schon seit der Zeit der $vedah$ verehrt und verdienen demzufolge unseren Respekt und Aufmerksamkeit."
 #Asia
 riches_of_asia: "Reichtümer $asia$s"
 riches_of_asia_desc: "$asia$ ist in der ganzen Welt berühmt für seinen Reichtum. Angefangen bei den wohlhabenden Städten $persia_region$s und $india$s bis hin zu den gesuchten Luxusgütern $china$s und den beinahe mythischen Gewürzinseln in $indonesia_region$: Die Waren und Reichtümer $asia$s werden rund um den Globus geschätzt."
 silk_road: "Seidenstraße"
 silk_road_desc: "Sei es über die Wüste Gobi und $persia_region$ oder über die Seerouten durch den Indischen Ozean und $indonesia_region$: Die Lande $asia$s werden schon seit Jahrhunderten von Händlern durchquert, die lukrative Geschäfte entlang der berühmten Seidenstraße machen."
 exchange_of_ideas: "Ideenaustausch"
 exchange_of_ideas_desc: "Nicht nur Geld und Gewinne bewegen sich entlang der $silk_road$, sondern auch Ideen und Wissen strömt wie Ebbe und Flut mit den Händlern entlang dieser Pfade."
 legacy_of_great_empires: "Erbe von Großreichen"
 legacy_of_great_empires_desc: "Vom Drachenthron $china$s und den verschiedenen Reichen $persia_region$s bis hin zu den mächtigen hinduistischen und buddhistischen Dynastien $india$s und $south_east_asia$s hat $asia$ eine lange Geschichte mächtiger Großreiche, die ihre Präsenz über das Land festigen."
 arduous_terrain: "Mühsames Gelände"
 arduous_terrain_desc: "In $asia$ gibt es einige äußerst ungastliche Landstriche, darunter die hohen Gipfel des Himalaja, die trockene Einöde der Wüste Gobi und die dichten Dschungel $india$s und $south_east_asia$s – ganz zu schweigen von Monsun- und Taifunzeiten und den ständig drohenden Erdbeben. Die Bevölkerung hat gelernt, auch in solch unwirtlichen Umgebungen zu leben, doch Eindringlinge könnten es nicht so leicht haben."
 fertile_lands: "Fruchtbares Land"
 fertile_lands_desc: "Allgemein sind die Lande $asia$s fruchtbar und durch den Regen und die vielen breiten Flüsse gut versorgt, und dies selbst in Regionen, die sonst wenig Niederschlag haben. Abgesehen von den trockensten Regionen der Wüste bietet das Land mehr als ausreichend Nahrung für die Bevölkerung. Sogar in Regionen, in denen dies nicht der Fall ist, haben die Menschen dennoch einen Weg gefunden, dort zu überleben."
 crossroads_of_religions: "Schmelztiegel der Religionen"
 crossroads_of_religions_desc: "Hinduismus, Buddhismus, Islam und sogar Tengrismus sind Religionen, die in ihrer Ausdehnung weit über ihren Ausgangpunkt hinausgewachsen sind. $asia$ wurde Zeuge des Austauschs solcher Glaubensvorstellungen und in vielen Fällen auch der Vermischung und des Synkretismus, der unter ihnen stattfand."
 religious_syncretism: "Synkretismus"
 religious_syncretism_desc: "Die Interaktion verschiedener Glauben und Praktiken hat bisweilen nicht zu gegenseitiger Ablehnung geführt, sondern zu einer Vermischung und Übernahme von Vorstellungen und Riten in den eigenen Glauben. Daher ist die Präsenz fremdländischer Denkweisen und religiöser Ansichten nicht nur als feindselig zu betrachten, sondern auch als Gelegenheit, etwas zu lernen."
 source_of_knowledge: "Quelle des Wissens"
 source_of_knowledge_desc: "Manche Länder prahlen damit, an vorderster Front des Wissens und der Entwicklung zu stehen, doch manche ihrer „Erfindungen“ sind in $asia$ schon seit Jahrhunderten bekannt. Angefangen beim technischen Können $china$s bis hin zur uralten Literatur $india$s gibt es keinen Grund für den Osten, den Westen zu beneiden."
 structured_society: "Strukturierte Gesellschaft"
 structured_society_desc: "Die Gesellschaften $asia$s sind im Allgemeinen sehr strukturiert – jeder Einzelne weiß, welche Rolle er in seiner Umgebung spielt. Beeinflusst durch philosophische Gesellschaftsvorstellungen des Hinduismus und des $SECT_CONFUCIANISM_NAME$ laufen die Dinge in $asia$ meist runder als anderswo."
 incense_preeminence: "Weihrauchvorherrschaft"
 incense_preeminence_desc: "Weihrauch gehört in $asia$ seit Jahrhunderten zum Alltag, vielleicht sogar mehr als irgendwo sonst auf der Welt. Auch einige andere Religionen verwenden ihn bei Ritualen, doch in hinduistischen und buddhistischen Zeremonien ist er allgegenwärtig, was ebenso für das alltägliche Leben von Muslimen gilt, sodass er in $asia$ ständig und überall in Erscheinung tritt."
 incense_trade_route: "Weihrauchhandelsrouten"
 incense_trade_route_desc: "Die große Nachfrage nach Weihrauch – nicht nur in Asien, sondern auch darüber hinaus – erfordert viele Handelsrouten, um sie zu befriedigen. Ähnlich wie die berühmtere $silk_road$ verbindet auch der Handel mit Weihrauch Ost und West."
 wake_of_the_mongol_horde: "Nachgang der mongolischen Horde"
 wake_of_the_mongol_horde_desc: "Es gibt fast keinen Ort in $asia$, der nicht von den mongolischen Eroberungen beeinflusst worden wäre. Nach dem großen Reich, das $genghis_khan_name_no_tooltip$ schuf, erholt sich das Land nun von den trampelnden Hufen seiner Pferde."
 cultural_melting_pot: "Schmelztiegel der Kulturen"
 cultural_melting_pot_desc: "$asia$ ist vor allem auch die Heimat einer breiten Palette unterschiedlichster Kulturen. Diese Diversität und der ständige Austausch über Jahrhunderte hinweg haben es den Ländern in $asia$ erlaubt, aufzublühen, indem sie Ideen und Einflüsse untereinander austauschen."
 rise_of_great_individuals: "Aufstieg großer Persönlichkeiten"
 rise_of_great_individuals_desc: "Die Geschichte beweist, dass sich immer wieder bedeutende Persönlichkeiten erheben und Großes vollbringen. Ein ums andere Mal wurden Großreiche durch einzelne Herrscher geschaffen oder vernichtet – eine Leistung, die man respektieren und bewundern muss."
 #Orthodox
 the_pentarchy: "Die Pentarchie"
 the_pentarchy_desc: "Die von Kaiser Justitian formulierte alte Struktur der Kirche gilt im orthodoxen Glauben noch in vollem Ausmaß. Selbst wenn der Patriarch von $rome$ in seinem Katholizismus meint, über allen anderen zu stehen, haben die Städte $constantinople$, $alexandria$, $antioch$ und $jerusalem$ doch alle ihre eigene Vorherrschaft."
 imperial_creed: "Kaiserglaube"
 imperial_creed_desc: "Der orthodoxe Glaube war seit jeher der offizielle Glaube des Römischen Reichs, seit es den christlichen Glauben annahm. Die Ketzereien des Westens und ihre falsch gekrönten „Kaiser“ werden die Legitimität unserer Linie nicht beeinträchtigen."
 filioque_issue: "Filioque-Debatte"
 filioque_issue_desc: "Die hinterhältige Hinzufügung des #italic Filioque#!-Zusatzes durch westliche Ketzer geschah ohne Anweisung eines ordentlichen Konzils, das darüber beschieden hätte – und damit ist der Zusatz unrechtmäßig. Nur wir bewahren die richtige Art des Gebets, und sie sind dazu verdammt, als Ketzer auf ewig in der Hölle zu schmoren."
 septuagint: "Septuaginta"
 septuagint_desc: "Unser Altes Testament ist in Griechisch, in jener Fassung, die man $septuagint$ nennt – eine Übersetzung aus dem Hebräischen. Im 3. Jahrhundert v. u. Z. wurde sie von 72 abgeschotteten Übersetzern angefertigt, die unabhängig voneinander alle zum gleichen Wortlaut kamen. Damit ist sie eindeutig vom Himmel eingegeben und das direkte Wort Gottes."
 anagignoskomena: "Anagignoskomena"
 anagignoskomena_desc: "Unsere Bibel enthält alle Bücher, die es wert sind, verehrt und studiert zu werden, auch wenn einige vielleicht weniger wichtig sind als andere. Die $anagignoskomena$ sind nicht Teil der hebräischen Bibel und damit von geringerer Bedeutung als andere Texte, doch nichtsdestotrotz sind sie es wert, gelesen zu werden, und man sollte sie nicht missachten."
 church_guidance: "Kirchenanleitung"
 church_guidance_desc: "Die Heilige Schrift ist das Wort Gottes, doch nur die Kirche vermag sie richtig zu deuten und den Schäfchen zu vermitteln. Jedes unabhängige Lesen und Deuten der Heiligen Schrift ohne Anleitung durch die Kirche kann nur dazu führen, dass man sich in Falschheiten verläuft und auf den Weg der Ketzerei gerät."
 unchanging_tradition: "Unveränderliche Tradition"
 unchanging_tradition_desc: "Die von Jesus Christus und den Aposteln an uns weitergegebene Tradition hat ohne Veränderungen, Hinzufügungen oder Auslassungen Bestand. Dies liegt darin begründet, dass der Glaube selbst unveränderlich ist und von allen überall gleich praktiziert wird."
 church_councils: "Kirchenkonzile"
 church_councils_desc: "Als Kirche müssen wir geeint sein: Jede Angelegenheit, die zu groß ist, als dass ein Bischof sie klären könnte, erfordert die Einberufung eines Konzils, bei dem Bischöfe den Geist der Kirche selbst ergründen. Somit spiegeln die Entscheidungen eines Konzils den Konsens der Kirche als Ganzes wider."
 greek_rite: "Griechischer Ritus"
 greek_rite_desc: "Unsere Riten und kanonischen Praktiken sind seit Jahrhunderten gut ausdefiniert und folgen dem byzantinischen Ritus von $constantinople$. Obschon es an manchen Orten kleinere Abweichungen gibt, herrscht innerhalb des orthodoxen Glaubens im Allgemeinen eine Homogenität bei den Riten."
 physical_body_of_christ: "Körperlicher Leib Christi"
 physical_body_of_christ_desc: "Unsere Kirche ist die körperliche Manifestation des Leibes Christi auf Erden, der sich nicht von jenem im Himmel unterscheidet. Insofern ist die Kirche die Verkörperung des Erlösers, die zum Wohl ihres Volkes entsandt wurde."
 sight_veneration: "Sichtliche Verehrung"
 sight_veneration_desc: "Der wichtigste Aspekt der Verehrung besteht darin, die Gläubigen durch ihre eigenen Sinne an ihren Glauben zu erinnern. Somit werden unsere Kirchen mit leuchtenden Farben und Bildern geschmückt, auf dass ein jeder die Anwesenheit Christi auf Erden spüre."
 theotokos: "Theotokos"
 theotokos_desc: "Die Jungfrau Maria ist eine Schlüsselfigur für uns, da sie den alten Bund erfüllte, indem sie den neuen Bund in der Gestalt Christi in sich trug. Da Christus der fleischgewordene Gott ist, ist Maria wortwörtlich die Mutter Gottes und genießt eine herausgehobene Stellung unter allen anderen Heiligen."
 heavenly_architecture: "Himmlische Architektur"
 heavenly_architecture_desc: "Orthodoxe Sakralgebäude wurden als Nachbildung des Himmels entworfen. Sie wurden zentralisierter gebaut als jene im Westen: Sie beruhen auf der Basilika, deren zentrale Kuppel mit ihrem Dach den Himmel symbolisiert. Sie ist stets mit Bildern und Ikonen bedeckt, deren Anblick ein wahres Wunder ist."
 iconostasis: "Ikonostase"
 iconostasis_desc: "Eine der wichtigsten Einrichtungen in orthodoxen Kirchen ist die $iconostasis$, eine Wand aus Ikonen, die den Hauptraum des Gebäudes vom Altar trennt. Die Ikonen darin dienen zur Veranschaulichung der Verbindung zwischen den Gläubigen und dem Allerheiligsten und somit auch als Verbindung zwischen Himmel und Volk: Die Ikonen geleiten gleichsam das Volk zum Himmel."
 julian_calendar: "Julianischer Kalender"
 julian_calendar_desc: "Die Zeitrechnung unseres Landes und der Kirche wird seit Jahrhunderten durch den Julianischen Kalender gemessen, den Julius Cäsar 46 v. u. Z. einführte. Er eint nicht nur alle orthodoxen Nationen, sondern dient auch dazu, genau festzulegen, wann wichtige Festtage und Feiern abzuhalten sind."
 paschal_cycle: "Pascha-Zyklus"
 paschal_cycle_desc: "Der orthodoxe Glaube beinhaltet mehrere sich verschiebende Feiertage um #italic Pascha#! (Ostern) herum, die im $paschal_cycle$ organisiert sind. Die zehn Wochen vor Pascha werden Triodion genannt, während die 50 Tage nach Pascha Pentekostárion heißen. Dieser Zyklus markiert die wichtigsten Feiern des liturgischen Jahrs."
 oktoechos: "Oktōēchos"
 oktoechos_desc: "Das $oktoechos$ ist ein System zum Schreiben von Musik, das acht Tonarten umfasst und schon seit Jahrhunderten für religiöse Gesänge und Kirchenmusik Verwendung findet. Es ist das Fundament orthodoxer Gesänge, wobei es gewisse Variationen zwischen den Kulturen gibt."
 prestigious_monasticism: "Prestigeträchtiges Klosterleben"
 prestigious_monasticism_desc: "Im orthodoxen Glauben schätzt man Klosterleben und Askese sehr hoch ein, und man erachtet sie beinahe als eine grundlegende Anforderung. Ein Bischof muss zunächst Mönch gewesen sein und vor der Weihe erst Mönch werden, falls dem nicht so sein sollte. Daher haben Klöster und monastische Zentren großen Einfluss auf unser klerikales Leben."
 national_rites: "Nationalriten"
 national_rites_desc: "Das Vorhandensein der unterschiedlichen Autokephalpatriarchate in unserer Kirche erlaubt gewisse Variationen bei den Nationalriten jedes Landes. Doch dadurch ist weder die Einigkeit der Botschaft bedroht noch wird die Kirche als geschlossene Entität aufgebrochen."
 heirs_of_rome: "Erben Roms"
 heirs_of_rome_desc: "Es gab schon viele Völker, die für sich in Anspruch nahmen, Erben Roms und des gesamten Römischen Reichs zu sein. Doch allein unser Glaube ist der wahre Glaube des alten Kaiserreiches, und nur wir können rechtmäßig den Anspruch erheben, uns direkt von ihm abzuleiten."
 legacy_of_saint_andrew: "Vermächtnis des Heiligen Andreas"
 legacy_of_saint_andrew_desc: "Der Legende nach besuchte der Heilige Andreas Skythien und die Nordufer des Schwarzen Meers, wo er eine große zukünftige Entwicklung des Christentums vorhersagte, als er jenen Ort erreichte, wo später $kyiv$ gegründet werden sollte."
 christianization_of_the_slavs: "Christianisierung der Slawen"
 christianization_of_the_slavs_desc: "Das Volk der Kiewer Rus gehörte zu den ersten ostslawischen Völkern, die das Licht Christi annahmen und zum orthodoxen Glauben konvertierten. Von hier verbreitete sich der Glaube in nah und fern unter den östlichen Völkern."
 cyril_and_methodius: "Kyrill und Method"
 cyril_and_methodius_desc: "Diese beiden byzantinischen Theologen des 9. Jahrhunderts leisteten einen großen Beitrag zur Evangelisierung der Slawen. Ihnen wird die Schaffung der glagolitischen Schrift zugeschrieben, mit der man zunächst $church_slavonic_language$ transkribierte. Ihre Anhänger entwickelten später das kyrillische Alphabet, das sogar zur Ehren von Kyrill nach diesem benannt wurde."
 interaction_between_church_and_state: "Wechselspiel von Kirche und Staat"
 interaction_between_church_and_state_desc: "Die Patriarchen haben absolute Autorität über ihre Patriarchate und deren Bewohner. Indem wir ihre Autorität mit der des Herrschenden verknüpfen, nutzen wir die Ressourcen der Kirche, um die Autorität des Staats zu stärken."
 outwards_expansion: "Äußere Ausdehnung"
 outwards_expansion_desc: "Es ist die heilige Pflicht der Kirche, das Licht Christi zu den Heiden und den Ungläubigen zu tragen. Daher müssen wir jenseits unserer Grenzen nach jenen suchen, deren Seelen es noch zu erlösen gilt."
 justified_holy_wars: "Gerechtfertigte Religionskriege"
 justified_holy_wars_desc: "Wir dürfen nicht zulassen, dass Heiden und Ketzer unser Handeln bestimmen. Es ist unsere heilige Pflicht, das Land von ihrer Unreinheit zu befreien, damit das wahre Reich Gottes auf Erden Gestalt annehmen kann."
 resistance_to_the_infidels: "Widerstand gegen die Ungläubigen"
 resistance_to_the_infidels_desc: "Unsere orthodoxen Glaubensgeschwister finden sich unter dem Joch fremdländischer Ungläubiger wieder. Doch wir haben gelernt, eine solche Unterdrückung zu überdauern, und leben sogar mit diesen Ungläubigen zusammen."
 eastern_ecumenism: "Östliche Ökumene"
 eastern_ecumenism_desc: "Christliche Bekenntnisse der orientalischen Orthodoxie werden von den Unkundigen oft mit der östlichen Orthodoxie verwechselt. Obwohl sie in vielen entscheidenden Fragen abweichen, sind sie dennoch alle Christen und haben so viel mit uns gemein, dass man sie zum richtigen Glauben zurückführen kann."
 structured_patriarchates: "Strukturierte Patriarchate"
 structured_patriarchates_desc: "Unsere Patriarchate waren seit jeher gut organisiert und strukturiert, wobei jedes seine eigenen Zuschreibungen und Beschränkungen aufweist. Dies erlaubt es der Kirche als Ganzes, besser zu agieren, und infolgedessen gilt dies auch für den Staat."
 #Miaphysitism
 second_council_of_ephesus: "Zweite Konzil von Ephesos"
 second_council_of_ephesus_desc: "Das zweite Konzil von Ephesos, kam 449 auf Betreiben von Patriarch Dioskoros von $alexandria$ zusammen und war ein rechtmäßiges christliches Konzil, obwohl katholische und orthodoxe Kirchen es ablehnten. In ihm wurde die Glaubensmeinung von Kyrill von Alexandria angenommen, derzufolge Jesus Christus nach der Vereinigung des Göttlichen und des Menschlichen in der Inkarnation nur eine einzige, göttliche Natur aufweist."
 rejection_of_chalcedon: "Ablehnung von Chalkedon"
 rejection_of_chalcedon_desc: "Da man das $second_council_of_ephesus$ nicht annahm, bestand Papst Leo I. auf der Einberufung des Konzils von Chalkedon, bei dem das $second_council_of_ephesus$ annulliert wurde. Wir lehnen dieses falsche Konzil ab und stehen zu den Entscheidungen des ursprünglichen."
 monophysite_vs_miaphysite: "Monophysitisch gegen Miaphysitisch"
 monophysite_vs_miaphysite_desc: "Obwohl auch das $miaphysite$ verkündet, die Gestalt Christi habe nur eine einzige Natur, unterscheidet sie sich wesentlich von der eutychianischen monophysitischen Auffassung, derzufolge die Menschlichkeit Christi in seiner Göttlichkeit aufgegangen ist. Auch wenn manche uns als Anhänger des Monophysitismus bezeichnen, ist dies lediglich eine Schnittmenge bei den Worten, denn im Kern sind unsere Ansichten klar verschieden."
 original_christianity: "Urchristen"
 original_christianity_desc: "In der christlichen Welt gab es schon viele Schismen und Spaltungen, doch unser Bekenntnis hat seine Wurzeln beim ursprünglichen wahren Christentum, wie es im Ersten Konzil von Nicäa formuliert wurde. Danach spalteten sich nur noch Ketzer von diesem Hauptzweig ab."
 beyond_the_borders: "Jenseits der Grenzen"
 beyond_the_borders_desc: "Das Christentum hat seine Ursprünge zweifelsohne in der Wiege des Römischen Reichs, und viele seiner Zweige gaben sich damit zufrieden, innerhalb dessen Grenzen zu bleiben. Das $miaphysite$ jedoch befand sich schon am Rande des Kaiserreichs, als es von den Chalkedoniern abgelehnt wurde, und hat es gewagt, seine Grenzen hinter sich zu lassen, um das Licht Gottes an fernere Orte zu tragen."
 isolated_reaches: "Abgeschiedene Weiten"
 isolated_reaches_desc: "Das Miaphysitische konnte sich an sehr fernen Orten verbreiten, wo unser Glaube selbst umgeben von Feinden und Ungläubigen stark geblieben ist."
 independent_leaders: "Unabhängige Anführer"
 independent_leaders_desc: "Aufgrund der Abgeschiedenheit des $miaphysite$s ist es von Zeit zu Zeit, schwierig in Verbindung mit anderen Patriarchen zu treten. Daher lernten unsere Anführer, unabhängig zu handeln, und fanden zugleich eigene Wege, um so oft wie möglich in Berührung mit anderen Christen zu kommen."
 jerusalem_focus: "Schwerpunkt auf Jerusalem"
 jerusalem_focus_desc: "Wir denken stets an die heilige Stadt $jerusalem$, und zwar nicht nur als Ort, an dem Jesus predigte und starb, sondern auch als Ort, wohin er bei seiner Wiederkunft zurückkehren wird. Daher beten wir immer in Richtung von $jerusalem$, ganz gleich, wo wir uns auch aufhalten mögen."
 acceptance_of_old_testament: "Annahme des Alten Testaments"
 acceptance_of_old_testament_desc: "Manche christlichen Bekenntnisse entschieden, die Bedeutung des Alten Testaments mit dem Argument zu mindern, die Ankunft Jesu mache es unwirksam. Wir hingegen halten es für weiter wichtig, und einige der Anweisungen darin sind ebenso gültig wie zu jener Zeit, als sie niedergeschrieben wurden."
 primacy_of_alexandria: "Primat von $alexandria$"
 primacy_of_alexandria_desc: "Das $miaphysite$ hat viele Zweige und unabhängige Anführer, doch wir alle erkennen $alexandria$ und seinen Sitz als unseren spirituellen Anführer an. Dies ist lediglich ein Zeichen des Respekts vor dem apostolischen Thron dort und ein Weg, ihn zu ehren, und weniger die Verleihung eines besonderen Vorrechts, das ihm zustünde."
 school_of_alexandria: "Schule von $alexandria$"
 school_of_alexandria_desc: "Die Katechetenschule von Alexandra soll laut dem Heiligen Hieronymus angeblich vom Apostel Markus selbst gegründet worden sein. Sie ist zumindest die älteste Katechetenschule der Welt. In ihr werden biblische und theologische Studien schon seit Beginn des Christentums selbst gelehrt. Obwohl die Schule selbst zerstört wurde, als der Bischof von $rome$ verkündete, über dem Patriarchen von $alexandria$ zu stehen, besteht ihre Tradition doch weiter."
 preserving_of_local_languages: "Bewahrung örtlicher Sprachen"
 preserving_of_local_languages_desc: "Trotz der Bedeutung von $greek_language$ und $latin_language$ im frühen Christentum hat das $miaphysite$ seine Liturgie in örtliche Mundarten wie $coptic_language$, $aramaic_language$ und $armenian_language$ übersetzt. Alle drei sind alte und traditionsreiche Sprachen, deren miapyhsitische Zweige ihre eigene historische Zunge auch bewahren."
 double_patriarchate: "Doppelpatriarchat"
 double_patriarchate_desc: "Sowohl $alexandria$ als auch $antioch$ sehen sich selbst als zwei unterschiedliche Patriarchate, eines für das $miaphysite$ und eines für den orthodoxen Glauben. Auch wenn beide die Legitimität ihrer Linie beanspruchen, bewahrt nur das $miaphysite$ die wahren Patriarchate."
 eastern_christianity: "Östliches Christentum"
 eastern_christianity_desc: "Wir sind ein Zweig des sogenannten „Östlichen Christentums“, das viele verschiedene Bekenntnisse mit unterschiedlichen theologischen und liturgischen Traditionen vermischt, aber auch viele gemeinsame kulturelle Aspekte aufweist."
 life_among_infidels: "Leben unter den Ungläubigen"
 life_among_infidels_desc: "Die Lande unseres Glaubens werden oft von der Anwesenheit Ungläubiger befleckt, doch deshalb sind unsere Prediger ins Unbekannte aufgebrochen, um das Licht Jesu in ferne Lande zu tragen. Somit können wir diese Ungläubigen stärker beeinflussen, als man erwarten würde, selbst wenn sie nicht erkennen, dass sie dem falschen Glauben anhängen."
 gradual_departure: "Schrittweiser Aufbruch"
 gradual_departure_desc: "Auch wenn sie rasch als Ketzer gebrandmarkt wurden, sagten sich die Miaphysiten doch nicht auf einen Schlag von der restlichen Christenheit los. Wir blieben in Verbindung mit den anderen Patriarchaten und nahmen an Konzilen teil, doch es wurde immer klarer, dass das Miaphysitische anders als andere ketzerische Glaubensformen ist."
 thrive_under_persecution: "Trotz Verfolgung gedeihen"
 thrive_under_persecution_desc: "Obwohl unsere Gläubigen seit Jahrhunderten von Ketzern und Ungläubigen verfolgt werden, hat unser Glaube überdauert. Ganz gleich, wie oft man uns niedermacht: Wir erheben uns immer wieder."
 preserver_of_national_identity: "Bewahrer der nationalen Identität"
 preserver_of_national_identity_desc: "Gerade weil sie unterdrückt und verfolgt wurde, kann unsere Kirche von sich behaupten, unsere Identität bewahrt zu haben. Im Schoß der Kirche erhielten sich unsere Sprachen und Traditionen am besten, und unser Glaube an sie ist ungebrochen."
 defense_against_heretics: "Abwehr der Ketzer"
 defense_against_heretics_desc: "Seit unserer Abspaltung von ihnen trugen die Ketzer viele Male Beschuldigungen und Verdammungen an uns heran. Sie nennen sich selbst Christen, doch ihre Ansichten sind von der Ketzerei verblendet, während unser Blick offen für das Licht Gottes ist."
 remote_patriarchates: "Ferne Patriarchate"
 remote_patriarchates_desc: "Da unser Volk erobert und verfolgt wurde, fielen auch die Sitze unserer Patriarchate viele Male in die Hände von Ungläubigen und standen unter deren Kontrolle. So waren wir gezwungen, unser Patriarchat an einen anderen Ort zu verlegen und zu übertragen, doch sein ursprünglicher Sitz wird bewahrt und verehrt, wenn auch nur aus der Ferne."
 further_reaches: "Weitere Weiten"
 further_reaches_desc: "Obwohl unser Glaube selbst meist von Ungläubigen umgeben ist, schafft er es dennoch, immer fernere Orte zu erreichen und sich unter verschiedenen Menschen und Kulturen zu verbreiten."
 internal_communion: "Innenkommunion"
 internal_communion_desc: "Obwohl sie unabhängige Patriarche besitzen, pflegen doch alle Zweige des Miaphysitentums Innenkommunion untereinander. So können wir enge Beziehungen zueinander unterhalten und für die Einigkeit der Kirche sorgen."
 cradle_of_monasticism: "Wiege des Mönchtums"
 cradle_of_monasticism_desc: "Die Tradition des christlichen Mönchtums wurde in $egypt_region$ geboren, als gläubige Christen dort in die Wüste zogen, um zu beten und ihr Leben Gott zu verschreiben. Durch ihre alexandrinische Tradition können die Miaphysiten diese Wiege als die ihre beanspruchen."
 unique_architecture: "Einzigartige Architektur"
 unique_architecture_desc: "Die verhältnismäßige Abgeschiedenheit unserer Patriarchate führte zu einzigartigen Architekturstilen bei unseren Sakralstätten. Andere christliche Bekenntnisse mögen bekannter sein, doch unser einzigartiger Architekturstil kann die Herzen der Gläubigen ebenso für sich gewinnen."
 #America
 #North American
 medicinal_infusions: "Arzneiaufgüsse"
 medicinal_infusions_desc: "Die heilenden Eigenschaften bestimmter Pflanzen helfen unserem Volk seit Jahrhunderten dabei, verschiedene Krankheiten zu überwinden. Aufgüssen mit einigen bestimmten Blättern sagt man gar nach, dass sie die Lebenspanne unseres Volks verlängern."
 canoe_travels: "Kanus"
 canoe_travels_desc: "Indem wir leichtere Kanus verwenden, nutzen wir die Wasserstraßen und Transportwege $north_america$s besser – was unsere Möglichkeiten, Handelsströme zu lenken, bedeutend erweitert."
 seasonal_economy: "Saisonale Wirtschaft"
 seasonal_economy_desc: "In unruhigen Zeiten müssen wir lernen, das Leben zu ertragen. Und das Leben ist gleichbedeutend mit der Natur. Der Wechsel der Jahreszeiten bedingt auch einen Wechsel unserer Bräuche. Dörfer müssen so wandelbar sein wie das Wetter."
 fishing_habits: "Fischfanggepflogenheiten"
 fishing_habits_desc: "Bisweilen ist es kaum zu glauben, dass manche Angehörige unseres Volkes an Land und nicht im Wasser geboren wurden, denn sie schwimmen mit einer solchen Beweglichkeit, dass es nahezu unmöglich ist, sie von der Strömung des Flusses zu unterscheiden."
 whale_hunters: "Walfänger"
 whale_hunters_desc: "Wale, Walrosse, Robben: All dies gibt uns das Meer, und es ist größer als unsere Stimmen oder als unsere unvorsichtigen Vorstellungen von Stolz. Alles, was das Meer uns schenkt, wird von uns gejagt."
 moundbuilding_advance: "Erdhügelbauer"
 moundbuilding_advance_desc: "Die Erdhügel $north_america$s sind große Denkmäler an die Leistungen unseres Volkes, und wir sollten ihren Aufbau in die Planungen für unsere Infrastruktur einbeziehen."
 bison_hunters: "Bisonjäger"
 bison_hunters_desc: "Bisons sind das Lebenselixier unseres Volkes. Wir nutzen jeden Teil dieses Tiers, um sein Opfer zu ehren. Wir nähren unser Volk mit seinem Fleisch, wir verwenden seine Knochen als Werkzeuge, wir tragen sein Fell gegen die Kälte der langen Winter und gebrauchen sein Leder für unsere Kleidung oder zum Abdecken unserer Tipis – und seine Seele dient als unser Symbol. Die Bedeutung des Bisons für unsere Kultur ist derart groß, dass wir uns ohne ihn verloren fühlen würden."
 federal_constitution: "Föderationsgründer"
 federal_constitution_desc: "Wir sollten uns mit unseren Verwandten zusammentun, um eine Föderation zu gründen, deren oberste Prioritäten Vertrauen und Fortentwicklung sind."
 shared_knowledge: "Wissensteilung"
 shared_knowledge_desc: "Innovation kann viele Formen annehmen, und wenn wir unseren Platz angesichts der Bedrohung durch rivalisierende Stämme wahren wollen, müssen wir jeden Vorteil nutzen, den wir bekommen."
 slash_and_burn: "Brandrodungslandwirtschaft"
 slash_and_burn_desc: "Bei dieser Form des Ackerbaus wird die vorhandene Vegetation abgeholzt und dann verbrannt, um eine nährstoffreiche Ascheschicht zu schaffen, die den Boden düngt. Hierdurch wird das Land gestärkt – auf Weise, wie etwas stärker wird, was einmal gebrochen wurde."
 council_of_elders: "Ältestenrat"
 council_of_elders_desc: "Die Regierung unseres Stamms gibt es, um sicherzustellen, dass alle Völker, die zu ihm gehören, eine Stimme und ein Mitspracherecht bei allen Entscheidungen besitzen. Bei der Verwaltung unseres Landes zusammenzuarbeiten, hilft uns dabei, neue Sichtweisen zu berücksichtigen."
 experienced_fur_hunters: "Pelzhandel"
 experienced_fur_hunters_desc: "Der Pelzhandel mit anderen Stämmen und Fremden ist ein wesentlicher Bestandteil unserer Wirtschaft. Wir sind sehr stolz auf unser Jagdgeschick und bieten daher Pelze von bester Güte an."
 #Mesoamerica
 pyramid_architecture: "Pyramidenarchitektur"
 pyramid_architecture_desc: "Die riesigen Steinpyramiden, die unsere Landschaft prägen, sind Bestandteil unserer architektonischen Traditionen seit den uralten Zeiten von Teotihuacán, Tikal, Copán und Palenque. Wir haben die Kunst des Pyramidenbaus nicht vergessen und können diese Tradition fortsetzen."
 ball_game: "Tlachtli"
 ball_game_desc: "Im Herzen des gesellschaftlichen Lebens unseres Landes steht dieses Ballspiel, bei dem Spieler versuchen, den Ball im Spielfeld zu halten, indem sie ihn mit der Hüfte treffen. Es ist sowohl eine rituelle Alternative zur Kriegsführung als auch ein großer Teil des religiösen Lebens."
 war_bonfires: "Kriegsfeuer"
 war_bonfires_desc: "Ein Netzwerk aus Grenzsiedlungen, die durch riesige Signalfeuer miteinander in Verbindung stehen, erlaubt es uns, Alarme rasch weiterzugeben und auf neue Bedrohungen zu antworten."
 merchant_officials: "Beamtenhändler"
 merchant_officials_desc: "Händler sind eine wertvolle Einnahmequelle für unser Land. Sie bringen unseren Herrschenden direkt Reichtum und melden, in welcher Lage sich unsere Nachbarn befinden."
 copperworking: "Kupferverarbeitung"
 copperworking_desc: "Unsere Handwerker haben damit begonnen, Werkzeuge aus dem Metall zu fertigen, das man in unseren Landen findet. Wenn wir dieses Handwerk meistern würden, würden wir einen immensen Vorteil gegenüber unseren Nachbarn erlangen."
 system_of_tributaries: "Tributsystem"
 system_of_tributaries_desc: "Herrscht man direkt über Territorien, geht dies mit großen Kosten zur Befriedung der örtlichen Bevölkerung und der unterworfenen Verwaltung einher. Einen treuen Herrscher einzusetzen und einen jährlichen Tribut zu verlangen, eliminiert das Risiko rivalisierender $altepetl$ und füllt dennoch unsere Staatskasse rasch und mit wenig Aufwand."
 refined_obsidian_weaponry: "Obsidianwaffen"
 refined_obsidian_weaponry_desc: "Schwarzes Obsidianglas ist ein hervorragendes Material für unterschiedlichste Werkzeuge. Das Glas ist hart und spröde, sodass man daraus leicht Klingen, Speer- und Pfeilspitzen herstellen kann, die Feinden tödliche Wunden zufügen."
 precious_stones_art: "Edelsteingravuren"
 precious_stones_art_desc: "Unser Gebiet ist reich an kostbaren Steinen, die auch ein ideales Material für Statuen, Spiegel und Vasen sind. Unsere Kunsthandwerker werden sich unsterblich machen, wenn sie daraus große Denkmäler unserer Kultur schaffen."
 cultivate_the_land: "Kultivierung des Landes"
 cultivate_the_land_desc: "Der Dschungel ist eine unwirtliche Umgebung, vor allem, wenn das eigene Volk Nahrung anbauen und nicht von der Hand in den Mund leben will. Die Rodung des Dschungels ist daher eine der wichtigsten Aufgaben einer Gesellschaft, die hier überleben und gedeihen will. Das Volk muss so organisiert sein, dass viele körperlich belastbare Menschen für diese Arbeiten zur Verfügung stehen, wann immer der Bedarf für sie da ist."
 feathered_serpent: "Die gefiederte Schlange"
 feathered_serpent_desc: "Eine in unseren Landen weitverbreitete Legende handelt von der gefiederten Schlange. Obwohl diese Figur bei vielen Völkern viele verschiedene Bedeutungen hat – Quetzalcōātl bei den Nahua, Kukulkan bei den Maya und Q’uq’umatz bei den Quiché –, so kann sie unserem Land auch als Quelle der Einheit dienen."
 ritual_bloodletting: "Ritueller Aderlass"
 ritual_bloodletting_desc: "In vielen Kulturen unseres Landes betrachtet man Vernarbung und Aderlass als ein dem Herrscher vorbehaltenes Mittel, den Göttern Tribut zu zollen. Durch die Bewahrung dieser Tradition bestätigen wir unser Anrecht auf die Herrschaft."
 #South America
 valley_irrigation: "Talübergreifende Bewässerung"
 valley_irrigation_desc: "Durch den Bau großer Kanäle, die die Wasserquellen der Täler unseres Heimatlandes miteinander verbinden, verbessern wir unsere Bewässerungstechniken und die Erträge unseres Landes erheblich."
 artisan_migration: "Umsiedlung von Handwerkern"
 artisan_migration_desc: "Es ist nicht angemessen, dass in den von uns eroberten Landen bessere Handwerker und Gelehrte leben als im Hauptsitz. Die geschicktesten Hände und größten Geister des Reiches müssen in den Hauptsitz gebracht werden, um uns direkt zu dienen."
 terrace_farming: "Terrassenfeldbau"
 terrace_farming_desc: "Um den begrenzten Raum der Hochebene bestmöglich zu nutzen, haben wir den Terrassenfeldbau und bessere Bewässerungstechniken entwickelt."
 mountain_cities: "Gipfelfestungen"
 mountain_cities_desc: "Unsere Städte und Festungen stehen auf gewaltigen Bergen hoch über den Wolken. Sie stellen ein bedeutendes Hindernis für jeden dar, der uns angreifen will."
 river_trade: "Flusshandel"
 river_trade_desc: "Der Wohlstand der großen Flüsse und Seen war seit jeher die Lebensgrundlage unseres Volkes. Lasst uns den Flusshandel fördern und alles in unserer Macht Stehende tun, um die vielen Kaufleute zu schützen, die entlang der Küste zur Mündung des großen Flusses reisen, auf dass es uns niemals an den feinen Waren mangele, die sie uns bringen."
 rainforests_and_mountaintops: "Regenwälder und Berggipfel"
 rainforests_and_mountaintops_desc: "Die Regenwälder und Gebirge unserer Heimat sind voller Leben. Neben den Geistern der Wälder leben auch Jaguare, Anakondas, Vogelspinnen und Unmengen anderer Tiere mit uns zusammen. Für jemanden, der sich mit ihnen auskennt, stellen sie kaum eine unmittelbare Gefahr dar. Für einen einfallenden Feind können diese Lande jedoch wie eine Festung wirken, deren Verteidiger die wilden Tiere sind."
 knot_system: "Sprechende Knoten"
 knot_system_desc: "Durch die Nutzung einer Reihe von Schnüren und Knoten zur Aufzeichnung von Informationen vereinfachen wir die Verwaltung unserer Lande und das Festhalten von wichtigem Wissen erheblich."
 llama_farming: "Lamazucht"
 llama_farming_desc: "Die großen Lamaherden unserer Lande liefern uns Wolle als Kleidung, Fleisch als Nahrung und Packtiere für den Lastentransport. Sie sind ein wahrer Schatz."
 mountain_roads: "Gebirgsstraßennetz"
 mountain_roads_desc: "Um die Verteilung von Waren zu ermöglichen, ist ein großes Netz aus Gebirgsstraßen nötig, die abgelegene Täler miteinander verbinden und tiefe Schluchten überspannen."
 tears_of_the_sun: "Tränen der Sonne"
 tears_of_the_sun_desc: "Obwohl Abenteurer aus fernen Ländern davon träumen, auf Gebirgspfaden hoch oben in den Anden verborgenes Gold zu finden, ist das gelbe Metall für uns eher von künstlerischem und heiligem als einfach nur von wirtschaftlichem Wert."
 hidden_cities: "Verborgene Städte"
 hidden_cities_desc: "In einem Land gewaltiger Gipfel und undurchdringlicher Regenwälder sind viele unserer Städte für Außenseiter nahezu unerreichbar. Sie könnten einfach über Jahrhunderte hinweg verborgen bleiben und von der Welt vergessen werden."
 potato_production: "Kartoffelanbau"
 potato_production_desc: "Wo der Mais auf den Hochebenen unseres Landes nur sehr schlecht wächst, haben wir stattdessen gelernt, auf die äußerst nahrhaften, knollenartigen Wurzeln einer anderen einheimischen Pflanze zurückzugreifen. Mit steigenden Ernten versorgen wir unser Volk und unsere Krieger mit einfach zu beschaffender Nahrung."
 head_hunters: "Kopfjäger"
 head_hunters_desc: "Conquering territory from weaker peoples is a necessary evil in our state. These circumstances have created a unique warrior code, according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our warriors famous for their mastery in capturing people alive."
 border_raiders: "Geübte Räuber"
 border_raiders_desc: "Unsere Räuber sind berühmt für ihre Fähigkeit, blitzschnelle Angriffe auf nichts ahnende Feinde durchzuführen. Ihr Tempo und ihr Können, wenn es darauf ankommt, feindlichen Gegenschlägen zu entgehen, können ein großer Vorteil für unsere regulären Truppen sein."
 lva_baltic_forestry: "Baltische Forstwirtschaft"
 lva_baltic_forestry_desc: "Unsere Wälder sind eine wichtige Rohstoffquelle, die Nutzholz für den Bau und Nahrung für unsere Feuer bietet. Wir müssen sie klug verwalten, damit ihre Fülle bestehen bleibt."
 lva_baltic_forts: "Baltische Festungen"
 lva_baltic_forts_desc: "Unser Netzwerk an Festungen und Burgen, die über das Land verstreut sind, bieten eine erste Verteidigungslinie gegen Eindringlinge. Diese Bollwerke erlauben es uns, wichtige Routen durch das Baltikum zu überwachen und zu kontrollieren."
 irish_travelling_bards_advance: "Reisende Barden"
 irish_travelling_bards_advance_desc: "Reisende Dichter, die in höfischer Lebensart unterwiesen wurden, reisen kreuz und quer durch unsere Lande, auf der Suche nach Herren, die sie vielleicht anwerben möchten."
 irish_booleying_advance: "Vieh-Booleying"
 irish_booleying_advance_desc: "In Irland ist die Rinderzucht unsere Lebensart. Die edlen Rinder sind nicht nur eine Nahrungsquelle, sondern auch ein Zeichen für Reichtum. Booleying nennt man den Brauch, unsere Herden von einer fernen Weide zur nächsten zu treiben, um unseren Wohlstand wachsen zu lassen."
 irish_monastacism_advance: "Inselmönchtum"
 irish_monastacism_advance_desc: "Obwohl wir nun von der Sache her im Einklang mit den römisch-katholischen Praktiken stehen, spielen die klerikalen Laien auf diesen Inseln noch immer eine große Rolle."
 guards_of_the_shannon_advance: "Wächter des Shannon"
 guards_of_the_shannon_advance_desc: "Die Festung Athlone überragt den mächtigen Fluss Shannon, womit sie entscheidend für die Kontrolle über das Herz von Irland ist. Die O’Kellys aus $HYM$, alteingesessene Herren dieser Lande, kämpften wild für die Verteidigung ihrer Besitztümer gegen ein normannisches Vordringen an."
 hiberno_norman_keeps_advance: "Hiberno-normannische Donjons"
 hiberno_norman_keeps_advance_desc: "Unsere normannischen Vorfahren bauten wunderbare Türme, um ihre Kontrolle über das feindselige irische Binnenland zu wahren."
 irish_frontier_settlement_advance: "Irische Grenzsiedlungen"
 irish_frontier_settlement_advance_desc: "Das Land, das wir den Iren entrissen, ist bereit, ausgebeutet zu werden, und Menschen von gutem Schlag kommen von weither, um sich in diesen günstigen Ackerlanden anzusiedeln."
 celtic_raiders_advance: "Furor Celtica"
 celtic_raiders_advance_desc: "Seit Jahrtausenden peinigen wir Fremde und Feinde mit wilden und flinken Überfällen aus dem Hinterhalt. Wir bezwingen sie durch eine vernichtende Folge kurzer Vorstöße mit Plänklern und markerschütternder Sturmangriffe."
 ple_pale_defenseworks_advance: "Pale-Befestigungen"
 ple_pale_defenseworks_advance_desc: "Unsere Grenzen werden durch leichte Verteidigungsanlagen in Form von Wällen und Palisaden markiert, die darauf ausgelegt sind, unsere aufmüpfigen Nachbarn von ihren lästigen Überfällen abzuhalten."
 ple_irish_viking_towns_advance: "Alte Wikingerstädte"
 ple_irish_viking_towns_advance_desc: "In den uralten Handelshäfen, die die Ostleute gründeten, herrscht noch immer florierender Handel, und noch immer können die Gerissenen hier reich werden."
 cel_defensive: "Die Hügel sprechen Keltisch"
 cel_defensive_desc: "Jahrhunderte im Schatten der Eroberung lehrten unsere Krieger die Kunst der Geduld und der Widerstandsfähigkeit. Wir können uns kopflos in die Gefahr stürzen, doch wir können auch ausharren, verteidigen und nur dann zuschlagen, wenn der richtige Augenblick gekommen ist."
 cel_western_shore: "Das Westufer"
 cel_western_shore_desc: "Seit Jahrtausenden fischen, handeln und kämpfen wir entlang der wilden Atlantikküste. In diesen rauen Gewässern erlernten wir eine Seemannskunst, die keiner unserer Rivalen übertrifft."
 cel_the_wests_awake: "Der Westen erwacht"
 cel_the_wests_awake_desc: "Nach Jahrhunderten des Schweigens regt sich der uralte Geist des keltischen Volks wieder, bereit dazu, seinen Platz unter den großen Zivilisationen der Welt einzunehmen."
 cel_celtic_nations: "Keltische Nationen"
 cel_celtic_nations_desc: "Unser Bund gründet sich auf dem Ideal einer Einheit der unterschiedlichen Völker der keltischen Welt unter einem Banner. Durch Zusammenarbeit wollen wir unser Erbe bewahren, unsere Werte fördern und sicherstellen, dass die keltischen Nationen zusammen gedeihen und sowohl äußerem Druck als auch den sich verändernden Zeiten standhalten."
 cel_celtic_diaspora: "Keltische Diaspora"
 cel_celtic_diaspora_desc: "Vom Kleinbauer bis zum Häuptling ließen viele unsere Gestande hinter sich, getrieben von Entbehrungen oder der Hoffnung. So entspann sich ein weit verstreutes Geflecht der Verwandtschaft, das Sprache, Bräuche und Stolz in ferne Lande trägt."
 cel_pan_celtic_nationalism: "Pan-Keltentum"
 cel_pan_celtic_nationalism_desc: "Unsere Vision einer geeinten keltischen Welt ist mehr als nur ein Ideal: Es ist ein Weckruf für alle, die unser Erbe teilen. Gemeinsam schmieden wir Bande, die Grenzen überschreiten, und schaffen uns eine Identität, die so beständig wie die Hügel und Meere sind, die uns als Heimat dienen."
 ire_grand_jury_system: "Großschöffensystem"
 ire_grand_jury_system_desc: "Ein Aufgebot von Schöffen wird in den Gemeinden einberufen, um Straßen, Brücken und Gerichtshöfe zu betreuen. Die Richter reisen von Assise zu Assise, wodurch alle Gemeinden enger überwacht werden."
 ire_irish_establishment: "Irish Establishment"
 ire_irish_establishment_desc: "Ein stehendes Herr in Irland, das auch von dort aus kontrolliert wird, hält Garnisonen einsatzbereit und die Kosten im Griff. Unsere Berufssoldaten bekommen so regelmäßiges Gehalt. Unseren Versorgern und Quartiermeistern hilft das wachsende Netz von Kasernen dabei, die Kosten zu deckeln."
 ire_irish_volunteers: "Irische Freiwillige"
 ire_irish_volunteers_desc: "Bürgerkorps werden für Heimatschutz und Küstenwacht ausgehoben. Sie drillen auf eigene Kosten, stärken die Moral innerhalb der Bevölkerung und straffen die Linie."
 #Sub Saharan Africa
 nomadic_tendencies: "Nomadische Tendenzen"
 nomadic_tendencies_desc: "Ein Teil unseres Volks lebt schon lange als Nomaden, die von einem bewohnbaren Gebiet zum nächsten ziehen. Selbst jetzt, während sich alles ändert und wir eine Stadt für unser Volk errichten, bleiben manche ihren Traditionen treu und durchstreifen weiter das Land."
 skilled_cavalry_raids: "Kavallerieüberfälle"
 skilled_cavalry_raids_desc: "Bereits seit der Zeit unserer Ahnen sind Reiter das Werkzeug unserer Eroberungen. Ihre donnernden Hufe in den Graslanden der Sahel versetzen unsere Feinde in Angst und Schrecken und ermöglichten uns schon viele Siege."
 land_of_the_ancestors: "Land der Ahnen"
 land_of_the_ancestors_desc: "Land ist nicht nur Besitz oder Staub: Es ist unsere Verbindung zu den großen Menschen, die uns vorangegangen sind. Aus den besseren Landen des Jenseits wachen sie über uns, und wir dürfen diese Verbindung niemals abreißen lassen."
 wandering_scholars: "Wandergelehrte"
 wandering_scholars_desc: "In unseren Landen leben Gemeinschaften von Weisen vieler Konfessionen, die jedem, der zuhören möchte, anbieten, ihn etwas über ihren Glauben zu lehren. So verbreitet sich der eine wahre Glaube in unserem Volk."
 community_of_the_faithful: "Domäne vieler Zungen"
 community_of_the_faithful_desc: "Unter dem Banner unseres Großreichs sind Völker aus Hunderten von Abstammungen vereint. Sie sprechen eine Vielzahl von Sprachen und stammen aus sämtlichen Richtungen des Horizonts. Doch jedes Volk für sich ehrt unseren Herrscher in seiner Sprache, was uns miteinander verbindet."
 bound_by_service: "Verbindender Dienst"
 bound_by_service_desc: "Wir sind ein Volk, und wir haben eine Armee. Wenn wir Truppen aus dem gesamten Reich zusammenziehen und eroberte Völker ins Militär einbinden, sorgen wir dafür, dass sie besser in unsere Gesellschaft eingegliedert werden und unsere Herrschaft besser annehmen."
 regnal_chronicles: "Regierungschronik"
 regnal_chronicles_desc: "Wir sollten die Geschichte unserer Könige und ihrer Taten in einer großen Chronik aufzeichnen, die anschließend von Generation zu Generation weitergegeben und nie in Vergessenheit geraten wird."
 expanded_slave_trade: "Stärkere Sklavenhandelskontrolle"
 expanded_slave_trade_desc: "Die Nachfrage nach Sklaven durch fremde Händler wächst täglich. Unsere Lage in der afrikanischen Welt macht uns zum idealen Mittelsmann für diesen Handel. Lasst uns jene, die Sklavenmärkte suchen, dazu ermutigen, dies in unseren Landen zu tun und ihre Geschäfte auf unseren Märkten abzuwickeln."
 gifts_and_hostages: "Geschenke und Geiseln"
 gifts_and_hostages_desc: "Obwohl unser Volk nun vereint ist, fällt es ihm nicht leicht, sich einem gemeinsamen Suzerän zu unterwerfen. Indem wir alle untergeordneten Herrscher in den Hauptsitz zitieren, können wir sie als angesehene königliche Gesandte beschäftigen. Manche würden dies als eine Form der Geiselnahme bezeichnen, doch wir sehen es schlichtweg als eine Möglichkeit, unser Volk, dem viel an seiner Unabhängigkeit liegt, an seine Treueeide zu erinnern."
 people_of_ornaments: "Volk der Ornamente"
 people_of_ornaments_desc: "Unsere Handwerker sind weithin bekannt dafür, dass sie angeblich keine Oberfläche unverziert lassen können. Lasst uns das Beste aus diesem Ruf machen und ihre Arbeiten überall verbreiten."
 courtly_competition: "Höfischer Wettkampf"
 courtly_competition_desc: "Ein beschäftigter Adel ist ein guter Adel. Es gibt so viele Titel bei Hofe in unseren Reichen, dass manche behaupten, jeder zweite unserer Männer hätte einen. Lasst uns sicherstellen, dass die Mitglieder unseres Hofes mehr Zeit damit verbringen, miteinander um Aufmerksamkeit und Sichtbarkeit zu buhlen, als damit, unsere Herrschaft zu bedrohen."
 overnight_army: "Eine Armee über Nacht"
 overnight_army_desc: "Unser Hauptsitz und unsere Städte wurden den Lagern einer Armee nachempfunden. Sie haben Flügel, Vorhuten und Fronten. Indem wir sicherstellen, dass die militärische Denkweise überall in unserem Alltag Einzug findet, verbessern wir unsere Kampfbereitschaft."
 mining_tradition: "Bergbautradition"
 mining_tradition_desc: "Unser Land ist reich an seltenen Materialien, die nur darauf warten, dem Boden entrissen und für hohe Gewinne an fremdländische Händler verkauft zu werden. Wir wären töricht, dies nicht zu nutzen."
 intercontinental_trade: "Weitreichender Handel"
 intercontinental_trade_desc: "Unsere Händler bringen oft faszinierende Dinge von den Höfen ferner Länder mit. Vielleicht wäre es möglich, dass sie noch fernere Ufer erreichen."
 expanded_grazing_grounds: "Erweiterte Weidegründe"
 expanded_grazing_grounds_desc: "Unser Territorium hat reichlich Land, das sich gut als Weiden für Viehherden eignet, sodass wir unseren Ausstoß an Vieh leicht vergrößern können."
 african_sturdy_grains_advance: "Urkornackerwirtschaft"
 african_sturdy_grains_advance_desc: "Ein stärkerer Schwerpunkt auf der Ackerwirtschaft hilft unserem Volk, in diesen Landen zu gedeihen. Dankenswerterweise bieten unsere Böden reichlich Platz zum Anbau verschiedener Ackerfrüchte."
 eastern_african_trade: "Ostafrikanischer Handel"
 eastern_african_trade_desc: "Die Länder Ostafrikas liegen an einem Knotenpunkt bedeutender Handelsrouten. Von den Landen Ägyptens und den Häfen des Mittelmeers über das Rote Meer bis hin zu den Reichtümern des Ostens über den Indischen Ozean und südwärts entlang der Suaheli-Küste herrscht ein reger Waren- und Personenverkehr. Die Länder dieser Regionen sind daher auch daran gewöhnt, Waren und Wertgegenstände auszutauschen, um diplomatische Beziehungen zu knüpfen."
 #Burgundy
 promote_estates_general: "Förderung der États Généraux"
 promote_estates_general_desc: "Burgund ist eine feudale Schöpfung, deren verschiedene Teile unter unterschiedlichen Bedingungen miteinander verbunden sind, wodurch starke örtliche Identitäten entstanden. Durch die Förderung einer zentralen Versammlung bieten wir diesen Interessen ein Forum und fördern eine reibungslose und unangefochtene Herrschaft."
 reform_the_feudal_army: "Reform der Feudalarmee"
 reform_the_feudal_army_desc: "Feudale Aufgebote erwiesen sich im neuen Zeitalter der professionellen Kriegsführung als langsam und unzuverlässig. Inspiriert vom französischen Modell werden wir unsere verstreuten Vasallenheere durch feste Kompanien mit Salär, qualifizierte Offiziere und integrierte Armeen ersetzen. Ein disziplinierter Kern aus professionellen Soldaten wird das Rückgrat einer modernen und anpassungsfähigen Armee bilden."
 influence_of_the_burgundian_towns: "Einfluss der Städte von Burgund"
 influence_of_the_burgundian_towns_desc: "Die traditionellen Generalstände bevorzugen Klerus und Adel, doch der wachsende Reichtumg und die politische Bedeutung von Städten ist nicht mehr zu übersehen. Indem wir die bestehenden Strukturen verfeinern, um die wachsende Stärke der Bürger abzubilden, sorgen wir für eine ausgeglichenere Regierung, bewahren allerdings auch die Privilegien der anderen. Eine stärkere städtische Stimme verbessert die Möglichkeiten unserer Verwaltung und beschleunigt unsere Verstädterung."
 compagnie_d_ordonnance: "Ordonnanzkompanie"
 compagnie_d_ordonnance_desc: "Unsere Abhängigkeit von feudalen Aufgeboten genügt nicht mehr den Anforderungen der modernen Kriegsführung. Die Schaffung von dauerhaft unter Vertrag stehenden Kavallerieeinheiten, den Ordonnanzkompanien oder $compagnie_d_ordonnance$, verschafft uns eine zuverlässige und professionelle Streitmacht, die unmittelbar der Krone untersteht."
 create_the_regimental_system: "Schaffung des Regimentssystems"
 create_the_regimental_system_desc: "Um eine einheitliche Rekrutierung und Versorgung sicherzustellen, müssen wir ein formelles Regimentssystem einführen. Diese Reform ermöglicht es uns, die Mannstärke effektiver zu organisieren, die Befehlsstrukturen zu zentralisieren und die Abhängigkeit von örtlichen Adligen und fremdländischen Söldnern zu verringern."
 #Normandy
 heirs_of_rollo: "Erben Rollos"
 heirs_of_rollo_desc: "Das Erbe von Rollo, dem Wikinger-Gründer der Normandie, prägt bis heute unser Herrscherhaus. Diese prestigeträchtige Abstammung führte zu einer gestärkten Legitimität und zu Respekt unter unseren Gleichgestellten."
 trade_ports_in_the_channel: "Handelshäfen am Ärmelkanal"
 trade_ports_in_the_channel_desc: "Unsere Lage am Ärmelkanal ermöglicht es uns, als Handelsdrehscheibe zu gedeihen. Durch Investitionen in unsere Hafenstädte und unsere Handelsinfrastruktur dominieren wir den regionalen Handel und minimieren zugleich die Kosten für Betätigungen in Übersee."
 norman_law: "Normannisches Recht"
 norman_law_desc: "Unser Staat wird durch sein eigenes Gewohnheitsrecht, das $couteume_de_normaundie$, geleitet. Durch die Verankerung von Adelsprivilegien, dezentraler Macht und Eigentumsrechten gewährleistet diese Rechtstradition Stabilität vor Ort und bekräftigt gleichzeitig unsere unverwechselbare Identität."
 the_exchequer: "Das Schatzamt"
 the_exchequer_desc: "Unsere Legislative muss sich von jeglichen äußeren Einflüssen fernhalten, um unsere kulturelle Identität und Unabhängigkeit zu bewahren. Inspiriert von anglonormannischen Finanzinstitutionen mehren unsere parlamentarischen Verfahren gewiss die Staatseinnahmen und verbessern die administrative Aufsicht."
 frontline_in_the_caroline_war: "Vorderste Front im Krieg Karls"
 frontline_in_the_caroline_war_desc: "Während des langen Streits zwischen Frankreich und England waren wir ein strategisches Schlachtfeld. Der Druck des Krieges schuf ein abgehärtetes Offizierskorps sowie herausragende Schlachtfeldtraditionen, die bis heute überdauern."
 #Tunis
 tunisian_corsairs: "Tunesische Korsaren"
 tunisian_corsairs_desc: "Von ihren Festungen in Tunis und La Goulette aus beherrschen unsere Korsaren das Mittelmeer. Mit schnellen Galeeren und staatlicher Unterstützung versetzen sie fremdländische Kaufleute in Angst und Schrecken und stärken unsere Seemacht mit gnadenloser Effizienz."
 tamazight: "Berberisch"
 tamazight_desc: "Das Beberisch sprechende Volk des Inlands ist ein wichtiger Teil unserer Gesellschaft. Wenn wir seine kulturelle Identität anerkennen und die Alphabetisierung fördern, erweitern wir unsere Möglichkeiten, die unterschiedlichen Regionen zu regieren, ohne dabei Zusammenhalt oder unseren Griff um die Macht zu verlieren."
 guardians_of_ifriqiya: "Wächter von Ifrīqiya"
 guardians_of_ifriqiya_desc: "Als Nachfolger antiker Städte wie Karthago und Kairouan tragen wir die Verantwortung für das Herz des Maghreb. Unsere Herrschaft bringt Stabilität und wird von allen in dieser einst umkämpften Region begrüßt werden."
 saharan_trade: "Sahara-Handel"
 saharan_trade_desc: "Von den Oasen von $ghadames$ bis zu den Karawanen der $sahel_region$ sichern und kassieren unsere Händler die Einnahmen aus den Transsahara-Routen, über die wir mit den Reichtümern des Landesinneren verbunden sind. $goods_gold$, $salt$ und $slaves_goods$ strömen unter unserem Schutz und unserer Aufsicht nach Norden."
 al_caid: "Al-Kaid"
 al_caid_desc: "Indem wir einen treuen Kaid einsetzen, der Provinzen überwachen und den Handel im Auftrag des Staats regeln soll, verleihen wir städtischen Händlern die Macht, um für die ordentliche Verwaltung der Provinzen zu sorgen. Wenn wir für gerechten Handel und regulierte Märkte sorgen, wird unsere wirtschaftliche Grundlage nur noch gestärkt."
 connections_with_the_christian_world: "Verbindungen zur christlichen Welt"
 connections_with_the_christian_world_desc: "Obwohl wir unterschiedlichen Glaubens sind, verschließen wir uns neuen Gelegenheiten nicht. Verträge und Handelsabkommen mit christlichen Staaten stellen sicher, dass Diplomatie und Pragmatismus unseren langfristigen Interessen dienen."
 attract_foreign_pirates: "Anziehen von fremdländischen Piraten"
 attract_foreign_pirates_desc: "Unsere Häfen sind seit Langem Zufluchtsorte für jene, die auf hoher See ihr Glück suchen. Indem wir diese erfahrenen Seeleute unabhängig von ihrem Glauben oder ihrer Herkunft willkommen heißen, stärken wir unsere Korsarenflotten und bauen unsere maritime Mannstärke aus."
 rais_of_the_navy: "Ra’īs der Marine"
 rais_of_the_navy_desc: "Unsere Korsaren-Kapitäne, die Ra’īs, sind mehr als nur Piraten. Sie sind altgediente Marinebefehlshaber, deren Erfahrung auf See eine tiefe maritime Tradition nährt, die das stolze Erbe unserer Marine stärkt."
 export_monopolies: "Ausfuhrmonopole"
 export_monopolies_desc: "Durch die Kontrolle wichtiger Ausfuhrwaren wie Olivenöl, Tuch und Farbstoffe sichern wir sowohl den Wohlstand im Inland als auch unseren Einfluss in fremden Landen. Solche protektionistischen Praktiken ermöglichen es uns, unsere Macht sowohl durch Handel als auch durch Eroberungen auszuüben und zu gewährleisten, dass unsere Märkte unseren eigenen Händlern gegenüber fremdländischen Händlern den Vorrang geben."
 #Tlemcen
 beacon_of_maghrebi_trade: "Dreh- und Angelpunkt des Handels im Maghreb"
 beacon_of_maghrebi_trade_desc: "Tlemcen liegt am Schnittpunkt der Karawanenwege der Sahara, des Handels im Mittelmeerraum und andalusischer Einflüsse. Da der Handel auf den Märkten und in den Häfen floriert, müssen wir danach streben, unsere Handelsnetze weiter auszubauen und unseren Einfluss auf den regionalen Handel zu wahren."
 qalat_al_mashwar_advance: "$qalat_al_mashwar$"
 qalat_al_mashwar_advance_desc: "Die Festungsanlage $qalat_al_mashwar$ ist sowohl eine militärische Bastion als auch ein Symbol der dynastischen Autorität. Wenn wir in ihren Ausbau investieren, wird die Verteidigung von Tlemcen gestärkt und zugleich die Verwaltungskontrolle über die umliegenden Gebiete gesichert."
 hispano_moresque_style: "Hispanisch-maurischer Stil"
 hispano_moresque_style_desc: "Unsere Städte spiegeln eine einzigartige Mischung aus andalusischer Eleganz und maghrebinischer Architektur wider. Der hispanisch-maurische Stil, der von fremdländischen Handwerkern und Adligen weitergegeben wurde, sorgt für eine neue kulturelle Blütezeit und steigert das Ansehen unseres Hofes."
 city_of_scholars: "Stadt der Gelehrten"
 city_of_scholars_desc: "Tlemcen ist seit Langem ein Zentrum islamischer Bildung und intellektuellen Austauschs. Unsere Madrasas ziehen Gelehrte aus dem gesamten Maghreb und Al-Andalus an und fördern so den wissenschaftlichen und theologischen Fortschritt für kommende Generationen."
 entrepot_connections: "Entrepot-Beziehungen"
 entrepot_connections_desc: "Um als Handelszentrum zu florieren, müssen unsere Städte durch eine solide Infrastruktur miteinander verbunden sein. Indem wir es dem Adel erlauben, strategisch wichtige Straßen zu bauen und zu unterhalten, verbessern wir den Binnenhandel und stärken die Verkehrsadern unseres Reiches."
 #Smolensk
 diocese_of_smolensk: "Diözese Smolensk"
 diocese_of_smolensk_desc: "Einst eine spirituelle Hochburg des orthodoxen Christentums und Sitz eines der ältesten Bistümer der Region verkörpert die Diözese Smolensk den unerschütterlichen Glauben unseres Volkes."
 smolenskian_resolve: "Smolensker Entschlossenheit"
 smolenskian_resolve_desc: "Seit Jahrhunderten ist Smolensk ein Land, das von Außenstehenden – litauischen Herzögen, polnischen Königen und Moskauer Fürsten – untereinander aufgeteilt wurde. Um zu überleben, hielten wir an dem fest, was uns verband: unserem Glauben und unserer Standhaftigkeit. Wenn wir jemals wieder auferstehen wollen, müssen wir die Spaltungen überwinden und uns hinter der heiligen Idee versammeln, dass es vor allem nur Smolensk gibt."
 link_the_steppes_trade: "Verbindung des Steppenhandels"
 link_the_steppes_trade_desc: "Zwischen Wald und Steppe gelegen ist Smolensk seit Langem ein Knotenpunkt für Krieg und Handel. Durch die Verbesserung der Infrastruktur auf dem Land und die Sicherung der Karawanenwege stärken wir unsere Rolle als wichtiges Bindeglied zwischen der nördlichen Rus, dem Baltikum und den südlichen Handelsrouten der Steppe."
 hub_of_militarism: "Knoten des Militarismus"
 hub_of_militarism_desc: "Lange Zeit bestimmte der Krieg über unser Schicksal, doch nun soll er über unsere Stärke bestimmen. Aus den Trümmern von Krieg und Belagerung erhebt sich Smolensk zu einem Zentrum der Rüstungsproduktion: Kanonen, Feuerwaffen, Pulver und Doktrinen strömen aus unseren Waffenkammern. Die Welt soll uns nicht als Beute betrachten, sondern als einen gefürchteten Hammer, der bereit ist, auf den Amboss fremder Eroberer einzuschlagen."
 armories_of_smolensk: "Die Waffenkammern von Smolensk"
 armories_of_smolensk_desc: "Nach Jahrzehnten des Krieges an allen Grenzen lernten wir, mit Waffen aus Ost und West zu kämpfen. Durch die Verbindung moskowitischer Hartnäckigkeit mit westlicher Präzision bieten unsere Waffenschmieden nun Eliteartillerie und Taktiken, die von unseren Rivalen unerreicht sind. Aus unseren Schmieden kommt Feuerkraft – und aus Feuerkraft entstehen Herrschaft und Ausdauer."
 #Provence
 capetian_house_of_anjou: "Kapetinger-Haus Anjou"
 capetian_house_of_anjou_desc: "Die Verschmelzung von kapetingischer Würde und angevinischem Ehrgeiz strömt durch unsere Adern. Auch wenn wir nicht mehr die Krone Jerusalems tragen, bleiben wir Erben eines Königreichs, das sich einst von Anjou bis Albanien erstreckte. Mit umsichtiger Diplomatie und sorgfältiger Planung lassen wir die Größe unserer Vorfahren wiederaufleben und fordern zurück, was uns zu Unrecht genommen wurde."
 lords_of_the_rhone_corridor: "Fürsten des Rhône-Korridors"
 lords_of_the_rhone_corridor_desc: "Das Rhône-Tal war seit jeher unsere Machtader, und unsere Burgen wachen wie steinerne Wächter darüber. Diese Festungen gehören zu den robustesten in ganz Europa und sind ein unerschütterliches Zeichen unserer militärischen und technischen Fähigkeiten, die unsere Domäne auf ewig schützen."
 angevin_heraldry: "Angevinische Heraldik"
 angevin_heraldry_desc: "Die goldenen Lilien und die Doppeladler auf unseren Fahnen zeugen von alten Ansprüchen und königlichem Streben. Ansprüche, die sich über die italienische Halbinsel bis nach Albanien und Jerusalem erstrecken, hallen noch immer in unserem Hof wider. Möge das Haus Valois-Anjou höher emporsteigen als je zuvor."
 le_livre_des_tournois: "Le Livre des Tournois"
 le_livre_des_tournois_desc: "Das vom Königshaus verfasste „Buch der Turniere“ ist mehr als nur ein Handbuch: Es ist ein Bekenntnis zum höfischen Stolz und zur ritterlichen Identität. Unser Adel ertüchtigt sich nicht nur für den Krieg, sondern auch für Spektakel und bewahrt so die militärische Disziplin und das Ansehen im ganzen Reich."
 statutes_of_aix: "Statuten von Aix"
 statutes_of_aix_desc: "Diese Reihe lose miteinander verbundener Gesetze und Statuten bildet das rechtliche Rückgrat unserer Regierungsführung. Diese Regeln vermengen römische Rechtswissenschaft mit örtlichen Bräuchen und der Tradition der Anjou. So können wir ein Flickwerk von Regionen als zusammenhängendes Gebiet verwalten: eine echte monarchische Einigkeit, in der die Teile zwar unterschiedlich sind, die Krone jedoch unteilbar ist."
 rade_of_toulon: "Rade de Toulon"
 rade_of_toulon_desc: "Der natürliche Hafen von Toulon bietet den bestmöglichen Ausgangspunkt für unser maritimes Streben. Während Marseille als unser wirtschaftliches Juwel funkelt, soll Toulon die Waffenkammer der Provence werden, der Heimathafen einer zukünftigen Seemacht."
 piqure_de_marseilles: "Piqûre de Marseille"
 piqure_de_marseilles_desc: "In den Werkstätten von Marseille nähen Handwerkerinnen zarte Boutis-Steppdecken im provenzalischen Stil, die man in ganz Europa wegen ihrer Güte und ihres Zaubers schätzt. Ähnlich wie unser Herzogtum bestehen auch diese Kunstwerke aus vielen Teilen, die man zu einem einheitlichen Ganzen zusammenfügt: ein gestepptes Land, reich an Textur und Kultur."
 #Hormuz
 orm_a_vast_emporium: "Ein gewaltiges Emporium"
 orm_a_vast_emporium_desc: "Man sagt, Hormus sei „ein gewaltiges Emporium, in dem Menschen und Waren aller Art aus allen Teilen der Welt zusammenkommen“ oder dass „wenn die ganze Welt ein goldener Ring wäre, Hormus das darin eingesetzte Juwel darstellt“. Die Identität unseres Reichs ist untrennbar mit dem Handel verbunden. Tatsächlich legen Schiffe aus Gujarat, Arabien und sogar China in unseren Häfen an, um Gewürze, Edelsteine, Seide und Geschichten auszutauschen."
 hormuz_toll: "Hormuszoll"
 hormuz_toll_desc: "An der engsten Stelle des Persischen Golfs liegt Hormus, das Tor zum Ost-West-Seehandel. Kein Schiff passiert es ohne unser Wissen oder unseren Zoll. Seit Jahrhunderten macht uns diese Abgabe nicht nur reich, sondern prägt auch unsere Diplomatie und unsere Machtprojektion über die weiten Meere."
 gate_of_the_persian_gulf: "Tor zum Persischen Golf"
 gate_of_the_persian_gulf_desc: "Hormus kontrolliert die Meerenge, die den Indischen Ozean mit Innerasien verbindet. Wer diese wichtige Passage beherrscht, bestimmt den Rhythmus des Seeverkehrs. Unsere Kontrolle über diese Gewässer muss absolut sein, damit unser Einfluss nicht geschwächt wird."
 moqarrariya: "Einführung des Moqarrariya"
 moqarrariya_desc: "Seit Generationen wahrte unser Reich durch jenes alte Tributsystem, das als Moqarrariya bekannt ist, Frieden mit dem Festland. Anstatt uns auf Gewohnheiten und Verhandlungen zu verlassen, sollten wir diese Tribute in formellen Verträgen festschreiben. Durch verlässliche Diplomatie gewährleisten wir eine Versorgung mit frischem Wasser, Sicherheit auf dem Landweg und langfristige Stabilität."
 develop_qeshm_and_ormuz: "Investitionen in Qeschm und Hormus"
 develop_qeshm_and_ormuz_desc: "Obwohl die Inseln Qeschm und Hormus trocken und felsig sind, erlauben sie dank einer umsichtigen Versorgung und eines regen Handels ein städtisches Leben. Mit angemessenen Investitionen erblühen ihre Häfen und Werkstätten weiter und sie entwickeln sich von logistischen Knotenpunkten zu Zentren der Innovation und der Produktivität."
 ormuzi_navy: "Die hormusische Marine"
 ormuzi_navy_desc: "Der Golf verlässt sich schon lange auf unsere Flotten, ob es nun Händler, Patrouillen oder bewaffnete Eskorten sind. Doch um mit dem Ehrgeiz jener Schritt zu halten, die uns unsere Stellung neiden, müssen wir sie erweitern und modernisieren. Hormus soll nicht nur ein Handelsposten, sondern das maritime Arsenal des Meeres werden."
 mint_of_the_gulf: "Münzpräge des Golfs"
 mint_of_the_gulf_desc: "In Hormus geprägte Münzen zirkulieren von Basra bis Bengalen und genießen aufgrund ihrer Reinheit und ihres Gewichts großes Vertrauen. Durch die Institutionalisierung unserer Münzprägeanstalt und die Ausweitung unserer Ausgabe stärken wir unsere finanzielle Souveränität – und beanspruchen die fiskale Vorherrschaft über den Indischen Ozean."
 #Savoy
 sav_savoyard_flexibility: "Savoyer Diplomaten"
 sav_savoyard_flexibility_desc: "Aufgrund unserer Lage zwischen größeren Mächten müssen wir uns auf unsere diplomatischen Fähigkeiten verlassen, um zu überleben. Indem wir selbst zu unseren gefährlichsten Feinden diplomatische Beziehungen unterhalten, können wir unsere Bündnisse so gestalten, dass das Überleben unseres Landes gesichert ist."
 sav_house_of_savoy: "Ein geeintes Haus"
 sav_house_of_savoy_desc: "Seit seiner Gründung im Jahr 1032 wurde Savoyen mehrere Jahrhunderte lang von einer stabilen Grafenlinie regiert. Indem wir die Einheit unserer Herrscherfamilie und eine starke Verbindung zu den örtlichen Vertretern sicherstellen, verhindern wir, dass diese Lande auseinanderbrechen."
 sav_alpine_identity: "$SAV_ADJ$es Alpenwesen"
 sav_alpine_identity_desc: "Eingebettet in die hohen Alpen sind wir in erster Linie ein Bergvolk. Das Gelände und die Pässe, die es durchziehen, stellen unser Vermächtnis und unsere Lebensgrundlage dar, und die Berge selbst sind unsere Beschützer. Generationen von Menschen, die in den Alpen lebten, erlangten so ein unvergleichliches Verständnis für ihre Höhen und ihre Geografie."
 sav_fight_the_vaudois: "Widerstand gegen Ketzerei"
 sav_fight_the_vaudois_desc: "Unsere Lande litten lange unter den ketzerischen Predigten der Waldenser. Nur durch unsere Willensstärke und die Unterstützung himmlischer Mächte konnten wir ihren Einfluss eindämmen. Und wir werden weiterhin den einzig wahren Glauben vor diesen gefährlichen Ideen verteidigen."
 sav_embrace_the_vaudois: "Ein Licht in der Finsternis"
 sav_embrace_the_vaudois_desc: "Wir haben die Lehren der waldensischen Bewegung angenommen und geschworen, diesen Glauben vor der bösartigen katholischen Kirche zu bewahren, die seine Ideen auslöschen will."
 sav_alpine_pass_control: "Kontrolle über die Pässe"
 sav_alpine_pass_control_desc: "Die Überquerung der Alpen ist selbst unter bestmöglichen Bedingungen mühsam und mit Kutschen oder einer größeren Reisegruppe oft schlichtweg nicht zu schaffen. Durch die Instandhaltung guter Wege, Unterkünfte und Raststätten meistern wir das schwierige Gelände und gewährleisten einen steten Austausch von Händlern zwischen unseren Landen."
 sav_the_shroud_of_turin: "Pilgerfahrt zum Heiligen Grabtuch"
 sav_the_shroud_of_turin_desc: "Unser Land ist im Besitz eines äußerst heiligen Artefakts: Es handelt sich um ein Stück Stoff mit dem Antlitz Jesu von Nazareth. Natürlich zieht es viele Pilger an, die dieses heilige Leichentuch besuchen und anbeten wollen. Dieser stetige Strom von Pilgern bringt unserem Land viel Reichtum, den wir nutzen könnten."
 sav_repopulate_the_valleys: "Bevölkerung der Alpentäler"
 sav_repopulate_the_valleys_desc: "Die Bevölkerung der Alpentäler zieht es seit Langem in die städtischen Gebiete auf beiden Seiten des Gebirges. Dies bringt die kleinen Dörfer in den weniger bedeutenden Tälern in eine heikle Lage und sorgt für ein instabiles politisches Umfeld. Wir müssen dafür sorgen, dass unsere Bevölkerung gute Gründe hat, in die Täler zurückzukehren, damit diese nicht untergehen."
 #Mainz
 mai_diadema_regni: "Diadema Regni"
 mai_diadema_regni_desc: "Unsere geliebte Stadt wurde als „Krone des Reiches“ bezeichnet, ein Beiname, den wir hochhalten und bewahren müssen. Wenn wir den Status von Mainz innerhalb des Reiches erhalten, verschafft uns dies weitreichenden Einfluss und Ansehen."
 mai_city_and_archbishop: "Stadtrechte"
 mai_city_and_archbishop_desc: "Die Bürger von Mainz profitierten von den weitreichenden Rechten, die ihnen Adalbert von Mainz 1119 und 1122 gewährte. Diese Rechte, die in die Bronzetür des Doms eingraviert sind, sollen an das Zusammenwirken der verschiedenen Mächte innerhalb der Stadt erinnern: sowohl an den Klerus als auch an die Bürger."
 mai_leader_rheinish_league: "Rheinischer Bund"
 mai_leader_rheinish_league_desc: "Solange der Rheinische Bund bestand, übernahmen wir selbstverständlich die Leitung und Führung der anderen Mitglieder. Der Bund mag aufgelöst sein, doch unsere Stellung als Führer und Lenker kleinerer umliegender Staaten ging damit nicht zu Ende."
 mai_zealous_fight_against_heretics: "Schutz unseres Glaubens"
 mai_zealous_fight_against_heretics_desc: "Die religiöse Einigkeit unseres Landes muss gegen jede Bedrohung verteidigt werden. Wenn wir unsere Armeen mit moralischer Führung in Form von Priestern ausstatten, sind sie viel motivierter, unsere Überzeugungen zu verteidigen."
 mai_vicar_of_mainz: "Regierender Vikar"
 mai_vicar_of_mainz_desc: "Um sicherzustellen, dass unsere Ländereien auch in Abwesenheit unseres Herrschers zuverlässig regiert werden, sollten wir einen Vikar einsetzen. Mit weitreichenden Rechten ausgestattet kann der Vikar in unserem besten Sinne handeln und das einfache Volk jederzeit an unsere Präsenz erinnern."
 mai_mainz_kingdom: "Mainzer Königreich"
 mai_mainz_kingdom_desc: "Obschon Feierlichkeiten am Aschermittwoch weitverbreitet sind, haben sie in unserem Land besonders tiefe Wurzeln. Während die Öffentlichkeit #italic Fastnacht#! oder #italic Karneval#! mit Maskenbällen und üppigen Festessen feiert, veranstaltet unser Hof ein besonderes Ereignis. Im Zuge der Karnevalsfeierlichkeiten werden die Rollen unseres Hofes per Los neu verteilt, woran sogar der Herrscher teilnehmen muss. Dieser Brauch des Rollentauschs, „Mainzer Königreich” genannt, wird weit über unsere Grenzen hinausgetragen und sichert unser kulturelles Erbe."
 mai_center_of_printing: "Druckereien von Mainz"
 mai_center_of_printing_desc: "Wir haben eine gute Ausgangslage, um die wachsende Zahl von Druckerpressen in unserem Gebiet weiter zu steigern und zu einem bedeutenden Hersteller von Büchern in Europa zu werden."
 mai_garrison_of_the_rhine: "Garnisonsstadt des Rheins"
 mai_garrison_of_the_rhine_desc: "Die Verteidigung unserer Grenzen gegen Bedrohungen kann eine schwierige Aufgabe sein, insbesondere angesichts des Flusses, der unser Land in zwei Teile teilt. Wir müssen sicherstellen, dass ein ausgedehntes Netz von Garnisonen und Befestigungsanlagen unseren Feinden standhalten kann."
 #Yemen
 arabia_felix: "Arabia Felix"
 arabia_felix_desc: "Seit der Antike ist der Jemen als „Arabia Felix“, das glückliche Arabien, bekannt. Mit seinem gemäßigten Hochlandklima und seinen fruchtbaren Böden inmitten einer Wüstenlandschaft ist er nach wie vor eine der von Natur aus wohlhabendsten Regionen der Halbinsel. Pflegen wir diesen Wohlstand und nutzen wir ihn als Grundlage für ein blühendes Reich."
 coffea_arabica: "Coffea arabica"
 coffea_arabica_desc: "Auch wenn andere versucht haben, unsere geliebte Bohne an neue Orte zu verpflanzen, bleibt der Kaffee aus Arabien in Sachen Geschmack und Bekanntheit unübertroffen. Vom geschäftigen Hafen von Mocha bis zu den Höfen ferner Herrscher ist die Nachfrage nach unserem Trunk weltweit ungebrochen."
 zaydi_scholarly_traditions: "$zaidi_school$-Gelehrtentradition"
 zaydi_scholarly_traditions_desc: "Das Hochland des Jemen ist seit Langem die Heimat des Imamats der $zaidi_school$, einem Zentrum des Lernens und der Frömmigkeit. Verwurzelt in islamischer Rechtswissenschaft, Theologie und Rationalismus sorgen unsere Gelehrten seit Jahrhunderten für Rechtsstaatlichkeit und die moralische Integrität unserer Regierungsführung."
 rasulid_bureaucracy: "Rasuliden-Bürokratie"
 rasulid_bureaucracy_desc: "Die Rasuliden-Dynastie brachte unseren Landen eine beispiellose Ordnung in der Verwaltung. Mit Volkszählungsunterlagen, Steuersystemen und einer robusten Kabinettsstruktur verwandelte sie den Jemen in eines der am effizientesten regierten Reiche der Halbinsel."
 control_of_the_red_sea: "Kontrolle über das Rote Meer"
 control_of_the_red_sea_desc: "Der Handel aus Indien und Afrika muss durch die Meerenge, die man „Tor der Trauer“ nennt. Wir sollten unsere Vorherrschaft über diesen maritimen Engpass durchsetzen und jedes vorbeifahrende Schiff zu einer günstigen Gelegenheit für uns machen."
 yem_unite_the_tribes: "Einigung der jemenitischen Stämme"
 yem_unite_the_tribes_desc: "Von der Küste von Tihāmah bis zu den Ḥarāz-Bergen beherbergt unser Reich unzählige äußerst unabhängige Stämme. Obwohl sie sich seit Langem gegen eine zentralisierte Autorität wehren, sind sie auch unsere Stärke. Indem wir sie in einer gemeinsamen Sache einen, nutzen wir ihre Arbeitskraft besser."
 port_of_aden: "Hafen von Aden"
 port_of_aden_desc: "Der Hafen von Aden ist seit Jahrtausenden ein Knotenpunkt des Handels: Hier legen Schiffe aus Indien, Ägypten und Ostafrika an und ab. Mit der richtigen Unterstützung könnte er wieder zum Eckpfeiler unserer maritimen Wirtschaft und zum Stolz des Roten Meeres werden."
 #Karaman
 sons_of_the_salur_tribe: "Söhne des Salur-Stamms"
 sons_of_the_salur_tribe_desc: "Die Karamaniden führen ihre Abstammung auf die Salur zurück, einen der größten Stämme der Oghusen. Die Salur sind sowohl für ihre Führungsstärke als auch für ihre Tapferkeit bekannt. Ihr Vermächtnis prägt die Identität unseres Staates und unseren Anspruch, die Turkmenen Anatoliens zu vertreten."
 mehmed_beys_firman: "Meḥmed Beys Firman"
 mehmed_beys_firman_desc: "Mehmed I. erließ ein Dekret, wonach in Gerichten, in Derwischhäusern, bei Versammlungen und auf öffentlichen Plätzen nur Türkisch gesprochen werden durfte. Damit verweigerter er sich der Vorherrschaft des Persischen und Arabischen in den Reihen der Elite und legte den Grundstein für eine einzigartige turkmenische Kulturpolitik."
 karamanid_cavalry: "Karamaniden-Kavallerie"
 karamanid_cavalry_desc: "Die Kavallerie war schon immer der Grundpfeiler der turkmenischen Kriegsführung. Unsere Reiter, die von klein auf ausgebildet werden und auf zähen anatolischen Pferden reiten, halten mit Disziplin und Schlagkraft die stolzen Traditionen der Steppenkriegsführung aufrecht."
 home_of_the_whirling_dervishes: "Heimat der wirbelnden Derwische"
 home_of_the_whirling_dervishes_desc: "Konya, unser spirituelles Zentrum, ist die Heimat der Anhänger von Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. Ihre heilige Praxis – die Sema – symbolisiert die Reise der Seele zur göttlichen Wahrheit. Ihre Anwesenheit vertieft die mystische Tradition unseres Reiches und stärkt unsere Sufi-Wurzeln."
 #Tibet
 sakya_hegemony: "Sakya-Hegemonie"
 sakya_hegemony_desc: "Seit einem Jahrhundert übt die Sakya-Schule die weltliche Macht über Tibet aus und fungiert unter mongolischer Schirmherrschaft als spirituelle und politische Verwalterin. Ihre Vorherrschaft leitete ein Zeitalter zentralistischer Regierungsführung und schulischer Konsolidierung ein. Obwohl ihre Herrschaft geschwächt ist, prägt ihr Erbe weiterhin unsere Haltung zu Autorität und Ordnung."
 monastic_dominance: "Klostervorherrschaft"
 monastic_dominance_desc: "Die Verschmelzung von geistlicher und weltlicher Herrschaft prägt die politische Landschaft Tibets. Vom kleinsten Dorf bis zu den Machtzentralen in Sakya spielen klösterliche Institutionen in allen Lebensbereichen eine zentrale Rolle. Ihre moralische Autorität und organisatorisches Können sorgen für Treue, Einigkeit und kulturelle Widerstandsfähigkeit."
 the_yak: "Yak-Zucht"
 the_yak_desc: "Das Yak wird seit Jahrhunderten gezüchtet und bildet das Rückgrat der tibetischen Viehwirtschaft. Es versorgt uns mit Fleisch, Milch und Wolle. Es dient auch als Transportmittel und liefert Brennstoff: Sein getrockneter Dung ist eine wichtige Energiequelle auf den baumlosen Hochebenen. In Zeiten der Not kann Yak-Butter auch unsere Lampen und Becher füllen."
 drokpa: "Drokpa"
 drokpa_desc: "Die Drokpa-Nomaden sind meist Hirten und Händler. Als Träger verbinden sie weit entfernte Siedlungen miteinander. Dank ihrer Traditionen und ihrer unvergleichlichen Kenntnis der Gegend folgen sie den Höhenrouten zwischen Tibet, Bhutan, Ladakh und Nepal. Ihre saisonalen Karawanen befördern Salz, Wolle und Trockenfleisch im Austausch gegen Getreide und Handwerkswaren. Diese Netzwerke machen unsere Berge zu einem lebendigen Geflecht aus Handel und Diplomatie."
 tibetan_monastic_education: "Klösterliches Bildungssystem"
 tibetan_monastic_education_desc: "Unsere klösterlichen Einrichtungen dienen seit Langem als Zentren des Lernens, der Debatte und der spirituellen Disziplin. Durch eine strenge Ausbildung und einen strukturierten Bildungsansatz wahren die Geistlichen einen hohen Standard an intellektueller und moralischer Integrität. Diese Grundlagen sorgen für eine weise Regierungsführung und eine kulturelle Blüte in unserem aufgeklärten Reich."
 tanye_guanxi: "Tányuè Guānxì"
 tanye_guanxi_desc: "Seit Jahrhunderten bildet unser spiritueller Einfluss in China das Fundament der diplomatischen Beziehungen. Kaiserliche Förderung, Tributzahlungen und heilige Rituale wie das Tányuè sichern sowohl Respekt als auch materiellen Gewinn."
 great_three: "Die Drei Großen Klöster"
 great_three_desc: "Sera, Ganden und Drepung: Diese hoch aufragenden Klosteruniversitäten bilden das intellektuelle Herz von Tibet. Ihre Gelehrten bilden eine Generation nach der anderen von Mönchen, Diplomaten und Herrschern aus. Mit ihrem Aufstieg wurde unser Reich nicht nur zu einer Bastion des Glaubens, sondern auch zu einer Wiege des rigorosen Denkens und des institutionellen Fortschritts."
 #Dai Viet
 dai_lang: "Autonome Viet-Dörfer"
 dai_lang_desc: "Das vietnamesische Landleben beruht auf der beständigen Stärke der #italic Làng#!. Diese autonomen Dörfer verkörpern ein Prinzip: „Die Bräuche des Dorfes stehen über den Gesetzen des Königs.“ In einem Land der zerklüfteten Berge und der gewundenen Flüsse verwalten sich diese Gemeinschaften selbst, stellen örtliche Milizen auf, erheben effektiv Steuern und wahren die königliche Autorität auf der untersten Ebene."
 nghia_quan: "Die Nghĩa Quân"
 nghia_quan_desc: "Im Lauf unserer Geschichte erhoben sich die #italic Nghĩa Quân#! („gerechte Milizen“) in Zeiten großer Gefahr zur Verteidigung des Landes. Sie setzten sich aus Bauern, Gelehrten und örtlichen Patrioten zusammen und leisteten Widerstand gegen fremdländische Invasoren und Tyrannei im Innern gleichermaßen. Obwohl sie keine regulären Truppen waren, machten sie ihre Tapferkeit und ihre Hingabe an das Land zu einer beeindruckenden Streitkraft, sobald sie mobilisiert wurden."
 #Champa
 cha_go_tram_huong: "Gỗ Trầm Hương"
 cha_go_tram_huong_desc: "Das harzige Kernholz unserer Wälder, bekannt als Agarholz oder Trầm Hương, wird nicht nur wegen seines bezaubernden Dufts geschätzt, sondern auch wegen seiner spirituellen und heilenden Eigenschaften. Über die Meere hinweg begehren Adlige und Mönche gleichermaßen dieses Holz als Weihrauch, für Parfüms und als Opfergabe. Durch den Schutz unserer Wälder und die Verfeinerung unserer Erntemethoden machen wir dieses seltene Geschenk der Natur zu einem unserer wertvollsten Ausfuhrgüter."
 my_son_sanctuary: "Mỹ-Sơn-Zuflucht"
 my_son_sanctuary_desc: "In den üppigen Tälern Zentralchampas liegt die heilige Tempelanlage von Mỹ Sơn, wo seit Generationen unsere Könige und Priester feierliche Rituale zu Ehren von $shiva_god$, dem Beschützer unseres Reichs, durchführen. Diese Türme wurden mit Hingabe errichtet und mit heiligen Symbolen verziert und verknüpfen uns mit unseren Vorfahren und dem Göttlichen. Solange in ihren Heiligtümern Weihrauch glimmt, lebt die Seele von Champa weiter."
 #Lorraine
 lor_mining_tradition: "Minen von Lothringen"
 lor_mining_tradition_desc: "Unsere Länder sind reich an Erzen und Kohle, was wir zu unserem Vorteil nutzen können. Der Abbau dieser Ressourcen könnte uns zu einem reichen Land machen und einen Ausgangspunkt für unsere Ambitionen schaffen."
 lor_cultural_diversity: "Land vieler Kulturen"
 lor_cultural_diversity_desc: "Wir liegen zwischen mehreren Kulturen, die sich in unserem Gebiet niederließen. Die Gründung eines Staates, der diese Völker gerecht regiert, wird nicht einfach sein, doch es ist eine notwendige Herausforderung, die es zu bewältigen gilt. Nur dann können wir uns mit jenem lothringischen Staat vergleichen, von dem wir abstammen."
 lor_three_bishoprics: "Land der Bischöfe"
 lor_three_bishoprics_desc: "Lothringen ist Sitz vieler Bistümer mit einflussreichen Unterstützern in der Fremde und innerhalb der Kirche selbst. Die Zusammenarbeit mit ihnen ist ein nützliches Werkzeug, um unserer Stimme innerhalb der gesamten Kirche Gehör zu verschaffen. Die Unterstützung der Bischöfe ermöglicht es uns zudem, die Bevölkerung leichter ruhig zu halten."
 lor_between_great_powers: "Vermächtnis alter Könige"
 lor_between_great_powers_desc: "Unsere Lande waren einst ein wichtiger Teil von Lotharingien, einem der fränkischen Königreiche. Wenn wir nicht in der Bedeutungslosigkeit verschwinden wollen, müssen wir unsere diplomatische Stellung sichern und dauerhafte Bündnisse schmieden."
 lor_fortified_cities: "Festungsstädte von Lothringen"
 lor_fortified_cities_desc: "Wir halten wichtige Querungen mehrerer Flüsse, die wir um jeden Preis verteidigen müssen, wenn wir unsere Unabhängigkeit sichern wollen. Zu diesem Zweck müssen wir die großen Brückenburgen unserer Städte modernisieren und große Zitadellen errichten."
 #Circassia
 cir_tribal_elections: "Stammeswahlen"
 cir_tribal_elections_desc: "Wir werden einen nominellen Anführer wählen, der als Vertreter unseres Volkes fungiert, sich aber aus den konkreten Angelegenheiten der örtlichen Herrscher heraushalten wird."
 cir_mercenary_employment: "Tscherkessische Söldner"
 cir_mercenary_employment_desc: "Unsere Lande wurden immer wieder von fremdländischen Mächten überfallen und ausgenutzt, wobei unser Volk oft versklavt wurde. Manche dieser Sklaven, die man als Soldaten einsetzte, gelangten in ferne Länder und häuften dort Macht und Reichtum an. Mit etwas Überzeugungsarbeit könnten wir sie davon überzeugen, in unser Land zurückzukehren und es vor zukünftigen Invasionen zu schützen."
 cir_horsemen_of_the_steppe: "Geübte Reiter"
 cir_horsemen_of_the_steppe_desc: "Unsere Lage am Rand der großen europäischen Steppe führte schon mehrfach zu Reiterinvasionen unseres Heimatlands. Wenn wir unsere Unabhängigkeit wahren wollen, müssen wir selbst ein großes Heer aufstellen und unseren Einfluss in die Steppe ausweiten, um den Wohlstand unseres Kernlandes zu sichern."
 cir_city_and_fortress: "Befestigte Dörfer"
 cir_city_and_fortress_desc: "Unsere Siedlungen sind ungeschützt und eine leichte Beute für Eindringlinge. Während sie wachsen, gliedern wir hügeliges Gelände in unsere Verteidigungslinien ein und verbessern so den Schutz dieser Ortschaften. Bei Bedarf legen wir das erforderliche erhöhte Gelände selbst an und schützen so die Heimat unserer Bevölkerung."
 cir_grand_prince_of_circassia: "Großfürstentum"
 cir_grand_prince_of_circassia_desc: "Um unser Volk zu einen, sollten wir den größten unserer Fürsten zum Großfürsten ernennen, damit er als vorbildlicher Anführer unserer Truppen dient."
 cir_multireligious_society: "Nebeneinander der Religionen"
 cir_multireligious_society_desc: "Viele Katholiken, Muslime und Orthodoxe besuchen unser Land und treiben mit uns Handel. Wir sollten die Toleranz ihnen gegenüber bei unseren Untertanen fördern, um einen fruchtbaren Boden für den Wohlstand zu schaffen."
 #Sunda
 seren_taun: "Sérén Taun"
 seren_taun_desc: "Das Sérén-Taun-Fest fidnet jährlich nach der Ernte statt und ist eine Danksagungszeremonie, bei der man reiche Felderträge feiert. Mit Ritualen, Opferungen und Musik stärkt es die Gemeinschaft unserer Kampung-Kampung und erinnert alle an das heilige Gleichgewicht zwischen Mensch, Reis und Natur."
 pepper_of_the_parahyangan: "Parahyangan-Pfeffer"
 pepper_of_the_parahyangan_desc: "Der fruchtbare Vulkanboden des sundanesischen Hochlands eignet sich hervorragend für den Anbau des kostbaren schwarzen Pfeffers. Händler aus aller Welt verlangt es wegen ihrer Kraft und ihres Aromas nach unseren Pfefferkörnern. Wir müssen diesen Schatz der Natur nutzen, um unseren Einfluss im Gewürzhandel auszuweiten."
 pan_asian_trade: "Panasiatischer Handel"
 pan_asian_trade_desc: "Sunda liegt an der Schnittstelle verschiedener Großreiche: Indien, China und die islamische Welt. Indem wir uns als unverzichtbarer Knotenpunkt in diesem Netzwerk in Stellung bringen, sichern wir uns den Zugang zu Gütern, Ideen und Partnern in ganz Asien und machen unsere Häfen zu Toren des Reichtums."
 extend_kampung_kampung: "Kampung-Kampung-Erweiterung"
 extend_kampung_kampung_desc: "Die Grundlage der sundanesischen Gesellschaft bildet das Kampung, jene ländliche Gemeindeform, die unsere Landschaft prägt. Investitionen in die Infrastruktur solcher Dörfer gewährleisten ein nachhaltiges Wachstum, eine starke örtliche Führung und Widerstandsfähigkeit gegen Hunger und Invasion."
 #Scandinavia
 sca_unified_scandinavia: "Geeintes Skandinavien"
 sca_unified_scandinavia_desc: "Die Vereinigung Dänemarks, Norwegens, Schwedens und Finnlands unter einer Krone verwandelte den Norden von einem Schlachtfeld wetteifernder Könige in eine zentralisierte Macht. Durch eine einheitliche Verwaltung und verstärkte Zusammenarbeit zwischen den Ständen erlangen wir eine stärkere Kontrolle über das Reich."
 sca_legacy_kalmar_union: "Vermächtnis der Kalmarer Union"
 sca_legacy_kalmar_union_desc: "Auch wenn die Kalmarer Union im Streit zerbrach, schuf sie einen Präzedenzfall für eine gemeinsame nordische Souveränität. Gestützt auf dieses Erbe bekräftigen wir unsere Autorität und erinnern unsere Untertanen daran, dass Einigkeit Stärke bringt, nicht Unterwerfung."
 sca_sound_toll: "Der Sundzoll"
 sca_sound_toll_desc: "Die Kontrolle über den Öresund gibt uns das Recht, allen fremdländischen Schiffen, die die dänische Meerenge passieren, den Sundzoll aufzuerlegen. Dieses uralte Privileg verwandelt einen geografischen Vorteil in materiellen Reichtum und stärkt unsere Vorherrschaft im nördlichen Handel."
 norwegian_heritage: "Norwegisches Seefahrervermächtnis"
 norwegian_heritage_desc: "Norwegens raue Küsten und Seefahrertraditionen prägen ein Volk, das sich auf Seefahrt, Fischerei und Navigation spezialisiert hat. Das Erbe der nordischen Fischer und Schiffsbauer treibt unsere Unternehmungen zur See voran und stärkt das Leben in unseren Küstengemeinden."
 danish_heritage: "Vermächtnis der dänischen Werften"
 danish_heritage_desc: "Dänemarks lange Seefahrertraditionen und sein Können in der Logistik zur See gipfelten in großen Werften wie denen in Kopenhagen. Als Skandinavier übernahmen wir diese leistungsstarke Infrastruktur und diese Traditionen, was unser diplomatisches Ansehen und unsere Bereitschaft zur See stärkt."
 swedish_roots: "Schwedische Militärwurzeln"
 swedish_roots_desc: "Von den disziplinierten karolischen Truppen bis hin zur starken Freibauernschaft ist Schwedens militärische Stärke eine wesentliche Säule Skandinaviens. Durch die Eingliederung schwedischer Institutionen und Rekrutierungssysteme unterfüttern wir die Mannstärke und die Schlagkraft unseres Reiches."
 finnish_heritage: "Finnische Frontkavallerie"
 finnish_heritage_desc: "Die Hakkapeliitta, die finnische Kavallerie, erlangte in europäischen Kriegen einen furchterregenden Ruf. Diese Reiter, die in den wilden Wäldern und Ebenen Finnlands aufwuchsen, bringen Erfahrung, Anpassungsfähigkeit und Zähigkeit mit. Indem wir ihre Rolle formalisieren, schaffen wir eine dauerhafte Elitetruppe innerhalb unserer Armeen."
 #Jerusalem
 symbol_of_catholicism: "Symbol des Katholizismus"
 symbol_of_catholicism_desc: "Jerusalem ist die heiligste Stadt der Christenheit, der Ort der Passion und der Auferstehung Christi. Indem wir die katholische Vorherrschaft über diesen heiligen Ort behaupten, werden wir zum spirituellen Leuchtfeuer der lateinischen Welt und zu einer Säule des wahren Glaubens."
 protectors_of_jerusalem: "Beschützer von Jerusalem"
 protectors_of_jerusalem_desc: "Wir stehen an vordersten Front der Christenheit, umgeben vom Unglauben. Es ist unsere heilige Pflicht, die Heilige Stadt zu beschützen und den Heiden, die es wagen, sie erobern zu wollen, Angst und Schrecken einzujagen."
 latin_patriarch: "Lateinisches Patriarchat"
 latin_patriarch_desc: "Das Papsttum hat den Lateinischen Patriarchen von Jerusalem, der einst verbannt und vergessen war, wieder in sein Amt eingesetzt. Der nun wieder eingesetzte Patriarch wird unseren Einfluss in Rom stärken und unsere Rolle als Hüter der Interessen der Kirche im Osten untermauern."
 rites_holy_sepulchre: "Riten des Heiligen Grabes"
 rites_holy_sepulchre_desc: "In der Grabeskirche werden die alten lateinischen Riten wieder in voller Pracht durchgeführt. Diese feierlichen Rituale zu Ehren des Todes und der Auferstehung Christi bekräftigen unseren göttlichen Auftrag, dieses Land zu regieren und die Lehren unseres Glaubens zu verbreiten."
 latinate_integration: "Lateinische Eingliederung"
 latinate_integration_desc: "Unser Reich ist ein Schmelztiegel europäischen Adels, pilgernder Eiferer und Nachfahren der alten Levantiner. Durch sorgfältige Regierungsführung werden wir dieses vielfältige Erbe zu einer lateinisch-christlichen Gesellschaft einen, in der Glaube und Kultur Hand in Hand gehen."
 #Chinese Culture and tag
 chinese_siege_engineers: "Geplante Belagerungen"
 chinese_siege_engineers_desc: "Die Mauern unserer Festungen und Städte waren schon immer dick und robust, und selbst unsere besten Belagerungswaffen konnten ihnen keinen ernsthaften Schaden zufügen. Daher mussten unsere Pioniere viele verschiedene Taktiken und Strategien entwickeln, um befestigte Stellungen erfolgreich zu belagern."
 chi_legitimate_claimant: "Mandatsanspruch"
 chi_legitimate_claimant_desc: "Obwohl wir aus bescheidenen Verhältnissen stammen, stellten wir unsere Führungsqualitäten unter Beweis und sammelten viele treue Untertanen an. Wir gelten heute als würdige Anwärter auf das Mandat des Himmels und somit das Reich der Mitte."
 chi_great_rivers_of_china: "Fruchtbare Flüsse"
 chi_great_rivers_of_china_desc: "Auch wenn es gewisse Wagnisse birgt, dass die großen Flüsse durch unsere Lande fließen, bieten sie uns doch auch die Möglichkeit, große Mengen an Nahrung zu erzeugen."
 #Arabian
 arabian_horsemanship: "Arabische Reitkunst"
 arabian_horsemanship_desc: "Die in unserem Land gezüchteten Pferde sind in vielen Ländern aufgrund ihrer Schönheit und Stärke begehrt. Wenn wir uns auf ihre Zucht und ihre Ausfuhr konzentrieren, kommt uns ihr Ruf selbst zugute."
 arabian_desert_warfare: "Stärke der Wüste"
 arabian_desert_warfare_desc: "Das unwirtliche Gelände der Arabischen Wüste machte unsere Krieger stark und gab ihnen das Handswerkszeug mit, um den Feind zu zermürben, bevor sie zum tödlichen Schlag ansetzen."
 arabia_cradle_of_islam: "Wiege des Islam"
 arabia_cradle_of_islam_desc: "In unseren Landen liegen einige der heiligsten Stätten unseres Glaubens. Dies führt zu einer tiefen Verbundenheit unserer Menschen mit ihrem Glauben und wird sie zu vielen großen Taten inspirieren."
 arabia_red_sea_trade: "Handel im Roten Meer"
 arabia_red_sea_trade_desc: "An unserer Küste gibt es zahlreiche Handelsposten, die wertvolle Güter aus unserem eigenen Land und von fremden Gestaden beherbergen. Es ist an der Zeit, dass wir unseren gerechten Anteil an diesem Reichtum einfordern, der unser Territorium passiert."
 #Indonesia Region
 indonesia_outer_islands_archipelago: "Indonesischer Archipel"
 indonesia_outer_islands_archipelago_desc: "Seewege spielen in unserer Gesellschaft naturgemäß eine große Rolle, da wir von Gewässern umgeben sind. Da wir so viel über See handeln und befördern, kann unsere Bevölkerung mit Leichtigkeit Meere überqueren."
 indonesia_naval_supremacy: "Macht zur See"
 indonesia_naval_supremacy_desc: "Unsere politische Bedeutung innerhalb des Archipels beruht fast ausschließlich auf der Stärke unserer Seestreitkräfte. Durch die Verbesserung der Ausbildung unserer Seeleute und den Aufbau unserer Flotte sichern wir unsere Vorherrschaft über die kleineren Staaten Indonesiens."
 indonesia_trading_hub_of_the_east: "Handelshafen des Ostens"
 indonesia_trading_hub_of_the_east_desc: "Unabhängig von Herkunft und Ziel muss jeder asiatische Händler irgendwann unser Land durchqueren und bringt sowohl wertvolle Güter als auch Geschichten von seinen Reisen mit."
 indonesia_archipelago_of_many_faiths: "Land vieler Völker"
 indonesia_archipelago_of_many_faiths_desc: "Auf unseren Inseln leben viele verschiedene Völker, die unterschiedliche Sprachen sprechen und an viele verschiedene Götter glauben. Nur wenn wir ein gemeinsames Verständnis und Toleranz zwischen ihnen schaffen, sichern wir den Wohlstand des Landes."
 #United States of America
 usa_mayflower_compact: "Mayflower-Vertrag"
 usa_mayflower_compact_desc: "Verbunden durch die gemeinsame Gefahr und das gemeinsame Ziel schlossen die frühen Siedler einen Pakt der Selbstverwaltung. Selbst in der Wildnis konnten die Samen der Gemeinschaft und des Kompromisses so Wurzeln schlagen."
 usa_empowered_assemblies: "Ermächtigte Versammlungen"
 usa_empowered_assemblies_desc: "Überall in den Kolonien entstanden gewählte Versammlungen, die den Landbesitzern eine Selbstverwaltung ermöglichten. In den Hallen dieser Institutionen liegen die bescheidenen Ursprünge der Freiheit."
 usa_great_awakening: "Großes Erwachen"
 usa_great_awakening_desc: "Eine Welle der religiösen Erweckung rollt über das Land, fordert alte Autoritäten heraus und weckt das moralische Gewissen eines sich erhebenden Volks."
 usa_declaration_of_independence: "Unabhängigkeitserklärung"
 usa_declaration_of_independence_desc: "#italic Wir halten diese Wahrheiten für ausgemacht, daß alle Menschen gleich erschaffen worden.#! \n\nMit dieser mutigen Erklärung sprengen wir die Ketten der Unterjochung und nehmen unser gemeinsames Schicksal an."
 usa_bill_of_rights: "Grundrechtserklärung"
 usa_bill_of_rights_desc: "#italic … oder die Freiheit von Meinung oder Presse einzuschränken; oder das Recht der Bevölkerung, sich friedlich zu versammeln und bei der Regierung Petitionen zur Abhilfe von Missständen einzureichen.#!"
 usa_recognized_sovereignty: "Anerkannte Souveränität"
 usa_recognized_sovereignty_desc: "Verträge und Diplomatie bestätigten nun, was wir uns mit unserem Ringen verdienten. Unser Platz auf der Bühne der Diplomatie wird nicht mehr infrage gestellt, sondern anerkannt."
 usa_era_good_feelings: "Zeitalter des Wohlgefühls"
 usa_era_good_feelings_desc: "Im Nachgang der harten Jahre schenkten uns Frieden und Einigkeit einen seltenen Augenblick nationaler Harmonie. Die Menschen blühen dank all der Zuversicht und Ordnung auf."
 #Kongo
 kon_bakongo_confederation: "Bakongo-Konföderation"
 kon_bakongo_confederation_desc: "Vor dem Aufstieg unseres Reiches regierten sich die Menschen dieser Region durch Clanräte und Provinzbündnisse selbst. Was wir heute $KON$ nennen, entstand aus Jahrhunderten eng miteinander verflochtener Beziehungen, in denen die Treue gegenüber Land und Verwandtschaft wichtiger war als die Treue gegenüber Grenzen. Die Vereinigung dieses Flickenteppichs zu einem zentralisierten Reich war keine leichte Aufgabe, doch es gelang uns und wir werden ihn auch weiterhin zusammenhalten."
 kon_lineage_lukeni_lua_nimi: "Ahnenlinie von Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc: "Alles muss irgendwo beginnen, und für unser Königreich liegt dieser Beginn bei Lukeni lua Nimi. Er war mehr als ein Eroberer. Er war ein Gründer, der Vater unseres Reiches. Seine Blutlinie flößte Respekt ein, nicht nur wegen ihrer Abstammung, sondern weil sie an jene Menschen erinnerte, die als Erste von einem vereinten $KON$ zu träumen wagten."
 kon_european_contact: "Kontakt mit Europa"
 kon_european_contact_desc: "Die Fremden kamen vom Meer mit Bärten, Büchern und Weinfässern. Sie brachten fremde Götter, fremde Sprachen und ein Meer an Möglichkeiten mit. Unsere Gesandten lernten ihre Bräuche und Absichten kennen – aber vor allem lernten sie, wie sich ihre Suche nach Verbündeten zu unserem Vorteil nutzen lässt."
 kon_cultural_syncreticism: "Kultureller Synkretismus"
 kon_cultural_syncreticism_desc: "Der Zustrom von Fremden und der Austausch mit ihnen prägten unsere Gesellschaft. Dennoch gaben wir unsere Traditionen nicht auf. Wir rufen Gottheiten mit Kikongo-Namen an, tragen viele religiöse Insignien und unsere Zeremonien werden von Trommeln und Hymnen begleitet. Dies ist ein lebendiges Beispiel unserer Klarheit, und die Götter scheinen dem zuzustimmen."
 kon_study_european_firearms: "Studium europäischer Feuerwaffen"
 kon_study_european_firearms_desc: "Durch eine Muskete wird man vielleicht nicht mutig, aber man wird gefürchtet. Mögen die Europäer mit ihrer Überlegenheit prahlen: Wir werden ihre Waffen kaufen und ihren Drill meistern. Schon bald wird das Einzige, was unsere Soldaten von ihren unterscheidet, die Farbe der Flaggen sein."
 kon_transatlantic_slave_trade: "Transatlantischer Sklavenhandel"
 kon_transatlantic_slave_trade_desc: "In Übersee braucht man Gefangene und Arbeiter, um die vielen Baustellen, Plantagen und Minen zu versorgen. Es ist wahrlich kein edles Unterfangen, doch lassen sich die Gewinne nicht bestreiten."
 #Ilkanate
 ilk_restore_yam: "Wiederherstellung des Örtöö"
 ilk_restore_yam_desc: "Das Örtöö, unser uraltes Netz aus Zwischenstationen und Boten, verband einst die entlegensten Winkel der mongolischen Welt. Durch die Wiederherstellung dieses riesigen Netzes in Persien und darüber hinaus stellen wir sicher, dass unsere Befehle rasch ankommen, unsere Gesandten sicher sind und unser Herrschaftsgebiet gut auf unsere Anweisungen antwortet, genau wie in den goldenen Tagen der Khane."
 ilk_ilkhanate_resurgent: "Wiederauflebendes $ILK$"
 ilk_ilkhanate_resurgent_desc: "Was einst zerbrochen war, wurde nun neu geboren. Unsere Banner wehen wieder im Wind über Persien und sorgen für Ehrfurcht und Schrecken in gleichem Maße. Während sich die Kunde von unserer wachsenden Macht verbreitet, wird sich die Welt daran erinnern, was es heißt, von einem wahren $ILKHANATE_LEADER_MALE$ beherrscht zu werden."
 ilk_persian_arts_and_architecture: "Persische Kunst und Architektur"
 ilk_persian_arts_and_architecture_desc: "Unsere Vorfahren herrschten mit dem Schwert, doch ihre Größe maß sich in Palästen, Bibliotheken und Minaretten. Folgen wir ihrem Beispiel und finanzieren wir nicht nur Mauern und Straßen, sondern auch Moscheen, Gärten und Schulen als Zeugnisse der Größe des Ilkhanats."
 ilk_descendants_of_genghis_khan: "Nachfahren von $genghis_khan_name_no_tooltip$"
 ilk_descendants_of_genghis_khan_desc: "Das Blut des $rank_empire_horde_ruler_suffix_male$s fließt durch unsere Adern. Niemand soll je vergessen, dass unsere Herrschaft in der Steppe vorherbestimmt war und durch Eroberungen besiegelt wurde. Unsere Reiter sind unübertroffen, und unsere Banner tragen nicht nur einen Namen, sondern ein Geburtsrecht."
 ilk_new_roots: "Neue Wurzeln"
 ilk_new_roots_desc: "Die Tage der reinen Steppeneroberung liegen hinter uns. Wir haben uns selbst als Saat in den Boden des Fortschritts und der Reformen ausgebracht: Aus dieser Krume soll ein stabilerer, kultivierterer Staat erwachsen. Auch wenn unser Herz noch im Rhythmus der offenen Weite schlägt, liegt unsere Zukunft in dauerhaften Institutionen, nicht in flüchtigen Raubzügen."
 #Hindustan
 hin_sepahi: "Sipâhi"
 hin_sepahi_desc: "Zu unterschätzen, wie wichtig Infanteriesoldaten sind, war der Grund, warum viele angehende Eroberer dieser Lande gescheitert sind. Wir müssen sicherstellen, dass unsere Truppen mit den wirksamsten Schusswaffen ausgerüstet und in Taktiken geschult sind, die sich an jeden Feind anpassen lassen."
 hin_united_india: "Geeintes $india$"
 hin_united_india_desc: "Die vielen Völker, Kulturen, Sprachen und Nationen des indischen Subkontinents sollen unter einem gemeinsamen Banner vereint werden. Nur mit einem gemeinsamen Verständnis und einer sorgfältig gehegten Einheit unter den Indern erreichen wir größere Ziele."
 hin_ganga: "Gaṅgā"
 hin_ganga_desc: "Viele Hindus verehren den Ganges als Göttin, die den Gläubigen Reinheit und Erlösung bringt. Wir bitten Pilger, die Flussufer aufzusuchen und im heiligen Wasser zu baden. Durch Gaṅgā wird unser Volk rein."
 hin_persianate_court: "Persifizierte Hofkultur"
 hin_persianate_court_desc: "Fremdländische Sprachen und Hofbräuche haben an indischen Höfen schon seit Langem großen Einfluss. Wir sollten diese Bande nutzen, um die fähigsten Berater einzuladen, unter unserer Leitung zu dienen."
 hin_gunpowder_empire: "Schießpulverreich"
 hin_gunpowder_empire_desc: "Unsere Beherrschung der Schießpulverkriegsführung brachte uns Ruhm und die Herrschaft über einen großen Staat ein. Diese Dominanz wäre ohne die Förderung der Produktion von Schusswaffen für unsere Truppen unmöglich gewesen."
 hin_sufism: "Anziehung von Sufi-Missionaren"
 hin_sufism_desc: "Muslimische Fürsten auf der ganzen Welt wetteifern um die weisesten Sufi-Lehrer. Mit zunehmendem Ansehen schlossen sich uns immer mehr dieser Sufis an. Dort, wo sie sich niederließen, oft in zuvor unwirtlichen Regionen, wurden Städte gegründet, und die Weisheit der Sufis inspirierte die Menschen vor Ort, zu unserem Glauben zu konvertieren."
 hin_administration_of_india: "Indische Verwaltung"
 hin_administration_of_india_desc: "Einen Staat zu regieren, der so groß ist wie ein ganzer Subkontinent, ist keine leichte Aufgabe. Wir müssen in Zusammenarbeit mit den örtlichen Fürsten ein robustes Verwaltungssystem entwickeln, um den Reichtum aus unseren Landen zu ziehen."
 hin_indian_empire: "Kaiserliches Indien"
 hin_indian_empire_desc: "Keinem Herrscher – ob nun Muslim, Hindu, Buddhist oder Jainist – ist es je gelungen, ganz Indien zu erobern. Wir werden die ersten Gesamtherrscher Indiens sein!"
 hin_rocketry: "Entwicklung der Raketentechnik"
 hin_rocketry_desc: "Raketen mit Eisenmantel wurden bisher nicht in größerem Umfang für militärische Zwecke eingesetzt, doch ihre Sprengkraft bietet durchaus taktische Anwendungsmöglichkeiten. Wir sollten mit dieser Technologie experimentieren und sie auf dem Schlachtfeld erproben."
 hin_industrialization: "Industrialisierung $india$s"
 hin_industrialization_desc: "Die wirtschaftlichen Bedingungen in Indien sind bestens für ein schnelles Wachstum der Industrie geeignet. Mithilfe neuer Technologien verbessern wir die Bedingungen für unsere örtliche Fertigung, insbesondere in der Tuchindustrie. Die Ausrichtung auf neue Fertigungsmethoden gewährleistet ein stetiges Wachstum der Industrie in unserem gesamtindischen Staat."
 #Carthage
 cth_merchant_legacy: "Handelstradition"
 cth_merchant_legacy_desc: "Phönizische Handelsflotten bereisten viele Jahrhunderte lang das Mittelmeer. Ihr Vermächtnis gewährt den Söhnen Karthagos einen Vorteil im Handel, wodurch wir noch effizienter und erbarmungsloser vorgehen können. Bald kontrollieren wir wieder sämtliche Warenströme."
 cth_breadbasket_of_rome: "Kornkammer Roms"
 cth_breadbasket_of_rome_desc: "Vor vielen Jahrhunderten verdiente sich Karthago durch Innovationen auf den Gebieten der Bewässerung und des Olivenanbaus den Beinamen als Kornkammer Roms. Durch eine Rückbesinnung auf ebenjenes Wissen wird es uns gelingen, die Wüste erneut zu zähmen und wie in der Antike mit Olivenhainen zu durchziehen."
 cth_mercenary_army: "Söldnerarmee"
 cth_mercenary_army_desc: "Zahlenmäßig ist die Bevölkerung der Nation Karthago anderen Ländern weit unterlegen, weshalb wir seit Jahrhunderten Söldner dafür bezahlen, unsere Schlachten für uns zu schlagen. Seit der Reformation Karthagos führen wir diese Tradition fort, um unser Volk vor den Gefahren des Krieges zu schützen."
 cth_cothons: "Kothon"
 cth_cothons_desc: "Der uralte Kothon von Karthago war ein technologisches Meisterwerk, das einst einen effizienten Schiffsbau ermöglichte. Nun soll uns das Vermächtnis dieser Zeit als Vorlage für unser ganzes Land dienen. Das Studium der alten Schiffsbautechniken ermöglicht es uns, auf dem Meer wieder die Vorherrschaft zu erlangen. Schon bald wird die Marine Karthagos wieder das gesamte Mittelmeer bereisen."
 cth_phoenician_sailors: "Phönizische Seeleute"
 cth_phoenician_sailors_desc: "Nach der Wiederauferstehung unseres uralten Königreichs knüpften wir Bande zu unseren phönizischen Brüdern in Libyen. Seitdem erreicht jeden Tag eine Schar Freiwilliger unser Land, die ihren Beitrag zum Wiederaufbau des uralten phönizischen Königreichs Karthago leisten wollen. Wir können demnach nun eine viel größere Marine unterhalten."
 cth_legacy_of_hannon: "Das Vermächtnis von Hanno"
 cth_legacy_of_hannon_desc: "Hanno der Seefahrer war ein berühmter Entdecker der Antike, der die Küste Afrikas bis in den tiefen Süden erkundete. Wir werden seinem Beispiel folgen und erneut zu Entdeckungsreisen aufbrechen, um unser einst ruhmreiches Handelsimperium zu altem Glanz zu verhelfen. Diesmal werden wir uns weiter hinauswagen als je zuvor, denn auf der ganzen Welt warten neue Handelsmöglichkeiten auf uns."
 cth_beyond_the_pillars: "Jenseits der Säulen"
 cth_beyond_the_pillars_desc: "Es ist Zeit, unsere Produktionsstätten auf die Gebiete jenseits der sagenumwobenen Säulen des Herkules auszudehnen. Dank eines Zusammenspiels aus uralten Siedlungstechniken und modernem Wissen siedeln wir uns effizienter an anderen Orten an als jüngere Nationen, die nur wenig Erfahrung in diesem Bereich haben. Schon bald wird Karthago auf der ganzen Welt Kolonien errichtet haben."
 cth_wine_traders: "Punischer Weinhandel"
 cth_wine_traders_desc: "In der Antike schufen wir einen regen Weinhandel, wobei wir große Mengen minderwertigen Weins herstellten und anderswo verkauften und im Gegenzug selbst Wein von hoher Qualität einführten. Nun wollen wir darauf aufbauend unsere Weinherstellung erweitern, bis wir den gesamten Weinhandel im Mittelmeerraum kontrollieren."
 cth_punic_global_trade: "Punischer Welthandel"
 cth_punic_global_trade_desc: "Unsere Nation dominierte viele Jahrhunderte den Handel im Mittelmeerraum. Dank der Entdeckungen der jüngsten Zeit ist es uns vorherbestimmt, demnächst den weltweiten Handel zu dominieren. Schon bald werden in jedem Hafen der Welt karthagische Handelsschiffe vor Anker gehen."
 cth_sufet_rule: "Herrschaft des Šūfeṭ"
 cth_sufet_rule_desc: "Einst herrschte ein gewähltes Oberhaupt, der Šūfeṭ, über unser uraltes Königreich. Die heutige Zeit macht eine Umstrukturierung unserer Regierung erforderlich. Wir werden dabei unsere Erfahrungen aus der Antike mit modernen Theorien verschmelzen und auf dieser Grundlage die Mächtigste aller Republiken schaffen, die alle anderen überstrahlt."
 #Aztec Formable Advances
 network_of_cities: "Netzwerk von Städten"
 network_of_cities_desc: "Über Seen und Täler verbinden sich unsere Städte über Straßen, Märkte und geeinte Ziele, was unsere Reichweite ausdehnt."
 status_by_merit: "Status nach Verdienst"
 status_by_merit_desc: "Krieger und Adlige steigen durch Tapferkeit und guten Dienst auf, sodass jene Verantwortung tragen, die sie sich verdient haben."
 expansion_merchant_guilds: "Ausweitung der Kaufmannszünfte"
 expansion_merchant_guilds_desc: "Pochtēcah-Händler erweitern ihre Routen weit über unsere Lande hinaus und bereichern alle Marktplätze, die den Mexihcah treu sind."
 centralized_city_governance: "Zentralisierte Stadtregierung"
 centralized_city_governance_desc: "Wir wollen versuchen, die Ausbreitung unserer neu erlangten städtischen Territorien zu unterstützen. Dazu braucht es eine Reform der Regierung, die geeint unter einer festeren Aufsicht eine geordnetere und verlässliche Verwaltung schafft."
 wealth_of_mesoamerica: "Reichtum Mittelamerikas"
 wealth_of_mesoamerica_desc: "Die fruchtbaren Böden, Wälder und Minen von Ānāhuac bringen ungeheuren Reichtum hervor und erhalten unser Wachstum sowie unser Großreichsstreben. Wenn wir diese Ressourcen richtig nutzen, mehrt dies unsere verfügbaren Mittel."
 study_european_colonizers: "Studium europäischer Kolonisatoren"
 study_european_colonizers_desc: "Fremde haben Kontakt zu unserem Volk aufgenommen. Ihre unbekannten Schiffe und Waffen sorgen gleichermaßen für Ehrfurcht und Angst. Ihre Lebensart zu verstehen, ist womöglich der Schlüssel zum Überleben."
 new_fire_ceremonies: "Neue Feuerzeremonien"
 new_fire_ceremonies_desc: "Einmal alle zweiundfünfzig Jahre wird die Welt durch Flammen erneuert, was unser Volk im Glauben und im kosmischen Gleichgewicht eint."
 sun_must_rise: "Die Sonne muss aufgehen"
 sun_must_rise_desc: "Durch Ergebenheit und Rituale sichern wir den Lauf der Sonne, was die Herzen erleichtert und den Geist unseres Volks stärkt. Die Bewahrung dieses Gleichgewichts und sogar der gesamten Welt ruht auf unseren Schultern."
 #Kurdistan Formable
 krs_kurdish_tribes: "Stammestreue"
 krs_kurdish_tribes_desc: "Nachdem wir unsere Autorität über alle kurdischen Stämme geltend gemacht haben, sind wir in der Lage, ihre erfahrenen, abgehärteten Krieger zur Verteidigung unseres Landes einzusetzen."
 krs_legacy_of_the_kurdish_dynasties: "Das Vermächtnis der kurdischen Dynastien"
 krs_legacy_of_the_kurdish_dynasties_desc: "Unser Volk gründete mehrere große Dynastien und herrschte über Gebiete von Ägypten bis in den Iran. Indem wir unseren Staat mit dem Ruhm vergangener Herrscher verbinden, können wir ein einigendes Symbol für das kurdische Volk sein und unsere Herrschaft in den Augen unserer Untertanen legitimer erscheinen lassen."
 krs_kurdish_quarters: "Blühende kurdische Viertel"
 krs_kurdish_quarters_desc: "Zur Zeit der Fremdherrschaft gründeten viele aus unserem Volk in den Städten vorwiegend kurdisch geprägte Viertel. Diese Viertel gediehen auch unter den fernen Herrschern, und wir können ihren Reichtum nun unmittelbar nutzen und so eine blühende Zukunft für unser Volk sichern."
 krs_kurdish_horses: "Anpasssungsfähige Kavallerie"
 krs_kurdish_horses_desc: "Unser Heimatland ist von vielen Eroberern umgeben, die unser Volk unterjochen wollen. Zwar kann unser heimisches Gelände feindliche Armeen verlangsamen, doch es erschwert es auch unseren eigenen Truppen, rasch auf Bedrohungen zu antworten. Eine starke Kavallerie hingegen ermöglicht es uns, auf jede Bedrohung – ganz gleich, wie zahlreich ihre Truppen auch sein mögen – zügig zu reagieren."
 krs_kurdish_mercenaries: "Söldnererfahrung"
 krs_kurdish_mercenaries_desc: "Unsere Leute dienen schon lange als Soldklingen für fremdländische Fürsten, wobei sie wertvolle Kampferfahrung in deren Diensten erwerben. Nach der Schaffung unseres eigenen Landes wird es Zeit, diese erfahrenen Kämpfer unter unsere Banner zu rufen."
 krs_kurdish_warrior_poets: "Kriegerdichter"
 krs_kurdish_warrior_poets_desc: "Unsere Herrscher sollen nicht nur fähige Krieger sein, sondern müssen auch Kenntnisse in Sachen Kunst und effizienter Verwaltung besitzen. Indem sie Texte verfassen und ihre Regierungszeiten dokumentieren, geben unsere Anführer das Wissen und die Geschichte unseres Volkes an kommende Generationen weiter und stellen so sicher, dass keine wertvollen Erkenntnisse verloren gehen."
 #Manchu Formable Advances
 mohe_ancestry: "Mohe-Herkunft"
 mohe_ancestry_desc: "Unser Volk stammt von den Mohe-Stämmen der Amurwälder ab. Ihre Traditionen der Jagd, der Viehzucht und des entbehrungsreichen Lebens im Grenzgebiet prägen unsere Gesellschaft."
 warka_ties: "Warka-Bande"
 warka_ties_desc: "Unsere Verbindungen zu den Warka vermittelten uns wertvolle Kenntnisse über die Jagd und das Sammeln von Nahrungsmitteln. Dank dieser Praktiken stellen wir sicher, dass unser Volk auch in langen Wintern ausreichend zu essen hat."
 shadow_of_ambition: "Im Schatten des Ehrgeizes"
 shadow_of_ambition_desc: "Die Vereinigung der Jurchen-Stämme ist nur der erste Schritt unseres ehrgeizigen Aufstiegs zur Macht. Schon bald wird unser Name auf dem gesamten Kontinent Angst und Ehrfurcht auslösen."
 niyamniyan: "Niyamniyan"
 niyamniyan_desc: "Die Tradition der Fünf Edlen Talente umfasst Reiten, Bogenschießen, militärische Führung, Loyalität und Disziplin. Diese Aspekte unserer Kriegergesellschaft bilden das Rückgrat unserer stolzen Kultur."
 southern_campaigns: "Feldzüge im Süden"
 southern_campaigns_desc: "$CHI$ ist die Heimat unfassbarer Reichtümer und besitzt immenses Ansehen und Wissen. Unter der Herrschaft einer schwachen Dynastie fällt es uns zu, nach der Macht zu greifen und diesen Landen Wohlstand und Pracht zurückzubringen."
 foreign_learning: "Fremdländisches Wissen"
 foreign_learning_desc: "Von fremdländischen Gelehrten und Schriften übernehmen wir neue Praktiken in Verwaltung, Militär und Bildung und beschleunigen so unsere technologische Entwickung."
 #Malacca Formable
 melaka_tree: "Der Amlabaum"
 melaka_tree_desc: "Einer Legende nach suchte das scheue Hirschferkel Zuflucht in jenem Gebiet, das später unser Land werden sollte. Unsere Anfänge sind bescheiden: Wir waren kaum mehr als ein Fischerdorf im Schatten des Amlabaums. Aus diesen Wurzeln soll ein Volk heranwachsen, das eines Tages die gesamte Region prägen wird."
 orang_laut: "Orang Laut"
 orang_laut_desc: "Lange vor unserem Aufstieg durchstreiften die Orang Laut die Meerengen als Meister von Wind und Gezeiten. Indem wir heute ihre Lebensweise erlernen und einige Auserwählte in unsere Dienste stellen, geleiten wir Händler durch die engen Gewässer und schützen unsere Küste vor Piraten. Diese Wachsamkeit gewährleistet, dass alle, die nach Malakka segeln, sicher ankommen."
 congregation_of_merchants: "Versammlung von Händlern"
 congregation_of_merchants_desc: "Von Arabien bis China und den Küsten Südasiens strömen Kaufleute aus allen Teilen des Landes nach Malakka. Angezogen von gerechten Gesetzen, sicheren Gewässern und geschäftigen Märkten bilden sie eine große Versammlung, die unsere Häfen bereichert und unseren Namen über die Meere trägt."
 connections_with_china: "Beziehungen zu China"
 connections_with_china_desc: "Unsere Gesandten sicherten sich die Anerkennung der angesehenen Herrscher Chinas. Tribute und Wohlwollen gewährleisten unseren Schutz und verschaffen uns einen bevorzugten Platz in ihrem riesigen Handelsnetzwerk."
 control_the_malacca_strait: "Kontrolle über die Straße von Malakka"
 control_the_malacca_strait_desc: "Die $inner_strait_malacca$ ist für den maritimen Handel und unsere Wirtschaft von entscheidender Bedeutung. Indem wir die volle Kontrolle über diese Meerenge übernehmen, lenken wir ihren Reichtum in unsere Häfen und etablieren uns als Torwächter über den Ost-West-Handel."
 shahbandar: "Das Schāhbandar-System"
 shahbandar_desc: "Um den riesigen Zustrom an Händlern zu bewältigen, der in unseren Häfen ankommt, ernennen wir einen Schāhbandar, der dazu befugt ist, Zölle zu erheben, Streitigkeiten beizulegen und die Fremdenviertel zu organisieren. Dieses Amt wird auf unserem geschäftigen Umschlagplatz für Ordnung sorgen und gleichzeitig unsere Rolle als Entrepot der Weltmeere festigen."
 #Malaya Formable
 settle_the_islands: "Besiedlung der Inseln"
 settle_the_islands_desc: "Auf den verstreuten Inseln unserer Heimat liegen unzählige Küsten, die nur darauf warten, von uns bevölkert zu werden. Indem wir uns über die Inseln hinweg ausbreiten und Handelsposten errichten, die Felder bewirtschaften und neue Gemeinschaften gründen, sichern wir unserem Volk, das durch die Wogen zwischen uns geeint ist, unermesslichen Wohlstand."
 people_of_the_sea: "Seevolk"
 people_of_the_sea_desc: "Der Wind und die Gezeiten prägten unser Volk. Von Kindheit an lernen wir, dem Monsun zu trotzen, die Meerengen zu nutzen und dem Ruf des weiten Ozeans zu lauschen. Unsere Seeleute nehmen dieses Wissen auf jede ihrer Reisen mit und sind im ganzen Archipel für ihren Mut und ihre außergewöhnlichen Fähigkeiten bekannt."
 expert_hagglers: "Meisterhafte Feilscher"
 expert_hagglers_desc: "Wo auch immer unsere Händler Land erreichen, sei es an den Küsten Südasiens oder auf den Märkten des fernen China, werden sie für ihre scharfen Zungen und ihr gutes Urteilsvermögen respektiert. Sie zeigen sich gleichermaßen geschickt darin, über das Meer und durch Verhandlungen zu navigieren, und sie sorgen dafür, dass unsere Geschäfte niemals zu unserem Nachteil ausgehen."
 malay_merchants_in_every_port: "Malaiische Händler in jedem Hafen"
 malay_merchants_in_every_port_desc: "Von den Basaren Arabiens bis hin zu den Häfen Ostasiens: Unsere Händler sind ein vertrauter Anblick. Sie schufen ein riesiges Netzwerk und erlauben es uns, Enklaven in fernen Ländern aufzubauen und unsere Reichweite auf alle großen Handelszentren der Welt auszudehnen."
 agreements_sea_nomads: "Vereinbarungen mit den Seenomaden"
 agreements_sea_nomads_desc: "Die Sama und andere Seefahrernomaden lebten lange Zeit vom Meer selbst, und es ist ihr unvergleichliches Geschick, das es ihnen erlaubt hat, zwischen den Inseln umherzutreiben. Durch den Austausch von Wissen und anderweitige Vereinbarungen gewährleisten wir eine sichere Durchfahrt und schnelle Reparaturen."
 masters_of_spice: "Meister der Gewürze"
 masters_of_spice_desc: "Der Handel mit Nelken macht uns und unserer Volk immens reich. Indem wir sowohl das Land als auch das Meer kontrollieren, aus denen dieses Gewürz stammt, werden wir zum Mittelpunkt jenes Handels, der sich über die gesamte Welt erstreckt. Kein Händler kann der Verlockung dieser Waren widerstehen."
 #Sokoto Formable
 sko_fulani_expansion: "Sokoto-Ausweitung"
 sko_fulani_expansion_desc: "Die Völker Westafrikas mussten bereits viel zu lange unter den Strapazen einer Herrschaft schuften, die sich zwar zur Rechtschaffenheit bekannte, sich gleichzeitig jedoch auch dem Synkretismus hingab. Das muss ein Ende haben! Unser Banner wird von nun an über denen weltlicher Königreiche wehen!"
 sko_recruit_the_faithful: "Rekrutieren der Gläubigen"
 sko_recruit_the_faithful_desc: "Wir heißen jeden, der bereit ist, unseren rechtschaffenden Herrschern zu dienen, unabhängig von seiner Abstammung willkommen."
 sko_education_for_all: "Gelehrte"
 sko_education_for_all_desc: "Indem wir Männer und Frauen gleichermaßen alphabetisieren und bilden, bringen wir unsere Gesellschaft voran und festigen unseren Einfluss auf das Land. Die Familie unserer Herrscher muss bei diesen Bemühungen einen besonderen Platz einnehmen und dem Volk als Vorbild dienen."
 sko_religious_court: "Streng religiöser Hof"
 sko_religious_court_desc: "Anstatt den weltlichen Prunk unserer Herrschaft zur Schau zu stellen, widmet sich unser Hof ganz der Spiritualität. Indem wir wichtige Glaubensvertreter dazu einladen, an unserem Hauptsitz zu lehren, beweisen wir allen unsere Hingabe an den Glauben."
 sko_recruit_fulani_generals: "$fulbe$e Befehlshaber"
 sko_recruit_fulani_generals_desc: "Das fulbische Volk brachte viele hervorragende Krieger hervor, die große Armeen in weiten Teilen Westafrikas anführen. Wir sollten ihre fähigsten Befehlshaber in unsere Dienste stellen."
 sko_one_people_in_faith: "Einigkeit im Glauben"
 sko_one_people_in_faith_desc: "Unser Land ist die Heimat vieler unterschiedlicher Kulturen und Sprachen. Wir müssen unseren Glauben als bindende Kraft nutzen, um alle unter einem Banner zu vereinen."
 #Cologne
 kol_peace_in_the_city: "Frieden in der Stadt"
 kol_peace_in_the_city_desc: "Vor nicht allzu langer Zeit wurde unsere Stadt durch einen Zwist zwischen den Bürgern und dem Klerus schier auseinandergerissen. Wir müssen dafür sorgen, dass sich solch ein Streit niemals wiederholt und dass alle Mitglieder unseres Hofs und Stadtrats zusammenarbeiten, um Köln als Knotenpunkt am Rhein zu erhalten."
 kol_school_of_painting: "Kölner Malerschule"
 kol_school_of_painting_desc: "Unsere Stadt ist die Heimat vieler begabter Maler und Handwerker, die es verstehen, Bilder durch Medien wie Holz, Stein und insbesondere Glas zum Leben zu erwecken. Durch eine starke Künstlerzunft, die unter unserer Schirmherrschaft steht, werden sie weiter aufblühen und unserer Stadt zu neuem Glanz verhelfen."
 #Trier
 tri_balance_the_landstande: "Ausgewogenheit der Landstände"
 tri_balance_the_landstande_desc: "Unser Gebiet beherbergt sowohl zahlreiche Städte als auch Burgen vieler kaiserlicher Ritter. Ihre oft gegensätzlichen Interessen im Gleichgewicht zu halten, ist keine leichte Aufgabe. Nur wenn sie mit uns und dem Domkapitel zusammenarbeiten, stellen wir sicher, dass unsere Regierung weiter handlungsfähig bleibt."
 #Hesse
 hes_form_the_militia_army: "Stehendes Kernheer"
 hes_form_the_militia_army_desc: "Unsere strategisch günstige Lage innerhalb des Reichs macht uns zu einem attraktiven Stützpunkt für die Armeen anderer Reichsfürsten gegen äußere Bedrohungen. Die Versorgung ihrer Truppen stellt jedoch auch eine starke Belastung für unsere Finanzen dar. Um diese Last umzuverteilen, müssen wir unsere eigenen Truppen ausheben und sie in den Dienst des Reichs stellen."
 #Noble Societies Germany
 noble_society_baden_palatine: "Gesellschaft mit dem Esel"
 noble_society_baden_palatine_desc: "Die #italic Gesellschaft mit dem Esel#!, die sich rund um $heidelberg$ zusammenfand, wurde gegründet, um die ritterlichen Interessen innerhalb des Reichs zu wahren. Ihre Erfahrung im Bereich der Regierungsführung sowie ihre Fähigkeit, Turniere auszutragen, verbessern unser kulturelles Ansehen."
 noble_society_nassau: "Löwenbund"
 noble_society_nassau_desc: "Gegründet in den Wirren des westlichen Schismas hat sich der #italic Löwenbund#! (auch „Gesellschaft mit dem Löwen“) dem Schutz unserer Ländereien vor ketzerischen Aufständen verschrieben. Wir sollten ihm offizielle Unterstützung gewähren und ihn in unseren Gerichtshof einbinden, um unsere Sache voranzubringen."
 noble_society_mainz: "Bengler"
 noble_society_mainz_desc: "Die #italic Klüppelgesellschaft#! wurde von einer Gruppe von Rittern gegründet, die sich über den Verlust unserer Macht innerhalb des Heiligen Römischen Reichs sorgten. Es wäre klug, jene zu unterstützen, die bereit sind, für unseren Status im Reich zu kämpfen."
 noble_society_franconia: "Fürspänger"
 noble_society_franconia_desc: "Bei der #italic Gesellschaft mit dem Fürspang#! handelt es sich um einen Ritterorden, der es sich zum Ziel gemacht hat, die ritterlichen Interessen zu wahren und jenen zu helfen, die sich für sie einsetzen, und ihnen Unterstützung zukommen zu lassen. Indem wir der Gesellschaft umfangreiche Mittel zur Verfügung stellen, erhalten wir deutlich mehr politischen Einfluss in unserer Region und im Heiligen Römischen Reich selbst."
 noble_society_tyrol: "Elefantenbund"
 noble_society_tyrol_desc: "Unsere Nachbarn könnten jederzeit in unser Land einfallen und uns der Reichtümer in unseren Tälern berauben. Durch die Gründung und Finanzierung eines Ritterordens können wir im Bedarfsfall auf eine größere Streitkraft zurückgreifen."
 noble_society_cologne: "Hubertusorden"
 noble_society_cologne_desc: "Der #italic Hubertusorden#! wird als glorreiche Erinnerung an das Kampfgeschick unserer Ritter dienen! Dem Orden beitreten zu dürfen, wird eine Belohnung für unsere treuesten Ritter sein, und seine Mitglieder stellen für alle sichtbar unseren Ruhm zur Schau."
