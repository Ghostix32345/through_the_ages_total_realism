 town_rights_abs_advance: "Prächtiger Hof"
 town_rights_abs_advance_desc: "Als Standort unseres Hofs sollte unser Hauptsitz auch vom Ruhm und der Pracht unserer Herrschaft profitieren. Keine andere Stadt oder Großstadt sollte ihm in Majestät und Herrlichkeit auch nur nahekommen."
 town_rights_enable: "Bezirksprivilegien"
 town_rights_enable_desc: "Es steht außer Frage, dass eine größere Ansammlung von Menschen und Wohnhäusern sich deutlich vom üblichen Landleben unterscheidet. In Anlehnung an die Traditionen römischer selbstverwalteter Städte können wir solchen Siedlungen besondere Gesetze und Privilegien einräumen, um so den Unterschied deutlicher herauszustellen und ihren Bewohnern gewisse Vorteile zu gewähren."
 town_rights_aod_advance: "Hauptsitzvorherrschaft"
 town_rights_aod_advance_desc: "Unter allen Siedlungen unseres Landes, ländlichen wie städtischen, ist keine wichtiger als unser Hauptsitz. Hier sind unser Hof und die Quelle unserer Macht. Von daher verdient er auch eine bevorzugte Behandlung im Vergleich zu anderen Siedlungen."
 town_rights_ref_advance: "Entwickelter Hauptsitz"
 town_rights_ref_advance_desc: "Mit dem Wachstum unseres Landes wächst auch unser Hauptsitz, sodass die ihn betreffenden Gesetze beständig überprüft und überarbeitet werden müssen. Nur mit einem gut arbeitenden Hauptsitz, dessen Gesetze und Privilegien seiner Größe und Bedeutung angemessen sind, wächst unser Land weiter."
 town_rights_rev_advance: "Herz der Nation"
 town_rights_rev_advance_desc: "Als Ursprung unserer Regierung ist unser Hauptsitz das Herz der Nation. Dieser Umstand allein macht ihn besonders, sodass er privilegierter als alle anderen Orte sein muss."
