 #Hellenic Faith
 religious_dialects_hellenic_faith_advance: "Religiöse Dialekte"
 religious_dialects_hellenic_faith_advance_desc: "Obwohl viele Gemeinden unseren Glauben teilen, gibt es bemerkenswerte Unterschiede in Ritualen, Traditionen und örtlichen religiösen Praktiken. Diese Unterschiede entwickeln sich im Lauf der Zeit organisch, manchmal sogar innerhalb derselben Provinz. Ähnlich wie sich Sprachen zu regionalen Dialekten entwickeln, bilden auch unsere religiösen Bräuche allmählich eigenständige Ausprägungen, die doch in derselben heiligen Tradition stehen."
 offerings_to_the_moirai_advance: "Opfergaben an die Moiren"
 offerings_to_the_moirai_advance_desc: "Jedes Jahr widmen wir einen Teil unserer rituellen Opfergaben den drei Moiren, den Göttinnen, die das Schicksal selbst lenken. Clotho, die Spinnerin, Lachesis, die die Anteile des Lebens verteilt, und Atropos, die das unausweichliche Ende bestimmt, wachen über die Vollendung jedes sterblichen Lebens gemäß der kosmischen Ordnung. In vielen theologischen Traditionen gilt ihre Autorität als die urtümlichste, mitunter sogar höher als die der Götter."
 variety_in_divine_identity_advance: "Unterarten der göttlichen Identität"
 variety_in_divine_identity_advance_desc: "Unser Pantheon umfasst eine bemerkenswerte Vielfalt an Gottheiten, von denen jede unterschiedliche Tugenden, Handwerke und Ideale verkörpert. Diese Vielfalt ermöglicht es jedem Einzelnen, einen Schutzgott zu finden, der mit seinem Leben und seiner Berufung in Einklang steht. Der schlichte Altar eines Schmieds für Hephaistos ist ebenso bedeutsam wie die Zeusverehrung der Adligen."
 mystai_advance: "Mysterienkulte"
 mystai_advance_desc: "Hinter Masken, Symbolen und heiligen Ritualen verbergen sich einflussreiche Eingeweihte geheimnisvoller Mysterienkulte. Diese Organisationen üben beträchtlichen gesellschaftlichen und politischen Einfluss aus und prägen das Geschehen durch rituelle Autorität, Reichtum und diskrete Bündnisse. Weise Herrscher pflegen gute Beziehungen zu diesen Mystai, damit deren Einfluss und Intrigen sich nicht gegen den Staat richten."
 makaron_nisoi_advance: "Geschichten von den Gesegneten Inseln"
 makaron_nisoi_advance_desc: "Die #italic Makaron Nesoi#! oder Gesegneten Inseln sollen das Ziel der letzten Reise der tugendhaftesten Seelen sein. Wer ein frommes und auszeichnungswürdiges Leben führt, kann sich seinen Platz unter den Heldengeistern im Elysium verdienen. Erzählungen über diese heiligen Gefilde inspirieren die gesamte Gesellschaft zum Streben nach Tugend, Ehre und moralischer Vorbildhaftigkeit."
 preserve_theogony_advance: "Lehren der Theogonie"
 preserve_theogony_advance_desc: "Hesiods Theogonie erzählt vom Ursprung und der Ahnenreihe der Götter sowie der Entstehung der göttlichen Ordnung selbst. In ihren Versen werden Symbole der Autorität wie Zepter und Herrscherstimme als heilige Verpflichtungen dargestellt. Das Werk mahnt Herrscher, dass wahre Autorität mit Weisheit, Mäßigung und Vernunft ausgeübt werden muss."
 epic_poetry_advance: "Epische Dichtung"
 epic_poetry_advance_desc: "Seit Jahrtausenden bewahrt unser Volk die Legenden von Göttern und Helden in epischer Dichtung. Werke wie Homers Ilias und Odyssee sowie Hesiods Theogonie zählen zu den größten Zeugnissen unseres kulturellen Erbes. Diese zeitlosen Geschichten prägen bis heute unsere Identität und inspirieren ganze Generationen."
 on_hubris_and_morality_advance: "Über Hybris und Moral"
 on_hubris_and_morality_advance_desc: "Die Grundsätze unseres Glaubens entspringen dem Willen der Götter und werden durch Priester, Seher und Akte der Wahrsagung ausgelegt. Durch Prophezeiungen und heilige Deutungen versuchen die Sterblichen, die göttliche Ordnung des Kosmos zu begreifen. Doch der sicherste Weg zu moralischer Tugend bleibt Frömmigkeit, Ehrfurcht und die sorgsame Vermeidung zerstörerischer Hybris."
 unify_priestly_class_advance: "Vereinheitlichung der Priesterklasse"
 unify_priestly_class_advance_desc: "Über weite Strecken unserer Geschichte war die Priesterschaft, die für heilige Stätten und Tempeleinnahmen zuständig war, dezentral organisiert. Jüngste Entwicklungen in fremdländischen religiösen Institutionen brachten jedoch neue Organisationsformen und eine zentrale Autorität hervor. Diese Einflüsse ermutigen uns nun zu einer Vereinheitlichung und Koordinierung unserer eigenen Priesterhierarchie."
 central_bank_advance: "Central Banking"
 central_bank_advance_desc: "With the $banking$ institution firmly established, the state can now charter a permanent $central_bank$ empowered to issue $game_concept_government_bonds$. These bonds allow the crown to raise large sums quickly from private investors, repaying them through steady interest rather than relying on estate lending alone."

