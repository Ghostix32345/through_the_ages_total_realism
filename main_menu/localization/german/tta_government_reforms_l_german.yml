l_german:
  # tribe
  chiefdom: "Häuptlingstum"
  chiefdom_desc: "Macht fließt durch Verwandtschaftsbindungen und Räte statt durch einen fernen Staat. Neue Gebiete werden gewonnen, indem lokale Häuptlinge als Tributpflichtige gebunden werden und ihre Herrschaftsbereiche erst mit der Zeit in unsere politische Ordnung eingewoben werden."
  paramount_chiefdom: "Oberhäuptlingstum"
  paramount_chiefdom_desc: "Verwandtschaft und Räte bestehen fort, doch eine einzelne Oberherrschaft bindet kleinere Herrscher zu einem Reich. Die Expansion kann durch tributäre Unterwerfung, entschlossene Eroberung oder die Gründung neuer Siedlungen erfolgen – danach werden die Gebiete in unserem eigenen Tempo in das Zentrum eingegliedert."
