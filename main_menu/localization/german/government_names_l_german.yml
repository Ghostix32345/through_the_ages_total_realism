 # Ranks
 country_rank_effects_list_title: "ã[CountryRank.GetNameWithNoTooltip]ã hat den folgenden Effekt:"
 rank_empire_desc: "Dies ist der hûÑchste [country_rank|e] und reprûÊsentiert die angesehensten oder mûÊchtigsten [countries|e] der Welt."
 rank_kingdom_desc: "Dies ist der [country_rank|e], der die grûÑûeren [countries|e] reprûÊsentiert. Sie haben mehrere [provinces|e] und kûÑnnen recht viel Macht ausû¥ben."
 rank_duchy_desc: "Dieser [country_rank|e] reprûÊsentiert ein kleines bis mittelgroûes [country|e], û¥blicherweise mit nur einer [province|e], aber grûÑûer oder bevûÑlkerungsreicher als eines vom Rang ã$rank_county$ã."
 rank_county_desc: "Dieser [country_rank|e] stellt die kleinsten [countries|e] dar. Sie haben in der Regel nur einen [location|e]. Auch ein kleiner Stamm kann durch diesen Rang reprûÊsentiert werden."
 government_type_list_title: "[GovernmentType.GetNameWithNoTooltip] ermûÑglicht Folgendes:"
 government_type_list: "[advances|e]: #placeholder XX #!\n[laws|e]: #placeholder XX #!\n[policies|e]: #placeholder XX #!\n[heir_selections|e]: #placeholder XX #!\n[estate_privileges|e]: #placeholder XX #!"
