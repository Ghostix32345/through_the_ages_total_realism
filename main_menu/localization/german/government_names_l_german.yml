 government_type_list_laws_row: "[laws|e]: $VAL$"
 government_type_list_policies_row: "[policies|e]: $VAL$"
 monarchy_desc: "Eine $monarchy$ ist eine auf dem Prinzip der ungeteilten persûÑnlichen SouverûÊnitûÊt beruhende [government_type|e], in der der [ruler|e] an der Spitze der Eliten steht. Der [heir|e] wird in der Regel durch die [dynasty|e] des Monarchen bestimmt und regiert in den meisten FûÊllen auf Lebenszeit.\n\n$game_concept_monarchs$ kûÑnnen durch [royal_marriages|e] [alliances|e] sichern und durch [personal_unions|e] sogar fremde [countries|e] erben. Die Nachfolge ist jedoch oft eine schwierige Angelegenheit und Monarchien kûÑnnen leicht in [regencies|e] oder unter den Einfluss fremdlûÊndischer $game_concept_dynasties$ geraten."
 republic_desc: "Eine $republic$ ist eine [government_type|e], in der die [rulers|e] per [election|e] ermittelt werden, um fû¥r eine bestimmte Zeit als Vertreter der Bû¥rgerschaft zu dienen. Je nach [heir_selection|e] kann der $game_concept_ruler$ einem der [estates|e] angehûÑren.\n\nDie StûÊrke der politischen Institutionen macht Republiken widerstandsfûÊhiger gegen Nachfolgeprobleme, doch die weniger persûÑnliche Natur der Herrschaft schrûÊnkt die diplomatischen Mittel ein, die ihnen zur Verfû¥gung stehen. Daher spielen [dynasties|e] eine geringere Rolle und Republiken kûÑnnen nicht von [royal_marriages|e] profitieren."
 theocracy_desc: "Eine $theocracy$ ist eine [government_type|e], die auf dem Prinzip der gûÑttlichen SouverûÊnitûÊt beruht, wobei der [ruler|e] von Glaubensdienern eingesetzt wird und weltliche Angelegenheiten der religiûÑsen AutoritûÊt untergeordnet werden.\n\n$game_concept_rulers$ werden in der Regel durch eine Form der [election|e] auf Lebenszeit gewûÊhlt, was eine weniger zerrû¥ttende Machtû¥bergabe ermûÑglicht."
 steppe_horde_desc: "Eine $steppe_horde$ ist eine [government_type|e], die auf der militûÊrischen Macht ihres [Concept('ruler', 'Herrschers')|e] fuût. Verwandte des derzeitigen Herrschers haben eine hûÑhere Chance, [heir|e] zu werden, doch auch SenioritûÊt und persûÑnliche [abilities|e] werden hoch angerechnet.\n\n$game_concept_rulers$ stammen aus der Elite der Gesellschaft und werden die Treue ihrer Standesgenossen nur so lange behalten, wie sie sich als fûÊhig erweisen, benachbarte [countries|e] zu unterwerfen, zu verwû¥sten und zu plû¥ndern. Daher ist die Nachfolge fû¥r eine $steppe_horde$ ein folgenschweres Ereignis und kann sogar zum Zusammenbruch fû¥hren, wenn der neue Herrscher seine Macht nicht unter Beweis stellen kann."
 tribe_desc: "Ein $tribe$ ist eine [government_type|e], bei der die Politmacht in erster Linie auf dem Konzept der Verwandtschaft beruht, sei es durch direkte Blutsverwandtschaft oder vermeintliche Abstammung.\n\nDie [dynasties|e] und Familienbande sind daher von grûÑûter Bedeutung bei der Bestimmung des [Concept('heir', 'Erben')|e], der immer der Elite der Gesellschaft angehûÑren wird. Sehr hûÊufig werden jedoch auch SenioritûÊt, persûÑnliche [abilities|e] und militûÊrische Kompetenz hoch geschûÊtzt."
