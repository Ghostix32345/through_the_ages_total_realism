 MODIFIER_TYPE_DESC_block_marrying_lowborn: "Dies bestimmt, ob ein [character|e] einen [Concept('lowborn', 'Gemeinen')|e] [marry|el] kann oder nicht."
 MODIFIER_TYPE_NAME_local_trades_per_burgher: "$burghers_estate$-Handelskapazität"
 MODIFIER_TYPE_DESC_local_trades_per_burgher: "Dies wirkt sich darauf aus, wie viel [trade|e] pro [population|e] der [ShowEstateTypeName('burghers_estate')] an diesem [location|e] selbstständig betreiben kann."
 MODIFIER_TYPE_NAME_global_trades_per_burgher: "$burghers_estate$-Handelskapazität"
 MODIFIER_TYPE_DESC_global_trades_per_burgher: "Dies wirkt sich darauf aus, wie viel [trade|e] pro [population|e] der [ShowEstateTypeName('burghers_estate')] in diesem [country|e] selbstständig betreiben kann."
 MODIFIER_TYPE_NAME_ruler_must_be_commander_during_war: "Herrscher muss die größe Militärstreitmacht befehligen"
 MODIFIER_TYPE_DESC_ruler_must_be_commander_during_war: "Dies verlangt, dass unser [ruler|e] der [commander|e] der größten [army|e] oder [navy|e] während eines [Concept('war', 'Kriegs')|e] ist. Die folgenden Malusse gelten, wenn der Herrscher nicht im aktiven Dienst ist:\n[ShowAutoModifierEffect('ruler_is_not_a_commander_during_war')]"
 MODIFIER_TYPE_NAME_character_overthrew_high_king: "Stimmgewicht (Hochkönigtumsanführer)"
 MODIFIER_TYPE_DESC_character_overthrew_high_king: "Dies erhöht das Stimmgewicht des [Concept('country', 'Lands')|e] dieses [Concept('ruler', 'Herrschers')|e] bei der Abstimmung über den [international_organization_leader_short|e] eines #L [GetInternationalOrganizationType('high_kingship').GetName]s#!-[Concept('international_organizations', 'Zusammenschlusses')|e]."
 MODIFIER_TYPE_NAME_character_blocked_from_high_kingship: "Hochkönigtums-Verbot"
 MODIFIER_TYPE_DESC_character_blocked_from_high_kingship: "Dies hindert den [ruler|e] eines [Concept('country', 'Lands')|e] daran, [international_organization_leader_short|e] eines #L [GetInternationalOrganizationType('high_kingship').GetName]s#!-[Concept('international_organizations', 'Zusammenschlusses')|e] zu werden."
 MODIFIER_TYPE_NAME_shameless_privateering_modifier: "Ruchlose Freibeuterei"
 MODIFIER_TYPE_DESC_shameless_privateering_modifier: "Dieses Land hat schändlicherweise eine Kampagne begonnen, um Piraten zu finanzieren, die dem Handel seiner Feinde schaden sollen."
 MODIFIER_TYPE_NAME_sheikh_ul_islam_modifier: "$common_string_shaikh_al_islam$"
 MODIFIER_TYPE_DESC_sheikh_ul_islam_modifier: "Dieser Charakter wird als herausragender Islam-Gelehrter und oberster Muftī seines Reichs anerkannt."
 MODIFIER_TYPE_NAME_has_appanages_subjects: "Apanagen möglich"
 MODIFIER_TYPE_DESC_has_appanages_subjects: "Erlaubt die [subject|e]-Art Apanage. Apanagen stellen Titel mit Landbesitz dar, die einem Mitglied der herrschenden Dynastie verliehen wurden."
 MODIFIER_TYPE_NAME_appanage_prevented_from_call_to_war: "Apanagen-Kriegsruf verboten"
 MODIFIER_TYPE_DESC_appanage_prevented_from_call_to_war: "Diese Apanage bekam entweder besondere Privilegien vom Suzerän gewährt oder ist untreu und kann daher nicht in Kriege des Suzeräns gerufen werden."
 MODIFIER_TYPE_NAME_peace_offer_fairness: "Friedensangebot (Angemessenheit)"
 MODIFIER_TYPE_DESC_peace_offer_fairness: "Dies erhöht die Bedeutung der Kriegsbeteiligung, wenn Verbündeten in einem Krieg Verträge eingeräumt werden."
 MODIFIER_TYPE_NAME_peace_offer_negotiation_power: "Friedensangebot (Verhandlungsmacht)"
 MODIFIER_TYPE_DESC_peace_offer_negotiation_power: "Dies erhöht den Kriegswert-Prozentsatz, den eine Nation in einem Friedensvertrag im Vergleich zu anderen Nationen erhält."
 MODIFIER_TYPE_NAME_language_change_threshold_modifier: "Schwellenmodifikator (Sprachwechsel)"
 MODIFIER_TYPE_DESC_language_change_threshold_modifier: "Dies wirkt sich darauf aus, wie mächtig eine Sprache sein muss, bevor sie als Anwärter für die Hof- oder Glaubenssprache gilt."
 MODIFIER_TYPE_NAME_can_propose_papal_bulls: "Vorschlag möglich (Päpstliche Bullen)"
