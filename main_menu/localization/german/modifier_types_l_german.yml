 MODIFIER_TYPE_NAME_monthly_imperial_authority: "Monatliche Reichsautorität"
 MODIFIER_TYPE_DESC_monthly_imperial_authority: "Dies wirkt sich darauf aus, wie viel Reichsautorität das HRR ([GetInternationalOrganizationType('hre').GetName]) jeden Monat erhält.\n#Y Hat keine Wirkung, wenn wir nicht Anführer des HRR ([GetInternationalOrganizationType('hre').GetNameWithNoTooltip]) sind.#!"
 MODIFIER_TYPE_NAME_imperial_authority_modifier: "Reichsautoritäts-Modifikator"
 MODIFIER_TYPE_DESC_imperial_authority_modifier: "Dies passt die Auswirkungen der Reichsautorität für den Zuwachs des HRR ([GetInternationalOrganizationType('hre').GetName]) an.\n#Y Hat keine Wirkung, wenn wir nicht Anführer des HRR ([GetInternationalOrganizationType('hre').GetNameWithNoTooltip]) sind.#!"
 MODIFIER_TYPE_NAME_allow_self_vote: "Eigenwahl möglich"
 MODIFIER_TYPE_DESC_allow_self_vote: "Dies erlaubt es [electors|e], für sich selbst als [hre_emperor|e] zu stimmen, selbst wenn sie bereits der $game_concept_hre_emperor$ sind."
 MODIFIER_TYPE_NAME_is_hre_elector: "Ist Kurfürst"
 MODIFIER_TYPE_DESC_is_hre_elector: "Dies erlaubt es dem Land, als [elector|e] im HRR ([GetInternationalOrganizationType('hre').GetName]) zu wählen, und räumt noch weitere Sonderrechte ein."
 MODIFIER_TYPE_NAME_can_revoke_electorship: "Kurfürstentumswiderruf möglich"
 MODIFIER_TYPE_DESC_can_revoke_electorship: "Dies erlaubt es dem Land, das [electorship|e] von Ländern im HRR ([GetInternationalOrganizationType('hre').GetName]) zu widerrufen."
 MODIFIER_TYPE_NAME_is_excluded_from_electorship: "Kurfürstentums-Ausschluss"
 MODIFIER_TYPE_DESC_is_excluded_from_electorship: "Dies hindert das [country|e] daran, ein [elector|e] des HRR ([GetInternationalOrganizationType('hre').GetName]) zu werden."
 MODIFIER_TYPE_NAME_reasons_to_elect: "Wahlgründe"
 MODIFIER_TYPE_DESC_reasons_to_elect: "Dies passt die Bereitschaft der [electors|e] an, für das [country] zu [Concept('vote', 'stimmen')|e], wenn es darum geht, den nächsten [hre_emperor|E] des HRR ([GetInternationalOrganizationType('hre').GetName]) zu bestimmen."
 MODIFIER_TYPE_NAME_reasons_to_vote: "Abstimmungsgründe"
 MODIFIER_TYPE_DESC_reasons_to_vote: "Dies passt die Bereitschaft der anderen Mitgliedsstaaten an, dieselbe Haltung wie der [hre_emperor|e] bezüglich einer [resolution|e] im HRR ([GetInternationalOrganizationType('hre').GetName]) anzunehmen."
 MODIFIER_TYPE_NAME_allow_landfriede: "Landfrieden-Durchsetzung möglich"
