 MODIFIER_TYPE_NAME_enact_papal_bull_cost_modifier: "Erlassungskosten (Päpstliche Bullen)"
 MODIFIER_TYPE_DESC_enact_papal_bull_cost_modifier: "Dies wirkt sich auf die [costs|e] des Erlasses einer [Concept('papal_bull', 'Päpstlichen Bulle')|e] aus."
 MODIFIER_TYPE_NAME_revoke_papal_bull_cost_modifier: "Widerrufkosten (Päpstliche Bullen)"
